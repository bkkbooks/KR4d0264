body:
  text: 浪語集卷一宋薛季宣撰賦靈芝賦宋興二百有三年封陲載寧狼烽不驚上乃髙揖凝旒棲神泰清天之與子法舜承堯祇載夔夔齋栗以朝帝被衮章舁䇿寶列旌麾羅羽葆太師輔前少師保後工瞽登歌奉常贊道有覺彤庭皇拜稽首上天子之父號曰光堯夀聖太上皇帝母曰夀聖太上皇后宫維德夀康夀其堂色養無違儀型四方二聖相歡用惟其至仰孝俯慈假天凖地二氣之精百物之英誕秀靈草乘時挺生隆興惟甲申嵗之陽羲皇御寅斗直東方有茁者芝有粲其房不植不根于殿之梁輪囷扶疏馨香有馝紫色氛氲交光曄日歘騰龍而翥鳯追金相而玉質煥耀宸居清明帝闥閲之者神驚瞻之者目奪一本同柯支生十二錯地分州蟠天列次瞻彼日月膺期嗣嵗亦有律吕八音以諧仙館玉樓光於泰階皇帝乃命東觀啓鑰書披瑞命之篇參瑞應之圖驗通儒於白虎稽神契於孝經僉曰王者孝慈則芝茂又曰養老則芝生深仁是加於草木祥應是接於仙靈故肅宗養親而産延英之座孝武嚴帝而秀甘泉之庭於是聖心悅懌稱賀喧譁皇上賦玉華之詩太上發芝房之歌君臣動色室家胥慶被之于服章聲之于謳詠蛋獠以之輸琛海波以之愈靜戴白之叟成黃之兒爰及閨房笑語嬉嬉自慶未始識也若豈天降而人為哉粵有狂生小子樂稱古德喜溢於顔憂形於色謂和氣致祥允天子之慈孝天施地産誠聖人之達德也乃若漢之宣章號稱七制仁民得天休符接至桓靈何道而産中黃之藏有芝英之瑞也由是言之妖祥叵測爾雅離騷乃尋乃繹乃列芝蘭乃識菌芝或云産於嵒阿采於山而有之蓋希出堂殿髙華之所有沾濡鬱結而為曽胡多之可尚青龍之際乃一柯而三十有六支此何敞所稱生庭之怪草崔光以謂蒸氣而生之也乃其竒祥有取蔑聞往古方士多岐有傳漢武逮乎季末諛辭麕至鬼目呈符菌宫賀瑞豈黃精鉤吻有時而亂亦雞蘇狶苓有時而帝也於惟我后秉文之德昊天景貺三辰耀色雖無此芝何損於治生禁之庭亦孔之異此不可不察者誠何足以當上意也悵天居之髙逺羌欲告而誰言聊陳辭而寫志庶有發於塵編亂曰靈芝秀兮爍宫庭春秋易色兮隨月而生神父慈兮君至孝貺珍符兮天之云告我欲排閶闔兮雲路迢遙物怪司閽兮翹折之招爰攄懷兮作賦儻六丁兮下來持去唐風賦有唐氏之封國都蟠木之甬東馬牛逺其不及舟車絶而不通其民穴處比屋開房王宅中都深嚴九重拓甬道之交馳敞離宫之虛邃猿臂接其鉤連拱周廬之環衛舉袂歘其風生發語轟其鼓合繁邑居之浩穰紛往來之雜遝循有國之彛倫正君臣之上下有一姓之常尊越啓邦乎邃古曽篡殺之無聞信戰爭之無取王屬烏姓其民黃氏服色所尚烏黃而已民佩觿以為飾宫室壯而虛居偉敦厖之厚貌極骯髒而睢盱王之儀表特多竒異翹然出類胡然極貴望之不似人君就之而不見可畏王好細腰邦人謹飭王好長裾邦人慿翼上不令之攸行民戴君以為命力作而不敢告勞焉以奉王之同姓所謂主在與在主亡與亡一國待一人而治萬室同一家之政者也載朝載夕御於君所有覺彤庭坎其擊鼓濟秩秩之朝儀迅翩􅗁之抃舞胡風雨之蕭騷振衣裳之楚楚寄邦刑於警吏法惟牢戶之填罰有犯而惟行拉腰膂而蜎蠉上無酤𣙜之禁民習釀以成風醖百花而家給亶公私之大同賦稅之法以臘而征獵取於敖甘如飲餳苦辛之卒嵗嗟誰為之營營民俗喜逰其行無迹御非煙之翕合履空虛之絡繹粲芳菲之芬馥一花樹之離披交燕賞之駢闐匪寒溫之載罹既醉而歸式歌且舞紉香葩以為佩惹衣芳而返處懲野宿之王誅用不關於外戶粵有渠搜之戎諸种之族由慢藏之致寇以盜招於天祿將掃除之靡力創侵陵之云殆爰巽處於新都有遷民而逺害王息生而已長錫茅土而封諸中邦甸而分民即新封於大都送之者至門而返制初絶於交如國之大事莫如卜宅相考隂陽乃謀舊德審輿情之胥悅王揆日而于行瞻一人之鸞翥儼千官之景從峩冠嶪岌進其前佩劔峥􅗆踵其後飛騎蓊其如煙翊衛氛其如雨弓弩彀而空張競周章而禦侮載行載止載回載翔王人興而樂舉鏦夔鼓與龍鐘警從官之行節洵輯集其雍容動不違於車下抑何誅於亂行逺而眺之摶如鵬翼之奮長風即而視之宛如雲蒸雷起之應翔龍達郊關而近止居整飭於威儀以次即于新城正班列之離離其行有序其至如歸大一王而入邑宣新令之無譁攻王室之渠渠力公餘而後家百堵翕其皆作更畨出而樵蘇王巡狩於崇朝徇邦人而有誅凡所以維綱其國者尚同人之疾夫走聞唐人之俗有五善五殆焉以德而王一善也世有常尊二善也上下均一三善也公而後私四善也民勤於力五善也斯五善者所以正王居於南面者也世嫡無統一殆也大都偶國二殆也王族侵民三殆也征之無度或時不取四殆也諸种侵軼五殆也斯五殆者皆人力之所不逮焉者也有兹五善屏除五殆而邦無絶奉衰微之厄俗寡宗姓侵漁之害業無惰而無勞或罔窺其障塞走將見夫可封之俗永無聞於淪敗者矣慨有唐之𥚹小可言大國之風無五善之綢繆而五殆之云崇走知其為邦之效不難乎神禹之功也感微生之含性稟忠諒於天然聊託賦於斯文庶夫人之勉旃已焉哉天實為之其又何言懷騷賦觀競渡而得屈原之所以死作江水滔淫兮恢台中陽桂枻蘭舟兮泝洄翺翔周章通國兮社里亶出赫奕炳明兮象龍偶濟筒糧煥結兮招祭先生今古回環兮顯允人之故誠蹇産豫心兮緬懷墟郢騏驥伏箱兮駑駘馳騁變緇以為白兮珍寶甘蠅蒔艾穫蘭兮將誰與明蛾眉粲其嬋娟兮羌被離於衆醜纍蠲埃而為竊飯兮蓀孰知其內守視羣輕之折軸兮舟沈於積羽繄直木之致斤兮信夫君之有取堯徂舜陟兮人自為家媢嫉異采兮憎人心之所加耿著夜光兮浮雲結而慘黯忘衣裳之昌被兮不自知其顑頷眺丹陽而侘傺兮黃沙之莽莽拔髙丘之松桂兮刪寄根於非土鸞鳯翔於千仞兮來下棲於荆棘豢龍烹兮同雞鶩於人食鄂渚徜徉兮思要眇之故步永懷流烈兮聞髙風於競渡時移世變地益逺而年益邁兮孰孜孜其愈勤飄風發而白雪飛兮蘭含香而自焚重曰崦嵫嗟峨前介西兮服翼昌揚玄鳥棲兮子胥鴟夷比干逝兮逍遙沅汨將永世兮崇莠言文在羑兮人吾歸知何有兮雷霆奮聲輼輪兮拯溺風千萬春兮椒蘭穢庸有止兮懷留夷曷其已兮春霖賦皇八世之隆興兮元正直於青陽遭霖􅉈之嫣綿兮竊獨悲此衆芳氛䘲鬱其繽紛兮蔽皇蒼之淟涊既困人以沈著兮又申之以紆軫斡渾天以為蓋兮星辰爛其昭灼仰橫空之靉靆兮日飛霺余靡樂坤輿磅礴以蒸漬兮漲塗潦之狂流草莽莽以侵階兮蒼蘚汨其孔蘨藥丹赬以豔顔兮荃胡獨罹此患上飄風而下淫注兮霣芬葩於未晏蠶蠢以三蛻兮牟棲畝之云秋胡彼蒼為此沍寒兮産鬆䰒之耳頭情徊徨余靡遡兮幾鳴哀於閶闔羌被離於霧露兮雖衷腸誰與答創余懷而若刈兮涕紛零其如雨庶庚申之輔夏兮鎖支祁於淮浦烏乎悲哉兮人生復幾春嵗流邁而多隂兮皇淈滑於東君不如歸嘂鷤鴂之凋萬卉兮傷靄昧而幽憂叱神龍俾潛淵兮馭羲和而逺逰感沐賦壬午中春十有九日走沐見二毛焉因感而賦沐余髮兮中春感余心兮泯紛烏頭白兮道蒙若不壯年兮兆衰落元始昆侖閲嵗華之垓載兮飈如宿昔人生百齡月過千之云積兮羌虧盈之不可度羲和叱馭而莫之挽兮倐焉歸於窅漠視權輿為一欠呻兮矧吾生之略約彼顔子二十九而白頭兮親聖師而忘悔思文君於鼓琴兮儃沈吟於本始春歸園而秀木兮果覿花而知實人間世兮苟託棲於兹室多文飾兮華髮班其可喜一闕此之暫然兮嘻其云異視老彭為非望兮若殤子者吾其至愈皇蒼之司夀夭兮繄余何意寄悲歌而寫志兮曰生之忽也庶彚由天俱斯物也春蕚榮華幾其日也班白顛兮猶之一也於乎樂兮終歸沒也感除賦感寸隂之云暮將嵗華之就除陽曦赫兮已入天昏昏兮方夜惛余生之沈窒年垂加兮有室蹇無進於成德而徒為乎積日先考去台兮愈逺二紀閲兮痛音容之不可見視兒曹之日長慚慘怛而惘惘思既往而沈吟時不同兮實勞我心官匏繫之更載下下考兮書之云再悲盛年兮去不我留知有期兮樂舍是而優遊儺鼓韸兮震渠屋倡侲童兮逐逐山臊神兮難知爆竹庭除兮夫勞爾為靜曰嗟嗟兮若人年暗易兮時新不知駒之過隙旦曰旦兮王春本生賦元始鴻濛兮肇太初惟皇極聲色恍其無眹兮希微夷為至德天墜生而滋數兮是分人紀人本生於父母兮體隂陽之萃美羌圎顱而足方兮二儀之性也紛坐作之更王兮惟動靜也九竅作而四支行兮孰司其柄也強不息而運乾乾兮於穆惟皇之命也余既克格此至誠兮又將之以至愚冠芙蓉之芳馨兮扈荃蘭以為繻珮明玉兮長劔履瓊華兮瀲灔病世俗之顓蒙兮思將以免畏修名之不立兮悁悁登崇邱而攬桂兮踐草茅於溝瀆仰髙山兮瞰谷既瘏兮我馬茫洋兮厭若悠揚兮莫之我持余惝恍而侘傺兮命巫咸以占之巫咸啓余以其兆兮曰而慊焉如有失耿營皇之隱憂兮浮切身之疢疾宜沐芷之芳潔兮以歸毋昏迷於糞壤兮驅馳宜飲水於華池兮自潤毋力爭於虎狼兮騁俊宜種菊於籬東兮卒嵗優遊毋習嘗彼野葛兮懼外物之余仇感春秋之川逝兮日與月其相除反視其多過兮越美人之軌度弗忙遽而言旋兮荏苒嵗其將莫駕騏驥而驂白虬兮揖旬始其為御勾芒蓐收趨走夾余輈兮祝融用之先路豐隆飛廉共灑掃而從輿兮列玄冥為奔屬帶浮雲而乘太微兮招搖邈其容與凌崑崙而放於六漠兮鼂徜徉而逰處九陽駕言夕歸兮皓皓洋洋期泰初而為交逰兮將叱咄乎黔嬴嫓淑申申其證余兮曰胡為而不為卓行混茫倣像兮徒為訿病求異世之落落兮嗟倫類之緬邈人斯與而不羣於鳥獸兮巍巍乎古之先覺帝鴻氏余鼻祖兮惟大宗曰伯陽侯於薛而姓惟任兮芳澤三王奚仲萊朱之思誠兮左右夏王洎商武誥明明如日月兮祖已追於臣扈摯仲任之京配兮嬪文公而接魯粲三秀之偕芳兮天香郁乎往古秦漢世之足蓬艾兮丕南辟於丹陽轔七朝而軋唐李兮令之作於閩方榜龍虎之肇名兮天荒是破日暗靄兮粵言旋於故處四百齡兮我祖光祿道蘭洲兮逺追前躅菊香流兮宜黃中冀體石蓮之剛固兮菡萏芬敷而廣被右史君兮含月精衣卿雲兮帶青萍信杜衡兮縈薜芷服荷裳兮腰蕙茞冠獬首兮珥汗青武光祖兮在楓庭剛百錬兮有折視氛朕兮無刑懼前修兮弗稱聊相羊兮往行反曰川瀆委蛇道幽通兮波澤淪漪德涵溶兮清靜沈潛浸淙鴻兮泥滓隄坊混而窮兮澄徹滔滔反流東兮浩蕩汪洋惟太空兮邈其無象將何從兮浪語集卷一
