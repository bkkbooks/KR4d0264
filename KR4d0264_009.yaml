body:
  text: 浪語集卷九宋薛季宣撰詩詔書屯田湖北相土西鄉屬暑雨中旬轉入洪道時雨初霽溪山蔥泚如在縉雲荆坑道中子規之聲相聞屬道沐雨驅車涉敗橋平原渺漫漲江潮華容葭葦憑誰燎赤壁艨艟徒自燒一路規啼情悄悄九臯鶴唳思搖搖道東直指松門去酷似故鄉歸路遙書顔子傳後幾庶都緣有若無寧論芻狗矧蘧蘆要須非復周公夢而亦何為子夏書行葦至仁均草木中孚大信洽豚魚窮神至命知奚事不逺周流意六虛六月三夜夢觀某人詩什其書一章四絶蓋絶筆也走讀竟太一真人來告語青猿手裏得長書靜聞丹竈風中雨之句夢而默記之寤矣作詩道意多謝真人警夢書青猿馴擾尚趦趄任從爐鼎喧風雨爭奈神明復古初君樂錬形咀丹火我甘飲水灌園蔬惟當敬佩終焉意豫欲無言致匪虛讀伊川易傳太極非名豈自然由知闢闔見坤乾先天詎必違中古上古應須得後天至密退藏那有迹惟幾成務尚容研從教變易能從道不似神龍得性全樊口見鄭崇陽不遇經時兀兀坐筠鄉命駕崎嶇傍夕陽島嶼西陵開罨畫湖山東鄂洗新裝路侵細草迷繁緑風落閒花憶舊香却上渡船歸去也不逢安道故無妨誠臺晚意麥夏西山日腳斜峯雲千里盡丹霞晴嵐榱桷水春漲芳草園林路晚花逺近子規啼怨抑髙低乳燕語淫哇官身歸是何年社信美誠臺不似家晨赴寒溪寺乾龍節道場所曉入招提旋即還去何忙遽到非閒寒溪日出射煙霧退谷路荒埋草菅林盡逺峯晴歷歷叢深流水暗潺潺歸途鐘鼓依稀似將謂禪居别有山新晴起人舒慘作陰晴九十春光只雨零宿草未萌波漠漠落花掃盡葉青青風生逺嶠銜明月霧斂長江吐漲汀天意乍回心自廣片時雲路覺無形勝亭雪望上元雲路玉塵飛應是虬驂罷㑹歸望合郊原人世變映浮城郭夜燈微連天忘却黃岡縣際水平將赤壁磯滚滚長江耐澄撓浪回漚鳥一驚翬和賈簿澄江風定也清寒咫尺渾疑醉夢間雪滿後湖真是浪雲平西塞且無山輕鷗弄水情無限逺鴈書空時自還靜極要當隨衆樂歸來燈火閙朱顔和賈簿勝亭雪眺攜壺命侣燕江干雪起頽垣甃玉䦨減水湖中還素浪明雲天際失青山無端大火寒無艷不奈生柴苦不乾斷岸蘆洲見殘月一鈎忤視却前灣艮止亭即事艮止危亭欲暮春湖山江外翠眉顰鳥啼夕月清歌扇花發荒原閙舞䄄吳老洞迷青草暗陶公宅古緑蘿新懷歸何日成歸計不忿端居作主人泊船泊船在處即吾家解得熸烹爨有槎弄景日移煙岸栁流香風度野薇花霞翻錦段浮江渚水落濤紋隱岸沙塊坐朅來無一事夜深逺燒起殷霞從孫元式假定本韓文楊墨衰周亦既微仙曇妄欲斁倫彞回瀾豈直萬人敵斷簡傳將百世師脫落間亡烏鰂墨蠧殘寧免白魚辭校讎歆向君無愧聊以新詩當一瓻校畢歸之倒墨扶周復古文清輝萬丈醇乎醇七篇奧義逺相繼六代潜光今又新字假通才識魚魯車慙寡學改金銀異書喜得君無靳此道中興知有人勸農出郊漫驅戎馬說農郊不見田疇見白茅洪道曉晴明水底羊瀾春漲長林梢紅翻大澤霞方散青入空原草漸苞迎畯示民民自勸可須杯酒薦烹炮九日龍山之集荆州作年年九日登高㑹九日登高年嵗間萸紫楓丹應共賞橙黃橘緑正宜攀今人不在古人後往意何如兹意閒風帽落簷誰得見龍山還是昔龍山冒雨渡江弔喪彭氏造雪堂夜歸衝風節雨亂西江弔死裴回問雪堂叢枳介無春草碧小橋蹤在古碑荒人存有政名空大世逺回思恨始長旋棹晚雲何限事可堪瑞慶栁成行月波樓下草芊芊浪拍三江起暝煙願見古人人又去欲詢往事事無傳窪樽明滅漁家火樊口依稀估客船妻子迎門應怪笑問君何為苦周煎酴醿花東鄰處子太優柔醉倚欄干十二樓清白有家傳醖籍醇醲無味飲風流帶搖翠握蒼蛟動佩解虹梁緑蟻浮嘉木自香香到骨困人非酒欲誰酬牡丹三春首出衆芳菲笑倚東風蹙翠眉洛浦未翔要玉佩湯泉新浴曳袿衣無雙可奈傾城恨第一何堪代命為桑柘不花花乍可清霜誰是不空枝巖桂羣芳未許論芳馨獨自秋天卧月明賴有幽香洞淵奧寧將雅趣博輕盈德純不顯娥皇怨道大無聞叔度清好向深巖伴黃石可知誰與桂花名天閨扁舟一葉轉寒溪返照西陽日下西旬浹不來江水漲驚瀾幾欲上天閨武昌懷古漠漠煙村一故城郊壇離殿草茅生青山不解知興替銷黯開顔為雨晴筠鄉入夏野花方折牆匝叢叢繡舞茵一般顔面各精神筠鄉不為東君去野草閒花滿路春艮止亭晚意山影殊亭日轉西牆頭歷歷片帆移何人喚我頻歸去側耳疏篁怨子規艮止亭阻雨旬日山亭無路少徘徊跬步狂瀾漲九垓不是蜃樓浮海外也應弱水限蓬萊艮止休工未落成故人恨隔雨零零眼前好景到不得便是霄中望極星晚渡東坡赤鼻磯頭橫曙煙吳王城下浪連天聞道東坡妙天下爾來靡日不盤旋浮生萬事盡塵埃瑞慶堂今榜快哉惟有東坡舊煙栁道人猶解指莓苔行戍西山帝驅貙虎舊江州旅卜僧坊計少休避暑有宫留不暇遊山算却是山遊讀蕭銑傳可怪梁朝幾帝王丘墟萬里變農桑修文偃武知何故町疃江陵盡鹿場塊坐萬緒絲棼汨太和終朝所得竟無何放心收却且危坐始覺忘機有味多讀皇極經世書大易誠知自畫前後天不識異先天工夫用盡還無事巧厯勞推不盡年讀荆軻傳廟算嘗聞勝五侯輕生終不是良謀秦王未許論生劫畢競還同撩虎頭讀劉義集湯文不作幾經春義也賢乎隱澤民古劒胸中儘磨淬寧如覺道樂耕莘伯丈人盆池開芙蓉十二聞合天符下玉麟祝融湓浦肆時巡西山詎必須陵井又得飱霞十二人陵井十二玉女居之西山十二真人上仙處也嘲欲借豫雜稿者神文道本可言形退也收藏用即行要得任牽驢狗在無端何似借書生郎君到底亦何知奪卷書生真數竒惡語固應多艾氣殘藤無用寫來詩春逰桃紅李白輝相曜車馬交關遞流照牆頭半露是秋千不見美人聞語笑即事芰荷薿薿抽蘋藻風細幽香襲懷抱庭竹琅然振玉音葉落委階慵不掃殘花小院銀瓶花落枝驪山驚起睡楊妃銷魂淚滴燕支雨留得霓裳舊舞衣瓶花盡落而梨花瀟灑如故天帝南遊匹馬還紅雲作陳雨闌干駐顔下咽如氷雪一粒清凉得賜丹寒食雨言歸社鴈已家鄉紫燕呢喃識舊梁甚雨疾風寒食夜旅人情緒一思量江村聞笛江村風色秋江渺林薄無人閙幽鳥長笛金吹一聲寒知有漁舟釣紅蓼逺景圖蘆花飛鴈煙村靜一㸃青山波萬頃人在孤舟喚不譍兒言客寫瀟湘景慘淡平煙波浩渺隱月餘光飛白鳥依稀一舸是漁舟獨釣寒江天未曉野望水晶簟冷鋪寒玉翠帟髙漲染螺緑陳雲鳥鷺㸃棋枰一葉清旗動江曲衰栁秋草池塘夾黃纈莫煙淡淡蒙新月擬將攀取贈行人脫葉枯條不堪折浪語集卷九
