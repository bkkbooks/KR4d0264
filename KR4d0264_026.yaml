body:
  text: 浪語集卷二十六宋薛季宣撰劄狀上諸司論金牛置尉劄子契勘本縣金牛馬迹靈溪賢庾符石五鄉在本縣南隔絶大冶縣界一百三十餘里阻水帶湖東北抵永興大冶縣界西南江夏咸寧縣界直南接連洪州分寧等縣幅員凡數百里居數路之衝商旅往來最為徑便近嵗以人煙稍盛而無官府遂至盜賊充斥不住作過巡尉聲迹相逺無緣敗獲數邑界內民不安處某伏見金牛鎮舊有監官一員紹興初以荒涼減罷今來本鎮人煙近四百戶市井比之本縣大段翕集而酒務買撲一嵗止一千貫若分本縣弓手之額招三十名創置南尉一員兼監本鎮酒務盜賊煙火公事非惟可以整葺鎮市遂可彈壓南鄉盜賊利害甚明欲乞鈞慈詳酌建置使千里之民自此得以安迹如蒙施行即乞就撥都統司廢罷酒務以為廨宇本州本縣各為量借酒本俾隨息錢解納鎮尉請給令本務管認舊來所收土稅却行住罷酒息之數止以貫撲為額除少少寨屋須當以漸經理既無分毫騷擾而數州界內盜賊自此遂當衰息委是公私兩便乞賜施行上王守議后服劄子上仙皇后奄棄六宮在率土之情共難堪處某輒有管見上論節文之末不敢露言賓次惟所採擇某竊覩尅擇官狀選定初十日申時發哀不知本州舊事如何然陰陽家者流使人拘而多泥禮聞朝晡入臨晡而不朝不可也如以十二日晡釋服則是闕一朝臨今於漢氏權制不應重有加損禮失之薄寧過于厚若延至十三日復有四日之嫌昔明道先生嘗遇國喪江寧官吏欲以三日之朝免服明道曰服當三日也茲事體大前輩謹之如此在郡府不可不察有如製服未具則雖移日可矣某舊蒙恩庇之厚於今不敢忘於大君子之門敢以姑息為愛知公禮重故敢言之伏幾審處而行如鄙言有可采納則乞直以台意處分甚幸甚幸上王守論絶戶田租劄子某竊見四邑各將去嵗水死之家田畝所收穀子不以立後葬送除官收三分之二外又拘逐人合得分數穀子官收一年既從官收自合除放苗稅目今夏料不住催理兩無所出符帖紛然計會枝掌貧者先受其弊切緣風水之後立後之家初無留財為之數并收葬者不過惇子孫宗族之誼先以已物為之殮葬失其尸者亦為祭享薦拔而官司除附撿括費用百端莫不指準今嵗田租以償其費去嵗唐郎中奏請皆給全産是固聖朝美政而監司之不知體者橫議沮格至今為梗官司又為此舉其何以堪立後之家目今為之俱困咸謂樂清顔宰實為倡始怨謗嚻然欣之職司未必不由于此即使去嵗災變不作言賦者亦欲取此物邪為政患無恩惠及民其可幸其災而求倉廩之富虐遺孤以為利哉意者利未入於公家必且聞于朝路是在仁政不能無纍竊恐寄居見任未有為台座言者伏惟勇義安仁聞之必不能已也伏乞台慈特賜愍念即作訪聞行下止從分數官收仍命官收之田不復催其常賦無人耕種之地官租常賦並從蠲免為惠甚大如能更賜存恤申明唐使之請庶使為人後者不失先人之業是在主上必樂聞之此議發於守臣聽許必速陰德尤大惟台座更審圖之趣詔有期伏願當仁勿遜捐小利以成國家美事此百世利也伏惟軫思幸察上臺諫劄子某聞鼠慿社木莫可灌熏蔓草難圖當鋤芽蘖恭以主上英明神武抗志有為漢祖唐宗未足為輩治效久而不著天下莫知謂何靜思其所由然微傷小人之蔽然上明並日月去邪不疑察梁珂之姦而逐梁珂察龍大淵曽覿之姦而逐龍大淵曽覿睿斷英發仰比天之聰明然而小人實繁難退易進驅之或去旋復踵來其始甚微辨之常晚近者道聽途説有武臣王抃者象胥輩耳以邊事進其心未易測量比嘗屢使軍前或不出于朝命自謂天子訪以人物無識知者往往趨之間見廟堂分行窺伺持反覆兩端之説干君相謀謨之地熒惑主聽居之不疑雖未必盡如所傳不可遂謂言之者妄此聲之出不為無纍于聖德萌芽不翦將恐或害於斧柯在崇寧中初遣童貫使邊不由宣敕處分青唐既啓惟亂之階視往者之所為來事當益深戒矣某嘗學易觀乾坤復剝否泰之象知君子小人之進退其實相為盛衰消一陰爻必一陽來於內惟今患之大者莫如左右小人一去一生何損于數消復之道惟須君子國家以心腹寄之二府二府未有見幾之人就能知其為姦不過氣沮而止臺諫上為天子耳目其可置不言乎及今攻之尚可為也它時聲熖赫烜怪以自神黨附成羣交亂四國雖有拔山之力若五丁如彼何哉天下推本其所從來必將追過當言責者觸邪指佞不可以後於他人某官以道事君願賜省納圖難於易以幸社稷蒼生尸祝代庖某不敢逃踰分之責死罪死罪惟幸察之上王正言劄子某永嘉鄙人也生於海陬斥鹵之地素乏朋友磨礱之益直緣糊口不給藉蔭而仕不敢齒于士夫之列然於天下賢人君子未能無慕苟有幸會未嘗不請見焉茲蒙朝廷過聽荐被旌拔閲嵗有半七辭不獲懼涉詭異之迹強顔此來濫叨京職之除愧極而畏自抵都下即聞正言重望賢德且恬進取要官罕識其面每以得侍同朝私喜趨造往復竟未及見方謀親請教誨伏承天子旌識英俊不次超擢榮登諌職善人之慶啓沃之際人士悚服未見施設既已風動四方宗社實幸蒼生實幸某間者雖嘗修敬門下伏蒙顧遇甚寵自念庸逺雖懷請益之願竊有援上之懼不敢數詣賔館頗聞台慈逺鑒亦埀與進之意內顧無以取此未敢𡨕行自獻竊勝感激私情不避僣越輒效一得之見未見顔色幾度外期之求進門牆願自茲始某伏聞無為軍教授沈清臣者比緣正言進用敢以曲士之見狂妄有言沽激云云無所不至等之蠅蚋在寬洪當不之責為祠祿禮則宜之九重重道尊賢於清臣不可無罰下之天獄所以風示天下是則君臣千載一會顧知之者少耳以某愚見在主上在正言者固已曲盡清臣言雖無狀要為獻納于時斥之逺方體自應耳付之刻木聞者不能無疑建請寬之惟正言為當然耳清臣于某初不相識聲聞略不相聞其人賢愚某亦未知端的非為清臣者意正言遇合方始不當緣已罪人之言將使後謂士不得言始於今日其於門下國體所關不細況復放言橫議士俗之常寬之益足以見君子之兼容罪之亦殆無足快不識仁者之見或有取于斯乎且犯不校者顔淵之事王猛殺樊世興之譖已也何足為盛世道哉彼吾詈而吾寬其罪此裕德之盛以直報怨之翹翹者惟正言念之某狂瞽冒聞死罪死罪密書字不謹正惟大度容之得非台意施行毋以告人大幸武昌休官白郡劄子某契勘本縣當天下孔道靖康之際實為兵衝鐵官鼓鑄之徒無非天下亡命故罹兵禍視諸縣為最酷今主戶雖數百皆東西南北之人纍政失于拊循將不堪命加之比嵗力役不能自存縣賦至微不給上供之半吏官給俸賔旅傳食至亡一錢粒粟可以枝梧自某到任以來朝夕疲瘁雖心勞撫字亡補秋毫而鞭箠盈庭虐害滋甚仰愧俯怍無以自容伏蒙某官推仁恤之心曲加庇覆殆將一稔未嘗馳一介下縣追須區區之心謂可受恩終任不圖事與心戾橫賦踵來車船畢工逺作營舍木植離岸即科經總制錢補解未終又為和糴民羸如許其何以堪固知作事有端非郡府之意也然才單力弱粗嘗學問政而知慮不周顧此一方山澤竭矣又為此舉民必流亡把國之憂或大于此乃心憒亂恍如病狂已具狀乞備申請賜骸骨如蒙終始之惠聽以周旋誓畢此生不敢忘德重念某官情素薄自分甚明初蔑寸長可以從政力云不足非敢憚煩敢控哀誠尚幾痛察再白郡劄子某十五日以心氣惝恍不計僣差狂率有請日虞呵譴之至俯伏以俟今數日矣迄未蒙府之報命豈眷憐素厚而難其請邪將以為詐而不足聽邪某之所以朝夕狂悸而不避再三之瀆也伏念某賦才譾薄仕宦固非本心姑欲一試所聞庶幾少有所濟力微而廢謂之何哉誠非敢犯台嚴亦非干百姓之譽一身之計端有在焉蓋某爰自之官非惟身自廢學一兒一姪皆失從師眷先人之遺書久貯箱篋鬱蒸蟫鼠之患惟日憂之矧樗散之姿雅多間放讀書之外問不及家託庇于茲遂有官守之責事無巨細不敢不盡其誠以此勞心殆成糜潰屯營之役一起歸思乳柑政黃不能自已以周易筮遇遁之旅以為此意可以質諸天地神明故斷之不疑請辭而去亦嘗妄有所作不敢冒昧投陳而此及之丐察其非詐耳竊念某故鄉尚逺貧乏為甚坐食於外飢寒且將及之如蒙蚤賜備申得遂其志啜菽飲水皆執事之賜也云云被召辭免劄子某淮三省樞蜜院劄子奉聖旨召赴行在竊以命召小臣禮無俟駕進退之際關乎立身與其貪冒以事君寧若省躬而辭命伏念某不學牆面才乏寸長慿籍賞延為貧而仕再辟藩府亡補秋毫調令武昌亦欲少效萬一交政無幾即際邊興外則荆州起營信陽陸運內則供贍征戍惟日相仍百役並興無須臾暇加以盜賊多有風塵數驚以千戶之羸氓應無涯之師役雖心存撫字實惠何施而政急催科滿目瘡痏學不素講臨事乃知其纍每一念此芒棘在懷間者調補掾曹雖為合入差遣良以治獄事省可以專志一官撥置之餘乘暇得以為學庶幾它日尚可有成朝端過聽而舉之甚非愚分之所當得切惟主上天資英鋭方大有為朝廷之上英俊如林如某駑鈍之資徒知撲拙自守學不足以成已故于應對進退皆非所能必恐進見之間儀容踈野無以仰承清問上當君相之知伏望鈞慈特賜矜憫許終今任就其卒業之志他時有以見君某不任惓惓之誠俯伏候命之至欲乞敷奏施行再召辭命劄子某準尚書省劄子奉聖旨令赴都堂審察竊以間年再召殊異乎常倫顧影多慙豈加于曩日祇可循牆以走難從不駕之行伏念某才不踰人學非適用仕之藉蔭祿以代耕曽微一善之可稱以得九重之過聽弓招下逮取諸選調之中扆座為前擢視王官之列顧雨露草木之恩非薄如海嶽涓塵之補則亡下拜靦顔迄今汗背敢謂下才之樗散旋蒙命召之鼎來得之若驚眷前增愧在進退而惟谷誠若古人之言不往來之憚煩竊懷友朋之畏所願廟堂之俯察許遲縣邑之終更尚冀修為以圖報稱某下情無任惶懼戰栗俯伏俟命之至伏乞鈞慈特賜敷奏施行上大理寺長二劄子某茲者叨冒誤恩備數簿領月十一日赴寺供職本廳即無人吏雖供職文狀亦是自行修寫當時惟有胥長二三輩至直舍參謁並不睹羣吏之面本寺之籍深所未曉遂求教於判寺莫少卿伏蒙諭以本寺之制左斷刑右治獄自少卿丞正評事而下皆有分職獨主簿不然凡文書之期會簿籍之勾考在兩司者悉當兼掌此職不修久矣可呼問知雜吏某亦詢知本廳舊例差破人吏一名意者知雜一司職當關領尋呼知雜司者問以職則曰無事問以吏則曰闕人且言寺簿不治文書但請十日一至直舍簽押簿厯某欲一見簿厯則又泛然不應竟無一事不免逡循出局某來自逺外誠不識朝廷事體切詳國朝官制以長二綜領大綱不可自治凡目故設主簿専職勾校內之寺監外之縣邑小大雖異所掌宜同則凡應干行遣期程及簿書銷注之屬其事無不當預稽違漏落責有所歸簿厯有當十日一簽亦有日當考視者主簿之職況不秖此今也不得知其條目雖廢簽書可也張官置吏恐不為是虛設胥輩惟恐主簿之得舉其職也故多方壅蔽不示之籍將使不得輒有所問不與之吏將使不得輒有所為旨意甚深察此可見某無狀仕實為貧廟堂過聽處以在京職事期待之意寧古乘田委吏之比有如本職不得效其區區愧于前人多矣仰惟主上勵精為治盡心庶獄刑寺之職所繫至重他官祿仕可也此豈苟祿地邪綜核之朝責以名實之效失職至是將何辭以對乎長二勉以職事之修交逰望以職分之內其所為不能稱事有奉身而退耳伏惟台慈鑒念詳思所以處當其宜某責重位卑不敢不告伏乞台察請祠申省狀準敕授前件差遣續準尚書省劄子三省同奉聖旨令赴都堂審察某竊伏自念嵬瑣之質術業淺陋已嘗賜對亡補徒冒寵榮材能不易于前人問學無加於往日而復容容昧進非心所安輒敢上干堂陛之嚴屢伸終任之請仰蒙廟堂眷私敦促至於數四恐孤所以期遇每欲進而趦趄雖惓惓之誠久之頗見幸察而由衷之懇彌年尚未聽從今常熟縣見任人趙善括去替在一兩月間某以有上項恩旨未敢専輒前去之任更合申取朝廷指揮竊緣某比嵗以來得疾異甚精華日耗大懼損生所授號劇繁難必不勝任況又家貧纍重待闕十年久客他州非祿無以糊口伏望僕射相公參政鈞慈矜憫特賜陶鑄祠廟差遣一次庶幾少安微分養痾之外得以盡意學業或備異時器使之列須至申聞者右謹具狀申尚書省伏望檢會纍申劄狀特賜敷奏所有昨降審察指揮欲乞更不施行謹狀再辭召命申省狀準尚書省劄子奉聖旨令赴都堂審察某尋具劄子申僕射相公參政府乞終常熟新任未蒙施行再準尚書省劄子催某疾速起發前來須至申稟者右某伏聞人有常言小官不當辭命竊謂心之辭遜不在官之崇卑當辭而不辭者貪也可進而不進者偽也惟貪與偽何以事君其有誼或可辭禮未容進均之失也寧偽無貪伏念某素乏技能蚤蒙薦對備嘗罄竭無益聰明沓冒寵榮秪深愧靦方期下邑少效秋毫何賢於人弓招洊及庸敢為偽請固以辭且某才不加長學非至到強揠其智則固何堪遷就其言又所不敢縱蒙審察豈過前時如某之流世固不乏進為貪也孰以為賢使某得為天下知退之人實可仰副朝廷勵俗之意此某所以不避小官之嫌輒冒尊嚴而進再三之瀆也謹具狀申尚書省伏乞檢會某前此呈劄特賜敷奏俯從所請施行劄子某才非適用伏蒙廟堂眷然無已再賜促召有此遭遇豈敢自愛然某牢辭再三非狂則詐雖愚不肖何忍自棄如此蓋聞大臣致君進人為重士之取信繫乎亷恥周公寧以戲封諸侯開成王不敢玩人之心酇侯不難身追亡將移髙祖慢士之習竊原二公之意不在一時之得失其所以感動主聽敦奬士流周漢之隆實基于此故某以為上方登用賢宰不遺纎芥之善凡百臣下焉可妄自菲薄奔競速售以纍至公之舉某敢爾辭遜亦欲有以仰報期待之隆已具狀申朝廷伏乞鈞慈鑒察并賜檢會某前此呈劄特敷奏之蚤賜聽許庶幾小人得以安分于下異時圖報誓不後於他人某不任區區之誠俯伏俟命之至又狀先準尚書省劄子奉聖旨令赴都堂審察某嘗再具劄子并狀申乞敷奏請終縣任未蒙俯賜聽從節次三準都省劄子催某疾速起發前來須至申聞者右某伏自念無一毫長誤蒙君相過聽間年再召某豈不欲進而復逡循退避近於不情某非敢自賢固非憚事亦非敢有欺世盜名之意內省不稱故趦趄而止爾即某無嗛于志其何敢久違朝命寧欲以棲遲偃仰自為髙邪伏蒙廟堂好賢樂善之心有加無替每一辭遜促召已班螻蟻微誠屏不上達陶鎔槖籥之意於某則厚矣非愚不肖拳拳懇懇所欲以事君上者也曲成其志非明朝廷惡所望之故某不避再三上干堂陛之嚴期於得請而後已也謹具狀申云云湖州請祠劄子一某輒瀝誠懇仰扣鈞嚴伏蒙恩授前件差遣自八月初四日到州交割職事訖經今四月竊緣本州係是近輔大藩前此無非重臣名德臨鎮某資歷素淺加以綿薄之才誤蒙超擢使令甚願勉䇿駑鈍其如力小任重鞭督不前無以填服同僚不能芘覆民吏帑廩空竭曽無術以救之設若尸祿強顔積久必致曠敗上負主上臨遣訓飭下貽郡人之患捫心知愧夙夜靡遑不免控告廟堂乞賜陶鑄宫觀若逺小州軍差遣一次庶安愚分免致坐占窠闕有妨郡政欲望鈞慈特賜敷奏施行二伏念某自去嵗十一月間以本州畿甸名郡非某愚賤所以安處加之財賦窘乏曽無術以救之纍嘗具申丐陶鑄一祠祿庶安愚分免致久占窠闕逮今數月不蒙卑聽已窮五技汔無寸補錢粟益以窮匱百為彌更費力日雖痛自鞭䇿食息弗暇心力單耗宿疾又作升斗失血略無痊瘥若不瀝誠申欣大則一郡不理在已亦須委頓公私兩有未便厲如熏心欲乞鈞慈俯鑒其衷檢會前狀即賜化筆差注祠廟差遣一次得以就間養治勉強進學報在他日無有面牆之纍凌犯崇威某無任浪語集卷二十六
