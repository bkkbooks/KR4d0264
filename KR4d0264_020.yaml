body:
  text: 浪語集巻二十宋薛季宣撰劄子上成馬帥論屯軍某讀吳志至漢居許而吳都鄂傳於魏則徙金陵得孫氏之所為廢興從而知仲謀之本志武昌古鄂縣也其地四達襟帶江淮許蔡申陳相望五百里而近絶江以北莫㨗此途襲以輕兵信宿可至以斯謀許誠無難矣漢祚移而鼎國分武昌宻邇於魏鄙建業之徙端在於斯今之江南舊為吳地以錢塘為都邑則衢信洪撫為之衝鄉來金人南牧之兵掩自武昌南渡雖鄂州兵十三萬聞而躡之已不能及自縣之西有馬橋湖四十里武昌有變救之實難北望黄州去淮纔四百里淮流可渉絶無闗津毁拆黄民之居以為牌筏順流而下不勞舟楫而通今議不此之虞徒益兵於江夏江夏背山阻水漢陽以北背陂湖以進則難無徃而可萬一金人渡漢由間道以襲豫章不數日而下江西因進軍以傾衢信吾軍悉在其後寜不為都邑慮乎江夏之屯乃岳飛所以制湖賊西臨襄漢阻水實多進退江淮以全制敵之後取道神速遠不逮於武昌吳蜀之衝固已無急於此東晉之世陶侃都督江南其治在於武昌足以明其險要某官按行邉徼在所當言某備數長官不敢不告僣越之罪死不敢逃留軍以屯惟太尉命與宋守論屯田利害某准牒備奉朝㫖措置屯田事冝縣令卑官固論議所不及咨詢所不到惟當遵禀成筭以即事功不當可否其間上評國論然而愚者千慮小子未能一得思欲退就循黙則恐利少害多無補公私失箴規官守之意内愧無益不若言而不用故敢輙以小見仰進一言切意議者之及於屯田葢知其一而不知其二覩其利而未覩其害是故及此言也今夫國家之務莫重於軍食飛芻輓粟率百户而奉一軍散軍就田所耕足以贍衆軍無惰卒國無勞民此歴古屯田之利趙充國諸葛亮之所賴以成功者至於彍騎民兵之辨則恐議者有所未達且亮充國所將之卒類皆調之於民使民就田何所不可彍騎則四方遊手不堪田畆之事僥求逸便是以從軍習擊刺於射塲尚苦其事敺之畎畝慮非所長獲利而共享之彼將猶有所憚專有其利必非樂為賤吏家居嘗識田里之故上農數口婦子畢耕不能數十畝田力猶不足一卒營五十畝其何以堪且古之所以屯田多緣宿兵塞上饟饋不給姑即弃地耕之所求便事寛民非以為利不過自足軍用省饋運之勞不聞悉使之耕倍為程督士能懇地如許寜能弃鄉井而𨽻籍於軍又况國之屯田本緣捍禦闗隘今求闢地利不兩全自然扼塞無田可耕固非要害散之則不可復聚聚之則奔命徒勞一徃于田不可復教積年閲習一日廢之流移之民僅能復業良田便於水利固已耕耨于中環以屯田寜不爭利便民則軍無可耕之地擾之則民必流亡在今少少營田其害已見侵漁豪奪之事無日無之重以屯田民有流移而已况本縣介居大冶烏能強挽之留屯田之兵其患有不可勝言者跂力而待尚或見之言利之臣恐未嘗過計及此第觀漢蜀用之以濟思不及於蕭銑南唐墨守一隅未知其可也先伯考之經畧湖外實代王彦守邉聞彦使二十將卒營田潰者十有八將兹某耳目之所接惟執事明處而熟圖之堂下之言未足深過上宣諭汪中丞書某聞強國以人作人以氣士氣振而衆材用君子樂得其道小人樂得其利雄傑狙詐皆得而用則其國家靡不振不然反是明喆保身而己所與為國非小人而誰哉自非上知之人安有不化理亂之判由此而决國家承祖宗積累之厚教化之美涵飬士氣作成人才嘉祐元祐之間名士軰出一時之盛可以追配唐虞漢唐以還未足倫擬黨錮之過賢知放逐趨時之事媕婀相競二宫播越職此之由紹興始元皇上恢祖宗之畧士氣稍奮江東以興權臣柄朝􅎱賢醜正岳侯之死世絶功名之望趙張之放人莫敢有賢徳四方士氣至于今索然今日朝廷視祖宗為何似是知士氣振者國必盛士氣索則人心亦從而衰其誰為之在時政之所行已爾今天下文武之士知氣節者誰歟平時以讜正為粗剛方謂之暴露脂韋循黙以為居官得體貪婪狠愎世且才之天下㴞滔安於邪行誣蒙苟且上下相承郡縣朝堂㑹為一律論至於此而求士氣之振邦家之興不戛乎難哉卒有意外之虞士安所習孰肯置其官體倣其粗暴捐軀效命以為社稷之衞易其妻子祿位素心之所保乎縱有斯志其中無有徒為強死何補於事夫為待敵之計所務乎盛氣而已求盛而不作日為循縮之計氣不振下將愒然而休以圖恢復之功固未知其或可也執事以明徳繫人望以忠信結主知綜轄臺綱大明國論朝廷為之一正姦囘為之膽落今持節以䕶諸將真裴度征淮西舉也中興聖業當由此致而區區之所為執事慮者不在乎敵之強大而患吾氣之猶索也執事居今之世行古之道施諸首政必也動人邪正昭明㑹與前反氣無有不振人無有不奮則功何有不就是執事所優為者端不俟小夫之論至於朝廷公輔未聞廟勝之畧近鄙之將或恐長城斯壞士卒云惰民久告勞風化所行人無一懷固志者以求恢復之效是猶鬬而身尫刖而爭途豈直不能且速敗而成僨振而起之莫如自進道途之論謂旦暮且將有豳岐之舉士氣骫骳禦侮其誰行留之間何所不有公卿弗匡爭臣弗言杞人之憂寜得不過䋲愆紏繆真執事之事也弛張國勢繫於一言讜論囘天士氣增壯人人有鄉功之志則賢者不敢隠其智勇者不敢愛其力太平可指日而俟夫何有於讐冦康宣中興之臣蓋用此道今身任天下之重非執事其誰冝為惟執事奮其精忠以身為天下倡始則士氣亦從而奮安有不興之國此先務也惟執事急焉某位卑言髙死罪死罪論屯戍某伏覩朝廷經制邊防使成馬軍益戍夏口單見寡聞深所未喻採之巷議為有二説或謂敵謀沔鄂欲以為田開府助或云有失衆之將且使并將之軍夫代將則免之何至興動師旅敵圖沔鄂鄂軍不足用邪質之人情皆不足聴井蛙之見猶不以増戍為然夫夏口之兵岳侯所用以奮擊於中原者猶是人也何不伸於今日况兩軍不相統一設罅生其間一却一前何以待敵夏口古雖控扼然已緩於武昌武昌乃吳建都而王敦陶侃温嶠庾亮之所為督府者其地襟帶江沔依阻湖山左控廬淝右連襄漢陳許蔣蔡倚其後洪撫衢信當其前南北二途有如繩直自淮徂浙不能二十餘舍敵人南收嘗出此以襲豫章千里江淮信宿而至鄂雖有衆不復可追前事之不忘後事之元龜也武昌夏口尚有一湖之限黄州南渡斯須而至武昌渡黄之廬奚假舟楫縱吾軍躡其後擊適致敵人於死地質今驗古要害甚明夏口南臨大山三方阻水漢陽以北限隔陂湖達于應城凡數百里信陽之北始際邊隅可以自安難以應變其西雖有漢口窮冬涸而不通沙口出於陽羅實為江漢之㑹陽羅在黄西數十里舊為㩁塲㨗徑蔡之新息道分為二而南黄與陽羅正當其㑹亂江而渡武昌居兩道之衝宿兵武昌􅋈舟樊港放求古迹分軍江北而屯之以守則堅以攻則速以觀夏口端若井中釋此不圖未知其可某官周通今古於此固當深知遼豕野芹不敢不獻一夫愚見惟執事擇焉論民力某鯫生晩進安知國體然嘗侍諸父官守得接士夫餘論竊聞民惟邦本本固邦寜為國勞民未有能固其國者今兹假令東鄂獲親民事到任之始適當多事之秋竊祿曠官僅能書考可以羸民千有餘户當兵荒水旱之餘大治戰舡治屯營於荆渚林木盡伐役且踰年上泝江流將二千里方幸少休數月民獲治其私家俄被軍書夏口有屯營之役基鞏未立旋令迎候大軍犇命疲勞民不勝其弊不知繼此之後果然若何湖右之民况又非浙江比一錢粒粟即名税户尚不供仰事俯育之費何有於官比年以來虛乏甚矣謂朝廷待敵之計莫若愛撫邉民使其民願為我氓安有不濟今日之事反為先困邉民困而流何所不至昔南唐以屯田之役侵擾淮南周師南征民或負芻迎奉今之科擾有甚屯田愚瞽之心未知其可惟某官至誠體國循問重湖荆襄之民引領以承徳意嘉謨啟沃莫急苦勞冐獻瞽言惟所裁擇論賊盜某復有職事仰瀆台嚴謹按圖經本縣南北凡七百里為鄉十二南唐之季析三鄊縣大冶大冶為縣實處縣中本縣九鄉遂分為二故縣有西鄉有南鄉南鄉壤地最廣當本縣三之二隔越大冶縣界百有餘里有金牛鎮居南五鄉之㑹建炎之後廢不置官其地葢古綠林西接江夏之新市西北湖水南抵武寜其東永興相去極遠凡數百里無一官司比年廢罷㩁場茶冦於此出沒五鄉殆亡聊賴今已數年某到官之初盜賊尚未止息顧巡尉皆在邑緩急知之已難况又無人莫可追捕姑令團聚保伍少為隄防雖冦盜稍衰而鄰邑多受其弊䆒其所以乃戍兵營田其間不逞之民託名佃户為之淵藪豪奪成風挾軍為姦縣不得制承平無事尚爾從横過此以還恐為害有不可勝言者某竊見本縣弓兵之額舊管八十餘人兵火以來才及強半苟分此數就招南鄉之民置尉金牛俾兼本鎮煙火公事則村民有所赴愬南鄉為有官司所費既不甚多可不煩民而辦庶幾人知畏憚政道可行民得少安亦銷盜之一術也自非鈞臺持節本道難以申明故某不辟嚴誅敢有所請建明置尉以安百里之民使盜賊不至公行則執事之賜也上胡舍人書某聞之盛名之下為難居天下之望為難副葢士有名斯有徳有徳斯有望名望所在至徳存焉無其徳而有其名是竊名者也名者天下之美器造物者之所靳也有其徳而名從之猶恐無以充天下之望盜名孤望安有不殆者乎執事窮聖學之源奮百世之下名徳之重非一日矣戊午之䟽欲取奸臣而梟之女子童兒至今傳誦亷頑立懦可以風乎百世之後所謂氣充天地名光日月其所以得天下之望者豈徒然哉皇上付執事以國書班執事以法從任寄之意夫豈無自而然耶上下之情其所望於執事者可謂至矣執事以身任天下之重宜必有以處之今天下倒懸矣上策莫如自治而自治之道非小人之所及也觀乎邉鄙則蕩而無備問其糧餉則匱而不給外有强梁不測之鄰日窺覦而弗制四郊多壘必有當任其辱者不思自治之道而論遂及於和和固多端然不自強則和不在我則將靡事不為而敵人得以制其命矣我之虚實敵人已盡知之而又示弱以和且哀鳴而請命未見顔色固將先事而為之無厭之求必將縱於我矣一辭其請則和不可就舉從其命必將有所不給及有所不給則彼辭直而動順吾圉不固其將何以拒之然則今日之和是為坐困之策謀謨之際尤不可以不審也以愚不肖之見求之人情保國之計和不若守守禦備具則和議可成和議可成守之必固雖然守禦備矣紀綱立矣和戰在我又何敵之畏乎彼寡謀肉食之人烏知國之深慮議和之始未嘗不為善後之説所謀一遂則將歌頌太平文飾禮樂居身周公之地以天下為弗復事矣善後之説不亦虚乎眎前日之所為則其情狀自見如其詳盡則非絫言之所能及也伏自執事返國天下之人誰不拭目以望廷頸以俟皆曰執事守先王之道其將正國而以福天下乎寥寥無聞疑必有所待也今國家之事勢斷可知矣以為中原不可復得強敵不可復破則先王之道遂為無用而天下無可治之理此直自欺之論如曰國恥必雪國讐必報此萬世不易之論而不可以遽成者知上策之自治則恢復之計在其中矣釋此而為和議又將輕舉而妄發和之不就尚可僥倖而成或至於成則國命從此傾矣安危之計無此為急天下循名而求實執事固人望之所由歸也直前論辨必有非外廷所得聞者一言决安危之機用副人望之所屬以全名而保徳則此舉其時矣昔賈誼劉蕡以治安之策陳於漢唐之朝志不克伸至今遺恨於天下執事戊午之䟽固已書之大典著之人寰劉賈之言執事葢全而有矣今日之事志復可伸如倡言以為天下先則天下猶有可為之理置而弗論或始論而中輟則天下之望萬世之名亦有時而替矣賈劉之論徒可謂之空言惟執事審圖之爾某狂生小子不知國論之所定痛念先人不容於和親之際抱志以歿見父之執則思父道之所在以父之道求父之執不敢不以全名保徳副生民之所望屬於執事者之説陳於執事之前贄見之誠先人之志葢於此焉見矣惟執事先生財察幸甚幸甚擬上宰執書某不肖學無能得於古嘗觀市賈而得為邦之道視工師而得用人之説夫工師市賈固庶人之極賤市區求食非治具之所存也然庖丁由解牛而言理道橐駝以種樹而及為邦君子小人至寥絶也至於理之所詣亦其道之所存也市賈之事不過牟利而已牟利而不營於廣徒以名物自占自名一物為道甚狹宜其利之不可牟也亷賈之術惟知吾之所自占非吾自占則雖南金大貝和璧隋珠委積于前弗問也髙車大葢明眸皓齒駢闐于右弗慕也身之所問惟吾之所自占焉者其出之也人一之已十之人十之已百之而裁其入也則盡反於出矣人收其用適通其利出入旣衆其牟利亦廣視貪賈之所為利其相去亦千百矣是乃規模素定不以它利而易吾之所存積小而多制入於出而天下之利歸之矣如賈也不能操其牟利之術不自占而多營泛泛焉惟利之求吾知其得毫毛而䘮山嶽也為邦而謀不素定亦猶是已有人於此始謀而作廬舍則必使工師程其役工師程其役必有料材用而營度之計其舍之廣狹相其材之良窳材雖巨非良不敢良材雖細以良而用至于棟梁楹桷門柱扊扅無短無長無小無大一皆因其材用而後加繩墨焉剥削之斵落之室成而不愆於素矣庸工之不能爾也不知先度其材用室無廣狹隨時而計材無小大隨事而取斵巨而為細任窳而為良不知其有幾也材用胥失亦莫可勝計所作之舍幸而就亦非久遠之道也用人而不量其用亦猶是已厥今天下何如哉主聖臣直真同徳有為之時也有為而規模不立萬事付之臨時一却一前動不在我或左或右而民始疑信此而行靡所止屇市賈雖賤固將能笑人矣夏之政忠商之政質周之政文三者不同而其為政之規模有不可移者是以有三王之治文王事獯鬻勾踐事吳少康諜窮漢髙間楚四者不同而其制勝之規模有不可移者是以有王伯之功牟利而坐市區亦必有其道矣守邦之術得賢為固伯王之主不異代而求賢天下之材未嘗乏也患居上者求之非其道而用之非其術耳苟惟賢之為好則將有取於賢其所從來不必問也得賢而用必也各當其所生之嵗月不足稽也如是則小大畢舉而無不可用之材人效所長而治道成矣今也顧不出此守平世之常法士無器業惟其流品之問官無宜稱視其資級而取明治道者或親米鹽之役工辭藻者乃當軍旅之問彼知財計方取任之以刑獄習於疆場又將勞之以民事大小異器隨用而失賢否異能隨材而廢落室之事固非工師之所及也唐虞之際或起仄微而納大麓或明禮樂而任一官人各有能有不能亦各當其任爾才當其任人宜其官巨室之成豈工師之為擬也恭惟某官懷致君之術履代天之任謀王政而斷國論㧞寒畯而簡賢能辰告遠猷所以為社稷計者為不鮮矣然而國計猶未立百官猶未治邉圉猶未固四夷猶未服者夫豈無其説哉徒以規模之未定而用人之未至耳信能奮發於此定不可易之規模而求當世之才不拘流俗之制必當其用必盡其長則中興復古之功無難立矣惟某官圖之某甌浦狂生不學無術徒觀市井得工師市賈之所為事以為或幾於道故摭其説願陳於上公政府之前遼豖野芹亦惟其意而已僣差之罪非所敢逃上張魏公書竊嘗論天下之憂莫深於外侮而患或起於内訌何謂外侮疆場是也何謂内訌賊盜是也内訌不作國家無間外侮雖甚猶可為也外侮之來内訌復起雖有智者不能為謀故為國之深謀在於常虞疆場之患除治盗賊使不至於其内訌而已國無内患專意於敵外侮雖至則吾有以待之今夫疆場之憂天下之通憂也是故并慮以思合謀而動除戎器戒不虞警軍刑固羅落敵雖强大夫何為哉盗賊之興生於微細偷不已而至於暴小不制而至於大浸浸不絶將成癰疽議者以蟣虱㫝之此患之所由生也朔漢之君纘其宗國雖名嗣統其實建邦威令己行上下己睦觀釁之舉可為後圖視其規模似不徒己邉防之守尤當先事而謀雖廟堂之深憂而亦天下之所同知者上方兼聴而遠覽故非下士立談之所敢道竊聞廣西之冦猖獗四年凌鐵已誅王宣接起蹂踐城郭踰十數殺傷官吏不可毛舉非細故也而議者輕之不能及無事時蚤議翦㓕設不幸復有憑凌之志謀飲江之舉吾軍力單於守禦智竭於邉防雖欲討除力且不暇内訌之患夫豈無之况吾吳江湖之鄉夙多剽刼之患警捕之吏莫可誰何一縣之間嵗數十發尉巡逃責弗言縣縣且弗言於州州固弗聞於朝而盗賊恣睢莫之禁矣始不能制言之何益有如就執初固不言欲加之刑不可得已加州縣司獄之吏徃徃結盗而為之橐囊盗至囹圄則將緩之恣之教之告之廣言由歴以擾齊民是則玩法而輕刑致疑而减死故今頑惡之盗在在悉有其徒狂舞自應趣和而從之外侮方將内訌間作欲善其後不已難哉故今廣賊之誅不可緩也議者以為可招而致愚竊以為落落難合何則凌鐵之死出於已降今日之王宣旣降而反自見反覆寜能復降夫降出於畏威今我何畏之有誅討之策待人而動間者謀帥而得妄庸憸譎之臣徒以五百羸兵付之經畧四方之人聞而竊笑朝家遠聴尋復除移益之以兵計之善也竊意嶺海煙瘴之域而人不足集事曠日持久事難逆料漢馮奉世當西羌之叛請兵四萬以一月决之謂少發師而曠日與一舉而疾决功相倍萬唐王式征裘甫之亂亦謂兵多則賊不足平不當以餽多惜費且天誅不亟决而闕東南征賦與兵多而功速費寡二者孰多是皆漢唐鷹揚計畫之臣才誠足以集事其論如此較然甚明唐能從式之謀故不勞而破賊漢初不用卒大發而後有功為今將帥之臣誠能如式奉世然非聴其計畫假以甲兵如式奉世之言猶為未可國朝交廣之賊如儂智髙區希範之起始皆以為細故卒勤王師在承平時尚為旰食王宣之賊在今不為不熾非即授首且成其姦今固無它或恐因吾外侮之患嘯呼而動羣偷螘合内外憂結可為寒心昔者劉裕誅燕尚為盧循而撓則夫今日之患尤所當急不可以為細故而弗圖也鄉使國家外無患侮而中有此方數千里之冦縱不足為深患而我之官吏為其戕虐我之赤子被其屠夷亡者暴骨於郊原存者延命以俄頃為之父母忍不之救况當外難未弭之際足為膏肓之疾邪隋唐之衰與夫中原之所為失其則不遠可為龜鑑恭惟皇上恢中興之畧興太平之治以為賢人登進則内治而遠安圖任舊臣夫豈無謂某官以天下之望為斯民而起上毗天子外攘四方其道在於斯文某官固身之矣衆賢之用四維之立中原之復王化之行厮人之徒葢翹首而湏跂足而望某官亦不難之矣如今癬疥之賊何足以為吾患失小不制馴致内訌此識者之深憂而議臣之所忽者某懼人之莫以告也故因贄見而畧言之惟某官大畧宏規固將以一天下小賊在吾度内必以無事平之某狂瞽非以為僣亦非敢禆廟堂之末議葢不知而作爾犯分干瀆死罪死罪再上張魏公書某聞國之安危存乎相相之失得存乎謀有一定之謀故天下無可為之事謀不素定而事能克濟道能有行功業著於一時聲名流於百世者唐虞而下未之前聞夫謀豈有他哉亦在乎道之所宏而已故宰相有當為之事有不足為之事知所當為則所不足為者可不動容而定急其所不足為畧其所當為所不足為或至於紛如而并廢尚何當為之可及邪大學之書曰欲治其國者先齊其家欲齊其家者先脩其身此言為天下者必由内以及外也故君子正心誠意而加於天下國家者必自一定之謀始一定之謀立則是非利害不能奪好惡寵辱不能移上以正君下以明民内以治百官外以綏外侮者舉無以異吾謀之素定其於為國何有謀不出此上且無以格君下且無以知人方且毛舉百事而屑為之則内訌外潰之辱亦何所不有曾何安民禦侮之足尚哉故曰急其所當為而畧其所不足為真宰相之事也宋自太祖之造邦逮光堯之紹統時有治亂世有盛衰謀國之臣有邪有正然其所以為治亂盛衰者葢未嘗出此本支百世夫豈徒然而已哉鄉秦氏之柄朝當羣賢去國之後有聖君而不為將順之事弃讜言而惟阿媕之是取士風骳典法蕩然致强敵之憑陵亦必有道矣今天下循前日之弊蹈陵夷之俗公議不立邪正無分命令所行朝不謀夕上之卿士脂韋相尚下之師旅驕窳是為黔首困窮將不堪命州縣貪㳫之吏方且刻剥而誅求之朔野之君纘其宗國不徒自守方并仁義而假之察之人情非苟然者嶺海亡命如雷化王宣之屬横行縣邑戕殺民吏浸滛不已未知為謀外之則如許其難内之則如此其殆調發何自計謀安出而廟堂之上輔佐之臣謀謨於堯舜之前固未窺其所處而議邉之禁苛細之法朝朝暮暮亦莫知其幾出也急其所不足為猶害於當為之事况當為而不為乃嘵嘵於所不足為既不可必人之為奈何禁人之言所當為者邪秦氏之為幾何而不見於今也當秦氏之時猶為不可今時如此之急諸公顧欲為之何哉恭惟某官負天下之重名行天下之大道得時得位而澤未加於天下以為天下恨者非一年矣皇上好賢仄席撥浮議而登公於朝則其所望於公者寜不若天下望公之切某官以身任天下之重固將見諸公一定之謀也今入相數月矣其所以訏謨定命遠猷辰告者必非一端而足然而黔首之屬駢肩而立引領而俟以求某官日新之政顧且闕然於下矣某細人也才行無取竊惟先人右史異時嘗辱知遇鄉也武昌迎見亦蒙惠顧疇昔而撫存之當公之來不敢不見見不可以無言也言又不可自同於衆故此輒效四方之望而為公索言之願公上正一人下求百辟定其公議而以利人辟國措天下於覆盆之安此相公所自任以堯舜之道而尤所當為者則亦門下小生區區之望過此無足為矣瞽言冐獻死不敢逃浪語集巻二十
