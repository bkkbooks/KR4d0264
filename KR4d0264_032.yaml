body:
  text: 浪語集卷三十二宋薛季宣撰檄擬謝玄喻秦檄太元十年十月乙亥朔丙子前將軍假節都督前鋒及徐兖青州揚州之晉陵幽州之司冀燕國幽并七州諸軍事徐兖青州刺史康樂縣公綱紀告僣偽秦君臣吏士民夷等蓋聞天道好還否極於焉復泰人情助順豫動所以咸隨是以丹浦徂征格有苗於舜禹白登遇伏殺郅支者宣元方我后中天而興宜君子見幾而作兹故騰檄開示大恩惟皇晉之首基當炎劉之末造拯中原之洚水出蒸民於沸羮髙祖始基推配天之后稷武皇受嬗稽叶帝之重華靈旗一指而服巴庸戎車再駕而平吳會鑄劍戟為農器四郊惟雞犬之聞包干戈於虎皮萬里無風塵之警有生交得其養含靈咸遂其初父老猶存郡國仍在苟求其故可得而言由藩服之不王致蠻夷之猾夏二聖蒙塵於外一龍浮渡而南赤縣神州遂陸沉於異域黃童白叟為沙化於匪民亡者僇辱於強徒生者僑流於異縣丘隴俱發女婦為俘眷然顧之澘然涕下嗟爾有衆夫豈不懷蠢兹氐羌敢干王略僣竊璽綬者三紀恣睢塗炭者八州苻堅欺天蔑神弒君篡國大為不道貪得無厭謂丕圗可以詐力求而正言惟以強辨屈九鼎神器折鉤喙之可為萬里長江投馬箠之能渡豕食荐臻於蜀漢蛩跳斯及於渦淝叨餮貪而食既其身終然至足工倕巧而嚙乎其指後也噬臍虐用其民不遺餘力忘股栗於昆陽之水而頭觸於不周之山天誅所加王師無戰前徒倒戈而血流於淮甸朋家作仇而首折於五將丕實何人敢紀其敘前奉頭之逺竄因搖尾而乞憐朝廷洗其宿愆詔書開以生路方仰枋頭之食旋興谷口之師忘我生成極其狂僣為人神所共怒固天地所不容朽壤山崩羣隂氷釋弔民伐罪兹也其時擊鼓用兵孰云敢侮今皇帝無忘怨耻不敢康寧傷赤子之非辜痛先靈之闕奉投此機也將亦洗之綱紀肅將皇威誓清天邑背水之役嘗與行間元戎啓行誤膺委寄言念中州之黔首無非先帝之舊臣自裂河山永阻聲教昔也服乘於牛馬已而翦棄為仇讎地厚天髙故當無告日暮途逺將安適歸政彼敵將亡之時真我武維揚之會猛將霆擊列士星馳夔鼓轟天龍旗挾日右拒橫飛於白馬左甄直搗於碻磝期以甲子之朝會於商牧之野人百其勇寧湯火之在前臣一其心誠金石之斯貫其出以律惟克在和以此攻城何城不拔以此制敵何敵之堅屬當氐運之衰已有敵崩之勢彼既腹心內潰郊邑外分鮮卑陸梁索頭為梗關輔淪於大盜秦涼裂於叛臣號令所行城關猶阻空如懸磬之室蟬腹何以知春行逢冒鐡之車蛙臂應難拒轍賊既見不及逺衆將謀之不從胸奴五分昧法呼韓之朝漢越人三勝尚求勾踐之存吳人情憤阻既深狡敵奔亡何暇繄爾生靈當知逆順寧若父師存祭器之為重無為召忽徒溝瀆之自經且以苻堅之強加以苻融之佐億兆為之徒御百二為之山河犯順而行一軼不振我無遺鏃之費彼罹滅頂之凶丕以敗亡之餘逼慿陵之寇王師討於有罪義故懷吾舊恩忽焉而亡昭然之理丕能翻然自歸上方待以不死有如執迷罔覺負固不悛自當極吾兵鋒夷厥宫廟若火之焰玉石是以俱焚如燎之揚蘭艾為之同燼丕當其咎人則何辜有能執丕欵從反城效順投兵而下殺敵而降顯有王功具如臺格無以羌戎種落與其宗戚柄臣但能慕義來歸並當推心撫納彼日之皎斯言不欺嗟兹大晉之故封並聽莫府之申令匪徒行於國討實自報其私仇將共致于升平其勉思于長笇檄至如章頌嵞山頌嵞山載籍多云在淮南今以會稽山記為正嵞山頌禹也粵若稽古大禹曰文命敷於四海祇承於帝帝曰來汝禹湯湯洪水方割蕩蕩懷山襄陵浩浩滔天下民其咨汝作司空往平水土時承厥考惟時懋哉禹拜稽首讓于稷契暨臯陶帝曰俞汝往哉禹乃誕敷下土思蓋前人之愆娶于塗山辛壬癸甲啓呱呱而泣時弗子三過其門不入惟荒度土功四隩既宅九州攸同帝耄期倦于勤乃命以位正月上日受命於神宗禹乃會羣后南巡狩于嵞山柴望考功修五玉三帛贄萬國咸事惟時封嵎弗格時則有大刑禹曰咨爾四嶽羣后咸聽朕言防風氏怙厥修軀弗迪訓典乃昏迷不恭底天之咎惟時奉將天罰朕用傷哉汝創若時無若防風之後至厥身縱九畝罔逃于豫刑懋戒哉羣后拜手稽首曰王命休哉百工播告禹之功歌嵞山以作頌其頌曰玉帛戔戔徒御闐闐大同普天會于塗山塗山有墠神祗是格是燕苴秸蒲車夏王惟見夏王時守塗山之道玉佩衝衝和鑾再好我宫孔卑我朝孔時載旃載旗以莫不來甸服要荒十千其后冠劍峩峩咸拜稽首天子命之會考乃功冕服衣裳美哉爾庸弓矢斯張戎車既飭射御不違我田我的言私其豵公豜爰獻於闕惟燕爾勳爾庸于以圗之弗至弗虔天子誅之匪其爾圗惟德之殊匪其爾誅淪胥以鋪於皇夏后克明明德立我蒸民播時稼穡有截龍門惟已開之洚水襄陵如已推之娶于塗山辛壬癸甲三越家門子呱弗答九州攸同天子之蹤不介不鱗民思禹功泛泛楊舟濟彼江浦有鑠黃龍俠舟以舞封嵎之守匪易匪于王命夷之其骨專車彼獸而馴若神而瞶受職靡時曷維其大於惟我后克儉克勤嵞山孔髙其命維新節彼塗山我皇載考上帝臨之永錫難老我皇時邁説于塗山惟石巖巖億萬有年我后勤民匪窮蹄轍迹惟塗山之夀與昊天無極銘廣湯盤銘惟商王克新厥德既新革夏命作民新辟乃惟新厥度改正朔易服章異器械新民眂聽布新政于四方爰開新意銘于饔餼靧之槃庸昭示爾後人尚無忘于兹新德肆興居食息無違新訓之行惟啓迪于亡窮乃亦新新其罔怠史臣闡明王之誨用敷廣于新銘銘曰惟武湯新服大命作民神主器非求舊一新斯矩新作時盤以薦以嘗以兹浴身敬哉勿忘惟此彝器規圎合天厥度惟新其法乾坤德日新苟日新日日新又日新時維新德之全全德之新新亦不已有皇上帝由來無止下民之欲喜新厭故我有新新無疆無斁於乎立王罔違終食于以時新作新民極沐有彈冠浴者振衣百度其新方圎孔時無怠于勤新乃常存有荒于怠維新之害我有典則新以行之我有精誠新以明之昊天曰髙新乃時侔博如厚地新惟其至人熙于學新以時成新潔維清新道亶明豈無過咎自新何有戒之戒之非新胡守自彼夏桀民之云厭尚為之祖而不逃于淪墊凡百君子匪新勿安曷用新之餐視爾盤商輅銘湯既勝夏復歸于亳乃變服殊號肇新儀物皇天降命厥有山車之祥王用因夏鈎車作商大輅棄根不揉用仍乃質繁纓一就用簡乃文駕車結旌幬越席于以昭儉章德用郊見于神天王朝入于路門在賔階面王乘不式諸侯不賜惟曰王之正乘庸以養禮辨名肆厥後世王越厥萬世雖有作者罔或于兹路之加聞君子之為邦亦曰惟兹商輅是乘是取大史式垂厥範銘于路之旗常銘曰於赫皇天有嚴降命眷爾立王往徂求定武王昭鑒山出器車代夏作商儀章以殊乃作路車名昭路寢王曰於乎我乘我懍郊于饗帝敬而無式秩秩威儀維民之則彼乘者鈎匪攻自曲彼飾者文匪雕自木豈曰無文維金之根豈曰無揉維材之矯席有結草建有結旌亦有王章一就繁纓人悅其華我崇其實德之攸行匪車無出宿在車下乘而依衡四牡既均我車彭彭豈無彤車用駕白馬載好和鸞鏘鏘步武王綏爾成百王爰法曷不肅雍王車軋軋於乎車僕轍迹爾前無覆無僨王道平平夏后履癸車駕以人六轡沃若姒宗以淪銘于太常用昭儉素訓亦有言乘商之輅周鼎銘惟七年成王使召公卜宅洛邑厥三月公既得吉卜周公至於新邑營以王命戒定九鼎于郟鄏攸居周公拜手稽首曰孺子王矣惟先王格天新命肆天王惟末命而承我乃誕居大鼎于兹洛豫惟卜年七百載惟三十其世王其丕承皇天休命將兹大實毋愆于敬亦毋荒于卜王拜手稽首曰皇天顯宅我周家敷永命于公誠卜我不知守器之説公其誨我惟豫沖子惕息惟公安命其承周公若曰我聞曰在昔禹平水土輸金九牧遐方寫物命蜚亷氏司金考視于荆山鑄鼎昆吾模其州域肆山林川澤靈神怪物之名形罔或不備無俾民迷惟觴饗于上帝鬼神無有弗格用協于四方上下克承天休越厥世後王啓承先人丕緒命史翁乙難稽策兆于元竈厥灼匪燋惟形四方其足史翁乙難獻卜兆惟不舉攸藏亦罔惟遷徙攸行繇乃白雲其霽時尚一南一北一西一東是將三國之遷罔或不由兹時王休德越自輕于后桀俘厥有商肆王受之淫昏時則我先王文武是遷是寶周公曰嗚呼王其大無輕兹器時乃知吉凶興滅能行能息匪盈于汲匪沸于烹象有長形竊曲叨餮工倕戒厥形于指足王其尚監兹空鬲罔違時三德之行鼎緣德亂惟輕亦惟休惟重王其敬哉王曰我公命矣逮周王遷國于東越蠢若蠻荆鼎之重輕是問厥世姦王度亦萌求分器之辭或營于少海華亭倘勤王之是覬雖鼎屬有周其震亦無惟秦氏之遷宋太丘之社亡鼎則淪于淮泗史乃考終原始勒時周鼎之銘銘曰景命惟周世有烈王作邑于伊遷器于商其器伊何夏王之鼎鼎命維新王圗有永于鑠神器儀度九州備物昭章九德惟修靡遁斯靈靡神斯怪億兆惟人罔迷罔害有皇夏后功光九有上帝時歆受天之祐我周受之于彼殷商湯德伊那命不于常王謂太保宅是東都郟鄏恢恢鼎器攸居時周公邁天龜受卜三十其君祚天景福錚鋐大寶夏后作之我王至止蒸嘗瀹之豈爾荆蠻敢規分器輕重誰詢誕誇釣喙暉臺表海曾是王征八億萬夫然莫之勝相彼力矣鼎微而重惟其德矣匪湘之用命于三晉震彼周京豈伊異人維釁之興兵社斯亡鼎淪于水不僭維天曷銷曷以史難忱卜三姓斯遷顯允三王治易烹鮮時輕時重時器之神不自于天惟時大君周邦云季七雄舉鼎折脅惟秦靡扛靡騁王綱弛係言棄侯邦逆命惟回寧是適從三王咸寶器非其寶玉鉉金相載新載好為是之銘鑱于寶器匪周室攸居傳夏商之世晉白虎樽銘臣讀儀禮觀周天子朝饗之制樽罍鼎俎各有常物張筵設席各有常處至於儀物之用彜器之飾未始不致意焉後王代興禮隨世變威儀三百未必皆先王之舊經常之制雖百世不能改也按晉太始元會儀皇帝御太極殿殿東有樽飾樽蓋以白虎羣臣有獻忠進直者酌樽酒以飲之本志所謂白獸樽也聞之陶唐眂朝旌懸進善有虞廣聽鼓鳴敢諫鴻惟大晉纘禹之迹好是正直比德唐虞講禮昭文有光犧象不銘斯義揭示方來則何以昭晉德之隆垂無窮之範也史臣敢揚大訓百拜稽首而為之銘銘曰上天明明照臨下土作之君師以綏萬宇巍巍在上四方其風廣聽遐納允惟厥中於皇我晉纘承天極正月初元百神受職乃飾禮御陳此獸樽誰其發之正辭讜言其獸伊何西方之仁其狀伊何倍尾參身不踐其青不茹其生周南召南王功爾成於穆文王武皇似之厥應騶虞惟今有之匪鱗之逆觸之何怒豈無威嚴孰施牙距禮樽是飾仁為之蓋酌而嘗之休其罔害惟昔商周禮陳犧象亦如斯樽共惟世仰彼軺之設堯銘進善伐鼓淵淵舜聞敢諫於惟我后匪謝虞唐禮器交施招納無方豈無杜舉揚觶平公嬰撤齊樽斯其靡同咸寧之定儀度孔明孰有不龔盜啓升平正言之入人臣有限雷霆之威曾何敢干匪臣斯直君有其仁虛以受之交誠以伸逆於汝心必稽于道啓沃之行亦孔之好上下之交不通曰否人情孔膠勿聞乃靡虎樽之設匪以為文以發榮光以來告君我刻銘詩用戒元首百爾事人酌此樽酒天閨銘天閨在怡亭之步殊亭之側嵌然巖岫瘞于汙沙日者漫叟泉明放于石門之下窪樽抔飲共反淳元而失此於步武之間直若有待而然者紹興春季卒已走行江滸得石於顧指中抉壤淘沙有門天啓易稱剛健而不陷須沙衍在中也此閨其似之故必走而後出為作天閨之銘銘曰天閨何許澄江之滸厥首惟圎有方其下不鑿不攻圭竇嵌空其誰知之狂生慎東其誰為之黔嬴化工怡亭在上殊亭在側我思古人伊誰允得窪樽有修石門有目豈如吾閨洞天匪局好古其誰何莫由之有全渾沌穿焉豈而誰也淳澆不忮不求有天者閨於焉逍遙即石鐫銘以警來遊銘無文碑隂公處東山如蒼生何公擾桓公執柯伐柯內舉忘親隄橫決河淡然遺之東山峩峩矸然臨之如陵如阿宛其死矣羣醜莫吪十字惟碑胡勒之磨嗚呼蒼生將如公何初文靖謝公從桓溫辟沈嵩尤之曰人言卿不出將如蒼生何蒼生今亦如卿何及溫有反謀苻堅擁百萬寇臨淝水勢皆足以舉晉而公談笑却之追師涉河公以無祿晉亦從此瘁矣時人無能形容公德窆乃有碑無文蒼生今亦如卿何非虛語也恨無孔子書十字以表其墓使沈嵩之言遂為世口實然亦不足為公纍矣為反其語將銘諸碑隂妥齋陳同甫作而居之薛季宣𨽻而銘之銘曰有天有淵飛躍鳶魚妥之安之生民保居天之産民罔不大安有妥之安皇唐有焉徇物之安妥用不集非安惟安搖搖岌岌妥乎妥乎大安不欹有懷者居安其豈而子有精廬齋居以妥妥其安哉神天將子可器物十四銘書几銘惟道惟宜惟新是師未合者思去邪勿疑書篋銘學問身藏用則儒不能緗帙能佇儲研銘剛方正潤磨而不磨凹凸無庸不安則震墨銘膠煤相得以成其德研幾惟玄毋汚白筆銘一言非駟莫追寫之不得永瑕玼心正筆正筆法哉枕銘無思無為則髙枕是宜通昔不寐心如之何衾銘布之絲之稱心為之卷之衣之與時宜之牀銘惟其平兮據之安兮其反側兮何以息兮帳銘惟此蔽形徒飽蚊惟此自蔽風乎自至屏銘休則大受風者會不後其藩將必為身害門銘潭潭室廬門居孔道闢兮闔兮乾坤可考口兮法兮興戎出好是謂樞機毋然草草冠銘身之文冠其首冠者不端文曷有劍銘剛有折斷之在決伊擊刺之利匪丈夫之烈食器銘不耕而食是謂蟊賊胡自異焉修代耕之德針周庭燎針秋官司烜氏掌以夫遂取火于日邦之大事共蕡燭庭燎甸師役之共庭燎之薪蒸凡庭燎之差王百公五十侯伯子男同三十凡賔客之燕庶子執燭于阼階上司宫執燭於西階上甸人執大燭於庭閽人為大燭於門外凡燭用麻燋荆燋庭曰庭燎門曰門燎以明賔客之出入諸臣來朝之夜入者亦如之惟昔周先正文公制天子眂朝之禮厥明有司設燎于庭俟雞人呼旦以􅑧百官鎛師擊鼓告旦后夫人鳴佩以出王乃即于外朝肆宣王怠荒於厥初雞人曠官弗置王用晏朝晚起晨不出於房厥後聞薑后之規王用是欽畏惟設庭燎問朝于夜之央王亦浸服于彛常越聽朝于昧旦詩人懼王心之慢美庭燎以針之其針曰考禮惟周光于四表我客來朝王庭有燎其燎維何維蕡伊荆自堂徂門自階徂庭明明用明明德昭厥旗常儀用不忒司烜維人共日之火役于甸師以昭斧座燕則于宵朝惟昧爽厥有中庸曾或之罔王即于朝雞人司期問夜如何寧莫之為惟昔后薑規王于燕朝之于晏而釋其笄瑱顯允我王亶侯見逺克勤克敬夜央曰晚我王日共惟德之中夜鄉斯晨朝儀有融惟辟備官時厥有常無怠無荒邦家之光庭燎之輝用惟其理黽勉我王敬惟終始惟兹庭燎惟日之精以辨等威以察宫庭萬邦之章于以彰之諸侯來庭于以明之逮其季末侯伯專征惟百之燎擬灼于庭夏后勤民厥宗履癸三旬不出而夏臺是圮阿衡之爝帝乙成商忘甲子之為問而王受以速亡是故明乎內者必昭乎外始于勤者或終于怠細而罔害亦孔之大燎之方揚亦孔之章夫明不可不逺業不可不勤烜臣司庭敢告寺人周永巷針惟宣王受命嗣周家大厯服始年王慵怠于勤早息晏朝寖荒于厥度臣后咸諫王惛未克改宣后晨起出于房褫簪珥囚服永巷命姆傅通辭于王曰嗚呼德亡常保存于克勤邦無常安危于怠荒勤厥德有天位不勤厥政天命乃移丕顯我烈祖文王造邦自西夏克虔共祗畏修后稷公劉之業不遑暇食即康功田功惠康小民不敢自暇自逸刑于寡妻至於兄弟以御于家邦皇天降監用集天命于我有周肆成王沖幼紹統不知稼穡之艱難周公作無逸稱殷三后越我太王王季文王之事王克自寅畏厥今稱明后惟成王今王繼汾王之業遭家不造危如懸石之綸兢兢業業自宵至於明不寐庸聽朝于庭燎亦惟曰殆哉今王其如台乃晝居於內肆鼓師告旦猶弗越于宫闈兹惟妾墮敬于身淫心外見用沉溺我有命棄周禮于昌朝忘勤之德爰示民以內好周邦岌岌幾不至於亡嗚呼戒哉我聞曰惟色之好其流必奢奢樂困窮我興受其亂亂原之自發于婢子之身今王其命之妾敢逃其罪王拜手稽首曰余一人不勤于德實自生過過惟自作我后伊何今詒我賢后之憂余敬用祗懼惟王后反初服我自今日新后拜手稽首曰今王命矣妾其俟旦于明星女史書王后之言用述針于永巷粵惟古初明王作制晝即于朝宵居于內朝以問政內以就安出入惟時曰豫敬天惟昔先正周有文公爰及朝儀以節不中雞人司晨鼓師戒旦王于出朝不共曰晏寅餞納日燭炳王歸銀環迭進女職不違陰教之修禮成道至民有攸儀德用不匱三后在天實基周命周南召南發之歌詠思齊思媚亦嗣徽音參十亂臣纘武詒今如何我王忘祖之烈東方明矣怠而不出無朝無夜耽樂于房簡禮酣眠濱于色荒永惟薑后共德之行永巷脫簪聞辜于王后曰於乎淫端我見不曰雞鳴鴆王于燕王拜稽首后言孔昌膏肓疾針敬哉不忘勉勉王后則惟良偶勤于庭燎以光九有不即于非不愆于儀為周世宗今王是宜於乎永巷在王之宫戒爾後人眂此德風莫昭燕私莫聞鼓鐘閨闥之容萬民式從好移其內德衰于外惟其財之物不兩大婦人之悅近而非逺蔽于一方俾豫正反奢淫驕嫉交敗王綱女言是聽無或不亡母曰宫中四方攸同母曰吾內王人無外乾剛坤靜諸侯井井一怠于常其傷必永允百君子敬之敬之曾是云怠大命以墮在后末喜臣莫不憎坐膝王朝而夏家乃傾王受即位淫樂沙丘對于妲己而懸頭二白之旗殷監不逺近有先王史妾司言敢告執方漢宣室針惟古盛帝明王統天御極必有尊嚴之居以禮神受福布政施教致敬龔日躋之意是故法宫受朝便坐決事齊明退息各有處陶唐衢室周人明堂之太室皆其處也漢興承弱周暴秦之後禮經灰滅侈過失道髙皇帝蕩夷凶憝惟日不足至於禮文之事未暇講也宫室制度皆仍塞都之舊惟七年上行幸關東丞相酇侯何守始作未央宫于長安前殿之北營宣室殿以為帝者之正處漢制非法度之政不得入焉孝文皇帝常受攝事太祠還致福釐於此感鬼神之事前席賈誼而問鬼神之本上自謂不及孝宣皇帝盡心庶獄常以季秋後受讞時齋居決事當刑獄稱平益州刺史王襄使才士王褒作中和樂職宣布之詩選童子何武楊福衆等傳習歌頌上方求通逹異士乃召見武等曰此盛德之事朕何足以當之孝成皇帝鴻嘉時舉敦朴能直言士王嘉等皆得宣室召見對政事得失中間孝武皇帝不忍親親之思為姑館陶公主置酒詔謁者引內主所近幸董偃郎東方朔執戟而諫上為稱善曰止偃寵由是日衰宣室之居其為當時尊嚴如此臣愚末學切慕虞人之旨感商辛王莽之敗上針宣室思補盛漢之闕政云自古在昔惟辟奉天乃立明庭以臨八埏朝居有堂燕居有室各有攸宜用屆誠一上帝是承諸侯是程百官是成兆民是聽以立我九經以式我典刑蠢蠕有生靡有敢不令在帝陶唐明室以詢髙拱無為端嚴若神亦邃其居垂衣而治其仁則天罔有不被於穆神漢纘堯之緒上棟下宇以蔽風雨乃作路寢曰于未央宣室渠渠實惟北堂惟時孝文禮祠天地肅肅皇皇受釐寅畏履帝敏武問于儒臣謙光昭灼探賾窮神孝宣明刑兩辭之恤奏讞凌秋志心齊一中和之頌曲度洪纎乃謝歌童撝挹謙謙有嚴二后宗道亶明必世而仁中天以興中葉弗虔恩親掩義路寢王宫而樽罍是置始驕越度敢見嬖臣降于天子為之主賓陛郎曰朔執戟是何正厥三罪匪回匪阿明明世宗如流聽納三十金之云賜而董君以不答危言之至受之不疑受而不盡臣為惜之鴻喜直言敢相新甫過涉雖凶匪躬之故惟此便室漢家法宫政教之施曰常曰中敬厥幾微民乃攸儀一毫之失弊將泉溢無曰無非其禍將危無曰無害其災必大蟻漏隄顛心堅石穿淫亂之漸篡奪生焉國之興亡一言而決無安不危無剛不折竊位亡新孰辟于天受為瓊室而傾宗隕元巍巍帝居其門四逹侍臣司宫敢告執法暗室針謂天蓋髙心實繫余余心歉焉天其反夫匪天則靈惟心之明有感豫纍奚其為自成卓彼先聖窮神至命其道奚先孰先致敬敬以誠身胡為不仁德凝道至何羞乎虞君惟安而行之乃克有勳四知或畏焉將恐離其責不欺乃室斯不愧于屋漏敢處告于夫君走嘗聞諸師曰心者天之體也有諸中斯必見諸外動乎心所以感乎天也君子盡乎性以盡心安之為貴一日心正視舜為何人哉因針暗室以自警耳目針遂古在昔先王建極聽有中聲視有常色各有攸職民用不忒在士墨允殷商之際惡聲色之云惡而周薇以不食隘清雷首餓夫之斃而未為至德惟仲尼父目示顔回禮躬是飭鳴梟毒虺稟天自性其何能易人而不仁疾之已甚不如仁身而自克耳官司聽目官司視敬以司存敢告胸臆傳袁先生傳袁先生諱溉字道潔汝陰人也嘗舉進士免貢避地州西山中建炎初集鄉民為保聚與金人及羣劫抗屢克其衆謀奉先生為主先生逃於金房山谷間王金州彥即其廬見之先生衣不掩脛與相應答王就先生學李靖兵法先生謝不告王怒欲脅取其學先生轉徙山南時進士類試宣撫司其年會失陜右取士以百數而應者過百人或勸之就試求官先生曰官不可苟求也移居富順監先生初從二程先生學聞蜀薛先生名富順鄰家薛翁以賣香自給其子晨以香出父則掩關待之子莫而歸因不復事鄰里莫詳其趨步先生知為薛先生也具刺謁之薛翁慢罵不應先生固已疑之矣間日再往又不得前於是積日屢造其門薛翁喜而見之先生與之語不對再見談古今百氏又不得一言三見縱論六經薛翁才有喜色曰子學已博然寡要夫經所以載道而言所以明道何以多為先生曰如先生言吾心將以會道爾薛翁擊節稱善因以所學授之居月餘勵先生出關薛翁因亦遁去先生自聞薛先生道所為益純粹近古其出關至夏口嶽開府飛必欲延至幕下先生一見而出不辭而行語所知曰嶽公武人而泥古幕府無圎機之士難乎免矣未幾而及難先生因家荆州往來夷陵秭歸諸郡與士夫言必稱善悅其意旨然後和之循循然人知其厚德君子也孫祕閣汝翼帥荆渚延先生至府舍俄先生告去過表弟虞於公安以書寄謝孫曰溉不出此旬矣公於溉厚恨不能為公一言病革二聖寺僧問於牀下先生曰佛家以死生為一大事誰謂當蹈其常因戲作釋氏言示之曰非吾事也棄之而殁時年七十寺僧為之斂葬無男二女子尚少公安聶令詔為嫁之先生學自六經百氏下至博奕小數方術兵書無所不通誦習其言略皆上口於易禮説尤邃未嘗輕以示人樂善孜孜蓋天性然也自將家下峽其饘粥蓋不繼家書祭器間關常以自隨貧居以小學教授童蒙其生父以妾為配先生即日謝去與王樞密庶故善王家有伊洛遺書先生欲傳未能俄而王殁先生不逺千里從其諸子傳録書畢遽行會羅織獄興掩捕王氏家人賔客幾傅之死先生居夷陵郡郭一旦徙家舟中其夕夷陵災首焚先生居處紹興癸酉嵗先生在江陵得疾如中風四肢不仁殆甚人為憂慮先生曰此無傷也遷居村舍踰月而愈或問之醫道先生以古語告曰所謂存神與氣氣與神會自然周流本無偏滯者我能身行之耳由是荆人頗神其事初靖康後天下兵荒甫起先生家為汝陰盛族嘗有客過其舍先生察其狀貌有異白諸父曰客姦人也徙家人避之是夜客以寇來遂與鄉社義兵鬪死後衆欲據前山為保先生爭之不聽獨將妻子聚保山後已而前山果沒金人大至欲以萬衆攻山後營先生塢中兵不滿千召其衆計曰敵則勢盛吾知數術保以一箭破之其夕敵寨山阿先生使數十人各執鼓燧如四山伏約敵軍譟擾播山擊鼓為應有談經客愚甚先生激使為敵人裝竊其號入宿敵帥帳下以二矢授曰夜中發矢而竄客如先生計恇怯僅能發箭敵營驚亂顧見火光並起鼓聲四合因潰自相攻殺數百人遂不敢復至有潰兵虜掠過營下先生伏數十鼓持礧木道傍俟因據險拒却之賊還以夜中過伏所礧木亂下鼓聲震天賊遂大崩擒殺大半先生文武才用大略多此類疏其大者于篇甄浦薛某曰走述袁先生傳觀其從薛隱君學師弟子授受相豫之際何其嚴且約也俗薄久矣聖人之學不可復見走於先生焉取焉初外舅祕閣鎮荆州為書寫機宜文字嘗得於先生授教其所以為誘進者甚博嘗侍先生觀奕能為負棊易置數子以弱為強時奕者亦善於棊拱手稱歎外舅強先生奕則曰先生嘗以奕為廢事所不忍違又嘗聞先生言蓋嘗以所學撰一文字凡四類曰理曰義曰事其一則今忘之矣走從問義理之辨先生曰學者當自求之他人之言善非吾有走請終身誦服斯語已歸而聞先生訃求其書不可復得嗚呼若先生者可謂君子儒矣言行文章皆足為世楷式百不施一卒以窮死哀哉浪語集卷三十二
