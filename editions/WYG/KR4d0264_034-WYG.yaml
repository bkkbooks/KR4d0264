body:
  text: 浪語集卷三十四宋薛季宣撰行狀宋侍郎代作曾祖珏妣戴氏祖楚妣鍾氏父道元以公贈右中大夫妣林氏贈令人公諱之才字庭佐温州平陽人其先世有潛德公幼莊重樂與賢巳者處羅陽俗舊淳固先中大始裒書敎公問學迨其官達士子為彬彬焉政和八年公第進士調貴州主簿改教授京兆府學恥自􅃷為干謁知己者少積十八年不遷故右丞忠簡許公力推挽之召試館職除秘書省正字踰年改京秩時講戰議未决黨論紛起公􅎒然中立亡所附麗又五閲嵗稍遷校書郎歴考功員外郎國子司業權吏部侍郎為大金生辰使歸報太上皇帝喜曰宋某姓名稱矣亟將晉用屬公以冢子及夫人氏之䘮固求閒佚加敷文閣待制提舉江州太平興國宫當時朝士多以罪行惟公力自引去士夫歆艷祖道傾一時鄉居十年翛然忘官宦意徜徉田里或不知其侍從之臣起知泉州州人便安其亷簡富民有罪繫獄中㫖釋之而公不貰繼以尚書命至公曰吾守臣也不可抗朝廷之命敕乃出囚而老民吏聞公引疾則競走浮屠祠禳禬借留于神移知衢州不拜因得以宫觀歸不五年間四乞骸骨紹興三十一年遂以朝奉大夫致仕今上登極覃轉朝散大夫乾道二年七月戊辰以疾卒於正寢享年七十有七贈左中散大夫累封平陽縣伯食三百户娶㑹稽王氏贈開府錫之孫故朝奉大夫璵之子封令人子四人長男中甫及長女皆先公卒次女歸右從政郎後處州麗水縣丞趙良臣男直甫右承奉郎後房俞氏出也有自次文五十卷曰雲海弊帚雲海公之居士號也家有雲海後集三餘録詞林合如干卷公雅有至性初太令人將塟而雨壙中水溢憂之一夕而髭髮變立朝尚持大體不潔潔以取名未嘗輕易發言言之必有當也方北鄙未定公因轉對請擇威望重臣經理淮甸與諸大將維持攻守以固吾圉洎南北講解則請不忘警戒振淹滯飬民力收兵柄固基圖為持乆計又勵聖學以自强不息乞詔四方知愛民意皆切時病中事機其論財計謂當量入為出以節用愛民論任使則請度人所宜用其所長論海刼即欲責任土豪而屬統於沿海之制帥言皆簡而理當所請置書太學班在仕者通家雜坐之禁禆益風敎此其意度不淺紹興七年詔書以秋旱許中外上封事公奏疏謂當以實應天去六弊修四事其六弊曰民力凋瘵曰守令非人曰吏員猥冗曰功實不覈曰賞罸未明曰將士驕惰四事曰上游淮南宜置帥安集曰盡人事以待天時曰立事者必有成謀又當持之以固曰人君當有立志至誠可以感天又論進言者患不能盡聴言者患不能擇是非並進惟虚心公聴乃能擇之漢張釋之言便宜孝文帝曰卑之無甚髙論令今可行也臣不敢為甚髙之論願陛下無忽而聴從之晚與時相論及大儒相謂大儒不可多用公知其意証曰大儒患不多有用多何患時相色動公即請祠以歸觀公捄時告後之言可以知其撡心持已之所在即其言少見施用豈苟然而已哉公之歸卧于家憂國之心未始替也常曰吾老不能為國家陳力每一念之則申旦不寐盖其學深自養常超然獨得志有所定單見莫之識也律身端謹曾不矜持於外其當官稱是立不易方而為名徳所尚於時鮮所偶合故其屏處多於在仕之年邑子請敎於門人人各厭所欲善士資其矜式自謂得師晚年築室瑞安縣之峴山於周奥原自為夀藏製素衣一稱曰吾終必以是禭先此一歲自言明歲當死疾寢屏去藥餌曰吾心中無一事矣誦伊川先生克己之詩以殁遺戒母侈吾墓母建宇築闕終始一槩死生不易其介焉直甫卜以歲十二月壬戌大塟走書屬某紀公行實惟公偉望碩德為時名臣鄉閈老成於今為最某年視公上下知公尤悉大懼風誼闕逸何以典型後生勉書以待賢者之銘且備史官採擇雖文多累句於公無愧辭云謹狀劉進之代作紹興二十七年故侍郎張公九成知温州初下屬部惇禮賢者以美風俗郡長老上柟溪里人劉君鄉行張公以書致酒饋曰公孝於親悌於長孝義聞於鄉里敬致州郡禮焉既而力延請君正州學初君以風誼為鄉閈信服雖强悍小人素難與言者於君無不敬愛里有爭競輒就平處或為不善於室率自警曰劉學正得無知之乎同郡賈司理如規與君俱以善稱一鄉人士諺曰適樂成不見賈元範柟溪不見劉進之是浮洞庭而不嘗橘之食也其見重於時如此君諱愈字進之幼頴悟篤志於學試郡三舎屢入優等薦丁艱棘不克薦四十棄場屋遊志於浮圖氏學號無相居士其先世友愛至君兄弟益雍睦三世同居無一言之間君問不及生計弟某亦任之不疑視兄弟子若已子然皆終始如一日家豪於貲未嘗以訟至官府或加之無禮往往笑不與校君為人方整至誠出於天性不妄言笑終日危坐凛如也盛暑不解衣帶接物温粹見者必肅嚮人無纎介之偽而莫敢欺以不情聞人之善喜見辭色常稱引以訓子弟見稱人之惡者謝曰幸母及此知識有過時時靣為告𨗳退不以語人嘗止僧舎有竊君卧具而得者君曰是非吾物即以予之善與人交少所與遊皆知名士賑其貧者至為解衣傾囷盖不一再然常不待其有請後多賴以卒業為世顯人客來無貴賤輟飡見之無倦色有求無不遂其所欲或以無擇為訾君曰吾以救窮而已其門故多貧士至者相踵君未始以有亡為辭其飲食之不事豐腆資之亦不過厚所濟甚博其施得以有常行道雖飢不先僮奴而飯當食而見餓夫常推食命之食輕於財篤於義憂人之憂不啻於已鄉里利害必以身為倡始力興除之臨事有立推撓百端不為阻鄉人之䘮貧而不能舉者每歛以棺而塟以地且資金粟以佐其費歉歲為糜待餓者率以為常稱貸必先最貧下者或謂君將無所取償君曰能償者人已與之吾獨不忍此為溝中之殍耳焚劵已責不少靳己巳秋旱明春大飢君博謀賑贍之其家山樵采不禁恣民伐薪鬻之以自給擇地不毛道嶮巇者買庸鋤治又身請貸於州詣州敎授丏為先容敎授為君具食君不下筯曰鄉人餓且死尚忍安食於此耶在坐客竦然起從君見州將州將慮民逋負難其請君即乞以家砧基簿為質得米三百斛歸與並鄉大家分計近居之下户給之貧者咸賴以活其秋君獨不收前貸代出私廩還官甲申春不雨者三月大無麥苗農田不復播種方乃歳困颶風因之以飢疫貧民挑蕨根舂餈充腹或盡室脹死去而操觚以乞者載路時守倅俱闕莫有任賑民事者君合鄉民雩祭吁嗟至於感泣因詣匭論奏請發常平倉米以紓民急仍降祠部度牒畀郡轉糴他道以故端明張公闡鄉典之舊詒書約為巳􅂇上為惻然聴許無一不如所乞㑹郡太守袁公孚奉宣詔㫖司户劉公朔實左右之君與鄉人徐讜求賑救之方得趙清獻公救菑記以獻袁公榜於座右視以為法為是生者得食病者得藥死者得藏孩提之委棄者得以長養君之居里亦縁君得官米以給全活無慮千萬計其端皆自君啓之初中谿有石障流號石斷自谿濱潮民之架木為㩠隠水以捕魚者幾二十處舟行多覆溺患君與同閈陳常顧民聚石更石斷水道白縣撤㩠去之谿流遂安君既功存鄉人鄉人莫不倚君為命士夫之賢聞君名者以未及識面為恨享年七十有一以乾道二年七月一日卒屬纊精爽不亂自為韻語二十四字仍遺書戒子孫以儉約近鄉居人識與不識無不嗟涕至有為佛事資㝠福者有詩詞雜著一編藏於家先夫人周氏蚤世後夫人韓氏生子七人士直某某士享先君卒君雖布衣常有經濟大志讀書講論事緒紛沓不暫休聞國有難戚然憂形於色方臘起妖人吕師囊趣和之反黄巖陷樂清犯柟溪抵菰田管界巡檢陳莘以郡兵三百人拒之居人惴恐多逃去君始壯歲奮不顧身曰冦至則吾鄉無噍類忍相隨為身地耶因自賛從討賊賊軍依山壅水為固陳徑進有輕賊心君曰賊營憑据巖險官兵素不習利誘致平地乃可擊耳陳不能用君辭不行官軍半渡谿賊决積水灌而下官軍大敗陳與鄉豪李徽及其弟充死焉君以二李公贈䘏不加為之傳以表見於世甲戌歲比不登諸鄉艱食姦人讙起託借糧為辭警刼鄉疃稠樹村黨最悍水陸為不通郡遣邑尉圖之尉止中道不敢進欲起鄉兵討捕君曰人心方搖當鎮以靜臨以白刃必將激而為亂矣單馬至渡潭酒坊呼酋首二三人命坐諭以禍福皆幡然感動即日罷歸他黨亦聞風而定郡鹽課積增至己巳歲歲七十四萬八千五百斤有司艱於猝辦輒賦予民寸産之家無免者按月征斂吏縁為姦類畧豪强而增敷細民係縲於官無虛日因以破家者不可計君遣士直偕鄉人王大充訴於監司臺省得免增敷數萬斤猶以未足寛民遣甥盧緯俱士直復言户部請蠲歲課之半時司邦計者聚斂方急甥子乆客困沮而歸君又遣之始末六年費損家資鉅億計沮撓非一君嶻然無倦雖一餉頃常疚懷最後州人龍圖閣學士何公溥貴於朝為主張是減年額二十五萬二百斤盡罷下户科抑而上户所出亦輕衆始笑君之迂既乃喜其幹而能立今皇帝即阼詔書求直言君以今方邊興取守方畧要有人言之至如内治所不可緩著書曰治詳覽以進内陳自治之策在清其源凡十數條皆切治道奏下三省看詳不報君曰臣言雖微有補聖治顧主上未深察耳復因郡置録進後朝廷施行數事大畧與君論合世之好議論人者妄意君之自奉簡素急於利物晚喜讀西方書不愛金錢佐營塔廟謂修福田利益不知君之才器識有大過人者不為世用故不難施予放意物外以自適所為數事雖得時聞人有不能辦而君居鄉里處之裕時用行誼信重於州閭間非一日之積也士直等卜以歲二月某日塟君于某鄉某山之原將塟録君行實屬某狀其平生某少從君遊知君為悉是固朋友之職無所復辭為次比以待立言君子為之銘言雖不文亦將託君之名以傳不朽云爾陳益之父代士昭兄父之子謙初以文章試太學聲名藉甚某主敦宗南院道莆田過故人著作劉公夙問後生之賢某以謙對劉言謙之賢者皆以其父夙前敎授温州時謙以諸生講肄州學夙喜其質明鋭為痛裁抑以成其材退常慊然於中不使謙覺之也其父即知夙為有意琢磨其子夙心知其賢於人顧未嘗識其面某曰君得之矣君所知於陳公者敎子一事公之鄉行有足賢者某嘗聞其人矣然於鄉之老成雖雅知其名非身察知其賢不輕言也嘗與公㑹望其容色温然和粹聴其言語簡而誠慤意非常俗之士問之公也始知其為鄉里推重之有以能教其子以立門户若天道之報然某之迎家而歸㑹公將塟謙與兄某某弟某某共裒公行將求名士而銘之屬某叙次其文某辭不得謝為直書其事焉公諱敦化字某其先家福唐五季亂從横陽又遷永嘉鵬飛里世以輕財嗜義德施於鄉公生九年罹方臘變鄉之平居為不善者羣不逞嘯屠之而共芘匿保公以全十五丁父艱二弟皆幼公奉母夫人經理家政井井有條理夫人一食不飴公輙憂之見顔面方疾湯藥非親嘗不進遭䘮廬墓左哀慕至老不衰兄弟相友及見二毛不忍析異公性夷曠不立城府與人接無纎芥雖龎夫單婦三尺童子一皆詞情温厚有以慰懌其心家累百金益能增侈先德之施伏臘之外率用振業族黨鄉閈之急難餘以修治橋梁平夷道路無留者凶歳人多閉糴常發私廩平價出之賑貸單貧孜孜不倦鄉閭信服其誼爭訟多不之官府得公一言即時解散鬬狠為是益希少公雖蚤棄書學所為常與理造經界行縣選公平比鄉之賦至今稱其均一金人逼淮甸又請公治鄉兵時諸鄉繕甲騷然公格令不下曰此但擾耳鄉民賴以無事而他鄉兵亦不成部伍家園有竹萬個二古梅公常笑傲其間陶然自適萬事不以挂念客至無不傾倒皆嘆其古君子也盡心敎子迄能有所成立暮年謙上名禮部人謂公世殖善不顯天其或者遂將侈大其門而公不卒見之也以乾道二年五月六日卒享年五十有五鄉人於公之疾日奉雞豚祠祀禱祈死之日咨嗟相顧有為之流涕者嗚呼公何以得此邪公常自言不能利澤於世遺愛一鄉足矣以匹夫而澤迨鄉里賢矣哉子男五人女一人卜以歲三月某日塟公於郡西岑之原列其行事如右髙府君代百七兄作福州長溪縣桐山髙擢字邦貢年六十六曾祖昻祖世軌父南仲公之先家福州懷安縣之石岊亭五季亂辟地桐山世隠德弗耀公幼孤頴脱嶷然與羣兒異事母篤孝未冠母卒哀毁不勝䘮事伯姊撫幼弟内外無間言剛毅端方其資性然也嘗舉進士有聞於時中年即絶意功名以吟歗自適意有所寓一見之詩篇一時聞人多與之賡唱喜數術其學視司馬季主莊君平雖不以此自奇人扣之命厯亦為應荅無倦與物無競或以非禮干之公接以誠往往為退聴人服其不校然宗黨有過公未嘗假之言色則其為内守可知也性尤喜迎師敎子不論道途之逺近常以立身揚名訓飭子弟疾寢猶肅子孫至牀下而戒之曰而曹善守世業睦於上下無為蠧物害人則身事畢矣卒以紹興二十八年五月二十三日鄉閈聞者無不傷之娶陳氏温州平陽人甚宜其家行年今七十矣識者知夀考之未艾子男二人曰桂曰明能率父訓皆進士及第女長適莆門陳竚次適忠翊郎陳再醮於宋洋方汝楫孫男宗郝宗郭宗鄭宗郾女適同里王克人皆舉進士將塟其孤桂明得卜於山門村之石函原期以歳十月十四日復土而求書於某故摭其行寔以竢立言之君子為之銘云祭文弔文附祭蕭帥文維紹興二十有七年歳次丁丑八月甲午朔二十二日乙夘故吏具位薛季宣謹遣家奴以清酌之奠昭祭於故府制置大安撫閣學侍郎河南之靈嗚呼孰謂蒼天恒與善人即事遐觀夫何不仁胡為我公道弗克信嗚呼哀哉惟公之德清通諒直不侮於鰥不囬於力能柔能剛惟道所適惟公之度猶天猶龍大而不器變而不窮宇宙寥廓細微不容惟公之撡喬松金石鍊磨不磷寒凉不易立懦亷頑無煩訓敇惟公之行凖石左規惟矩惟繩則莫我違化行鄉䣊民之羽儀惟公之文渾乎六籍何幾不研何隠不賾發揮煥焉造物無迹洪惟我宋網羅雋賢峩峩大科龍門則焉公躍而登如拾芥然柏臺峭清華省焜熀尊禮大臣既丞既長皁鵰得譽百工讃仰封禺天台三輔要藩俗阜而蕃猾察其間坐嘯亡何面革雄姦自陜而西召伯所處通邑大都幾半寰宇内而黔黎外而師旅五侯牧臣我公主之封豕長蛇我公去之惟善惟良我公子之孽臣柄朝心期不黨口鑠鏐金舉賢於網民望攸歸曷為其㒺皇帝曰吁於維錦城日迺鎮焉民服惟誠棠陰蔽芾謳吟則興君其西歸往終迺事政成亟來福我赤子公拜稽首受賜青氊民睹舊儀從服敎言治稱流聞頌聲雜然皇帝曰都爾䕶諸將桴鼓絶響刑幾無用厥績懋焉德惟懋賞華閣邃清墳典攸藏儒官増秩厥有舊章民惜公歸非余爾忘誥掦王庭士夫交慶吾道其東蜀人何幸指日維期王之畀政如何不弔天不慗遺梁木斯壞喆人其萎倣仰焉取民兮疇依龍輀東轅旐丹爰舉歸賵追榮戚我明主渥矣寵章君乎何所嗚呼哀哉繄予鯫生叨世通家日也清池泛以芙華飲之食之恩意亡涯公之徃矣撫棺奚及塟惟時矣紼嗚呼執薄尊陳誠洒淚以泣尚饗祭周詹事文操惟公忠諒質直立乎本朝為名侍從循良豈弟施諸有政為賢太守天寵方渥超然逺舉既可以淬厲末俗奉身而退與世長辭亦可謂達於死生之際矣某在歲戊子拜公闕下傾盖之見稱之曰能顧謂衆賓韙其高節將命歸朝又與公遇方郡闕將辱公我期假守之來公亦旋斾清風之㑹琅乎德音甫再閲旬公遊汗漫公生乎世享年寔尊名德俱髙可以無憾某惟賢之事庶免罪愆公之捨旃卬將安倣嗚呼老成凋䘮誰復典刑斯世斯民可為長嘆一觴之奠聊冩我心精氣不亡可無昭鑒祭吕郎中文大器某昔令鄂陵公守西陽治夾長江我有將迎我有泝㳂公郡之從時則我知恩顧綢繆燕豆壺觴政有設施交相告戒何否何臧我不敢知公有令譽寔德於黄督軍新野格章不下聿靜一方閲歳彌時我幈外邑是解銅章公升於朝我跧里巷道術相聞我來自東公分符竹信宿參商御於公所時靡間斷雲盤刻香公之令子論交許我公則云亡於時假節説於舊館如何䀌傷念昔暌違仁言之贈勿懈於常悔談靜養靜非數息辨不加詳逝從似續切偲晤語斯大而章執紼無岐惟儀之奠涕泗其滂公乎曷歸鑒時精意庶其尚饗代養志姪祭王舎人墨卿惟公學術根源本乎性天行業施為無非自然致養北堂晨昏必親觀色無違惟時孝純發策决科光明禁途珥筆螭㘭裁成帝謨載持漢節命於丹戺駕之不俟以承天子禮行簡驩乃逢譴怒志之弗伸維此之故天胡不仁仁人不夀以予外舊而仁靡䆒我祖仲氏實外我君君不我棄婚姻孔云顧惟寡學尚其來敎如何治命禮成不報門之未掃文人以行誰歟來者提擕我後生奠牢之設匪清匪馨於嘑哀哉君其歆我誠祭外舅文維紹興二十有八年歲次戊寅三月辛酉朔初十日庚午子壻河東薛季宣樂安蔣行簡滎陽鄭忱德謹以清酌庶羞之奠昭祭於丈人安撫秘閣孫公之靈於嘑真剛寜折白璧易疵醜正惟哀讒聲雄雌昔聞有之迺今見兹於嘑我公禀氣之正道德其容温恭其性節撡寒松儀言雅令奉直言君色養北堂惟公弟兄栗栗齊莊孝德彰聞風勵一方虞庠進賢攷文以數聊且試焉亦程其度夢親疾驚弁焉弗顧惟善降祥廣寒孔遐雲路迢遙桂也婆娑遨焉遊焉平步煙霞錢湖帝都本兵樞府士袂如雲羽書交午補緝訓誨咸安其所畿甸阜繁治以弦歌民不忍欺何拙催科興起田園邀遮涕沱南江之西長蛇勿勦牧侯舉賢大廷名小樽爼折衝奠平如掃宗盟帝胄東觀清髙佐之丞之赤舌譊譊煮海摘山則復賢勞九府司泉事聫奄署徴取無厭矯誣明主露章上聞姦人齟齬閩嶺迢嶢分綜外臺牧臣弗事訟積陵堆决滯獻囚迅若霆雷江沔之都寔惟南郢地控三方邦之吭領受鉞於藩華戎絡井西州錦城師孱而愚汚吏從衡民困求誅致毒於蠆張拳奮呼受首其時人心雲擾使車西指政先無告發廪誅姦慰此黎老夫何楚郊人思故君孽乘間罅麻起紛紜窺邑其小大而覆車僣冦漢家增爵還鎮大盜誅夷人知恭順邊城罷柝威聲夙震洪惟我公秉心正平剛斷而明儉節而清誰謂鬼蜮射乎無形弭節東歸延陵故邑喜接親賓滋滋汲汲松楸拜省載忻載泣蒼天何知爵􅄳為災顔夢趣休喆人斯萎民無放仰於何不哀於呼哀哉數有乘除理有得䘮名位式兼蔑聞古往用不盡長道其不枉公議攸歸董狐書在公志雖鬱公名則大富貴浮雲公乎何愛於嘑哀哉季宣等才非通潤鑑授玉臺或時盛府蕖沼徘徊或一披雲德音孔懐龍輀載駕終天此别薄奠陳哀醪醨飯糲彷彿音容悲啼言訣於嘑哀哉尚饗墓祭外舅姑文某不天生六年而亡失怙恃丈人為子擇對以為無以易吾故人之子居四年而伯考待制始納徴禮又七年而昏乃克成其年丈人帥荆州處我記室之任越三年府罷將我西遊於蜀居半年而别别三年而丈人解荆州某觀省自東甌時丈人歸甫數日相顧悦懌樂以忘言不圖改月之間丈人捐棄舎館後二年丈人既葬某哭於尹原之墓乃復於故家抵家翌日而惡夢兆祥丈母以其日即世雖哀傷如割而貧瘁不辦犇䘮臨不及掩後六年始展哀於墓又不能與其女偕隠情盡於中辭文曷究哀哉言之不可極已惟自丈人録我舅甥之列終始將二十年禮曰賓親愛均子姓某繇依舅姑獲奉丈母於堂愛之親之情加衆輩自人而論盖愛女者之常情生相思死相逺此德不報在某則多負矣然世第知舅姑於我之厚而殊不知厚有加於此者昔我先大夫右史下世適在權豪之柄國妒疾讜正號稱黨人先人以趙氏而升死和戎之議一時契故不克收䘏其後者於理勢固宜丈人惇切舊交同攸我樂始終教字望以先人此先人感槩交情見諸先兄將仕之夢者斯盖古人相與之義在丈人固優為之而丈母之心思我又母子如也寜以泉亭假館不忘我先宜人一日之故抑亦夫之所厚固當親厚之耶嗚呼此風不作也乆矣使某微舅姑之教則今何有所立拊心懇惻負負何言惟是舅姑念我之深願之進學愛其女子奇其外孫我獨有涵泳六經盡心於大學之道和舅姑之愛子而教誨其外孫庶幾雍睦於家不墜我先人之緒且以慰舅姑之心於九地之下或可以無慊雖然今日之事固已負初心矣一杯之奠悲欲忘生嗚呼哀哉惟神靈是鑒饗祭大舅文惟舅至德渾如湛然太虚其行如寓其止如愚中年病忘弗占卦兆人冀其瘳孰知其道在昔華子其忘是若俗儒見悟終然靡樂舅也善忘胡寜勿藥匪䆒其終曷知其至形寂神存脱然以蜕眷言世士惟疾之憂如舅之全夫復何求諸甥舊館於渭之陽於舅之亡能無惻傷舅與天逰曷來曷往薄奠傾哀君其肹享祭諸葛夢叟母文惟靈盛德宜家貞心専壹衆子盈前母儀如一錫之休祥五福來備室家溱溱克大而熾家督之賢成身於學科級之峩奮鬐載擢爵雖庶士寵則榮親天道昭章其夀惟仁如何不淑禄未及養棄之如遺孰司消長於乎夫人可以無憾子之才斯豈無世鑒某等屬聫姻亞託子之知卜鄰方幸女婦其儀遽聞哀訃曷惟其惻酹以傷之庶歆㣲瀝代四兄祭劉氏舅母文劉薛之昏自今奕世眡彼朱陳允隆不替惟彼朱陳鄉俗是因道義承承惟吾舊姻厥姻惟何曰惟母家玉鑑余歸其儀孔嘉自我先人清貧有素渭陽下盼不忘其故婉孌息女蘋蘩奉之豈如他人土風共之於惟舅母秉德靜専令子賢孫清芬世傳謂余弱子祖姑是式饋盥之行㑹共婦職何天不仁舅母云歸稚子家居何放何依舅母之賢師言是傚儉德云共敢忘答教蕙蒸蘭藉哀以言誠願踵清風芬其德聲堂祭四二叔母文嗚呼古之至人固有坐脱而立亡者吾聞其語矣豈若吾身親之哉惟靈見稟德之和清揚有婉相而夫氏幾大吾門鞠育遺孤母儀可則宗姻婣睦人無間言方為女宗以式諸婦胡為不淑棄之如遺抑且外死生天數㝠合將行留自在與造物俱邪吾不能知有見其臨終者矣世之男子盡心扵性命道德之説始終一是不為物閡者誰歟兹靈之亡固有不亡者在陳哀一奠家有常儀代七乙叔翁堂祭廿九伯母文惟靈以慈仁婉淑作嬪吾宗家道寖昌日益隆大起其夫氏靈有力焉子孫詵詵五福備具鄉非積累之厚何以臻此雖天道不偶元子淪䘮而靈之家室自己而興聖善之聲湧溢鄉閈亦可為無憾矣吾家失此賢懿後生何法焉哀酹有儀敢忘其故於乎哀哉尚饗浪語集卷三十四
