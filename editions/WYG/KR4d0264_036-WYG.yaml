front:
  text: 原䟦乾道以來六十年間學士大夫皆知宗薛常州經制之學而其遺文世獨以未見為恨盖伯祖常州得歳四十所為文雖富而猶有未脫藁者先伯建安簿澐早世其孤又㓜篋中書因秘不復啓頃華文曹太博持節東川嘗取奏劄及簡牘等刻於蜀矣而亦憾不得其全書旦自外府丞出守臨川至既數月事稍間因令師石弟從其家發箧中書詮次得三十有五巻而鋟諸梓此獨箧中所存者耳遺軼尚多焉夫學之為道循本及末由粗入精必正心誠意而後可以治國平天下雖洒掃應對而道存焉未嘗可離為二也儒者不作眩高者騖於空無故言道而不及物循實者囿於名數故言物而不及道二者岐分則學不足以應世用而反為儒者累嗟夫古今富有之理孔孟非有二説顧在人宏而用之如何耳伯祖常州儒學夙成高明縝宻於書無不讀必略短而取長於事無不諳必通今而據古每以口耳之習為學者之戒凡有得於殘編斷簡必㕘驗訂審不至於理融不已也其立朝大節難進易退孜孜然惟以進賢退不肖為務奉使淮堧首正姦欺之罪而以忠實報上出守苕霅抗論經總制錢之非法不忍重為民困卒以不合而歸則死矣盖伯祖之學有根有葉有源有流本末精粗内外如一不變今不泥古措之事業無非實學實理也其古所謂儒者歟觀先生之文可以槩見矣寳慶二年八月日姪孫朝請大夫知撫州軍州兼管内勸農營田事旦書於仁壽堂
