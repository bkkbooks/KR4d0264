body:
  text: 浪語集卷十四宋薛季宣撰五七九五監昔栁子厚作三戒東坡蘇公著二說顧事有類是者述五監以足之非敢繼二先生之作亦各言其事也魚有鮓所謂蠢也渾沌而無有眉目如浮漚聚沫然有茅蝦焉雜然而翔其首鮓倚蝦之視當潮之漲遊於江之浦潮去而蝦不知也涸鮓於塗人得之以食使鮓也非蝦之目泛然而放於東溟雖蠢焉猶與之俱化則其天也全借目亡身而蝦亦不自脫也可悲也夫辰之虎有即田豕者實獖牙之豕也揜形於穴礪其牙以抗虎不勝憤欲以力制之豕穴土而奮焉坌地羸五畆虎傷於齰三日與俱斃兩體一無完膚以虎之威戾其剛以騁非所施其摰猛不能知難而退與一豕同盡自取之也尚何怪蟻慕羶聞羶畢集介蟲有鯪鯉者羶物也知蟻之嗜吐舌張介以羶㗖羣蟻蟻集於體則巻舌而啖之因舐其甲無遺蟻嗚呼蟻知羶食不知患生於所嗜反為羶敗哀哉獸之愚莫麂如也麂足修而善走田犬不能逮遇犬之獵麂則盤辟而跳去欲以混其蹤常用此見及力窮計迫則藏頭於莽以為狗不已見犬得控其後殺之嗟哉使麂知捷足之足恃疾去而違之雖良犬如麂何極其少筭竄頭以自罔不亦傷乎漢之湄産鹿鹿羣過千計虎難其衆為數以取之鹿齕於原則振臊環其外闕焉而伏於下鹿齅得臊始恟求臊之闕委而去之不暇筭其曹也虎搏於其後鹿如數而得夫鹿之苟免求逺禍而禍從之卒喪其羣雖羣何濟言之有足傷者故書七屆無然先生居崆峒之山巢喬松之下不設藩籬不為庭户引水以通其流耕田以餬其口語黙不常無能知其極者冠服者七人同行於野聞其事於野人豫然詢其居處謀從而師尊之進趨乎先生之所遡風而前承風而語以請於先生曰竊聞天高而物覆焉地厚而物載焉聖人德配天地而民取制焉小人無似而各有志焉迄未知終之所屆夫子之道廓如無外灝如無際寂然不動而變適不窮曷知始而知終無乎不在無乎不通固已合德二儀同成嵗功矣中庸其有擇焉不識蹇蹇之志可言於前乎先生曰可哉微生者位六人之後蹶然而進曰有鳥有鳥巢林之巔有魚有魚則潜於淵百嵗之日在大化為嚊呬之間行樂須及時日月為我延我有高堂金玉成之瓊室椒房珠璣縈之華閣層樓接漢凌煙浮廡脩廊凝虚囘環後聳崇臺間以流泉彫楹刻桷栢梁桂楣深湛海濶岌嶪天齊懸璧璫欒琇栭宛曲檻儼𤣥墀甍雲連而鱗比簷軒翥而鸞飛星居煥其錯落粲神光之陸離别姬姜之嬋姢皆紅粧而翠眉髮鬒如雲粉光如玉麗質天成清標振古冠芙蓉之嵯峨曳霓裳之楚楚衆樂合奏八音具舉吹洞簫鳴建鼓靄登歌紛屢舞奠金罍酌清酤羅饈珍之百味具鳯卵與龍肝文豹之胎𤣥熊之蹯丙穴之魚槎頭之鯿紅鱠絲瓊而並薦曄果肴其麗鮮方丈綺錯五齊濃淵燕樂嘉賓以畢嵗年耳熱酒後醉歌狂顛歌曰烏莵川逝兮不我遲寧知昔是兮今非人生能幾時有酒不醉夫何為予以為樂不知其外優焉游焉聊以卒嵗夫子將許而進之乎先生曰瞽哉燕安枕藉吾知其斧斤酖毒也不知其他榮生曰三光錯行所以成天德也百吏攸司所以為民極也三公之位九卿之職既尊且榮光輝赫弈莫不紆紫綬綰金章班彤庭升玉堂宻勿泰階以從君王吹噓則品物生春叱咄則風雷改色無志而不信無求而不得内子受小君之封諸兒執郎官之㦸九族恩覃四方是則爵從九命列土苴茅王人致伯治陜分郊謐寧方夏紀司百辟宮殿蓊其屯雲九章爛其車服樂舞六佾城周百雉有寶玉之分器列山川之命祀鄉明而治南面稱孤宗祏之享逮高曽惠澤之溥滋萬夫弓矢賜於天王征伐行於諸侯濟濟盛鴛鷺之行熊羆羅糾糾之夫整我卒徒一時隸武既飭我車既勒我馬千乘轔轔駸駸四牡建拂天之翠旟載干雲之丹旗前行霧合後騎星羅擊鼓其韸載驅載馳兩首蜿蜒而蛇行八陣舒巻而雲飛山川以之晻曀日月以之騰暉於是鳴金鉦歛雲霓放卒駟效勇力乘高陵蹶巖石合圍電轉逐如颷風拔潜水之蒼蛟落陵口之素禽下飛虎於木末執𤣥豹於山南獲獸堆岑血蹤蔽林顧夕陽而旋返翕女樂之嘉音舞袖欻其輕颺紛衆鼓其鳴琴厭厭夜飲和樂且躭朝宗於王綽有加禮實獲我心於穆不已士之通達於時至於斯而極矣夫子將許而進之乎先生曰彼哉不義而富且貴於我浮雲如也不知其他誕生曰蚯蚓不可以語神龍之變燕鶡不可以語鵬程之逺知小力單曷施曷展知方之士固不與志富貴者同其蹇淺也彼高蒼蒼有神都焉是曰鈞天實為玉京粤有靈之殿廣樂之庭兩曜二府千官衆星跨虹霓以為梁馭煙霞而以乘䃱磹為之喊噓號令震其雷霆至人鍊形身乃輕兮鶴駕龍車迎而升兮絶塵呌閽以遐征兮其樂無涯不可名兮滄溟之東弱水西界壺山青葱巨鼇首出金闕玉堂銀階瑤陛聳高高而不極帶浮雲之溶洩玉樹扶踈以成林琅玕參差而縈帶朱棗苦𤓰而小核蟠桃如柈而並蔕馥郁香草維蘭維蕙輪蠢丹芝藂蓯其砌鳯鳥翺翔於園樹麒麟馴擾其庭際仙靈之人皆壽無極飛魚薦其朝飱玉醴為之夕食呑日華嚥瓊液服青霞縈素霓雍雍容容披雲御風遊儵忽其千里欻始上而已䧏其樂非人間之類䝉悅心而熱中夜吸沆瀣旦含太和鍊靈砂之丹火咀玉蘂之瓊華𠻳珠漿飲神醴饈肉芝嘗石髓鳴天鼔叩貝齒頂朝霞之危冠佩天樞之神璽緝鶴氅而為衣蹈五雲之高履旦旦朝元庻乎高企幾應之來下將以追夫仙者油雲為我生青鸞為予舞東朝木公西賓金母遊神八極寓目萬㝢老矣後天壽莫知數是亦不徒生矣夫子將進而許之乎先生曰誇哉荒唐方士之言聖人不道也吾不知其他庸生曰太上立德其次立言吾不敢以希上次庻幾而企焉仲尼之述者六經今或亡而或存易以盡神春秋凝命禮樂存誠詩書正性孝經立其大本魯語㑹其蹊逕其次諸儒之說亦彰彰而孔明中庸述於子思易傳成於卜商春秋左氏之辭公羊逮於榖梁爰及史篇善惡是揚諸子則曽王荀孟賈董韓揚異端則楊墨孫吳佛老申商鬼谷之徒其言之詳紛競陳而破巻咸有正於羣經吾將獵其菁華簸其粃糠汎遊覽於前修畢哦咏其辭章自含醇而吐醨維舍短而取長懷玉之瑜茹菊之英賦詩篇續離騷補官箴廣歌謠舒箋染翰吮墨含毫文燦羣華璀瑳瓊瑤追逸蹤於絶迹發新意於來今仰不愧於先賢中有當於人心蔚神文之娓娓哂才士之浮滛作自我而名家夫豈人之臣僕以明道之淵源擬三光之旁燭用馳騁於中原等騄驪之行陸摛章霏其雨散麗藻郁其蘭馥栗栗嚴冬之凛煦煦春陽之燠以是為木鐸而鳴之於以贊夫化育夫子將許而進之乎先生曰小哉辭文一藝爾君子依仁據德而後藝可遊焉六經不謂是也吾不知其他汲生曰草之繁蕪不離於腐木之披離不逃於蠧均受氣而成形乃索然其如寓諒無德而稱焉匪他之故人萬物之靈也可寘焉而無務且修名之不立誠君子之所矜必於身而有見將有事而足稱孝於家忠於國信其言果其行夫然後行而名以此成位乎人之廟堂將守忠之言進必致主於三王庸括囊而循靜諫惟其正捋虎鬚逆龍鱗而道以此信冒叢棘囘帝力而後為稱職羌自效於小官亦昭昭如必聞寧直躬而隕首無左道而逢君如牧民於都鄙澤逝廣而惟均凡小人之務勦慎兢其及人將夫將三軍帥六師討不庭誅畔夷倚分甘而均逸款共燠而同饑進螳螂於轍下流春酒於江湄進遇敵於前行畢同心而載馳陣雲敷而霧巻飈已住而還來震雷鼔之喧天聲磅砰其如披摧堅城而執豹貅斬豪首而攬牙旗前無敵之可當展如虎而如貔惟安人於一怒夫豈高其勇力用博濟而施仁永躋民於壽域近悅附而忻忻致兟兟而逺來達乎上其如是沈以顯其清議體正以方我則章之言善以當我則揚之行頗以僻我則直之道曲以畔我則辟之期此道也無時而不振無時而不明無時而不立無時而不行以我之軀麽然之微入鷄之羣如鳯之儀厠石之間如玉之瑰夫子將進而許之乎先生曰淺哉役乎名者不與有立悅乎外者不可與適道吾不知其他高生曰驪龍之飛何羅之網丹鳯之翔豈為俗羈苟汨波於塵囂將䳱羊而視之知逺引之足尚遁世絶俗夫何疑式高舉而深藏於以全其天力惟患道之不宏豈為人而役役我有良玉藴精於璞我有狐裘反披其鞹資一身而有餘夫何為乎有作青山幽幽浩蕩江湖有石有泉有雲有霞紛佳景之不常萬象變於須臾孫竹粲玉笄野花鋪錦綺松橑橑而孤貞泉涓涓而清泚鳥日夕其徃還人安閒而自喜築室山阿茅茨素樸孰為主客孤雲野鶴鼔絲桐以抒情音寥寥而滿壑時披髪而行吟窅不知其何樂雜幽蘭與杜蘅不為人而方馨岌孤峯之壁聳佩璫璫其磵聲百草夥其咸遂猗盈前而青青面有漣漪步有輕舠恣野情之安徃匪憚渉於風濤水涵虛而無涯歌肅肅其清高鼓蘭橈漾澄流撥青萍狎浮鷗迅短蓬披鷺蓑采絲蓴擷錢荷穿芙蕖之叢杳出没於蒹葭慨自如其忘返視汀島其如家舟悠悠以何之迹泛泛之輕鳬投絲綸引肥鱸縷膾玉鬭春華薦氷盤倒氷壺茹新薇飯香菰樂生而已宛不知其所如萬物不足為吾累眇一身而安虞於以窮年其樂只且豈以我之清潔而逐物之營營乎豈以我之浩浩而從人之浮躁乎如斯而弗去也夫子將進而許之乎先生曰逺哉獨善其身可矣以為道則未也吾不知其他安生者逡巡而退蔑然無言先生曰而何言安生曰予何言哉六子之言詳矣悉矣吾不知其極矣予何言哉先生曰亦各言其志也安生曰予何志要歸其中而已爾必也將有行也將有明也舍天地而何方哉夫天之高高漠漠而蒼蒼曷知其大曷止其鄉日入隂生粲爛三光雲油然其連鬈膚寸合而還亡轟霆閃電雨施風行生春長夏秋収冬藏乾乾不息其出無方綿古亘今弗改其常凡此道也固已植立乎其中有意存焉失得寧免於茫茫伊坤形之厚博其以何而能度宏山海其深高瑣細及於沙石芚芚草木之敷榮煙火炎而旁爍金從革而中剛水至柔而潤澤鳥之飛獸之馳夫豈容其私匪得於此曷之為天無為而時行地無為而物生人儀形於兩儀惟至命而存誠道之妙也下焉而卑上焉而亢信之則盡乎庻物舍之則宻而退藏凡動靜出處語黙柔剛云為用舍曲直員方故非此而無行終亦不知其所從毫杪之差忽焉而亡彼天地之時成名君子之五常伊執方而弗通乃形器而可量羌不滯於端倪允合德而無疆淪山澤履朝堂處富貴攷興亡將朝夕之不違蹇有行而曲當故夫得一之至貫通萬彚變動不窮舉臻理義不可暨也庸可志也不可陳也庸何言也予何言予何志先生唯然而進之曰庻哉至矣當矣平矣常矣博厚而高明矣吾與其行矣六人者隳如若廢靦然喪氣而問諸安生曰夫子之道可以無志乎安生曰此非吾所識也雖然志吾志也烏知其棄置也六人者擭然如瞽之決其眥也始知安生之大盡棄其習而學焉弗愆其素弗移其外居無幾而咸有所屆九奮啓憤兮申寃訴哀情兮敶矢言呌蒼天之無辜兮指心以為正將求信於旬始兮或咎繇之我聽神羊不世有以觸邪兮其誰宜為政親莫親於手足兮而為之詬病重莫重於君臣兮而䜛言以興余服蘭而佩芷兮扈江離與蕙􅊉紉留夷而緯楬車兮以為束帶青雲冠兮逺遊履心曠漭兮横四海日月昭其清明兮孰興雲霧余既有此高潔兮羌謂余為卑汚鳯皇翔於九霄兮燕雀與程其度蒼蠅矢之亂白黑兮人夫何為乎不悟於穆修靈之高厚兮天與地其作配三辰煥其服章兮揭招搖而為蓋拂白螭之純素兮列蒼龍於左輔朱鳥熒煌而先後兮神龜昌揚而禦侮東南海而西界羌兮商於崇其北户愉昭明而震起兮諶發揮於天下余日望其遵此途兮放意咸池乘玉虬兮俱奮飛開閶門兮造東父逍遙遊兮太微何鴟鴞兮名鳯皇駕金車兮翺翔之桑間兮溱洧之側樂盤遊兮三旬不息余心隠憂兮惟靈修之故也靚修餙而娟娟兮而以為惡也余靜好而弗余親兮蹲踏蛾眉之妬也足頓地而不我知寃兮仰天而不吾訃也省吾私而内不疚兮此固天之數也悲幽幽兮楚宮深望漠漠兮楚雲隂指天極兮清高聊適我兮遐心吸正陽與沆瀣兮於夕隂與清旦騎朝霞而御白蜺兮以遊以衍和六氣而與居兮不知我之為物升天入地兮儵來徃忽靈修可告語而獻之兮將我從而我咈重曰皇蒼愉和物無他兮隂靄飛騰儼惟瑕兮雲収風靜恬靜嘉兮悠悠我心可如何兮右啓憤怨春風之不仁兮既發我羣芳與衆葩羌無逺而不屆兮爛錦綺之紛華栁青青兮花熳熳黃鸝擲兮聲度轉香襲衣兮馡馡滿路又吹殘兮何故匪黔嬴之媢嫉兮是殘醜數摧傷物之通美兮且以成其獨異彼丹葩兮適榮樹端今飄零兮匝地漫漫昔芬馨兮襲人旖旎今質存兮已塊然而少氣野之草兮昔芽萌其嫩今生砌兮亦盤盤而錯錯余啟卜於靈氛兮問其何故靈氛示余以其繇兮曰皇之常度在天地萬物其盡然兮夫子何疑暢其理而誠告兮子其知之曰人生百年猶樹花兮三春發榮粲其葩兮光彩馨香能幾何兮壹夕飄風竟辭柯兮彼隨颷兮展轉或歸根兮或逺或一墜於庭闈兮或遂沈於坑圊風何知而花何有兮子之心焉眷眷嗟世態之汨於是非兮孰通其說西施見斥兮嫫母為說毁棄尺璧兮鼠璞見珍明月沈埋兮魚目為蠙美自美而惡自惡兮贗與真其誰分春與秋其代謝兮子何與而傷春余不得此之高意兮懷達人之至言斯從事於來今兮豈然右怨春風桂枻兮蘭舟去景兮悠悠維赤岸兮裵徊睠丹陽兮夷猶中腸鬱結兮神情惝恍思夫君兮聊淹留浮涔江兮放於河漢泛淪漪兮極其汗漫悵始異而終同兮匪他囘波瀾兮顧復之豈逺婉清揚兮採蓮女要美人兮北渚攬芳蘅與若英兮備雜采之芬馨將日仄之與期兮指潛波而為明羲和晻曀其西入兮暮雲合而美人不見怨芳心兮泣蘪蕪余以衍秋風起兮颼飀蕭索幽蘭秀兮芙蓉亂落感北江之東注兮泝洄之宛宛羌順天而不極兮蕩波之有沔鳴鳩雨而逐婦兮言歸以霽動人情兮弔孤影而零涕去靈修而自放兮余心不忍回素首而不見其形兮於斯焉其逾逝亂曰冶余容兮安閒自喜蓀窈窕而不我嘉兮何以苟承恩之不在貌兮蒼天謂何分此生兮已矣右去郢愁城結余之方寸兮羅累千之雉堞繚其外惟怨水兮知褰裳之不可涉揖輸般俾攻以械兮訴余曰罔克礪利刃而斬其闗兮礙重門而莫得登東丘而延佇兮見滄溟之滉瀁深湛漫兮受百川之漭漭朝與夕有汐潮兮冉冉來而西漲江河之波倒流而西傾兮泝崇丘而以上欻忽洄流兮已徃來孰使之然兮去誰與讓曰夏后之勤勞兮導川流之歸王執玉帛而朝萬邦兮凌會稽而會計穆百神之受其職兮罔或不至瑣防風氏之恃脩軀兮朝宗敢後缺我斨兮破齊斧骨專車兮以徇於天下於越守東藩而奉其祀兮盛浸滛於中世句踐王兮始大北爭衡兮吳會棲會稽而幾不免其身兮惟種蠡之與謀朝嘗膽以苦身兮將反之於寇讎吳夫差之不仁兮忍闔廬之餘恨甘蟲蠧心兮尚不靦乎其面說妖女而築姑蘇兮咈胥臣之悶悶乘鴟夷而蹈斥溝兮不及夫椒之親見麋鹿遊於吳宮兮火灾興於探鷰羌伯越於中原兮通舟梁於梁宋痛曽孫之殞其緒兮西面朝於雲夢鄂渚豫章有虎狼之遺跡兮曽不知其所重虛鍾離而徠封豕兮寧待我師之所控心招搖兮故丘將蹈海兮襲滄流望鯨鯢兮山峙蹇産吾心兮索然無氣右東首越夏首兮西泝張清蒲兮疾去鷁吻低徊兮翺翔風便回首東冥兮日逺睇蘭洲兮芳杜若羌吾好兮不得泊聞持鼔兮韸韸余心結兮尚何樂西風駛兮江皋舟迎風兮遡流進將寸兮退尺凝逺眺兮江水幽幽江風號兮漫天素濤走鯋逼人兮將呑舟余奈何兮儵忽下有蛟龍兮出没江豚得意兮若神肆跳梁兮衝􅊳泊兮恍烏雲潑墨兮吾上天地變兮不可測渠泉飛兮無峭壁邅徊余桂棹兮薠叢至止曳方竹而相羊兮攬芝中沚蘇椒紅兮和羮搴辛夷兮用餌雜薦兮蓀蘭載敶兮薜芷風細細兮波停縱余舸兮于征長歌自返顧一返兮屏營倡曰扁舟大江遡狂風兮下地登天轉飄蓬兮人之死生將彼舸之攸同兮停橈待濟考攸終兮賡曰逆天理兮雖大而覆順其然兮百福攸助叛水性而余求兮噫其何故右遡江巴丘兮崢嶸嶔岑兮洞庭秋霖兮閣涙春草兮愁生巴之蛇兮脩之雲英甲兮火晶㦸微手足兮惟行雲霧飛騰兮匪翼知絀信兮天性展轉委蛇兮至行朝之遊兮衡岳莫飯流兮湘曲鹿焱起兮中洲人之逐兮悠悠紛繚亂兮海波弗靜逐之顛者相望兮莫得持其腰領鹿冠元兮森槎千角蛇銜取兮不畏觸嵗三遷而解甲兮骼髅具吐羌有獲兮故無取象巨牙之雙植兮肥腯頑健肉雞兎虎龍而牛榦兮得鼠狶為首面性羊狠而馬行兮狗猴心而蛇變既備此十二神象兮害於田其不逺蜿蜒蛇之怒兮吸無勞乎宛轉雖有此脩鼻駢齒兮寧復餐而以卷不勞咀此齒牙兮害以蛇除珠顯灼而光明兮不在短狐之毁譽遊若蘭兮芳洲卧香蒲兮翔素流芷江兮戲豫丹穴兮優游何蜂蟲之隂戾瑣微兮藏形於闇騎蛇頭而啜之兮堕厥頥而脫頷阜堆骨兮名陵風悲雨泣兮千齡萬齡象種繁兮蛇既斃欲呑之兮誰能舍鹿犇兮其復獲登蛇丘兮涕零零右賦巴丘解荃維兮放蘭舸蹇南越兮洞庭波噴浪花兮飛白雪身何居兮入明月聊凝神兮隠處夢龍宮兮波之下珍珠庭兮紫貝闕璆琳宮兮犀甲户朝龍君兮殿堂芰荷巾兮蘋藻裳圭琉璃兮荇帶佩美玉兮琅璫龍君遊兮何之水晶宫兮丹水湄驂蒼虬兮飛亷御豐隆車兮為後屬磣磹驅馳其左右兮使風伯為清路都離宮兮忘反命羣臣兮燕衎葅蘩藴兮形鹽列鯨胎兮黿卵張鈞天兮廣漠野鼓蛇鼖兮震鼉鼓鏗浮磬兮龍鍾歌湘靈兮竒相舞三行兮清酤戛止兮柷敔觀其臣之就位兮厥令尹曰瞋鮭揔羣蝦而將之兮胄乃元惟鯢魚緣蛙聲之䀨䀨兮位高於五諫鱣魚大而無庸兮處之冗散鬱鬱余心之惛黙兮周章而蹇産欲詞而夢覺兮嗟言之而已晚忽忽余見斯精物兮徒臨流而悵惋右記夢行吟兮大澤邈無人兮臨水石被髪兮徙倚彷徨遇隠淪兮嘉客艤魚舟而前致恭兮問余以名何徒搖爾精兮焦然爾形曰原楚卿之貴戚兮三閭次也同王姓而氏惟屈兮靈均先人之字也世滔淫而混濁兮我惟潔清彼醉者之紛拏兮同怒余之獨醒漁父愀然而教之兮曰聖人之致一不必動而營皇兮卓時中之變物貴莫貴於和光兮太潔在情之甚嫉混濁世兮胡不揚波而泥淈衆皆醉兮尚可餔糟而醨歠不同人而求自異兮宜一朝之見絀指清流之灝灝兮余將以逝方浴􅊉而沐芳兮振衣冠而卒誓不自塵其皓皓兮受汶汶而䝉世父行歌而鼔枻兮舟飄飄然無凝滯歌滄浪之水兮時乎清濁斯濯纓兮斯濯足望斯人兮搖搖欲從之兮無由煙雲邈兮不可見嗟斯人兮已逺右行吟觀吾生兮何為乎今之世永悲傷兮耿耿夜長而尠寐臨清湘兮思逝無舟倀欲行兮不濟擬飛騰兮假羽翰於黃鵠鵠已亡兮曽是余之能服將觧衣而下遊兮潜川不貫懼射工之余中兮備蛟龍之芻豢登衡山之嵯峨兮栢松委靡怨飄風之怒狂兮害於物理猨狖嘯侣兮上獲我冠荆榛塞路兮下穿我履望蒼梧兮將望華之雲愬巉九疑之不可辨兮又藐然其煙霧殺竹枝而求泪斑兮思二妃之榘度哀靈修之返無期兮蓀舍兹將安寓首陽河濱逺而不可適兮視申子夷齊其有故將從此汨羅之泚水兮儻務成之或遇悲女須之嬋媛兮臨流而止余涕滂沱兮心悲江渚念我獨兮斯不可以久處心如石而莫轉兮吾其此介與子别兮余將于邁褰余衣兮不我止蹈清泠兮余乃已抱巨石兮懷沙諶同流兮灝波其窮幽兮𣺌𣺌皇乃德兮太皓右沈湘九奮走之所作也走世官於楚身嘗主簿荆州假令東鄂皆故楚地江陵又楚都也感靈均之志以為九者天地萬物之通數因憤怨而奮發作九奮言將質諸天地萬物而自奮於淵泉也九禽言不如歸去巴江春暮肝斷口無聲早夜啼紅雨尋思帝蜀時驪龍魚服不知非相婦未饒姬妾兒流紅長恨不如歸婆餅焦胡不歸熾炭炎炎不識兒兒饑不敢取兒苦長自啼父母生兒忍不字棄兒父母生何為脱却布袴從教暴露已自不能羞有甚供租賦官家官家聽我語我本農家困征取祇今為鳥心不忘願王一念農家苦蠺姑力作繰絲一百箔五月罷􅅙繰炎天勤織絡今年州府急催科輕綃織成不得着蔽體無褌獨􅅙婦百箔絲􅅙枉辛苦貴人不念有寒人一曲千縑賜娼女新婦抱兒歸天清曜日暉隂雲礙霧雨新婦抱兒去窶窶勃姑鳥此情那可曉有兒有婦不作窠教去教歸幾時了謝豹謝豹獨何心挈我裳衣無處尋白露漙兮風勁紅葉下兮秋深我寒終不辭皇天故不私請㸔穴土重泉下對人靦面何為者泥滑滑山岡路一步一躊躇行前復回顧如膏兮小雨膠膠兮薄土失足無多來徃人撲落紅崖不堪數兢戰驅驢行不前苦是昏黃無逆旅行不得逺哥哥途逺山高奈何畏日流金兮長夏䕃人有樾兮無柯足蠒兮傖儜口渴兮煙生思量有底虧人處不處高堂長路行提葫蘆沽美酒舞春風卧花栁且作醉鄉遊此身非我有與君㸔取壠頭墳人在誰知不長久浪語集巻十四
