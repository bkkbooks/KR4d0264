body:
  text: 浪語集巻五宋薛季宣撰詩漁父二首蹤跡五湖浪生涯千尺綸是非寧入耳榮辱不闗身獵獵菰蒲暮凄凄浦溆春何時共蓑笠和雨釣青蘋紅蓼白蘋岸清風江月明萬波千尺動四海一漚輕濁酒醉獨釣鮮魚饑旋烹興來歌欵乃煙雨過前汀筠郷新筍根節凌槐夏風霜閲草春此君椽筆健稚子錦綳新有待瞻淇澳行將滿渭濱狂鞭任奔迸我不是饞人白菊不著金縷衣寒窓弄明月端宜妝淡泊自是香蓬馞臭味真可人風流到華髮試為問東籬定得淵明骨丁香花别是南州種寒花七里香鄂人號七里香玉笄駢寳䯻金粟綴銀鐺自得山林趣不為時世妝紫霞休騁瑞未及野梅芳立春誰得東君信風生十萬家土牛占穀麥灰律動蒹葮嫩綠萌芳蘂新紅茁綻芽未能都免俗春勝揷春花雪怪得寒風瘦窓明積漸加起來裘潑水逆視竹生花厚貌紛羣品新妝副六珈飄零飛落葉轉動絞回車無定從高下忘形變邇遐郊坰鋪毳罽堦砌撒江沙灑壁侵修飾填坑旋下窪屋頭昻怪獸山脊走長蛇萬木枝都亞中庭石盡遮獅符蹲陡踞龍井噴増呀撲面輕盈甚装衣㸃綴斜礎閒開匣鏡碑仆揷梳牙同色連千里虚光合萬家壓災時世重為瑞老農誇勢極雲天際威凌凍水涯凹兠坡崿岞條突樹牙槎客子衣裳怯王孫酒力奢影浮垂綉幌香帶落梅華籭􅉫知神女門屯想夜义未能三十韻旋㵸試烹茶郊迎趙漕叱御逆軺車愁先負弩驅虎頭晴在望羊角淖盈途草莽迷行跡湖山出畫圖傷今又懐古坐睡覺吳歈梅雨霡霂雨黄梅凝雲綰不開心知飬苗稼眼見長莓苔蜜箧幾如漬崇墉勢欲隤鬱蒸任炎熱誰解酌金罍遊飛霞洞横塘富花栁杳杳鏡中行樓觀朱涵壁洞天珉掩閎林深暮雲合地僻夏寒生康樂屏巖靜鳴榔時一聲龍翔寺二江涵古寺雙嶼聳平沙翠浪環流浄金城到眼奢水光搖殿閣塔景動龍蛇不減蓬壺意屯雲未許遮酬張縣尉久客多塵滓心懐為子開文知龍有種名苦雉為媒但得貧無絫何嗟去不來吳門衆多士待爾和羮梅元夕憶世母三八母生日蒼天毒我生顧復自孩嬰元夜銀花合三山夀斚傾星毬明烜赫鼇島峻峥嶸樂事都如夢傷心母道情拒霜花蘸染木芙蓉深紅間淺紅錦籠烘夕照翠袖揖秋風艶冶歸尤物凄涼識化工拒霜髙節在丹藥謾成叢早行旅枕罷殘夢明星懸屋椽不辭風露冷欲了東西緣雲馭方擎日月輪猶御天波波定何事羞死地行仙天隂梅月乍開霽油雲閒巻舒溢光穿隙日浮祲出清虚皷吹蛙聲亂笙簧竹影疎雨來三四㸃靜覺打籧篨告歸郡不得請倦於將迎之勞閒居百不憂何事武昌逰旦旦三江口時時十里頭箇中都是妄此外竟何求生被浮名累將迎卒未休昧爽寒溪送客攀援長者車昧爽踏汀沙片玉山銜水堆金日蘸霞風來雲外嶺露重竹間花好景看如客心閒即是家二十三日送客寒溪還視邑事食時過節推周文猶高卧未起愒然嗟羨以詩戲之驚起周公夢三竿日倍髙被氊吟不用州縣職徒勞脂轄驅郵置金車困賊曹幾如陳處士龍卧楚江臯夏日江濱鳥迹鋪天篆金波漾日沙鷺拳巖積雪風勺浪飛花江㫁客帆入岸回山影斜峰雲青漢上畧約二三家聞黄仲益雲夢辟書報命三府書交上羣公座盡傾量包雲夢澤名動洛陽城雞肋刀焉用牛腰軸定盈江南望江北無可贈梅英讀蕭銑傳不假成田勢寧堪麥秀悲青氊梁舊物赤幟漢威儀剛被農家誤俄推鼎祚移江湖百郡地只自黍離離讀九國志悶書弔古因紬巻傷神却皺眉蜂房開自牖蟻穴積成堤不苦南風競長懐北馬悲陽曦曜星月還有餞西時被甲儒服便章甫戎装乍鐡衣幾曽生共樂猶有死同歸著屨惟何甚乘車未遽非愧酬軍旅問先見少知幾曽陽回棹沔曲回晨棹驚飛羨水禽波紋沙隠見山影浪浮沈色動蘆花雪光搖日脚金扁舟歸未得惆悵五湖心讀三國志左角蠻攻觸南柯檀伐槐俳諧記名字人物委塵埃錦里昔曾到樊川今此來遺風不可見觀古意悠哉讀史信乃噲等伍宏與滔比肩饗士未為過出胯真能賢物外體三極環中無二天傷哉千古恨顰蹙翫陳編仵落回路得家書是夕有歸夢夢入江南路依然識舊廬家人話生計兒子督程書繚繞俗緣在纒綿習氣餘金雞驚悮我安問未為疎三月七日按雲陂莊還宿舊州寺懐松楸後作不學老農稼而為田舍翁劬勞方軫慮定集竟何功心測焄蒿氣時寒疾甚風年時尚壇祭廢絶意奚窮山舍三首彿彷依蠻室林端鳥道縈煙疑雲異色松接澗同聲樹古龍蛇蚴巖巍虎豹獰野花舞狂蝶栩栩夢莊生塢闊屠蘇小竒峰疊翠屏巖頭通鳥跡山脊走龍形峽㫁風偏勁林幽天欲㝠流泉不知處虚谷響泠泠寂寞無塵事茅茨秀嶺連密蘿􅂪灌木亂石隠流泉蝉噪雲間樹鳥飛山外天孤雲自明滅應達主人𤣥觀碁戰伐徒形似死生俱妄為争先明有法當局自成迷多筭非闗刼成功定出竒兩情深海若不比看人知昇山寺羽翼假真仙飛來秀嶺巔道髙還自正境寂若為然寓目山如礪昻頭浪拍天閩城多少地羃歴帶平煙丙子嵗春物極雖云反寒威何大衰東風入簾幕生意滿林畦古木含新綠仙葩吐舊枝隂晴苦不定中夜忍聞規江行即事春信潮聲急滔滔掩岸沙客船離浦溆漁笛起蒹葭盪漿水光碎轉山帆影斜篙工指煙樹依約有人家雪銷旬浹雨銀花山林盡綺羅東風雲氣減南紀日光和皓皓汚應易㳙㳙滴轉多氷生又氷釋天道竟如何誠臺雪望懐子都五首不見子都子誠臺一壯觀爛開梅骨峭髙聳玉峰寒誰共雲霄日詩亡錦綉肝夢魂千里道應更酒腸寛故人一相遇七返霰瀌瀌辭采應竒甚顛狂即在不尋思落帽㑹乘興錦官逰皎皎誠臺暮詩腸獨自搜白也今良嗣千年璧一雙文思泉漱石色照月明窓樸樕空樊渚飄零逺漢江此情誰與度木介響琤瑽狂逰失可人萍聚我和君千里共明月幾山空白雲擊鵰飛墮毳嚼雪冷冰齦百嵗無多子離居困索羣李性剛直同官目為鵰李掩脛誠臺雪吟頭祇自昻梅花開嶺路冰玉皺池塘良馬日千里美人天一方尺書不可寄道義兩相忘和賈簿官冷君休歎浮名陌路車冰山逢燠泮豆粥併寒除但酌樽中酒従堆架上書未酬題柱志終不羨相如忌日雪荼毒惟何甚同時失所天哀傷逢此日懐抱憶初年白雪明心素青松㸃墓埏不堪陳几席罪罟欲誰寃大雪江市彌旬雪人行失舊蹤梅藏香骨瘦冰結浪花重彷彿門前栁昏迷郭外峰屋簷天漢在一鴈没遥空喜雨麥穗雖乾耳秧苗未吐心正須雲潑墨生怕日流金氣鬱山堂􅃳風回竹逕隂稱人三四㸃争道即為霖春老雨寒酴醿竟爛無定若逰絲神人薦玉衣飄搖思逺舉婀娜怯空歸曉色檀心重春寒酒力微牽腸無栁眼香絮雪花飛讀史閒是等閒非沈迷不自知黄粱一夜夢白雪數人詩身後輸杯酒生前對局棊幾多亡國恨􅆤几靜榰頥延陵感懐延陵七春夢悲切意更微頗復吴牛喘還多代馬依去來紛混混今昨是非非況在遼東鶴千年方始歸雪霽和智叔次諸即曺韻二首風洗朔雲靜愁蠲泪眼晴夜闌灰欲冷目眩室生明客子逺鄉巷天公偏世情布衾寒潑水墜葉也心驚同雲起飛絮忽作無意晴夢破客愁絶魂銷天夜明聞雞悲壯節哀鴈切鄉情夜靜羣動息空牀時自驚元日鳯厯回龍紀羲和御物新﨑嶇萬里道牢落五年春羇客聞哀鴈傷懐念昔人米鹽能幾許還自不由身夢回二首憶到梯雲巷哀傷韡卾叢舞鸞悲引鏡傷鴈落空弓清夢回時雨繁聲發夏蟲情鍾在吾輩匡坐泣薫風梯雲走家坊名吾宗鮮兄弟何事日飄零凋落皆鵷鳯相従謝脊令世緣那可了魂夢也非寧屈指傷心事端如欲曙星鄉思達仕租千石虚名酒五經豈能千日醉未勝九年耕識取杯中趣知従袋裏乘讀書無一事官宦汨平生寒食二首異縣臨寒食為情覺大難焄蒿五精氣破散六祠壇堕淚紛朝雨回腸減夜餐誰家簫鼓咽懽舞欲槃跚五嵗懐歸夢言歸巳得歸未能逃俗累旋復著征衣子貢當何戰燕人切自悲無堪一百五春雨作霏微感事狐死正丘首鳶飛翰戾天乃如司馬晉不若慕容燕濟亂須人傑投機赧世賢長江千古恨南北幾陳編鸂䳵鸂䳵滄江外雌雄萬里心浪花浮彩翠煙雨弄清音蓼岸無端艶蓮塘底處尋鴛鴦誰著色知誤幾金針讀邸報二首大漠煙塵靜三公計畫竒定安唐廟貌行復漢官儀㨗奏騰千里除書滿四維自然禽頡利蚤晚贊無為世味刀頭蜜人情屋上烏榮華葉子格升黜選仙圖豺祭知生獸虵銜欲報珠不將魂夢到反是憶蓴鱸九月十日菊不改天香細無端人意疎重陽把盃者今夕尚來與白羽搖依舊黄裳笑反初知時自凡俗冷暖欲焉如夜聞捷音圓覺聲聞夜蒙頭大比丘上功來幕府如用復東周行即昇平舊還従汗漫逰慿誰問淮蔡元濟莫擒不悶成春鳥弄輕㵟凝隂滿院飛蠶姑云力作杜宇不如歸世變知音少人亡解語希汗顔多反仄濺淚濕單衣春隂讀王黄州小畜集春晝閣春愁無情若隠憂柔腸牽栁眼困淚㸃花頭不放春風度從教暮雨休哀怜無限意小畜閔黄州燈花自得天然艶書窓氣吐虹有心惟燭物無種到施工不管三春候平分兩曜功報人知喜事誰辨悉歸空送鄭景望赴國子丞詩二首并序淛之江潬但漫平聲而委長有山焉截乎江之口其潮也尾閭盈而濆瀑海水溢而羣飛回江之波倒流而反觸於山其濤怒衝乎潬其波激委之至也逺其為憤也滀崩騰洶洶洄潏藏昻驟蹙而軒乍旋而入竚盈淵谷前無髙岸一川矗立突如來如屹如銀山犇如陳馬轟如雷鼓激如摶鵬子胥奮躍於濤頭文種昌揚其暗浪雖共工氏折不周之柱左伯母彈恒山之目拔山如項羽驅石若始皇未足以擬其壯天河裂龍門發吕梁洩汾防決淮隄撤猶不得形模其彷彿也操舟者逆而取之順而方之呼吸之中恬然已無事矣濤之力也有既故吳兒可狎而弄其去也有時故行人可厲而涉走嘗聞諸濱江之老叟曰江之産有煩苛其涉有陷沙煩苛豸也蠔族比也形如飄瓦呀吻衆多狎者遭焉則著身而不寘沙之雜也多淖則人之履踐不實涉者俄而陷溺則僵為汐之濫君子者曰操舟者子其神乎慿乎虚舟凌乎巨浪逆而取之不害其為正順而方之不害吾之止故雖濤水掀天而吾不為之蕩横流溢壑而吾不為之撓持危涉險亶黙而成之其眎涉者吳兒為有全安之數矣子鄭子一鄉之望其赴國子丞也固當為時世用鄉人又將儀之夫國子清官子鄭子和而不流者也既清且和利用安身而崇徳矣其行也必將問津於浙走期之以舟檝之利琢詩為贈且序陷沙煩苛之説所聞於父老者而冠諸篇端風喜檣烏順知難喚酒杯好溪寒已半京洛暖應回僧舍方飄雪江籬欲放梅不須愁國步之子棟梁材愾我論交晚何堪又索居朝陽鳴必鳯清水察無魚百惱愁成斛羣疑鬼載車否臧亡可道贏得腹詩書浪語集巻五
