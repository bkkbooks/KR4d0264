body:
  text: 浪語集卷二十一宋薛季宣撰書上湯相論邊事某竊見國家宵衣旰食思備邊之計更年積月迄無成規此封疆之臣不能逺慮深思以稱廟堂倚屬之意也某小生晩進安知軍旅然竊食近塞經涉四年見之既詳究之亦悉故敢輒以鄙陋之見思補廟謨之萬一非敢自謂必得惟所裁擇而弃置焉冒瀆鈞嚴某下情無任惶懼之至某聞之兵法勿恃敵之可勝恃吾之不可勝是故先為不可勝上策自治此不可勝之畧也今北鄙之弱甚矣竊聆邊人之語謂敵之謀内侵者凡有三説其一屯田淮北使我困於飛輓而彼坐收其弊其二分軍並進以奪我之江流其三壓唐鄧而襲蘄黄上游可不戰而取雖道聽塗説未足深信使彼計果出此亦危道矣敵今屯軍汴宋許蔡諸郡在形勢最為要切數年以來見我軍戍單弱往往分軍軼出覘我空虚我軍奔走而趨之其去已逺犇命之役未嘗一日無之先人制人恐不如此敵既未有可乗之隙而我之不可勝者又皆若是日復一日懼難悠久某嘗竊論當今之急莫若因形勢而列屯營宿兵聚糧分戍險阨來不與戰去則據險而要之重鎮諸屯首尾相救自處閒暇不奔命於敵人非惟足以自防而制人之術在其中矣敢以近邊形便聞見之所及者疏其要畧條于左方一兩淮為北門屏翰旴𣅿濠梁實當敵衝今魏公已有成規不容復議有如敵出順昌下蔡則夀春合淝為之衝合淝之南濡須之塢夾石之戍乃吳時歴陽皖城之險要在議者不可不講中流為荆陽之要領敵出上蔡則武昌夏口當其衝在建炎間敵嘗出此以襲江西矣其地里比諸州特近又坦夷無絶險宜戍麻城白沙而以黄之舊州為重使與安陸之軍互相應接比緣兩淮荆襄各有分域此道遂亢而不虞廟堂之間尤所當慮信陽光州亦古重地可以藩蔽徳安黄州然而防禦頗難糧運亦逺若以輕兵雜土人而守聚忠義軍輩屯之亦可彌縫上游中流之闕而為之斥候唐鄧四戰之地在我與敵有之皆難為守盖屯重兵則糧運回逺輕兵則不足以自立然我失之則襄郢暴露沔北盡為敵境運輸屯守尤難為力如欲堅守二郡則方城襄陽之戍所不可輕似聞議者以為無險可憑第欲鎮守唐鄧薄險要而保城郭切恐用騎之地尤非我之所長徳安北接随唐東黄南鄂西接荆郢亦江漢間一都㑹也其東北有三關之險道皆出於信陽而大寨嶺為平易其南舊鎮直黄陂及舊黄陂州為不逺西南侔落乃徳安漕舟屯泊之地泛溳而下不三日可達武昌鄂州雖徳安屯軍亦在其後此不可不虞者荆襄上游之根本吳蜀咽吭之地國家最為要切曏來未得唐鄧守備頗嚴今既移戍於邊内鎮亦弱由棗陽以涉賈塹取荆南為徑捷晩唐黄巢盖嘗出此而内鄉順陽西接嵩洛最為襄陽要害亦宜豫為之防金屋南蔽䕫峽西接梁洋荆梁之間一控扼也國初征蜀嘗由此以襲䕫州比年用兵亦嘗調其士馬入蜀甚非良算今其兵力幸衆更宜為之區處使之専守一靣不復輕為調發一忠義軍士率多淮蔡間人與敵結怨既深必能盡力於我其將非武勇廉儉亦無以得其士心然多自負其長不能彌縫上下故正軍諸將好攻其短正須曲加撫納毋使猜貳然其軍無糧餉不免剽掠取資以此失北人之心甚非弔民之意更乞朝廷熟議裁處一上游糧餉由沔而達襄郢由溳而入安隨二水通流則轉輸無閡然此二川方春纔有數月之水秋水涸漕舟不可上通濡滯轉般費廣而中有不給之患軍須急闕不免役及於民役民運糧其弊有不可勝言者若為措置使運輸所向如二水之類者皆以春冬之際集於江口一歲之食必令及春而辦其寛民力不可勝計惟廟堂察之一某竊觀歴古南國戰守之計未嘗不保據城壁雖南唐之弱當周之勝猶能歴嵗堅守此無他郡縣之兵盖與國兵為二一専為守一専為戰則事集矣伏自國家渡江以來専以大軍為重大軍一去無復堅城夫民豈不念其室家盖無法以自保矣某觀江漢淮南之俗其民敦實雄健涉歴世故頗知用武若朝廷不惜少少賦入蠲其田租畧以陜西弓箭手法維之使之人自為戰制其勲賞一同正軍亦嚴邊之一術也比年議者稍知措置保甲及山水寨然初無豫定之法可以必行緩急無以相維散者不可復集考漢鼂錯之䇿似可施用於今如蒙朝廷熟慮而急圖之使其塢壁粗立平時可保妻子而不廢農桑之業緩急足以自衛國家既收其用全生之賜亦大矣一長江之險以人為固今我兵力單弱進戰則無守禦之備萬一事出意表可為寒心嘗論㳂江之民習於舟楫之利如能蠲其徭役使水手自為團結立之部伍假以舟􅊑以時肄習而無害其農功使之稍識旗鼓専保鄉社守之勿懈則數萬之衆可以不費糧餉而集異時兼正兵而用亦守江之一助也然此非廉幹之吏少假事權久任責成不能辦也不然徒為文具擾而無益行之不如其已伏乞鈞照再上湯相某前任鄂州武昌縣令自縣境至蔡州小路三百餘里行商絡繹又嘗轉輸至信陽境上頗聞北事之詳葛王當海陵屠翦宗戚嘗三以計免包藏晦迹遂成纘緒故海陵入淮甸時已稱尊燕京能綏行者之家除前苛虐之政諸軍之還一日斬萬户二十七輩張忠彦久不受代乃因益戍而代之陜西之人不覺易帥其他施設類能濶略從寛凡邉事所當施往往不俟申請而朝命已下故雖稱尊未乆號令頗行其大臣惟張浩宋滿最為舊人其餘如蕭安逺麻都監耶律元帥二韓將軍之屬類皆拔之小官不次而用蕭等皆佼佼後進知向慕仁義以立聲名其持軍御下亦和而整計非萬全不動雖非尼瑪哈羅索等軰然亦未易敗襲中原機㑹未有間罅可乘諸處所遣間探之徒例皆不能深入縱能深入又不能察其事情還則揣所樂聞以恱其上故如符離之役金人固已先有勿焚積聚以待南軍之令邉逺皆知其意而淮南顧不知之雖以某之愚亦嘗為荆襄督帥言之矣凡事本無深逺而貪功喜事之臣役於私意故雖廟堂之上未易悉察也況當講戰未定其間何所不有又況今日之弱由前日之和自古國無外患而能安不忘危者殆人主之所難故嘗有害而無補和之不成我之幸也如以前此數事以為南北之勢已成中原不可復得是乃不知義命之論徼功輕舉又為非計某謂方今將驕卒惰邉障不修備禦之方率多施之無所用功之地至所當務亦未必知此朝廷所當慮者竊嘗論為邦之道自治為急敵之强弱非所當問又況敵情深阻易為驕怠我能為自强之計政事修重材用名實不戾刑賞有章則夫機㑹之來庸有窮盡伏惟某官圖維鑑念以為天下社稷無窮之計去十二月都堂新有敕榜頗陳邉計泄事機之禁某疏逺賤吏身不足以膏斧鉞今也犯此兩禁以瀆上公未見顔色而言其為狂瞽愚聾甚矣然某竊念天下一家孰非身事逰談靡靡徒麗心目事功無補亦何堪用然拘牽諱忌又非士夫之節自非在上者以天下為度心無適莫而洞照事情者亦不足與言也間者某不避僣越妄以邉事瑣屑干聽方懼得誅絶之罪伏蒙某官不賜鄙斥呼召使前既去雖不及親足見其開之以言也此而不言非惟有負門下自負其心矣然此所陳事狀似談鄰敵之美在蚩蚩薄俗搖手知禁者深所嗤笑而某輒露悃臆而索言之者誠以某官量包天地忠貫日月至誠體國樂聞人所難言而近世士風習為軟美之態此等情狀竊意有知而不言者事情何自而察哉如某又不敢言則是終無言者使國家遂輕此敵豈為經久之計以故忘其微賤冒昧而陳之耳詩曰采葑采菲無以下體又曰人之為言胡得焉此言大人君子不間寒逺視言之所從來也伏惟某官察其狂狷而來芻蕘之末論覆其瑕疵而勿為人所聞知此區區之願也干瀆鈞聽某下情極恐懼戰慄之至代上湯相書某聞千里之馬困於鹽車顧伯樂而一鳴立能為之増價寒谷之間不生五種鄒衍為之吹律坐令和煦生春士之遇合於時有如此者鄉令寒谷不遭鄒衍伯樂不値鹽車馬亦不鳴谷寒如故斃於車下廢為不毛理所當然知復何憾幸而二子其力足以感氣致和其識足以空羣拔驥而我未免鹽車之厄處幽陰之地適當其㑹不能頓顙求伸廢弃於時亦其分也士當聖天子大有為之秋其才雖不足以一日千里至其自許猶不秪於駑駘然方困頓車軛之間谷於窮寒之地有大君子以道光明於時開物之功鍳裁之亮非直孫陽鄒衍比也又恥一民不被其澤樂汲後進而為之吹嘘不為一鳴何以自見以求脫於困窮之地此某所以三日齋五日戒膝行而進而求謁於典客之前也某東嘉之鄙人耳大父某官於先太師復有齊年之舊先父亦階科級不幸蚤棄諸孤先祖之終家門寥落甚矣自惟顓蒙小醜曽無足以接先武之後箕裘之事不免無師獨學無所依歸終窶且貧不免求仕鄉者奉祠竊食信為蠧耗太倉居間得以讀書要為一身之幸家有老母望切倚門竊思有以榮親之途未之得也仰惟某官以仲尼之文行周公之事吐握下士樂就成之一介之微非所捐弃士蒙一眄之遇則能立去窮途暖律囘春價増十倍未足為擬也為身之計舍門下何歸乎踴躍陳書惟某官財擇與陳左相即日首夏清和恭惟燮調元化尊主庇民天實相之鈞候動止萬福某洊蒙命召非望所及此惟造化甄陶之内都無棄物雖如樗散亦有癭壺之用落落難合終不忍捐某鄉也未嘗掃門一拜亦無牖間半面之雅得之知識者已蒙鈞慈睠眄之㫖厚甚收召亡補重惜其去行不旋踵而弓旌之賜已及門矣求之於古惟名徳之相所以進豪傑之士者如此某小醜其何足以當之顧今英豪未聞盡用雖曰昭王致士先自隗始旌顯卜式風示天下某又非隗式之賢獨蒙睠睠如許緇衣之好將無示人之不宏乎竊恐不肖之進賢者怠矣願囘茲施推之賢於某者庶㡬周士濟濟上格聖心以興底平極治之功天下幸甚天下幸甚某敢瀝肝膽仰干鈞聽某曩嘗蒙賜對矣學術淺陋不能有所禆益改秩不謝大為人士所非今猶鄉者之人才不加進貪冒榮利深畏友朋之非議己也己具劄目仰告廟堂得蒙敷奏許之莫大之幸君子愛人以徳鈞慈念之某前詣闕庭伏蒙禮遇甚寵請違主客已涉二年雖依仰黃扉如川流百折之未嘗不東以為閒居小官不當奏記相府兩聞冊拜只與有識之士相慶于下而函牋賀悃顧不復陳素蒙知眷之隆必當不以虛文督過之也鱗畨詗候不敢自同衆人幅紙通勤敢乞鈞照與虞右相某歲在辛巳癸未間試鄂之武昌令伏遇元戎督視闗陜道出境上初與齊安郡官旅謁津步夙仰聲誼遂獲一覘鈞表已劇私幸既而螭舫東返又率戍縣諸將迎見於大江中流伏蒙略去等威席艕而坐酌以巵酒出示地圖雖悤悤拜違接餘論之末欵然蒙鈞慈禮遇之禮意蓋不與常人等矣當時戎行之士同泛而歸論公之賢至有加手於額者仰窺所以制服諸將式遏亂略參功微管者豈徒然哉感歎之私中藏亡已嗣以名位懸隔道路阻修詷問之函從不復貢雖聆大拜亦不敢修賀主書然而每與士夫共論當世王公未嘗不及鄂陸之所親見莫不吁嗟稱歎以為近世之所無也敢謂精意人物不遺菅蒯茲者洊蒙命召實出造化鑪錘之力收之既去誠出過恩非分得之秪深媿仄顧今異昔伏念之某既蒙特達之知詗候之議不敢自同疏逺之士赤紙奏記敢冀鈞詧與梁樞宻某一介寒逺前此雖仰斗山之望未嘗趨謁下風曽無寸長非有左右先容之助己蒙論薦於上特達之知近所未有此風之不作也久矣賢人在上引其類者豈曰無之然多有求而後及也至於精意人物不欲恩出私門人非識面不竢有求而舉初不之告自非王公大人以天下為度者未有是事求之前軰政可一二數耳是在古人所以收召豪傑之士某小醜其何徳以堪之迺者洊被弓招又出造化財成之賜睠言感媿銘在心腑云云某間者入都纔得再謁門下仰瞻鈞表以慰平生敬仰之私迫行雖一告違適當謝客屬朝辭已越日不克留名逺去門墻每懷悵惘自以閒居逺外不當通記輦下達官故雖恩門亦廢承問之禮側聞貳公之拜云云參宰稟目絶不奏記隔年矣斗山之仰徒切下情伏蒙希世特達之知必不以苛禮督過之也即日春晩暄妍恭惟論道調元寅亮貳公夷夏邕睦有神顯相鈞候動止萬福某仰恃幈幪敢有誠懇某屬者伏蒙甄陶引拔猥有審察之命一時同召類被不次超擢獨某顧慙羣彦屢伸終任之請仰荷睠憐敦促數四三公之貴降意下士之末列茲事行之逺古為徳之盛寂寥久矣斐然狂簡何幸親聞正始之音内顧凡庸何可當也矧士之求達人情所同如某厭於宰縣之難寧不願為時用而復逡巡遜避豈有他哉自惟所以處己未誠苦乏感物之誠曩者蓋嘗賜對蔑有補於聰明雖蒙采録豪末之言又為有司析言沮格懼涉崖異受爵不辭每一思之泚焉背汗上念聖主有作名宰輔相方與收攬天下豪英之士以備使令俊乂如林固不乏用某腹背之毳無與重輕進備一官竟亦何補惟有修其進退廉隅之節或可微動九重有如少感聽聞謂亦可為賢大臣致君一助某雖退而窮處所獲已多況未為當世棄材不為無補於政此古之君子愛人以徳所為動心者也不與其退直得前軰進賢不進不已之意某褊迫之見尚願取其一端況某久次食貧鄉於之官道中被召因客異縣困不能歸其眡古人婦兒無褌不韈之窮不過是矣常熟當上以有前命未可以行逺念在武昌時以罷羸數千户外應營築饋輸之繁内事戰􅊑軍戍批支百役雖幸不以罪斥愧負已深代還十年又苦多病今此京輔劇縣其可以虚愚妄處之邪自知百不如人百念久已灰冷徒以世仕未能退耕而食室家蟄蟄所不免者尚仰禄耳已具狀申朝廷丐陶鑄一祠或且許令之任得蒙借重九鼎一賜敷奏獲如鄙志其為終始成就大矣干瀆鈞聽某不任栗栗未有階云云張樞宻劄子不克上明年復用卒以前章抵之某竊以南風之不競也乆矣卿士大夫安故玩常不以為辱往坐論流品獵取髙位事業無見為世嗤鄙陛下撥去晩唐數百年頺靡之習舉樞宻而任之政固已四方聳動想聞風采恭惟盛徳大業時措之宜所以上當主心下副物望者在規模中自有次第誠非晩生寒逺之所測知然此任為不輕矣宜當大有以塡服天下非為人所不能為者不可也某嘗謂今日之事紀綱為急不庭為後天下大務不過數端振而起之在執政大臣反掌頃耳王伯之道安强之術固無如此者樞宻其圖之某狂易僣率敢以迫切之懇仰干鈞重某昨以餘論吹嘘之賜洊蒙審察之命自顧學術淺陋曩嘗薦對無補祗冒寵章欲進趦趄屢伸終任之請仰荷廟堂敦促數四所求迄未聽許竊念某家貧累重前年被召於之官道中因客毗陵困不能返待闕十歲貧病交攻趣召且乏桂玉之資窮處固無糊口之計困瘁之狀不敢縷縷瀆尊今常熟縣見任人代期只在夏間某以有上頒恩㫖難以專輙交政已具朝廷公狀丐一祠廟差遣或許且令之任得蒙借重九鼎特賜敷奏俯遂鄙志得獲少沾寸禄一家免於倒垂之急不勝大幸與王公明伏審光膺綸制塡撫都畿寓直西清仰惟慶慰切以首善之地諸夏父母國家之選非才猷兼懋望高朝著者不居今日之除可以卜知簡心所在得無欲使翼翼之化極于四方然後拔諸禁途引以自輔以服天下之心邪某蒙睠異常茲叔祖又得交政於大君子聞之私喜明發不寐惟天邑之浩穰素稱難治奉上接下百冗紛沓方叔祖之未至其為之者非涖之以嚴猛則或㡬於近名濌瑣常才又所不到曲相承奉怨起寒凉事君以忠難能彌甚比絶不聞二漢之吏良以此乎嘗竊論之上下雖殊無過一理人情可見何至乖違凡絶物以干名既為賢者之過依阿骫骳又非君子之所為自非事上以恭臨下以簡加之遇事不苟周旋中度所不得已能比義而行之而求跂及前人萬無是理某官囘翔之乆夙有政事之稱處之裕如自其舊學而某又言之者實翹想於恩舊之門僣越輕犯死罪死罪某伏自拜違台範涉四歲于今矣前時拜書自蒙枉答之後又復不敢徒以牋記蕪塵聽覽其為仰止匪懈惟台慈幸察其衷其率意輙以鄉邑猥事拜稟大非獲己天下𣙜酤久矣永嘉未聞深病太守莆田人也忽欲以其閩中萬户酒法行之於州閩中初不賦錢今以田賦酒禁之弛惟市中游手與坊場之敗闕者便之某始亦謂可省私釀之刑詳之乃不大便酒額止敷稅户郡中所以處之不疑然而此法一行上户必專酤𣙜之利中産尚可貧户但乾出錢亦欲為之則糊口已不自給百用單窘何能争利於富家平時富家猶或强以私醖賣與貧民況復貢有田賦肆其裒斂必將自此公行賦錢以率計之是為加一免役之賦民苦不供常賦則今未免督之以刑市人日得錢酤是益其過以是為省刑罰將無百倍於前乎稅産移割之不時則又有無窮之害温地不宜秔稻常仰客米之給從今種糯必廣飲酒必多民餓且貧常自此始傷敗風俗則又未易單言唐晩有博徴之科以鹽與民易帛今鹽絹故在也縣官以復催鹽萬户之酤安知異時不類是也為政者樂得民譽其勢似不可遏某雖舊曽相識然絶不詣官寺雖欲忠告言輕必無聽用之理數日間不免從卿大夫一見或庶幾其改之萬有一奏請于朝敢乞一言之重達此意於版曹漕使其為隂徳甚大萬告不以人廢言也與劉樞宻某伏蒙鈞諭奏劄副本謹繕冩封納首劄上劘君徳在廟堂無可施行既不付外敢乞毋示於人某被召而來蒙朝廷汲引之意良厚所愧學術淺陋不能有所感悟負於鑑裁慙仄多矣如某世味澹泊素無改官之望冒榮京秩實出造化然而涓埃亡補誼不當受猶賴第三劄子降出辭之恐非人情寧受傷廉之譏不敢不拜敢望鈞慈鑑念力為主張行之勿使堯舜之民尚供無業之賦為施甚大某叨竊不為無名與王樞密公明某伏蒙鈞諭同上某狂妄無庸於恩地初無一面之雅㑹遇東鄂已荷特達之知今此薦章又蒙鈞衡題品被以恬不干進博學有守見事敢為之目某非不知借重先容可以一言遇合所恨學術蕪短不能感動天聰涓埃亡補實累知人之明亦復何言猶幸不失品題之意而已某之疇昔所以趦趄而不敢進者正為此耳冒榮京秩茲某平生夢魂所不敢到今也既對清光又此叨竊恩座之成就某者顧不大哉懼涉近名之累不敢復辭感荷之私銘在肝膈嘗思為門墻計欲救今日薦某之失惟有多方收拾天下英豪之士非某所倫擬者置在人主左右以成格天之業雖有某之玷不足言也與王樞密公明某茲蒙鈞衡引拔反累知人之明既改京官又叨劇縣之寄慙顔如甲感切于心念一念二日繼詣府第請違少敘謝悃承以劉同知去國引咎自歸欲與之俱不勝歎服此風之不作也乆矣道不虚行存乎徳行雖不獲瞻望鈞表乃心不無悵怏然而與茲偉觀在門下士與有光焉某僕僕而來亡毫髪補外補而去行已淹遲昨既朝辭不容更留輦轂之下度量事勢見恩座不得其職必不久留此者聖眷方渥殆將即日大拜禮成皆在旬日之外某留俟則固不可決以去就之誼不免遂行引領崇墉不任依戀惶恐之切不以三公易介囘既倒之狂瀾在道學固自從容況治亂安危之機天下之所仰望於元臣者義命之重惟樞相以身任之大人之格君心之非其端在輕爵位盖不如是不足以有為也狂言僣瀆幸加寛貰某方得小官私謂不當無故通問宰府自此起居之問必無由上逹然某久次失禄邈然未知餬口之計前此幸逃曠敗知將得罪無疑矣既蒙朝廷見處未敢遽辭旬月間恐不免有岳祠之請豫此陳稟尚望賜陶鑄以便其私饑寒而得衣食之資賢於萬鍾之賜矣某前日嘗草具一劄子欲以仰補聰明之萬一漫此呈納得蒙采察欲以仰聞又聞韋叡之蹟淝水可以灌合肥累見偶遺忘之不敢不告心之精微有不能宣于口者要非筆舌可盡併㡬鈞察與王樞使公明迺者一辭墻仞緜歴三時仰徳雖勤頓絶主書之問匪怠也謂當然耳螭􅊑西泝略獲迎拜道周悤悤立談遂成萬里之訣仰蒙恩顧情若睠睠焉者何物小子而獨得此於衆客中邪嘗從郡將請達不克瞻望不勝犬馬之戀囘首又數月矣不知棠隂憩息何地鈞用何如即日燂暑庚伏恭惟申伯行邁周道逶迤自天降康鈞候動止萬福計日元戎將已善達西陜布宣君徳撫接戎夏宜當有以填服人心慰安黎庶施實澤於下者遐想旌旗異彩垂白相慶恨不得親目茲盛西首歆羡而已某伏蒙造化甄陶之賜竊食京廩雖僑客異縣甚窘而未及於窮餓者餬口之計實為有所資仰矧惟改秩之望不萌胷次久矣得之非分豈不知所自哉此意此恩何所論報比者侍郎叔祖伏蒙鈞翰仰荷曲成之意猶未已也惟小朝廷之選所以處天下士乃欲引取無似側迹其問竊知賛育甄陶在鑪錘中靡有棄物某小醜將何以稱仙舟之望然蕖池清泛其誰不欲跳躍從之況蒙啄菢之私誼不憚逺所恨牽於孤弱勢不得西曏來迎見之初嘗以此面稟矣受之如此不當顧行迹之間即某當時可以參陪從騎縱公之不見命固將自賛請行且三川多才寧少若某者公行永久想衮衣非晩來歸溲勃鼓皮固已為藥籠中物大冶之鑄何遲暮之恨邪上負恩私不勝怏惘媿畏之劇蜀漢事難豫度不敢妄有塵獻參相雅髙人物之鑑善於通達下情敬恭不怠而重施之綽綽有餘裕矣天下實幸與王樞使公明某自毗陵驛舍請違誨席兩閱年歲徒劇山斗之仰而跧伏村疃無從奏記主書中間叔祖侍郎嘗捧鈞翰伏蒙賜問蹤跡欲以賔筵處之自念一介凡庸所以受知門下類非人力雖有憸腐讒射無能間鬭其間睠注之隆日以滋至郵置之語未售蕖池之辟随之此意此恩未知安報嘗以尺書因親戚寄叔祖附遞少敘巻巻謝悃數日計筭意謂已闗聽覽經年之後其人復以見歸乃知萬里之情端未易達自此絶意不敢復興拜書復伏念自處踈外之地不識鈞慈能諒之否某無似之蹟竟緣借重九鼎福唐丞相先以邉鏁論薦自顧凡鄙無以仰稱所知待闕十年家貧急禄又復前對無補尺寸叨冒閱歲有半七辭終不得請丐祠不許敦促頻至而代者以過交期求去不免强顔以朝蒙恩廷尉典書誠出厚幸狂踈且負素飡之懼媿赧殊切寵命重沓豈不知所自邪即日顥秋澄肅恭惟華輅徂齊威徳並用天人是予鈞候動止萬福某比者伏覩抗章有請頗聞鈞用少失調養不勝詹念惓惓然以天佑善人定應勿藥有喜雖差有以自遣終以未知謝遣毉藥為望茲者伏審光膺顯策進陟元樞秩視三公顧未足為恩地慶然而文武之道本無二途璿璣有人社稷増重今日之事真夷吾復見時也豈惟故吏門生抃躍之私誠亦率土溥天翹首之冀闗陜吳㑹各天一涯隃度既難某不敢有狂瞽之獻乃者傳聞嘗建出師之議此固道聽塗說要此一著不容再錯敵情何若惟審處之為宜儻中原未能一舉平之則與殘民以騁無異樞使身任天下之重願無貪欲速之功宏逺規模毋俾終潰于成則宗社蒼生之所仰賴其狂易僣越復有人物之獻欲以仰報盛徳惟一聽而加察之善類之幸資守鄧良能韜晦練達昌元令何師心通明善處事皆不喜于衒當路知之者寡某雖未之識然於朋友之可信者聞之為詳有如鈞慈采訪廣博必能得其為人拂拭舉之或備一鶚二鵬也人材難得母蹈不先之悔無以仰醻知己輕言是媿邈未有參侍之便與王樞使公明即日仲冬作寒恭惟華輅同轅神天是予鈞候動止萬福某春首齊安竊嘗奏記典書附置以行不識闗鈞聽否還都竟出遂失嗣音依仰門墻不秪川東斗北之為顓也茲者伏聞九重渴佇以衮衣歸有識顒顒日俟中台之正其為慶抃非時門生故吏之惓惓旌斾之東跋涉勞止未審次舍何許不勝翹跂之誠昨者將命淮肥主意至厚奉宣無狀所立至微廬黃官莊安集都不迨七百户壽春賑業歸正亦三數百家流移自占與客於大姓者盖無慮三千五百家言之靦顔誠懼不稱聖君過聽職秩皆蒙超次之寵霅川剖竹尤為非據自惟無以取此於上實由造化甄陶之素故獲叨冒之牽聨耳心骨鐫銘言不盡意顧如吳興近輔前此非才望不處然而州將數易法度蕩然府藏空空訟檄紛至綿薄無似强顔居之恐累知人之明日有曠瘝之懼賴雲天之不逺帡幪猶有賴焉願賜成絲無大之幸元圭造朝定須爰立以聖君之英睿又得賢相輔之太平之基駸駸方立然而為治之根本要在樞臣之正衆賢之多此事之難方勞廟筭某叨與下客之數謂此不可後耳敵勢見聞何若料須己有一定之規模某諏度淮壖所覩人情事力曾不若昔時逺甚大將號可倚者類不足以當大任調度如許何以加人啟沃告猶惟覬重之謹之而已人之患在貪官爵故每動而有悔樞宰素無是累故敢言之妄言愚瞽誠出狂奴故態樂以善告亦思報之萬一也萬乞鈞念方舟至止漫以赤書迎候輔垣益近自此聲聞當日通矣區區慰抃之私未可以筆舌陳也令親陳聖功縣丞吳興見顧一書附貢并此申納未占覲侍履舄惟祈云云浪語集巻二十一
