body:
  text: 浪語集卷三十一宋薛季宣撰記未央宫記丞相酇侯臣何昧死再拜言皇帝陛下陛下從天下義兵誅亡道秦西都闗中以根本制枝葉天下幸甚京師諸夏之父母也要令四方諸侯知有所法今咸陽遭項氏殘滅之後堂殿冺毁櫟陽長樂承秦故雖靡敝一時之制非法度之宫也臣不勝大願昧死請陛下詔有司度長安地作天子之宫曰未央為漢家建萬世亡窮之業臣何昧死再拜以聞制曰可尚書令下御史將作按地圖以詔書從事丞相裁處其宜太卜卜筮并吉七年初作宫長安因龍首山以抗前殿東西五十丈南北十五丈其高三丈五尺殿北營宣室殿為帝者之正處掖庭宫在其内有漸臺以供眺望曲臺殿石渠天祿麒麟三閣藏先代典籍及名臣勲著承明殿廬為文儒著作之地織室暴室凌室為織文染練藏氷之所其外周廬環列繳以徼道宫垣有闕門二正北端門曰𤣥武闕其東蒼龍闕四面設公車司馬典受四方章奏立太倉武庫所以儲國用謹兵防也宫周二十二里九十五步五尺疏山以為臺殿不假版築髙出長安城其二月上自平城至見長安宫室壯麗怒曰天下匈匈勞苦數嵗成敗未可知是何宫室過度也丞相何曰天下未定故可因以就宫室天子以四海為家非壯麗亡以重威且亡令後世有以加也上悦即自櫟陽徙都長安九年十月未央宫成上朝諸侯王置酒前殿上為太上皇壽曰始者大人常以臣不如仲能治産業今臣之業孰與仲多殿上皆稱萬嵗自古帝王興建都邑未甞不為子孫久長經逺之度是故詒逺莫若儉禹都安邑湯作亳從先王居周文武作都豐鎬周公營洛邑其始未甞不卑宫室謹法度降及後世瑶臺瓊室興焉且富不期驕人情好泰侈大生于安逸此理勢然也作法于儉其弊猶奢以奢示人而謂子孫不吾加者丞相之計豈不疎哉豈不疎哉抑甞聞先生長者言髙祖項羽皆楚人也漢始都洛五年夏上感留侯良奉春君敬説即日駕之闗中居櫟陽其秋擊燕王荼六年取楚王信七年征韓王信上皆行幸闗東至洛陽初項羽既燒秦宫室或勸羽自王闗中項王見秦宫室皆已燒殘破心思東歸髙祖雖居闗中自言遊子悲故鄉吾萬嵗後魂魄猶樂思沛蓋其心未甞一日不在東也酇侯作宫宏侈因貳以濟殆託辭決定都之計者哉雖然猶有憾焉令何稍知古今畧法先王而通其變以安上志髙祖樂于從善使後嗣知所準則可亡奢侈之弊且髙祖以漢太祖而猶出言誇大何法宫乃復窮奢極靡子孫安取制哉其後孝武帝新作宫殿孝成帝興建昭陽土木被金珠楹桷加文鏤增髙極于雲漢窮幽達于泉壤侈過寰宇超越振古財用殫竭于上人力困窮于下其視孝文皇帝惜百金費罷營露臺逺矣初未央宫世世増廣有臺殿四十三池十三山六其臺殿三十二池十二山五在外餘在後宫門闥中外凡九十五而掖庭有月影臺雲光九華鳴鸞三殿開襟閣臨池觀不在簿籍成帝又増後宫八區為内殿十四宫城開拓後至二十八里宫館益盛而漢業衰矣詩曰商邑翼翼四方是極高祖有焉又曰詒厥孫謀以燕翼子孝文皇帝近之矣臣愚學不足以通古今之志顧何以書漢先帝積累之業惟以列職太史典司著述敢效周書明堂作洛謹昧死記未央宫興治本末如上未央宫亦曰紫微宫殿前殿承明宣室武臺麒麟夀成温室萬嵗金華廣明清涼東明永延飛雨夀安通光平就曲臺宣徳白虎四車玉堂宣明含章長年神仙見徳昆徳延年神明高門敬法温調朱雀龍興右三十五殿在外按漢宫殿疏温室在長樂宫漢宫闕記班固西都賦在未央宫三輔黄圖後二宫皆有温室玉堂漢書在建章宫三輔黄圖未央建章宫皆有玉堂而建章宫自在内殿椒房蘭林昭陽披香飛翔鳯凰増城鴛鸞合驩安處常寧發越茝若蕙草椒風鉤弋右十六殿在後宫掖庭按鉤弋殿與鉤弋宫名同三輔黄圖宫别在直門南又成帝於後宫八區又增至十四殿而椒房鉤弋二殿不在數中未詳堂朱鳥畫堂室非常暴室閣宣室天禄石渠增盤麒麟臺玉臺通靈果臺蘭臺鉤弋漸臺觀甲觀山東山皆有臺西山田弄田倉太倉門四靣公車青瑣司馬作室金馬閶闔闕𤣥武嶢闕蒼龍屬車白虎庫武庫府靈奎内府署内謁者虎威宦者章溝鉤盾獄掖庭廏未央長樂承華騎馬路軨大馬圈彘圈虎圈右未央宫室之雜出于傳記史籍者附記于上亡者闕之其制度為不足取皆畧而不書岐陽石鼓記有序岐陽石鼓十在鳯翔天興山阿唐鄭餘慶節度鳯翔移置文宣王廟唐衰亡其一鼓皇祐四年司馬待制池知鳯翔日使向傅師求之于外偶之田舍覩舂粱石臼有文察之鼓也向既易以他臼于是十鼓復完其文刻鼓扛間皆大篆唐時書畫尚備自杜甫韓愈韋應物盖已歎其不無闕劃及今歴年四百而文漫滅過半其書之可辨者十鼓凡四百四十有九字中有複字十六總四百六十有五字其丙鼓五句左驂旛旛右驂騝騝我以躋于原麋豕子疑孔字庶麀鹿雉丁鼓二句鑾車華敕貞弓孔碩戊鼓八句鯉處之君子漁之有􅡈有􅤺其翊孔庶其漁維何維鱮維鯉何以貫之維楊及栁辛鼔十句我車既攻我馬既同我車既好我馬既􅥹君子員獵員獵員逰麀鹿速速君子之求也􅓒弓兹以時我其特其來癸鼔二句載西載北勿奄勿伐凡一百十有一言可讀其餘字畫高古文義嚴宻又多刓剝不可訓知攷唐貞觀時吏部侍郎蘇朂記元和吏部侍郎韓愈天寶工部員外郎杜甫蘇州刺史韋應物歌近樂學士史太平寰宇記歐陽㕘政修集古目録梅都官詢蘇侍讀軾蘇黄門轍詩王學士鞏手記皆稱鼓文為史籒書周宣王時物也唐人之善書者如虞世南褚遂良歐陽詢共稱其書古妙韋應物以為李斯嶧山之罘刻字比之懸隔而歐陽公亦謂書非史籒不能作徒以文細刻淺而傳久逺自漢以來博古好竒之士皆畧不道且不見録于隋志以為可疑者三乂謂韋稱宣王以文王之鼓刻之以韓言宣王之自銘為信公豈未之思也刻文埋没後見者多矣摸搨既衆其壊亦速王學士言鼓以頑石故能獨久然唐及今不六百嵗而譌闕已半鼓為唐出可以無疑皇矣歌文王居岐之陽今鼓適在岐下車攻列于小雅亦為宣王之詩以為鼔出二王不為無據走謂考文觀古當取其最近者從之獵而肆兵周之政禮然爾至于時王甚盛之舉若禹有塗山之㑹啓有鈞臺之享者事獨昭于當代得以特書成王岐陽之蒐亦其事也銘功金石古之銘識實然歐陽言韋意失之要亦宣王復成王之政而為之銘鼓爾走既為之論説重為追記之云禮重制器能銘夫銘自名也自名其先之令德勒之彞器而以傳世詒後孝子孝孫之事也夫人莫不有美銘稱其美義之盡孝之至也惟賢者而後能銘銘必有當也岐陽之蒐其周禮之盛歟昔者周王文武繼夏商而有天下成王幼續二王之末業三監及淮夷叛王既踐奄還歸豐鎬用大蒐于岐陽召六事合諸侯作六師程文服而簡車徒焉是納民于軌則以毋忘武備禮之大者也大禮之備由成王始也鼎銘夏也盤銘商也几杖研席皆有銘周也先王之所以昭德垂訓也石鼓以銘先王之道宣王復古之蹟也大蒐之禮比年而講不煩而就事也王執路鼓諸侯執賁鼓軍將執晉鼓師帥執提旅師執鼙長執鐃兩司馬執鐸公司馬執鐲所以辨等威而嚴節制也艾蘭以為防置旃以為轅門以葛覆質以為𣙗必有事閑之不可踰也置茒蕝設望表蠻夷守燎不與于盟重夏也仁義之尚勇力之賤示之以好惡也射御之節禽獲之獻禮以行之義以成之大蒐之備禮也禮備而銘于鼔象事也鼓于五聲無當焉而五聲弗得不和為鼓而銘尚其和也堅石無文磷之虞也十也者盈數也不顯之為德有聞之為聲先王之範後王之則也是故紀勲烈永聲名者莫尚乎銘通古今㑹名物者莫詳乎篆漠焉無联混焉無形品物昭章天籟斯應者銘詩之著也遊龍攫天三辰下燭煇光磅礴萬物咸章篆畫之工也非宣王無以銘成王之烈非史籒無以通宣王之志一舉而兼得之也惟石鼓然哉君子曰備禮者其惟成王乎能明文王之道成武王之伐以周公為之相以史佚司其禮農隙講事百度修舉詩曰昊天有成命二后受之成王不敢康夙夜基命宥宻於緝煕單厥心肆其靖之君子曰善繼者其惟宣王乎收汾王之墜緒遵成王之舊禮修車馬備器械㑹諸侯于東都因田獵而選車徒天下喜于王化復行周室中興焉詩曰穆穆皇皇宜君宜王不愆不忘率由舊章史籀通九代之書明一王之法損益就一家之學用同天下之文宣王之心成王之式銘之鼓石而法垂于後世四方達焉無疆述焉可謂上下察矣詩曰鳯凰于飛翽翽其羽亦集爰止藹藹王多吉士維君子使媚于天子又曰鳯凰于飛翽翽其羽亦傅于天藹藹王多吉人維君子使媚于庶人得欽崇豆記欽崇豆失其所從自博五寸深一寸有半首髙三寸足髙不知有㡬銘十有五字皆古文蓋商器也湯既伐夏受天命制禮器而豆作焉故其銘曰帝欽崇元祀作豆佳旅其典神天于永帝者商王别號祀其年稱旅古祭名欽崇警戒之辭也惟我祖左相之誥湯曰欽崇天道永保天命今銘文有之夫為器者必冶金兹乃鐫鏤即是數端而騐必湯器矣傳稱湯之盤銘曰德日新而此云欽崇典神天于永起居之戒交儆君臣觀古人之立言靡或不根于道人乃睹物思敬非心將安自生嗚呼美矣夫物之得喪信有不偶然者湯有天下吾祖實左右之同功阿衡于今三千有餘載豆隠而復出乃歸于走家昔邵伯在周王人之良耳聽訟一時之事何與人憩止甘棠猶不忍伐況此商之餘器吾祖有言勒焉雖其足不具完可不為家寶也後之孫子其觀器思人毋忘乃祖之忠勤而背夫著戒之意則斯器也分典于家為不忝紹興強圉赤奮若二十有七年冬辜月二十有二日甲甲商左相末孫秀宣得豆于延陵謹齊心而為之記記漢尚方劍漢尚方劍銘曰陽朔元年二月甲辰尚方鐵工臣某作紹興壬申嵗走管荆州機宻時園夫治竹簡地有得玉裝劍具還其主者走疑劍在宻令尋訪果得之按陽朔成帝紀年尚方漢工官也漢法常以月食時鑄劍供天子服用當時器物多以小篆勒銘此劍鍜鍊成之皆隸字為可疑者然漢靈器鮑氏鐙銘盡漢西京隸刻此銘字法髙古且劍匣之不銹非今人所能為也王莽解劍佩玉璏賜新都侯相可徴玉裝具劍漢世侯王之所通服朱雲借成帝尚方斬馬劍僇佞臣張禹亦可以想知當時尚方作劍之利是劍雖非成帝服御要亦斬馬類也走初買劍以同幕李子都父剛正好古學知漢𨽻出使騐視子都彈劍咤曰此劍可以陸斬牛馬如安昌侯者鄙夫陸陸何用齒吾刃乎今屈指十七年子都隔在泉壤撫劍銷黯視几案間所用銅雀臺甬瓦舊研亦子都見遺淚涕霑臆拾其遺言作記新作祭器記有國之制祠事覃于縣者六春秋用事者二嵗凡七祭孔子在廟社稷風師雨師雷師在壇勾芒氏為位著為令甲令長主之齋潔以祠神答如響俎豆尊罍必有物交于神明必有道肇自干戈搶擾隊禮相循鄂縣祠神䙝器而已聲容文物非復舊章君子以禮先民無大于此孔子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉玉帛鐘鼓之器是豈禮樂之正與禮樂之情斯焉有取釋是而觀禮樂吾不知之矣是則豆籩簠簋之用果不可虚于以備物致材振修逸典攷文制器合法應圖銘諸俎而為之記辭曰惟皇帝紹興三十有一年某月甲子武昌之長臣昧末區東薛某祗顯相寅恭祀事率時國典作于兹下邑禮神洗一尊一罍一皆有勺簠簋十籩二十豆二十有六爵二十坫十有二俎六盤二罋四篚四用實嘉薦以享以祠將永實爾後人典祀無疆其栗粤以中秋釋奠于先師孔子用充庭實春秋之禮徧于羣祀俎豆有列酌獻有儀我不敢知神之肸蠁祭神如在其庶㡬乎周文公之頌云籩豆有踐孔子曰俎豆之事則甞聞之矣軍旅之事未之學也古之君子修禮于廟堂之上而德教加于百姓普天之下無思不服萬世圖攷其遺法不敢一日而廢豈他道哉旨必有在君子于是乎觀禮禮將不外是矣呉太皇帝廟遷造記今皇帝即位之始年制詔中書樞宻以太尉殿前馬步軍都指揮使成閔為京西湖北路招撫使俾擇地形便置鎮戍守太尉臣閔奏武昌呉孫氏都㑹際江中流居光蔡之衝實為江浙外蔽地饒水草便于輸運宿兵當有根據臣謂出師戍之宜遊奕軍統制軍馬臣王公述世將家沈鷙有方畧可任以重請以其軍先事戍武昌事聞召對某殿命坐從容論㡬事合旨厚賜而遣之時某假令武昌為列壁于灌嬰之故壘壘南有安樂宫故址即之以為射場中場有呉太帝祠久廢弗治僅存蝸舍廟貌傾頺王公好學知古今常慨然有廓清中原之志乃飭士馬礪戈兵必以身先之不憚勞力士亦便安其政師律以和既而歸功于神曰斯呉之舊壁也我仍其故師安焉豈太帝神靈陰隲我后樂制置得宜所致然哉且人一飲一飡當知所自思其人猶愛其木可居其地而不知經始者乎且神祠在吾射場飛矢日流于右雖在神無射于我安乎于是即宫北墉求爽塏之地而奉神其上雖祠房函丈而棟宇深嚴自一階除一忩户以至奉祠之具靡不親為料理求所以為堅固永久者又作下舎居祝俾供灑掃之事曰斯可數十嵗矣若夫斥廣修増壯則有俟乎後之人寢成屬走為題其榜且書其事走按祭法法施于民則祀之惟太帝經理是都為今成憲且其功烈實有加于武昌之民祠于武昌合乎祀典而王公不忘太帝之烈走知其事上必忠視新廟之規模知其器度宏逺私喜朝廷任寄之得在太尉公為知人勉為濡毫而又鑱銘于石銘曰袁山蒼蒼楚江環回神所安兮熊羆鼓鼙經營洛師有前規兮奕奕其宫肅肅其祠誠感至兮椒酒蔗漿牢肥黍香永無終兮忠顯王廟復薛夫人像記走讀五代雜説于周世宗知劉衞王之闗弓命中徙座當之謂有英主之畧衛王識天命之有在至于投弓折矢而氣不為少挫見其忠臣之誼薛夫人割子之愛不以汙劉氏之門卒斬成喪慥慥乎士君子之行賢德參㑹並行不悖逺眎牧野首山之盛孰謂衰世之無人哉初衞王死節壽春世宗追詔崇奬有曰姓名忠于所事抗節無虧前代名臣㡬人可比朕之南伐得爾為多復壽之忠正軍曰以彰君之節唐元宗尊寵封爵而酹之曰神而有知受吾命邪歆周惠邪其夕夢王拜庭下若奉詔然嗚呼王之忠昭昭矣世宗仇也為之褒稱動色元宗君也至死知之不盡賢不肖之相去其間不祇相萬此仁人志士所以起莫知之歎也五代詎今已逺故老無存惟王城守之勤事多遺落至其死官之烈周典實大書之雖與日月爭光可也若薛夫人之懿姓氏不聞于人稗官事班班焉以故知之者鮮走甞謂天性之愛在古壯夫烈士有大義不能奪者以霍將軍之忠斷于此不能無憾夫人滅親之地其處之綽綽然申令軍門有以嚴閨閫之制退而成服不失母子之至情士君子之中庸夫人㡬是矣名不昭于當世豈不傷乎走甞追緝五代遺書恨不得夫人之姓夏初將命賑荒驅馳淮右覽隳城之延壁眺御砦之故山既已懷古思人拜王之祠得夫人之姓于麗牲之石其有獲于我心者至矣尚恨新祠之作夫人之像設不與存焉屬郡將高公以忠臣子世不忘君受知出守槖臯邂逅因以其事語之公甫下車以奉安告且屬走記其事走不得辭媿不能文直書其意而已高公夔其名也觀公政之先後可以知其志之所立云乾道壬辰下元記克齋前記克齋之故名曰損齋損齋損私之齋也仲尼稱克已復禮為仁老氏謂為道日損人雖不同言理不异今夫人之生也涵虚而無體曰命通一而無方曰性命不易也性不逺也物其故有也道亦其故有也耳目為聞見奪心志為利欲移然後私意萌公義隠迷惑失道貫習為常其故有盡亡于是為小人伍往而不返則將與飛走俱日逺于人遂不可求諸人域收心正性故聖人貴焉今人病之切身孰不務亟其去習非害性之為人患不切于病乎人知病而不知非聖人于是乎不作仲尼展跖其元顧不同邪仲尼貫一以明之道師表乎萬世跖也違之不悟天下號名大愚猶之水然清明自其本性埃塵渾之以濁本性固存定而澄之則為清明也于其元奚辨人能去惡以復性又何讓于聖人哉皆知弗為者非他私奪之也走生二十有三年矣日聞道于聖人之書然臨事輒失其情益知勝私之不可不務是以攷之大易取損卦以名書堂曰損齋以為居處期將齊心窒欲反本歸仁日革非心庶乎盡于此生也損益盛衰之始敢即以銘之儼若思齋記并銘混焉曰太極形而為兩儀天地位焉萬物育焉布列森羅罔知攸究向之所謂太極者宜若亡而故存故能化物無迹觸感唯應孰知其所以然非至静曷能與于此夫人之為物萬物之靈也頭足具天地之象知識出事物之表誰使之然有道主于内也昧者不固其本疲精神而它求孜孜焉汲汲焉唯恐或遺而遺之日多患于忤物而于物益忤此無它不知所以用之不能盡已以盡物也聖人傳心之要豈有它哉亦惟吾之故有是歸是體而已吾支行父子車子所謂養其大者之人也以為道不逺物萬物豈異于人必欲周知物情没齒將恐不既莫若反求諸已即聖人毋不敬之語行之自誠而明將以盡其性合德于太極安居壞室寂寂窮年外則淵如塊如不言不笑雖記云如齋如尸殆無以異非唯此也亦能處衆于喧閧之中雖撓之萬端卒莫以動其静比其言也復無逺于物情使遇主而見之施為將見其有不言而化者矣甞以其事告曰禮始毋不敬儼若思安定辭而後安民哉蓋本于正心也心正乃静静而定則浩然之氣為吾體體此則心烏乎動道烏乎加死且不移況于小屑利害以之窮理理不吾畔以之推物物將焉潛故古人務在至誠治人其餘事耳我欲事斯語勿失用名書堂曰儼若思齋子幸為我記之走于行父為知已不可以辭即叙其語而為之記夫齋之為言齊也謂齊其心志也心志一而無適則太極不逺物動静無或遺故曰清明在躬志氣如神無為而為莫能臻無思而思亦莫造雖一身至尠大而天地不我過與夫馳神于外物役其志者可同年語哉然其狀則㡬是曰儼若思齋顧不甚得如久于其道則其來者將何如耶爰為之銘銘曰乃躬在是乃心在彼逐物忘身烏知天地心君中立寂如太虚形神不違齊莊如愚或之其它或誠于敬望之不分道有奇正克齋後記始走以損名齋記其命之之意既三祀矣友生有至自錢湖者道其所聞曰上方作室禁省謂之損齋窃甞睹齋記闕堯文詢之于人良是也小臣矍而慨曰聖人與我同慮哉夫人道道而行是則人所共有聖人先得我心之所同然者誠足喜哉禮貴賤雖不嫌同名而天壤一號不可也假名存而毋害亦不能一朝居也思有以更其名而未得已而知所以自解曰天道人所共有可以君為道而置之哉仍故名而不安亦辟之而已爾君臣之學自有辨又何疑焉于是即記以求名而克已復禮之義名齋曰克叙之以續前志曰顔子問克已復禮之目仲尼告以非禮勿視非禮勿聽非禮勿言非禮勿動夫仁者人也仁之道謂人無之可哉唯以物遷是以去仁而不省聖人戒慎乎所不睹恐懼乎所不聞動容周旋中禮不違于終食之間物何自遷是以仁浹乎四體夫如是乃盡人之道顔子之所以拳拳服膺而毋致自失具體而微者也學者以顔子為凖繩于此豈可不務走細人也固不可以希聖然知仁者人之道則吾之道也吾雖失道將可自絶于人克已歸仁何敢緩也顧走之失有不若人者八焉聞道而未之能行一不若人也放心而未之能制二不若人也處已而未之能盡三不若人也多言而未之能法四不若人也樂善而而未之能擇五不若人也愛物而未之能容六不若人也居世而未之能處七不若人也任私而未之能去八不若人也凡所為不若人者皆性天之所無有從欲而得反身而未之能善有一于此不可謂仁況有其八乎弗亟去之無以為人矣及今能以禮自克率性而知道哉或庶㡬乎可也為詩銘之以自警云穹𢎞地天灝灝無垠唯道參之粹焉者人人安其仁則惟聖神往而不反曷為其身循道而行無事于勤出入無時乃凝乎真勒之銘詩請法先民絃歌堂記狂生之治武昌有堂以休其燕處命之曰絃歌或詢其名以絲聲問者曰吾不識操縵安知琴瑟然則永言將何若曰吾不分清濁安知聲調是則此堂何以曰以臨官臨官古之道與曰吾不知其今古居斯可得矣居而視其實則其邑之所為設無非世俗之政胥徒皂隸充乎闥傳别質劑盈乎前條教在門賦財在帑所聽者獄訟所問者催科汨汨營營無或絃歌之事或者愀然不説曰異哉子之政斯亦妄人而已矣雖然猶有説也之子曾不是聞乎太古之治有樂而無聲琴而無絃者以身為器以心為律建之以太極制之以中和翕而作之皦而純之繹而成之八音克諧律吕斯應動天地感鬼神有生之類無不獲者矣夫如是也絃歌之事可得而畧也中古患不得乎此于是乎有樂經之教中和以節其内音律以宣其外弄之以器聽之以聲琴以禁之歌以訛之非辟之心無自而入矣仁民而愛物未有學非是道者今子上無得乎彼而又此之畧疲精神于刑政不求諸内而于簿書期㑹之間役役焉謂其堂曰絃歌吾不知之矣狂生曰吾過矣吾過矣所求于太古之道則吾未能也中古之事吾何足與聞之苟居今之世不變今之俗誠其意正其身愛其民律其吏明其期㑹察其簿書謹其貨財時其徭役上無沈蠧之失下無非横之征無情者不得盡其辭窮民為有所赴愬耕而食織而衣用不犯于有司禮義興行于下四封之内民吏各安其所居一堂之上而民弗吾罪仰不愧俯不怍憂不患乎失職則絃歌之事其或庶㡬乎若夫興禮樂制田賦一風教致和平吾無事焉有天子之職官在所求于太古之道吾未能也中古之事則吾豈敢吾過矣吾過矣由書為之堂記松風閣記郊壇岡陰郎亭之麓精廬左闕松風之故閣在焉初涪翁復自巴中訪坡公之逸迹裴徊九曲信宿松下嘯歌成韻因風名閣閣磐箬谷俯寒谿臨灧瀲之淵睨萬松之嶺江山浩渺吞吐風雲引領而東縹緲萬象故雖空谷之内逺瞻無不屆焉西山多奇此景為最日者松林茂宻中燼于刼灰松風之名猶以人著主僧作新軒檻請走記而題之惟翁學行文章固已播人耳目頌述其事非所敢為聊叙閣之廢興與其得名所自登斯閣者詠涪翁之句眄西山之景指顧斯得自應不改其舊召棠孔柏曾何翦伐之有哉松風颼飀當蓬然起矣夫然則蒼髯之木安在乎閣之成壞信能種松木萬本來萬壑之清風追舊觀于來今亦西山一勝事也好古博雅之君子將有意于斯文新作殊亭記武昌之西郎亭之首有亭巋然而髙超然而逈者縣大夫孟士元之殊亭也士元為令武昌才兼政迹作亭殊異有聱叟之漫記焉唐之刻文磨于俗令亭髙記古同永空山其所以為不亡者抑有其道武昌古都也遊觀之迹往往而在山川秀異觸處皆有走初易殊亭之邇未之甞問泛然一投足雖湖山江沔顧見古人俛首内觀則亦有未能見殊于世者甞謂為政法古猶宜繼古人之志當其事任漫不加理使奇人舊迹堙没自我其政為可知矣庾公南樓猶虚成于江鄂之郡殊亭偉觀故不可堙諸草莽也以亭居澗飲寺後爰命主僧作而新之斥廣舊基粗為寛大建以九月甲子以十月甲子落成聊記載其嵗時用見廢興之自至山川之殊狀遊眺之殊極則次山之記在誠臺記武昌牙堂之後架有隙地數畆自更世俶擾廢為汙萊蟲蛇麋鹿之與居莫有一顧睇者走尸縣數月始命疏而闢之樹之以修篁焉誅茅薙草恍若有得邑堧之下披隴如臺矗然天成不畚不築下顧城邑居掌鞅間林山蒼蒼環遶三面青蔥蘸碧非圖畫可擬寒溪辟暑之臺殿纍纍然墮吾目中真呉楚之奇觀也武昌鄂故地在魏為呉孫氏别都東晉為江州刺史治有隋徙郡而縣英豪雋偉之士居是邦者不知其㡬人也以仲謀之雄傑元規之清尚次山之文翰而猶無得于此予何人哉于斯有見則天之所賦于我者不薄矣可不敬之記曰誠者自成也而道自道也故夫斯臺之作豈人為哉命之曰誠臺焉明自成之義也其銘曰凌雲已頺嚴瀨殊異如何此臺天乎自成寒溪堂記寒溪堂舊址在今堂西北二十步之路隅面莽依山環為牆壁草茅翳塞僅給將迎遊衍登臨蓋無足尚走到官之始亭朽而顛㑹要之途送迎無所于是鳩工命役更作新亭以為寒溪之名為斯邑望而堂不稱不亦虚乎乃從主簿亳黄君邦俊尉番陽王君相躬行相宅縱步溪干旋反求之得堂基于髙岡之上火茅殺竹不築而成東望崇丘逶邐相屬嶔岑嶺岫聳翠相遭避暑之宫九曲之嶺髙低隠顯如㸃綴其西南江水重湖西北時見寒溪在下樊山處西肇建此堂適當其㑹四周曲檻不設門墉制矩從中弗侈弗陋勞來送往眺望遨遊凡今之人唯意所適蓋已西則就下秋夏或淪于水稍北有地可闢春冬取道又迂則又斯堂之為基後來當不可易贈行折栁雨雪來思如得其人安知不為他日武昌一勝賞也紹興上章執徐嵗孟余之月記勝亭記江出岷山沿流束于三峽放于雲夢之澤吞洞庭之水納湘沔而東之至樊山而少折樊山之址得古鄂城為呉孫氏之故都其地前左水澤右背山陵青嶂澄流映帶環合如屏如畫觸處清陰荆山而南一奇觀也由縣而北有亭峙于岡阜不知誰何氏所作世目之以勝亭焉遊武昌者入境而改視入邑而改觀其山川之秀麗原田之沃衍固已甲于荆楚或不可以名狀至于登勝亭窮逺境觀江流之汗漫望淮甸之平夷右西塞而左東坡泛中原而涵大澤淮山如拱蹲踞參差郎岑西來重岡數疊龍蟠釃水聲如佩環旦夜陰晴雲霞萬狀自冬徂暑葭葦黄蒼雪月之明光景物之變見紛紛擾擾有不可得而齊者内觀其邑已覺天壤之間天下江山之勝其孰能尚之走始欲更其名而不可聞攝令程鵬舉甞請書于楊退翁運屬于是取榜懸之且為之記昔孔子登東山而小魯登泰山而小天下遊勝者不㡬于是乎正已堂記誠臺以北得射圃之舊地帶江面嶺据岡阜而極坦夷真武昌之形勝也自中興偃武徹備諸城汨没苞蕭非復往意乃紹興己夘詔書閲弓兵武事于是邑尉番陽董君經之營之番陽王君踵而成之張設射侯創新堂陛適走行保伍之政因命同僚落焉王君為堂請名走命之曰正已以為大人正已而物正射法于是乎取故正已而後發失諸正鵠則反求諸已至于升降步武揖遜威儀一本諸躬用能不爭古之觀德者以是厥有旨哉孔子曰吾何執執御乎執射乎吾執御矣是則射御之旨萟寧足以知之古者寓兵于農非徒教戰而已射御之法使人知之知正已以成身則天下無事矣武昌當天下孔道南隣大冶豫章北而申蔡蘄黄為姦人盜賊之淵藪有文事者必有武備今亦濶矣王君與走之為此蓋將發政于弓兵聮保伍之民遊于此學于此閲習于此以自成于此由正已而格物其庶矣哉艮止亭記説卦艮為山為門取象不同同歸于止故曰艮止也萬物之所成終而成始也是以大學之道在止于至善禹曰安汝止惟動丕應徯志止之為義亦大矣天不止則不清地不止則不寧人不止則不行物不止則不成天地萬物必有止而後誠也知止斯静静斯安安斯應安身應物萬世不易之道其唯止之云乎法像于山不㡬于是鄂巖邑也枕山而縣郎亭樊阜西南而來西北而止重岡復磴曲折委蛇自下而髙不知其㡬叠也翔飛之勢萃于牙庭止于誠臺之所舊通徑路為之閈曰山門下直誠臺趣乎射圃徘徊轉眄無限青山修竹蒼蒼映帶官栁廢而不治茅茨塞矣走為危亭四礎弗侈弗庳小徑依然其門不改周遭設檻以適登臨即之可以闗去來閉出入居之可以極遊眺共賦歌景物風光今後庭之極止也中外有適何莫由斯唯天地萬物之生成未始非出入于艮邦畿千里固惟民之所止也縣成天子始終之政可不知其止乎占經卦而命之名故亭名曰艮止庶㡬厚終于敦艮不為外物而遷抑止躬之誼也後之君子信能不改斯度以觀象乎兼山動静惟時思止其位用光明于是道不亦善乎梅廡記武昌尉寺舊無憩息之地退食之次燕伸無所番陽王彦材作尉此邑始即其堂之中廡少加葺堊闢其夾砌樹梅焉命之曰梅軒以便安其退省而請記于走曰梅嘉果也吾取其實珍其味其花芳潔雅淡吾髙其致裛其馨香故名尉之德稱者宜莫若梅子真吾慕其為人相吾名也又梅之别則夫花樹之植吾庭砌者唯梅為宜名軒以梅其誰曰不可走曰公言得已而未之盡也夫梅之為物非其果之尚也窮冬澟寒怒風號雪凋零百物竹栢猶瘁此木之常也而梅花于是則其操為可稱也芳香婀娜門綵凌霞以豔相髙以荂相軋此花之態也而梅齒香潔白之為素則其德為可貴也木無不實無實于果甘酸異味適口一時此果之材也而梅有鼎羮之和則其用為可重也德純而不二恬素而弗矜四時一是華實相當古之人有合于是見覽于後者非子真而誰歟斯焉取斯公比德于是矣斯廊也而謂之軒斯名之未正正名梅廡昭示後人與公臨廡之梅名德俱稱茇居翦伐之戒非甘棠比矣彦材唯唯因書榜而為之記浪語集卷三十一
