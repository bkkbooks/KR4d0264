body:
  text: 浪語集卷十宋薛季宣撰詩送張漕還停舟樊港訪退谷送客過樊溪停橈退谷口不見元次山靜立躊躇久巉嵓兩石峯猶疑入户牖杯湖正宜泛堙塞僅盈肘糞壤瘞杯樽勿復堪貯酒扁舟泛然者長歌挈敝笱浩無風塵意將恐是聱叟自知干進客對面弗敢扣從之人甚逺慙顔為之厚武昌非昔人望絶不得友它時賦歸歟湖谷定吾受此心介如石自誓何樊毋登怡亭故址江濵篆真石渾謂有神畫閒作故亭遊心知古人迹竹疏徑微通天逺荒自闢長江浩無涯滄溟贏咫尺行戍西山徒步抵寒溪寺杖履竹林遊陟降西山道匆匆不是閒倍覺寒溪好潭魚戲憑虛注水喧幽草埋荒古人迹樹伐庭如掃桴鼓又相聞我心為之懆感事潼華覆哥舒陳濤僨次律賴有李猪兒發憤扶唐室長城賢已逺惟嶽峻方崇借問南朝事江流第一功陪劉提㸃遊西山我家西山下早晚空翠滴漫仕鄂王城西山悵難覔不知寒溪上好景天意錫舉趾異川陸千里共岑寂丘原動歸念魂夢時歷歷東吳賽甌粵信美心愈戚古見似人喜鄉聞今有覿且作西山游笑顔欣自赥送中司抵巴口將迎苦不易浮沈良亦難櫜鞬候使客無時弄江灘上磧下南浦風雲怒濤間一葉舞軒昻五水戲觀瀾朝湖暮淮西此遊今等閒看盡楚山碧信宿相與還晴巒挂天衣水石鳴佩環輕舠蓑笠翁勿與人事關相彼塵外意心清緒為闌何時買扁舟從公看潺顔病起蒸鬱斷梅天薰風故微細夢春今已度避暑如何計樹老山一色蛙喧草無藝病興意愕然到眼多蕪穢晚雨朝霽林端煜然望之皆寶珠也戲作四十字晚雨在林麓朝來弄晴曦瀾翻漾明月粲爛生摩尼撒殿固無事雨天亦何為少須風景麗去去將安之賞雪晃朗長江北天地都無色扁舟撑短蓬一鳥歸飛亟遮莫凍凌兢如人酒量增鼇山不是照天地一明燈二十五日雪裘褐透膚寒刺春將半雪作絮花飛滚滚攙零亂天地合清明虛極浮江岸鳥窮棲樹端走狗欣跳攛埋路已旬浹四野都瀰漫郊行峭無跡惟有神光燦茅簷過尺摧爐火生無炭凍死未能詩達人方大觀和賈簿雪早起怪吾廬去天才一尺始疑大朴還掩盡几陳迹比屋皆可封列地班圭璧照我爛輕明却似初出日仰頭不可見恐是老鴉食擬倩玉川子叫閽聞帝席穹壤合為容事乃非人力心膽為之寒且退然枯荻曲身今已直促織休唧唧此意可告客苦乏鄭莊驛履霜至堅氷何當介如石鵓鴣有逐婦相從如娣姪飢蹲苦樹顛到夜無入室自蠟登山屐借問何所適我亦無所適皓皓期太乙庶見太昊氏鷁視剖我臆黃楊生拳石間王彥材以為贈且賦之走命曰孤山真幹次韻以酬孤山有真幹不比尋常木蟠根怪石巔亭亭自生育百物進相高位閏知蹙縮散葉傲風霜樛枝外林􅈪琴桐嶧之陽逍遙兩俱足夸父徙我庭如仁示其目股掌玩何言遂可移風俗夜深為問夜何其明滅燈將半雨雪濺聲繁霆電流光爛初筵向闌珊遊子紛繚亂誠知宴樂娛不怕泥塗漶齊居靜無他天德全弗畔吟徹借笻頭假山餘一爟偶書天公不好事月夜雲埋月遊人且勿遊辜負良時節霖霪漲塗淖雷電騰飛雪蓮花燈可憐對明不同滅中秋對月戲呈覔舉諸兄君不見決明混沌江之湄含胎吸月懷清輝圓淨唾將珠與璣又不見明視中原雲月靜跳擲回旋顧形影生兒往往皆毛穎由來逐物未忘機勞生吞吐知惟時觀美為人奚以為獨坐金風塵慮省皓月斜河星耿耿草頭漙露侵膚冷平生不解飲和歌無人對月醉顔酡月朗清秋奈月何睡思朅來剛引領林岫參差弄光景不知月已沈西嶺開窗溽暑欲成雨密雲猶在郊開窗挹涼飈逺山見林梢木葉已成陰野鳥鳴啁啁鏡靜碧池湛清泠無混淆㑹意紛萬途錢荷貫叢茭寂坐一堂上默默神明交子規恨風篠扣吾扉有人來我語語好不須多都不如歸去開門我見客客子今何許竹下得流虹人言為杜宇杜宇昔王蜀不自安當寧相歸密淫遊微行時踽踽蛟龍失水困哀怨成飛羽規名釋爾雅兹事則然否揚雄蜀本紀望帝亦賢主仙去正啼規去思傳往古不妄信斯言王去非輕舉蒼天悲此民故使規聲苦脫屣感斯意八極歸客與到今惟一人後躅追無侣所以百世下直指不得數聲盡斷以血空教瀝肝腑其然豈其然臣事君看取聞齊安雜詠板成從沈守求印䝉以為贈車犬縣西南弦子國使君昭代文章伯氣吞雲夢納東坡心在江湖輕赤壁月波蕩漾春山色峥嶸洲草芊芊碧政平訟簡暇居多杖屨逍遙神自適到眼風光看如畫罨畫溪千舊遊者高亭矗立畫不如坐嘯雲屏自天寫使君好客非春申一憂已足無餘人哦詩五百盡清警立使江山景物新江山景物古來有前賢相與天長久近來百草漸埋沒賴有此詩為一剖使君好善人如已鋟板巾箱波逺邇良知何獨此麻城天下行聞為商起我拘官禁儃杭葦跋望亭高衣帶水高唐想像賦神遊遊客言詩詩信美空書從學穆清風得見異書人見同解嘲不用潘邠老只在先生指顧中永嘉行夷甫清談平子醉晉俗浮虛輕節義都城萬戶哭桑林九伯五侯無一至洛陽宫中塞馬嘶晉家天子行酒巵驅出如羊晉卿士婦辱面前爭敢知勢驅威逼入軍營不許紛紜但含泣刃加頸上始知憂追悔前時又何及烟塵坌起昏中土人死如麻骼如阜草萊萬里無舍煙健馬明駝自來去烏旗霧合邊笳咽無援邊城斷腸絶琅琊匹馬竟浮江弃置存心堅片鐵回思昔日昭陽殿九鼎遷移如轉電禁聲不得悲楚囚白版金陵謾龍變數奇督運淳于伯誅斬無名血流逆若思不識是何人却使帥師臨祖逖雪中送客寒溪堂前年送客寒溪堂桃李璀璨寒生光今年送客寒溪道滿望六花形欲槁前嵗今年時不同同為送客溪光中寒光山積都相似誰信冬春長有此廣寒宫殿不勝寒世界瓊瑤無乃是如何名此作寒溪炎天風色鎮凄凄不緣送客不易到送客情懷將何為君不見瑤池高宴非不奇穆王猶有賦吾歸可憐可憐甌越湖山主厭向黃紬聽衙鼓鬭鴨能言名自呼子規歸去啼聲苦傷情羈鴈却離羣適意馴猫哺相乳端是三年貧客官方春定得離南浦假山次葉師文韻大隱城居無世喧疑超塵外非人間武都聊試五丁力一笑天公為解顔翠蘿散作麻姑髻枕潄從宜長飯毳青山元自野人物版築徒然飾東第無論千假須一真坐對北山南起雲一丘一壑丈夫事安在窮遊探古文平生樂處天其假還視王功猶土苴它時買山歸敝廬定須作屐隨高下蘆花秋風摘索鋪寒雪敗葉枯條互明滅淡蕩閒塘搖夕陽橫斜斷岸凌高節無言咄咄日書空執禮拳拳意綿蕝望極氍毹鋪糾結漁歌何處聲凄切栁絮駘蕩風光將欲暮柔條繫日縈非霧寂歷閒庭芳草路眉開青眼多情度脈脈依依愁不茹欲翔未定邅容與體輕委脫韶華去飄泊晴天離又聚高低上下當何住捲春匪蹴毬先赴小院深沉鋪月素卿雲暗逐凌波步朴樕追隨無定處氷霜峭覺為寒沍梁王有客能辭賦蒼涼雪苑知誰訴浮玉神山攻寶璐屑屑虛花奈憑據還思道藴驚人語香棠舊說海棠無香惟昌州海棠有香驗之蜀道信然以為不易之論樂圃有棠三本其花亦香乃知非蜀棠獨香香棠自有種耳世間元有無窮恨海外棠花宫錦爛燒炙東風春未半濃妝獨立情繚亂博山爐冷沈煙斷記語洛妃池側畔袿衣透濕飄香汗舞罷霓裳高燭看吳苑散花灘彼岸亦有當初舊遊觀棠梨古徑霞光燦薔薇露冷衣新盥袖卷燕支紅入腕噴人蘭芷芳都貫天然種性珍奇玩嶺海誠知煎可爨擬擷柔柯燃熾炭裛取緗巾永傳玩它年留得重公案浪語集卷十
