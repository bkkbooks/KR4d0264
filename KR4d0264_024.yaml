body:
  text: 浪語集卷二十四宋薛季宣撰書與鄭景望一自聞拜佐著作之命嘗一領教筆并蒙遞示劉復之書似非仲舉家奴台翰恐未之得使還又拜手札慰感良甚啓沃微意略蒙見教多感思之誠切時病十寒一暴將何以哉願勿以未聽而惜吾告猷之心誠所謂逺者大者必不可進乃謀鴻鵠舉耳復之眷眷吾屬此意良厚何物濫吹竽于其間似未之思近於目聽而耳視也夢叟方在艱棘不可得而進退忠父已決不為赴調之計然其才力可惜弃之無用有可致力為求試縣亦可若使其人少得自見雖未可以語通方中道以臨民事當有實益剸治繁劇寧能碌碌如我輩耶祠祿彼固不屑取之猶可與計資考别難插手則乞自為圖之巖老既熟其人能為之前却否某告毋復置之牙頰必恐上纍知人之明中心豈不自知何當詿誤師友胡氏表姪一蒙與進不能嗣造几格此其好善未篤甚乖乃父所望後復相見丐以此意語之彼家甚貧頗勞應接如有可就賓館得為宛轉經營為幸陳頤剛比相會云曽屢拜書都不揮答何故便間望報以一二字戒以事勿輕舉凡百寬裕沈審必令內外無間為貴君舉已罷茶院之會見與其徒一二十輩聚課仙巖嘗與之言似乎成已工夫全未著力勉之甚相領略此亦樂事但未知向去如何爾下問淮壖設險之說某知之未詳地網所未之聞張師言瓦梁堰記聞而未見然聞孫氏割據作涂中東興塘以淹北道南朝瓦梁城塞後湖為淵障蔽長江號稱北海大扺淮東之地沮澤多而邱陵少淮西山澤相半無水隔者獨邾城白沙戍入武昌及六安舒城走南硤二路耳古人多於川澤之地立塘塢以遏水溉田在孫氏時盡罷縣邑治以屯田都尉魏自劉馥鄧艾之後大田淮南逮南北朝增飭彌廣今舒州有吳陂堰朱光呂蒙所爭皖屯也陂堰皖水廬江有七門堰劉馥斷龍舒水作巢縣有東興塘諸葛恪作遏巢湖水滁和州六合間有涂塘吳赤烏中遣兵十萬斷涂作塘於其上源今梁縣界至滁揚城晉以為南梁郡南唐於滁水上立清流關瓦梁堰有東西瓦梁城晉置秦郡而治六合周顯德三年南唐何延錫建言堰五十四流不止魚三州泯海四百里其實据天經絶地緯功未就而罷景德元年毁之天長有石梁堰源出滁州入髙郵為樊梁溪梁置涇州髙郵有白馬塘塘阻三何溪謝𤣥破都顔俱難李孝逸破李敬業處揚州有召伯埭謝安堰艾陵湖作新城在其上裘塘屯齊髙帝建武五年遏艾陵湖立楚州有石鱉塘鄧艾作荀羡復屯謝陂漢舊陂洪澤屯唐大厯二年與射陽湖並置官屯射陽湖即射陂也淮陰有白水屯盱眙有破釜塘鄧艾立白水塘與破釡相連開八水門大業末破釜塘壞水入准白水亦涸安豐有芍陂即孫叔敖所作期思陂漢王景魏劉馥鄧艾晉桓崇祖皆修復之首受渒水西道六安北界騶虞石東自濠州之南橫石水皆入焉灌田萬頃固始有茹陂劉馥作是皆古人屯田遏水之迹其餘不可記大要六安以東有芍陂之險鍾離以東無非湖濁之地西自皖東至揚則多斷流為阻故自前世征役舟師皆出東道如吳䢴溝魏廣陵周鸛河等率資􅋣水之利南北所通行也惟廬夀一路陸有東關濡須硤石之厄重以陂水之限東關恃東興塘濡須恃濡須水硤石蔽皖准南有兩硤石此桐城南硤夀春硤石在准水上最為險要然聞芍陂可以灌夀淝水可以灌廬南唐何敬洙嘗復諸塘不克而罷其間必有利害尚當詳考前聞面對及此心知其是竊思如此力量能辦如許事邪如合復之所上民兵之䇿専以刺舉兵權還付方鎮使之自治財用多置水寨以屯田民兵守之有警得以發兵助獲如唐故事民兵蠲復制度略依陜西弓箭手法秋田既獲因就糴以實邊始雖暫失少少賦入數稔之後利當百倍於今責任不専則無可成之理方今經制西蜀以奪帥權為是此等議論定空言耳因問之及謾詳及之議創水虎翼軍然似非國力所辦淮南民屯若就又於松江肄習水手為之重險雖無水軍亦得事不難集在乎斷不斷耳論經總制錢減額竟是如何舅氏方在版曹可致力否立後事久不報衆甚苦之近樂清縣括水死家田不以葬送立後皆欲官收一嵗州郡倣之而行前日所陳能為營使之必下否官政略背如此無亷恥者爭以􅜙敓相尚思昨所以語劉正夫者言今驗矣無端好與人事亦吾人一病也與鄭景望二自令季去由拳附一紙記後無復便聲問殆絶然而依仰音教未嘗不在几席之下也兹承寵膺綸命綱紀王府佐宋太伯蓋極一時之選可為儒者之榮敢以為賀然聞以國遜易處閒靜難非漸漬以仁義之指歸俾知所自以樂優於天下之樂無以見輔導之德以丈老於聖人之學茲蒙聖天子託子之寄廟堂遴於宮僚之擇誠可謂當人之舉某所見如此不得不告遼豕入冀當不免大方之笑也某亡似之迹窮處異縣遂不得親賢師友之教誨撿束之道不敢不勉小人之質終難淬礪狂奴故態往往厠間勃豀加以貧病交攻婦兒婢僕之間數歲殆無寧日所養不厚又殊無以敵之誠負君子之門愧心極矣命召審察四辭遂不復來今逼瓜期乃妨交政近有丐祠之舉未知廟堂可否如何蒙子詩兄教以不當突然有請于朝顧聞之遲矣意者以久不報終任之請只得以祠祿扣之終任之求亦不敢絶瓜戍既逼未為無為雖有下釣之嫌有不暇恤矣又復困窮之極為之奈何萬一丐祠得之固不辦挈家計且謀單騎歸省邱墓亦一幸耳春夏之交景物清暢板輿迎奉在棠棣間有無涯之樂但切歆羡陳君中補之後牢辭學職不爽山陰書社之約處之極是劉復之大可悲念天不相善如此極邪念欲一書慰問其兄竟不得寄每作交逰之問未嘗不吁嗟悲咤痛悼於斯人也丈在閩中門庭之廣得人有幾疏以見教何如與鄭景望三伊洛遺訓某舊苦其蕪雜嘗願博求㑹萃備一家言顧非其人所得未廣用是不克茲蒙鑱本印賜知有先著鞭者且喜且愧書雖未暇紬繹如明道語世不多有至於長編纍軸足知所得之富鞭後之意不敢不勉頑頓不敏何以副期遇之厚邪某無似今亦憚於復進去嵗辭審察之召匪以為異卷卷之意特欲少關閶闔之內退可遂吾所欲進或儻有所濟諸公不之察也而督促踵至淺中狹隘頗覺厭苦拒之既峻久之寢不報矣比以南沙逼戍不免為之官之請懲創前事并以祠祿干之報章之來不過復伸前命自惟愚鄙無以取必當塗之聽閉關泰甚且駭道路之傳因謀强顔一行兼以世母仲姊之喪告矣趨朝當在夏秋之際其在我者敢有不誠庶幾改之夫誰不願以術業之淺陋冀障河之必東杯水輿薪知其必無事也但苦家貧久客未免祿仕反復忠父行藏之誨愧赧極矣踵門求教深所願欲兼單淺所未到亦欲有函問之請與其進也台意誠厚得蒙於六月半前假以役兵數輩當卜假途干簉遂此願懷而後取道德清以至都輦有如行人歸告之晚不及此期某業以成行不容遲遲之甚茲恐不得留俟即乞已之京尹之拜振古所無令弟新除不相妨否有不克見必須邂逅錢水與以為慰答景元書下問辭命所以非有深意直緣前對亡狀再進豈能有補信如昨者傳聞之過不過以人言知我用綿力當重任芻牧之求不至辭之近於辭難黽勉居之空死何益生命之衆亦云大矣是雖不當先事而避然亦不可不豫計于未進之前舅氏之出未行右揆蓋嘗諉以専人見三命不來之意仍許不循前計令人滋益難處遂堅辭之三旬促召不來定當如所請矣量力度德天下事要非吾人所辦蚍蜉撼樹真不自量某今者之辭猶欲一感聞聽諸公苦不持上將如命何可繼之說敬當佩觿夫學固欲行焉能繫而不食苟免既非君子之節不能不止亦非絀信之誼未免祿仕當擇任輕者處南沙非逺祿秩可差解倒垂忍而待之又為此困遲之不報良以為撓無資之說此特顧家之計乃可為知友道安敢告朝右邪今嵗延陵水荒加以蟊賊之患薄田赤地什分餘二斂穫為賖瓜戍又復年餘僑居未知糊口之計一動不易三已況難必哉不免又圖去就則求我枯魚之肆矣反復計念未知攸處講學不詳之過兄必聞而憐之承詢鄙意之詳故盡底藴有可鞭督其後願與聞之答君舉書一通鑑禮圖皆二冊納上史書制度自當詳考不宜造次讀過中庸大學繫傳論語却須反覆成誦勿以心凑泊焉久之或當有見自覺諸書之意不二於已而非平生窺測所到有孚威如非持敬之謂者是為得之理義昭然要非學空無者所能髣佛以此應物則所謂文武之政具在方䇿威儀三千禮儀三百者待其人然後行耳是非小小知見所及惟體物者自不可遺文中子歎無圓機通方之士與之共叙九疇論九流知非其人願見勉之而已夫損德之修也凡吾胸中疵吝之積惟加損之為貴日新之道所謂洗心者不過如斯焉爾古人不可跂及要之記問之學蓋不足道立已與物則失之逺矣故君子敬其獨也雖無文王猶興非君子誰可言者至祝至望師長何謂非所敢當謹用回納一笑答君舉書二頃者逺勤訪喜有漸磨之益事乖人欲輒復暌違卧病分攜寧無怏怏自被無錫由拳教札之後杳不知車斾何之非徒懷無從修記之恨翹跂可想知也茲承就試行都猥蒙遣信恍若天降慰懌如何即日秋暑鄉微伏惟客舍舂容尊候動止萬福某自作别之後疾病相仍幼纍復然而賤婦所苦特異就醫役役死生尚未可知延陵嵗又水荒重之螟螣馬蹟薄田既無遺種縣官科率草料倍常賦而加多憔悴煎熬分為溝中之斷書䇿相忘固已久矣區區之迹前此所以不欲進者君舉既知之矣正名之說吾敢乎哉當路前極相知自莆田之行嘗一得書三被催劄而某所求以達聞聽者却不將上舅氏去國之未行也又嘗諉以専人見問所以不來之意喻以别議所以處我其意誠厚吾人去就當何如邪惜也君舉已行辭命頗傷深切前已失之于左今復不能得之於右亦運而已矣之任請祠足得熟議諄諄之喻中心不忘張昌之賢皆願見而未能者言稱先師要為有法理敬之說進學之指南也可與立者權多不足九流之合須得通方之士議之康節固謂之學未至武侯武侯未可輕議考叔太真而謂之詭正道于何而行乎立論常苦執中有不可不察者氣稟言性自是南方之學近於功利其又何言鄉論賢人之聚猶或可憂真見事之談也文不逮於作者而好詆訶前人此最吾人大病語人要識深淺亦欲自今勉之四三哥書荷封示閩事既難踰度不當相訝鄉來去就嘗面論之已詳五三哥之云云將有為為之爾劉復之真顯道相繼云亡真大苦事天不相道為善者何勸邪居厚罹憂可與傷愴其當大事宜必有以處之洪道人學本異端不足深論但未知其死何自尚當察之旁譜春秋地名固宜恨未知見書訓得刋其誤尤所望者國風十二變皆有叙小國不詳其世則附見之邶魏之先衛唐二邦之所兼者二南豳國為之先後㫖哉反古說曩聞已有傳本後竄改亦不多藁紙不精脫爛不可將出春秋敬納得與書訓俱付象先語以看畢蚤尋端便見還毋令汚敗為祝頃用禮學相勉可不朝夕于斯已而思之及觀張丈子韶灑掃應對進退之解異乎所聞法而不說曲禮鄉黨却不如此儀禮之記殊略先王自有深意雖復煨燼之餘先儒之記要近于鑿此非筆舌可道幸詳復之可矣經考漫呈一看八州地圖别後都不暇料理陳圖方居外匆擾不能便為寫去下問車徒之陳一車介士三甲一為前拒左右挾轂矩以車徒尺步方陳勢瞭然矣新出之圖必有新意後生可畏未可全非而是古也時事日益紛擾某尚未知存身之地千里相望豈不動心所謂不敢因循冀吾人共事斯于日用小學純全大體具焉持頭覓頭佛氏能笑人矣但能去智去故乃可默而識之所知不多非厭多也窮迫少佳意緒而蒙每事索報黽勉承命可無崕略所欲言者尚不能宣之於口千里書札烏能寫方寸哉答君舉三林伯順過東關屬已還鵲林恨不得見書辭宜答而未有端便可寄旋聞上庠中補喜之不寤此于君舉蓋不足道然而順流楊帆千里起于足下有可為英材樂者仲可還里閈方襞幅具書忽石應之見訪出前後兩示緘墨慰抃何已審知諸公固相縻以學職誠典學者善意不知我者且有積薪之誚受之無益聞牢辭之正合鄙意也示喻語小萬法悉備語大一毫不立兢業之心平蕩之道蓋非一非二知言知德誠有不可載且破者要須默而成之始得大小一二涉乎計較之語孔門汶上言不如是如何一言而盡古人言之久矣王文中論司馬談善論九流知其皆原道德之意而各有所蔽自非明了之見殆未易易王魏一代人傑尚有愧于禮樂之事周官見疑後世何足訝邪復讐法雖不見然今律文猶有輕重相明之法用論討賊當於在官之時事切救焚奚暇士師之告書于士者謂應復讐之法耳先王作法凡絶無而僅有者一皆大為之防士師得人安可預必用刑又須閲實審非推刃之道而後釋之逸賊一端未之盡也學者要在優柔使之自得博約之至欲罷自不能矣此事固有立談而辨者曽非一朝之積言於未及宜不受命切當自今謹之崇釋次儒自是井中之見其所從逰常訝某于此罕道然却不敢橫議是非從彼間來此攻之且不入異時當付此老使自賊之全真嘗所與逰門牆峻甚每以白眼視天下士聞於全真特厚或可介而見之如聞意鄉我輩未暇從之宋老志名以全真欲見故録與之豈無滲漏然所期於若士者本不及此當以度外容之舅氏幸同舍真淳固盡其人就成其材乃所賴于朋友滕推官頗聞其名似已之所任俟到城郭圖一見之張侍講舊為九重知遇加問學日富自宜有所悟合從此虛納天下大幸然而事久多變又未知鄉去如何某前此辭命蓋妄意當然懼人不謂深婉知復何恨諸公之意甚厚非所望也前既無效今而輕舉可乎四三哥已因景元寓書五三哥亦已通問但未聞其母訃方因仲可弔之應之趣向已若老成真大可畏能琢磨之甚善兒子固願受教然其母有女子之愛病未全已姑留後圖下諭諄諄知感知愧軍志名已前見牧之所引不類武侯之言然八陳圖從此推演有如見於武侯之集前輩何以不能識之自李衛公引志說圖方知八陳所出反復其語與孫武子所稱軍政殆皆司馬法歟陳法舊來口授以軍志握奇經馬隆李靖裴緒之說參伍以變匆卒未易圖之姑自詳復為佳不然請俟它日州圖納去荆州南交二紙抄畢蚤希寄示楊冀草具未補梁州和夷未曽釋地幽雍都未下手幽經却備幸而不為事奪一兩月間莫可成矣詩說所以不欲出者乃可為知者道四三哥尚不謂是故不欲復示人若欲得之不敢隱也已自略去訓故之說須于言外逆之參之楚辭以見其訓伍之樂府以盡其情訂之左氏以致其思正之禮記以通其說又斷之以孔氏之學孝經論語之所引證乃知非妄作耳紙札非佳毋令損敗為祝得姪子象先問未欲經說之廣切在加意伯順莫已還里曩蒙諉以其父銘志黽勉承命不可用則收之答君舉書四春間婦弟東泛錢水漫具赤紙記以為不在庠序達石廣文必無浮湛之理得報已知會計甚適所懷但未領報章馳望之切沈應先之僕以所示書至慰懌多矣聞得友如德修王丈可謂德不孤也其人雖未克見君舉寧苟合者麗澤之說當所得日富如某茅塞之甚有不能奮飛者某以丐祠之舉請益于左右欲處得其宜耳既久之不聞聞南沙代者諉僚宷來約以如期而代思白縣言上似太絶物不免作參宰稟目并以丐祠公狀抵之仍不絶之任之請既行之後得子詩外兄書教以不當突然自言于朝顧聞之晚矣然念闕期既逼不為之前日交代通書亦嘗授以公狀仍更屬以申催報命此外自當委之運命如何刺眼之思非為我忠謀渠能及此某亦嫌于下釣之說然而進退有義非我輩所得専處有如本懷果適過涉何害不隱我腳旁觀動目何有哉所求尚一得之固我所欲不然堂下有千里之隔雖其敦促百至豈真知我者邪遵養之說樞右之拜元是一意前以向去如何奉告蓋千慮之一得此㫖雖近於迂亦是理勢當然信之固宜亦近疏矣無律之音不計之戰郢人之懼不為過也尚幸低棊著數相似信如所聞不謬乃若溫浩兒嬉相矜以德力蓋亦未易剖決此亦一幸第恐拏而不解或生意表之慮耳妄意如此不足以語人蒙教早諭之雖未達髙意得無有過與不及之慮謂非所以輔成盛德人材秖爾極選端不過是然四三哥却有典午之命似舍驥弗乘矣佐佑藩邸亦何容易某近通四三哥問告以綱紀王府云云君舉以為如何旌别之疑有自來否近姪子洪罷昭武主簿逺來相省頗能道閩中事按逐一二輩皆合公議所恨稍作風采若失故步許褒守令多不踐言物論似不謂然與彼所聞大異然前得書有姑惟教之之意或幾乎兒輩所云某昨亦警以鷹鸇不如鳯凰之非不知還有益否適者數非面不易針之言未易言亦非俄頃可盡恐欲聞之曩蒙賜示一毫萬法之語不解藏人之善喜躍之至以告象先姪子答書歎異以為頓異往時之見然非揣摩卜度得之乃善其論大小之分若微有病萬法俱備安可謂小一毫不立大何足言意則甚然至于攻擊小大之語亦未為至更切思之前索陳圖必欲見之行事區區之見本不欲以書告然念合并難得請舉一端試以范蠡之言握奇八陳之法以考髙歡韓陵之捷妙處略可見也芻秣之語甚非言孫之謂欽領訓誨敢不佩服中庸大學本示五三哥者走筆寫意夫何足觀反復求之可見好學所以見語真得琢磨之義甚愜所望然相期亦太過矣疏示之語敬釋于下當仁不孫又掊擊之幸也書此無本性不强記又不知能與前注無相戾否追思前此之作一語不敢妄下所以開喻大善但其間不無森嚴氣象似非前輩所許大抵立言之體要當明白簡易聖人大未易到隋之中說洛之經世有可法者諸公或入于俚或入於深雖皆未害于道非行逺之法也語立言于君舉可謂小巫大巫之見想得此疏當捧腹一笑也五三哥曩通書皆不報渠執禮者固當然邪象先來索書解甚切端便幸即寄之與劉復之一自王習之送吏還祇領答教於今行復更嵗懶於問使嗣音闕然企慕德容如飢如渴茲閲報狀伏審歸對合㫖榮增京秩竊為善類私喜旋聞方綰銅墨置社南邦如公器業文章無愧前哲自宜侍中獻納盡忠補過牧民于外甚非師望所及將無睿眷優渥重于歷試抑由犯顔逆耳不遇故去邪永昌之民于何其幸時方急治寧緩急後先之序哉于公因可少見所學賢于淈泥揚波逺矣交舊之情亦足為左右賀即日伏惟鄉黨優遊自天之祐台候動止萬福傳聞貴治縣尹正闕洗刑當在朝暮講學有素迎刃定無槃錯然而前弊山積財力方匱發令先後計執事已有定處某託逰從之末願以管窺為獻為政之急要在戢吏仁民即吾寮宷情通吏人隱欺自少士夫日接利病可以畢聞但當務省文書張設綱紀臨之以無我斷之以嚴明處人鄉巷骨肉之間察之教化所在率斯道也於從政何有哉嘗聞撫字催科本無異道近時文俗之吏不知政有本末動以裒斂為急及民事則緩之不知威信服人賦可不勞而集則計陷失不在民而在吏出納之謹動有防制縱工於竊必不能侵吾嵗計矣民事莫難差役于今多致紛紜第令鄉業以身任之稽其程式欺罔必罰將不敢欺其次婚田一當堅守成法它訟剖決惟須勤以蒞之寧失不平勿成吏手上官曲直無足多校知所輕重則事濟矣縣固繁劇能出此數事邪日鄉人宋質失御史敦朴建縣令旌别之法謂治狀見於實迹者不出數端聽訟詳審則妄訴自息斷獄平允則寃濫自明催科必信可革追呼之擾給納必以時可除邀阻之弊此格言也可為縣宰韋弦以執事聲望居之為力已省所望究見所藴為世楷模大學論正已齊家推之可及天下常怪漢世循吏其為相則聲減治郡時惟以煩碎苛察失之夫何有於逺者大者近世賢之失多或過于中庸書稱干譽從欲同辭曽何逺于不肖此在左右度內某復敢言之教玉人雕代大匠斫不自知其不足可笑其不自量誠思何以告之或可以無愧矣不識采聽遐逺能無弃此一得之慮乎瞽躁而言不寒而栗某待金華獄掾闕尚年餘去嵗風濤之嗇雖幸以天而免孤單之族絶者五房親戚故人半入鬼録而又家乏粒食漂泛無復遺餘妻啼兒號日日相似雖無佳況然視死者將十萬輩其亦厚矣向令灝灝之會執事尚未美解則其死者有葬生者有養必無僇尸無告之事此在諸人賦分有數鄉邦所深恨者中腸鬱鬱言之心動想關聞聽亦須為惻然也永嘉半夏不雷即雨寒甚六月尚頗挾纊氣候殊惡不知卒嵗可以無它變否公之舊部故爾及之與劉復之二昨葉丞飛卿行拜狀必嘗關徹聽覽比景望遞來武林所賜教筆愧感良至見誚以無一言相慶灑落相視知所以自解矣謂我無求一世似非知我之語人情不大相逺為不可求又無以求之耳讀書無求于世任大非吾事也道大不容而不以為病顧以銀章茜綬噓呵大縣誇眩朋友不求一切人者豈謂是哉景望報兄之來四三鄉人之賢遂不可掩不圖今日而聞正始之音在乎其人可謂好賢之實矣然而上求武士而支離疏者得於其間攘臂寧不謂責名實者使之一一吹竽邪人情苦不自知愛而欺之又過井口之戲直推墮坑穽中乃已耳雖子相知之厚殊非愛我者也無望之世庶幾戒之忠甫勸兄辭縣不知盛意如何論苦太髙入于輕重亡凖彼奉祠而不受祠祿勸陳君舉以不取束修過於中庸則賢亦各自一見也永昌待次不知尚復年餘諸公相知之深而今弃之于外且使安處鄉閈真所謂舉而不能先者之命歟封圻密邇一山想當熟彼風氣修道之教將俟于入境布政先後暇日究之為宜常使在我優游則可以語風化矣綱目之治須由賢者興之捨此得民是皆干譽者也何足齒哉何足齒哉第恐人方即公百里要非大賢所處弓旌之及不俟于下車耳某索居面牆疵吝日積因風鞭督非君子誰適憐之與劉復之三某鄉居祿固亡可道第緣茅塞方寸大廢洗滌狂奴故態間復乘之漸逼瓜期憂畏深積決曹雖猥然亦人命所繫折獄之事孔門所難矧復事在上官制不在我自量褊淺懼將不免其身與世推移又所不忍每一念此芒刺在懷飢寒迫人未免祿仕鞭其後者不無望焉福清新除非晚當上嘗與忠父反復前論其言亦未易訾然與世路斬絶頗亦難行昨蒙誨以世之安樂法門縮頭閉息坐壁角裏頭為我輩恥適與忠父相反請得言之吾曹學固將行道不可枉或出或處當道中庸使兄未上而辭人不以為不遇故去必謂不能作此等邑有薄淮陽之誚孰若臨治之後惠澤有加于民除決去留無駭俗聽進退之際豈不綽綽然哉崖異驚人未若履常而弗畔於道某方以盜名而取疑怒于世故深不欲兄為揭日月之行也中庸之德無有偏頗必去必為未能無纍兄自有度必從容于是矣言之于此不可不使兄具聞之忠父渠自有書惟所裁擇夢叟取辱起于不量事勢某與忠父先嘗戒以過涉勸勿輕動老婆心切至於拖泥帶水無慊于志公伯僚輩何誅邪與劉復之四前月間鄉僕行竊聆舊恙告痊旋膺召節以為天輔仁人於此可見喜極而躍何但不寐而已然猶未知造朝之日意必一言感悟聊試三館漫一幅紙贊慶當不至浮湛也得景元報竊聞進說本末及聖主顧遇之意隆甚不試而登館殿自此當三接矣足為善士增氣豈直友朋之私喜哉甚善甚善某無似之迹本無意于人間迫于窮寒為祿而仕曽無片善可取前蒙于諸公間譽之過情遂使無能之人疲於趣召手足俱露迄無秋毫之補去國未幾弓招又至雖知期望推挽之意然非愛我者也輒以鄙懷上溷願賜終始某乖戾之性兄所諳悉前舉無術頭臚既已可見受爵不讓迄今歉然人不加賢才不加進又復不知進退冒於寵利所不敢也已述此意懇告廟堂更告善為辭之期於得請乃已幸毋縷縷懼稽王命將重得罪非所以安全之也自亷恥之道喪時君世主喜以爵祿驕天下士此則士夫輕進之罪果其材自可致君集事固當不校小禮某不肖無益於時亦欲因辭見志求退以事君爾如以一身之退使九重無輕士之心其進多矣由衷之言萬望台察比景元書論王江陰之罷非是某得之田里王治為浙西最其言民兵之不可教要是書生所見至論其害亦未遽非大抵興作大事非使曉利害者雜陳於前良法蓋未易立矧前嵗班行之法大不易行尚當商量何至遽逐良吏況牧民者敢與朝廷抗論是否必非陸陸之士不付此等以事而使媕婀脂韋之徒未見其可人以爭事罷斥誰是敢爭事乎因見諸公及之為望某素來不喜强與人事太原亦不識之知兄可以禆補廟堂故放言耳令兄知府鄉邦必已交政恨不得親被其澤郡得賢將門戶之芘多矣夀堂大令人板輿當適州里前二賢子官守已有及民之惠長復為之父母遵年之樂無加此者台眷云云答何商霖書一某聞君子之風為日久矣聲迹之相聞又兩年來矣小兒獲摳衣於講席之下於今行復更嵗政緣疏怠阻造下風雖未能日接音容得餘論於文字之間開發厚矣比辱臨訪言及忠父郁鄘之論某忠父友也實相忘于道術之際有所論辨各不敢為隱遁之說以相罔故雖言有當否然各自其所見切意要知本末同異有以訂其是非故敢不蔽愚固之蹤用以求教非欲自售於下執事必我察也六經載道之器逺矣大矣某既妄有論著且以薦于洪儒大學之前明眼難瞞多見其不自量也退即所安知其手足俱露方此內愧以為將必大得罪于門牆札翰之來則知與其進也甚幸甚幸示諭六經之說於左右未能無疑讀書欲有所疑此伊洛先生語也吾人于學未能了了於不疑之際夫不疑者蓋無所自見不然則蛙之在井聖言天逺寧俄而可料哉惟善學者未能無疑疑者問辨之所由生也諄諄之云何造道之深也至謂疑理之蠧則某請得一言疑固多端左右之疑固將有所決也理道必疑而決則疑未為蠧也衆咻誰佐之惑能決焉則定矣某學未足以及此然於衆多之說不敢必以為是此亦得之先生長者之論餘皆不知而妄作耳謂畢其說非所敢當信能有以規之則亦非所隱也清論之及故敢復之見交之文仰荷垂示非徒屬辭命意無愧前作論交之際益足以知君子之不苟也知感知幸某竊有所見不敢不薦其說此賦之質美矣近世才人實未之見吾曹蓋相期于古人不到之地夫何今之足云講道之餘加逰息焉於楚騷漢賦之作則筆端之力久之當益有所到此不可以言盡也古人雖曰作文害道然猶未通于一弛一張之說有如盡舍他事而専心文墨則非我所敢知也草草修報幸恕疏略不宣答何商霖書二前書裁答方懼不韙洊承教筆蒙有以警篤之其意良厚有以知君子成人之際且足以見涵泳于六經之說不以先儒之故而置聖人之學知感且羡書辭宜答請以所聞于古者復之詩古樂經其文古之樂章也書云詩言志歌永言聲依永律和聲三百五篇非主于聲而已太史以國風繫先王之舊俗二雅識其政事頌播郊廟是皆職在太師蓋遒人之官采之天下施之當時之用者先王之盛教化之美頌聲翕繹藹然成章不得于言固有不能宣之於口被之聲律以供燕享有若南陔華黍之詩者雖有其義不强為之辭儀禮所謂笙詩先儒以為亡詩者也王者功成之樂庶人無所得議純一之化加乎四海比屋皆有可封之俗四方安有殊風之事召伯韓侯之盛一皆見之周詩甘棠諸篇南雅所存是也四詩之正惡有所謂變哉觀于詩序之文正變為可言矣詩序于先王之詩皆言朝廷之所施用其所稱叙不過一詩之指幽厲之雅邶鄘之風視前序為何如正變斷可知矣豳風之作亦以當時之變豳嘗變而終不克變成王周公之美也變風見録起於政俗之異國自為次固其理也邶鄘之不合于衛自其邦人之不豫詩章自為篇袠初非前有其序聖人刪詩而為之次第則因變之先後國風起周召邶鄘而迄於豳見治亂有可易之理以為序有因改斯為不可厚誣反魯所正之詩止於雅頌而已來教謂詩之作起于教化之衰所引康王晏朝將以為據魯詩所道可盡信哉求詩名于禮經非後世之作也又安知關雎作刺之說非賦其師者乎降王而不豫衛是非聖人為之邶鄘滅而音存故非衛所能亂政不加於天下則王不可謂雅所云繫于所得之國與春秋之王城確實而言惟其理也然諸侯之兼并非獨邶鄘為然聖人不以滅國繫諸侯之風非為因地而已夫詩家之音律猶易家之象數聖人于易稱君子之道四則詩之聲文未可以一偏取孔子固嘗絃歌合樂而亦不為無取於辭角弓唐棣之去留義之可得而通者詩書之序非聖人莫能為之然其源流豈無所自易繫不皆興于孔氏則詩書可以類知如孔子自已為之必有不能為之者矣走於反古詩說雖不主於先儒於其所長不敢廢也古人尚或采諸芻蕘之說況聖人之徒歟務相乖違非反古之道矣不能自明六經之學誠世儒之深病鑿空以攻先儒之論不亦後世之罪人哉觀于會通則古道之去人不逺矣某學不足以知古樂求古人之意聊以自誑非緣垂世而立言執事不以其愚賜之提誨此道之不作久矣何意聞此正音臨文者不敢借辭益重不敏幸為隱惡本不足以示人既沐誨言不敢不既其說尚惟時復教告以適翹跂之私答何商霖書三披讀枉教申理前說辨而不置真古人之事也欽嘆三復敢不敬應詩學有二曰聲曰辭聲辭合而成章乃古之道然而人之情性古猶今也情有哀樂聲文稱焉聽其語可以合其聲聞其音可以知其意二者不可以毫釐判于人有不省乎孔子學于操而得文王識鴟梟之知道聲辭交見庸有二是故舍樂論文與釋文而言樂皆非詩學之正近世填詞之作始别異於聲文唐固不然況乎三王之代季子論樂夫其殊于聖人其以小雅為周之衰亦漢儒所云譏小己之得失有為而發其可遂泥其言乎文中子不與季子之知樂近于眉睫之論然其㫖各有在不可合也在鄉飲酒燕禮射禮已有二南諸篇雖為不必盡出文王之時要為周公制禮作樂所用以為思先王而歌其事則幽王之詩有之詳而味焉與南雅之古詩或居然異矣仲尼歸正雅頌豈徒然哉序之云云不待言也學經而他求於傳不若専意於經傳皆不同則經學之文不幾於惑矣序據左氏謂棠棣為召公作毛傳以為周公二者莫知適從則序燕兄弟之文非其所論擬也古學在求其正不當論出之後先如惟前出之從則書之古文不若漢世今文者矣妄意無似非執事誰為裁之浪語集卷二十四
