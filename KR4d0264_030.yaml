body:
  text: 浪語集巻三十宋薛季宣撰序贊叙握竒經風后握竒經三百八十四字續圖三百十五字合標題七百九字以衆本武經總要陣法銓次傳著成章而存異文於下已繕寫可讀始走逰廣都魚復觀覽武侯八陣石圖愛其文同先天易圖每恨陣法未能詳究聞成都唐棊盤市雖章仇兼瓊經始而多得武侯遺意履其市道繩直閭井交貫百工類處技别為行識者曉知然乍入者至於盡日迷不能去方悟李衛公言古八陣龍虎虵鳥之為旗法前古服章之辨為并識之得握竒經讀之而八陣之勢判然矣前聞逺隠君先生論六花陣法明於八陣握竒然後知其源本從來六八之陣不同實方圓之數耳觸類而長竒正庸有窮乎握竒經舊傳風后受之𤣥女用佐黄帝殺蚩尤於涿鹿之野荒唐之説無所考信漢志兵隂陽家書有風后劉歆班固已言依託觀公孫丞相注釋則非所謂書十三篇圖二卷者先秦典籍類皆口以傳授反復其義未易以晩出浮偽訾也七略兵家四種軍禮司馬法存者尚百五十五篇吳孫子八十二篇圖九卷齊孫子八十九篇圖四卷自神農黄帝伊尹太公范蠡大夫種吳起魏公子廣武君韓信項羽諸家其書具在畧皆亡矣今獨孫子十三篇者為兵權謀之祖論形勢者本握竒經權謀在人竒詭焉用形勢紀綱軍政為天下者尚有取焉又隠不章可為懊嘆舊文奥宻尚多錯綜微辭傳寫不倫頗難誦習李筌繪為八陣既為不知而作武經雖存寫本不無訛以傳訛唯武侯八陣石圖最為有徵走得馬隆贊述多所發明遂為詮定其文并繪陣圖於後竊詳古人存諸口訣之意不敢妄疏條章合圖贊以窮經可以自得之矣風后握竒經馬隆本作握機序云風后軒轅臣也握者帳也大將所居言其事不可妄示人故云握機又稱諸子總有三本其一本三百六十字一本三百八十字盖吕尚増字以發明之其一行間有公孫𢎞等語或云武帝令霍光等習之於平樂館以輔少主備天下之不虞今本衍四字經曰八陣四為正四為竒舊注竒讀如字後人説天地風雲為四正龍虎烏虵為四竒公孫𢎞曰世有八卦陣法其中既不用竒正似非風后所傳未可㕘用餘竒為握竒舊注竒讀為竒耦之竒解云説竒正者多矣而握竒云者四為正四為竒餘為握竒陣數有九中心竒零者大將握之以應赴八陣之急處或總稱之先出遊軍定兩端天有衝衝一本作衡地有軸前後有衝一作有風雲風附於天雲附於地附一作輔衝有重列各四隊前後之衝各三隊風居四維故以圓軸單列各三隊前後之衝各三隊雲居四角故以方天居兩端地居中間總為八陣為一作有陣訖逰軍從後躡敵或驚其左或居其右驚一作警而無其字聽音望麾以出四竒出一作生天地之前衝為虎翼之字下一本有間字風為蛇蟠圍繞之義也圍繞一作為主虎居於中張翼以進虵居兩端向敵而蟠以應之天地之後衝為飛龍雲為鳥翔突擊之義也龍居於中張翼以進鳥掖兩端一作鳥挾兩旁向敵而翔以應之虚實二壘一作三軍皆逐天文氣候一本下有所字向背山川利害隨時而行一作進以正合以竒勝一無二句天地以下八重闕以列或曰握機望敵即引其後以犄角相列不動而前列先進以次之公孫𢎞曰傳項氏陣法依此今按而前列先八字舊文在依此注下誤故遷次以成之或合而為一因離而為八各隨師之多少觸類而長一無此章或曰握機四字疑文之衍天或圓布不動一作天或圓而不布前為左後為右一本左右差𤣥天地四望之屬是也一本下有風象二字天居兩端其次風其次雲一作其次天衝其次地衝其次風衝其次雲衝左右相向是也公孫𢎞曰此為静地方布風雲各在前後衝之前一無上前字天居兩端其次地居中間一作其次地其次天中間兩地為比是也公孫𢎞日此為動為從天陣變為地陣或即張形布勢破敵攻圍不定其形故為動也一本自公孫𢎞曰動静二義皆雜出經文中縱布天一一作兩天一無兩字而縱字上有雲象龍一句一作龍者象龍天二次之天二一作兩天縱布地四次於天後一作縱布四地四地次之一無下四地字縱布四風挾天地之左右一無地字天地前衝居其右後衝居其左一無二句一無天地字一無居其右後衝五字雲居兩端虚實二壘是也一本下有此為動也四字一無虚實以下公孫𢎞曰人多傳韓信注釋天或圓布以下與此㣲有差異而范蠡樂毅之説訛雜今亦錯綜於其中其部隊或三五或三十或五十變通之理寄之明哲不復備載近古以來其文不滿尺多慿口訣以相傳授予今於難解處増字發明之耳一本其部隊下上五十字云陣圖如此變通由人以經文誤也按公孫氏稱與此異者天或圓布次由軍定兩端以下為正經而以天有衝止觸類而長列於續圖雲為翔鳥之下今馬本尚如此薛氏詮定圖解按握竒經别有續圖記金革旗麾進退趨鬭之法今其文相揉蓋非末學所能離異故并論而分别之角音二初警衆末收衆革音五一持兵二結陣三行四趨走五急鬭金音五一緩鬭二止鬭三退四背五急背背一本作趨麾法五一𤣥二黄三白四青一作赤五赤一作青旗法八一天𤣥二地黄三風赤四雲白五天前上𤣥下赤六天後上𤣥下白七地前上黄下青一作赤八地後上黄下赤一作青陣勢八一本陣上别有虎翼字非天地風雲飛龍翔鳥虎翼虵蟠二革二金為天三革三金為地二革三金為風三革二金為雲四革三金為龍三革四金為虎四革五金為鳥五革四金為虵舊注此八陣名用金皷之制其金革之間加一角音者在天為兼風在地為兼雲在龍為兼鳥在虎為兼虵加二角音者全師進東加三角音者全師進南一作西加四角音者全師進西一作南加五角音者全師進北鞉音不止者行伍不整行伍一作師金革旣息旣一作並而角音不止者師並闕旋三十二隊天衝十六隊風八隊天前衝十二隊地前衝十二隊地軸當作二十四隊八隊天後衝十二隊地後衝十六隊雲以天地前衝為虎翼天地後衝為飛龍風為虵蟠雲為翔鳥一本次縱布天一上右續圖圖者經之紀也故列之馬隆總述治兵以信求勝以竒信不可易戰無常規可握則握可施則施千變萬化敵莫能知正陳讚動則為竒静則為陳陳者陳列戰則不盡分苦均勞佚輪轅闕兵前守後隊勿進天陳讚天陳十六内方外圓四靣風衝其形象天為陳之主為兵之先潛用三軍其形不偏地陳讚地陳十二其形正方雲生四角衝軸相當其體莫測動用無疆獨立不可配之於陽風陳讚風無正形附之於天變而為虵其意漸𤣥風能動物萬物驚焉虵能圍繞三軍懼焉雲陳讚自太公范蠡以來風雲無正形所以附天地雲附於地則知無形變為翔鳥其狀乃成鳥能突擊雲能晦㝠千變萬化金革之聲竒兵讚舊在正陳下移此以便乎讀古之竒兵兵在陳内今人竒兵兵在陳外兵體無形形露必潰審而為之百戰不昧飛龍天地後衝龍變其中有手有足有背有胸潛則不測動則無窮陳形亦然象名其龍翔鳥鷙鳥擊搏必先翺翔勢凌霄漢飛禽伏藏審而下之下必有傷一夫突擊三軍莫當虵蟠風為虵蟠虵吞天真勢欲圍繞性能屈伸四季之中與虎為鄰後變常山首尾相因虎翼天地前衝變為虎翼伏虎將搏盛其威力淮陰用之變化無極垓下之㑹魯公莫測合而為一離而為八合而為一平川如城散而為八逐地之形混混沌沌如環無窮紛紛紜紜莫知所終合則天居兩端地居其中散之一隂一陽兩兩相衝勿為事先動而輒從逰軍逰軍之形乍動乍静避實擊虚視羸撓盛結陳趨地斷繞四徑後賢審之勢無常定金革金有五革有五退則聽金進則聽鼓鼓以増氣金以抑怒握其機闗戰不失度鞉鼔紅塵戰深白刃相臨勝負未決人懐懼心乍犇乍背或縱或擒行伍交錯整在鞉音麾角麾法有五光目條流角音有五初警末收麾者指揮角者警覺臨機變化慎勿交錯光目一作光自兵體上兵伐謀其下用師棄本逐末聖人不為利物禁暴隨時棄衰蓋不得已聖人用之英雄為將夕惕乾乾舊闕四字其形不偏樂與身後勞與身先小人偏勝君子兩全争者逆徳不有破軍必有亡國握機為陳動則為賊後賢審之勿以為惑夫樂殺人者不得志於天下聖人之言以戒後者一作天下八陣圖贊并序八陣圖蜀漢丞相武鄉侯諸葛亮之所作也圖之可見者三一在沔陽之高平舊壘一在新都之八陣鄉一在魚復永安宫南江灘水上高平者自酈道元已言傾禠難識在新都者隆土為魁基以江石四門二首六十四魁八八成行兩陣俱立陣周四百七十二步其魁百有三十在魚復者因江為勢積石平流前蔽壁門後依却月縱横皆八魁門二丈偃月内靣九六鱗差新都舊無聞焉唯見於李膺益州記其言魁行皆八才舉其半趙抃成都記稱耆老之説以為江石盖兵數魁應六十四卦則知兩陣二首之意以體乾坤門户法象之所由生也然其陣居平地束於門壁營陣之法具而竒正之道藴魚復陣於江路因水成形七八以為經六九以為緯體方於八陣形圓於却月壁門可以觀營陣之制却月可以識竒正之變故雖長江東注下流湍決轟雷奔馬不足以擬其勢回山巻石不足以言其怒峩峩八陣實瀨其衝子石卷於灘沙攸積而歴年千數未嘗回撓隠若敵國屹若長城故桓温以為常山之蛇杜甫偉其江流而石不轉也若夫四頭八尾隅落鈎連像陣相容觸處為首則新都魚復之圖其法皆八陣也居則修諸營壘出則備其行陣雖有竒正之變一生於正而已李興不在孫吳之頌端有以焉先王寓兵於農而居之以丘井折衝樽俎而舞之以行綴經國有途軌之制畫野有鄉遂之法文事武備未始判為二途民可使由之不可使知之故顯仁而藏用爾在易先天之象天圓而地方八卦相重皆六十四隂陽相錯剛柔相交而天地文理備焉先天之文愚於八陣見之矣八陣之作寧武侯私意自營之乎風后握竒有天地風雲龍鳥蛇虎之名則八卦之象也漢法大司馬嘗以立秋日斬牲祠白帝肄孫吳六十四陣則六十四之象也中興罷郡國都肄而陣勢寖亡非有王佐之才明於天人之奥則八卦之變化其誰能嗣興之愚以為八陣之施非徒教戰而已文中子曰諸葛亮而無死禮樂其有興乎非虚語也至於洞當中黄龍騰鳥飛折衝禽翼握機衡陣之法本諸孫吳方圓牝牡衝方罘罝車輪雁行之制唐人裴緒之論非無所起六十四陣之變其出也無窮知此八名特八陣之統爾焦氏易學卦變至於四千九十有六竒正相凖庸可盡名之乎觀古懐人敬為之贊曰堂堂八陣法地之維經緯縱横端如置碁左右有行後先有列錯綜相成鈎連互設孰知其首孰測其端直道如繩循如象環八八相乘陣間容陣在翼斯張在前斯奮陣形雖八天七攸存四轅轉隊虚實斯分亦有握竒列於陣後翕闔乾坤混融六九風雲天地體則隂陽虎蟠蛇旐龍旂鳥章竒正相生方圓逓出混沌紛紜杳㝠恍惚其闢無方其闔有儀幽若鬼神夫誰知之轅門之設實司啓閟無鍵而關視之孔易行而為陣居則為營堅重如山能疾而輕我則通途平平坦坦致敵天羅莫知遄返顯允武侯經之營之阿衡天漢以作六師君子所為衆人不識曰易勝哉七擒孟獲先王體國丘甲本兵干戚之容萬舞於庭四頭八尾文成井字旁睞斜窺孰知其自易有八卦洪範九章天道昭昭曰唯典常在帝有熊其臣風后爰作握竒蚩尤是討六十四陣演自孫吳豈其妄作文本河圖三代往矣漢隳都肄誰其興之天啓明智惟此武侯器宏管樂龍隠隆中雲蒸左蜀先王遺法尚克興之漢家餘業豈不成之營頭下墜蒼蒼叵測心服竒才漢興勍敵新都之壘雲守儲胥匪石凌江丘陵屹如甘棠古木尚云勿敗此道之存其何能壞率然之蛇無頭無尾易象於天於乎不已右諸葛武侯八陣新都占地四百七十二步魚復魁門二文方圓互見陣隊相容其實皆一法也裴緒采諸家以為八陣常山之虵而九其法方陣正而厚利變圓圓而無角利守牡前鋭後重象劍之鋒利潰牝張其兩翼前單後複利吞衝方前衆後疎利以争險車輪形圓六出强弩四備利進罘罝張其四翼備在首尾利救雁行前鋭後張延邪而行便於左右利於繞人八名皆本孫子箱方陣白旗四鼔黄帝五行之金陣吳起之車諸葛亮之洞當也圓陣黄旗五鼓五行之土陣吳起之車舡諸葛亮之中黄也牡陣亦名却月黑旗一鼓五行之水陣吴起之曲陣諸葛亮之龍騰也鋭牝陣朱旗二鼓五行之火陣太公之雲鳥吳起之陣諸葛亮之鳥飛也衝方青旗三鼓五行之木陣吳起之直陣諸葛亮之折衝也罘罝鶻旗七鼓太公三才之人陣一名飛翼吳起之卦陣諸葛亮之禽翼左傳之魚麗也之車輪熊旗八鼓三才之地陣吳起之衝陣諸葛亮握機也諸雁行鵬旗九鼓三才之天陣左傳吳起之鵞鸛葛亮之衡陣也常山蛇陣龍旗六鼓非古也八陣轉而相勝更為雌雄法曰正厚者力併故方勝圓猶厚勝薄也法曰翼而張者角必薄偏攻其角牡可敗也故圓勝牡猶聚勝散也法曰鋭而鋒者夾擊之故牡勝牝猶複勝單也衝方戰者相促居者有餘牡背高向下因其勢以潰其虛法曰得地助者昌失地助者亡故牡勝衝方也車輪兵得成行善冒亂而畏險阻衝方守險以疲車輪之力罘罝備在兩旁其勢不堅車輪四備善衝亂敵法曰以守待攻者强以動待敵者亡故衝方勝車輪車輪勝罘罝也法曰翼而張者角必薄雁行延邪便於周旋罘罝前後横而中縱故勝雁行法曰厚而正者堅當選兩翼脅其兩旁故雁行勝衝方也其説如此而所圖陣法不能盡如其文將由多讀古人之書未暇備詳其制也要之八陣之法盖不離乎天地風雲之變衛公六花十二辰陣六花中軍及左右虞候左右箱二總管凡七軍中營居中六營六靣以援中軍六軍又各有小營二十二陣一曰中黄二曰大𤣥子三曰大赤午四曰破敵丑五曰左寅六曰青蛇夘七曰推兇辰八曰前衝已九曰先鋒未十曰右擊申十一曰白雲酉十二曰決勝戌十三曰後衝亥十四曰逰變中黄十二陣各八百人為一小方陣周十二隊隊各五十人白雲青蛇大赤大𤣥加百人以備追襲餘八陣中抽八百人以為逰變每陣相去百步皆八陣之正耳近世習知浪戰事不師古兵之形勢豈徒不講争怪笑而非短之前八陣圖遂皆亡佚李筌法固非古復混淆以壬遁隂陽之流其道可觀今此數家而已論以握竒八陣可以黙而識之古人節制之師盖曰先為不可勝以待敵之可勝陣法竒正節制之所存也取其要附諸圖法後世雖有作者其亦不出此矣叙黄帝隂符經隂符經三篇李筌所傳本三百二十七言凡三百六十三字龍昌期注本衍自然之道靜已下八十有九言以相校讐定從龍昌期本孫光憲稱王蜀軍校黄承真得鄭山古本與今不同者五六十言然猶未聞衍字如此其多也語云隂符三百字則昌期本若可疑其句法又少不同而文意相通未可刪也姑存其語以俟後來者裁之山谷先生以為經出李筌熟讀其文知非黄帝書也欲文竒古反詭譎不經其言糅雜兵家妄託子房孔明諸賢訓註可笑惜其不經栁子厚一掊擊也其笑然矣謂其糅雜兵家似乎未詳經意所在李筌序道驪山老母授經之事大約依放老子河上公序張子房授書圯上之説其亦誕矣就令果為㓂謙之所藏之故要非黄帝書也康節先生謂與素問皆七國時書為近之矣留侯武侯註未之見李筌又未嘗及妄可知已易奚氏善和墨而煤多易宣包氏工圖虎而圖多包黄帝治五氣而方術者名之此必無之理也隂符經専明盜時修煉在飬生者不為無取其文大略效法古文老子語意謬矣或者乃疑老氏出此不亦誣乎使隂符果無可觀者則何以為道術祖孔子曰雖小道必有可觀者焉汎覽兼通無及泥焉可也乾道二年半春中澣日書叙古文老子古文老子二卷道徳上下經也無八十一章之辨後先文字亦多不與今同走㓜讀論語孟子諸書睹其言與章戻疑章分非故書之舊必講師無自得者之為後見黄庭堅論荘子篇名暗與之合為其已見弗敢必其然得郭忠恕所上孝經古文始知不謬今而獲此可以無疑盖書之在古初未始不完而正弊於鑿説寖以大譌故其書存失真衆矣今文老子有河上公注實首分八十一章史記樂臣公本師河上丈人教安期生再傳至於臣公其弟子蓋公為曹相國師修黄帝老子學則丈人者乃今所謂河上公也自晉世已言其教漢文帝叙述尢怪誕不稽葛洪載之神仙傳中封演已知其妄据史記列仙老子傳皆云著上下經是則漢人所言分章無説而古文嚴宻其言上下相明蓋不俟注釋而通坦然甚著紊其先後則必注釋乃明是故剖分二經以成其妄道徳可判猶曰或然若章而分之義可離矣然則分章析句可照非其本真老子古文其不廢於後宜也日走嘗讀老子以為扵闔闢為有窺第以矯枉過中失聖人意欲為訓注以正其然否窮竟其辭乃知其於道無得夫道者道也非可以一途指也彼以無為道有故非道也自來聖人之經皆隠不論孔子亦所罕道唯嘗以一貫語子貢子輿易中庸最為幽渺之書其㫖良以見道不過示之中制俾人嘿以㑹通至老子則不然為書務以言盡如所謂道可道非常道又似是矣復不能守之欲以多言範圍自已旣而去道彌廓費辭愈多而言不知所從於是有吾不知為誰之子象帝之先之説其弊數數而見不可以毛舉大㫖皆依倣道要為名擬之晚益失守弊必流扵刑名數術而粃糠仁義絶㓕禮樂靡不為之者雖以道體之全學者尤所當務蓋去此則非道而老子斥之晚進學焉故其善者為私已不善則渙漫詭譎而不自齒於世途反道敗徳抑又背老氏而馳迹其源流弊生有自雖然讀此書者可以輕利欲袪物我齊得喪潛消悔吝於暗曖渺㝠之中在明達之士不可謂無補則老子一書非可廢也世之是非或已甚故為辨析於終篇遁甲龍圖序河圖戴九履一左三右七二四為肩六八為足五為心腹聖人則之而易象興是以帝出乎震震東方之卦也齊乎巽巽東南也相見乎離離南方之卦也致役乎坤坤地也説言乎兊兊正秋也戰乎乾乾西北之卦也勞乎坎坎正北方之卦也成言乎艮艮東北之卦也參天兩地錯綜以變八卦相盪當期直日而三才六位嵗時氣節具焉遁甲者遁此者也故有直符九星以斡九宫直使八門以周八卦三竒者三材之象也六儀者六位之象也隂陽逆順推盪也天地加臨錯綜也黄帝之局千有八十乾九坤六之用也太公之局七十有二月卦時訓之候也留侯四皓之局一十有八參兩成卦之變也聖人制局流遁以體天地之撰闡隂陽之理見鬼神之情状而擬諸其形容示人以榘範也上士得之可以明造化中士得之可以測隂陽下士得之可以命吉㐫蔽者為之任天數而人事棄焉因終與之并廢得意忘象顧若是乎隂陽家者流所以得罪於通人之論也帝堯平秩四序有虞齊政玉衡夏南巡祁寒北狩豈無天道通乎人事而已漢之成哀桓靈不改髙帝之時令莽卓不順焉同歸於敗故曰非隂陽之罪也至於請師大道冩符辟兵則膠矣明乎天地之性者不可罔以非類術家之論自有吉凶反戻非盡知畢議所能通者天人之際姑用其參無及泥焉可也周公之制周禮雖至書方貫橭射夭殺神祝詛祈禳術之甚膚淺者尚皆有取諸儒廢焉過矣世之言遁甲者多淪於怪其書與術今顧傳扵星官卜祝之流兵家時或論焉荐紳先生盖所不究走豈仰知天道然觀其數真聖人之遺術也稡其方論去其誣泰幸甚成書闕卷推原所自命曰遁甲龍圖云甲厯序序曰厯之興也其於太古乎作厯者其憂天下乎是故數十為干以盡日其支十二以盡辰斗建之行以盡月積月周天以盡嵗閏也者集餘分以成嵗次者也嵗律之運生民之本也是故數以記之厯以命之古者聖人之作厯也幽研於易以定數錯綜於爻以應朞法象於隂陽而和順於吉凶通理於人而遂物上古晝動而夜息未有星紀故以木生紀嵗未有書數故以結繩致約太昊伏羲氏之王天下也仰以規圖於天俯以矩法於地觀五行之文測晷景之度分隂分陽迭用柔剛造八卦以調八風作三畫以定中氣始立書契以代結繩之政以㑹萬物之宜是故八卦者八風之象也三畫者二十四氣之象也包四時者莫易乎嵗成嵗功者莫加乎厯厯也者歴往而知來者也昊英氏作處后潛龍之位積時為日累月為嵗始作甲厯以前民用厯之興也其與易道並行邪當伏羲代天而王邪是故在臺傳教告民示始蓋取諸震命子英潛龍氏治我隂陽甲厯蓋取諸革咨扵上相共工下相皇桓咨告扵民俾知甲厯嵗月日時自茲始無或不敬蓋取諸巽甲日寅辰木王於夘英上甲厯厯起甲寅蓋取諸泰是故易易數也厯厯數也厯與易數儗故能彌縫天地之造贊治萬物之宜一隂一陽與時皆運一寒一暑農作用成寅春得天人時資理勤嵗憫憫百榖以生庶品以寧唯日用而不知此甲厯之道也厯也者在嵗之所行也帝出扵震齊乎巽相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮厯也者盡易之所之物始於䝉終於備甲厯之用其厯之始邪故曰甲者甲也言草木之始萌也若夫元㑹統章窮厯之數則非後時不備叙焦氏易林漢焦贛易林十六卷卷有四林林有六十四繇凡六十四卦之變四千九十有六以所傳中秘書孫氏藏書參校中書内多亡佚以孫氏書詮補圓備故書屢經傳冩字多舛誤以羊為缶以快為决若此者衆為是正其曉然者其不可知以喜為嘉以鵲為觀以烏為鳥一卦兩占之類並兩存之無所去取具已刋定可繕冩漢儒傳易明扵占候者如贛費直許峻崔篆管輅數家易俱有林惟焦氏林今傳扵世東觀漢記孝明帝永平五年少雨上御雲臺自卦遇蹇以京氏易林占之繇曰螘封穴户天将下雨沛獻王輔用體説卦謂螘六居知雨京房延夀弟子今書蹇繇實在震林林為焦氏可不疑贛延夀字也其學本以六十四卦更直日用事以風雨寒温為候易林用之卜筮尚其占與變者政和間校書郎黄伯思校中秘書論林自林直日灾祥自直日灾祥之法雖同出於贛初未嘗一其用昧者弗悟乃合而一之扵直日卦中求所得卦謬託燕薊士之秘本本朝王佖於雍熙二年春遇異僧為筮得觀之賁其占乃觀中賁林觀賁皆白露之卦非春所宜用不當於觀中求之異人之占固不應誤是知直日之説非可用之占筮伯思言若簡易其實非也筮法固於直日林中求所遇卦於遇卦林中求變所之觀從初决從終則雍熙異僧之占初未嘗與術戾僧論一幕掀天一同掃地自有得之繇林之外者未可以一術齊也直卦之法略在漢京房郎顗傳天朝班厯尚取其象或者直以周易卦爻占數猶屢有符效至用林筮頗多不合伯思之説未易循也京氏學以卦爻分配朞日坎離震兊用事自分至之首皆得八十分日之七十三頥晉井大畜皆五日十四分餘皆六日七分嵗旣有之日亦宜然於直日卦中分卦直時如日之次日凡十卦一時八刻三分刻之一卦配時有一刻二分頥晉井大畜皆五刻二分坎離震兊用事於日卦貞悔初爻之首中爻之中皆四刻一分是又卜數一法不待筮而占者自可通用易經并論風雨隂陽占候不必専取諸林漢儒林傳孟喜授易於田王孫得易家候隂陽灾變書詐言田生且死時枕喜膝獨傳喜同門梁丘賀疏通證明之曰田生絶於施讎手中時喜歸東海安得此事延夀嘗從孟喜問易京房以為延夀即孟氏學翟牧白生不肯皆曰非也劉向校書以為諸易學説皆祖田何楊叔丁将軍大誼略同唯京氏為異焦延夀獨得隠士之説託之孟氏不與相同藝文志易有孟氏京房諸篇無復分異京氏書世尚有之雖隂陽家不特灾變之候論以漢儒林傳藝文志自有不可誣者諸儒黨同伐異可盡信邪延夀行事略在京房傳中舉最小黄詔聽留增秩矣其曰得我道以亡身者京生也知人見事未可以明經學士視之易林近古占書旣自可尚綴辭引類尢爾雅可喜尚其辭者於漢氏西京文字又可忽諸略抄卦氣圖法著左乾道六年八月丁巳鵲林書冬至坎上公中孚四世辟復十一月初侯屯二大夫謙五卿睽四公升四辟臨十二月二侯小過四大夫䝉四卿益三公漸三辟泰正月三侯需四大夫隨三卿晉四春分震上公解二辟大壯二月四侯豫初大夫訟四卿蠱三公革四辟夬三月五侯旅初大夫師三卿比三公小畜初辟乾四月上侯大有三大夫家人二卿井五夏至離上公咸三辟姤五月初侯鼎二大夫豐五卿渙五公履五辟遯六月二侯恒三大夫節初卿同人三公損三辟否七月侯巽上大夫萃二卿大畜二秋分兌上公賁初辟觀八月四侯歸妹二大夫无妄四卿明夷四公困初辟剝九月五侯艮上大夫既濟三卿噬嗑五公大過四辟坤十月上侯未濟三大夫蹇四卿頥四唐僧一行云易孟氏章句京房本㫖七略郎顗所傳卦氣皆六日七分不以初爻相次用事惟齊天保厯依易通統軌圖自十有二節五卦初爻相次用事及上爻與中氣偕終又京氏減七十三分為四正之候其説皆不經據孟氏自冬至初中孚用事一月之策九六七八是為三十卦以地六候以天五五六相乗消息一變十有二變而嵗復初坎震離兊二十四氣次主一爻其初則二至二分也易爻當日十有二中直全卦之初十有二節直全卦之中齊厯又以節在貞氣在悔非是近世大儒司馬文正推太𤣥厯邵康節譜太𤣥圖坎離震兊氣節直卦皆同一行唯以五卦初爻相次用事從易軌云今術専本京氏用六為法以辟卦為局六時一卦日法以直卦為局二刻一爻坎震離兊頥晉井大畜以分數除減半之蓋三十日三百六十時六日六百刻皆周而與易象俱終悔吝吉㐫亦可直以經卦世爻為斷叙山海經古山海經劉歆所上書十三篇内别五山外紀八海郭璞注集釐十八卷其十卷五山經八卷六海外二海内大荒經也五山海外經端有條緒海内大荒經汗漫有不可通者是書流傳旣少今獨道藏有之又圖十卷文多闕略世有模板張僧繇畫山海經圖詳於道藏圖本然道藏所畫不出十三篇中模本畫圖有經未嘗見者按五山經山多亡軼意僧繇畫時其文尚完不然後人傳託名之不可知也不敢按据模本姑以道藏經圖參校繕冩藏之於所傳疑有曰一曰或作之類皆郭注之舊云一作圖作者今所存也走初讀楚辭文選陶元亮集見其多有山海經事恨未之見􅗥求将二十嵗方始得之其所占山川已隨世變草木鳥獸類非久存之物神怪荒唐之説人耳目所不到郭氏所注不能皆得其實而上世故實可供文墨之用者前人采摘稱引略盡則此書之垂亡僅在固宜左氏傳稱大禹鑄鼎象物以知神姦入山林者不逢不若魑魅魍魎莫能逢之山海所述不幾是也經言大川所出及舜所葬皆秦漢時郡縣又有成湯文王之事筦子之文其非先秦有夏遺書審矣劉歆集略直云伯益所記又分伯益伯翳以為二人皆未之詳考扵太史公記則漢西京書非後世之作也山海經要為有本於古或秦漢增益之書太史公謂言九州山川尚書近之至山海經禹本記所言怪物余不敢言也然哉郭氏歎道所存俗之所棄不無稱許之過要之楚辭之學在山海經為所本君子窮神辨物此書有不可廢者所謂臣秀即劉歆也歆以有新之朝更名以應光武之䜟校讎之世必當王氏時也走讀漢藝文志念其書不多見此山海經雖在亦且亡矣愛之不忍捐棄故録置家藏書中論語直解序巧匠不世出其法具乎規矩繩墨聖人不世出其言在乎禮易詩書然則禮易詩書與夫規矩繩墨往之所以貽後今之所以求古也即規矩繩墨以為員方雖非巧匠而巧匠之制作於此乎在由禮易詩書以趨理義雖非聖人而聖人之精誠備於吾身學者為道而舍經猶工人而去其規墨也雖有工垂之指其能制器乎孔子聖之至也顥乎其渾邈乎其宏其靜也天其動也乾道貫古今而體之以虛神偕造化而終之以愚望之平平即之峩峩寂如其若亡巋如其若存挹而愈冲撓而愈清觀其行則不過乎物察其言則適當人心無色無形旣髙且明無墉無隍肅肅茫茫止止而安安者歟盡性而參天者歟贊焉以辭猶日而禆螢鑿之竅元均無事焉適亡其所存而已自伏羲至周文公其時亨其政行其言事具乎禮易詩書曰闇而弗明得孔子而彌章非聖人無以知聖人固莫知其孰賢傳是道以貽将來斯其為集大成孔氏有春秋孝經通禮易詩書曰經其弟子門人又雜記其疑難答問之言别為論語一書參乎六經之間六經固妙且𤣥必論語而後行論語之於六經其道學之中和大易之乾坤乎元龜無窮指南諸儒性命仁義之淵源諸子百家之蹊途覆載而叢薄之宜莫此其究且詳也傳記稱孔子之言衆矣率多蹖駮不類乎真其周而曲當觸而咸獲純而靡纇約而兼該者宜若莫如論語之書後之學孔子者将折中矣六經之奥反求其性命之正者舍論語其何稽乎先儒之傳此書行乎今者多矣如川瀆之容流各極其量而莫不有合焉其扵滄溟也不亦微哉走誠庸愚學而未能有得願學孔子其素心也研窮此書久矣迄未知其趨向自求諸已以求合於前言譬諸蟻之縁嵩鳥之冲霄不至必也亦唯其力之行又何憚夫穹崇也敢自信其所自知筆而釋其句讀名直解示無曲説者焉不事辭文貴全㫖要分章無取為其失於本真匪敢言傳逝将終身於此庶幾明徳之見有補不逮云吾道貫一而無方老氏致虛而無極若釋氏則歸空而無物矣三者若同而偏反如霄壤之髙卑孟氏於孔氏之門為有功其氣豪而辭下無聲無臭豈其然乎比而同之其害有不可勝言者讀其書而知其㫖將以内參諸其心仰觀聖人之形容察其像似而自識其真偽從而為取舍焉不隨波於末流真好學者也妄意如此明者必有以别之論語少學序推步占天未足與言天道之至緡絲測海未足與窺溟海之深膚見謏聞以求聖人之言我知其無以議為也然則聖人之道其終不可學邪曰無句求則得之不求則不得也自明其徳道積於厥躬誠以思之睿以通之問學以參之神而明之天之髙地之厚鬼神之盛遂古方來之逺将無所藏其用聖人之道其無以外此夫魯侯得之喬梓而周公識其見賢曾蒧鼔瑟詠雩而仲尼與之言志聖人之學果可以意知而事得乎走於論語之書願學焉而終身者也謂其旁通倫類細淪幽𣺌就之而不逺挹之而愈深雖一本諸人情曾非力行可到嘗朝而誦暮而思忘寢食而求但見其源源而泉混混而淵灝灝而天進乎前無以從而後遂取諸右以逢其左泯泯黙黙而未得以臻其極也卷之有以自樂行之足以迨時走於夫子之言知其一而不知其二矣强筆少學識之於書庶乎他日見之有以知其不足戻之斯改得之斯尚天未喪道或将可質諸聖人之門也曰以此明孔氏之言則庸敢不知量書古文訓序昔者子夏學書見於孔子曰商也何為於書子夏對曰書之論事也昭昭如日月之代明離離如星辰之錯行上有堯舜之道下有三王之義凡商之所受書於夫子者志之於心弗敢忘退而窮居河濟之間深山之中作壤室編蓬户弹琴瑟歌咏先王之風則可以發憤慨喟忘已貧賤有人亦樂之無人亦樂之而忽不知憂患與死也夫子造然變容曰嘻子殆可與言書矣雖然其亦表之而已未覩其裏也顏淵曰何謂也子曰闚其門而不入其中烏覩其奥藏之所在乎然藏又非難也丘嘗悉心盡志以入其中則前有髙岸後有大谿填填正立而已矣是故帝典可以觀美大禹謨禹貢可以觀事臯陶謨益稷可以觀政洪範可以觀度六誓可以觀義五誥可以觀仁甫刑可以觀戒通斯七者書之大義舉矣夫子於商之書謂之表所以與囘謂之義自以填然正立一時三語若不相謀然則帝王之書其不可識矣君子察扵三者而後可以言書今夫天之昭昭地之博厚而靈於萬物匹夫匹婦無不固已知之至於風霆雨霽之迭興海嶽河山之流峙所以知之蓋鮮喜怒哀樂出乎爾者其靜其作則或自知之不暇不察乎近孰明乎逺不得乎身何以論古之人是故以書學書而已遺書學書非書矣不以不遺未足與於書之㫖以而遺之從之不可或庶幾乎書之大義云爾子言之也書之扵事也逺而不闊近而不廹志盡而不怨辭順而不諂吾於髙宗肜日見徳有報之疾也苟由其道致其仁則逺方歸志而致敬焉於洪範見君子之不忍言人之惡而質人之美也發乎中而見乎外以成文者其唯洪範乎堯舜之命受於人湯武之命受扵天不讀詩書易春秋則不知聖人之心無以别堯舜之禪湯武之伐也語之不切見諸言外斯言之辨可以觀虞夏商周之書矣走之於書學焉不如子夏觀焉何敢望囘世無孔子則将何所取正述而藏之以待能者則庶乎以書觀書者矣𨽻古定書最孔氏文義多本伏生之説唐明皇帝更以正𨽻改定而俗儒承詔文多踳駮古文是訓不勞乎是正之也書序出於孔子㫖自有在詮次百篇之後将以歸於古學好古之癖走何辭焉昔孔子學琴操而得文王之形季子聞樂音而知其國之政讀其書不知其人可乎故叙篇端論以讀書之法序反古詩説紹興己邜冬走初本之詩序述廣序越四嵗癸未解官自東鄂始因其説而次第之名之反古詩説或者尢之曰詩古無説今子盡掊先儒之説而自為之説真古之遺説乎抑亦未能脱於胸臆之私乎曰固也古之無詩説也三百五篇之義詩序備矣由七十子之徒沒經教汨於異端齊魯毛韓家自為説凱風之義自孟軻氏已失其傳由軻而來於今又二千祀矣今之説而謂之古宜未免乎胸臆之私人之性情古猶今也可以今不如古乎求之於心本之於序是猶古之道也先儒於此何加焉棄序而槩之先儒宜今之不如古也反古之説於是以戾然則反古之道又何疑為荘姜之詩不云乎我思古人實獲我心言志同也志同而事一則古今一道爾天命之謂性庸有二理哉是則反古詩説未為戾已記有之曰人莫不知苗之碩莫知子之惡言蔽物也有已而蔽於物則古之性情與今先儒之説未知其孰通信能復性之初得心之正豁蔽以明物因詩以求序則反古之説其殆庶幾乎經解春秋㫖要序春秋者何魯史記之名也史記何以名春秋春秋魯厯之所為更也何更爾變周也何言乎變周周正建子以建寅為正嵗夏時得天猶用夏也春秋之序魯變之也然則魯變四時之序何史始官也加春於建子而為王正月建邜之月而為夏四月魯史之作也故凡春秋之序皆舍周之舊也曷為舍周之舊僭也僭則春秋何以為經春秋反正之經也禮易詩書始終乎正春秋紀録不正所以反之正反正以其所不正則五經之教無時而或替也春秋常事不書書變常也變常則何始於隠公疾始變也始變昉於此乎前此矣前此則曷為始扵此託始焉爾奈何魯春秋之始也魯春秋之始何史始之作於諸侯也諸侯孰謂謂隠公也先王之制諸侯無史天子有外史掌四方之志而職於周之太史隠之時也始更魯厯而為魯史諸侯之有史其周之衰乎費誓秦誓列扵周書甘棠韓奕編之南雅烏在諸侯之有史也晉乘始於殤叔秦史作扵文公王室之微諸侯之力政焉爾然則春秋何取扵魯因也其因何因魯之史記其春秋仲尼之志也春秋何以為仲尼之志善揚其善惡言其惡而無私焉爾何用見其善善惡惡而無私也曰直筆以書其事因事而致其離善則善惡則惡不為褒貶抑揚而亂是非之正也春秋用褒貶為道其曰不為褒貶何也褒貶非仲尼之意也三家者託褒貶以為傳也何託褒貶以為傳舍褒貶則無以為傳矣三傳之所為褒貶何也不知春秋也三傳何以不知春秋春秋之教治棼而不亂處羣而不黨是是非非而天下之理歸之矣不知體要不存教法心移扵毁譽而事奪於春秋則是褒貶之説亂是非之正也事辭為教春秋也攷辭而知其事因事以觀其理不能顯白而待傳以發曰晦也晦之為道傳之為經則事辭之教荒矣孟軻有言曰王者之迹熄而詩亡詩亡然後春秋作平王之東也變風害雅五侯擅政蠻夷亂夏陪臣柄國仲尼修春秋以明實録将以反經之正典常禮法無所與存焉正亂常而還於舊物者也是故直書以明得失謂之辭正辭以别是非謂之事屬辭比事莫善於春秋春秋之道治亂之法也因史之僭事亂之本也事易其常莫之或止禮樂崩壞春秋見之且夫事有是非道有邪正治亂之所從分也邪正不白是非不辨人行其意其誰能有反於是列紀以著之修辭以述之㑹盟朝聘之作師役祠祀之行畋漁逰觀之為崩薨卒葬之禮苟失其舊無不備舉可行於當世可示於方來小人憚焉君子達焉則春秋之所用心盡在是矣其事則齊桓晉文昭其義也其文則史正其辭也昭義正辭則亂臣賊子云誰之不懼撥亂世而反之正春秋之謂也今夫淺害深非亂是新變舊傳掩經所謂反常也經之云正不累於辭所謂服仁也道反常三傳之失也服仁守正復古之道也經解之造經用釋經而歸正於經者也㫖要之謂辭達而已君子苟春秋之為好不以棄傳為過而反求之春秋之義也専門墨守則非下走之所敢知漢輿地圖序輿地圖舊在御史大夫寺大夫官罷更屬大司空故圖冠司空官名曰司空郡國輿地圖圖載郡國縣道國邑鄉亭備之可披按也故事天子有大封建丞相大行奏可則御史上國請名其所立國其後司空如之事在元狩六年四月丙申丞相青翟御史大夫賀請封皇子三王及建武十四年三月大司徒漢大司空融請封皇子諸王奏事司馬子長褚少孫班固取之備三王世家世祖本紀古之帝王将施疆理之政於天下者曷常不以圖籍為重哉是故舜釐下土厥有九共禹别九州任土作貢周官大司徒之職掌建邦土地之圖以周知九州地域輪廣之數職方氏辨其人民材用而周知其利害土訓詔王地事司書掌之漢初丞相何先入収秦圖書髙祖以此具知天下阨塞户口多少强弱處民所疾苦用平天下諸侯嗚呼其亦重矣由漢七年長安未央宫建秦氏圖書藏石渠閣御史所掌有郡國輿地畫圖圖自漢氏為之非出逺也語曰天為蓋地為輿輿地之圖所以盡載地域經緯之數人民之衆寡土地之產財物之用皆王政之本也物有甚輕而用可重者圖籍是也周之衰也諸侯異政六王並起天子無容足之地四方號令不行焉而天下宗之號為共主者以圖籍之所存也當時强大諸侯如秦恵宋偃齊湣之屬蓋其心未嘗不欲舉三川窺周室而出圖籍矣終以不遂由諸侯知有所重而周守之嚴也及秦政以虎狼之强方世世蠶食東方諸侯其貪肆亦足以騁貪燕督亢地圖上而荆卿之難作周秦之際取之如此其難也孝武皇帝在位漢興七十有餘年矣典司懈守故淮南王安得以按圖日夜與左吳等謀變部署兵所從入賴天子明聖以時咸服其辜然則殆矣世祖中興初王郎反河北上自薊至信都舍城樓上披輿地圖指示将軍禹曰天下郡國如是今乃始得其一子前言以吾慮天下不足定何也聖謨宏大其自謙如此宜乎平一天下化行夷貊建武二十三年匈奴地圖古薁鞬日逐王比使漢人郭衡奉匃奴地圖地輿之内舉上圖籍矣漢元以來此為極盛孝明封王諸子按圖以知户口多少曰朕之子安得眂先帝子章帝又以圖均諸國户口租入新息侯援之説隗囂大将楊廣曰按輿地圖天下郡國百有六奈何以其二當天下百有四然則輿地所畫其有不備者乎奈何史亡其人害於因習分率亡紀準望不立名山大川多略不載雖有麤形又非精審故如山川要塞相去不能寸數而間獨數千百里視之甚易行之甚難以至違義失實不可考按司其籍者寧不曠敗矣哉雖然要略陳者不可罔以大綱形模具者從可彌縫其闕周秦地圖世旣不可復得藏秘書者獨有漢圖輿地後将圖寫四方形勢周知其事而禆地理之闕者故當用輿地圖為本始為舉其撮以為司空序略云漢書正異叙右漢書正異得之武進令姚寛皆已繕寫可傳始走讀通鑑考異至京房之諫引吳越世家漢書唐本方今世傳板本為詳恨生之晚無從啟覿旣而逰蜀睹學宫所樹毋氏石經實唐天寳諸經文字或異於今國子監刋行本從知故書之幸而存者失真衆矣五季於今不二百􅑤諸經漢史家有之紕繆尚此其多他書或止单出者吁不可及已今諸經旣從先儒舊監本出五代中朝方後蜀之書林甫所訂為不侔矣唯班漢史譌久逺自典午渡江已然梁武帝時劉之遴張纘到漑陸襄奉太子教訂正鄱陽王書條異状十事大略言漢書古本稱永平十六年五月二十一日己酉郎班固上其叙傳號中篇略去班彪行事云自有傳合記表志傳為卷三十有八外戚傳次帝紀諸王次之陳項在其後其韓彭英盧吳傳叙云淮隂毅毅杖劍周章邦之傑子實唯彭英化為侯王雲起龍驤其引今文龍驤亡省馬者又卷三十七解音釋義以助雅故今本則亡餘史不具可意而知走意固書之訛其道有二始固以古文寫本後以佐書易之篆𨽻之不同其訛一也自固書出漢人學以名家師説不同傳授滋改其訛二也梁書所謂三十七卷抑傳者為之卷縂其篇禇以代簡故耳今其書亡舊矣當以顏師古注本為定如世俗模板非唯新故有異而吳蜀閩楚之傳復有大不同者走私竊病之乃幸自天得此善本姚令越博通士也家傳宋祁手校漢史具有唐南唐吳越及神宋再世所刋書間有徐鍇余靖陳繹宋郊司馬光劉敞劉攽是正處所走喜於獲瑰寳用集略為二卷得有先後故傳居前雖梁氏舊書不可得見於顏氏本可以為完矣惜其不及范氏史也當營求補之兒曹以觀漢書可不自有别諸年月日叙擬班固漢書序漢興承秦滅學之後柱史曠官簡編淪廢孝武皇帝時太史令司馬談始慿楚漢春秋記録漢事談子遷繼世為太史令克舉舊職上自黄帝迄漢麟止整齊其事附益見聞成史記百三十篇變古編年為本紀世家表書列傳以漢先帝繼百王之後厠秦項之列太初而下又闕不書後世好事荐紳先生禇少孫史孝山陽城衡馮商揚雄之屬雖頗有綴緝類多蕪短不足以繼太史公父子之後最後劉歆書以甲乙相比號稱博洽然猶叢脞纂録未就統紀中興茂才徐令班彪才髙而好述作乃繼采遺事傍貫異聞作後傳數十篇不為世家紀傳而已彪子固私就父業探撰前記起元髙祖終於孝平王莽之誅十有二世二百三十年為春秋考記表志傳凡百篇八十餘萬言盛漢遺文始就一家之作後世之言史者皆本之遷固嘗考載籍炎黄以前尚矣爰自虞帝作書上聨堯典仲尼約史為魯春秋左史記言右史記事於書春秋備矣乃其古文質朴書非該贍太史公創新記傳合事言之史班氏記録大約作太史公書祖宗大政疏為紀人臣庶事條為傳紀之所略傳之所詳也其有舍此録彼微辭隠義後先互見率婉而成文優而柔之乃見其㫖至若禮樂典章廢置之迹漢之所以為漢也宜當備見首末志實書之公卿繫國安危侯王漢藩輔也拜免嵗月興亡所自不詳則漫而無所考見詳之且不勝書譜於旁行㑹於年表漢廷舊事細大畢舉矣顧不偉哉學士大夫讀虞夏商周之書觀其簡嚴繁縟則知四代所由廢興春秋推見至隠而事辭垂以為教班氏父子以漢文士纂述漢史其文縱以約其義簡而明曲折有容遣辭條暢猶風行水上自成文章讀之如身在漢廷雍容論議之列使人亹亹忘倦謂之良史不誣也惜其書不及竟身以幽死其八表天文志女弟昭及扶風馬續踵成之損益次第或未能盡得彪固深㫖儒者憾焉後世史官華嶠范曄追集漢中興書其文旣不足以接固前史而猥排固以賤死節否正直将以自見已學顧第不深考漢書稱殺身成仁者衆矣掌書墜軼間因他事時或表見固意自有在難與单見寡聞道也善乎司馬遷之論曰孔子著春秋隠桓之際則章至定哀之際則微為其切於當世之文而罔褒諱之辭也嗚呼在遷之身亦是戾已孝武帝焚孝景今上本紀而遷有蠶室獄户之禍固贊十二帝紀多録小善掩大疵其詳於傳出之亦足以發議者以為務飾主闕盖未足與言春秋之義不然或告固以私改國史孝明皇帝其不堪之矣故為辨説為序冠其篇端擬漢髙祖沛泗水亭碑銘序擬郎臣固作有漢嗣皇帝以烝烝之孝紹中興之統推祖配天無忘耆艾閲堂室而興嘆睹旂常而永懷甲子詔書蓋聞崇徳報功先王之大法也髙皇帝仗䇿豐沛從諸侯士大夫滅亡道秦誅項王之罪南面而君天下至於今賴之永維蕭曹諸公宻勿大猷勤勞王事權輿不一緒其勲庸功著與為多焉昔殷之先臣胥及逸勤而與從先王之享君牙祖父以服勞王家而紀於周之太常朕惟十八侯之功勞輔成漢業不在殷周之後祠於侯國而無列於祖宗之廟朕甚慊之其令沛郡太守下豐令即泗水亭髙原廟為十八侯位祠庭下如其倫郎班固其銘勲伐附著亭碑之後以增光我髙祖之烈昭示來世永永亡窮稱朕意焉郎臣固奏陛下無忘舊勲序次十八侯位於髙原廟且欲贊述其事而命臣固為之銘甚盛徳也臣愚何足以知髙祖之聖其一時輔佐類皆出人之傑又多臣固凡庸之所不識臣固謹議髙祖起泗上亭長不階寸土持三尺劍芟頑剗暴五年而建萬世無疆之業此二帝三王所不及而髙祖乃優之功烈冠古昔造化侔天地十八侯起身微賤攀龍鱗附驥尾名書鐘鼎以成封侯之事其功庸知計皆已暴白於天下十八侯位次用昭顯我漢元得人之盛逺追唐虞之十六相周十亂臣焉臣聞泗水舊亭漢初築宫其上跨臨清泗起石梁門闕髙祖十二年冬已擊黥布還置酒沛宫悉㑹故人父老上為擊筑興故鄉之感歌三侯之章發沛中兒百二十人習歌之上曰吾萬嵗後魂魄猶樂思沛故孝惠王年思髙祖之悲樂以沛宫為髙原廟教歌僮習吹以相和常以百二人為員世祖建武五年七月丁丑幸沛祠原廟孝章章和元年南巡狩遣使者奉祠著令祠官諸侯王列侯二千石稱漢使者侍祀嵗以為常惟原廟實髙帝神靈所舍前世奉祠蠲潔如此孝孫承承紹述先志有嚴有肅無荒無斁竊意故人父老宿相逰從而髙祖念之至興悲惻十八侯所與共定天下也君臣之際相與之樂夫豈故人父老之流髙祖之堂乃不在配饗之列佚文墜禮及陛下而後定追原所自不忘本起此豈無待而然哉臣雖少文敢不奉詔謹如周公頌武吉甫歌宣為泗水亭碑少揚髙祖聖神之徳而銘先正元侯之功惟其次曰酇侯蕭何舞陽侯樊噲留侯張良絳侯周勃平陽侯曹參户牖侯陳平南宫侯張敖曲陽侯酈商潁陽侯靳歙安國侯王陵襄成侯紀成棘津侯陳武曲成侯蟲達汾陽侯周昌清陽侯王吸皆有銘其餘功臣如魯侯奚涓廣平侯薛歐陽都侯丁復繼雖登位十八與前十八侯國名位次時有更易升降是皆後來之舉或吕后所定非髙祖之故也茲不復叙郎臣固昧死上漢中興頌序擬賈逵作叙曰漢興垂二百載數遭陽九運鍾百六大統三絶天傾鼎震大盜席椒庭之寵竊位槐之重託伊周之事行羿浞之志布置腹心芟鋤異已不越帷幄而國命移矣於是乾坤易位攝提亡紀九州同乎淪墊上帝被其誣罔神怒人怨菑害並興尚且嚚嚚然謞謞然造作符命文飾六經自以為山川鬼神可用矯偽欺而狙詐得也世祖光武皇帝當四七之際接九世之統捕逐不道名著圖籙憤我髙皇帝之大業湮墜於地哀矜黧老之為匪民而為請命於天乃龍翔白水霆擊昆陽沈慮先機宏度濶達列宿為之指使風雲由其翕合瓦飛豹栗而兇徒填壑賊臣授首雖軒帝涿鹿之戰夏后塗山之僇不是過也建武之際二儀草昧萬物萌芽上披赤心恢大略神謀睿發卓然偉斷皇天眷命景貺昭答根柢河渚拯塗三輔摧亡堅陣剪亡勁敵待降不死嬰鋒隕墜萬方徯后九服懷仁由是龍戰莫之敢校虵豕亡所與食銅馬赤眉大槍尢來燕代青齊隴蜀之㓂孰不妖氛坌垒昏州闇野揮汗則晴天零雨掊飲則河水絶流旣乃喪元折首投甲山齊水釋春融扶服奔亡之不暇故在位十有二嵗而六合一家髙武郡縣罔不底屬謂武功不可以為治也乃止戈講學下馬訪道動亡過事自致丕平復三十而税一紹封殷周之世仁風揚宇宙聖化行蠻貊於皇韙哉其不階尺土除新之暴髙祖之業也謝西域之質却千里之馬太宗之美也升中岱岳建立明堂孝武之制也總攬權綱威信北狄孝宣之治也上皆兼而有之至徳大業信可因三成四襲五為六雖少康之不失舊物宣王之復㑹東都何以加哉聖上下武烝烝遹追來孝纂述先帝故事以紹前紀聖作明述綽有休譽永平十五年三月上行幸東平以本紀示介弟驃騎将軍東平王蒼蒼覩兹盛制情動於中歌詠成功而上世祖受命中興之頌聲韻鐘石文成韶夏雖公旦穆清之什咎繇屢省之歌無以多讓所謂形容盛徳可以告諸神明者頌有之矣詔問可比何等而校書諸郎猥云文似相如揚雄近世史岑比之非善謂倫擬者也臣逵披服聖訓稱其典雅王言天逺靡所與京竊惟昧學面墻欽奉明詔思自罄竭以稱上心而敏愧食時名非多識臣逵死罪死罪伏以春秋聖人筆削㳺夏一辭之不措而五傳競出各自名家二典雅南世有箋傳臣雖不敏亦欲以通釋善頌同漢詩之文於大雅之訓故惟我世祖之烈聖朝之典賢王之撰顧不足以發揚萬分之一二而童䝉鄙野庶可因傳註而知分寸焉其間識慮淺陜適為詆誣盛漢臣雖萬死未足云謝校書郎臣逵上香奩集叙韓偓香奩集二卷蜀本詩一百一篇京本詩賦二篇詩一百七篇曲調二章秘閣本同亡詩十篇三家篇什相糅莒差次不倫以讎比除複重定著賦詩曲詞一百十二以朱墨辨閣京本皆已刋正可傳偓字致堯唐翰林學士承㫖朱全忠顓命㠯偓行禮為簡傲放外以死事見唐傳曰字致光者譌也偓為詩有情致形容能出人意表有集二卷其一此書晉相和凝亦嘗著香奩集皆委巷艶詞猥褻不可示兒時已有曲子相公之號沈括筆談著論乃以是為凝書陳正敏為辨之設二事以騐謂吳融集有和致光無題詩二與香奩詩韻正同而此集序中正載其事一也向嘗於偓裔坰所見偓親書所作詩卷其裊娜春盡多情等篇多出卷中二也偓富才情詞致婉麗固非凝及而北夢瑣言載凝小詞布於汴洛作相之後收拾焚毁則凝之集乃浮艷小詞安得遂以香奩為凝作走謂正敏辯得矣傳稱凝嘗自刋已集為板本而特謂香奩集不行於時行不行在凝則此集為可知也况詩與詞曲固有不言之辨其詩有岐下作者而凝未嘗在岐江表志王延彬子繼士與偓子寅亮㓜日通家寅亮母尼即荐福院講筵偶見又别者也今詩亦在此什則斯集也為偓語可不疑夫人之著書上世猶不免沿襲春秋大典亦有十數家書學者不究謂何泛以名取則晏吕之傳為孔氏之經矣以凝艷曲歸偓集者不幾於此乎信筆談者雖甚或於此必自有辨年月日叙李長吉詩集序右李長吉詩集四卷蜀本㑹稽姚氏本皆二百十九篇宣城本二百四十二篇蜀本不知所從來姚氏本出秘閣宣城本出賀鑄方囘家凡集三家以讎比正舛譌槩之杜牧之叙宣城本多羨詩十九蜀姚氏本少亡詩四今定詩從宣城本從蜀疏其異同於下著姚氏本於上大校宣城本不逺蜀姚氏本最為審訂皆已刋正可傳長吉名賀唐宗室子也本書有傳其小傳出李商隠悉已暴白行事蓋不必言長吉諱父嫌名不舉進士雖過中道然其蔑富貴達人倫不以時之貴尚蔕芥乎方寸其於末世顧不可以厚風俗美教化哉其詩著矣上世或譏以傷艷走竊謂不然世固有若輕而甚重者長吉詩是也他人之詩不失之粗則失之俗要不可謂詩人之詩長吉無是病也其輕颺纎麗蓋能自成一家如金玉錦繡輝煥白日雖難以禦療寒饑終不以是故不為世寳其詩當無日不賦而傳者祇此何則長吉慵次已作友朋率蚤死故録偕亡遺詩李藩嘗集之從其外兄求益授之旣久求之不復謾曰長吉素易我我銜憤次骨得其文輒投坑圊那復有詩是必設辭拒藩非實有此遺詩終以不見豈天受寳故耶小傳之説誕矣學者已不盡信近世任信臣者又記書仙事實之仙者慶厯中長安女娼曹文姬也頴而工書名以藝得睹朱衣吏持篆玉示曰帝使李賀記白玉樓竟召而寫之琬琰家人曰賀死嵗三百矣烏有是文姬曰是非若所知也世載三百仙家猶頃刻然乃拜命更衣颷然飛去走稽於傳賀不聞於記事有所長且以落筆章成見稱前史自玉谿子固已記白玉樓事逮文姬更記三百天家日月雖長其敏速尚何道信天有帝王羲之輩皆已亡固不乏工書之臣何待此文姬者文人設辭指事殆寓言乎走懼其汚長吉故為辨明年月日叙叙十國紀年右劉恕吳史六卷唐史六卷蜀史七卷後蜀史六卷吳越史四卷閩史三卷漢史二卷楚史三卷荆南史一卷北漢史二卷凡十國紀年四十卷以亂世記注知之者少故文多舛錯差次不倫以校讎是正曉然而闕其所不可知為繕冩始可讀初唐以方鎮理天下王政之去自此始自黄巢俶擾藩鎮歸於奸雄尺地一民非復唐有天子獨抱虚器寄身亡所逮朱梁篡弑五代迭興於是遜者王强者帝跨淮涉隴為吳蜀吳越閩漢楚荆之國旣而後唐舉蜀孟氏奄其地有之唐氏篡吳兼閩楚而不能保周初太原别為北漢通數十國與七代相終始本末百年神宋龍興然後平一夫亂極而判已離而合天下之常勢古今之所同然者十國之主類無深謀逺略其守臣節奉王貢者絶不知齊桓晉文之事僭帝空名亦非復湯文之舉齷齪自保偷安一時輔導之臣皆斗筲小器亡通知王伯大略以致主安民者至其興亡之迹理亂之源行事之是非謀猷之得失與夫逸民節士良吏正臣之行已僭叛小人之狂妄承唐接宋有不可得而没者舊書國自為例漶漫雜蕪而不可稽攷治平中知制誥路振始志九國成一家書惜其得書未備疏略者多荆南一篇闕而不録御史張唐英補志北楚書稍就完恕名有良史之才留心著述嘗從文正司馬公學與修資治通鑑紬繹館殿盡未閱之書於是裒集衆家參諸野記纂修斤削以就此編腹笥未傳卧疾云殆其子居外恕書趣以歸曰吾忍死相待即床下口授傳之始恕欲為十國百官方鎮表年未就而卒紀年有文正公序范公淳夫為恕墓表黄公魯直誌其遷𦵏其言行舉矣是書蓋一世竒作其叙事微而贍簡而詳疏而有㫖質而不蕪廣博辭文賢於國志舊史逺甚然而牽於多愛泛取兼收瑣務中人尚多誌載至其書法端不俟後言而見恕萬年人也字道源先文正公卒文正公相表官其一子初文正公以道學講明洛下恕居門弟子首列雖嘗第進士終不一去師席使夀而及於元祐其立朝誠節必亡愧諸公矣不幸而夭可為慨嘆紀年故書無録第其篇目如上十國紀年通譜序事明於一疑於衆舉其類則疑者明三代以前萬國分治書之典誥何其明且約也蓋天下車同軌書同文行同倫萬國之政繫於一人四海之大猶一身上下之禮明中外之治均比户可封人亡異情載筆之臣何所記脩律度衡量然猶未免於時狩而同之也周徳衰王迹熄徐楚僭叛征伐行於諸侯正朔不稟於京師國異政家殊俗變風競作聲詩異編春秋常事不書類以舉其疑也太史公譜共和以來為十二侯六國年表稽古之士得以攷見焉漢世宗紀年建元為國家者循以為故時移世變自為聲教者往往各名年紀二君並世則行事異而正朔疑矣不明其類曷舉其疑十國判於唐衰一於天宋中更五代時並異書讀其傳者不習其時常以為病劉恕紀年載述假日名甲子繫之年舉衆明疑一其類矣至於參攷異邦之事則尚有臨軸而廢卷者為之旁行譜繫列其嵗紀舉疑明類輔成劉氏之闕先唐改元天祐而蜀猶以天復名通譜之書從此而斷迄於平晉凡七十有六年年殊朔别用通譜於左方武昌土俗編序武昌為邑舊矣肇自孫吳建國為郡為州進而督藩降而邑縣官司未嘗改也山川未始變也物名稱號多因時而革者雖邑之父老間或不忘其故它州攷古之士将無所稽據焉仲謀陶庾之風聲幾何而不泯也不有書志其何以傳武昌記舊有成書世久不見中更俶擾並與圖經而失之近縣令唐時顧遺墜之罔收倩故家子雷某追録圖經中事收拾采綴十舉四三譌謬不倫比比而是名都要㑹世所共聞舊事前修來者斯問端倪不對負愧多矣儒行履方以知地里况令長之職官乎故走本記搜圖旁求稗説參諸故老訂以前言附見土風成武昌土俗編二卷俾邑之逰者不必問問者不必語開卷畧舉以代煩言為省事之一端用備遺亡云爾至於兼收遺佚以成土地之圖上禆天子之司徒則吾豈敢書武昌土俗編叙武昌土俗編鋟木於紹興壬午走旣才庸學寡加縣出兵荒餘燼無藏書以攷閱往事士非耆舊無所質疑姑盡所知搜羅野老之說草創編袟垂被代而出之凡聞見之所未周或知之而未悉皆不及著其間名號更易不可究知當去反留當書反闕者一書之内夫豈不有自求其失則所未逮故書編目求取正於當來唯乃仁人矜此愚昧摘瑕補過易視聽於傳疑使走不以此為妄人乃朝夕庶幾焉者六月庚午書於筠鄉書舍序輥弹漏刻輥弹漏刻始於唐僧文誥行於中軍其制度在十國紀年簡略不可稽據走官東鄂始於戍将得之其制為二尺屏風縱横正等以七尺五寸之竹通中交解而四截之斜倚屏中隠其機括蓋以銅華菡萏承以芙蕖為銅弹十有二銖者十珠投其一於菡萏厯筩道四折而下墮芙蕖中其聲鏗焉以次發其九弹屏上列牌為識凡二十牌盡十弹而轉一牌牌盡而復則書其數於紙一刻為一牌十二牌六十復而晝夜均十二分之每一時而牌五復盡八刻三分之一總十二時而百刻之數盡五夜更漏去旦暮漏五刻夏至夜短極每皷牌四復餘一牌有六弹籌閲牌十六餘三弹而差强夜漏漸長每增一刻則籌加五弹而弱累增一弹每鼔為二牌餘四弹冬至晝短極每鼔牌六復餘九牌有六弹籌閲牌二十有五餘九弹而差强此其要略也紀年鼔百二十發為一刻與今屏漏正同其言輥竹三丈二尺而發一鼔其長已甚将紀年承舊史之誤抑文誥所造於今有平易徑急之殊哉要之徑急者其發多平易者其行緩舊法增今二十四尺十五寸而皆百有二十發前史之誤可以無疑在易乾象有之天行健君子以自强不息後之釋者以為勉强之强而不知天道之自然夫天道之自然日行三百六十五度四分度之一人得候其晷以測天常之為道也至矣今之為晷漏者其法有四一曰銅壺曰香篆曰圭表曰輥弹銅壺一家復有數噐為器雖異所以占天一也在銅壺則有苔氷遲疾之誤在香篆則有麤細燥濕之殊在圭表則有雨暘蚤暮之差戾均所不免人能莅之唯謹而器無爽忒之事者惟輥弹為然輥弹以二尺之屏一丸之弹仰占天道而造次所持行之一人見之於用自强不息與天為徒君子終日乾乾斯其意矣走竒其物小而可重也将廣其傳於世故為序之云送甄雲卿赴西宫學官序道家者流有金丹之術走初未之學謂如漢方士說煮丹砂為黄金則可以致神仙其語信荒唐問於道學之老人老人曰金丹謂内藥也鍊神與氣毋以外物傷吾内則大藥可就而大仙可致化人之袪可執老𣆀之舌可咋洪崖之肩可拍矣走矍然曰是在吾術内但異名耳孟軻養浩然之氣四十而不動心尚論於古之人此仲尼所以告曾子曾子語單離居者安得通方之士與之共論此術哉雲卿念八兄以易名家壮嵗取科甲聲名藉藉在人耳目間一時公卿大人見之無不傾挹仕不輒偶一鄉之士類無得而親疎者走罷鄂陵長始獲交扵雲卿出原丹一篇蓋是説也從此與之交孰知其為人自處之髙風斯在下道心内切罔象曷求焉是固雲卿所長要亦為雲卿累雲卿教國胄子分職在閩中騰達飛黄必自兹發也居貧抗手曾不能為黄金以贐其行嘗聞閩多古書道家之藏為甚富雲卿尚友今之君子豈皆不足與於斯乎雲卿志抗浮雲氣充天地持其志無暴其氣日益日損神氣有不充邪吾意其必且夢周公騎箕尾矣以道之腴治已以土苴治天下雲卿知必進於是也走細人也學不能造乎道而渾沌之睂儵忽之竅所以喪吾真者日勃谿於方寸輔仁者去則金丹何冀焉雲卿老於詩文走不可以雷門布鼔序意惜别又将以已之所甚難者責望吾雲卿云賈氏家譜序邵武賈麟之始以進士髙第試主武昌簿領適走假令茲邑獲親炙其議論麟之問學有淵奥走旣賢之逮升堂拜其母氏知其聚指過百家不至豐殖教撫族父之孤甚至走益知其内行蓋學士大夫之卓然者然亦未知其所自得它日麟之攝事郡府以文字出入諸臺間奏記之叢日不暇給倐然以一編書寄走尺牘将之曰家諜尚矣近世於此殊略吾不忍也蓋嘗譜吾繫姓皆有所示公其為我叙之矍然曰麟之知所本矣其可以辭為略書氏姓之説冠諸篇首曰姓性也分於天而判於人者也是故序昭穆别宗祧非姓曷以明族類正人倫非姓曷自㑹生齒治百官非姓曷得蟠天錯地振古而今措之中夏而準措之夷狄而準一定而不可易者姓性為然先王因生以賜姓因官以命族由之此道矣後世生類益夥因土著以明族望古今異道其為教本一而已晉鼎析民始遷僑舊旣南安於土斷魏更官氏華族是同南則王謝朱張北則崔盧李趙雖曰喧囂是競辨族之意猶謹也考唐宰相世系林氏姓纂譜繫之學猶班班焉五代王十國判義養盛宗姓淪人知其所自生蓋千一矣記有之曰萬物本乎天人本乎祖學士大夫則知尊祖矣世譜之作所以知族姓明祖禰之所從生也可不重哉麟之知之矣譜其得姓之始氏族之判次其宗望有本有末信以傳信百世之學也不知則闕不敢誣其祖矣麟之之為是書也上不敢誣其祖下将傳之百世不知本者能之乎漢之車公唐之貟氏百世之上烏知此道哉諜曰應者乃麟之欲知其人觀其譜浪語集巻三十
