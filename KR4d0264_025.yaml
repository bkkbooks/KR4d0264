body:
  text: 浪語集卷二十五宋薛季宣撰書答葉適書某聞之務博學者必自約樂教人者必自修執事通百氏諸子之書可以為博矣為人師而學不厭又知所謂約矣聽於塗說不以某之不肖惠然肯顧投以尺書望我以急難扣我以學問以諸葛武鄉之英特謂我聞風而慕之以王梅溪鄭著作一鄉之善士許以雁行而肩隨某雖至愚自知甚悉未能為己何以為人未克自明于何明物若武鄉則吾豈敢王梅溪之方正鄭著作之沖養是皆吾黨之望願學焉而未能者其又何可擬邪讀誦靦顔不知何自而得此也范文正公鎮陜右孫泰山張橫渠初以逰客干之公能資以讀書告之名教之樂二先生賴以有立卒為天下大儒范公得位時大任非吾事也名教之樂願與執事同之執事秀發妙齡多聞多識通于古明于文行不自賢不恥下問一日千里吾知方發軔焉及于八陳為邦將無著鞭之太蚤而某庸敢當也約文以禮顔氏所以立于仲尼之門執事方以教人敢請從事于此若夫夏時商輅周冕韶樂四代損益孔子非亞聖弗之告先王寓兵丘井建之邦國舞之行綴教民後戰不以軍容入國有本有末躐等之學難矣乎言志而賢舞雩問陳而稱爼豆為學自有次第仲尼豈欺我哉故欲執事先之軍旅為邦願執事之姑舍是也抑某又嘗聞之子夏曰君子敬而無失與人恭而有禮四海之內皆兄弟也士患敬恭之不立夫不容奚病焉修道教人執事其從容于是矣執事有親之奉日虞甘㫖之弗給不抵人而抵我其所望于我者甚厚且深其方空腹而逰獨行踽踽不足相為軒輊以孤從來之意甚恐姑誦所聞于博約之說者復之將命執事之不我弃庶幾能諒之乎答象先姪書某啓八吾姪上舍攜别浸久方切懸思僕歸收書審知即日首夏鄉炎啓處佳勝仍聞肄業湖上挹山泉之清秀以資涵養供筆力之助甚善尚須力自勉勵毋以時學而小之得失付之於天務為深醇盛大以求經學之正講明時務本末利害必周知之無為空言無戾於行則前輩之事何逺之有學無今古適睹時學益人之大耳位中上下皆安某以交代尚欲補填一月夏中可以即路交事不出六月上中旬間房下粗安它亡足道王樞書未欲作方以州縣竊祿自喜姓名詎可關諸政路悠悠之議自非衆人所謂人情服習苟且宜吠所怪然道路籍籍頗云有兵意良工之不示人以璞莫無是否羸病未藥而求孟賁手摶聞其他日之論當不若是疏也作事若管夷吾可矣其不切致主以求欲速之功令人多恨況僥幸成事必無是理論者謂晉淝水之役以天幸議謝文靖公父子每思軍中欲害萬石不忍于一處士所以用衆非一日之積矣方其命將內拔諸不經事少年以韓康伯與𤣥之疏固已許之擊賊郤詵怨也知其必辭𤣥問計而安不應荆援至而安不喜方賭墅於王師之出視捷書如無事有孚盈缶寧徼天之幸邪身危死外功弃不卒其弊安出亦若夷吾而已張魏公劉開府望實俱喪龜鑑不逺要此一著不容再錯前日尚可如今大事去矣詳思朝中人物未見其輩觀棊靜處每髙當局未能忘情于物故不能不眷眷于若人因報及之火之為望開館相延固善然公府不易作客千萬審處無勞輕動景望失得有命所謂舉而不能先者之命歟答徐元德書某不肖之跡見疑于世久矣茲蒙三兄眷顧特達然若有不相亮者敢盡底藴冀一知之某不夭蚤失義方之教仕緣世蔭以惰不為科學之習居官無有治蹟可以求知上官心非不欲為衆所為顧不能耳士夫過聽或意其尚古人之學不知我者遂有衆多之論二者于我雖異其不相知一也前某伏蒙軒車見過不以愚鄙見絀洊辱名刺則以學生自居昔者徂徠先生與泰山先生德比名齊舉相似也徂徠自謂不及拜泰山而師之天下方知有師後世不以為過以二先生道誼之重天下信之不疑回既倒之狂瀾故不難也執事之舉將無欲效之乎師道不明此風之不作也久矣某小醜其何德以堪之在執事自處則賢為人謀者不幾乎厝諸爐炭之上矣某雖不學其自知甚明非其有而取之何逺於盜此所以逡循退辟不敢當大禮之盛也茲蒙鐫諭諄復敢固以辭且執事之下交夫豈徒然者也某所期於大君子者端不在是不我遐棄固所願也尚幾以道為度毋以過禮見加姑為朋友相從亦足以講藝為學無駭俗目使某不墮于好為人師之誚愛人以德之意想執事樂為之用布腹心切希財量抵楊敬仲簡某景嚮有年矣姪子每自庠序歸省輒能具道問學之妙行誼之美及所以提誨之甚寵顧以未嘗識面為恨鄉來幸會獲合并於武林雖承教匆匆弗及詳欵養養之至然一面而悔吝釋接奉而羣疑亡所得固已多矣幸甚幸甚分決之後竊審擢榮上第雖為宏材本分內事然而藴畜之富可以次第見諸施為未能絶意于時尤為善類喜也占賀方阻乃蒙尺書下問情親意厚愧荷兼之寵諭不可曉知之言足驗天有顯道義命之重非仁賢惡所望之雨晦雞鳴乃今見其人矣世道漸迫不尚勉旃某辱譽過情非所當有不知何以取此令人愧汗因諭之及請得一言滅學以來言行判為兩途舊矣其矯情之過者語道乃不及事論以天何言哉之意其為不知等爾某雖不敏于此竊有所好而清談脫俗之論誠未能無惡焉前此對人未嘗言之間因當路縱談不免加之針砭非得已也反求未為無纍慙顔厚于重甲良工之不示人以朴吾罪大矣察人倫明庶物幾吾曹共勉之爾不二于物非所敢知僑居荒僻新除尚未知何地何日之官有家姪便可寄聲時蒙發藥是幸抵沈叔晦㬇某僑止他州未辨旋返陸陸亡可言者竊知調尉上虞良便仙里戍期不大逺否人情咸以久次為苦而兄承有投閒講學之喜漆雕子若之善而今為兄有之騁騏驥以御長途知其莫之禦也甚善甚善某學問未之有見仕本為祿而諸公過相拂拭出應事物之變觸目疏謬咎皆自取士夫望之又過何可當也加意之誨非甚憐愛我者疇肯及此已事不足復為兄語所為誠畔中道然而拯溺救焚之計有不暇顧拖泥爛額之患者傷亷一事寧無多餒于中忍而不辭無怪乎人士之紛紛也强顔處此負負何言蒙警䇿之其敢不勉他有可以鞭其後者非左右焉取哉勿鄙夷之萬萬加賜為祝承諭學不躐等之說某與家姪曽何足與知之察兄所安端不愧斯言也既蒙鐫誨敢索言之以某所聞于不躐等者自明明德以至于知所止齊家治國而天下平其序端如貫珠不可易也唐氏時雍之化蓋由此作焉古人以為灑掃應對進退之于聖人道無本末之辨中庸曲能有誠之論豈外是邪學者昡於誠明明誠之文遂有殊途之見且誠之者人之道安有不由此而能至于天之道哉今之異端言道而不及物躬行君子又多味於一貫不行之歎聖人既知之矣可與學者未可適道所以曠百世而莫之明也信言果行夫子謂之小人之事以為禮儀威儀待人而行不虛行存乎德行不知何者為等又將何者為躐邪必以小學大學為之等差則吾屬異于成童而下孟氏之欲自得之也果何物乎某於此不敢自謂知之然願學焉者也所識如此未嘗敢以告人明難瞞一掊擊之幸也輸寫以復來教將無甚類衒鬻之為乎一眄丙之毋重吾過與柴察院瑾某竊謂天子明聖誠不世出之主然有治道未洽非有他故羣臣鉗默太甚患事不上聞耳比某與趙俊臣來言邉鄙數事二人相為先後其間雖有甚難合者數日之後靡不聽從由是言之臣下負焉多矣昨者濡須相語台座不過請郡某未知所處今某補郡矣察院乃居言責之地回瀾浴日其復何辭惟今天下疵瑕未易毛舉要先正本然實良難察院謹重沈潛不勞多視尚口乃窮之戒某嘗與聞之雖然苦無功每緣不密人之不密凡以徇名苟以天下為心行無迹出口入耳感合以誠金石可穿況茲血氣之類事有成效何患世不我知惟無要譽之嫌乃可入也仲尼相魯未嘗以朴示人雖僣禮如大雩當時猶不暇去㫖意可見謂當師之察院方為士類根抵萬幸念某陸陸比居郡曽無尺寸之補雖戴星出入日來漸覺省事然苦府廩空匱未知所以處之非惟望督其愚亦有幸雲天之庇矣郡學胡安定經始國家人物權輿之地於今只齊館在風化之隕甚矣念之如負芒棘更祈有以誨之與潘文叔友文某獲從端叔昆季游願見之日甚久驅馳擾擾恨未承望茲蒙華翰之貺辱臨之以師弟子禮悾侗自視何敢當盛意邪繼今如不鄙夷略之是望示諭為學之道某何足以知之過聽之求仰見好問不恥然而索金貧子終何以副所欲乎抑某聞之君子雖極髙明道實中庸虛受謙持之無有偏頗好惡自無不得其正之患君臣之義父子之親天理昭昭不容與易惟居之以平蕩持之以競業終身可以無畔其至要當有見必自得而後能安之也若以恬漠為進某恐難乎應事於紛紜耳所惡於知正謂其鑿空無之說于此不與存焉承問之厪聊及爾耳斯道要非語言所及纎寸筆舌詎能寫方寸哉又蒙于某求師某學焉不足顧將何以為獻懼塗公之耳目無以祇復將命切幾照亮答少卿舅氏書某伏蒙嚴諭廟堂遲待之意下情感激何已某前在湖外辱丞相公見知於眉睫間非有先容之助一日之雅也此來既蒙拂拭收召已復三被催劄下材賤吏朝廷見待如此固知近時所無不俟舅教詔之然后識知恩眷之厚某之所以牢辭固遜不辟四三者豈以丞相為不相知故不欲就亦非輕信昨者傳聞之過有辭難之心誠思前日亡補秋毫已蒙增秩之寵設復容容冒進豈能有所禆益榮利之地非心所安人之多言亦可畏也區區所以干廟堂者良欲借重九鼎上關聞聽庶幾閶闔之內少知某非陸陸無恥貪昧苟得之人萬一他時事君儻或有所濟耳已再申省計在丞相度內必能諒察而俯從之信如朝廷顧遇亡已亦何惜曲成鄙志仕固求用某非甘匏繫者也蒙問敢及不足為他人道以某為行詐者至祝至懇復潘秀才必勝書某聞士俯仰以求人不若修身而約處僥求而得位不若守道而安貧是故甕牖蓬樞原思絃誦而不輟豆羮簞食顔子獨樂而有餘夫二子之賢學仲尼之道是非無意于世志抗浮雲而厲世矯俗者惟所存者大固將以有為耳執事鄉兄奮布衣之下懷濟時之策歷聘王公以求得意其志略亦大矣抑某嘗聞之曰四郊多壘卿大夫之辱也居斯時履斯位任斯責者固當開幕府以下士闢東閣以禮賢汲汲營營惟恐失天下之士而無與成慮定功亦何敢傲當世之賢者士無官守無言責政當以道自處待時而動必在上者不若魏侯之於干木昭烈之于孔明隆其禮聽其言亦不屑就之矣我國家取士之法不許以它求致國有庠鄉有貢苟以叙進青紫可如芥而拾是雖未足以擬原思顔子之事然比之僥求而俯仰者為有問矣執事鄉兄夫豈無意于此四年僕僕夫何為哉願一思鄉巷之言自反之也國之鴻儒有若泰山先生橫渠先生者弱冠蓋嘗俱以䇿略歷干邊帥為執事之事矣得范文正韓魏公一語退而學道遂為當世宗師在聖人之門將不愧於二子鄉使往而不反果得一官齒於轅門厠於赤籍二人埋沒久矣將何以名於世而況未可必邪某雖託在里閭方逺官以糊口瓜期云及歸計茫如顧且自悔自憐懼無以當盛意雖不敢自同先正猶思所以仰報鏗金之語大言無當執事鄉兄其諒之乎復程秀才書時行某聞之君子以道義為重爵祿為輕王公大人立乎人之本朝一嚬呻一呼吸足為天下利病繫生民之休戚而韋布之士窮居約處樂先王之道不求聞達於諸侯其相望為甚殊而其實無異道苟在位者不能以身任道則為士者誼亦不屑求知於人何哉道義之在亡而已窮達何有于我果能此道也則簞瓢陋巷青瑣玉堂易地皆然夫何貴賤之有是則舜之飯糗茹草與夫居堯之位又何加焉某不才為貧而仕每以治無善狀不敢妄求知已間者當路有過聽者與某音容之不接聲聞之不通不以某之不肖而為之剡章且附置以達時俗之禮通為啓謝某不工偶儷强為數語而致其意焉語前所謂道義之交修者以周公之賢惟恐失天下之士而伊尹之任何以為王者之師妄意士之所以自任者當然不然亦不足以為士矣執事之於某初非牖問半面之舊又無研席論交之雅邂逅一遇貽我以書某讀其文望其容竊自知其幸也盛意于我良厚故敢因前書之語而請復之執事謂位卑則道不存焉又謂貴賤分殊而尊卑勢異此言之發似未之盡雖然亦前相望甚殊之意特未言道義之在亡而已在詩有必酬之誼故某即之以相規橫渠之詩不云乎出異歸同禹與顔未分黃閣與青山明道亦云統軍百萬曲肱飲水在其中矣此古人道義所在之驗願執事持之以自廣施之他日無負于今若夫某之作斐然之文胥失道真何足為執事道若以為賢則某豈敢惟執事財察是幸復張人傑學諭書某竊嘗喜易讀之將數百過而弗知其際也夫以先天之卦見之三畫重易之象繫之六爻天地之大昆蟲之細與夫聖人之道先王之治君子小人之事工師卜祝之流幽而鬼神逺而造化凡有可推之數可形之象可行之事靡不備在此書微若書不可言亦求斯得之矣六經之義于易備焉以通為足以盡之則太極之體未嘗動以定為足以周之則作易之道變為占是皆本諸吾身參諸天地擬諸變化可由而不可測者某安足以知之不知易而施諸民猶宵行瞽者也思得通儒而與之論未之能得執事不以某為不肖惠然辱枉臨之貽我以書縱言而及于易也惟學有倫有要執事其知之矣善乎書之論政體也曰當仁明而通變捨是則為姑息而苛察矣易曰通其變使民不倦此黃帝堯舜之治某何德以堪之髙山仰止敢不欽服訓誨雖然切有必酬之誼故某謹布其腹心今夫喣喣之仁察察之明而後有姑息苛察之事信能仁並天地明等日月則何二弊之能有某學也未造乎此其能億二儀二曜之仁明若夫易之變通後世失之逺矣執中無方猶執一也苟知變而不知止則必若晉人之為通大傳有之無思也無為也寂然不動感而遂通天下之故變通之道盡此贊矣某甌東狂妄人耳焉知易道因執事之有是言也故敢及之至於易之為書聖人晚學以無過以為仁明而通於易也實非下走之所敢當書不盡言財察是幸復龔秀才書子路有言君子之仕也行其義也行其義則不俟乎其外者矣仕而道不行者近世以為深患非有他也不能盡已之道固無以盡物也苟盡已以行道則凡自外至者有常態而吾所以應之者有常法無俟乎其外而天下之理無不得矣盡已之道夫豈它術哉亦在乎熟之而不學面墻蓋未之習也時習焉則吾固有之者卓焉而立乎內煥焉而章乎外紛紜萬變觸睫過耳而吾不為亂則其于從政也何有此某朝夕之所願學而未能得者昏昏焉而以施諸事顧不悖哉伏惟祕省執事好學而知其要臨事而通其理惠然我顧而無私曲之問投以長箋而為治民之說凡某素所願聞而不可得者稔聞而熟見之如擊蒙昧如發豐蔀其為賜也豈兼金之況哉以觀其學之所到知不如斯而已信能進乎此道則於異時之政將見其有及物之惠矣雖然仕而學者恆有單聞之患學而仕者其于人情必得勢使然也某不幸而寠仕而未能有學視執事者學而未仕其于盡已之道猶霄壤之為間也尚惟不已斯道充其所學日新達德而知我之為戒待時而動不亦偉乎某不敏切慕古人相成之誼惟執事財察而加勵焉幸甚浪語集卷二十五
