body:
  text: 浪語集卷四宋薛季宣撰詩誠臺春色鳯闕西岡郎亭東乳惟竹猗猗誠臺有楚苔痕春緑玉李晚風屏山坐對青䓗數峰頽牆色弄文杏新紅爭鮮競秀芳隨意逺各稱時宜自成深淺妙意誰傳叵形罨畫羲皇晚生先天後卦江湖漲緑旋拍滄洲晴嵐翠滴煙瘴悠悠篁鞭破蘚栁帶縈愁亦有江梅花殘未落弄音好鳥笙簧度曲阜如瓦鼓幽獨是稱兀坐頽然邑荒無政新陽多感雷鼓轟天清淮咫尺狼烽夕煙暮四朝三誰為第一不知其它且以永日春江夕泛二首短棹春江裏桃花流水生天髙妝鏡淨岸逺筆山橫落日無窮意丹霞逐旋明何時遂歸志一葉任縱橫夕泛春江裏扁舟萬里心仰頭竟空碧疏樾成清隂浩志曷可遂歸懷詎能尋波隨亂山急意若流水深日落洲上葦霞生霧堆金重淵狎已貫飄風顧難禁嵓巒多李花冰霜積梅林為何縱松舟且以開吾襟迎送未云已浮雲逐行吟俞氏園林茁茁桃與李生花故城山修竹共姢好流水相往還天逺峰可續人來心已閒殷紅間蒼白晚吹催潺湲吾邑在何許滄波對重關煙霞蔽落日蕉葦深前灣送客時一到逰人意長慳髙風怒濤作卷雪食餉間官禁不可脫歸哉望斕斑石門漁舍漁家在何許蹖駮巖下石花樹幾株芳湖山數峰碧窊樽亭遂古雙闕天自闢錦繡入茨舍藤蘿封筀柵吾為江上逰形苦世間役心馳定沙步舟行過簷隙浪翁底鐫銘太尉此居宅豈若斯人徒風雲相主客元夕元夕不作㑹蓮燈相照明影光嚴鐡馬歡譟合金城發䇿悶如醉中庭空自行月娥雲鏡暗樽酒為誰傾時唐鄧邊報方急月夜郊行曠野久晴霽月娥添夜明光浮淹水白寒徹纊衣清頗復藍關意端為剡縣行灝然天宇內應不負平生讀書三首寄景望春秋非復東都㑹書王春又春退風飛宋鷁逺狩獲西麟孔志知安在豳詩難重陳焚香掩卷坐歌詠忽臣鄰山海經帝江無目面歌舞識成音形天斷厥首操干意岑崟大化浩難量懸解在明心舒嘯東臯上薰風五弦琴韓文退之強解事剛不信神仙所作古意詩甘心玉井蓮沈疴痊不見險絶慟虛傳賴得華隂令聱書言豈然遊竹陵善權洞二首萬古英臺面雲泉響珮環練衣歸洞府澗水倒流入水洞中香雨落人間蝶舞凝山魄花開想玉顔幾如禪觀適遊魶戲澄灣寺故祝英臺宅唐昭義帥李蠙嘗見白龍出水洞而為雷雨今小水洞存鱯魚四足左右蝸蠻戰晨昏燕蝠爭九星寧曲照三洞獨何營世事嗟興喪人情見死生阿誰能種玉還爾石田耕山有三洞九斗壇故更寺觀者不一再有李後主斷還僧寺批札石記語極可笑大水洞有石田數十畝竒絶都場正月盡未見梅思雪中石門之遊作千里春何晚三旬暖不回眼青瞑縣栁粉白閟宫梅麗水年時泛桃花雪裏開軒轅丘一夢懷往意悠哉石門之上有軒轅之丘謝客窮幽處仙宫隱薜蘿二峰峩魏闕雙瀑瀉天河犺獚應難致猿猴却患多雪中山更好淹嵗定如何犺獚皆出石門山中犺類猿而緑獚類狗而黃蓋猴屬之大者犺讀如廣殆所謂狼犺也獚字書音黃土人作去聲呼之狼讀如朗梅花花實望先進英華標素王仙家號梅為花王竹籬眼夜月風雪傲寒塘皎皎曽無對凄凄忽有香和羮須鼎味盛服也霓裳吳江放船至楓橋灣所謂越來溪也短篷負長虹破䉬掛明月風馬座中生天幕波中出髙城多隱映逺岫攙羅列少小泛吳江始識仙凡别讀春秋有感巧辨雞三足曽窺豹兩斑鳯衰歌已過麟獲涕為澘妄作南柯郡閒爭左角蠻夢回無箇事風雨度前山送士昭兄赴南外敦宗院二首人道溫陵郡山川似洛陽懷兄尚淹滯敦族暫翺翔㑹見親先漢方期變有唐萬安秋夜月多稱古文章憶昔南州去松根眺邑鄽鳥啼雲裏樹人入洞中天載陟今時路須航古渡船地窮巇嶮盡蚤晚濟平川傷淮帥時戰敗未知所在淮浦天龍戰居巢塞馬歸陳傷軍背水機失敵踰淝越石知何在虞君恨曷依都緣生過涉誰為斬何徽袁口回棹有感放舟谷里口乘流楚江干釣臺亦已墮大舶寧長安春度亂山緑風回平水湍何須問今古劫劫難為觀白髮浮生寧久客罷沐彈冠幘芳樹幾時紅童髮半莖白千月浪翻濤百齡駒過隙多少少年人烏頭問華簀樊口晨泛送程端卿扁舟送歸客萬籟寂無風宿霧青郊暗卿雲碧嶺空水清明去鷺天逺入征鴻日腳中流見委蛇走白虹寒溪堂有待疏雨度西關寒溪亦厚顔風和沈白浪雲斂出青山浩蕩鷗偏適翔飛鷺自閒可堪泥染鞅行客馬班班元夜齊居漢家傳舊事太一祀中庭宫架崇喬嶽銀缸耀列星九街塵擾擾萬室火熒熒兀坐聞鄰叟無人尚典型讀列女傳一避先生席鏗然鼓瑟希功名窗紙薄聲色路塵微大禮無通問清談浪解圍黨人狂斐甚猶有詠雩歸讀骨鯁集幾許興亡事全歸喜怒中鸛鳴非雨候花落任春風龍馬符雖在檀槐戰已空未須悲麥秀王道有車攻縣民訴事有以禪僧見况者訟庭披訴者道我似禪僧不悟無生理安知最上乘修行心懶慢瞌睡日瞢騰說法還知否宰官非所能士昭兄琴堂弄琴函丈者無始到來今韶濩五弦上乾坤三古心荷香流曲沼煙雨抹寒林閔子罷傾聽何人知此音無眠丙夜不成寐可如心念家人情風上草身世眼中沙宿鳥司更漏黃蜂集晚衙了忘官府事髙枕是生涯武昌射圃後山與江接走植栁竹方茂每為民家羊羣所齕日有驅羊之事昔贊皇公以祝雞翁自況走亦可謂牧羊兒矣有欲即有纍無營了無為且非割雞宰寧是牧羊兒甲解木方遂苞屯芽定萎江山萬里道好去莫遲疑乳鹿或得之近山既不可縱畜之更日而馴走命之曰山友駒鹿何年致它山小水濱􅊯􅊯興念母麌麌熟依人物性初無定野心時亦馴故林迷町疃結友幸相親乳猫乳猫毛披雪卉服絮成衣扼鼠氣方盛食牛形但微紛拏殊矍鑠上下擬騰飛幾許明眸子虧盈望日暉芍藥萃拔秀羣芳花間得素王牡丹紅樹色菡萏碧池香融泄云何樂熙怡日是常問人伊謔事士女熟相忘殊亭指掌視吳都逰人望已殊清江浮晚岸緑野漲春湖我乏淵明事誰為漫叟徒醉心尋古記始信不虛誣寒食雨風雨逢寒食天公涕亦澘栁眉顰緑髮花淚濕朱顔貼嶠雲橫水藏舟霧障灣燒痕青已遍若箇子推山客裏換春衣寒風帶雨霏羡班榆火禁初感塞鴻歸栁絮鶯啼亂梨花蝶趂飛丘原壇祭耳悲念切更微袁口舟行值雨樊楚勞形甚將迎一遡流棹移驚立鳥帆逺亂浮漚落漠江臯樹依稀荻岸舟烏雲鳴雨急還我舊神逰酴醿雨後晼晚春闌雨酴醿花意秋雪飛香霰集龍鬬玉雲浮外戶楊青眼中唐浪白頭夢回人不見心醉兀悠悠玩世無心子成功不義侯升沈三躍浪聚散一浮漚守郡官槐木王家夢髑髏團團天上月猶自曲如鈎􅧕花唐玉蘂花介甫謂之瑒花魯直謂之山礬武昌山中多有之其葉可供染事土人用之釀酒􅧕緑吐瑤琨泠然郭外村仙人來玉蘂文士立山礬芳澤留絲素風流付酒樽莫言瑒酷似香處不勝繁春霖未霽澍雨大作甚雨過清明浸淫不肯晴天占符後甲人意失先庚陌路河魚上階塘野草生早來雲陡黑流􅉈霫間成書江表志株守生財道棊翻正國成周王方虎噬唐後獨牛耕軍罷心忘戰民勞勢自傾誰如內史鉉求伴大夫平夏日晝寢至樂歸靈囿棲神得睡鄉青奴涼自愜班友夢偏長莫管黃粱熟何須緑醑嘗知他人世界若處有虞唐夏口懷舊夏口傷前事毛精淚暗垂白龜生不報黃鵠去無期嶺雪炎雲熾瓜田古岸移戰塵愁滿眼聊付一篇詩寒溪寺拈香時國喪罷宴賜已三嵗二首社舞莫㛹姢當修晉白蓮林梢開逺嶂花片落寒泉鐘鼓鏗鏘甚松篁影帶妍如來本無象長老亦逃禪寺無塑佛像主僧移律寺久矣昔者溪為虎如今突暫煙萬松晨徑滑九曲夏雲連畦町苗初實池塘滴尚涓潔齊朝五日清淨樂三年要祝南山夀南山夀十千朝衣結藍綬古剎禮青蓮蒨絢林間樹琤瑽竹下泉晨曦方散彩曉宿有餘妍聚石應聞道無人為說禪路回荒翳目江逺望生煙略彴溪源舊潺顔嶺岫連清神山歷歷洗耳澗㳙㳙菩薩行觀世封人願祝年更須東畝粟長穗滿三千松溪早禾已秀石榴花國色宜炎夏宫妝染絳紗蒼崖陸渾火朱景赤城霞顔駐留瓊蘂丹成咽日華東山舊逰處遙憶武陵家福州東山有榴花洞武陵桃花源比也自訟學問非干祿宦逰端為貧生慙挽船令羞殺采芝人求牧知平陸無漿賣棘津讀書心愧否何日是來春讀李斯傳上蔡游公子真情本自愚五刑身具論七罪法當誅逐兔蹤牽狗亡秦效擊胡明功與周召為問驪山徒宿低寨遇雨酣睡忽驚覺空牀秋氣清四垂來雨腳萬壑漲灘聲飛灑穿戎幕凄涼悵旅情緹幢髙卧者應更薄書生至信陽宿蕭安撫寨蕭乃蔡將去嵗闕陷信陽者左角語爭戰南柯聞大奔胡為控弦去猶有覆車存行客應貪路邊城不閉門夜眠思往舊空泪濕牀痕别元可元亨去矣鴟夷子片帆移夕陽意深三折臂情結九回腸風雨思無晦江湖道可忘死生猶暫别萬里未為長縣有父子訟者走以魯人之法聽之喜其改悔而作父子本天性情緣私愛睽寧留今夕忍無作望思悲克己歸仁禮回心即孝慈同年千古意聖相不吾欺樊岡雨後瀰望皆平蕪緑草無復花矣候客樊岡道新晴致日佳萬般詩外意百種夢中花蔓緑鋪平野江流襲漲沙無如石頭滑龍首粲新芽浪語集卷四
