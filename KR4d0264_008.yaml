  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0264_WYG_008-1a, image: WYG1159/WYG1159-0203c.png}
body:
  text: 浪語集卷八宋薛季宣撰詩至樊口三首一霎重為退谷遊扁舟一葉浪如舟人生百嵗渾如許借問都來幾白頭小囘中入大囘中激水那堪括面風退谷未煙聱叟笑釣臺寧是不英雄長安當日碎樊山聞說孫郎鑿峴還舴艋架虛掀舞甚可堪破舶問前灣宿大城寺寺乃郡王故宫斷煙疎竹鎖樓臺鄀子如今安在哉明滅故城無限意紫薇花傍夕陽開新蟬無數咽新秋無國伊誰伴我愁夜靜月明風動竹也疑離殿過歌喉春草曲二月二日未旦夢遊遇潦旋返見羣女魚貫舞入大第行歌春草之曲其聲宛轉清暢不類今之樂府寤而追記其詩霰雪枝頭寒已老平蕪一夜鋪春草江梅著子怯東風花落滿庭渾不掃樊山春望東鄂城東安樂宫李花練絢玉玲瓏畫圖長喜平蕪綠不覺身歸罨畫中追和澹泊樓先祖詩韻花木蕭疎一逕深門前綠栁更森森旁人錯比陶潜宅澹泊仍無愛酒心原韻種栁栽花意已深曽樓岳立千丈森可須輪奐翬飛翼㑹見逍遙天地心赴調三年蹤跡走泥塗走遍泥塗一事無今日又行當日路旁人為我一揶揄王征引盆傾暑雨兩襄陵三插苗心悉生一草不遺禾黍地若為芻秣事王征喜聞苦恨碔砆多亂玉幾能沙礫盡披金虞庠舊意無多子也有蕭韶拊搏音帳宿幡竿嶺長笑飛芻饋六軍也敺疲瘁逐征塵楸林卓帳秋風夜山鳥驚啁可笑人黄陂縣懷古尼丘非復貳先生逐利滔滔盡舌耕還憶蔡侯當日事郢州知隔幾年程記夢二月八夜夢侍東坡先生論靖康後事走謂宗澤不死朝廷少假事權究其施為國家決不至是先生未荅坐中或相詰難先生曰是所謂弸抨然者走問其說先生曰有詩人與樂工言樂詩人取琴鼓之其聲咿嚶然樂工之琴弸抨然也遂寤不詳何謂作詩記之通夢周公不我欺咿嚶無若太音希誰人伎子知誰在一枕鄰雞曙已暉病興即事東風細細筀牙綠畏日曛曛天晝清萬緒不舉坐兀兀林端鶗鴃兩三聲無題朦朧夜色暗浮雲咫尺氛埃怯戰塵深夜鳴榔到庭户江湖知有釣魚人魏勃異姓侯王約重陳誰知興復自陪臣滕公剛笑輕齊尉大勇直須庸妄人怒激三軍豈足言漢庭股戰始能賢齊卿不及公侯貴擎跪偷生雄雉前書温公集後不用須藏用即行未分丘壑與朝廷聲名怪得生來盛非但潜心醉六經讀舒王日錄立志嘐嘐必致君四方觀聴一時新周家道備驪戎變流俗元來不悞人讀鬼谷子捭闔乾坤若有神崎嶇長短困儀秦無聲無臭文王道應是先生浪鼓脣新嵗病起牆外梅花渾欲飛縈人無奈栁依依窮愁三識新年面猶喜常陪乳燕歸桔橰怪得朝來俯仰頻王明用汲有深仁無為抱甕先生笑機械揶揄已玩人聞鳩桃李無情花自妍竹根行復破苔痕新婦抱兒未歸去愧死鵓姑啼滿園長湖以南李花彌滿山谷誠臺望之皥如也層氷峨峨春不融璧月皎皎夜常滿明河入望浩無津欲往從之人甚逺酴醿花謝有感當初曽醉浣花春席地棠梨當錦茵今日酴醿飄似雪閒忙不比舊時人巴口感事曙煙帶栁日希微一簇魚蝦市井遲莫訝上官深致志雲龍曽說鎖牙旗十四日從諸同官登西山郊壇岡次孟監務韻催人暖律葭飛灰高㑹蓮燈懶重陪閒到蘇仙舊遊處熙熙不秪登春臺菩薩巖泉湛佛乘澄泓無復現天燈强歌下里酬春雪便好為文弔剡藤清遊無是亦無非陡絶圓壇一强躋赤壁望中公瑾在戰塵何日靜征鼙人間萬事盡浮埃顧影窮遊莫倦陪呉王百世不復在只有九仞郊天臺交神有道非闗我元夜虛張太乙燈擬學昌黎慟西華扳援石磴多藟藤不論人間是與非崇丘礧嵬尚慵躋登臨自有無窮意安得閒愁滚地鼙讀史記公旦征淮難疐尾仲尼去魯速吹毛聖賢出處平生事間不容針却中膏黄霸稱職闗東漢吏良作公名損浩難量試看鶡雀為神雀無是飛蝗食鳳皇假日絁被蒙頭貪睡足莎庭卧鼔喏衙遲賔僚莫訝吾慵甚忙裏偷閒亦暫時將歸閱世光陰雲掣電忘形蹤跡浪浮萍翩然行逐西風去聊復人間得此生戲寄清虛先生鼾睡懶醒先處士囘光坐照老賔州陳摶王鞏皆有清虛之號西來大笑朝天子一宿不為桑下留聞前月時事君舉象先皆與南宫之選是日讀易詩春秋作四首一陽萌動黄宫下正是寒威合減時閉戸先生莫惆悵雷行龍躍定前期我行永久亦何傷僕馬痡瘏不是忙田卒汙萊皇甫去憗遺將若守吾王憂河之濁欲清之每笑周人切見幾麟史究觀王室亂異情元不是公非我不知人人知我體交無味亦何為朝陽鳴鳳翔千仞却是梧桐寔未離州圖次元修韻三首導水要窮神禹迹驅山每恨始皇移晉家安石非無事高鎮伸頭看著棊瞿𥅆盡道色非色愚聖共知東是東一紙畫圖都掌大誰言遮壁意無窮箋書莫笑蟲魚注善學須通天地心到盡粤南并薊北始知前古是來今書敬仲兄枕屏野趣知兄愛泉石風屏少試秋毫力纎煤㸃染出雲天萬里江山安枕席歸計二首浮雲何處是生涯念絶營營即是家洗脚渡頭歸去也漢津無用逐靈槎置錐無地也無錐幸可歸來特地疑船子月輪貧未破羅浮焉用石頭為青田同七五兄作四首為聞雙鶴訪青田便有孤雲竟目前灘水自鳴山自綠短蓬斜拄得酣眠烏雲送雨過前山白鳥將雛向逺灣獨立溪亭無箇事湍流瀧石鎮潺潺浩歌欵乃客銷䰟一抹煙林瞑逺村花為忘憂人一笑不知風雨作黄昏谿翁夜傍清溪立千尺絲綸一紅粒天空月白不見人無聲露滴蘋蓑濕追和寶山晝睡浮生化國總輕塵已自忘真那得真無物從教儘空洞可須容著許多人戲作贈别效東坡體次其韻茹菜羮時嘗苦憶摴蒱無路塞行期難逄莫恨絲長斷金鎖開緘自有時雨中鶴唳十萬虛屯野次兵不逢苻詔夀陽城愁雲慘淡雨來急鳴鶴一聲天未晴啄木蝎噆區區切考求飢腸一飽又何尤要能去蠧無遺種寥落空林死便休鸎綿蠻巧語慶清春金線低垂栁色新定自知時厭流蕩歸來空谷混泥塵讀鬼詩擬作二首坐對悲風嘯晚山征鴻不記幾囘還青銅蝕破菱花面慵掠烏雲綰髻鬟王樂紛華苦未真至遊無眹亦無身細看浮世多塵坌如我得歸能幾人李斯獵盡山東六暴强修明律令起秦皇還思稅駕知無地逐兔應當爾許忙詩書灰燼便秦文便得秦王却誤身斯具五刑秦再世六經還有表章人剛從荀卿學帝王為羞貧賤速危亡威嚴無復人居上自處應慙厠䑕方燕太子意氣寧知錯感人姬丹袐計謾危親亡燕拜送於期首政使荆卿趣帝秦雨後憶龍翔寺二峯髙峙夾禪扄長路潮音逐磬聲老僧睡起絶無事不管波濤四面生窣堵東西岋兩峰王宫今日𣑽王宫潮船八面來勍敵都入禪師燕坐中秋意月娥素魄溢嬋娟金吹凄凉冷淡天野水暝煙楓葉暮黄花紅蓼獨嫣然聞蟬自闢筠鄉五畝陰蟬聲無處不相尋炎天喚起秋蕭索便擬乘風遶鄧林新蟬無數咽琅玕引惹涼生六月寒已自東山譽髙潔未須丹翅擬笙鸞村居秋暮風囘偃水縠紋平林末它山筆架横場圃未閒黄葉下鵓鳩啼雨忽啼晴睡香君子清心省過祖師噩夢尋香莫問兩重公案且須一曲霓裳摴蒱一局閒尋五木經橛盧白意冥冥未能後擲如前擲將奈長亭又短亭公叔次開窓詩漫荅不同夷甫坐談空爛醉鳬鷖滅没中聞說詩豪君是否好磨長劒倚崆峒幽蘭次十八兄韻六言四首宛在一人空谷居然九畹深林襟袖不盈披拂車轍無蹤可尋有美中郎芝砌言采淵明菊叢㑹取箇中香氣蕭然林下家風舞奏八風薌澤頌聲焱氏遺音允矣不夷不惠悠哉非古非今超出世間凡品叵聞鼻觀餘香春入有花不艶院小無人自芳浪語集巻八
