body:
  text: 浪語集巻六宋薛季宣撰詩送鄭景元赴秀州判官詩并序走歸自武昌始獲交於景望景元昆季二鄭兄弟不以我之無似不屑與之友居之相逺也相従之日少志之相得也相與之意深居數年景望召為國子丞又兩踰時景元赴由拳従事走素寡合起藪澤鷦鵬之嘆於景元之行也贈以詩而序其意聞之君子送人以言衆人以財走雖小人樂為君子之事方浩浩之㑹走雖以天而免秋田粒食悉漂泛於洪波既無財以贐公之行不可抗手而别以言為贈猶不害於人情景元既髙於才又果於志喜竟其説人不知亦囂囂固賢人君子之心非處世之道也古之人敎其子者有曰女戒勿為善曰然則惡之為乎曰善不可為惡將安取有佛學者弟子禮其神像而師杖而起之弟子者曰禮佛亦好事也為師者曰好事不如無世衰道微士鮮中庸之行其従政者非違道以干百姓之譽則咈百姓以従巳之欲要譽者不欲人之加諸巳也窮欲者甚惡人之形巳也此人之常情幕府之官無曺局之分也従容賓主之間其處此亦難矣非無心於為善寧無二者之猜乎魯人謂孔子東家丘舍者與楊子居争席盛徳之至不如是不足以有行也走欲景元事其上官其賢於人者約之於道否則濶其小者以求全其大者掩覆吾迹無為為善以近名聪明睿哲而將之以愚亦充之爾耳景元固無施不可此焉發軔庶乎其善始也以景元之敏於行千里之外能無従此言乎景元景元願不以人廢言也乾道三年四月二十七日友生薛某恢台煽炎毒萬里無來風殿閣少微涼况乃陌路中紈扇可把揮秋髙網絲蟲冰山豈足恃見睍聿消融進退信惟谷黄塵柰忩忩鄭君冰雪姿干將倚崆峒竭蹶救頭然巾車佐元戎生人在熾炭吾何憚蟲隆往聞開元帝逃暑繡嶺宫偪仄政浩歎木隂見姚崇煩溽頓以銷語識靜勝工相期在此行山泉養童蒙兄子象先罷公試歸知武林動靜成古風三首黄庭有真詣魂升魄入淵知機動以食還反道自然嘗聞錬色石可用補蒼天時哉復時哉寧敎悔在前野鶴入雞羣猨豈王孫輩之人定忘物未足言身世丹山兩鳯皇為誰來噦噦靈龜發與肣可以卜隆殺明珠以彈雀得雀亦亡珠颺鶩以當鷹夫豈獵之徒黄金有定價韞櫝合藏諸薫風扇餘涼吾方愛吾廬元夜齋居元夜憶年時忘情居灝灝縣齋今夕居曷為傷懐抱都緣人事非不覺年時好世母舍我歸屈指憂吾老人亡不可見此心為草草大人月云忌棄我方兒褓呱呱救嬰泣安知請丘禱諸父洎諸兄下世吁何早悲傷失所恃涕淚流行潦哀思動時節不見蓮燈好鄉居計日長松楸倩誰掃諸母侍何期念舊呼穹昊春雨春雨不知止新晴旋復隂霏霺㪚秋毫虚簷水鳴琴琤瑽響疎窓庭除有餘音跬步莫可縦蒼苔看浸淫縣齋知幾秋中堂漏相尋㳙㳙濺人衣黯黯乏勝襟發篋漫如漬明眸暗沈吟翛然薄雲開風聲到園林坐覺筠筀笌羅鞭粲脩森巾車過坊市溝渠漲江潯言歸轉通渠舉頭見西岑峰青霧銜白何堪送迎心春江小雨小雨春風裏澄江滿漲痕沙平波渺渺山逺霧昏昏短棹煙塵細浮雲天地根將迎倦無已羞目舊杯尊春雨春光不滿百霧雨六旬強眠蠶老脱殻壠麥青已黄愁雲密可厭慘澹空滄茫銅盤旦日出障彼天一方寒簇歎巧婦麰蛾㑹飛茫豐隆况忱祠離畢占是常庚午直甲申此意未遽央使客困羈役行留兩亡羊雨中鶴唳隂靄結愁思秋霖政霪澍何天唳鳴鶴嘹喨烏雲路九臯聲甚逺底處披㝠霧定知君子化不作乘軒汙介蟣六王師櫛沐方暴露芻輓苦不繼曷保金湯固塗泥困淹沒無計開樊笯傷古聴華亭吾心向誰布種蘭蘭生林樾間清芬倍幽逺野人坐官曺茲意極不淺西窓蔽斜日松釵架春晚牆隂蒔花木憔悴根日損植此山國香坐與前事反扶疎可紉佩心緒端有本芽生僅盈壇髙風九成畹羣芳顔色好祗自誇園苑何如淡嚼蠟草莽曽誰混對我靜無言忘形如苯䔿讀東坡和靖節詩我讀淵明詩頗識詩外意坡公繼逸響箇中有佳思取友百世上古來獨二士陶固泉石人蘓則廊廟器出處了無同聲名都自異往者不可作矧復通姓字神交定忘形飲食尚知味㽔賓中聲律片鐡猶應類茲文在尼父為復昌旦事今時道古語莫作今世視以我思惟心充彼剛大氣芥子納須彌誰信畧相似欣木亭詩某適宛陵始識林君擇之用中於鄭景望司馬之館察其為人肅恭謹敬學而篤志者也出其家欣木亭詩冠以晦菴南軒三山三先生之作索和甚苦金玉其音難乎下俚之繼黽勉次晦菴韻其不知量甚矣寒威折青陽雲雨作朝暮槎牙粲新綠寂歴晴川樹時至物皆春豈在雲間露之人於亭上笑歌誰與晤睠此榮與華我亦知嘉慕來游對溪山識取亭中趣早起次叔瞻韻日髙政好眠披衣意何已不得戀黄紬弩頭非所喜厭浥行露多忘却佳山水有客愛閒居被髪吟早起神清到天元静極照物始公乎尚何其我亦偶然耳此事叵立談剥剥自鳴指動息無端環生人定一理聞競渡聲江頭閙金鉦競渡記時序欲弔大夫魂正則知何許情緣古今隔况是都無楚悲歌永為戯拯溺慿誰語曰我舊家鄉湖上人如堵船戰習成風迎神尚投黍家居内忘物廢聴何城阻風聞不貳事借問為情緒冬至和燠酴醿有華我愛酴醿花爛漫春歸後薫為美人佩韻勝青州酒溰漼落霜霰搖曳欹風栁别來能幾時夢寐依三后一綫長新陽萬木新凋朽佳期尚云逺盛意胡偏厚秀色笑江梅遊絲入窓牖遙知此粲者為瑞朝中否銀蟾待交映天上彤雲久金樽但髙酌身外閒愁剖休言桃李華常暘又何咎刈蘭東畹刈真香靜院篸瓶水髙逺不勝情時逐微風起和雨剪閒庭誰作騷人語記得舊家山香來無覔處石盆髯翁久埋没嵗月來成奔當年膾魚處虀臼徒形存想方髙㑹時猛士侔雲屯連鼇覬一釣欲以大口呑尺鯽剉紅雪烹葵植蘭蓀王餘弃玉食銀刀亂洄沄堕臺不禁醉網漏如鯨鯤座中盡羣彦人亡失叢墦吾逰懐此都重到郭外村聊興廣武歎裵􅏆受辛盆頽然鳯凰臺路走臨津門催歸趂人馬誰念古帝魂愁無有力者窊樽負雲根斯焉共杯飲垂綸具盤飱富文忠公北使與主客儷句以一大口呑對其竹一十竿止齋和七五兄次淵明止酒詩韻知止良獨艱吾兄獨安止不知郊園外只止塵埃裏脩為止至善孝愛止為子眷言兄止之得止以為喜至止内泓澄非心止弗起止靜有餘歡止中得妙理勿謂止為難止躬徒正已止乎吾未見致知知止矣吾兄止孰似兄止無端涘艮止視兼山止斯千萬祀重陽無菊二九節重陽髙風振羣木彼菊東籬下金英粲清馥中有黄裳美雅稱清人服嵗旱靡百草芽蘖渠能育冷淡登髙㑹悵望矧可復空酌茱萸酒帽墮慵舉目愧乏淵明流誠為淵明縮借使淵明作風景更悽蹙九月猶煖梅桂有華兩雄木並蒔丹芍被春芳同仁乃一視梅桂華秋陽梅固冰玉姿桂不時世装永言異㑹遇相従多異香瑣屑辟寒金磊落明夜光仙人姑射山墨允期首陽神交際道義語黙何曽常患盜盜賞自孤卿布亡由令尹政刄可同形殺人在同殞吾非古之徒處世良不盡仁義一蘧廬身心兩矛盾坐使邑中民嗸嗸困欺窘刼質與穿窬公行載歸稇道路視秦越對此獨何忍刑徳歎誰施茫洋空内愍仲尼有佳對為發一笑辴又和元可二篇陽春倡者誰欲和心已䦨故鄉千里隔念之一辛酸人生足離合豈在共盤飱胡然兒女情苛留太無端焉得不繫舟使我懐抱寛信美非吾家㑹且即所安後園桃李秋蕪徑草木繁酒來輒竟醉歌強難為歡風雨打寒食枯蕪盡瀰漫故乏猜嫌累誰能整其冠惟當適意爾曷貴品極官晉賢泣楚囚衞女賦竹竿願君憫羈思所友路何曼歸哉昔在陳孔聖乏體胖幸非艱棘徒亦復謝欒欒春風動鄉情燈火語夜䦨遙聞流星遞鈴響接悲酸愁人念世事臨食或忘飱我有無價珠可以息争端致君昭代隆坐使北顧寛何當内修治邇服逺自安呢呢兒女子青蠅語喧繁長懐不盡憂可若一笑歡有酒且強醉莫等白露漫汾陽脱兠鍪髙祖溺儒冠此意詎未央抱闗樂卑官匡牀足酣眠紅日出三竿睠言東甌道來歸路曼曼非行徒爾為寂黙體用胖天地一大家中庭樹欒欒得符速走之官我本樂閒人自得安閒志鄙性習疎㪚誰識榮華意朅來復舊廬喜獲平生志稼穡任佃夫家室歸中饋中外若非我卒嵗無他事飽飯讀詩書瞢騰時困睡嘲啁燕雀懽鴻鵠心應異三皇竟何物况復今官寺寒餒譟妻孥先春輸典質兹乃不可常為貧求禄仕版籍一書名野情那得遂官來促我裝去作塵埃吏無復有逍遥真為口腹累把板従此行短褐隨棄寘素飱良不堪邑有民人寄衆心險山川道微非所暨上恐負朝家終念家聲墜吾民政焦嗷為此不能寐格物可為邦舊説今難試泥古誠腐儒惟此知為治仁義舍不為又敢圖與利上官如我容刑章得就易庶以遂其生將久蘇疲瘁此意尚茫然思之或狂悖鸂䳵鸂䳵何翩翩鎮日煙波裏將柰網羅何幽閒従此始一為美人玩毛羽傭復理江湖浩蕩意憔悴蹄涔水昔是滄溟逰今是樊笯底文章豈是貴步武難無已丈夫感兹念心逐冥鴻起社後即事東君識歸意社雨零齊沐栁眼向人青草芽隨地綠體輕來燕疾聲合鳴蛙矗桃李靜無言艶麗驚即目西山野步雨夏作晴天浮雲帶溶洩西山旦驅馬踏破蒼崖翠寒泉漲新綠決決鳴環佩上有吳郊峙九曲羊腸細築閣聴松風縹渺江無際野僧喜我來一見心已醉竹萌薦飱玉縷切琅玕碎吟哦壁間詩恍與古人對時發一笑粲韶聞殆忘味清逰淡何營不知夕將至岸巾步箬谷欲往叵自遂酌此菩薩泉為澣濯惡世陳思王喬松産崇岳託迹太髙亢飄搖風雪場踡局蛟龍狀干霄竟何事勁節良獨壯下有楸桐秀逺入煙霞望天意固有在人情亦云妄苦乏柔苗䕃直傲清霜量居然嗟彼其坐使出其上至哉文身子三以天下讓步扺東坡登舟返石門為到西陽城侘傺東坡上舊址就荒蕪山川寫心匠四見聳髙寒周遭畫屏障萬象儼朝昏出没煙霞狀元覽浩無涯不覺滄溟漲吾行半南州此遊誠大壯寸隂良可惜無柰歸船舫隤然快哉亭昔夢今知妄吳都一回橈杯飲窪樽浪石門隠漁舍行復殊亭剏叩竭兩端倪便可齊得喪邉事方急有中使至雨中出郊候之霧雨閣天愁秋笳閙人耳不見霍驃搖只見黄塵起蔣城何岹嶢横流混淮水教戰閙市人旋柵荒殘壘甲道軒脩竹亭觀羅弓矢長城萬里壊衣帶江誰恃櫜鞬道左立一介來行使束帶迎督郵淵明尚深恥春隂㑹聞懸瓠不守飄風吹百花仰不見天幕浮雲何慘慘去我止一握園樹暗無色紅芳旋凋落摘索晚來雨如絲度城郭愁人故多情對此乃非樂羽書絳囊馳傷春重沈著方鎬若涇陽龍吟怨清角歸飛看提提紇真問生雀雪蛆冷冷雪中蛆皎皎夏之日藉彼凌厲地生此柔脆質冰山共攸逺玉筯無定匹安識時有暑但保嵗云慄中和歎何居以熱信所必火鼠可澤浣朝菌寧晚出伯翳謂更名山經注遺逸新作殊亭虎將夏中時旋復怡亭址茅茨覆采椽樸拙亦可喜建斗五移杓殊亭更釋子規摹雖少華不陋復不侈元碑碎俗令遺集裒空紙縦步此山椒金聲獨屬耳舊亭苦弗稱新亭直殊美書文兩竒絶蹤蹟存布指古人久不見今人尚殊此能知古今意元始本無始又讀陶靖節詩次前韻傚其體濁酒自傾盡陶然忘古今横琴寄逸響聊以冩我心矯矯兩白鵠盤旋下曽林此情誰與傳無絃有遺音萬籟夕已息寧知身是今浮雲翳青空油然起無心寄傲北窓下驟雨落疎林逰子為三歎寥寥希太音開渠開渠引簷溜㳙㳙遶茅楹政爾江河流鏘如環佩聲澄瀾漾淪漪曲甃隨淺清上有翔飛蚋無殊化摶鵬廣狹詎易量大小終強名何従汎天潢同歸在寰瀛吾慚論齊物揚波歎平生𤓰期代者不至禽飛有倦時木落還逢春薄遊名利場厭見陌路塵指日得終閒㪅情難重陳如此代者何不至愁吾人代者介至縣道簡書密束身急於繩初心豈得在反身但兢兢安得事大好官籍知有承屈指計來月𤓰期閏云増彼乃未易到吾行重難能百里半九十終更仭階升社雨晚來急春天霧夢夢清淮萬戎馬咫尺方沸騰朞年念天逺歸飛恨無䎖慇懃謂典吏用之筆緘縢袁山春望密雨作春社袁山暫登臨迎人多野花對境清道心于以今日態而開去年林平沙没浩蕩漲水相浮沈草綠湖萬頃峰青天一尋無情雲自閒此理吾難任故壘雉明玉寒溪疊重岑朅來聴流泉可用資鳴琴新霽石磴滑崩波馬蹄涔不知日已暮迂回樹生隂歸路尚脩阻時哉羨靈禽重陽馬上看菊秋菊粲真色落若千金巵對此好時序馨香㪚幽竒爛漫在伊昔邂逅不可期吾來倦逢迎𤣥黄馬常馳二子復何事相従意熙熙犇走塵埃間一見蹙我眉嚮之念佳賞慙顔朶人頥浮槎浮槎爾喬木來従何處村託迹久非地湍水撞其根一辭古岸頭去去隨潺湲上有飛鷺翔下有白浪飜浪激信反覆鷺去無回鶱十浮將九沈任彼回風掀飄泊未云已驚落見者魂今慿逝川波故慿川上原原中復何有草木故自蕃洄流潰前汀薄命嗟獨存人生盡如此株木奚足論雪太素欲還淳熙然萬物春封條花爛漫飛絮栁紛繽玉殿神光發金樓火色新簷髙天漢接地逺蜀江瀕西塞雲填谷南湖浪拍漘吠厖欣掉尾饑鳥困依人躡屣蹤存齒飜車堊到輪窓開羅岫失檻倚鑿池堙罏炭情偏惬冰壺意亦親郢歌休待和大化席紛紛桃花桃花如美人靜有嬌春態醉眼柰愁何多情破新睡裝成開笑靨夭裊腰支細不語傍斜陽鵠立塵寰外煙逺鎖眉顰東風羞嫵媚倐然歎零落灼灼無窮意㑹訪武陵源一飲流霞味春隂三首春隂一何甚愁結窓外花細雨打疎竹姢姢草新芽眷此忽中慘吾生浩無涯閒讀几上書可歎復可嗟時流諒難追世路亦以賖折腰墨綬卑坐有憂患加官栁粲新綠黄鸝語淫哇把盞但心醉天外日已斜魄月沈半璧歸飛噪啼鴉仰頭望虚碧冥冥密雲遮風塵政昏暗逃形乏浮槎顧影還自笑狂遊蕩無家弩頭強應世鈍若倒拔蛇先人營舊廬清池傍蒹葭芳時綉文錦飜濤散晴霞霽色故自好風霾益云嘉何當舍此去忘情傲丹葩逼社窘隂雨園花就凋零翩翩蝶翅重好鳥無一鳴山頭霧露白簷前砌苔青旁瞻隔逺到内與愁思并縣小文書省氍茵匝莎庭舉頭歎世事坐有百感生芳林堕玉蘂垂楊結珠纓傷春復已半忽忽難為情朅來發書篢悼往心自冥袖手一凝竚意逐飛鳶行中原政紊亂悲角揚哀聲有酒不解飲何以解我酲社雨打春色催落枝上花天風振疎篁離披亦云嘉為此念疇昔官曺輟飡霞幕蒼逺夢夢寰中感生涯落花故有時摻摻筍當芽芳菲日已老吾遊路何賖宇宙一悽慘桑榆未還家詩情不自禁荒園鼓新蛙讀靖節詩淵明鳴素琴無弦有遺音善聴非子北寥然賞知心聲滿天地間清越窮幽深逰魚漾澄瀾宿鳥投故林忘肉為聞韶羲皇到於今跋東坡詩案南方有佳木逺在漲海涯沈水産其節雞舌生其肌結根松栢場龍腦實離離蜑獠豈知貴斧斤斬欒枝㭬為糠粃槽將食犬與狶條枚惡鬈曲芟除棄江湄滄流蕩回波不與朽壤期年代知幾閲愈久乃見竒根株到餘攊復恐分寸遺終焉盛芬烈蘭蓀謝芳姿還返釋言先天有貞數八卦因皆九升降周六虚利見龍無首後天奉天時不在先天後得一定存三元中急須守道人與我言熬水可丹成隂陽忖節度金玉争精明問之誰因爾惟言火力停毫釐謬以消造物亦何情揉木以為輪寘之溪之干微流蕩輪輻銀濤立飛飜三田接餘潤九穀歸其根灌溉有如此愆陽何足論接竹引巖泉逺在寒谷幽然炬火其端髙飛北山頭可以活三軍梅林意悠悠倒置未為戾見之復何求陶甓與鎔金火出資堅久炭木已焚如萬祀長不朽功成在鑪竈鑪竈慿何有不見古軒轅錬實荆山首嘗聞曽子書金火中外明圓方遞含施二景參黄庭天端月虧盈宛在日之情誰何液渾金坩鍋置煎烹律管實葭灰氣至颯以升日至寒泉水花結輕冰應候固應然違天亦何能時哉復時哉尺璧徒自輕襄陽庫露真木器塗髹漆髹漆厚以堅札去移凡質蕃戎豈不詐信是真山出所以虵化龍頭角非曩日苟晞有逸牛往返日千里烹之剖其脊比竹雙筋起強力有由然物性都如此本立而道生人身有真理蚨血可還錢書符能已瘧感召有如斯還丹非外作得意以忘言象數求還錯無為四時行天遊有真樂浪語集巻六
