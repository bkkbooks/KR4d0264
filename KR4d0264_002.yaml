body:
  text: 浪語集巻二宋薛季宣撰賦呉墟賦命僕兮巾車駕言出兮東隅指圮堞而掲汨濠兮訪吳孫氏之故墟䝉茸煙草兮宻羅城郭黍離離兮秀於塹澤蒼龍東而西白虬兮屹然象魏髙復下兮荆棘塞其堂陛陛㦸九重兮列苞稂與蓬艾左宗廟而右社稷兮惽不知其何在井不改而能遷兮榛蕪既穢紛萬室之鱗鱗兮瓦礫碻磝而布地晝逰麋鹿兮想黎庶之紜紜朝與夕而朝夕兮狼虎為之具臣人既去而城存兮念之何巳意忽荒兮徜徉徙倚睠齊侯之逰豫兮至於亡郭殞穫舊聞兮羌善善而惡惡惡不去善無庸而猶滅兮矧將反是荘蹻為㢘兮伯夷為穢黄女充宫兮南威見棄犬為狼兮豕為虎豹貅剛摯而怯名兮謂之首鼠刑無辜而親有罪兮衣裳反其上下朅如洛之車蓋兮伊其自取懐太帝之英雄兮爰經始於是都樊山以為西障兮三面汲於江湖掄材用而建邑屋兮信微罔棄大者棟梁兮扊扅取之至細柱楣榱桷之適當其用兮木札竹頭以不廢輪奐成此室居兮且以傳之萬世艨艟焚於赤壁兮北何威於大魏竪豹尾而安一怒兮時非時余有俟迭曹馬之泯紛兮蹇代興而一替嗟厥志之已忘兮民膏脂之是嗜謳吟作兮思金陵而引睇誓不此居而活兮寧歸以死此魚飡兮不如彼之飲水人已去兮君不知水龍來兮斯已矣余此逰兮窮逺目下不見人兮上不見屋虎之跡兮衡従聚落蛇逰故宫兮獸馳大麓寄余意兮四達之衢不知淚之盈襟兮俄失聲而以哭亂曰金城湯池草莽莽兮巷無主兮屋傾頽疇告語兮興廢乗除寧有所兮寒與暑兮迭王日而月兮一來一往又安知他日之宫牆不變今之草莽也鄂墟賦按籍披圖乃窺鄂墟有邑無民荒城已蕪鄂渚繚乎其前樊山峙於其北有峰有巒有陂有澤林麓蒼蒼環流漾碧萬頃漣漪際天一色吏指圖而告曰此三代之建邦也在楚熊渠始大宗周寖微哉拓東境窮兵極兹乃命子紅王而有之已而知其非是紅歸國廢爰始邑焉吳遷以替是為周晚之荆蠻專封之舊地也走蹙然而應之曰是則然矣而非爾之所及感昔傷懐凄然以泣曰蠻宗以大非熊渠之罪也夫天王至貴徳統萬類猶之在人足元孔異使周王能保文武之基緒不失周公之典制外睦諸侯下安萬彚禮樂征伐惟王是出后稷之功有隆不替蠢爾荆蠻胡寧以害伊其自絶何傷日月不見崇侯俄然已滅自彼成康既亡昭繆志荒京邑昏昏儀於四方廢法專征諸侯是常楚越徐吳於焉僣王則夫荒服之侵凌為天王之政龎也熊渠何罪哉封紅於鄂此其大絫廢紅而復豈無遷善意邪而王不是改也乃有驪戎犯順鼎彛屢震楚及郊畿重輕是問則斯僣竊之狂圖非當時之大璺也且夫百姓何知觀徳攸歸楚之盛強惟能撫之彼社稷宗廟尚為禾黍夫何鄂侯之覆哉若夫都之故城哲夫是成版築經營再千爾齡而猶巍峩弗傾今之為城者反是豈夫人之或異版㰱靡不施工程靡不至在旦落成而夕頽委地觀夫僣竊之荆蠻又匪予今之所喟也走嘗觀中都古先王規橅而今已亡猶存此墟走不知人力斯至邪將皇天之意夫坊情賦彼美人兮婉且都容閑閑兮艶春華髮堆雲兮鬢蟬翼瑳皓頸兮凝酥瞬目兮秋波步弓兮飛鳬束素珮兮瓊琚冠集翠兮芙蕖獨立兮牆隈顧景兮徘徊笄丹葩兮栁緑寄芳情兮青梅睠予兮脈脈欲往兮還來矚星眸兮愁予懼一逝兮長乖按轡兮求漿縶馬兮垂楊蹇命坐兮少須跪酌我兮金觴欲言兮無語斂羞蛾兮映朱戸剛撩鬢兮為我容罥游絲兮若無主啟貝齒兮流香與我期兮溱之陽驅輜車兮颭颭情依依兮慿簾稅駕兮同行攜春笋兮摻摻汎漣漪兮清波航木蘭兮素舸驚起兮䨇鵷共飲兮新荷㺯修景兮澄瀾皷桂檝兮長歌歌春日之艶陽兮景浩蕩而舒長栁裊娜其㽔垂兮百卉開而芬芳燕呢喃以並語兮梭對擲其鸝黄嗟物之各有偶兮怨隻鳯之無凰泯予心之閔黙兮見良人以徊徨羹肥羜之羞珍兮可一臠之能嘗載賡曰春景兮熙煕春日兮遲遲願交頸兮同逰羨比翼兮于飛悵形迹之礙夫人兮内也誰欺羌屋漏之足愧兮逝將往而猶疑歌竟兮沈吟迭倡兮嘉音遏行雲兮清徹皷朱絲兮鳴琴思招搖兮不持花微吐兮芳心倚蘭玉兮明珠欵暉映兮坐隅囏自啟兮櫻唇聊搔首兮躊躇逝相親兮莫可正良心兮回我復大禮兮自持倐長揖兮分飛惋悵望兮阻山岳逺相思兮雲霓亂曰色天下之通好兮心放其收禮正已以參天兮莫見乎幽眎十年猶臭兮薫揉於蕕彼鮑魚之肆兮君子曽是之逰紫奪朱兮改色珠有纇兮焉修寧有負於家人兮予心不歉顧不易於去水兮言反其流慨禮教之可樂兮聊卒嵗以優游粲秀色而好不吾移兮夫復何求自釋賦太嵗貞於執徐兮涂月季惟方癸農事畢余揆其成兮秕亢陽與襄水飛符命之坌紛兮郡府號余曰有勑緡泉貨惟四千兮五千秔其以糴越土性而謂余求兮郡命違其曷可蚤夜民之飼糠籺兮又掇攘之有叵方千里而為畿甸兮茅莩居其百九人景希兮欲多求之孰有蓀㩁右而左陂兮復前堤而後堰萬斛舟兮望悠揚而罔見苞苴昌兮根微蠧以弗充君門狗之吠狺狺兮圓月曀於雲霧足余進而趦趄兮矢囁嚅之靡入思徜徉而歸印綬兮啜哀傷而雨泣謂何求之喧泯渾兮知此憂云實鮮余中切而深慮兮羌謂之為逺亶憂民於以為國兮胡國憂為毋害敢稱民而自佚兮以求其安泰僥天命之畢罷休兮余心之有得聊遲留兮敶詞而自釋金龜賦金龜𤓰蠧也似龜而小首足介尾咸具色若中金焉惟其冒乎外者輕明若雲母有翅附甲而生巨領䨇髯腹下多足與龜為異弗察乎邇無見也名無能得於古世以形象目之慨其似是而非可為童兒戯翫實無所可用其於靈夀何有多竒異而飛不及逺難矣哉因感而賦春氣靄其融和兮東風習習以生庶卉資以茁萌兮屯然而成厥形寂書堂其蕭寥兮聊縱步以抒情行𤓰田而徜徉兮瞥玉靈之異常蹇至微而賤軀兮遵柔柯而微行體渾金之萃美兮色燿日而舒光巨首顒顒兮神屋巋然以隆足孔舒兮甲隤如以豐員上兮天穹爪旁出兮四方背負盤兮峻邱山之昻藏昭以晣兮列宿嘒其同明吁嗟庶物百其形兮同類殊情不可命兮龜生千年巢夫蓮兮萬嵗木居縁而升兮五色備具為可稱兮曠古不聞逰蔓籐兮託質精錬為見情兮疑神物兮出倫類去泥塗兮將自異豈長年兮於此焉極非仙靈兮兹焉嬉戱情恍漭兮無主立躊躇兮不語龜蹣跚兮如顧倐飜然兮飛去驚予心兮駭目歎瑰竒夫龜者神悠揚兮未安俄翩􅗁兮來下睨而視之若是而非觸而止之屈信則微予始怪兮載疑反覆之而究兮知豸之象之喙有髭兮磔竪下紛如兮多足雲母薄如翥之覆也靈龜隠如文之著也尾足成形彩之傅也不可覷也矧可度也伊飛蠱之微麽亶資氣而含靈感𤓰滋而賦性腐草出而同螢等蟪蛄之脆弱知何秋之嘗更瑣厥躬之譾薄兮稟非常之妙形神有愧於知來兮夀奚極夫千齡惜形似而蔑有兮亦猥當其美名觀無徳其茫若兮甲疑乎真曖八卦之無象兮千里曷其如繩氣靡服兮芘𤓰葉之靈蓍潜豈伏兮蠧以濟其調飢蠢而蠕兮何識何知内匪明兮莫决乎疑曽可責兮知彰知微泯同形而非類兮性天邈如羌僣竊其虚名兮誰與卜無庸兮藏廟堂宜終年兮於野何親人而詭以求全兮儼如亡兮愚予徳兮安取難兮而後嗟彼服之不稱兮適以焚身將兒曹之爾愛兮斃焉無所亂曰偽亂真兮道之賊若胡為兮象之惑内不靈兮死其文受兹服兮其何獲感微蟲兮作賦庶永監兮夙夜凡百君子念兹無射信烏賦南人喜鵲而惡烏北人喜烏而惡鵲好惡之不同有若是故南北更相笑而無有訂焉走實南人以北人好惡為正作信烏賦以辨或庶幾乎不黨也其辭曰有不有翁言與世違行與衆忤動作云為惟背時是主恒笑傲乎江湖經乎罔直之野爰有雅烏上主人之屋者主人瞠若而唾之曰吉吉利利善人其逢惡人余避次有乾鵲噪於其庭主人持飯一盂一甌羮嘻嘻喣喣呪祝前行奠諸地而飼之曰而以喜來將無後時於余婦子等之接之不有翁錯而顧躍而驚進揖主人請問其情主人曰夫子不是聞乎夫鳥烏之性人災其幸來集嘂呼蓋非吉徴須刻不踰厥有非常之應鵲也無然休祥喜傳惟吉惟慶羌來告言應乎弗應行人至惟古説焉夫子曽不是聞乎不有翁啞然笑曰異乎吾所聞君子為善不求福去惡以逺禍福之至也固當然其得禍也非此過於此而無乎戚戚何喜鵲而於烏乎遷怒就子之説言之則鵲是而烏非福禍之來固自巳曽何咎於無知然以災懼我者忠臣之事陳嘉瑞者諛人之辭懼災過可得而改吉慶之在我者去我將安之不告於余固毋損告何貴於先時又况是非無可必夫何一喜而一悲主人邈然不説曰然則夫子喜烏而惡鵲與此北人之常也風土有不同好惡隨以異物不齊者物之情若之何槩之一致不有翁曰否否物情有是知之為貴子自非知我者雖吾言無不既君子惟是之従何容心之有貳北人之好惡爾雖聖人猶無得而弃余小人也於何敢廢主人曰烏亦有異於禽乎何夫子愛之之深耶鵲微可尚足契君子之心邪將鵲聲鄭衞烏為正始之音耶不有翁曰否否子無多言試靜聴吾為若言烏之為烏格而邪説反之正夫烏之為鳥也體旻天之正色稟陽精之至徳縣象乎日中而光被乎四表烏呼之聲有取於聖人而垂世立則禽之性愚可禽取諸爰名曰禽烏乎則殊察夫人之色異舉喑嗚而疾去罻羅謾張於郊藪續長詎發於庭除何施何設㠯保其軀其知如斯為善惟樂太守賢則巢於聽事荆蠻遯則上其軍幕假神靈則飛而接丸應循吏則肉焉下攫至若人之急難父兄遐弃良平無所施其知儀秦無所張其喙於以夜啼所以釋臨川之懼於以白頭所以出燕丹之質在人則難烏行以易又若昭宗西犇唐鹿東走梁王興遷鼎之旅冢宰發謳吟之口相也則然於烏何有扈従乗輿以巡岐守朝夕名聞於漢府成此隨鑾之操守唐有隨駕烏昭宗西幸日亦従凡此數端烏之偉節瑣瑣細微無煩競列粤有大致加大焉請更為吾子詳説烏性惟仁生知愛親念鞠育之施大反本誓以終身無論寒暑反哺劬勤永錫爾類不於其身棲冠見曽子之孝塊銜成李母之墳傷口以皷聞逺邇舒翼以助哀昔人將以愧不良之子參乎用匹於先民夫烏反哺歸飛性天常也辟色知幾知識長也出類親仁物之良也解難從君禽之祥也烏之有是四徳也而將之以見事之明執徳之剛子不是貴而區區較鵲於利害之場哉夫鵲雖有辟嵗知風之技而患不免於奪巢探卵又足與烏方駕而比量哉於是主人豁然若悟軒然而步嚥津徹食還其故處鳶賦嗟萬彚之叢夥慶稟天而自性或同類而殊時亦異情而一命惟孤鳶之挺質兼鷹隼之神俊凜凌烈之宏厲飈飛揚以時奮真鷙鳥之英標而摶扶之匪迅者也豈皇蒼之好徳毒鵰鶚之靡仁損威稜於搏擊餘毛羽之形存忍癡腸之屢空曠爪吻其徒云彼燕雀之何知唧啁喧乎大厦怛拳如之文鷂蹇桀然為何者鶻孔微而云讋顧匪甘乎乃下相彼翎之文著觀眄瞿其矍落六翮翽其招搖上且慿於無莫何嗜樂之卑汚食孔甘於腐璞舍血飲而毛茹牲體陳而肉攫睢盱漫其何以耿含靈之是度兹有以得侮於羣雛而為禽之彼薄也走觀物之資性𣺌百生之誠一彼目狼以兢戰䝉虎皮而羊質舞獅人之為誑陣象轟其駭逸匪葉公之知畫覩降龍而心失曽不如小鳥之知不視形而忘實也慨髙飛之軒翥逺翺翔於寥廓振衣裳其楚楚爽精神之卓犖毋為是鳶識而鷹章近取輕於烏鵲蛆賦有腯而腴有滑其軀不翅而飛不足而趨甘帶而安於汙穢肉食兮肥蝡膚客為余言是曰蝍蛆蝍蛆之形蠢蠢㝠㝠無鼻之馨無目之明孰沸於湯孰爛為羮繄庖厨之靡清斯微物之化生或以為醯酸而聚蚋食露之來蠅也是故蛆之所萃為脩為膾炙湆之味八珍之類食經之貴皆夫人之嗜也設有主賓戒食饌而變色牲殽備薦酒行拜百有蛆蠕而見焉則中筵之上未有不汙茵而噦席者矣若夫溷坑圊廬青蠅每集飫飡而蜕蜕生下濕彼為何來之扇者是亦見聞之氣習也食器而生嘻其何甚蛆聞而躍託言於噤請以事陳世蓋有矢嘗而疽飲者曽何加於我哉不招乃來斯須已孳事有急難無施於事甘蟲孰生嬰童小子蠧心罔覺或濱於死我形我蜕蠶之似耳一杯之水則彼垂亡而倐起矣天胡不仁生此微麽論功於我猶不我可彼龎然八尺之堂堂方蝍蛆而為瑣也食食之餘君子疾夫君庖已蠲蛆焉所居乃藜園蓬室之士猶糲飯之不飽蛆安得而食諸惟君子儒求諸鄙夫蛆言感子余是以書哀白鷳賦辛巳春武昌酒官修嵗事植秋千於次有鷳西飛觸之以死為惻然賦之哀白鷳之真特亦性天於純徳冠蓉砂之峩峩素濤飜兮有服林樾居兮幽絶行有常兮時出鷄不仰乎芻豢雉有慙於髙潔嵗曰改兮王春百卉芳兮物新藏淺草之亡幾而奚為乎邇人傷人樂之及時仙半戱兮輕飛鞦韆建兮蹴蹙聊翺翔兮嬉嬉有來者鷳自彼荒苑疾遡風而西翥昧人為之輾轉惟奮焉之靡顧觸㑹遭其東柱碎緌首於倐忽飈而舞羽有飃有零渙血流纓降離龍之無首霞爍霧兮丹翎神不及知聲不及舉俄而斃兮曷其有所我心惻其生逺過城市而非宜昧有進而弗視飛災是以罹之信始之安其故處羌髙飛而逺舉矰弋縱其何施寄哀思兮鄙語風賦有物營營有迹無形不喙而呀不趾而行得竅而聲撼地雷鳴一息不停千里其程時畏而寒時挹而清萬彚以生庶品以零飛砂一怒草偃遐征小夫不識請謁先生先生曰是非虚隙之産號令於天歟至微至宻惟力之全歟沈潛靜謐可以激致歟發揚隠伏元之噫氣歟鴻鴻濛濛無得無従皷舞萬物名之曰風浪語集巻二
