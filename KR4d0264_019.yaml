body:
  text: 浪語集巻十九宋薛季宣撰劄子上宣諭論淮西事宜十一某昨日嘗具箚目伏計已陳齊几遞中再蒙寵賜臺翰運榖一事亦得觸免孤賤下吏輒敢喋喋冒觸霜威方懼得狂率之罪於門下乃蒙一一記録導達於郡守皆遂所請退而循省雖自不足以得此而仰見體國憂民之意驚喜之劇但不知洪恩厚徳將何圖報淮上事宜伏蒙下問某愚不更事何足禆聞見之末今日本縣探報人返盖旬日事體與節次申禀略同其詳容備録續次申聞華侯十七日已到黄陂戚侯未聞來耗金人十六日過淮餘衆猶在桑林逰騎時至沙窩然黄州探報云初十日去蔣與此少異但兵謀多詐或去或來皆未可信若戒諭諸將常切持重聞其見散掠村疃若乗其隙出兵牽制其正軍抄前擊後靡不捷矣仍聞黄州北有三路麻城居東雙城居中趙家山居西若華侯止扼麻城則雙城彼舊行路尤為坦夷及西路皆不可不備已令其地里繪一圖來日附遞以獻庻見其詳耳二某輒有管見不審成帥取何道進兵蔡州古懸瓠城居中原諸道之衝法當先取今蔣州之寇乃蔡州之軍蔡帥設去蔣州其勢恐留新息如自信陽徑進𢷬其空虚蔡州已平蔣當自潰蔡平則敵失要鎮大功易立不知可以密諭成帥否愚者之慮更望裁處三置中聞蔡州之㨗軍勢大振廬淝之役足以為報古云皇天助順於斯見之誠社稷生靈之大慶首斷國論有以見麾下豐大之業晉公之事不足方矣某輒有愚見獻野人之芹然與不然惟所裁擇某伏見趙張二將已入懸瓠成侯方且赴援淮西申蔣㳂淮遂無軍馬且今敵之有蔡猶我之有合淝合淝退軍我已㑹兵雲合敵之爭蔡勢亦當然如無繼援之兵蔡州恐成孤立萬一支梧不暇或致大憂竊論諸將之救淮西不當與窮寇角蔡東即夀北直潁昌陳汝二郡近連臂指今成侯遂據而有直取東都廬夀之兵可使不戰而屈不然分兵襲夀敵必不能安處合淝我軍四面臨之蔑不濟矣况今兩淮諸帥士馬不為不多清野以困賊軍自可曠日持久益以成帥勢不加强曷若乗破蔡之威自此而進非惟却敵遂可廓清中原較之力戰却之為不侔矣某小生晚進無樽俎之逺謀區區之誠不敢不盡四某昨聞蔡州克㨗成侯乃東赴援無復後繼江沔遂虚具劄子論之未知計將安出今合淝兵號四十萬實恐張大其軍聲我師據險拒之自可持久以待其弊然自古諸軍㑹戰進退勢多不一堂堂之陣未易擊之决䇿攻心勢可必解况今蔡帥雖走必且出没近郊蔡逼于二都密邇潁昌鄧夀我軍雖鋭以數大都脅之後無大軍恐不能固蔡危而淮沔無備江湖震矣且夫守國之備不必専在一方江入荆揚可渡盖非一處㑹軍采石盡弃上流脱有一騎奔衝勢不可遏是可憂之大者不可不深計之聞成戚二帥皆已東恐使司未易追止抗論斧扆不能無望於行臺五某一介晚生曩縁進謁行臺嘗獲一盼之榮輒自忘其踈賤累布喋喋於下執既不以狂率為非而教翰之賜至於再三其謙光蒙被於不肖之軀者至恩至厚也如治糧運穀關甲之事仍一一委曲矜從顧某初無蟠木先容之助又無牖間半面之舊特達之遇一至於此心非木石豈不知戴朝夕思所以圗報之計而未知其所偶因愚慮之及得時事之一二輒欲以浼聞聼雖管窺蠡測不足以禆幕府婉畫之末但感激之情不能自已耳謹條陳于後乞賜裁察一自金使之來出語狂悖雖行道之人亦皆知有敗盟之意而朝廷命令之下尚不欲明言再遣使華庻幾復申前好因此諸将亦無慨然立功之志故王權首為申請乞不許江北泊舟而云無致落彼姦便此何等語而出於大將之口淮上諸郡官物或起為上供或寄徙江南是朝廷之議將帥之謀先自為退縮之計則合淝之役未嘗交鋒而王權囘屯於柘臯李顯忠渡江而歸宜乎其然也如曰以此為誘敵之計則非某所及一兵法將能而君不御者勝故古之命將築壇推轂而必付之以閫外之寄今諸道將帥已有制置招討之除而進取之計尚每聼中㫖金字牌旁午於郵傳而一進一退殆莫知適從矣如成帥之録用過界剽刼之徒使之結連北地今蔡州之㨗少見其效矣若使之且當此一面破蔡之後必有可觀又乃轉徙於淮西成帥亦廹於君命不暇後顧捨蔡而援淮是棄投機之㑹而為連雞之棲也成帥方自襄漢而往戚侯復自淮西以歸雖未知廟算所處然如此而望恢復之功不亦難乎一頃拜詔㫖大駕有勞軍之行迨今日久尚未聞臨幸之所夫今日之勢疑不可緩兵力脆弱不能堪暴露之勞財用匱乏難以支饋餉之費正當法真廟澶淵之舉效世宗髙平之戰翠華親臨斬一二敗將以張天聲以鼓士氣庶幾恢復之功日月可冀也不然姑聼諸將相持於淮上日復一日似非我國家之利也一合淝之役實係大事若我師尅捷則為幸耳萬一厮輿之卒或有不備則淮上諸郡必非我有今乃㑹諸將之兵付之一决甚非良䇿古之名將所以為救援之計正不若是前日本邑探報人回聞陳蔡一帶皆無重兵夫敵失蔡而不爭無謀甚矣蔡之趨汴止四百里若回成帥之軍直𢷬其空虚此唐滅梁之䇿也合淝之急何足深慮一曩者用兵之際州縣財賦尚餘昇平之舊而三軍之士類皆有復私讎返故鄉之念較今之國勢幾數倍矣而轉戰十年不能成功者無它以朝廷御將之術未盡其道耳方諸將略有折馘之勲則驕悍之氣已傲視其上以邀莫大之賞而朝廷唯恐不滿其意也至於敗軍失守則置而不問有罪則闊略行賞則從重故張韓之輩卒不能復中原尺寸之士而遂享三公之封獨一岳飛頗有志於功名然進退之機或戻中㫖卒罹其禍今之諸將見張韓之貴雖輕致敗衂而益無所憚懲岳飛之禍若事當機㑹亦不敢専此當今之大患也一歴陽之役安危繫焉自非諸將和同未易克㨗然而歴古㑹戰皆以輿尸致衂雖以郭汾陽裴晉公之略不免一時狼狽近時以杜充守建業王燮𨽻焉劉光世守九江韓世忠守京口如諸將果能并力則江未易絶杜充之軍不敗鑾輿母后不復分狩江浙良以進退不一不相為援獨當一面則孤軍難立或致敗衂則它軍先遁連雞之喻不可不深慮而熟圖之一合淝之役李顯忠不為無過且以孫安豐之衆不已弱於顯忠猶能鏖戰安豐六安之間絶彼糧道焚彼淮梁顯忠乃望塵引歸敵遂深入顯忠宿將而走人心何從而安稽今之宜不可不問一鄉之强敵下甲維揚而東渡江寧耀兵九江而師濟武昌今日之謀㡬復出此東侵泗上而淮淝受敵西擊襄陽而申蔣被兵我軍不為先人制人之謀而犇命於其後王朴所謂犇走以救其弊則虛實自見不㡬類於是乎成侯之東荆鄂虚矣使敵出鄧之申則襄州自保之不暇江陵黄沔可渡非一在處受敵將何䇿以禦之一前後㨗報尅復列郡已十數矣不知既得之仍能守之乎近傳陳蔡順昌之㨗州人見王師將至皆開門迎納簽軍之追蔣守詬以不擊窮寇平時噉糠粃則民思宋之心尚未艾也既得之不能守之復為敵所有則生靈必無噍類實恐因此絶其愛戴之心不若不得之為愈也若秦商海沂之事逺則不知而陳蔡二郡某切憂之一昔之隨軍漕臣皆諸將僚屬事同一體而軍兵使臣初不問其禄廩之多寡但計人而給之間有糧運不繼則山澤之物可以充一時之飢者莫不取而食之三軍之士亦安其號令而無有怨言今之諸將異於昔之諸將也平居暇日務為掊歛之政奴𨽻役之靡所不至而下之人每有怨望之心今日之事諸將惴惴然唯恐其有所異辭也錢糧之給實不可愆一時之期諸將之謀漕臣不與糧餉所向初無定所是士卒與將帥為二將帥又與漕臣為二矣為今之計要當先有所處當使以糧俟軍不可使之隨軍所向一將帥驕蹇古今通患人主務收其用當結以恩必有剛正之臣繩之以法故諸將内有所感外知所憚用能指使如意戰輒有功廣平王之復京師趙韓王之興皇業初非大過而顔真卿雷徳驤効之凡今將帥之臣其功與此相萬誕謾極矣辜恩至矣糾正其失不能無望於執事六昨晚得黄州劄探㨗報早上已嘗具申禀矣繼而有一商自廣陵來此云備見𤓰州之戰盖因邵侯遇敵而退復掩而勝之據其所言雖收之桑榆亦不足以償東隅之失大抵淮上諸郡例不能保獨廣陵尚介立耳盱眙諸處皆聲問不相及萬一敵之舟師自淮入江則我之險固所失已半今國家所恃者諸將類不能自立然守郡者尚或未敢輕動為今之計莫若推此法以勝之建炎間先人始因召對陳分鎮之䇿即蒙施行既帥所統不逺自皆為計如荆揚一帶率能固守今日事勢至此正縁責任不一諸將少却州郡不復能守分鎮之説不知可復行乎先人劄目謹繕副本呈納乞賜詳酌如可施行則蘄黄安沔均房等處覃及江外當急有所處僭率建議罪無所逃更望少加寛假不勝萬幸某愚不揆度屢以妄議陳浼清聼實非敢有意外希覬但沐特逹之恩朝思夕慮苟有一得輒欲獻之門下狂則有之姑欲盡其報效耳七近日道路之傳籍籍頗甚以為稱名號者在和州雞籠山因糧淮右加其姪以錢氏封爵王侯退軍采石未濟被掩士馬物故者衆以宋徳神明不容有此私憂過計觀其勢或有之且彼傾國而來不顧其後符奏繆計殆不相逺諸將循江而守其勢不可復戰法當要擊其後左右掠其芻糧彼進不得渡江退有强敵之顧簽軍一動可致土崩苟吾無以待之長江所喪己半計生於久何事無之傳聞吳拱之軍復有入援之舉未知然否若果爾則聚於江渚不若進據淮西與劉錡之師左右相應絶其要領勿與爭鋒自然糧道不通狼狽而返内外夾擊必有大功昔真廟却敵澶淵亦有北道之衆釋此而求其退固未知其或可苟彼兵挫而却復轉而西則舒蘄江鄂以來無復横草之限安危所繫惟執事圖之荆襄亦不可虛更乞台念八傳聞淮上之兵悉已退去雖事有可疑而理或可信夫彼二十年間外示和好而窺伺之意實未嘗少忘也我國家待之之禮唯恐少忤其意一旦遽弃前盟侵犯邊境勝負未决倐然而遁此故可疑者然其自入我境而廬和數郡民人盡矣屋宇焚矣諸將之兵既渡江而南彼進則不得戰留則無所食暴露曠野勢不能久則為去計者理或有之使彼自能悔禍渡淮而北則為宗社之幸然其姦謀詭計實未可測某以區區之見輒以數説料之風聞劉錡頃駐軍於濠泗使錡能因順昌歸順陳蔡尅復引軍直趨二京則彼有後顧之憂因此而退此一説也藏形匿迹誘致我師戰於平原曠野之間出竒盗其舟楫此亦一説也聞今清河之水上接大河下通淮泗旴𣅿失據則運河可以出真揚山東之舟近接淮海使全軍轉徙而東於真揚通泰之間或下運河之舟以營戰艦或通州浮海而襲蘓杭則彼䇿之一竒也昨者某居鄉已聞造舟之事近聞倘仔道山東事云海舟篙工已具獨未有軍馬雖未可遽信然頗相符合此亦一説也近日再到蔡州之軍聞自盧州而來而漢上復有光化之戰竊意金人以諸將之兵㑹於下流而建康一帶未易可争今安蔡之間方無重兵控制彼欲再為此舉西軍光化則我軍不能東顧安隨如或進兵棗陽或入安蔡非復横草之限旦夜可以臨江此亦一説也夫數者之説雖未敢必如所料然今此上㳺不可不為之備頃者朝廷付成侯以南路兵柄而執事以便事留此可見委任之意今成侯既已東下則所以寛西顧之憂者非執事而誰荆襄屯戍之地備禦之䇿某則不知其詳若蔣蔡一路止餘一趙撙耳精甲既去所將尫弱無幾萬一敵騎卒至不知獨能當之乎棄蔡而歸勇怯已見安隨之備知復如何盖事當圖於未然之前不當悔於已然之後某下邑賤吏愚無知識不循尸祝之分妄干樽俎之謀僭越之罪固已多矣台慈下亮不勝萬幸九其孤賤晚生伏蒙特逹異常之遇感思無報無以自安每有見聞輒欲上干臺聼不循分守常恐得罪門庭洊辱臺翰枉臨不賜鄙斥褒拂過予殆踰華衮之榮戴徳之私不知紀極伏蒙下問淮西事宜此亦不知端的雖傳道不無真贗然某不敢不具禀知金主始在雞籠繼而和州克復其傳似有叙想事或有之昨聞敵自合淝侵蔡州其衆頗有饑色若淮壖糧道阻絶陳州順昌内畔劉侯因之深入勢當棄淮而歸不然西路之傳絶無影響轉入東路其理當然昨日池州綱馬卒云以初三日發池州口未聞和州之㨗巢湖敵復造舟傳聞類皆不同惟當恃吾之不可勝者妄意敵之所向昨已附遞陳之今王侯復藍田華州潼藍二關已為我有中原斷而為二若吳侯下秦隴之甲與之東西相應姚侯自子午谷進長安勢可必取第恐彼中清野其功難就然敵勢既分矣伏乞臺照更容探問的耗别具申次十劉帥淮東之㨗吾已落其爪牙實宗廟社稷之大慶諸將極其兵勢可以一舉滅之似聞遼已復興則彼北歸無路進退失據恐復西奔不為隄防慮有衝突之事安隨申蔡盍早圖之於此成禽不可知也小官妄議國計乞賜臺察答宣諭范機宜下喻陳蔡之事今留屯者趙樽耳深入敵界其軍至為孤弱二郡勢不相及竊恐為累反大適得黄崗許簿報前日秦陳二統制自上蔡赴援州人皆遮道而泣夫蔡為重鎮敵之喉襟也幸而得之乃委之而去事已至是故不當復論但蔡人開門迎納之事金帥復來必遭屠戮不唯誤一方生靈之命實恐絶中原歸向之心就使敵全而用之乗其憤憤不平之氣其鋒有不可當者且今舒蘄以西絶無兵馬復蔡之軍又去强半則數千里間空虚甚矣淮東之寇或為諸將所破勢必西走苟得一航之渡則吾事有不可勝言者今之施為大繆如此某不敢喋喋干凟宣諭議論之次乞以此及之上宣諭論淮東事宜四一某准州帖復蒙都統司關甲五百副下縣中昨仰荷軫念先蒙賜甲二百雖出誠懇然已過望今復遣兵屯戍重賜以甲丘山恩厚未知何以圖報萬一但有感激銘之肺腑顧此一隅之重某䟽狂晚進雖欲死報恩徳而愚不更事軍旅尤非所長畏懼之私終恐負所知耳淮西自張舒州易帥探報殆絶前日之傳似乎可喜而道聼途説日以益異或云東路敵勢張甚劉侯雖有俘獲今復東守海陵雖不容有之然合濠泗而争鋒窮寇似難為力運河海道慮或乘之敵之芻糧不患不給㳂淮已無兵甲退之實難傳聞蘓秀民多逃移理或有是吳侯光化之㨗我軍不可窮追恐傳而東緩不及事今此襄漢已弱不宜深入敵邊通問吳李諸公不知可諭之否冐昧塵凟乞賜矜恕二傳聞敵軍東及通泰劉侯已還京口維揚雖有李横城守張萬敵軍通泰州而戎首在六合天長間孤軍殆難久立却敵之計圖之實難雖傳復得廬州盖幸其寇耳聞蔡將蕭總管攻陳州未下蔡州尚可乗虚而擊不幸陳州不保蕭勢又須南下使其東西合勢吾軍不復可為不知吳侯之軍可復調否如鄧州敵勢不振分此一軍而東北擊上蔡則陳人自成首尾破蔡東出則敵勢必將自阻過此而求善後無可為矣但不知劉萼自通化而走今復何之若不東合蔡軍定須西犯商虢二者皆我為道然恐非敵之所能乃果出鄧州則西洛可乗之㑹顧此孤弱之甚難為後耳今也東道方急不宜舍之而西破洛而不能据陳許諸州猶無謂也妄意塵瀆恕察是幸三某竊見敵人盡在江上濠廬並無軍馬進兵更可得爾但恐蔡州或能為患故謂不當舍蔡而入濠廬使蔡將破陳而歸縱不南向濠廬等處吾軍不可復守矣伏乞臺照四某伏覩皇天悔禍國家復讎刷耻之效冠絶古今决䇿之臣功加方召矣然聞之古語曰成功易保功難我軍乗其内叛之機神州可不戰而取所謂以我之衆加齊之半時不可失此孔子之所為沐浴而告者然便於料生而不善料死仲達不害為知兵切嘗妄論兵權以為當恃我之不可勝不當問敵之可勝是以尤當持重以赴事機使彼可乗故當迎刄而解若猶未也於我何傷此時事之所當先惟廟謀必已素盡區區之見更乞謹之論營田某時者伏遇行臺循問及境思有所獻而不敢越其職分輒請金牛置尉以銷南鄉之盜縱論及於營田仰荷采納不以為過退思營田部吏豪横之迹為民顯患州縣猶無得而制則雖置尉無益以為營田不罷不可以立尉司盖縣不能統營田則其為盜賊淵藪自若營田幸罷然後尉職可修軍罷而歸置尉乃為急務顧此軍務方冗事若難行比來未敢復言乃蒙詢問下及輒敢條其利病列於左方一古者宿兵絶徼多為營田所以省饋運之勞而勤士卒之惰也然而古之調卒蓋取諸農且戰且耕猶易為力今之營田異於古之營田也强士之所不能棄之而不復教耕者猶不足自贍何有於一軍廢戰而贍之耕非其理矣一營田之卒一人墾地約二十畝嵗得穀六十碩其奉錢月三貫米七斛五升嵗計錢三十六貫米九碩而衣賜不與管轄官校大約什置一人請奉或十倍於兵則是二千兵營田二頃得穀嵗六百碩費錢七百二十貫米一百八十碩而衣賜不與牛種農器不在焉此營田利害之曉然者一湖外穀價低昂不等約其中數碩穀為錢五百營田莊寨去軍逺者數百里以馬運糓騎士從之徃復數程負穀二碩校之中直為錢一千人馬在途其費相若近時士卒棄糓而歸者有之質之人情未足深過一營田之在諸邑類皆奪民膏腴稍有良田民賴耕營田輒掩而取州縣無得誰何或有水源營田皆擅其利民田灌溉非復可得有如放水則决諸民田之中民以其田歸之為之佃户非惟可庇賦役始可保有其田又有無良之人樂於放縱一為佃户遂可横行於鄉而無知之民復有半託軍校竄名佃户以避追湏雖有盗賊寄迹其間州縣已不敢問巡尉保伍何從得之一營田官校往往不恤其軍科配茶鹽日有定計營田之額有増無減嵗有荒歉皆於軍士名下尅除死損牛車亦令軍備窩藏剽掠盖非得已而然自非部校容之何自而騁部校家自為盜尤不可容一營田部轄下至軍兵往往因公為私多招佃户侵耕冒種不知紀極州縣不相統屬故難稽考一户嵗失苗米數碩過百則已及千一嵗之間不知失幾百户營田増羡無幾實何補於軍中一營田軍兵固有老而不可復戰者久於田畆稍知其趣又有佃户實供官租如罷營田必恐失業如因見耕之産使為佃户營田牛具皆以給之軍兵所棄之田因而召人耕佃閲嵗無幾租入必羡於今一竊聞營田馬料在總所嵗計之數今來軍馬調發馬料係諸路應副若因此時權罷召民耕佃其田寛以數年自可及額若便責之縣邑竊恐未易出辦一營田之在諸鄉為害雖大而營寨棋布舍煙為頗翕集一旦罷軍而馬返或恐人煙空窵盜賊因此竊發若第罷遣士卒其佃客及附莊户並令安業寛之如舊自可以無此患一伏見諸路營田官莊皆以縣尉兼掌本縣官兵營田若罷尤宜置尉南鄉分掌官莊轄其佃户它縣視地廣狹措置大略放此非惟可銷盗賊兼免失陷官租某似聞營田馬料每碩給總所般運錢一貫文其實使士卒般運不曽支給却作營田上供金銀起發只此一事虚耗已多某不能知總所支錢之詳更乞詢究其實上宣諭論蔡州事宜某竊見今年蔡寇攻城之法當急乃緩慮彼姦計俟我食盡而舉計今守蔡之卒不下七八千人不知儲蓄之詳恐有不給之患又不知晉保軍馬赴蔡為復秪在徳安二處皆可緩之光州信陽不可純無屯戍若令留軍一處少益其兵非惟援接蔡州兼可掎角鉅寇如欲持久糧餉尢宜蚤計恐當急救諸將得以為辭妄意及之乞賜臺念上宣諭論北事某自涉春以還稍不貢記室之問非敢怠也特以人㣲位下誼當自歛不自畏縮譊譊焉日以猥獽之説躐陳於大君子之前雖至徳包荒不以為過不知我者謂之何哉重自金兵退潰而來士夫隨復驕惰私憂過計必以我為徼幸多事之人是以雖有所聞不敢仰瀆臺聼然而聞見日積乃心鬱如仰惟寵遇之隆每蒙不賜誅絶奉頭鼠匿殆將絶於門墻雖少安小人之私然非所以仰報眷予之意偶所聞若有所繫朝廷誅未有以處之執事奮不顧身自任以天下之重故某輒盡底藴切敢言之竊以國家比嵗用兵之初實未聞嘗有戰守之略宏逺之計謀不早定將帥乏才欲以久惰之兵幸其一勝泛泛然如投無鈎之釣求魚於三江五湖之間兵不交而喪廬淝非敵之計善也吾謀之不至爾幸彼喪君而返人情不無二三躡而殱之可使少知懲艾失此不計使大定得以緝綏其民是皆事在已前悔不可及來者之計在廟堂不可不圗然以今之邊防視前日為何似今日師旅視前日為孰多自冬徂春恬不復計金使壓境又復不知所為彼怒而歸意可見矣且夫大定之力豈誠厚於我哉良以國有内憂上下未睦故此尋盟以和其内須我待之有闕師出不為無名怒其衆而用之庻其有濟是必君臣朝夕之所自為謀者而吾邦不此之憂猷之未逺使敵再至果然却之否乎古求欲以勝人以為莫如自治兩淮之戰吾之手足露矣為今守禦之備當百倍於曩時前日之僨政以長淮不守守淮之計廬夀為急以周世宗之略尚不能久處淮南盖劉仁贍堅守夀春當其衝㑹夀州不下固不可越之而有淮南非仁瞻者果能勝周誠亦兵家之所禁也前日以淮為不足守棄廬夀而守揚州既不能軍遂守江面設有臺輿失備守將奈何使敵悟前日之非又將大舉以重兵當諸將輕兵乗間浮江黑幟一建於南守江之功殆矣且彼前日之失以彼身自任之安知今日北朝不知選任良將汰其傭僝救過以往吾非蚤計恐難悠久為今之策尤當固守淮南顧諸將之所行殆兒戯之不若一州一邑戍兵才千百計無補於事徒析成軍吾軍政若乏人為計豈宜若此傳聞陳州之圍日急救兵未聞一至遺氓報宋無若此城棄之不疑是豈恢復之道前日蔡州之事尚或可為第縁守者不勤救者不至前功盡棄敵徒手而得之使敵方至之初逰騎出没者寡伏兵掩擊可以杜其復來比及攻城援兵要戰於後内外相應豈無成功汝鄧棄州而歸那復為上蔡地託名援救實自成其退計爾帥臣舉皆若此緩急寧足恃乎竊聞鄂州之軍非果不供於用特以調發無當致此紛紜復求忠鋭不習之軍以為内援豈惟無補行復悞事方今用人之際命將尤宜詳審御營殿帥果敵之所畏邪漢王聞魏將之名即知魏之可取今日諸將知復如何李横傅選之徒於岳軍粗有聲譽廢居散地輿論惜之處選浙西固無所事處横於蜀將焉用之二公徒不事貴臣豈皆果不忠者處之襄鄧未必遂無可觀將士得各遂其所安戰氣亦十倍矣是皆愚見所及欲以少補大謀之一二辭不盡意執事不以為謬而辱觀之惟所棄置焉不任區區戰汗之極上張宣諭書某讀詩小雅得文王之所以興建大業與宣王之所以紹開中興固未始不本之人情見之奉使而其一時之使亦未嘗非忠信之士王之同徳不二心之臣良以四目四門委之一使上焉以布宣令徳下焉以導通人情五侯九伯所為取正四夷八蠻所為訓服非忠信士王之同徳心膂之臣則亦不能勝其任矣故皇皇者華遣使臣之詩也送之以禮樂言逺而有光華也詩之首章不過每懷靡及終編之義咨詢咨度而已六月宣王北伐也言不及於有功之將帥而其卒章乃稱文武吉甫萬邦為憲來歸自鎬我行永久由是言之使臣之任顧不重哉使臣而不能及政之闕盡咨詢之義至於萬邦為憲則雖匹婦不可以情得昆夷玁狁何從而正文宣之政可謂知所本矣執事吉甫等輩人也當主上薄代玁狁紹開中興之際以皇華之使任吉甫之責淝水横流而氣不為沮河洛塵昏而謀不為挫迄能恢復汝鄧觀兵嵩洛東收陳蔡之壤北却蕭劉之寇光華之逺於斯見之我行永久宜聖主之召而大用之也來歸自鎬其所為告后者是必先已有定如民力之彫弊屯田之勞擾執事咨詢有素决不置之者也至於諸將之才敵謀之情偽固文武之餘矣又無待於鄙言矣竊意諸軍進退之實熟見稔聞之事如復蔣之妄入汝之失救蔡之不力棄鄧之無所顧藉與夫不恤在行之士不綏徯后之民若凡此流仰惟耳目之布必以周知其狀矣咈人情誤國計宜莫此若也今朝廷之上既忘前日之始宴然以無事處之矣在列之士必未有及是言者縱及於此又必不能周悉其詳咨度咨詢所以仰副虚懷之意為憲於萬邦者願執事以身任之也光華之美於此而至執事必不難之矣雖然猶有説也敵之未渝平也盖每言其内亂刃交兵接亦又不然自淮而歸告亂者又紛如也以我之不可勝待敵之可勝而不可恃敵之可勝亦欲朝廷之戒之也某窶人也無寸長之可取且無先容之助一言堂下執事不以俗吏待之以公言未嘗有不聼者一邑之賜於某偏矣輶軒之復不可以無言送敢以所學於小雅者仰布於下執事視文宣之所為攘却昆夷玁狁之事可以從知大業中興之略執事將秉國政事必優為之矣非小子之佞浪語集卷十九
