body:
  text: 浪語集卷二十二宋薛季宣撰書與汪參政明逺論嶽侯恩數某聞燕王市駿馬之骨賢者歸之勾踐揖怒螳之臂士為必死是皆推誠異類猶感切於人心施諸功臣焉有不格恭惟皇上即位之始首雪嶽飛之寃天下知與不知無不稱慶逮今數月宜人人有報效之心求諸軍情乃反有紛紛之論此議者過也日者樊建以晉武帝知鄧艾之寃而不能直知其得諸葛亮而不能臣推恩於飛寧不類是使飛果反朝廷不當昭雪為之昭雪是非真反苟非真反則亞保之禮不當有廢國家縱不能歸其賵贈追加封爵猶當反其田宅畀之恩數親降黼座臨奠其喪㑹其子孫以禮歸葬使人知為子孫之利則為善者猶有所勸今獨不然惟復其封而已改葬之禮非復典彞官其諸孫僅同卒伍今夫庶官之死延賞猶世其家而獨於飛偏有所靳以求人心之感不亦難哉德壽中興之成不過張俊韓世忠劉光世秦檜四人而已四人之終禮有異數今其子孫或位孤卿飛之功勤不已加於四子斃於非命自乎既往追之來者乃至於斯人之多言亦可畏也昔魏佛狸飲馬瓜步宋文帝臨江而歎以為檀道濟不死虜不至是曽不能追録其後識者有以卜其世祚之修短金兵南侵金人自為嶽飛不死大金滅矣之語然則所以激勸士伍者安可不厚仰惟都督參政相公以道事君以誠體國明飛不反公議攸歸恩禮不加想當未愜於鈞重建言宸極在乎謦咳之間使優孟不至笑人則人知鄉善之利矣某鮿生晚進不知政體伏念先子薦飛為將伯父參其軍府今日之事不忍不為一言顧飛已死何有逰說徒為國家惜此舉措不厭人心管仲所謂知善而不能賞之與郭公之亡何異是則雪飛之寃而取衆怒不若不為之為愈也行府信能終始茲事史策當不負人人之歸本朝又安知不在茲舉也況今行營將士往往故飛部曲求其死力莫此為善惟鈞慈濶略鄙夫之妄決而行之不勝至幸與汪參政明逺論屯戍某比者伏蒙鈞斾視師沔鄂經從下縣得獲迎拜道左深慰久違瞻戀之誠自惟寒賤小官參謁相府不敢越次上干掌客區區之情有所未盡然某去歲伏蒙眷遇之禮優出倫輩感德之厚未嘗一日敢忘苟有知而不言實為負恩於下故敢輒盡底藴仰觸鈞嚴某昨饋輸信陽自黃陂而北地形平易實所備覩德安雖有軍戍其外並無藩籬古之三關漫不復守仵落漕舟數百沙磧不可上通急緩出口既難適足濟師資寇早來得信陽周判官初九日報云陳蔡之兵來者日益或有侵突當為可勝以待之如仵落東入陽羅西通漢口順流而下不及數程某自孝感而歸再宿而達縣界今也光黃既無師衆德安又弱如此使三關屯守猶恐無險之可依不蚤圖之竊恐無以豫備不測萬一敵以萬人侵犯安陸則我軍與之相持別軍取仵落之舟糧道可以兼得順流南略則武昌夏口為可深憂不知行府可以先成侯之來為區處否至於黃州一路去歲申稟已詳更乞鈞慈俯賜照察干冒僣越不勝戰栗兢兢某竊聞行府非晚視師漢上此固先務然聞蔡兵日急區區之見以為此行猶可少緩要當嚴戍襄郢固守德安東防武昌以須成侯之來然後鈞斾西引有如幨車遂發萬一德安而東忽有警報此既未有主師恐失事幾愚瞽獻言敢乞恕其狂妄與汪參政明逺書某聞待敵之計和與戰攻與守而已也四者交修可以無敵於天下又其次者擇一而固守之然後事功可立未有四者並棄苟安朝夕以待敵人之自斃而事能克濟以終得志於中原者中興以來是為極弊昔先大夫右史嘗為趙相國言之曰今待大敵而規不素定安危付之一決進退繫之臨時愚竊為朝廷危之也近歲用兵弊則彌甚國之兵力況加怯於前時以此圖功烏能保其必勝此其所為寒心喪氣廢寢食而憂之也為今國家之計和攻之事蓋難言矣惟戰與守皆不得已而後動是特不可廢者東西萬里雖分之大帥其董帥宣慰非公相則侍從之臣也戰守之具可謂略舉不幸事出慮表再朞之內劉錡東弊吳璘西蹶淮蜀為中流之臂今幾失所恃矣荆襄之地獨賴都督參政相公威德昭著鎮撫六師隱如長城折衝外侮安危之寄可謂獲有所托豈惟生民之福實宗廟社稷無疆之福也愚者之慮然有若可言者浮光以西商洛之東地非不逺也而嚴備未設敵騎萬羣飈散雲集而計略未定設敵乘西師之勝而耀兵淮泗窮中原之力而徑薄江湖批亢搗虛驚南備北我師奔命之不給而四顧纍然亦有可憂之勢矣事至而慮慮將無及及今先事數月不若早有所定料將帥之勇怯察地形之險易可守可戰豫為之謀應敵之方較若畫一使彼計無所出則將送命於我生之殺之惟我所制比之臨事而動其得失固未易以一二計也惟某官圖之某寒賤晚生初無片善之可取伏蒙鈞慈眷遇超邁等倫方當辭違庸敢不效其碌碌以孤恩寵於黃扉之下顧敢輒盡底藴凡平時所不能自釋於中者仰惟某官陳之如蒙恕其狂愚不賜誅絶庶幾千慮之一得幸聽而熟思設為宏規以澤天下則凡覆燾之內均服茲賜豈惟某一人獨被帡幪而已思報恩德不知言之淺深伏惟鈞慈財察大幸與汪參政明逺伏自湖口請違舟御適遭甚雨不得一望鈞光中心歉然迄今四閲月矣依仁仰德可勝朝夕之私自惟位下人凡鄉也竊食樊楚得托鈞芘伏蒙寵遇推許之意良厚殊非庶幾之所敢覬此恩此報何日忘之昨自孟秋抵鄉竊知鈞斾至止臨海即欲僣具函牘詗問興居而家貧乏人百冗交至故區區之志有所未伸誠非敢慢想必蒙鈞慈洞察之也邇辰不審鈞用復何似大抵大臣遇合進退繫國盛衰動靜之間必與數㑹此不可為時俗道而可以消息觀也大人君子立乎本朝患道不行去留固非所恤某官鄉秉鈞軸視師襄漢適當北馬南牧之際蕭劉二冦跳梁邉鄙當時諸道負宿望擁重兵者奔逃逋竄之不暇某官談笑而却之如吳拱之棄襄陽自非力障頺靡則上游之地豈復有如今日又如變故之後人情安於故習某官力主大義屯田襄郢實為無窮之利大音寡和宜衆人之不識也宿豫之事與夫出處之節蘄陽拜侍某官固已言之洞識幾先世所無有豈呫呫口語可為輕重君子不可罔以非道公論行即自明仰惟深造道真處之當裕如也某自歸鄉關雖人事日接塵坌可厭而無在官役役之念始覺此身之為已有亦懶者之私便但自動之靜乍然自適乃人情之常何足為某官道然辱眷素至竊敢及爾敢乞鈞照某窘於寒饑秋冬之際不免赴調武林時方倒懸某官必非久于外者佇聆宰司之召别陳賀悃有如車騎未發尚當取道丹邱拳拳之誠併圖面稟與汪參政論邉事薄聞敵以重兵戍許昌遣將攻皇甫倜倜軍無儲粟援兵理不可緩觀敵揭榜陳蔡雖若有善意然其深謀詭計似别有指政當靜以待之襄鄧地連汝洛不得不以為虞光黃鄧屯兵不多尚當益備不識麾下諸將嘗有及是言者否此等進見尤不厭數如蒙賜之坐席接以溫言使人人自謂己親可以收其死力仰惟寬慈謙厚於此端不待言某違逺匪遙所見不敢不盡與汪參政明逺去冬趨造鈞屏伏蒙謙尊降接略去等威己為過分重以燕犒勤縟下情不勝愧荷之私自為一介晚生初無蟠木先容之紹武昌一見遂承顧遇如此逾久不替退而循省何自得之有以見大人君子急賢好善之心誘掖後進雖菅蒯之賤樂成就之無所捐棄世衰道喪達官聞人不以富貴自驕已為盛美況能下士而又假之顔色實為曠世希濶之事力振頽風知有人矣如某微物何足以當盛意知為當今之士得所依歸為喜也匆匆請違又復半年雖引領門墻惄如饑渴而滯留錢水者再月稽延武進者歷時附便無從而記室之問遂闕如也怠惰之責固無所逃徒以雅辱眷知不責小人之禮有以自恕想必蒙洞察之也即日中夏炎溽恭惟浩養琳宫天人交相鈞候動止萬福某區區之迹仰托鈞庇切自夏初旋里即欲走介詗問興居偶家室暴病頗危愆延遂爾雖然仰望星斗乃心未嘗一日不在赤城之下也武林諸緒大凡如昨言之非惟無益徒使人情遺憤所可慮者公論不立時無一定之謀士夫務快其私以權相軋邉庭備御因茲而廢雖一時望人其名少稱其實其間號稱遺直素以徑正聞者察其所言不過矯俗而已施之於時未見其益敵情大略可見顧皆以愚懦待之比武昌同僚及寄居自湖右至者其言大帥經制雖不甚悉然其事亦可概見如罷屯田一事率爾而行耕牛農具之屬散失幾盡朝士亦知其謬此獨事之細者又如議棄襄鄧退軍鄂渚雖三尺童子咸知不可而持之甚堅牢不可破李橫雖少直辭取怒然其議賴此而格況又虛驕自處下情不通某官既去之思不殊召伯在江漢之間也某鄉在臨安雖不敢求見當路間有親故在列不得不一見之嘗為某官詢訪異時飛謗之所從來大抵所傳皆妄要之言者以公於前揆路有所厚善彼嘗不利於已故率意而騁采之輿論則皆知其非矣君子之不可罔以非道理必有然者何足計哉何足計哉某輒不自量顧惟受知門下苟有愚見不敢不布腹心臨海士夫想不無時造屏著者竊量其意不能不無所希大者不過宛轉欲求薦章細者亦各望其所欲某官守道不阿豈無拂其意者謗生觖望理所宜然顓蒙之心以為不若一切不見之為善也況為大臣方釋事權平地風波易成橫議纖細之隙不得不防自非却掃杜門謝絶郡縣小禮則小人利口何自塞之某蒙被眷憐雅出倫等昨在錢塘逆旅偶有所聞某官亷節素髙曽何足為盛德纍在某出入門下聞之不敢不稟鄉非兼容廣納雖某亦不敢言也伏惟鈞慈是監是察在今講戰未決待人而定某官至誠逹道簡在二宫召冊之頒匪伊朝暮此士夫黔首引領而須者參侍尚阻敢乞對時倍萬保合為吾道斯民珍重與汪留守明逺竊聞北朝講解議定誠可以寬目下之急在國家亦一幸事雖然敵情萬變恐未必得其要領斷國論者平居無事鮮能推賢讓能與之圖天下事卒有意外之慮則必逡巡退縮諉其素所難者與人竊惟社稷重臣在江外者其聲名威著固無加於鈞望異時委寄斷可知矣如以宗祏之幸徑還國秉格天之業由中及外蓋有不待言脫有事如前慮則今莫府部郡地盡江表循江以北皆其障蔽如地形之險易羅落之疏密將帥之勇怯兵旅之精惰有不可不豫察者帷幄之論想以素定投機合變㑹當決勝於廟堂疏逺之臣然猶有不能自已者妄陳瞽說敢惟不賜厭斥而采察之凡今之究敵情者例不喜聞其實圖邉事者偷為一切之計充饑畫餅財足自誑大臣憂國力之所不逮者固無可奈何有如得志得時行其素藴上之正君治國內清朝廷下之澤物仁民填安華夏是皆道學餘事當次第而行之近時淺俗之夫類皆見不及逺方邉隅無事則趨時鄉背歌頌升平一遇兵興則又髙談克復其說信美然實非今所宜至如屯田淮南所以守衛中國如鼂錯何承天之所建白似可施之於時而人無或圖之此又大不可曉者自治之說在所不論比聞大政有禮官失於探討政府未能裁正者所繫甚大處之當必有方待人維持衆論固有屬矣私心憤發不覺深言之惟大度容之與汪樞使明逺某頃自丹丘拜狀之後跧伏里閭間便無從復奉記典籤中間嘗以姪子㳂牒江東寓書以行而已得試上庠遂不果進旋聞衮衣歸國正席西樞以為旅賀盈門要非有補故不欲隨衆人之後況小官待次宜當自縮輒以姓名關達相府似非舉措用是蹟絶主記愧負何言微末誠無所布露惟是巖瞻斗仰馳切于衷雅蒙度外包容必不以此為過比者伏聞超然逺引力辭公輔之位睿眷方渥顧欲倚為社稷之鎮優詔裁抑士論休之咸謂數十年來茲事罕見詎止激揚薄俗直可詒法後世甚盛舉也某雅曽出入庭所伏蒙眷寵隆至詠歎喜躍豈易倫哉然而區區之情私憂過計輒有管窺之見偶不同於衆者欲遂緘默則思異時受知之厚苟為有益鈞聽不當以嫌過自屏絶故效悃愊伏惟鈞慈采察而審思之如君子之所為非小人之所識者亦惟曲賜掩覆恕其狂易伏自某官趨拜歸詔始以十事要說九重雖古大人正格君心何以加此士夫引領日遲台席之正乃聞尚綰樞軸增重本兵有識之情頗復疑怪之矣仰惟明謨堂陛密勿萬幾必有至靚至深非天下可得而聞者四方之人想當隂受其賜人情不能知感造化曽何取於文成房杜之門哉竊維自更官制以來右府不置大使間或除拜則非元臣不居由執政躐為之蓋前此未有一人所以寵正樞極人意其旨自有在某官徊翔引去可謂進退有節勉為留處彌見從容然思今日之朝似可一言而斷有如君臣道合足為明良之㑹興起德化正在今日設不至此又何疑焉誰無功名之心於所不可則當以禮為重雖古明聖寧易是乎日者獻替之初能如姚元之司馬公之舉從違自可立見若不得已宜可一如富公在治平間牢辭故事不以三公易介在某官固優為之不然日又一日勳庸未著善人失望易成詆訾人之多言亦可畏也過涉無咎猶為不益於人即今日以觀方來可不占而見矣敢惟不棄堂下之說少加軫念所繫匪細不可忽也尋思此來頽靡之俗士夫以言為戒受人虛已居顯位者尤切難之某非以舊沐大恩未嘗以言得罪仰知某官包括之量安敢及此率然披露心曲不思深淺之避未知鈞度宏廓果能鑑其狂簡也邪未見顔色厲切薰心箋牘常儀徒為塵瀆不敢以此干戾伏乞鈞照未期侍見伏乞若時體道懋育太和以為社稷無疆之休佇調中鼎慰此黎庶不備與汪樞使明逺梅霖蒸潤恭惟浩養琳宫優游里第天實相之鈞候動止萬福伏審超然逺覽解去政機難進之風高視前古仰惟慶慰竊以公輔之官尊榮莫二先賢雖以建功立事而聞人名士昧於幾微怵此空名失其所守用招覆餗之纍者其亦衆矣孰有對掌大鈞之臣睿眷方寵中鼎虛席而能力自引去四方之人想望風采咸謂鳯翔千仞無以復加雖雅不知我公為人於此無不心服稱歎是可賀也雖然君實去矣如蒼生何踈逺狂生所以為時而喟也伏自鈞斾分正别都之後某以貧甚不能專介詗問起居嘗於便中一拜稟目行者中道輒返持以見還及聞宥密之歸某以寒微不欲通名相府且謂旅賀無益不復上箋後以淹久西樞人士不無二三之論某不敢自顧形迹竊嘗奏記仰贊見幾之作迄不知浮湛未審果曽千鈞聽否意者某官進退之節上通神明天方賜豫善人故非悁悁寒人可得而與微蹤寖若疏外愧負多矣惟有拳拳之誠未嘗一日不在屏著之下也鈞慈遐察不以深見罪乎永嘉時有山東人歸言北方創食糧水軍厚募以收江海亡命且營戰艦疏漕溝閲步兵教强弩雖未必誠是然以人情料之必無久和之理何者前時所欲必隨要以信誓彼尚寒盟首事不以為難今雖屈意如前間罅多矣其主沈鷙既不與前主同其不請盟必以我為厭於多事一遣使介足令上下解體以待彼之事集它時大舉不為造端觀其纘襲之謀亦足以見其謀慮之深也吾國太平久矣民力單匱今年又復霖潦秋稼必損無事尚可過此奈何某官之去闕庭德望彌洽衮繡旋返斯人蓋翹企而俟嘗論平居少事從容難于用賢恐懼之求進若置諸懷者其必然之理矣如不得已甲兵糧食猶可隨急取辦所深患者無才之用耳世以居官當事比之棋奕動民於靜故謂當局者迷頃張魏公在湖湘天下意其知人必富起無應時之用物望闕然勳業聲名隨輒掃地某官碩德重望為世尊仰謝事高舉安得恝然於世縱公兼忘天下天下將即公矣均逸居閒無非暇日是可益懋經綸之業稱量人物茲也其時無求備於一人此周之所以收八士之用近來責人太備掄材不審位置乖忤故不聞有適用之才某以為從政才難何但今日略其所短誰無一長絶利一源則雖聾瞽之人視聽猶十倍之蓋以驅羊而使堯舜曽不若一小童韓滉掌鹽鐵時有故人子上見滉命之飲察其才無所堪然而終席身不動搖未嘗旁睨而語使典門禁危坐府門而卒吏無敢擅出入者用人如此世寧有棄物邪今誠收録賢傑它日隨才之用將無適而不宜古之良醫所以收治之效者以其蓄藥良備且知所以為方起死之功初非一日之積蓋如牛溲馬勃皆素有之雞蘇豨苓有時而帝視之闕用乃見其窘然則藥籠中物儲畜可不素邪相公稱物觀人近同衡鏡而某又言之者實有望於勉之吐握之勤惟兾常以自廣法聖虛受如此公豈久外者邪宰相職在命官上而正君正國進賢退不肖下攘外侮以澤天下者非人無自集也旁觀者見事常審某何敢自謂之知起為蒼生真庶幾於大人君子而已伏惟鈞慈少加軫念宗社生靈之福也某有言狂僣似教大匠之斫不敏之責亦惟寬而察之某歸自武昌及今正三歲矣雖窮居閭閻曽無官守之責得以修理舊學良有樂處然子姪皆已及冠食指猥多伏臘不供久無祿食之助今待官次尚兩年餘為吾者殊若可纍然思世䕃即不我逮蓋未能無妻子之畜以斯自處亦聊可以安貧雅辱眷憐故敢道其蹤蹟未期承望几舄伏乞為時為道保合太和願俟衮衣之歸慰天下望與汪樞使明逺拜違履舄倏忽三春引領崇墉如隔霄漢乃心瞻跂朝夕以之伏自分正别都嘗一奏記行李中止弗克上通後承牢讓機衡又憑叔祖侍郎便行拜狀旋聞琳宫得請復因洪丞相壻許教授僕附問起居既邈不知浮湛府第逾逺家貧不辦遣力有同自絶恩門略其迹而察其心或庶幾乎雅量之兼容也即日炎夏鬱蒸恭惟弭節維藩神明所相鈞候動止萬福竊以宛陵古之重鎮於今輔郡之雄非朝重臣無往均佚茲地是來開府禮則宜之雖然贊相彌綸之才誰踰公者剖符尚爾豈聖時求治意邪衮衣之歸想不逺伊邇也某輒有淺近之說敢薦几格之前嘗謂於民為親莫如守令令職卑賤制不由己為民夏屋惟守能之故自出鎮大臣下至銓補之吏雖官有貴賤其為守郡一也撫字之職寧當有二事哉邇來貴人守藩移於崇髙之習養重絶物比比有之平易近民所未之見責以吐握之事則古今異世矣夫自處太高則下情無復上逹不與物接則於利病何所聞知是故小人得以蒙蔽為姦發政動多過舉人情赴訴無所怨謗之所生使人不以君子之道期之豈惟處已之過民社之寄寧不負所託邪樞相出視六師內顓樞轄待人接物尚乃溫溫其恭以此偃藩謙尊可想而見卷卷之望猶願常以周公自廣戒於諸公之作則下情盡而百事理小人無以阻間於其間矣比年理財諸公設為奉上之說侵漁至於竭澤郡縣習以相髙至民事則緩之殊失所謂奉上理財之意為國深計可為憂之所賴名臣力變澆俗嘗論下苟信服財且不勞而辦居上而能節用此理財之本也即掊斂以充溪壑之用亦何庸窮盡哉某前拜番陽稟目嘗以平居無事可以收拾人才溷瀆聽聞不知果曽達主記否今日廟堂又與前異人情疲於金榖之問則於其他勢不暇講樞相名德兼重夷夏聳服揆之事勢寧久外也在藥籠惟幾多所采納以待他時之用立邦家之基某不勝區區大願如此非公至誠好善某亦何敢忉忉怛怛至於是邪與汪樞使明逺春間使中伏蒙答賜鈞翰如侍函席欣如之何然惟丹丘請違忽復六歲引領墻仞有同川流百折而未嘗不在東也竊聞士夫之論謂所以治宣城者威而不猛和而不流今吏之良己不易見大臣出鎮永有譽者尤為希有孰知政所自出蓋非衆人擬議所到大賢居之固裕如爾非徒下吏私喜社稷為有望焉甚幸甚幸即日仲秋鄉涼恭惟黃閣燕清宜民豈弟天相神佑鈞候動止萬福某樗散之質曽無毫髮所長固已絶意改官夢魂亦所不到蒙恩召對冒榮京秩顧惟學術淺陋而於應對進退尤非所能無以感悟天聰秪增愧惕實王樞公明之舉其為眷憐推挽之賜有所自來矣中心銘感何日忘之然而待次六年典質以濟之官就道承命于行欲進趦趄退固不可不免走介情告政府求終金華之任遂自富春捨舟問道餘杭寄家延陵以就親戚辭不見聽黽勉此來叨竊靦顔厚如重甲蒙恩補縣諸公雖以闕許之然殊無闕可填又須數年之待幸脫選調言之如無厭足矣久貧失祿亦茫然未知糊口之計前此精力盡於作縣其可再乎冒昧居之曠敗無疑矣夙蒙愛憐敢抒胸臆某是來皆荷諸公前席察其人物極一時之選也天下任重要須擎天之力而後可辦王樞雖有大志朝中號為得君以某觀之未必然也王能奮然撥去常俗偷安之計頗及邉防備禦羣吠所怪至以用兵迎合非之微扣其端不為無意於戰某嘗謂以中原為不可復者不明乎古之道以為便可復者不明乎今之勢紀綱未振人才未富孑然孤立人主未相傾信而能勳業成就古未之有國力如是其能濟乎某雖嘗告之言輕終恐無益樞相賔主道洽能為天下發一言乎某比者竊聞力請真祠喜于進退有禮章不再上當有說也衮衣不歸而久居輔郡雖未害於君子之度不若以義命為斷使天下有覩焉仰知道德之存心故敢贊以決也道途之說舊相以憂去者殆將有奪情之命惟今中鼎虛位負物望者無踰樞相乃眷在彼似非人力待命相而後請必恐涉於浮議期於必得而去自無嫌也狂瞽之言惟所財擇浪語集卷二十二
