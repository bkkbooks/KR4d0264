body:
  text: 浪語集卷十二宋薛季宣撰樂府附雜詩古意荷芰藕生蓮每憶中心苦擬掇斷根苗絲結千千縷侯婦歎三首侯婦匡坐歎蕩子新賜册先自薄恩私嬪嬙幾巾幗莫作侯家婦鳲鳩理清瑟幾許白頭人同心綰同室侯婦且勿歎金玉多滿堂蛾眉不讓人當奈薄情郎團扇歌三首田田白團扇輕綃寫蟬雀用之却炎暑生風郎掌握團扇復團扇羞郎引遮面顧景強躊躇隙月雲端見團團白紈扇奉君揮素手餘涼入長夏結交貴經久燕然歌塞上月秋更明銀山蹀躞健馬羣甲光射目開金鱗鏃長飛雨旌填雲轟庭雷鼓聲轔轔柔然之蛇陳囷輪傾河鞭石居逡巡浩歌但來輕比鄰白登豳國公常聞蚩尤久作溟漠君高辛狗食吳將軍羽林弧矢非周身控弦雖多將纍人狼跳鳥擊虛遊魂驕矜一息為微塵梟雛井底蛙彌尊餘殃積惡天公嗔乘障人聞不聞衛青去病迹已陳竇侯乳臭椒房親犂幕庭燕然錯落銘王勳木蘭將軍祠聞周黃岡葺木蘭將軍祠不詳其意讀杜牧之集乃知唐世齊安已祠木蘭用樂府詩考之其關山度若飛之句與今黃之關山偶合不必真在黃也按詩木蘭邊郡女代父征役定在何許黃河黑山政是北伐觀其敘事似燕魏北齊間人名號官稱又頗差異但燕魏北齊實未嘗有可汗之名魏齊勳官未備唐始十二級而天子有天可汗之號如兵帖將軍尚書郎之類皆南北以還官書通語擬樂府詩唐人擬作然其詞意質朴不加藻繢自有邁往不羣之氣真北朝人語也要之古者婦人往往有猛士風烈顧今丈夫曽不如一女子可為扼腕木蘭以一女子勳業不大顯數百年後猶血食江上祠敝而復葺似不偶然感此而作人怯西山種誰知掌上身豬羊刀霍霍車馬道轔轔幕府開娘子旗常紀亂臣夢回清鏡對千古茜裙新車遙遙車遙遙兮路逶迤思夫君兮君今知今安適兮南入楚願為聲兮逐君語君不言兮聲不聞聲何當兮言在君明妃曲闕下烏雲暗黑旗未央高會送將歸天子傳觴從官勸奉春建策至今時上林關鎖多芳菲王嬙困睡花葳㽔中人驚起道宣喚和戎却自拚蛾眉徘回顧景傷春啼秀色誤身生不知工師萬死未足謝丹青始信君難欺寃莫寃兮長别離盟莫渝兮徒自疑氈車未免下宫殿記得當年初入時眉山淡掃雙螺垂擬高門户生光輝姑姊提攜父母送不教含涕登丹墀赭黃有淚濡龍衣此身雖是觸事非風沙萬里少花木龍庭爭看真閼氏言語不通心儘悲琵琶琢就彈哀思君門萬里不易到檀槽撥斷商弦絲窮寒絶塞人蹤稀時有天邊霜鴈飛憑誰説與漢卿相西施莫忘真元龜惜花引七月草四日將旦夢遊廢圃作遺忘數句枕上足成之頗與前年春草曲同意辭旨悽怨殆讖非佳祥走素不曉音調亦不知何章曲也廢圃晨遊舊觀歷歷三徑已荒蕪歌酒地悄悄無人迹為山傾仄支柱皆名石桃李無言為人岑寂早緑暗紅稀春去也歎繁華難覔落花如積誰與東風惜楊叛兒楊婆兒共戲來白門楊栁政依依穩稱暝鴉棲博山爐侈沈煙裊儂心歡緒繆紛擾語含别意泪空流未掩宫闈齊閣曉齊閣曉祇傷悲婆兒殺儂那復相思楊白華楊白華栁眼自生息風傳華落大江東綰毬團絮無多力栁眼落落不可見淡蕩遊絲空萬億由來宫樹未成陰踏歌驚斷喧笳笛秋扇詞少婦織流黃織就中秋月上有乘鸞女肌膚皓氷雪裝成一攜手奉君端暑月感君清涼意薰風為君發落葉下驚秋與君此回訣素質不勝愁從衡網珠結招搖邈煙露青鸞影遼絶有物感君懷騰口知何説分命故應然不是君心别秋空辭秋空淨無瑕耿耿挂明月有人捉月試騰身騰身直上黃金闕黃金宫闕高嵯峨駢頭從目相誰何仙人顧之拍手笑使我言語能多囉言語多囉還有考天公何言固無口秦書趙史欺我哉紫氣充庭是天道通明廣殿凝非雲日月照曜如環循蝦蟇老鴉咨吞啖我欲叱之神羊嗔夢中將謂天難知夢回塵事故依依天大故能成變化覺夢不勞評是非擬古春飛紫燕秋飛鴻雙成阿母長相逢誰家窈窕窺緑忩藕花菡萏清池風璧璫翡翠雙明月寶叉玉釧衣如雪年可四三當有情語音嬌軟疑卿卿天公一笑回金電不似當時不相見相逢狹邪間驅車徑長坊長坊劣容線繚繞狹邪間相逢記君面君家人共知共知不難求朱門揚踈栁虹梁架芳流庭除清且間馳道直以修中堂真壯哉黃户雙蚩頭亭亭丹桂華燦爛明人眸主君三男兒三兒例封侯大兒尹京都中兒相凝旒小兒奉朝請籠街進鳴騶三兒俱來歸青絲控驊騮三兒俱上堂大人百不憂三兒俱入室四座沈煙浮蛾眉盡妖艷三婦不可侔大婦鼓鳴瑟中婦彈箜篌少婦獨凝佇酡顔半嬌羞丈夫且躊躇世有此樂不怨歌行男兒多負心女子良易知琴音和且諧何以得淫思文君慕相如殷勤效于飛不惜鷫鸘裘愁成逺山眉茂陵獨何事為顰效東施興言念疇昔紅淚落如璣彈作白頭吟深心寫琴詩郎聽弦上聲妾志終不移清商感人情兩意亦以非文君獲所願相如悟沉迷寧能已消渴琴臺遂同歸妄欲理絲桐絲桐亮以悲謂言無終極當非長别離艷歌行雍雍雲間鴈南飛北軒翥妯娌幾多人兒夫獨羈旅郎書憑誰寄妾意憑誰語賴有雙鯉魚尺素為懷取歡子今來歸還羞入朱戶告之莫流宕天靜星可數星子何昭昭行不如歸去妾薄命魚生蒲藻中河水以為依傾河竭其波魚藻當何歸妾作君家婦君時尚卑微勤身紝絲纊夜午不下機憫君書愰勞寧教食無薇緝緝兒與女號寒復啼飢憐之小顔色飣餖攣斑衣君登名利場妾喜神欲飛今君位通侯蚩頭建黃扉忍令家人子舉動生光輝妾昔顔如花因君損芳菲君去春無迹澘然淚紅璣自憐承事君為他筋頭肥妾命薄如紙虛牀但歔欷憶昔在家日憨癡弄庭闈爺娘念嬌子深心愛其頎人間愁未知結髮為君妃姑嫜時在堂色養親無違殷勤百憔悴可道才依稀誰言當見君崇高位巍巍君官知漸穹人事覺已非非關君二三妾貌凋寒威恨無長門賦可以使君嘰更長不再眠入户多蛜蝛妾有青綺琴愁來為君揮琴詩無别意黃緑憂裳衣昔作掌上珠今逐駕下騑珠藏不復媚車行在觀旗幸君且留連知音世誠希嵗寒須見梅何花耐漼溰陌上桑羅敷秦氏女皓腕潔如霜寶釧瑳明月領巾疏以長柔桑正沃若采采官路旁使君從南來一見神已傷五馬會且止調之貽翠璫自名良家婦狂夫漢中郎閨門甚修整芝蘭逺芬芳奚為致此語不是邯鄲倡去矣勿復顧風來語流香蕩子踏歸陌駕言割人腸從軍行人道從軍樂我道從軍苦為問何所苦無苦汨沒汝汨沒何可傷政可虜戎王萬里浪馳逐征役未遽央太行汝勿登回復九羊腸黃河汝勿航波流水湯湯胡然棄平生欲往無梯梁夫君且淹留後繼當汝忘長蛇叵復夢南山強深藏我甲豈不堅我馬豈不良人生會有死義死良所傷將軍不汝信談笑成奔亡誰乎幸際會虎服而皮羊之子方丈食何時飽粃粳戚戚復戚戚戚戚復戚戚如此春意闌紅梨褪深暈青梅結微酸向之一悽慘飢腸廢朝飱姮娥五圓缺美人隔雲端衷情叵自禁陡覺衣帶寬芳菲日雕謝動作不遑安咄哉黃栗留接翮語何繁小鳥得于飛而我别所歡夜來風雨惡中唐水漫漫故鄉貧亦好楚客曰南冠男兒志四方愧此栁下官安得買山錢靜處把釣竿高懷未易償歸有道路曼匡坐作遐想心體胡自胖行行大刀頭無生話團欒自君之出矣自君之出矣珠網弦箜篌憔悴損容色晨朝懶梳頭頭上雙爵叉脫髮應難留因心持寄君君還知意不金以表妾心叉能感君眸長安多美人陌巷多高樓君如有兩意持此買名謳妾本侯家女生平不解愁十九為君婦如今幾回秋生兒妾樣長君方逺行遊妾顔益以悴君心日悠悠方諸空有淚圓月難為鉤死灰不復然知君亦行休寄言天地間于以寫我憂石上可種麻今曲石上可生麻麻生豈成畦嫁壻得蕩子猶如太常妻我作少年行長安走新街長安三月春桃李百花開平康諸女兒艷麗驚寒梅蛾眉門連娟佳期不須媒投我以木瓜當歌共傳杯歌聲繫懷抱知君在空閨期我以立春清明未云來應作憶秦郎高樓寄徘徊鸞膠世苦無斷續何當諧閨中儻相憶薰風有時回春蘭有真意春蘭有真意窮居在中谷端不為人香無言自幽獨我家甌浦東筠扉鎖修竹頎然彼粲者夭翹散餘馥五年客異縣對眼囂塵俗百華盡妖艷信美非吾族延陵暫遊豫佳期未云卜同心弗我忘迎人見青目雖微九畹滋風動情亦篤當門謂應鋤吾當為之哭七哀秋風生夕涼吹我東閣帷中有宕子婦清歌寄愁思為問愁何為良人長别離銀釭弔隻影霜雪堅自持君為黃河流妾作月桂枝東西各異道邂逅不可期願為衣下裳結束隨君衣君衣何當披十年守空閨曹植七哀詩託興於夫婦寫其離愁羇思俯仰感切之意所謂七哀也説文選者猥曰子建為漢末征役婦人作以七哀為痛為義為感為怨為耳目聞見為口嘆為鼻酸而哀末學所未詳也因擬詩而知其趣故書鈞天曲清都太皇居窈在冥冥間神光貫中極希微炯非煙紫宸邃以虛綘闕高於天受職徠百靈肅雍朝九寰大饗通明殿張樂玉京山九奏感人心萬舞形物先谷神靄清唱黔嬴撫鳴彈緬彼世間音下俚何㛹娟喧闐響雷鼓蹁蹮舉雲鬟彗字小垂手日月兩彈丸陽春假俶􅋔投霓忽高弦壺矢一笑電歌風發三嘆呼吸成千塵神仙詎長年峩峩帝王都積蘇浮九埏簫韶間猗那鬭蟻蚊雷喧蟲沙與猿鶴等細不足言遺音寄五栁海山學成連欸乃歌欸乃曲名見元次山集讀如襖靄栁子厚集字作欸乃見劉言史瀟湘詩曰曖乃知從何處生當時泣舜斷腸聲音復不同今名從次山詩從言史欸乃兮江湘繚兮繞兮衡之陽龍衣兮黼裳帝何之兮陟方我不見兮攪我心腸欸乃兮蒼梧杳兮渺兮逺隔重湖龍駕兮鸞車帝何之兮升遐我不見兮泣涕漣洳雲夢兮漪淪欸兮乃兮岣嶁峋青天兮白雲帝何之兮上賔我不見兮戚此下民菊冬榮時乎時乎去去如車轂之運行瞥然過目無留停追隨無及不我待東籬菊花無耗迤邐直到陽冬始敷榮落落離離礧蔓衍布丘坂碧為之葉紫其莖爭妍騁媚芬芳吐如金如玉之繁英含霜萬顆好顔色節雖可尚時難并惟重陽日月二九之嘉會此時抱一符乾真年年閭里交相慶賔朋相將相喚攜手登高陵采茱插鬢欵終日揉挪碎蘂滿盞浮醁醽乃今候遲閏冬孟其如金烏自飛䨲走黃華從此後期拆枉教陶令舒手望穿兩眼睛殊不見甲茁與芽萌花誠細事足多惜時良不遇令我傷衷情聖王作應五百嵗文昌殁既三千齡中間賢君苦無輔唐宗世民周宗榮孔子無位皆汲汲到頭畢竟嗟無成應如此花時來不吐穎過期無用還叢生叢生失時又無用蹉跎畢世空冥冥吁嗟後聖不時作使人雨淚氛零零不如及花開香醪但時傾莫教花瘁後有辜負花名樓上曲樓頭月白良夜深美人睡起搊胡琴咿嚘怨抑如誠訴四弦了不諧琴音推琴慿欄歌一曲為聲不成氣不續和愁擁靣歸錦帷曲肱展轉愁相屬牀前蠟燭光熒熒乍明乍滅如參星卷衾起來問高燭能知妾意還不能燭如不解人深意如何伴妾長垂淚澄思微物本無情有懷觸目皆傷志眠來復坐坐復眠不交兩睫時澘然自復命薄多離恨春霄鎮長遲曙天親知問得郎書不低頭無言墮紅雨遲回拭淚強為容不成一語愁還主何人逺自日邊歸殷勤為問郎歸期待得郎歸與俱隱不教被劾緣蛾眉武陵行秦君植木咸陽市秦民血作東流水秦風薄惡法秋荼秦郊行人半無趾祖龍虎視吞六雄漆城隱隱陵雲起驪山罷休營阿房匹夫奮臂為侯王重瞳隆凖騁逐鹿非冬積白何雪霜至人知幾忍徒死競遵大路逃彼方從兹不復通上國不知戈鋋不見德耕田鑿井自希夷安居守分無餘職抱孫養子樂天年羲皇何逺今其域自從别祖來避秦無文不記幾世人曹劉典午任強弱歷年六百何紛紜山中既絶中原路從更百代猶無聞武陵野人事漁釣獨遊沅溪忘故道泝流探得桃花源舍舟洞口窮幽討洞中逸民欣見之共嗟遺事詢其老為言上世絶塵由殺雞命酒爭獻酬具聞宇內戰爭事始知違俗為優遊鄙夫何知尚懷土忩忩須别還中州塵心已萌淳朴散桃源咫尺仙凡判還求不得曰仙鄉寧知死生無少間相望如隔一世間到今沅山色蒼蒼流水淹淹花泛泛貴遊行沙堤大蓋何穹窿底人佩玉鞍蒙狨傔如熊虎馬遊龍誰何出入咸陽宫笑刀瓠體顔芙蓉步趨持重為雍容諸侯爰統掌百工調元為職裨九重萬錢一食聲鼓鐘猶言下筯終無從異時粳噉腸不充家徒壁立其室蓬抄撮語麗文雕蟲繪為繡句欺南宫不分菽麥疇知儂且無萬卷澆胸中脂韋媕婀陳小忠竭民膏髓自為功榻前觸事惟迎逢肯思責難始為恭君王謂賢拜三公門如沸湯賄賂通財侔縣官邑侯封積金猶欲齊灊崈家有錢爐非範銅賣官鬻獄揚成風後房的爍燕支紅皆民女婦來無蹤有憂失得常忡忡殺賢賊能摧英雄汲將同類塞要衝害苗之心饒蝗螽忽彎射羿逢蒙弓怡然自得豁心胸黯如抹漆何赤衷向人自欺吒匪躬高自標置人盲聾言立便擬稱儒宗學襌逃俗坐談空元非友朋相磨礱世間將謂無軻雄言出波流士與農却矜巧宦官既穹笑伊魯儒嗟道窮那知達人節青松視而土苴及蛆蟲古今異時理道同姦邪未必皆令終君不見晉朝失國隳金墉為奴為胔豈惟懷愍巡北戎夢仙謠長城役罷驪山起秦人斷念還居里一呼或化為侯王避之却是神仙子漢家宫殿生荆棘桃源樹樹長春色花香破鼻桃離離只在人間人不知夢中有客曽一到屋室衣裳殊草草狗彘雞豚還治生若度流年不知老南華砎壁連天起人家庭户多流水紅碧夭桃百種花不似几間錦和綺仙人容貌間且都居處雖貧樂有餘老子桃紅入雙臉皤然只有銀為鬚仙家女兒多茜衣桃花宜面葉宜眉離宫茅舍略相似别有麗譙旋為題仙君名氏猶屬秦許由往往陪遊人老人石上問行客傳今幾世秦之君為言天下方南北秦鹿千齡經人得嗟説來時桃始華桃子而今未成核祖龍往日親曽見六合連兵事攻戰北城紫塞南陸梁傾資未足供輸挽誠知黔首無聊生側目有誅正視刑剖心不獨商王受當時論殺諸儒生我本何辜一何幸避役離鄉共亡命石髓藥苗聊解飢經年陡覺儕仙聖訊今丞相胡為者振古如今同土苴驚起城頭角調哀頓覺令人小天下秦政求仙徒爾為避秦役夫能至之還知道可無心得學道有心無乃癡事異於桃花源記者皆夢中聞見爾陶潛伍安貧記黃道真誤入桃花源事世傳以為仙或曰非也近人有夢遊仍反者道所聞見為作夢仙謠乾道三年孟秋幾望翼日記谷里章上有青山下有滄洲步有回波面有紅流吞吐風雲呼吸觜昴審能處之可銷憂退谷中人帶笭箵山中繚繞茅舍旁寒泉之流激琅琅雙石西峯我在東無情鈎加此漫郎性情荒浪氣志剛東鄰之人揮鈎車胎鰾孤浪屋加鈎綸相投不遑舍聱齖會懾歸吾家我蓑我笠聊自娛沒溺愧彼鄰舍漁沙門招提宅谷西金仙宫殿雲漢齊撞鐘擊磬禮耶毗子欲詣之持清齋箇中有人坐無為飢餐困眠氣答酡撫掌怡然笑呵呵吾昏將奈此子何漫歌八曲音清泠風高水寒三歎聲勿哦大洞修黃庭谷中之樂實難名長江北來樊水流東樊山水曲大回中倏倏之魚泳汕洋鈎舟漁人鼓鳴榔浩歌一闋清滄浪終焉無求漫相忘大江之東叢石起谽谺聚石江鳴水小回中間浪不惡釣臺嵯峨瞰城郭去來客船是中泊漫成二闋回中曲豪人仲謀當漢衰建安之際鼎祚移江淮萬里吳帝之冕旒十二龍卷垂輅車華蓋日月旗荒墟之中不可求宫室故處春草青長刀大劒可治生我先田老相次耕大夫勸相歌三成江北洲西陽國蕪城桑柘彌阡陌婦可力蠶身力穡四歌不用愁衣食一元大武牽何之良田附郭吳東陲牧童田父麻單衣叔間修治木駃騠從吾真者真吾兒西陽罷田飽飯嘻五歌六歌神自怡李甥叔靜蕩兩槳弱翁將船欲安往大回小回間釣魚送客便擬酣醺如酒徒之誚謾浪名世俗交加漫不聽行無惡客相逢迎醉歌七終將八成杯樽壞湖上壞亭浪翁杯飲醉少醒嬉然自打舴艋行菰蒲芰荷出青萍仰天大笑風泠泠壞湖西南為退谷夀藤纍纍縈夀木涓泉奔注匯樊曲醉耳琤瑽亂鳴玉城中友生綰銅墨身備四殊攸好德窪樽日醉主與客挾以石門天地窄壞湖退谷人好遊可厭之類仍所羞忽焉草木成高丘此遊此泛生幽憂淵明之風繼者誰士源孟子接武來嚴霜皓雪春風熙倒置日月寒溫移來遊者子充良知子能得之可勿疑此道不迂不回遹子能識之可遊佚勉強行之今是古谷中之人君踵武狂生作此谷里章意追浪叟俱相羊松風颼飀蘭草香與君夀考終不忘雜詩東坡東坡思古也江之廣矣一葉航斯東坡逺矣企而望斯彼草蒙茸翳于雪堂決決濫泉橋亦云亡人知其名我懷允實崔嵬者山有環彼室江之廣矣跋而倣佛攸哉攸哉如泉流以出我思古人寥其久矣文如爾矣我心起矣雪堂之圮矣曷為其止矣人之匪矣若其已矣我之鄰斯一江之巨我之來斯忽其如寓有懷北堂頽如以仆相彼道人隻眼之獨具道人守雪堂者善風鑒常以隻眼自誇淵魚淵魚自悼也躍躍淵魚言泉之涸有束樊籠既幽其鶴眷言懷之翰飛戾天薄言存之泳于重泉蹙蹙何嗟靡生靡活胥失其倫上下靡所察視其淺矣宛轉于泥就其幽矣安處于棲匪我之云為何適何歸曰有虞衡莫我肯知亦莫我肯悲父母何其嗚呼蒼天蓋亦勿思尾魚既頳鶴樊既鳴孰聽其聲孰視其形豈無高天翺翔靡路豈無重泉戢戢靡寓洋洋者魚惟淵之實鶴飛于九霄時豈籠中物誠臺瓦鼓詩瓦鼓樂有稱也瓦鼓垖垖置之誠臺誠臺有稱不革不銅不尚其􅣨自天之性天性如之何至質無華有稱如之何埏埴無加誠哉誠哉其儀孔嘉瓦鼓垖垖誠臺之上崇基有塽可據而居可憑而望湯其泱漭瓦鼓之垖然稱臺址之隤然抱峯崿之巍然誠哉誠哉紛會意之颸然瓦鼓垖垖誠臺之下筠鄉有楚掃地而居修竹猗猗垖其反古五畝之竹兮彼垖者鼓在彼墺兮在彼墺兮稱此麓兮誠哉誠哉會我獨兮瓦鼓垖垖在彼青林有象無音稱臺觀之嶔岑稱筠竹之清陰樂稱走之誠心豈無胡牀可將可坐豈無鼖鼗可嗚可播可垖鼓以無和誠哉誠哉不加其埵端午寒溪早出雲天鴻濛煙蘿冥密寒溪線繞荆江壁出竹徑晨遊露風䫻飄有懷碩人逺在清汨不競流芳眷此誠一道存語外泓潭納日形模比楖滉如日室萬派瓜分無往弗徹吾心憒焉莫可致詰志事八月九日作我生之辰六月甲戌師伯清塵羲和納日粵有氛祲南自篳門輪囷扶疏英如白雲高減儲胥來循軌道面阻清池岐分繚繞玦如隄立不即我庭直建于房視左為榮載明載滅載高載卑甲夜籌三侵尋以微外户如之何秋空澄霽庭內如之何靜無纎曀我門我籞豈伊異人何吉何凶祥讖誰詢發書占之日音受徵公正司辰廉真變起時維寬大斗建移申律中參陽干庚嵗寅庚刑甲祿三合離鄉王墓加臨金剛火強白維王氣金方火死從革之占庶乎近止我非瞽史詎易談天禍福由人無論未然眷言常度時曰休祥尚疑白眚為沴為殃皇天降異豈緣微物霆擊飛霜其何能忽我顧休明闕然靦汗可無大戾天為謫見妖星垂象尚克隕之酒血紅杯亦既泯之卭綰陰誅尚容改悔變見之來庶無大罪皇天降威謂我修省夕之朝之敢忘申警戰戰兢兢念此天變蔚炳如之何無思革面浪語集卷十二
