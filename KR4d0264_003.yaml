body:
  text: 浪語集巻三宋薛季宣撰賦種竹賦沔鄂之都牙堂之背久廢弗治汙萊有穢徙脩竹而蒔焉地不改闢堂不改舊蕭蕭然鬱鬱然不改時而有拂雲之意矣方其竹之始生自彼空谷頎然而脩猗然而緑葉秀卿雲雲興翠筠直節虚中羌來細風春生凜冬森然萬叢及其應人而出樹之庭陛脩直依然不回不易葳蕤之態困頓美人之春睡灑落之韻謫仙頺乎其尚醉清飈時來振葉凌柯積翠招搖瀟洒交加夜風洌掲朦朧素月瑣碎兮清隂横斜兮錯節吾不知前日之蒼涼與如今之煩熱也若乃天旻得助繁隂變暑䕃之以油雲沐之以時雨翠幹盤根安安爾所稚子承承方流振古斯又類物之攸裁固非人之所處也至若淵明之秫潘岳之花好樂不齊咸宜厥家至人遐觀匪同匪異沈酗清芬各従爾志則夫是竹之清風斯子猷之逺致也大榕賦越甌而南嶺山東麓有七閩之㑹焉厥都維福福都中閩城山塹水脩逵孔直麗譙南指粤有喬木根乎此堂青蔥映帶經五門而之合江夾經途者凡十餘五里其為根也盤桓詰曲勢浮平陸隠邱陵斡坤軸如山如坻崟岑蔽虧列岫竒峯幻然黙為蜿蜒糾紛虵蟠鹿犇巻舒連鬈油如出雲樹無全株萬本同植縈連擁腫鑚堅露隙疇引疇縁自陵空碧和氣鬱贅疣生衆醜備百怪形岌如神山冬無落木蒼蒼九夏森其翠幄枝柯離欹横従出竒翕如其合判如其離嗟如其往歘如其來夭蟜驪龍摩天切空雛翼雲垂扶搖下風輪菌無心隨之有本孔綜根元誰分混沌軒然而大厦成蚴然而恠螭怒駢爪紛拏矗其八柱飛鳥千羣而咸棲有所綢繆束薪不堪以火盤根錯節而摧斤缺斧其圓也不中乎規其方也不成乎矩樵夫視而弗斯大匠行而弗顧以無堪而保其天斯所以邇乎人而夀莫之數也若夫景升之牛主人之鴈不善其鳴服箱孔屯以不才而烹者何哉蓋豐肌而蠧夫人之芻豢也斯榕木則不然承天之施得生於地不假乎人不離乎類不以直節為髙不以孤生為異凌寒而不改其操連理而不稱其瑞無庸而庸無尚焉為其全虚愚之義也至於交柯旁薄分根合枝異生同命縈繚相維倚天成蓋蔽野成帷迷雲而零雨不下畏日而炎天改色邑人之依行人之得不才而才無似焉斯其為大通之徳也夫惟有大通之徳全虚愚之義守不才之位處無庸之地為物而物莫之陵比人而人適當其意其事也無施其生乃克遂是生乎通邑大都之間尚亦躐千齡而幾萬嵗也走嘗聞諸西方之書曰尼俱律陀之木其子芥三之一及其成材䕃車將五百乘斯榕木者不幾於是乎今夫閩中之木榕為大其萌也微物莫之害有蕞其芽蓊然天蓋走不知命之者誰邪庸㠯劣其形而不文其内劣無文於内將或容於外而以成其大鴈蕩山賦走家東甌有祠祭田在鴈蕩山下行年三十而未之到隆興初赴調因取途焉愛其巖谷秀異無虞無録莫之能名念其山水竒甲天下而未有文賦欲賦之未可也歸得建炎間郡丞謝君升俊山圖石本字多漫滅已而得樂清洪丞蕆所鑱新圖并賦嵗正月望始得皇祐校書即章君望之山記又假舊圖於葉氏以補圖缺於是圖籍大備顧皆叙次疎闊洪賦工矣而猶有未盡故為集畧成賦得而覆甕誠何望於左思擲地有聲信多慙於孫綽聊依凖實寄意山泉云爾溟渤轉乎東南鴈蕩嵬其髙峙抱層巒之四合聳羣峰之崛起仙凡道絶類隔一塵摩空下望儼若屯雲聊登臨以寄傲循石磴之縈紆移顧步於觀瞻瞥風氣之懸殊幽谷之中别有天地玉筍排空而剡翠瓊館慿虚而綺麗微埃不入其方寸纎土不留其度内峰夏雲之競秀均倚劔於空同崢萬仭之嵯峨羅巧妙之巃嵸章望之鴈蕩山記舉山無崖凡山有名號者蓋純石土山不與焉沈存中筆談鴈蕩諸峰皆峭峻險怪上聳千尺穹崖巨谷不類他山皆包在谷中自嶺外望之都無所見至谷中則森然干霄粤若遂初天愛其道靈山祕秀孰知其寳傳西域之仙書肇棲神於羅漢西域書阿羅漢諾矩羅居震旦東南大海際鴈蕩山芙蓉峰龍湫睠人寰之緬邈極希夷之汙漫偏為幽獨蓋始得於唐僧之詠㸔之不足此樵翁為之浩歎者也唐僧缺其名尋佳山水得鴈蕩山而稱歎負薪老人遇而笑曰我一生㸔山意不自足師果何所見而歎邪僧作詩曰天下名山曽過目無如此地偏幽獨路傍逢一白頭翁自道此生㸔不足我國家太平興國之二祀天下車書始同有禪師曰全了菴廬初結於芙蓉初全了辭師出逰師曰汝緣在淛東當得名山居之山上有鳥山下有花全了抵芙蓉問其山曰鴈蕩曰此諾矩羅之居也築菴曰芙蓉以處今為能仁寺行亮文吉踵於前甄昻作尉從而後靈巖碧霄㠝岏而並露南閤白巖孱顔之盡剖起初凡七十又三年而後隴㫁之不遺蓋成終於皇祐之己丑記太平興國二年丁丑僧全了始居山之淺者曰芙蓉今承天寺是也至己夘僧行亮神服居山之深者今靈巖寺安禪谷是也天聖九年辛未僧文吉得山之盡東而居者曰碧霄菴今靈峰院是也於是有民居矣皇祐元年己丑縣尉甄昻乃發蕩隂山水南閤地是也由丁丑至皇祐之己丑七十二年白巖寺名在此閤稱始開於祥符之伐木者故適當其㑹謂遷就於貫休之詩者見不臻乎首僧貫休諾矩羅賛鴈蕩經行雲漠漠龍湫宴坐雨濛濛是知水鑿之為睫論其又何知造化成功之不有筆談鴈蕩山天下竒秀然自古圖牒未嘗有言者祥符中因造玉清宫伐木取材方有人見之南有芙蓉峰下有芙蓉驛前瞰大海然未知鴈蕩龍湫所在後因伐木見山頂大池相傳以為鴈蕩下有二潭水以為龍湫又有經行峽宴坐峰皆後人以貫休詩名之也謝靈運為永嘉守凡永嘉山水逰歴殆遍獨不言此山蓋當時未有鴈蕩之名予觀此山當是谷中大水衝激沙土盡去惟巨石巋然挺立耳如大小龍湫水簾初月谷之類皆是水鑿之穴自下望之則高巖峭壁從上觀之適與地平以至諸峰之頂亦低於山頂之地面世間溝壑中水鑿之處皆有植土龕巖亦此類耳既非挺出地上則為深谷林莽所蔽故古人未見靈運所不至理不足怪也沈括謂謝康樂時未有鴈蕩之名是也按康樂逰名山志神子溪南山與七里山分流去斤竹澗数里故其集有従斤竹澗越嶺溪行詩今斤竹澗謝公嶺具在不得言謝所未至特未覩其䆳爾乃其東望秀嶺道屬天台山川襟帶於四明風雲呼噏於㑹稽無非僊人三乘窟之宅誰能見其一日而數相往來其西則蓋竹雲門白巖白鶴魔軍退舍而真宅斯建至神入竹而誠明可作洞天髙逺以誰訊福地潛通而叵度隂有楠溪其陽際海斡地軸之磐踞望天涯之斯在崖有千里之石壑有萬年之松金雀么而不大金猿線而多茸樂官羣處而和聲山羊歴險而純素若夫王孫麖麂鷹鸇烏鵲衆獸常禽之類他山既多有之兹故不詳其名數記有禽黄色而差小者謂之金雀禽有羣鳴而聲相抑揚者謂之山樂官有獸如鹿大健而能歴險謂之山羊白者如雪猿有毛而狨謂之金線此鳥獸之異者也山之狀也崇倚青天峻連霄碧凌霞傑出於疎雲疊嶂牽聫於紫極工如大巧特若小髙三巨相形而岝㠋獨秀孤立而㟼瑞星明而治世皆見霹靂轟而瞶者不聞常雲舒而莫巻白雨霽而猶雰牛女従橋而星河可度雷張望氣而龍泉可得璧月懸空而夜夜長滿朝陽薄暮而光明烜赫貫香珠之落落起祥雲之疊疊玉峰髙並於兩巒利孔開通於雙宂積翠合於拾羽之衆紫微居而衆星拱列觀架海之騰波浩浩望平霞之火炎烈烈倚天碧霄凌霞疎雲紫極大巧小髙三巨獨秀常雲香珠祥雲起雲兩巒雙巒雙峰雙宂積翠合翠架海皆峰名連霄疊疊朝陽平霞皆嶂名翠微紫微皆山名瑞星霹靂白雨騰波火炎皆巖名騰波亦曰藤布火炎亦曰火熖千里龍泉皆石名星河橋名萬年松名碧月菴名凡名號皆据記及謝升俊山圖洪蕆新圖并賦兼聞見云苞有菡萏菌有靈芝立筍圓而削玉丹桂茂而欒枝蓮花分拆而木末可采圓蘿糾結而鱗比相差菡萏靈芝立筍削玉丹桂蓮花圓蘿皆峰名亦有石名圓蘿者其於人也總者為角直者如指圓者如臍礪者如齒佛掌髙而頂可摩神迹巨而武可履詣方丈而問維摩之居士行妙髙而見香嚴之童子龕巧合於佛影樹有同於僧寳五通變化之有靈三清逍遙而適道天下朝祭而明堂斯在西真翔集而瓊臺莫訪對人道術之相忘招賢仁義之為尚尋朝賢之舊隠得侍即之菴居觀音行而隨形示現羅漢逰而飛錫騰虛三傑際風雲之㑹七賢従竹林之下五老來兮書籍校千聖㑹兮徳星聚朝天義重於尊君抱兒愛均於慈母爾乃展旗障日立㦸排雲彎弓飲羽長劔倚天射垜逺而破的馬鞍跨而絶塵文筆擅塲於文㑹戴仁踐履於安仁寳印得之而如斗金鼎負之而調羮鼓槖籥而布化鳴鍾子而振聲碑磨崖而没字鏡無心而鑑形乃有琢雙玉獻連珠咀文英讀靈書對棋枰舉覆盂振藥杵火茶爐盍簮加導於仙冠折角尚賢於巾子藏珠媚而淵水不涸爐藥就而羽人不死行道周遭於石佛栖貞髙蹈於迎雲空洞虚而無物雲霧合而神興總角礪齒佛掌香嚴雙童童子五靈三清逍遙天王瓊臺西真對人招賢朝賢七賢朝天抱兒展旗立㦸長劔射垜文筆卓筆戴仁寳印石印金鼎鐘子石碑琢玉獻珠連珠覆盂藥杵石杵茶爐寳簮冠簮仙冠寳冠天冠巾子藥爐石佛迎雲皆峰名礪齒亦曰蠣齒對人亦曰雙人戴仁亦曰對人天王亦曰神王又有影曰神王影排雲嶂名侍即羅漢千聖文㑹橐籥文英讀書羽人空洞覆鍾皆巖名石指石臍石龕石明堂石觀音石羅漢石印石碑石鏡石棊盤居士僧寳三傑飲羽安仁行道皆石名羅漢五通五靈雲霧皆洞名仙人羅漢皆壇名維摩室名又羅漢閤名石碑崖名藏珠谷名五老臺名馬鞍嶺名神迹巨人迹也佛影石蓋龕石有影類佛云郛有石城度有石梁入有天門窺有天牕有堂有室有斛有倉旌有石表蓋有板藏門樓髙屹以超雲嶤闕對峙以迎陽澡身莫便於浴室脩道何樂於禪床考室而柱金矗立蔽風而翠屏是陳版障駢而可隠行廊脩而可循石門石表版藏石屏迎陽板障超雲皆峰名紫翠屏翠微屏皆山名石城東石梁西石梁石天窓石室石斛石倉石門大石門小石門石門樓石禪床石屏石屏風大石屏小石屏石行廊皆石名柱金巖名東嶤闕西嶤闕闕名亦曰堯窟浴室室名天門菴名像有獅子鹿影靈龜鯽魚三燕頡頏而穿幕戯龍驤攫而含珠飛羣鳯之徘徊戯雙獅之矍鑠猴不可以加冠魚有時而登陸羚羊挂角以棲止回鸞騫翥以翺翔犬以警而司門猫以㳺而在堂龍倦㳺而或卧虎以蹲而更伏御火共施於鴟尾照水孰然於犀角獅子鹿影靈龜石龜伏龜龜子鯽魚三燕石燕含珠回鸞雙鸞石犬猫兒卧龍龍逰虎蹲石虎伏虎犀角石犀靈犀皆峰名又羣鳯卧龍戯龍龍逰皆山名飛鳯鳯皇小鳯皇皆巖名石獼猴石魚鴟尾伏虎虎蹲皆石名羚羊洞名戯獅子雙石對峙如猊也天柱之峰上凌空碧其旁無附其趾無蹠削貞珉而介出崇髙切於青雲圓度於規直中於緡望之者目極倚之者驚神疑共工氏之不作不周未觸而今存此峰巒之峉立者餘蓋不得而縷陳彼有同名而不相似者於彼吾又何言天柱峰有二大天柱小天柱也其水則二龍之湫東瀑西瀑合掌摩訶劔鋒乳酪水簾眩日以舒耀新月弓彎而出谷清涼之滴滴無已照膽之澄泓可矚彼潭之泳者湖鰻或澗而流之斤竹決而下也銀河㵼而垂練委而去也錦文鮮而清淥觸潜虬而聲韻鸞和漱堆埼而皴如皺玉委蛇而動行乎巖石之間者何容窮盡又豈祗清溪之幾曲也大龍湫小龍湫東瀑布西瀑布皆水名合掌摩訶劔鋒甘乳清涼滴滴皆泉名水簾新月皆谷名照膽溪名湖鰻洞名斤竹澗名泉流之冠大者龍湫崖犇如仆氣凜如秋界青山而澎湃吸蕩水之宗流上擬青空下臨無地霏霺雨霧之飄㪚晃朗白虹之下墜乍垂雲而零露怳山崩而川至雖淮流破荆山之堰曾不足以言其彷彿衆水之淵發源鴈蕩厲巍巒之駿極浸山椒之脩廣箴竹叢生以蒙翳娑羅挺榦以駢羅征鴻攸聚牡礪生之浮鐡船之蕩漾沈古鐘之逸響記鴻鴈以時而集故以名上多娑羅樹大箴竹案牡蠣鐡船古鐡鐘皆蕩中所有蓋父老所傳云派旁泄之崩波羌不以五水九旱而為之消長傳或謂滄海此遺波焉今固莫詳於既往矣記叙水源蕩水南出為大龍湫南東㑹於天柱飛泉水流東為照膽溪㑹羅漢院水南入斤竹澗入於海大龍湫分流而下過石門西凌雲之寳冠古塔水為長徼原南入於海石城之東其水東流㑹小龍湫淨名水入水簾回峰水南為白溪入於海靈巖之隂其水由真濟㑹靈峰及西北五里寳月菴之水南流於溪西㑹白溪入於海蕩水北出為新溪㑹寒坑泄上大溪又㑹湖南坑版藏二大溪東南入於海乃若浮圖天成古塔神造香爐既設寳幢載好楞嚴飜大乘之典寳陁襲白衣之號髙僧梵唄之相和仁祠金碧之相耀惟兹華頂花壇是陟居者有積行者有食山中故事逰人皆傳食僧舍無芸仙者之田每駐逰人之屐然雖曠世而彌年猶未覩周逰而涉歴者也古塔香爐華頂駐履皆峰名寳陁楞嚴皆巖名寳幢石名花壇亦名羅漢壇仙人芸田在北閤爾乃樂成首路東騖幽尋絶白沙之古塞陟峭嶺之芳林秣馬於芙蓉之驛驅車於長徼之原招提寳塔屏障横焉千巖萬壑是途伊始扶笻竹以自杖屐登山而後齒於是竒巒卓犖怪岫峥􅗆傍顧而塵慮都息商羊而油然意生記載逰山由歴為詳今存之其不見於記者益之記山去縣七十里而遙越白沙武缺芳林三嶺達芙蓉驛逾姚嶴嶺過長徼原至山之古塔菴凡菴皆僧廬也石達之峰有連珠靈犀獅子仙冠立㦸石表其巖羽人其石招賢按今菴皆為院院有古塔石屏版嶂峰登寳冠之蘭若跨飛瀑之脩梁引仙簮而峩首裛燻爐之裊香前眺諸峰崒焉亭直記入東北十三里至寳冠菴以巖名其峰寳簮招賢其水瀑布其泉清涼漏巖而下又有石梁石鏡案香爐峰在瀑布西揖雙人而問道屆凌雲而一息九龍垂頭而來下梅霖飄灑以雰零洗余心之宿絫拂襟袖之泠泠望銜珠而返顧跨㐲虎於石門記東三里至凌雲菴以峰名含珠朝陽合翠芝草大石門天柱梅雨雙人雙人峰相並也今按梅雨巖名九龍頭石名記東二里至石門院其峰天冠㐲虎五靈雙穴其巖寳陁其嶂連霄按石門院以門名里連霄之十五窺蕩水之靈源凝神寓目千里為近羣玉浮天全乎一瞬記出石門院西北過石象登連霄十五里而遙蕩頂大泉渚焉此山之甚髙目處而羣山層列於左右前後僧云五十里者多辭云四望而及達必千里度東岡之桐嶺禮化士於雙巒記石門東五里至羅漢院其峰童子文英石龜及兩巒其嶂朝陽連雲其石連生於山腰長覆其下曰石行廊按圖石羅漢在焉指游龍與戯鳯鏡三京而膽寒樂清縣圖經鴈蕩山三京灣按隋圖經云溪清如鏡無所不容黷之不濁唐刺吏張又新有詩今名照膽溪云大屏之下寺曰能仁四溪交流竝湊天門舞羣鳯之垂天儼華陽之挺立吞衆壑以朝宗拱萬山之環揖是雖竒峭無多焉故已冠峰巒之嶪岌也羊腸回於六八俯在下之蕖山羌有鳥而有花悟達士之微言四十八盤嶺望芙蓉山其嶂磐錯如蓮華回巒之嶂隠若金城漢唐道隔言訒天升惟隠顯之有時殆匪由於人力何先古之神閟湏後來之刔剔記東北四里至天承寺其寺前之峰聳如卓筆曰戴仁寺西曰棲鳯山又東南隅二峰𤣥沓如屏曰華陽西南一山回合若城曰回巒嶂東北一山勢若龍㳺曰戯龍北應紫極常雲西北山曰羣鳯皆連揖相望如敷蓮環合前溪有大石柱二相向若筍曰石門下一里有龍潭二照膽溪夾道西流西南一水又正南一水㑹於寺右前流翠雲亭西北一水流寺之左㑹照膽溪流石門龍潭斤竹澗是以九峰四水叢聚之地謂山之宗始云載旋余步溪滸攸行小柱華嚴接阜連岡躐曽巖之鹿苑窮逶邐之淵泉屏彩翠之蒼蔥聽天樂之喧闐仰大龍之懸水飛小雨之濛濛樂尊者之優游得従容於下風記西北二里至普明菴西渡溪而入北至天柱菴山曰紫微至華嚴院峰曰陵霞北至瑞鹿菴以巖名其峰獅子石碑圓羅立筍削玉其山大者曰翠微屏其石䲭尾凡三菴相去皆二百步而近案瑞鹿院前僧道親遇老人得龍夀丹之地記瑞鹿西一里谷曰大龍湫瀑布下流百丈而入於湫天樂宴坐香爐三峰在南案湫上今有尊者菴指普明而回御探龍窟於飛泉記普明折北六里至飛泉菴有泉自巖飛而下為西龍潭有山中㫁曰小石門勒馬鞍而東之望竒峰之隠天觀音大士如住虚空漠漠行雲誰尋舊蹤記東北三里至石城嶺嶺東北三里而長下嶺道二百步有峽曰經行北入十里兩山壁立以相向如門闕其石色黄其中峰巒秀抜有溪泉瀑布經行之東其峰筍石茶爐其巖白雨又有卧龍山其石虎蹲覆盂按石城即馬鞍嶺也北望長雲巾子諸峰觀音巖等歴歴明甚安禪之谷萬崿宗焉大筆書空一柱擎天重樓峻傑以連甍雙闕當途以相向天聪玲瓏其四達自在慈悲而有像龍蜿蜒而歸洞離小湫而曳擁在定之熏聞鼻凹窪而出涕奮天然之鱗鬛回𤣥造之頭顱諒兹山之多怪猶斯巖之匪如記嶺行八里至靈巖寺所倚之山曰石屏風其峰天柱獨秀寳印招賢師子卓筆其闕伏龜重樓雙峰其巖橐籥金柱石書神迹楞嚴龍泉文㑹礪齒火熖其嶂平霞其崖石碑其湫小龍其石僧寳其洞天聪羅漢其谷安禪藏珠其泉合掌摩訶又有石城石明堂石魚石倉石斛石龍西石橋按龍鼻又有石觀音摩虎口以東逝瞻石神而近止訪浄名於丈室挹乳泉而一洗乃觀初月乃下虚簾蛟人織素近在危簷記東二里道北山缺而穴者三相去百步曰宴坐巖虎口巖石龕其嶂排雲在道南其峰大巧在道北東二山相對道出兩間曰石門峰東三里至净名菴其峰天冠後三峰曰縂角金鼎蓮花石神迎陽其名居士西小石屏其谷水簾新月簾狀谷也按圖有甘乳泉閲靈峰之景物竒特亞於靈巖犀黒闇而通天龍神游而處潭五雲閣道應貞矯矯谷有靈珠歘生芝草入㑹賢之硿洞仰虚室之谽谺信貞如之可學烹乳茗而生葩記又三里至回峰菴嶂曰疊疊谷曰靈珠以泉名也又東三里二山之間至靈峰院西方山曰大小石屏嶂曰凌雲其峰最髙者碧霄五雲者以數言其下蓋五老臺云倚天鳯皇超雲丹桂香爐朝天其下有白雲菴藥杵戯獅子石犀架海朝陽靈芝靈龜雙巒其巖西真神王石臍脩道赤石巾子侍即騰波其洞龍逰羅漢其壇曰花亦曰羅漢其谷㑹賢其石飲羽觀音合珠亦曰神王又有龍潭石獼猴石浮圖星河橋石室按圖有羅漢閣今羅漢洞烹茶往往如花乳金掌髙呈亭亭空際訪三賢而景行遂回車於真濟記靈峰之隂一里有峰曰佛掌因其下穴而為菴與疎雲面屏三賢小髙蒸蒸玉闕而七其巖逼曰隠真又山曰紫翠屏西北四里至真濟菴十里而西有石門樓按今惟佛掌闕菴如故過胡公之棲宅記侍即巖為胡兵部居之遵靈運之迷途記靈峰東一里謝公嶺山之東盡於此矣王十朋白巖院佛殿記謝靈運蠟屐逰山而不知有鴈蕩至此而返造石室於東梁髙禮佛之勤渠記嶺行一里石梁菴因梁而名按石梁後有石室前對禮佛峰新舊圖所謂石佛也亭白若而下道窮二閤於蕩隂忘㪚漫之岡巒蓀無隠於追尋北有白巖石溪九折山橋跨焉巉巖影絶斯蓋水之竒也履芝田而種玉煉爐火以飛霞羌仙人之不反厭時俗之嚻譁過湖坑於南閤峩土藏之孤髙壯瀑水之滂流訪仙隠而遊遨記東南三里至白若驛西北十里外有南北閤二村相去十五里南閤西十五里有院曰崇徳北閤西北一里有院曰白巖相去十里而遙衆山中惟板藏土多石少在南閤西七里蕩隂之最髙也崇徳南三里湖南坑蓋山之罅接蕩三里髙泉㵼下大龍潭在焉其瀑布為最大有隠仙巖蓮花寳幢四照蓋大石相倚也寒坑泄去北閤十五里其水與台州西界相分九曲行於石溪出白巖東無亂石焉此水勝於山之處也有鳥巖石竹廊煉藥爐仙人之田王子晉仙橋㪚漫逺矣其深者去白若五十里而遙去城迂僻好事者莫知故難見也至窮途而輒哭等逰夢於華胥問山僧以前路固有匪吾人之所如者殆不可以窮究又安得而論諸聞之山僧靈巖山間有石室中有石羅漢十六又羅漢院旁數里有平原彌望雙猊戯等皆未攷至若大洞神仙山靈是宅龍湫宴坐者諾矩羅之住世西域書阿羅漢之在世者十六諾矩羅其一人也虎蹲守䕶者蔓定僧之衣祴也至人遐造踐迹無同運無方之𤣥化闡不二之宗風説法詎離於在定經行何間於神通陳州商水人陳覺字夢得遊山東峰望西巖一木如蓋攀蘿捫石至其下藤蔓纒繞如石視之入定僧也觸其衣隨手而化乃菴其旁閲兩月僧欠伸開目曰吾有衣寄巖間有虎守之持吾錫杖取衣虎不加害覺見虎而示之杖虎搖尾去之僧引蔓授衣有入肉數寸者為之説法鳥獸鬼神皆來聴受覺因得度世法後人呼其處為説法巖聞縮地於偷桃之客近靈巖寺僧遊山迷失道路循小徑至一處有茅舍數十家皆有方士也見僧笑曰此僧亦知遊鴈蕩乎方沍冬而桃有實僧折取數枚懐之方士呼童奪取其桃僧因恍惚過山椒則明州天童寺也神飛於窺鏡之童紹興末平陽獨嶼李氏子跌宕不容於父方士將以東逰不移時達孝義鄉橋下辭不能進方士出一小鏡使窺之恍然抵一山寺苦辭不去俄若夢覺視僧舍則靈巖寺去家數百里矣龍丹成於老父九二䜟於元豐元豐五年僧道親行大龍湫道上逢一老人自山而下履木葉皆無聲呼僧與語付藥丸如弹一曰爾速入京以進藥乃萬嵗藤膏熬成名龍夀丹以金盂玉盌研之三日九服可保九二之數道親未行數日又遇之仍趣其行道親至都聞神宗不豫詣都省言狀執政異而不受上聞而取之問所欲道親言老人但戒太嵗本命四立日慎酒樂乞濟窮民及禁天下捕龜上命中臣梁従政以焚香至鴈蕩山訪老人無所見八年立春上得疾病革皇太后得藥於睿思殿進之乃上手自封識上崩蓋在十八年事見實録了世緣於國秉秦太師檜嘗夢抵一巖洞有羣僧環坐曰尚憶此乎秦瞿然悟身之為諾矩羅也僧曰公世緣未了姑去後經鴈蕩覩羅漢洞如所夢作詩記之有欲了世緣何日了之句夢頽像之形容尊者菴經魔賊焚蕩廢不復理揑像亦壊至紹興間婺人向氏逰山夢僧祴金襴而不見首明日得老父介逰大龍湫至則失之視諾矩羅像則夢中所見因為築室塑像焉神屠履崖以如地作尊者菴工有無肉之歎俄有屠鬻豨肉者其去履崖石如平地以為羅漢變見云聞思光熖以如虹觀音巖時有光怪如虹蜺盗石而江波激怒龍鼻下觀音石比為一監司持去及渡浙江波惡甚懼而投諸水刻石像送鼻下非復曩時天然者矣觸鼻而㳙泉不通者舊傳龍鼻二竅有水孕婦或以手觸其一泉流遂枯非人耳目之所到而又烏得以議其洿隆也惟兹山之神秀嗟近在於人間曽跬步之不到乃窮人而上天化石橋於北閤企斤竹之飛泉謝靈運従斤竹澗越嶺溪行詩有企石挹飛泉之句抑子晉未成於羽化而謝客不得擅於逰山也今夫天下之山江東居最永嘉富甲於江外而鴈山為大焉可為超羣而抜萃矣他山之秀么麽稱妍陽臺十二秋浦九蓮詩文振古名字喧天僅得此山之一邱一壑猶拳石之夫何足言所謂夷泰山而呑雲夢者惟鴈山之蕩為然浪語集巻三
