body:
  text: 浪語集卷二十三宋薛季宣撰書淮西與周侍郎書某去嵗之秋趨召京邑以未朝謁諸公都未克見侍郎初無一面之雅何所聞見先枉車騎臨訪逆旅强相抆拭延譽於諸公問留官中都惟此之故以門庭之清峻某日被延接又愛之如手足視之若友朋洎假節之行凡所以為忠告善謀者無所不用其至啓途之後非惟室家日被存撫而蒙念慮羇孤之跡賜問朝夕相繼雖古王公待士何以加此交情之厚殆未之覩某小醜何足當盛意耶自愧妄庸曽乏一言之助慊焉內顧負負何言自齊安奉書者還伏領回教之後嘗三附置拜狀皆不克關聽覽兒姪以都不知台斾所往盡留之於家某雖有承問之心亦不克知所寄也旋聞去國兒輩遂不及送聞之惘惘宜蒙不以怠慢責之伏承出處之道綽綽有裕其視近時名流尤更合節不敢有姑息之愛敢以為賀雖然晉公去矣如蒼生何某碌碌疏賤甚恨不得追逐衆君子後塵然亦不敢輕躁動歸心即數月之後遂當求一外補京官俸薄非私計所便淺中狹量詎宜久在都輦獨行踽踽復何聊賴但苦無人借助有請之為難耳齊安合肥賑贍各不過三百四五十戶餘雖萬計皆客食主家在民猶在官也用度方窘復不欲强收之夀春有歸正數百家十年請佃不得不括取包占未耕田畝均給取彼豫此在土人能無得失之患而亦不可謂擾損有餘補不足天之道也不識台意以為如何某本擬中夏東歸近又得㫖核實二麥禾稻略無可以稽據不過取其稅籍考之文具之事雖有所不免然在誕謾之喙誠有不可罔者此外别無可著手處只得爾也諸郡文書略皆來集季夏上浣或可東泛恐欲知此端緒故詳及之不能推廣主恩愧於期望多矣傳聞旌車已歸廬陵甲第故因景望便郵伸問啓處庶幾必達不暇恤浮沈也令弟光膺召節伏惟歡慶某未被斥汰尚可求侍都輦慰懌之至台眷上下伏惟均受繁衍與張左司書即日秋氣澄肅伏惟徜徉閭閈台候神相萬福某先君右史先伯待制皆受知於先正忠獻致位從班辛巳嵗某備縣鄂陵伏遇元戎即鎮金陵得迎拜於廬州江步時已昏暮伏蒙略去貴賤等威賜之坐席溫言慰藉詳問存沒區區感戴鑒寐不忘伏自忠獻薨背某僻在海濵都失奔問徒切慊然比年待次毗陵日聞左司以道學為諸儒唱嘉猷悟主幾振吾道非獨為先世私喜實為善類公慶某方辭審察之召雖恨不得摳衣几席而友朋陳君舉輩仰荷豫進獲聞至正大中之論所幸已多且蒙不察其愚乃欲力相汲引某自顧觸藩之久懼涉其怪又貪承教去夏遂謀入都以欲一見鄭景望吏部取道宛陵忽聞出鎮宜春行次苕水與林擇之秀才疾走吳興郡下至則鷁舫已西到都乃知謀過義興枉道臨訪差池至此彌更惘然合并之難一至於是然而千里明月奚逺近之拘耶某自去秋中備數京輦雖與伯恭子充親洽然以人情益薄不敢顯白相從到官之初一謁當路是後弗敢復見至前忽蒙假節淮西匆匆徑行以臘月中旬至部江饒流移既已賑之無及而淮北歸正無非守將之欺小人黨與强盛不敢顧身三以實聞僅能置之於理過元夕至江浦始與趙帥俊民收流移之未業者為官莊以處之齊安二十二區合肥復三十六墟之舊各不過三百四五十戶其餘土人招為客戶無慮數千人情不欲聞官所籍止三千五百戶主惠至渥不能有所推廣不學無術臨事乃知其纍所甚為朝廷歎者荒田蕪於包占經理害於無謀歸節之際不敢一毫隱聖恩過厚職秩皆蒙超次之除還都百緒一新進退若谷偶吳興闕守驟蒙中㫖之授用踰其分誠劇畏悚而在一身出處私計雖自為謀不過如此然而近圻名郡千瘡百痏甚非綿薄之所宜居況又蹤跡見目於人危如秋葉吹竽鼓瑟孰非孤露未知所以善後惟在我者不敢不勉是外付之造物人事詎易必耶念未參識宜當道術相忘竊思記問不通人情有所不可輒盡藴庶幾有以察之復念古今異時變態萬狀謂非在已無惡無必於人用能觀感化服異端會將有濟騰口無益於事祇招謗訾適以害道甚矣要當深思密用退藏是乃待時之計鄙見如此不識有取于斯乎辱以聲氣相求無惜鞭其不逮至懇至祝某復有少稟先正幕府所繪被邊形勢頗得表裏之要輒欲就乞傳本以廣未聞人旋得蒙垂示甚幸台眷上下均受如山之祉浙中有可委者無巨細辱示去就之誼未知當作何處且欲為卒嵗計不識可乎可以警其過萬乞疏示承晤邈未有日敢祝加餐進業行以大學光明於時與朱編修書某永嘉之世先子舍人嘗從文定胡先生學某少失怙恃世父哀而字之未冠世父亦亡迫於婚宦家學淪替掃地非復遺餘竊不自量念弓冶之將墜痛䇿駑鈍料理書學雖夙夜兢兢惟憂間斷其如天資凡下易為廢闕狂奴故態每每投間而作自治不給乃與事物應酬方寸勃豀動輒傷事士夫喜以自聽謂之曰能豈不自知但無可入耳思得有道取正倀倀然未知所之竊聞講道甌閩作成善類鄒魯之教西洛之學倣佛尚猶見之正始之風何意復聞於此喜幸喜幸所恨一官匏繫願摳衣而求教未能也飢渴之況未足形容願見之心久欲奉尺一之書疑於無因而至念托士夫之後盍以聲氣相求必識面而後交嵗月不吾與也鄉人鄭郎中景望某所畏事者林擇之學於門下嘗與之進景望辱知遇矣某過景望因獲交於擇之擇之弟擴之見訪吳興自言亦門下士不因其歸求教幾自絶爾在禮士不介不見兹某庶幾焉者琢磨之賜繼今方有望焉某不自詭交之淺敢有謏聞之獻伏審明揚昭代屢賜弓招引義牢辭不忍屑就此固足以亷頑敦薄誠近世所無有區區之見竊有所疑仲尼出處周旋某謂盡可師法他人過與不及以為賢則有之曰可通行非中庸之道也居身過厚蒿目斯人不一援手救之此遁世絶俗之士意非執事所與今百姓病矣惟明於醫國者為能再生之聖人於魯定衛靈未嘗不切切於遇納約自牖要非一日之積必若伊尹之學恐不可以望人於秦漢之後也某守身不固已失足於時矣通記之初乃效鄙夫之見取豫皆未必是尚須察而聽之必不可為徐去非晚伏幸念存湖學權輿於胡安定本朝人物之盛由來造端於此今也齊室如故流風泯滅某假手無術日夕疲於期會困於鞭督雖戴星出入曽救過之不暇教養之事未遑議也未知何以處此惟幾不屑教誨或能黽勉從事尚有補耳何當覲見一洗我心伏祈進德惟時頤養蒙正以斯道光明于世又與朱編修書即日新春尚凜伏惟養蒙黨里自天祐之台候動止萬福某仰德之髙聞風之說於今蓋有年矣以無因而前無介而見有所不敢去秋林擴之見過具道其兄擇之不以某之庸不肖亟以姓名誤聽宜蒙誘掖之意以故忘其愚且鄙也輒冒貢以尺書仰蒙大度納汙不見誅絶教翰寵答慰藉勤拳自顧何人奚以取此感愧之劇未易名言誨喻諄諄仰見嚴於出處之際某滔滔昧進固不足以知此然而仁人蒿目其將如蒼生何將毋有莘之耕必待禮而應也某意無可無不可不猶愈於甚耶想惟髙明不以狂言動愚見如此其敢有隱情乎丐一思之勿以人廢言也下問湖學其興廢之所由來誠如髙㫖甚可惜者異時作人之地今為利害之場與刑名之習耳慶厯所取則今學規與夫作院制器之法故府焚於延火求之略無可證詢之耆舊亦無存者惟聞學之齊館與伸道義勝澡德誠明四齊為安定舊名餘不可見時雖分藝以教蓋初不以名齊士雖學書不廢騎射琴瑟今齊館中射堂尚存泮池之旁猶有樂齊之目門人之盛後皆鑱名登科記中學中舊存當時賜書與孔子伯魚畫像亡軼殆盡比方略整齊之此外無傳可為傷歎為之師匠某何者而辱望以此耶然與朋友共成之不敢不勉方懼罪斥詎能如所欲哉教以安定之傳蓋不出乎章句誦說校之近嵗髙明自得之學其效逺不相逮要終而論真確實語也某何足以知此蒙誨之及故敢言之子路何必讀書孔子惡其佞子夏必謂之學不可謂不知言二者豈無說耶昧者盍少思之嘗謂翼之先生所以教人得於古之灑掃應對進退知其說者徐仲車爾餘子類能有立於世是皆舉其一端介甫詩以宰相期之特窺其緒餘耳成人成己衆人未足以知之且君子道無精粗無小大是故致廣大者必盡精微極髙明者必道中庸滯於一方要為徒法徒法徒善漢儒之陋則有所謂章句家法異端之教則有所謂不立文字稽於政在方冊人存乃舉禮儀威儀待人以行智者觀之不待辨而章矣民之秉彞向也明於西洛今焉泯泯舍門下其誰取正傾囷自獻庶幾擊而發之毋惜爐錘痛加橐籥尚祈階以有立免為小人之歸此區區所望於下執者萬丐哀而藥之胡先生言行録范淳夫集謾備藏史輕瀆至愧程易胡易郡有模板不敢獻所厭飫林擇之書以凂門史丐求端便送之答尤溪石宰書某僑寓延陵獲聞武進之政與朋友交又知淵源之學悉臨下之有本恨承望之未階顧無因而進前不敢造次修記林擴之見訪逺勤先賜教筆承撝謙之過厚蒙期待之非宜退省其私灑然汗背某不肖嗣先人之遺業奪於急祿舊學委地雖日勉加淬厲如頑頓何若新安朱文公張南軒呂博士之賢皆無待而興者某且不敢望其涯涘乃以諸公望之責之共還濓溪西洛之風何可當也左右以聲為律擬人必於其倫某豈不自知猥欲置諸爐炭之上荷眷雖厚然非愛人以德之意也尤溪雖逺得賢者父母之致仕與賢一方幸甚某將命亡狀曽無毫髮之補叨冒重沓遽有霅川之命力小任重未知攸處湖學國朝人物所起惟故館在未知教養之道殊無術以興之有可警督其愚無惜規誨乃荷方今善類牢落之甚如事尚淹逺邑某不幸失足知曠敗是虞耳何當承晤寫此願懷别紙之多非我輩往來之禮不敢遵也答沈縣尉書道周之别轉首更年緇染京塵日蔽蓁塞思挹清風一浣濯之而不可得鄉望當如何耶比者于交游間備聞學力甚進議論日新駸駸焉純亦不已之風覺我形穢甚矣健羡健羡何當覿面以釋羣疑某自去八月在都三月不見當路始者意若相向自是浸覺已疏至日後使淮壖至則冬杪才力短淺不能推廣主恩況已後時流亡漸定過合肥修築三十六墟之舊齊安置官莊二十二區來者哺以路糧至者處以廬舍牛具之給種糧之賜計費緍錢不過二萬米六千斛二郡仰賑糴者通不滿七百家大姓以傭客徠招餘三千五百戶前此轉徙襄漢以復其田里者不知幾萬家也所以成立祗此言之可笑主上過相期望再被超躐之寵氣不及定剖竹吳興受之不辭可無慙色茲蒙警教之辱尤益靦顔顧淮甸時有所發擲者所論薦往往任心而舉惟功罪之所宜不知其與貴要背馳憤悱之甚歸對之際竊慕詩人詢謀諏度之㫖循行所見具以實聞縱論及於蔽欺為此大怒適當一畨遷改之後獨行敻敻方擬求補外於二三月之間庶無潔去之迹而主上不察遽以輔郡處之得之如升仙然豈暇他顧諄諄之諭極荷愛豫此事景孟固嘗言之妄意今日朝家不可謂弱正患衆人蓄縮賢者自處之髙以故狂妄之徒得為欺誕國勢日以微削須得天下共維持之觀於孔氏不復贖人之譏以為不當形迹之纍是雖入于自恕猶幸君子識之吳興浩穰然實空匱其可不問都鄉互有綿薄處此自知手足之露將重得罪不知何以救之某惟喜讀書深不好米鹽細故為郡則當反是不得不勉雖日强加鞭䇿如不進何湖學經始於胡翼之先生今惟齊館在爾本朝人物權輿之地文獻無足考者年來法家之學却有師傳士大夫之家知習此爾狂瀾既倒未知所以回之更須日月圖之不可則已儻未罪斥尚望為我籌之不徒惠此一方所關端不細也答定逺于宰書某向者僑寓延陵竄迹農畝士之賢者都不克見比來假節淮甸環走三千里經城邑以二十數雖識見愚暗不足以知當世士然求長人之吏有以獲于上下如左右者曽未之得自至封界得左右之治于民得左右之才於郡意謂非苟爾也方將退而察之旋返借途伏蒙采聽之過示以長箋發語驚人術業純正熟復降歎不能已巳洎安教備盡條理到合肥郡以語方帥幕屬同聲交譽如出一人乃知天下未嘗無才亦不在逺蝸宿田里失親炙於數年之前為可尤者然所獲亦多矣惟是學業蕪短既不足以仰當期望匆匆竟決奚寫我心以左右之力之賢見諸小試已有滔滔不窮之勢加之好學不已不恥下問某且將北面乃欲有資于我過矣古人之學固非俄而可效大扺文章之煥事業之偉無非由此出者才者時乎出入要非根本中來不有見焉非基德之具也心之精微不能宣之於口纎煤寸楮將何自而陳之某匪曰能賢每思益友良朋誠不多遇辱許之以交好覬共由斯道爾請違逾半月矣嚮用何如置中祇被劄誨仍示圖經石刻珍荷某已分遣人督促諸郡只待文書之集便謀歸計儻逃罪戾天中節後遂到濡須不過季夏東矣方賖面命修報徒有依依答陳同父書某自戊子入都得左右之文於景望四三哥之舍於四三哥王樞使聞賔從之學業氣志每以未及識面聆謦咳之音為歉及趨召道宛陵四三哥寄朋友書二其一左右一君舉也洎訪舊知於學則聞二陳之名籍甚京師旋沐從者訪臨獲親名理之益從知名下之無虛士諺非虛語私以得與從游為喜己辱開懷傾寫臨途要無可道然而别不及面寧無惘惘被教敬審即日冬序正寒溫侍有相尊候萬福學官秋試遂遺賢者士夫不能無恨得失有命時運故應然耶向使舉無留才則何以為造化但在我本無患得之意未始低頭就之則吾同父之失較之君舉之得亦復何愧沖天驚人之軒奮豈有遲速間哉體用之誨備認髙㫖某何足知此然不敢以不敏而罷夫道之不可邇未遽以體用論見之時措體用欵若可識卒之何者為體何者為用即以徒善徒法為體用之别體用固如是耶上形下形曰道曰器道無形埓舍器將安適哉且道非器可名然不逺物則常存乎形器之內昧者離器於道以為非道遺之非但不能知器亦不知道矣下學上達惟天知之知天而後可以得天之知決非學異端遺形器者之求之見禮儀威儀待夫人而後行耳尚不至德誰能知味日用自知之謂其切當矣乎曽子且日三省其身吾曹安可輒廢檢察且不識不知順帝之則者古人事業學不至此恐至道之不凝此事自得則當深知殆未可以言言之也以同父天資之髙檢察之至信如有見必能自隱諸心如曰未然則凡平日上論古人下觀當世舉而措之於事者無非小知謏聞之纍未可認以為實第于事物之上習於心無適莫則將天理自見持之以久會當知之洪範無黨無偏大學不得其正真萬病之針石獨無意於斯乎某非曰能之冀共事斯語耳葬議甚韙近過伯恭不遇尚須續報志銘某豈敢何故舍四三哥發潛德之幽光某愧焉多矣妥齊銘文本欲相名如周公之與君舉以為君奭王事表德朋友之誼也名近師道有所不可不然何惜一換試更思之某碌碌素餐强顔留處於朝家無毫髮補未能決去為愧同父望以世道譬如覔金於窶者何不知我之深耶輪對當在來春只等一見後求外補州縣差可及物尸素欲何為哉不足為人言之恐欲知何所向爾答石應之書古人以小學訓習童蒙皆大學之具也大學之道但神而明之爾小學之廢久矣為大學者失其養心之地流於異教不過空寂之歸開物成物之功宜無望於賢者但令良心不泯天理豈外于人耶反而求之莫若存其大者積小以成其大是又不可忽也惟能平其忿懥恐懼好樂憂患復六情之未發心不失正良知良能其何逺之有向用之讀書用之正身用之事物與人皆是物也非能洗濯心源蕩除舊習去小智之穿鑿全吾天之聰明塵掃隨生猶未艾也孝悌忠恕無非發吾誠意之中況小者乎況庶物乎帝典以欽明文思稱堯洪範思睿作聖書不他道曰欽曰敬而已無小無大是為得之第能用志不分則精義入神矣某學雖不足以知此嘗聞諸君子矣素絲何告願無以人廢言也與喻郎中書去嵗抵城闉兩侍座席重蒙旌車臨訪雖得承奉指教實獲我心而匆匆拜違益深怏罔旋歸村落不敢以無益之記塵溷主書妄意當然非敢慢也斗山之仰三秋何足多耶某有愚見敢瀆聽聞故丞相安邑先生忠獻趙公前輩冠冕扶危定傾勳在王室不幸遭罹讒嫉放死海嶠私史之禁仿佛焚書告訐之風不幾削跡公之功業泯沒殆亡傳焉近鄉人陳傅良秀才識其孫於新昌訪以遺書得公自為墓志獨書遷官次第問其事則不知劉東嘉夙掌著作時述名臣傳求公行事一無所得愾憤之極拊几而歎為名流嗟惜如此及今聲迹未逺故老仍存纂而録之尚可十得四五因循愈久將甚於今後人指擲先賢必有任其咎者伏思當時人物惟郎中丈及徐侍郎胡侍郎汪尚書四人實為耆舊汪胡後進無易郎中丈及徐侍郎者自丞相公去國先大夫與時宰廷爭得疾下世士夫爭逐時好挂冠而去惟郎中丈一人忠獻之薨無敢會其葬者郡吏承望風㫖至用私釀逮捕忠獻家人郎中奮不顧身不逺千里臨哭其墓時宰為問以實告之於忠獻公可以為無愧矣竊惟伊尹之事非皋單莫能訓問禮周室舍伯陽父將安之忠獻出處之詳撰而述焉附見諸公之事繼沃丁之作接柱史之告其惟郎中文洎徐侍郎乎有如尊年倦於簡削汪尚書老于文學其聓也又嘗為忠獻公所知足可與共成之唐韓退之栁子厚與張睢陽段太尉初無雅故尚為傅益其傳上逸事于史官古人之於前賢懼其埋沒乃爾忠獻于郎中丈知已其何辭乎某方貽秀州鄭伯英判官書屬以此告徐侍郎尚幾一二老成存神故實慨然直筆俾後生有𫐠焉其為訓益來世大矣不識台意以為如何鄭景元書屬以語徐侍郎者略同但字君舉賔之耳必有任其咎者之下云伏思當時人物惟侍郎丈及喻郎中汪尚書胡侍郎四人尚無恙郎中疏矣汪在一時為後進公所尊重無易侍郎丈者昔先大夫與侍郎丈俱為忠獻公所知遇忠獻鎮東浙侍郎不旋踵又去先大夫為忠獻稟目字侍郎曰稚山去矣某其可留因與時宰廷爭得疾還舍遂弃諸孤思之痛心不忍復道竊惟伊尹云云倦于簡削知府固大手筆足可口授書之云云某于侍郎為通家子外舅孫帥亦與侍郎父子厚善某皆曽參拜然不敢率然冒貢函書懼無因而至前重得罪于門下因見為以愚意白之所望老成云云人還祇領報章辭情諄復忠厚之意形于外言感服歆歎書不得宣某晚生不及多識前輩典型之訓于老成人見之矣甚幸甚幸稟目見賜非所以象賢簡牘章程抑損皆過將由事父之執未至謙尊所以督教之也及復榮翰愧汗亡極即日首夏云云某昨者不自揣度竊不自知其後進大懼忠獻公風節蟠準天地隱而未見後生何述伏見郎中丈人與先大夫一時諸公俱為忠獻知重知公之事為悉自先子歿忠獻諸公相次淪謝郎中獨享髙夀意天之未喪斯道欲以載述之事託付於郎中乎以故竊敢薦言所願及時有所記録伏蒙賜報忠獻家禍皆得之而未詳者茲乃備見首末讀之涕下天不相道一何至於此極邪條例盡能如此之詳忠獻諸公為不泯矣意者郎中有所撰述未欲顯行于時某竊謂不然書之流傳常苦不廣孔氏兼藏屋壁孫盛播之海外然今六經晉史尚多亡佚況密而不出邪要在傳信闕疑使聞見之所及者有所考問以信君子之道但不至如崔氏國紀之過則儇子何恤哉萬幾以身任之毋復多讓勿輕付人之戒蓋謹之也雖台意為甚韙某小子何足為輕重乎每思舊事散落天下非得當世故老各記所聞諸公施為必多遺闕矧惟事有本末難可厚誣司馬謗書何損孝武李衛公操縱中人之術實自牛李之黨書之某以為雖非其人未足為害銘志世不多信若晉文靖謝公有碑無文益足以見其賢前事之非何足靳也小人之見不識台意以為如何何當摳衣几格之前細論此事居貧難動徒罔罔爾友朋見過乃吾人之常傳言過當至于上達聽聞吁可怪也某茲冒恩寵洊蒙命召實資誨飭揄揚之素知愧知感顧惟學術淺陋前既亡補受爵不讓迄今慊焉人不加賢頭顱可見而復貪榮舍義所不敢也已告廟堂辭之期于得請乃已云云與喻郎中書間者遣力入都附拜函牘其歸值都騎方出不復留俟寂不聞問又兩月矣念欲扁舟圖侍函几庶欵名誼求厭飫所未聞屬以卧病彌月方且力辭旌命而仙邑當道又里之重臣方承顧遇嫌涉瓜李未果如願悵怏殊劇沈上舍便伏辱台翰存撫慰懌交至忠獻遺事乃蒙惻然軫念斯文之不喪繄丈人是賴生能一其朋類殁乃紀其德業雖忠獻去國不能盡公之用端不負知人之鑒矣承許博謀詢訪廣記備言真古記之法必使一時遺落乃為盡善金陵猜間似非人力所及其初忠獻不能不疑此老而門下士多不謂然雖忠獻持之甚堅然不能遂平江過闕之際先大夫知其必隙嘗諷忠獻不果從也又正人不能得之秦氏豈非天邪某曩在閩嶠忠獻之南以嫌雖不入城當時黨禁未嚴泉義福之鄰郡二公交情於此加厚乃今知丈人之力不勝欽歎嚴州頗聞留意學問未之識也汪尚書補外吾道為有光矣然善人繼去將如蒼生何某本以興化薦召如聞相期太過有非力所能任者故辭之似今不當復行幾得情乃已爾俟聞報罷當謀趨侍矣即日云云答沈應先書君舉相見所談謂何得無多過其實大抵愛之不知其惡何容盡信諄諄之諭何敢當某所行天下閲士多矣好善篤信道深求如吾應先者曽未之見然而以此見望近乎不知而作夫人未能為己安能為人某之自為若何其何以承盛意然聞責善朋友之道於此不當有隱又不知野芹遼豕不見笑于大方之家乎自大學之不明其道散在天下得其小者往往自名一家髙者淪入虛無下者凝滯于物狂狷異俗要非中庸先王大經遂皆指為無用滔滔皆是未易奪也故須拔萃豪傑超然逺見道揆法守渾為一途蒙養本根源泉時出使人心悅誠服得之觀感而化乃可謂耳此事甚大既非一日之積又非盡智窮力所到故聖人難言之後世昧于誠明明誠之分遂謂有不學而能者彼天之道何與於人之道致曲未盡何以能有誠哉孟氏必有事焉而勿正心勿忘勿助長也之說雖非聖人優之柔之使自求之之意學者於此從事過半矣顔氏之子其過與怒寧與人異不可及處正在不以怒遷不以過二一節法守之事此吾聖人所以異於二本者空無之家不可謂無所見迄無所用不知所謂不二者爾未明道揆通于法守之務要終不為無用灑掃進退雖為威儀之一古人以謂道無本末者其視任心而作居然有間然云文武之道具在方冊其人存其政舉苟非其人道不虛行要須自得之也學不至于不識不知順帝之則競亦何用有如未辦澡心藏密莫若去故去智古人言讀書百遍其義自見未易以淺近奪信能反復涵泳會當有得得之小大則繫乎精誠所至時文稱于一經之內有一言之悟則六經之義燦然矣不可以人廢言也事非筆舌可道而言之不無覼縷遐不謂矣政須體悉不足為它人道也喻文書承寄示甚感遂能不廢芻蕘之論尤見前輩忠厚之風前事賴以有傳非小補也向聞彼知舊間有方輿記望為經營一借如不可則己之君舉見告藏室中有越絶書未之見曩得其一二事未詳始末輒欲求假一尋繹之師友之目向來朋友間嘗有見被者其知非是則亦已矣相知不在相奉置人于爐炭上非所以愛之也毋以驚世駭俗嗣音尚爾敬當回納勿訝某比以莆陽薦召雖辭不得命今不可復去矣尚遲報罷専圖一見既所欲言與趙漕書某聞一言之道不以人之無言而廢其所當言亦不身訥于言而默其所難言在人之為言無所苟而已矧茲民之休戚利病結于下而弗達于上有真儒當道宣王化以移風俗言之者無罪而又能救其災若居令之職以身訥于言而默其所難言廢其所當言而從人之無言使民之疾苦不得一聞於上而求息肩于下是亦何假於令為之令者不亦名教之罪人乎斯某所以竊不自量而敢言於執事者湖右瘡痍甚矣武昌又其甚者遺民千戶非流移轉徙則兵荒盜賊之餘偷生一時鮮知本業田萊不闢何財之聚旱乾水溢之患仍嵗有之令失職而行者踵相接于途知安集勞來以稱明天子之德意者茲邑所罕見比年戍兵屢勤蹂踐弗堪重以大治戰船作屯營於二千里之外耕男逺役紅女下機二稔于茲不少休息而又鼠偷侵冦生發不時居草莽間無聊生者民羸若此為邑奈何禮法政刑所不暇及某嵬瑣之質于民事本非所長方此效官敢不自盡而當凋弊窘急之次束于簡書撫字之心廢為殘暴禮德之道遷為苛虐民失依賴夫何告哉茲幸自天恭遇某官執事以憂民之心副裕民之寄施不忍人之政充博愛之仁弭節之初究求民瘼歸仁美德諒人皆有之告病以民恐未有陳於執事之前者雖執事之賢下車伊始民之困弊何自得焉可以言而不言某懼不自逃于咎不敢自默廢所當言惟執事推愛物之心為民深慮藥其雕瘵使之休息固執事愛人之實非有待於猥吏之言至于自快其私取容于上攘人之大利以給公家之小利存人臣之小節而忘其大節是近時淺丈夫之所為事在某非敢為亦不敢煩執事者之慮瞽言冒進惟執事幸察其心與王彥恭經略書某頃者試令武昌伏承持節湖右名位遼絶勢相萬也初無蟠木先容之助又無牖間半面之雅庭參一見即蒙禮異教詔警䇿凡可以安全之者無所不至趨事之日雖淺一邑之庇居多既而台施行部荆南遂遷淮甸道出境上某適微恙弗克請違乃辱台翰撫存告以方藥未幾浙西旋斾獲于東坡江步一瞻台表匆匆訣去深用耿耿繼於鄂陵知後吏處領所賜教墨道左罕便既不時報謝于今凡五閲嵗而起居之問不一通于記史顔之厚矣負負何言自惟賦性過疏拙于援上詒怒當路有矣能見亮者夫豈無之其間亦有同舟遇風權相成濟利涉之後勢合相忘獨於門牆初無絲髮之補在官則帡幪厦屋既去則恩意綢繆非徒此也又以無似之迹為延譽于士夫間某非强交之人台座又非有資於某者眷顧如此未之前聞上論於古之人或可以一二數耳愚陋何以得此言之增愧然聞媢賢醜正實繁有徒自分無以逾人虛名適足為纍兼恐上負知人之鑒不可不察知我足矣何足以為人道哉既沐愛憐敢布以情承開府畨禺倚眷方渥旋抗章髙舉竟獲成命請祠之奏遂能自出機杼無所蹈襲其言直而不肆婉而成章當有識者知之衆人固不識也東坡侍見嘗聞君子餘論以為進退有義得失有命君子贏為君子小人謬為小人仰知將以教督其愚然亦有以卜知我公自處之地獨善可矣如天下何世衰道微士風骩骳藩垣使節其能不為身計稱股肱耳目之寄如台座者不知其誰適用之才濟時之具況不秖此此何時也而猶侍祠于外得非明鏡寃于醜婦抑厲揭淺深之計固當然邪嶽下雅多英雋之逰今無改舊俗否衡鏡平皎所得當日富也某里居待次經涉四年雖家徒四壁日憂糊口之不繼而單貧無事得以料理書學無當官箠楚患亦足以為樂然性質凡下既無簡書之畏而狂躁之態投閒復作尤一身之纍也金華闕期在明夏决曹雖事省於縣而人命所繫懼非智慮所及矧時有難易制不在已每一念此如負芒刺益知湛州縣今亦良難台座政為吏師雅辱憐眷有可見教願與聞之某雖下材不敢不勉自同衆人敬以幅書通記伏幸台察浪語集卷二十三
