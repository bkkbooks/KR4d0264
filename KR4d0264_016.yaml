body:
  text: 浪語集卷十六宋薛季宣撰奏劄召對劄子臣聞位卑而言高罪也人臣之義有犯無隱可以言而不言則負師學况臣疏賤無階以瞻天日之表䝉賜之對寧敢隱情而不言乎臣昨官逺方伏遇陛下踐阼之始省服膳之御卻嬪妾之進其自奉為甚薄躬細務以先羣吏親鞍馬以勵軍旅其奮志為甚大臣居數千里外觀仁聲之所及垂白之老莫不欣欣相告咸謂聖人有作規模宏大真將復藝祖之業武夫悍卒至拔刃呼躍曰不報吾君以死而安死口奏臣備員鄂州武昌縣令縣多中原故老當時所屯大軍一時聞見皆實録臣愚不識察人心之所向咸謂太平之世可以朞月見也歷年寖久而陛下未享其效臣竊惑焉臣嘗謂治有本末政有先後先所施者後或可置本既舉矣末亦可捐夫清心寡欲恭儉節用堯舜三代之所以治天下陛下既已身之矣自宜固守而勿失至於躬細務親鞍馬蓋聖人之權施之首政以警一時偷惰之習乃其宜矣循以為常則天下不能無疑是故衮職任輕無以仰承德意動煩宸慮而國論靡有定止事出九重百官莫肯任職政令施設下人得以輕議寄耳目於左右權或移於近密躬細務以先羣吏而羣吏未必勵此不可不察也叢脞之歌賡於虞氏自除郎吏明皇無取祖宗專以用人布德懷柔天下蓋為之有道矣毬馬之事陛下所以習勞苦而振威武者至於兵衛之害積於細微銜橛之危起於所忽降胡侍從豈得絶無關防行之有年議者遂謂嗜好之僻親鞍馬以勵軍旅而軍旅未必勸此不可不察也太祖皇帝猶謂擊毬非將相事韓愈尚為其長危之仇士良既去以毬獵固寵之術授其輩流民臣之心所以咸願陛下為宗社計也口奏仇士良事安危之幾反復其言可以察知小人之情狀而治道亦因可見惟陛下留神陛下雖有天縱之聖將大有為而精神疲於聽斷玉體勞於馳驅縱有清閒之燕講萬幾之務臣竊意其有所分矣汴梁我之舊地固不可以不復陛下所為焦心勞思不憚寒暑若此者正為恢復進取之計耳然先後非序本末倒施勤於小而緩於大圖其近而遺其逺昔之所以鼓舞群動者人情久且玩習七年於此而治效未著寧以是乎國威未振民力未支而疆場之情傳聞常多失實陛下再造之心雖不可暫忘而進取之事其實未容輕議臣願陛下深思逺覽以靜養恬略其小者近者而圖其逺者大者遴三公之選責以進人才張綱紀延端直之士與之講問學評治道歸有司之常務屏馳騁之細娛本末先後咸得其序則朝廷尊而衆務自舉威權振而軍氣自張養以沈濳待時而動則天聲所臨焉往而不濟哉臣不勝拳拳之忠唯陛下裁察口奏天下皆知陛下治道所以久而未進者良由三公之才多不勝任陛下勤勞庶政固非得已今三公虛位正陛下論相之秋臣願陛下審之於未用之先不可不專任之於既用之後如曰人才難得則致治之主不借才於異代陛下論相之際臣請無取沽激無取誕謾無取才華無取閻茸唯忠實可任者相而任之勿疑陛上垂拱仰成責以治效人才既富紀綱既設則恢復之事在陛下度內耳又安在乎必躬必親下行鄙事而後為快治道不如是也伏惟陛下留神省察召對劄子二臣聞禮煩則亂易簡而天下之理得有虞之世中外之官二十有二人兵刑共貫樂教為一帝舜無為而治用此道也臣竊怪近世治不及古自朝廷至於郡縣皇皇財用弊弊焉常患其不給百姓朘肌及髓而日以益甚雖有卓犖之士遇有為之主得時得位其所施設終無以救其萬分詳求其故則冗官冗兵二事實有以困之也九卿之設古六官之任也自漢政歸臺閣則有尚書六部唐明皇始制內諸司使百官用皆失職至今官中都者遂為養資之地設官雖多有職蓋寡公移回復祇為文具百度為之隳廢人事得以循默間者雖省員闕而其監寺仍存置吏之員滯事之患無異於前口奏天下之事每每不舉者患在血脉不得流通財殫而人困而冗官冗兵害政傷財之本也臣疏逺不能詳知請以工兵二部言之兵部舊掌軍旅武選今軍旅歸樞密使武選歸吏部右選兵部有尚書侍郎郎官所領不過廂軍鋪兵之名藉其屬有職方者掌諸州閏年所上地圖有駕部者每年一至御馬車輅院行視而已近雖省併郎官員闕一向仍在省官之奉不能當吏祿之竒數文移回復之害固自若也工部所掌營繕百工之事今營繕之大者歸轉運司臨安府小者歸修內司百工有文思院軍器所有將作軍器二監實按臨之亦不過於嵗時按行故事士之才者既無職以自見而不才者得濫吹竽於其間文具迎承尤害政之大者陛下第令百司各言所掌與其吏員廩給之大數几職之相似者即為冗併其疏闊者要皆無職置吏廩祿自可從而知之諸路帥臣古州牧之官也國朝以來置轉運副使判官有提㸃刑獄有提舉常平茶鹽又有總領市舶坑冶茶馬諸司屯駐之軍又别制都統制大抵牧伯之任分為五六而州之知通縣之令佐不相統臨權均勢敵一彼一此各行其意民無適從為害滋甚臣之所謂冗官者此也口奏昔太祖皇帝以方鎮太重置轉運使掌其錢榖提刑諸司後置亦廢置不常今都統制承平時副都總管之職也漢十三州領於十三刺史而天下事無不舉今或一路不當漢一大郡監司至五六人責委權分州縣莫適稟命是宜事之不立而私意之紛紛也大兵不屬地主緩急之際將誰與守都統制類無逺略平居極於貪暴一當大寇視棄地如遺爾近時每有師役又遣大臣督視以權置之將統烏雜之兵尤無謂也廂軍之制即唐方鎮之兵是也周世宗及我太祖皇帝增置禁旅則今之禁衛與諸州之禁兵是也神宗皇帝立將兵之法今之帥藩係將禁軍是也太上皇帝收諸將麾下作三衙御前諸軍今之大軍是也四者之外復有弓手土軍役兵今惟大軍可收戰伐之用將兵而下廢為皂隸之役官吏占破無幾則竄名廣破賣工私役者適足以為汚吏之資游手之多無法之久干闌狂嘯之之事因之而生比雖少加簡閲統以軍政人情玩習猶無益也臣之所謂冗兵者此也口奏今置軍雖四等可用不過天軍朝廷固以上供給之然州縣困於軍須惟以供贍將兵廂禁軍爾謂如官吏古破一郡不下千人以為役兵則鋪兵清務牢城壯城作院之類自有所謂役兵只成都一府廂軍至一萬人不知養之安用且以中人之家一年之賦供一廂軍且不能贍今天下幾數十萬人是宜民力之匱戰士之寡也惟今法度之弊臣所知者莫此為大且天施地産之物其出有限所養者衆適用者寡則人才安能不混兵刃安得不刓則賦安得不匱而國欲安强得乎夫事簡則易知易知則易從職任專軍政修則上皆任事之臣下皆可用之兵濫吹者無所容而政猶有未行古無是道陛下必欲仍今日之文弊以圖天下治理非臣所知必欲政修而事舉財豐而兵振則非更絃易調不可也夫事為之有道則人不驚而必辦咈於人情則取衆怒而無所成顧陛下處之何如毋憚其難而重改作也伏願高聽逺覽詢諸二三大臣詳議而力行之光武併省郡縣百官職員而漢道中興周世宗汰斥老弱增壯禁卒而王室始振皆後事之師也與其張無職之官而紊政養無用之兵而虛驕蠧國人情不恤固當圖之况為之有道將不止此乎惟陛下留神采擇召對劄子三臣前任鄂州武昌縣之管催苗稅有常平司絶户屋租錢併省司逃户屋租錢二項科名通數不為甚多皆是建炎以前兵火逃絶人户屋宇客户租佃所出今屋已隳舊租仍在臣屬軍事方興未遑申明蠲免今雖受代心竊恨之臣又嘗部夫運糧至德安府界見諸縣人户患苦出納前宣撫使嶽飛在日牛租其端由蓋與屋租無異口奏德安租牛蓋嶽飛撫定羣盜所得若諸將則固掩為已有飛以民間之牛故租與之當時實受其利此亦可知飛忠亷可尚然事久未嘗無弊今飛已死牛亦無存而民猶出舊租其為害可知矣比來待闕溫州適當海溢之變田地之落江者州縣雖為蠲稅然或未盡知也問諸田里則曰從前江河側近淹沒之地租稅例多不免今所在皆有之臣以武昌屋租計之雖貧民受弊者衆而為國家財計無幾朝廷患不知爾如知之寧靳此一錢粒米之費而忍强民以出無業之租哉願降詔㫖凡天下郡縣有無産租稅如武昌屋租德安牛租溫州淹沒田租之類者並令人户自陳勘驗不以久近多寡悉除之省部監司削其利名州縣印榜曉示如官司不為除落許其越訴用省無名之賦以寬小民以惠貧下不勝幸甚奉使淮西回上殿劄子一臣恭奉聖訓前去淮西措置賑贍安集核實諸州墾田二麥等事臣將命無狀不能仰稱使令初至淮西嵗已云暮委付雖重所成至微其廬黃州所置官莊并核到墾田增種麥數已别具圖冊節次進呈外方懼不逃辱命之責聖度包荒恩寵沓至奬借么麼以為事功之勸俯伏戰汗未知展竭之地切緣置莊核實二件事體實相關蓋自兵火以還州縣多仍承平墾田舊數間用貌約頃田著為定籍已而人戶請佃類皆包括湖山為界有一户之産終日履行不遍而其輸納不過斗斛以臣循問所歷大抵皆然今者齊安之立官莊壽春所以分給歸正不免檢括冒占取其荒田初索干照視之有名田一畝而占地五七頃者自耕則無力剗請則必爭諸處之民轉徙淮甸者縱有佃田之請州縣村堡往往憚事且為土人囊槖多方沮之陳訴窮年了不可得弊源未滌乃欲核知實數自欺可也誠不可以告陛下故臣核田祗是括責稅籍拖照自陳之數臣不復盡論諸州只如蘄州羅田一縣於灊霍諸山之奧實與五郡十縣封境犬牙初申一縣墾田若干頃至覆田已耕不過一百五十三頃未耕三十六頃一十五畝又如黃州黃陂一縣初申墾田三千七百一十九頃二畝覆行詰問則云墾田一百六十頃四十九畝二邑此其最甚者其餘大略可知臣嘗怪國家經理兩淮朝夕憂念歷嵗十餘迄未有成及此親行乃見其患且夫姑息之愛惠及幸民包占既多墾闢實少非惟官司坐失租入天産之物皆為此廢雖欲聚人保境其道無繇官莊之立乃以一時賑贍之故不無勞費甚非常行之䇿臣之所覩江南轉徙人户來淮甸者東極溫台南盡福建西達贑吉往往有之土人包占既多無田可以耕佃以故失所者衆來者甚難設若此患不除則雖三數十年淮南未見充實朝廷常展剗請之限兹臣所未解也有如立法勸耕而開剗請之制蠲耕牛之稅徠四逺之民來者知佃之必得居者知包占之無利驅誘並行主客皆爭墾闢數年之內淮南可使地無曠土足兵以守以戰將無往而不濟矣臣願陛下深念逺覽與宰輔大臣熟議而斷行之不勝宗社大幸上殿劄子二臣辛巳嵗備員武昌適北師攻淮蓋嘗鳩集一縣守江之備亦嘗被檄運糧信陽略睹邊鄙利害以為古人經略守禦已成之迹未有不可為者內政良家突騎府兵此皆往昔之事不必逺陳如祖宗之關戍堡寨與夫防田塘濼榆塞之阻弓箭手弓箭社與夫保甲保馬之政功效大驗載諜具存政患今不為爾誠為之羅落可以立修而攘郤可以坐致自臣受代跧伏田野不啻十餘年矣所聞淮甸荆襄之間竟未有緒蓋未嘗不竊歎陛下之宵旰復讐精意治外而無以副陛下之使令也臣戊子嵗因大臣薦獲對咫尺之光去嵗再赴審察之命既叨大理之除蒞職數月邈無報效冬間假節淮西賑贍寵雖過分受之不辭庶幾少效馳驅非惟將以報君父之知亦以考信古人之迹口說不若身逢耳聞不如目見臣之跋涉往來備覩其實事無端緒誠有自來以臣觀之邊無曠土則事力自强今田皆包占荒閒而勸墾文具何以使邊無曠土邊有團兵則戰守可必今總首虛設而教閲之法一暴十寒何以使邊有團兵邊之征稅雖稍稍損之以資其扞蔽急難可也凡今循淮而南有拋降之和糴科買之鐡炭以至建康草料之屬泛舟而下於江左者蓋多有矣邊之守令非行辟置之法則人才不可恃今淮西九州十年之間至有守將數易而其苛政無甚相逺者一郡三邑而二令菽麥之不辨或昏於酒德者黜之蓋不可勝黜矣淮西之險厄其當守者非一今日淮西之守不過合肥居巢歷陽三戍多者五千之衆下止一千防城之具未能備設合肥之城苟簡速就歷陽因陋不增居巢闕其南壁而又纍年以來諸將興作之事有費緡錢巨萬而成城四十餘丈者有前人為之而削迹無有存者事既若此而望羅落之少固攘郤之可圖其不難乎陛下英略甚高誠意甚勤志向甚逺而稽誤陛下者乃至於是是豈外治之果不可成哉臣嘗深繹其故國猶家也內外猶堂室牆户也有如堂室空虛牆户雖飾亦終壞爾自夫不計而謾為而後外以鹵莽報不思而出令而後外以難行寢號為責實未免徇名則趣辦皆徇名之人志在大功却規小利則迎合皆規利之輩誕謾者賞而不誅諛悅者用而不察言既上壅人自多營陛下焦勞外治殆十餘年自今觀之竟亦何補縱使陛下邊鄙之間或得一人之用或幸一事之成然連雞輔車之勢成非一人一事之所能支梧也吳人有言同舟遇風一物不牢俱受其敗今日邊鄙之勢惟詳按輿地分置鎮守專任責成悉如祖宗陜右之法則守禦之具無闕而進取之計固存然此事極大為之誠不易耳無天保之治內則采薇斷不能以治外臣觀陛下大有為之志之才如此內外利害之勢洞見無疑事苟不知知之當無不行人苟不言言之當無不聽惟望奮然與宰輔大臣講求其原收天下賢士大夫博圖其緒內以正國外以保邊加之兼聽廣覽遜志虛受謀䇿畢進耳目自廣則凡壅蔽聰明孤負任使者隨且彰露而豪傑魁竒之士亦得以展其所長為陛下用矣臣目見身逢乃知關節脉理之勢如此惟陛下留神上殿劄子三臣聞人主之為天下莫大於天下不可得而欺夫使天下皆不可得而欺則欲無不遂為無不成自昔號有志之君其所欲為非不甚盛甚美然卒有齬齟之歎蓋欺之者多耳夫欺者之情狀天下皆知之而人主獨不知之是豈人主不欲察之而甘於受之耶近者為之地則逺者有盤錯之堅大者為之助則小者有彰露之援其察之豈曰甚易乎守令之所臨治不過一郡一邑之間旦暮坐於聽事之中豪家巨駔敢於欺侮而不懼者恃有胥吏為之囊橐也人主萃天下之責而以一身臨之爵祿利勢足以動人小人而不為欺何以有僥竊富貴之望而罪之根本則在於左右之囊橐致使人主無從而察之也夫左右之為欺甚於天下彼其伺候詞色之工窺見意向之密捭闔迎逢殆難以狀其巧也故有託正以行其邪假亷以濟其貪僞直以售其佞薦退人才不於有所升黜之時而游揚中傷於平居無事之日一旦升黜之際雖人主自以為出於獨斷而喜怒氣焰已歸於囊橐者之門矣然則左右之為欺人主又何從而察之亦曰兼聽無我收骨鯁棄軟熟而已且可以利來可以勢懼有見而不敢言或言而不敢盡皆軟熟之人也骨鯁之士惟其胸中耿耿不能與世推移危急存亡之秋乃可望以伏節死義平時軟熟自為身謀而欲望以急難非所聞也借使舉朝之士無非軟熟之人其為墨墨大矣於人主何利焉若乃骨鯁之士世多以好名疑之夫名天地之美物不易以與人而亦天下之公論不可以冒得舉事進言果出於為君上為社稷也然後可以得名不然將誹謗隨之矣故在臣子自為學問之計不可存好名之心人主為社稷計惟恐不得好名之士人人皆好名畏義則人主所欲為者無不濟矣故欲絶天下之欺惟在於收骨鯁收骨鯁在於兼聽兼聽莫難於無我入者先主縱有他說不能復入何以鑒擇其是否乎骨鯁之言非無我則誠難於受之也忠言逆耳利於行良藥苦口利於病此漢之謀臣所以事英略大度之主而使屈羣䇿之用者其言如此齊威之霸其機不在乎阿即墨大夫之誅賞而係乎毁譽不公而齊威之刑賞不行焉則為欺者殆無以禁之矣恢復之功獨可日月冀乎此臣所以冒昧而獻兼聽無我之說也陛下靜觀而熟察之儻有驗於微臣之言功業成否反掌間爾知湖州朝辭劄子一臣少長田里常覩鄉民患苦催科之政九重千里無路上通兹䝉超擢輔藩未知稱報伏覩陛下無輕民事寅夕究懷知而不言臣則有罪催科之弊未易單舉敢以其害甚且博者仰為陛下言之凡二事一曰科折不均二曰丁絹催擾縣官租入有常科折在所不免使有均一簡易之法民知適從人吏不得為姦夫復何患比年州縣科折一切付之鄉胥令長利於速辦而有贏餘聽其拋折虛數輕重在乎隄防給散人户慿由不言科折之數由是出等上户多緣計弊而免其數併於貧下實出强倍之征其尤甚者正賦既入於官官司不為銷落抑令重納科折而以箠楚臨之逼以威刑何所申訴及額之後官亦無所稽考虛數之入吏竊有之民困不均此其大者丁絹之賦古口算之法也凡有丁則有賦為絹不過數尺催科有法民亦何患然而丈尺既少不免併合輸官掌鈔不過一人又多攬納之戶鄉司不為銷落未免時復追催掌鈔或不在家或為攬者盜用無鈔呈驗小民憚於出官絹既不多不免計會重納一嵗如此或至再三或到官者令長多不之恤禁繫瘐死有矣而其誅求追罰之費甚於倍蓰之征嵗嵗相仍無有寧日人規避免丁籍壯嵗或不裹頭困苦細民此尤甚且博者二事革之有法可使民安田里而無追需橫納之賦不然比屋受弊利在猾胥而已願戒天下縣邑凡承受拋降科折租賦並須先期以正數細計分數科折明出榜示今年某料管催若干數內科折若干除下户若干所管若干不該科折外今將第幾等戶已上如何分數科折明於逐戶由子開說某鄉合納某稅仰於數內科納幾分幾釐簡而易知姦弊必少丁絹入納須令每匹為鈔開具人戶單名各納若干丈尺鈔外添置飛子一紙據戶數界作幾行明開某年月日某縣鄉村某人投納某年丁絹若干丈尺係鈔頭某人名下官以飛子當縣戶二鈔縫上橫使條印而移團印於上納罷隨鈔給之責令鈔頭於三日內剪開飛子給還人戶戶鈔只令鈔頭收掌其飛子並令官司照用如戶鈔法自非去失飛子并飛子書印不明與縣鈔印文不合者不得追索戶鈔鈔頭參驗有如官用條印或不圓備許人户於納鈔之際即時執覆添補庶幾人人有可以執守可省追催重疊之患臣謂其他應干稅賦凡係并合輸納者二户以上皆可依此添置飛子施行州縣敢不遵承科以違制坐之則凡催科之政其害甚且博者可以一日而去一顰呻而利澤天下於是有足言者伏惟陛下留神采納朝辭劄子二臣伏見陛下臨御以來留神邊備下臣奉承未盡條理蚩蚩無識頗多竊議比謀久任守臣固善然猶廟論未一用人未重且寄任未專列郡散如連雞非有輔車之勢終恐無益臣伏覩中朝之制河北分高陽關真定中山府三路而統於大名府河東分麟府路代州沿邊而統於太原府陜西分鄜延環慶涇原秦鳯熙河五路而統於永興軍有塘濼方田稻田榆塞為之險城堡寨鋪為之防河朔則弓箭射河東陜西則弓箭手及蕃落熟户以爪牙羅落然猶本軍不足嵗調京畿東西路禁旅戍之屯泊之軍並聽節制幕府州縣得以辟差其帥臣除折氏仲氏皆世守外他帥則以三衙若三司使及都轉運使為之有治行邊功則入備政府蓋地分則人自為守勢連則氣脉相通權重則功效易成賞明則人知盡力視古經制方面最為有法承平二百年享扞城之利而無前世方鎮之患者以此光堯中興裂㳂邊以為分鎮止存茶鹽一司外其餘一切付之紹興之初邊陲所以能自定者亦惟鎮撫專任之效臣愚竊謂淮甸荆襄西極興梁岷宕形勢之壯不減關河所以守之略未能如祖宗之法惴惴焉惟敵是懼非久安之道也伏願陛下上師祖宗之意近法紹興之規奮然獨斷無牽於俗與宰輔重臣詳按輿地分之鎮守統帥偏帥不限文武惟忠智有謀之士是使悉如祖宗之法專任責成資其事力於經理之初責其事功於嵗月之後無拘微文無急小利數年之後豈惟邊陲之勢固若金湯待時而動進取之計在其中矣惟陛下沈幾逺鑒詒宗社無疆之休天下幸甚貼黃溏濼係卑下之地瀦水所成者方田係地形稍高穿渠引水者稻田係地形平易可以灌溉者榆塞係岡阜之地植榆為阻者是四者皆所以限戎騎之衝突城寨係大軍屯戍者堡係弓箭手之家入保者鋪係境上候望相接司察邊事者實與州軍關縣相為表裏弓箭社係並邊民户家出一兵共司警捕者龎籍蘇軾帥定武日嘗整齊之弓箭手係陜西民兵蕃落熟户係並邊熟蕃曹瑋帥秦州日所經理者朝辭劄子三臣聞唐太宗之戒王圭曰人心所見互有不同苟論難往來務求至當舍已從人亦復何傷隋末內外務相順從皆自謂智及天下大亂國家兩亡卿等各當徇公去私毋雷同也魏鄭公告太宗曰人主兼聽則明偏聽則暗昔堯清問下民故有苗之惡得以上聞舜明四目達四聰故共鯀歡兜不得蔽是故人主兼聽廣納則下情得以上通大哉言乎其君臣致治之美庶幾成康有由矣夫和之與同疑若相似聖人之論則有君子小人之分善乎晏嬰之言和如鹽梅相濟同如以水濟水人心不同如其面焉强而同之非回於利弗能也向令仕者舉回於利則凡時之利病政之得失何自而知之君子不為利奪往往輕為去就藉此以治萬無是理間自權臣柄國琢喪忠良內外之臣無小無大相與諛悅合若一人幾於楊氏無君其於國家何有流風遺俗溺陷人心同而不和至今為梗以陛下之剛明聖武高視唐宗即政以來每欲一湔前弊其如無君之習革之良難舉世為同則有入而不自知者臣懼邦之政俗將日非而莫之救也凡處天下之事不當心有所主惟處身於利害之外乃知利害之實故見利者不知其害見害者不知其利誠使言利害者畢陳所見則利害之情無餘藴矣合天下聽無不聰合天下視無不明鹽梅相濟何以易此不然自塗耳目同異不聞雖臣下盈庭自成孤立矣人情誠不易見然而指意可知大扺勉君以容受讜言要為忠愛之至導之拒諫寧為體國之心由此觀之邪正無遁情矣臣不敢逺引三代姑以所學稽於唐之君臣致治之美為陛下獻惟聖神留慮而圖之社稷蒼生幸甚代論流配劄子臣聞牧馬者在鞭其後驅羊者去其亂羣施之於民其則不逺先王制徒流之法所以懲惡緩死也隸於赤籍所以繩其悍戾困之居作所以折服其心用示戒懲於以納民於善而除俗之蠧也近自軍法之壞非復紀律之存配流之徒知不得與善人齒於是留則肆其頑惡逃者流為姦盜椎埋屠販習以為常鄉之所以繩其悍戾折服其心者曽不復見為民之害未有甚於此屬者非細患也切見大軍招刺强壯絶為囏得賞給例物其費不資强刺良民不勝其擾每念小人罪至流徒以上非勇悍則姦賊也收之於軍則使貪使愚之法可得而用漢世募弛刑徒徙塞下周世宗收天下姦人亡命以備禁旅治以軍法皆有成效臣謂先王加役之流隸於赤籍者此其意也有軍律以繩其悍戾有師役以折服其心使皆遷善嚮功不復混於民伍而為善人蠧鞭其後去亂羣者不幾是乎願詔天下州軍凡罪至配流年五十五嵗以下非尫羸無疾患者並大軍收管輕情理者特免刺面其徒罪以上願從軍者許從原放仍免重役如此一嵗之內大軍所得將不啻數千人無非悍戾之夫比之招刺而來居然異矣軍收其用民去其頑善有所遷人除其害而法出於寬厚亦當今善計也取進止浪語集卷十六
