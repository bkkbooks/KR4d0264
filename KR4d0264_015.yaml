body:
  text: 浪語集卷十五宋薛季宣撰文武昌祈晴祝文伏自師役之興民疲奔命南畎之事力不暇給蒙神之惠稼穡登場秋雨霖霪將有萌芽之患一日不霽一嵗之農功殆矣罪將誰執吏實為之神其撫諸賜之終始謝晴祝文惟民卒嵗之計望屬秋成用畢農功繫於旬日徴恆雨若惟吏之辜賜以時暘敢忘答貺補漢封汁防侯雍齒册文高皇帝肇興豐沛命將雍齒居豐雍齒以漢之微入豐于魏載以趙將從平諸侯齒舊用財豪里中屢窘辱高皇帝皇帝奠都櫟邑諸將軍盡封留侯請邑諸汁防諸將咸説惟六年皇帝使御史大夫昌廟立趙將軍齒為汁防侯曰於戲趙將軍齒受兹赤社朕承天序惟崇稽古建爾國家封於南土為漢藩輔於戲念之哉恭朕之詔維古先哲王置侯設官於以貴德崇功非豫好人之干命越有小大之刑於以警於兆人非豫惡肆人臣之在下亦罔不正厥心弗二其行共承厥辟君臣同德無有顧疑庸能格上帝之心致其誠一天錫之祚國以永長朕惟法古奉天敢忘大信爾之伉勇氣義令問夙聞朕往於田肇基自豐沛繄藉乃丕烈興兹丕祚厥後入豐於魏時惟朕計之失非爾之辜衆大正於四方實萬夫之力是慿是賴爾將趙衆以來助克樹乃豐功肆豫有萬邦時乃德朕懋乃績嘉乃舊事爾之窘我則惟我之休爾之詬我亦底豫於道朕於惡不念舊矧無惡之疑庸大啓爾土田俾侯蜀甸往就乃國欽哉爾尚希乃怨惡一於忠貞毋或狐疑謂朕弗大惟天監於黔首作之君師司循善良惟務強屏爾其心翼翼視人如傷毋暴困窮毋取悍愎式臻於道貽厥後以永謀則余一人汝嘉德成斯報於戲保國艾民可不敬侯其戒哉勸農文洪惟我國家惇俗重農時務本發號施令罔非民事之攸急肆監司帥守越我邑之令佐凡厥字民任舉曰勸農司營田小臣祇領縣條教敢不供天子之明詔簡乃賦役勿敢急於追須圖惟爾之力田成勸農之實務乃中春幾望東作方興説於農郊相穡事爾尚一乃心力蒔乃稻粱毋失天時毋事末作靖共爾職遲厥有秋嵗之豐則於爾躬有獲乃其或饉室家胥免於流亡於乎念哉弗種胡獲弗為胡成業荒於嬉勤乃克降年有稔有不稔若其知此之云憂律乃子孫克勤克儉節乃用思惟永爾思不永時惟爾家有恤以漕司命祈雨祝文某不敏適時多艱縣政不修澤不下逮積怨於民獲罪於神乃嵗仲秋亢陽不雨黍稷薿薿害於垂成受命祈田憂心靡見神其降監哀此下民興雨祁祁實函斯活致天之罰於令之身神道聰明崇朝其澤謝雨祝文某為令無狀結怨於民天積愆陽害於稼穡重民之害以貽部使者憂奉命禱祈誠心安在惟神降監雨不崇朝禾黍其成繄神之惠薄醪告謝內疚增多祈晴祝文伏以師旅未休札瘥為鯁繭蠺斯起宿麥云秋日仰曦陽而窘隂雨中流千里穀價方騰民將弗堪神其寬貸庶乎開濟保此餘生吏職罔終不敢逃責謝晴祝文某治無終始隂沴為災乃春夏之交霖霪不息蠺麥之望人情闕焉蒙神之休晴不及禜告謝禮薄文不逮情謁文宣王廟文某不敏不學安知從政顧承弓冶之舊常恐或墜於家聲乃者調補選曹司此邑社懼德弗類如慿太虛惟嘗聞夫子之道於經於此不敢不勉事無小大敢言惟政之共違道以干譽於人某則亦不暇敢以誠告神其聽之謁諸廟文惟神以聰明正直血食是邦令調補於選曹司此邑社神人雖異其責惟均故某以涖事之初躬詣祠下請與神約惟隂隲於下民時其雨暘消其厲疾吏如有罪惟神殛之無傷此民重神之纍民之過誤亦惟吏教使然其降災於吏之身無為困此聾瞽此誠意也毋作神羞祈雨祝文某涖事武昌於今嵗三涉矣其誠不能感物積怨結於人心嵗有水旱之災輒歸之雩禜而神不吾違也寧不多愧乃嵗中夏苗斯茂矣雨澤不降龜拆於田荏苒更旬秋成何望屬當師役民將弗堪神其憐之副此哀禱謝雨祝文吏憂旱暵將訴於神不及禱祠賜之甘雨終朝通夕霖􅉈滂霈苗勃其興惟神之澤願終斯惠以迄於成謝廟祝文某試令武昌治無善狀軍旅數起力役方興蒙神之休禳禱輒應螟蝗不作以全其民民無流離失業之災而某得以善罷時惟幸矣誠不敢忘請謁於神以永終譽謝文宣王祝文某不才試令三嵗於今弗率先王之教以得罪於上下之交者不知其有幾也終幸逃譴祇益慙顏諭保伍文惟紹興二十有七年盜生自鄂邑剽殺人於晝塗炭延於軍市民莫適莫居守侯博愛以其仁唯死刑匪殺寇曹昌熾爰假力於屯兵荼毒元靈是浮凶盜逮三十年既三祀生肇命行鄂長仍革新貫政厥紀綱始共命於后皇定民聯於保伍井閭駭愕懼弗潰於成惟七月生肅衆於庭越以誠告生若曰嗚呼有衆其審聽無譁余誓告汝汝不聞曰謀有大小見有淺深厥有大謀不愆於小見矇於淺惟究於深人毋以淺見遺深毋以小謀大作爾罔不孝乃父母慈乃妻孥爾有孝慈宜其衛爾罔不安乃室家寧乃鄉閭爾有安寧宜其衛衛之不至惟姦宄之萌心盜賊公行將不寧於爾室老弗克孝幼弗克慈猶鄉邑之沸騰矧乃在昔先王在上寄軍賦於農田時未有黥師惟嚴惟衛今其爾衛謂之何其驚吳國之屠牛夫豈不戒今惟我謀我見不知其大為深視爾不臧既其淺小爾無回遹慢我大謀爾惟人乃知兵盜何自作飭躬繕甲惟永逸於微勞將誨盜以慢藏兹其可保自昔淮甸惟寇之區由保伍之有成用不取遺於道瞭然大可見矧夫王命之從生若曰嗚呼有衆爾尚一乃志比乃聮礪乃戈兵斆乃擊刺非徒井閭爾賴爾惟怙衆以寧家劉侯作牧於廬江由保甲安身報國焉知不嗣於來今浹旬民豫以成軍惟甲午湖州到任告文宣王廟文某聞諸夫子曰政者正也子率以正孰敢不正某雖不敏願學焉交政之初敢以誠告到任告諸廟文某蒙恩假守實與神祇分掌幽明吏逭隂誅願於其身不於其民尚免天災以供天職敢與神約臨涖之初祈晴祝文終嵗勤動望屬秋成苦雨霖霪害於農畝將無吏之初政無以上當天心罪不敢逃尚幾開霽事不可緩神之聽之滴漏祝文挈壺解紐夙暮不時舊尹新之敢以成告謝晴祝文天作淫雨厥咎惟人人欲之從神之聽也顏斯厚矣答貺隤然諸廟祈雨祝文某薄德不知政務治失其道積怨於民魃作亢陽致天之罰咎惟自作民罪伊何瘡痍未瘳重之虐政庶幾一稔尚保室家愾惟潦田既淪於水高原且固望絶秋成凡厥庶民藴蓄何有奪之廪食父母胡生神道依人母靳膏沐維時降監雨彼稻粱小吏有愆不敢逃責諸廟謝晴祝文素秋之孟旱乾浹月田疇多荒兹疵政之纍也敢不知罪請禱於神神之聽之三賜霡霂雖大田禾黍既云無救而沾濡沮洳少霽惔焚凡以為民非誠心之所格也願終此惠以福斯民災不可移及身是幸祈晴祝文仲秋之月陽愆不雨神降甘澤浹日成霖虐吏積寃不能終始神貺過隂之罰黍稷將不潰於成顧此民勞又奪之食神道正直其賜哀憐閉北吁嗟庶幾晴霽吏身之沴毋纍於民祈晴祝文麥粃於田繭寒於館又窘隂雨傷如之何屬當多事之秋妨農已甚奪之衣食害無大焉禮禜嗚哀庶解倒懸之急積疵罔赦惟爾有神謝晴祝文旱雩而雨雨禜而晴吏道多疵神專為德就民粒食神無負焉寬吏傷民為災已大祇增慚畏何謝神天磨李固碑文興元南鄭有漢故太尉李公之碑其刻文皆古佐書遺漢之珉寶也紹興中楊太尉安撫利州東路其鎮在興元作舍落成求石為志甚亟尉無以塞命磨是碑應之太尉聞而怒曰而豈不知李太尉先漢名臣以豫武人置諸有過地爾謀黜尉不果世以李公之正漢碑之古字書之法刻畫之妙所宜傳示來世永永無窮一旦沒於庸人可為碑弔走則異是故以悱辭發之其辭曰太極渾渾權輿地天兮嘻品物流行貞於本原兮嘻總總林林孰識其然兮嘻顧之無後望之無前兮嘻竅心有九莫適窮研兮嘻開闢來今胡得而言兮嘻胡得而言是以為全兮嘻自古在昔聖人有作兮嘻無遵一行無宗一學兮嘻絶地通天際克寥廓兮嘻窮仁非仁至樂非樂兮嘻蕩蕩無名無能以度是以為先覺兮嘻君子愛人當以道兮嘻皇極神人元灝灝兮嘻萬古無言寧可考兮嘻老也後天名壽考兮嘻惟后侯之修直兮嘻亶降精於神靈兮嘻冠芙蓉而纓蓀兮嘻懷明珠而佩蘭兮嘻更漢祚之中衰兮嘻蹇正揆而扶持兮嘻紛蕭艾之塞途兮嘻抵黨人於囏危兮嘻名礫坯為美玉兮嘻指驪珠為魚目兮嘻余執金而寧斃兮嘻視衮章如牢狴兮嘻揭車余服有遺芳兮嘻萋斐貝錦漫成章兮嘻地久天長同久長兮嘻美好善兮惟昔人嘻豐碑勒銘兮頌成仁嘻嗟嗟節義兮等太虛之無垠嘻是何為兮為堅久之道信嘻亘千齡而猶建兮其誰知夫至真嘻秉山石兮鄭之尉嘻知李公兮達其意嘻磨貞珉兮明至義嘻唯公道兮不以兹而興替嘻子瞻之栁伐於山東兮嘻仲尼之柏殘於杏壇兮嘻一聖二公復何非兮嘻樹伐碑亡行當不疑兮嘻誠臺禮復文嵗在執徐季旦之月武昌令東甌薛季宣始種竹於縣庭之背人力斯至清隂已成誠臺出焉既賦而銘尉番陽王君楠揚袂而起曰我聞之有功斯賞有德斯報惟今之宜猶古之道在昔庭背鞠為茂草公有意於蒔竹也而猶豫未決我實言之曰竹之為物雖瑣而道可重也古之人謂不可一日無此雖宅猶種焉况於公府朝夕從政之地荆榛翳目可不於此君圖事邪君實我聽而修篁鬱然爰及崇丘誠臺立焉公雖樂其雅正而無意於作也我實督之曰誠臺天成不可無記緑竹蘢蔥賦之何已公乃記而銘之賦而稱之然則是林之茂是臺之峭與公二書之就皆我之成也可無報哉季宣矍然而應唯然而興進肅王君與子偕行遊竹林放誠臺睇角山指寒溪貫疏篁而為䇿託清風而言之季宣若曰於假爾尉其靜聽台言惟天隂隲下民作之元命惟皇建極惟若道之攸行積於善厥有常福懋乃績先王致當功之賞越我有宋基天命賞惟天子之攸司我不敢知曰爾稱乃職帥守監司惟爾進我亦不敢知曰爾勤厥守府州掩若之善惟我縣庭舊蕪穢我乃荒之時惟爾言豫有獲我未有佳思怠於文時惟爾言啓豫不逮肆乃邑之清靜涼颷襲於青林誠臺卓然惟爾德我修辭之有立亦惟爾言有賴我微賞罰之柄疇報爾之勳今台方試從爾遊登臺極睇窮於濛汜沃方寸以山川惟篁竹之蕭然共灑落圖惟爾報公其敬哉嗚呼我聞曰大德不報大功不賞余惟報功賞德將恐弗稱於丕圖皇致曲於有誠非徒語擬祭海神英烈忠亮李公文德裕繄惟先君奄有四國中葉不綱棄其典則兩河要都既於寇賊太極降精亶生英特先宰元和事功昭晰德種我公若禾之植生長綺䊵克歧克嶷執德不回優遊不迫鄙笑鯫生棘圍角力分甘粗官禮毋苟得坦坦仕途何假羽翼險夷一致敢忘王國帝與善人補天立極攸敘彛倫捕燔蟊賊笇無失籌輩疑儔惑巨孽根蟠靡功不克剗平八州返日於昃四主三宗參功契稷觳觫太牢敢為姦慝黨與成羣點訛白黑壇級公宫栫之荆棘射影藏形詭浮鬼蜮疾首惟公誓將誅殛有志弗伸殄讒誰堲畫蠲南桅遊乎不測正士心權盜形得色公身不容公道彌直哀哀太宗於焉迹熄凡今之人死兮神寂惟公英靈乾乾不息見夢王人言歸先域生福斯民禮有報德混漭滄溟允宜配食乃眷眘川慶善家積屹峍祠房爰都爰宅人到於今受神惠澤曰惟李君秉心踧踧望公屢朝罔間夙昔無言不酬無求不獲下走承先敢踰先閾願言事神永永無斁哀韓大將軍文紬塵編於史漢閲君王之行已茹千古之沈寃悵伊誰之一洗當秦嬴之失鹿名雄項而劉雌自夫人之一盻從虎噬而龍飛乃若浮罌絶魏囊沙決楚拔趙燕連駢闐幟鼓兹衆人所共見音吐登壇興亡前列君去蕭追多竒計出乃有獲於先生長者之論而絶未睹明君王之臣節者也方季入關不王實遷蜀漢卒士思歸漼然泮散未將之前夙聞高論收失職之三秦異道聞於子午孔費從而成憤竒正生於垓下巍巍乎登漢業之隆一怒同諸文武將軍之有勳勞視鷹揚之尚父矣至若狂巫之相心石之如義斬鍾離金堅不渝亟奪軍而莫憾奚末路之為濡蓋漢夙有圖王之志而王殊不有漢氏之虞也伊青齊之新定田宗存而未服推權道而王之誰有心於形迹屬鴻溝之講解剻成侯之攸信軍始罷而還徴胡後期之為問噫權臣之謀豈有典則不幸遭焉坐成罅隙躡足封而猜已甚西楚裂而事彌乖竟襲齊而王楚遂縛楚而侯淮惟執成於騎虎威已重而身危非五湖之得泛寧前悔於先幾擅興者有誅匪曰興於兵衛謂告反足信如彭王之踵至傷哉從中之計誰聞誰語所謂伊人孰為輕舉矧狂謀之先定可為人之劫取將呂氏有謀漢之心曰翦除其牙距嗟不用蒯通之言端有待乎後之知者於乎仁義之途非可覬一馬而侯功大見參夷之滅繄人事之常然於何誅於欒説弔遺胔文武昌西江東為邏州川匯崢嶸旋回復流在嵗辛巳水縮黃花有胔隨波委暴汀沙尉王行而見之蹙然內感扁舟返棹謂走哀憐走曰今尉之官職司循撫使生者得其養死者歸其所暴骨遺胔舍豫曷主固以職斯其舉也乃命手力周壽馳而視之培而瘞之重為文而弔之曰嗚呼天邪胡為乎若子而然邪物歸於盡子何暴骨江濡邪念子之生為女為男為智而亷為鄙而貪為壽而愚為仁而夭為妄而顛為賢而矯為罪惡貫盈為君子不遇為仕而遊為軍而戍為賈於川為商於路為天誅所及為非命致然為水化江為覆溺於船為身不自聊求死於淵為令失刺姦成子之寃是皆不可知也痛子之生孰為魂魄及子之死不自收其骼氏姓為何子孫何處歎室倚門曷知曷語風波蕩子腸鳶魚甘子肉收而瘞焉曽何為乎子之榮辱也嗚呼人生莫不欲貴子貴為能居莫不欲富子富為能守莫不欲高子高為能益莫不欲壽子壽為能久素骨流沙雖身不有則富貴高年果不堪為不朽矣子知之乎子之暴骨猶不自知葬之中野於子奚為露食鴟鴉藏食螻蟻生而告子子寧自喜及子之死亦復爾耳於子何加於我何得然則收子之骨者何哉亦充吾之隱惻而已慿耳目之見聞蓋已不勝其窄矣由今而寃知庸有極嗚呼哀哉神其自釋浪語集卷十五
