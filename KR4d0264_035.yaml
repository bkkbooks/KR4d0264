body:
  text: 浪語集卷三十五宋薛季宣撰附録祭文祭薛公文失名學博而知約行髙而不孤政嚴而無苛論正而不迂求之海內未見其比意者天生斯人其必將回狂瀾於千載之絶學建功名于萬里之亨途才小試而奪之蒼蒼者又何其忍乎公之守吳余在故廬我來剖符公歸里居固嘗服髙風於踐履之舊聽宏論於謦咳之餘方將日親直諒多聞之益盡讀篋中未見之書曾不見於幾日驚死生之頓殊寓哀情之短章灑衰淚於生芻嗚呼吾老矣不知餘生尚復見人物如公者乎前溫州州學教授樓鑰登門最晚受知獨深人之云亡百身何贖解組東去莫與執紼英爽如生諒歆菲誠知己之報嗟無及矣尚行所知母羞九京淚盡辭窮嗚呼痛哉文林郎新平海軍節度推官鄭伯英嗚呼哀哉我之知公越自少年有友王子數為豫言五代史記公謂簡略綴拾舊聞期於改作公於是時年未弱冠有志史筆豫用駭嘆辛巳之役如風振蘀大將鼓旗亦既前却公令武昌屹然不移以義訓民曰死守之大江有靈俾君不試堅壁睢陽公實有志我益壯公恨未識面亦恨斯世知公者鮮屬豫塵第獲交常路尺書渠渠亦莫豫顧歲在甲申公歸里居始獲從公公始我知日探所有莫見其止如以􅎆杓㪺彼大水乃昔知者得公之膚古有成人繄公之徒聖賢不作道喪文敝問學事功岐而為二事功維何惟材與力問學維何書癡傳癖學不適用用者無學為己為人在在乖錯公之探討専用律身推而放之於以及人公之初召訪我嘉興公之再入遇我宣城凡公有言我得預聞上劘君德下紏世紛匪亟匪徐不詭不迂斷如五穀可以療飢豫曰有聞將理兩淮將畀公郡爾其往哉公曰其然當辟置我我曰從公夫豈不可儻公作牧式殿大邦臂指諸郡庶成厥功若曰専城旁非已助豈謂掣肘將敗乃事縱公有材能整其旅小敵之堅竟亦可補既而聞公將命行邊雖曰有旨招集屯田公所經見罔不歸告欺誰亡實情狀斯暴出守苕霅民匱財殫席不暇暖畢以上聞帝實謂子知無不為如彼側目惡觸其幾奉祠之章旬月十至帝不庸釋姑俾須次公之來歸謂我時難瓜時俯及當力丏間嗚呼哀哉辰浹不見忽謂疾革亟往撫摩僅餘微息瞪目視我欲語不能反席之頃失我良朋嗚呼哀哉公之絶欲亦既十載罹此短折無乃刑制周子千里唁我以書謂觀吾徒貌狀多癯潭潭其居廣顙豐頷時則使然在公何憾我每念公音容具存望之凛凛即之粹溫縱論今古衮衮忘疲旁及制度援筆而圖雖則云然匪曰公長公之貟貟諸葛子房治官訓農理財練兵厥有成算亶其可行我曰冀公大竟設施勉策駘鈍與公馳驅今其已矣屬之何人運斤成風袖手莫陳公之大節亦既炳炳特書大書合垂久永我獨有見謂當少須匪曰畏禍道有卷舒鹽梅之適不惟其同公尚有知我願折衷修奠矢辭我匪我後硯墨屢乾悲哽莫就遣車在門有慟為誰上為天下下為己私嗚呼哀哉嗚呼哀哉友人張淳鄭伯熊公不夀臧誰為之咎怨天尤人非公攸好公之問學君舉嘗道傾倒見聞窮極要妙我敘二者一語奚了由前怨尤由後襲蹈故皆略之惟矢情抱自從公遊十見重九半其合離常恨靡久我所未聞公必析剖一事一辭據引精到語妥理從出我意表針過質疑每見輒有論所未及詎一二數直諒多聞其倫蓋少求之古人實我良友我齒視公十年以老公之敬愛每知其舊我履險難公鋭為救進退揚譽公不輟口信義昭然具見肺腑淳伏窮閻茹藜待稿伯熊亦歸相與執手每一念公西望引脰公守苕霅始半厥考俄改毗陵其次尤後歸為我言數奇不偶説則多矣於時何取行亦丏祠從容農畝待次來歸已過我料况聞斯言不悶而笑私度會期豈一昏晝接陪數四别恨方澡若公立朝以及出守中間兩淮銜命奔走論議罷行辭受去就渴欲問公曽未詳扣何事之違而變之早我悼宋卿尚餘戚繞今又哭公不但疾首同誦此辭以薦羞酒宣教郎知溫州永嘉縣主管學事周􅸒天之不佑斯文耶如公之道學而施不昌天之未欲平治耶如公之宏才而用不彰議論之醇撡履之剛根六經而貫百子闡微言而蹈大方破千載利欲之謬妄掃諸儒章句之披猖蓋書無不通事無不練一話一言皆絶人意表橫騖别驅窮極幽眇而究其旨歸貫之以一初無相去之尋常施之政事見之文章真所謂不見其短又烏知其所長者也斯人也而不及中夀福善禍淫奈何乎蒼蒼嗚呼公之聲名海內所尊然形之於外者不苟徇乎哀俗之見藴之於中者人亦莫究其所存故不知者以為徒剛而已也而知者亦僅稱其直諒而多聞知公之深不過幾人言之則大而似夸矣尚何言哉相向而哭失聲者蓋嘗登公之門者也巵酒之奠相與悼善類之不幸一哀而出涕又何止為薛君而已耶永康友人陳亮諉陳傅良余行天下竊有志於斯世其道德純明可為師表者執贄進見獲聽微言於下風退而從磊磈不羈之士接杯酒之歡嘯歌舞往往自以為一世之雄至於山巔水涯與夫窮閻委巷之間抱負所有分與世絶足所可及則必一見縱力不能自致而聲音姓字之與通晚將歸休始獲見公握手一笑語言從容心滿意愜俯首來東三年之間竟安此窮人誰不死寧公是逢又殺斯文昊天鞠凶生乃如此實死與同俯仰皇皇未知所從持服黃度始度試官於永嘉友陳子以尚賢溯先生之髙風每服膺而拳拳逮承贄而敬謁接清音之琅然天光發而外映神邃靜而藏淵繄下學兮上逹左右取而逢原會九流於一貫瑩神機之通圓憫俗學之失傳徴空言於簡編儻詩書之不可應世殆孔壁之無傳若夫樂易疏通沈深靜専其識造微其動中權有如風雲之感遇籌帝幄而經綸乎徐元直李鄴侯之事業而識者謂度為知言嗟乎先生其已矣倐訃音之來前將人世之迫窄乘箕尾而追羣仙吾獨哭而不知其慟恐斯文之鬱淪彼後生之謭薄將安仰夫北斗與泰山也念公昔者中都庀官我將從之公使淮堧改轅而歸日俟公還公出守霅我有家艱公書招我我行實難伊會之期夫何屢遷天實毖兮一見維余頑兮莫鐫奔九原兮不作咎昔行兮匪虔嗚呼哀哉殮弗與兮舉衾葬弗助兮引棺命炙雞兮漬酒侑以文兮涕湲學生迪功郎新臨江軍軍學教授王遇人孰不有死有不知慟之為誰兮聚散固有常奈何名世之不易得兮昔遇聞風既久幸及今而登門兮吁嗟我公世方倚以為津梁兮始學志古今人心則在乎天下兮清明曠達樂於聞善而大者逺者不與兹兮百未施一乃如斯而已兮則行則藏固不在先生兮學未及傳而其徒將焉之兮世道寂寥而復不憖遺兮先生固不亡而斯人其何如耶矧遇小子受教未幾兮豈謂一見而遽為終身之恨兮臨風一酹以發吾哀兮上為天下慟而下以哭吾私兮迪功郎潘景憲詹望門牆十年未得幸會適諧兩旬几席乃爐乃陶乃子乃姪公曰可教我懼不克嗚呼哀哉事會之乖痛將奈何違離三月來音不嘉爇我菽粟剪我桑麻我復貧窶其何以家嗚呼哀哉季夏之書誘掖勤卷中塗留梗與訃俱前匍匐不及彼蒼者天尚曰庶幾執紼南阡嗚呼哀哉友朋亟告大葬有期枚日不十病軀莫支銜哀抱愧矢心此辭話言容止終身之思嗚呼哀哉惟公問學純粹汪洋洙泗家法澗瀍王章百不一施衣冠閟藏繢畫日月我謂不量嗚呼哀哉豫末小子稟資滯固淵源有來竊識所據登門之晚失節之遽敢不夙夜無忝所付從政郎新漢陽軍軍學教授石斗文迪功郎新州昌國縣主簿主管學事髙宗商迪功郎新州司户參軍石宗昭自周之徂棄置儒術百家競馳莫返於一豈其作者曽不一二匪時之還儻復旋否我宋教興斯文是矜是長是崇是庸是登乃生諸儒以倡學士六經之明千古之祕藍青氷寒裕我後昆惟今之人有如先生顧其髙明而實中庸顧其挺持而乃疏通靡粗靡精天人之際彼佛與老無用其技靡違靡從九流會同探周索孔萬法之宗匪今薦紳而才之匱繄吾先生一有根蒂匪今師友而道之孤繄吾先生與事物俱天之生人夫豈無意不大於施尚淑其類忽焉其已其夢其非日既零落忍不是遺是之不遺亦已太刻我酹之慟匪直報德迪功郎紹興府上虞縣尉沈煥自公罷湖守東歸煥因循不拜書仙里諸友兄亦不時通問九月十七日所識道越來語他事及公不祥之傳煥直意其妄不復致詰走書問楊敬仲王孚仲未報樓大防書至其月二十八日也嗚呼平生師資之地考德就正未測津涯不圖當公春秋鼎盛使煥哭諸寢也公之問學者驗於開物成務已而知其不可為而返學問閭里日寖光明謂不得於彼而可得於斯豈意亦不得於此耶道學未立於至聖之域朋友未得其傳授之全公志願未竟而終天乎命也夫何為使朋友至此極也煥拘繫尉曹不獲奔赴與朋友相向而哭羣居而經薄奠逺將不任悲愴尚惟精誠鑒之迪功郎新差監提點製造御前軍器所門孫觀正惟公少抗志以不回學師心而有得眇淹貫乎九流探淵源於六籍召見帝所名震京邑逢辰之休取位若拾報政藩輔改臨吾州眷邦人之景慕庶不鄙而來遊嗚呼惡蔓易滋嘉殖難遂何痬之進毒不浹旬而委蛻嗚呼埋璧於山沉珠於淵返其本真公寧復還弱冠之好厥惟姻連公疾我同我後公先云胡不悲幽思茫然緘詞千里淚如迸泉學生陳牧之等不得其心視其所履不知其人觀其所與唯公之學浩然莫窺其裏吾考之其身則家人起愛鄉人起敬雖好議論者無所容其訾毁而求之當世則賢者欲與共學能者欲與共功自豪放猛起不屑為人下者亦悉意下風而願為之役使公無利勢無借人辭色獨何為至此牧之等所以交淺而情深未及委質掃門事公於生而相與哭拜奠公於死也於乎與歸或燠休而居或傴僂而趨或危言駭世或清濁分睽殷鑒不逺宣政蓍龜公則往矣我還我車嗚呼哀哉嗚呼痛哉夫安知天之不果欲喪斯文耶公之不果有意於髙舉逺逝耶然則和扁復生竟何為哉竟何為哉而今而後敢不遵奉法訓以無負我公也修身養性之餘誦詩讀易以畢此世也上以事父母下以聫兄弟而不復有志於其外也死而有知尚其念之友張淳等曰身可愛矣愛或以愆攻非其攻禍不踵旋誰謂在公而有是焉如公材識於今幾人聞博記強貫穿古先制度之微探賾索玄時之所須天曷舍旃公遇吾儕如父如昆疾莫克救徒涕滂然六載還鄉會接未歡若何永違一轉首間來陪弔賓可無一言展我哀思其日必涓姪溶溶少不天早失所怙每念及此痛切骨髓義方之教賴有叔父矜我孤惸視我猶子載撫載育載詔載語顧我愚戅欲報無所胡為微恙輒成酷禍庸醫妄投竟爾勿悟屈指三日噬臍莫措命也何如天乎無據而今而後私門誰主痛腸摧割何所怨訴奠以告哀涕淚如雨兄髙嗚呼士龍克配天地人謂伊何存誠之至嗚呼士龍克紹周孔人謂伊何傳道之統卓然自立匪求已知貌醜言訥恬不干進博學有守遇事敢為凡此四語廷臣薦辭一遇君相草木知名吾家之瑞天下之英規模宏逺粗見一二文章事業乃其餘事一歲三遷驟至五馬殊不驕人姁姁儒者德修於已翕然丕應有不逺復密受以正神針一砭釋我至疑分雖吾弟道實我師摻别遊宦寤寐心馳間致安問真情寓詩尚覬顯用行其所學為世指南覺所未覺乞歸待次雖慰拳拳應酬百日未暇盤旋如何輕信不憗於天比喪兄弟復悼惠連罹此劇禍我心傷悲一動一靜如將見之生平行事宛類叔父有子可託以光宗祖嗚呼士龍衆方仰德溘然朝露孰不嘆惜嗚呼士龍我病方愈來告斯文慟哭流雨姪純伯僅仲任綱紹叔似繹洪瀛泳濬等嗚呼蒼天何寃如之匪直我家我身疇依惟我叔父道學一時識與不識祥鸞瑞芝况我諸姪同門共枝勤誨勤載金玉與期恩則我父義則我師純等不肖小人其歸奄忽無疾遽兹永違天或可問報施何虧寓誠告奠罔極之悲鴈蕩山能仁寺住持僧從瑾惟公踐履超古皇前混不自衒人無知焉在彼在此如珠走盤迫而後動乃見一斑應用便便隨寓光鮮渾淪罔測孰窺其全我之與公久契忘年歸來一笑風月依然約我秋後蠟屐登山得書旬日遽聞飛仙虛空失色萬口莫言公之所詣同地同天死生來去實非變遷惜乎此道未能廣傳我裒策杖逺出林泉公其鑒兹杯茗爐煙判府趙祕閣墓祭文維嘉定十五年歲次壬午十二月乙亥朔十五日己丑朝請郎直祕閣知溫州軍州事趙汝譡謹以清酌庶羞之奠遣迪功郎司户參軍趙希恮致祭于故常州知府寺正薛公之墓夫尚德憲賢扶教勵俗古人下車蓋汲汲焉不敢後也惟公幼孤自立有志當世學本六經貫穿百氏贊猷制幕行峻守端試令巖邑識先備完宥府薦賢前旒錫對淮邦阻飢杖節補外振業流民既居且安王心載欣進秩歸班才髙論崇為時所忌再領州麾遽作長折我生最晚恨不同時朅來假守景慕風規官針有常阻拜公墓歸心典刑寓誠樽爼尚饗挽詩朝散大夫權知溫州軍州主管學事莫濟今代論儒學如君德最優是非千古事出入九家流身殁言猶在官卑志未酬儻令興禮樂端不後程仇承議郎通判溫州軍州主管學事廖圭大學傳伊雒深仁浹武昌談兵劉子政論事馬賓王屢見溫辭寵頻懷輔郡章籌邊殊未究遺恨滿江鄉迪功郎充溫州州學教授徐嘉言卓犖才名四十秋屢攄良策動宸旒傾河議論誰能敵唾手功勳未肯休方快九霄摶鷟俄驚長坂蹶驊騮天公應叱六丁下著述文章盡捲收宦遊將適鄭公鄉衆説膺門氣味長欲效然明略陳語那知叔向罷登堂毗壇不試新分竹霅水空瞻舊茇棠天不憖遺何太早忍看埋玉向高岡迪功郎溫州司法參軍魏興祖奧學傳伊洛生平盡此心多聞推子貢一唯妙曽參知識皆文武才猷冠古今斯人苦斯疾吾黨恨尤深至理窮微妙經綸特緒餘鄂城資豫備淮甸得安居慨慷陸公奏詳明賈誼書今辰恨埋玉慟哭滿鄉閭朝奉郎新權發遣廣德軍主管學事何伯謹剴切憂時論慈祥濟物心賈生年尚少平子慮何深徒抱經綸志俄聞訃告音朔風傳薤挽誰不淚霑襟迪功郎新差監提點製造御前軍器所孫觀正眼看嘉木斧斤摧竹路凄涼孰不哀髙論每聞前席聽讜言曾欲挽𥚑回膏銷果見龔生夭公嘗受道隱者然有濟時之念晚乃迫於從宦不能卒其業蓋其業得已而人莫知也芻奠空悲徐孺來從公受業多一時少俊者儒效俗傳今若此蒼蒼福善竟悠哉迪功郎溫州司户參軍陳樞才耆舊襄陽傳風流月旦評此翁尤間出當代總銷聲遇事皆迎刃遊談可伐兵孰知死諸葛英氣凛如生朝董科名纍向雄利祿儒惟公傳洛學處世類齊竽湖外嚴兵戌神幾析使符恍然成昨夢一弔束徐芻從政郎溫州録事參軍錢泌蚤悟傳心學精微造本原讀書殘萬卷落筆動千言孤邑驗英略流民感至恩顔亡雖可痛自有不亡存偉矣萬人傑精神運五兵議屯謀甚婉料敵智尤明謹厚唐劉氏淵源漢賈生斯文嗟遽喪哀挽淚縱橫月潭甄龍友驥不由窮巷龍曾演瑞圖衣傳袁道潔夢接邵堯夫四十年全未三千行豈無飄然何太速愁殺奠生芻士龍不應科詔好周易學贈别文章妙分擕六見秋真書藏相府循吏説湖州不作三公入同誰八極遊朔風吹壯淚應滿藕池頭士龍有送龍友赴西外宗教序今留梁丞相府有子才而美知君死不亡刀圭徒有驗兵法豈無妨玉樹新埋沒金丹舊渺茫魂兮來止些極樂在西方士龍深於內樂復嗜談兵亦知佛法云徐定今古名流特地奇生平學術得真師纘將管樂為操藴論切周唐入設施經理逺橅歸使節撫循中道稱藩麾堪驚四十成埋玉嘆息襟期有未為行狀宋右奉議郎新改差常州借紫薛公行狀曽祖庠皇不仕祖強立皇仕江寧府觀察推官纍贈左光祿大夫父徽言皇仕起居舍人公諱季宣字士龍姓薛氏其先世家河東後徙福之長溪亷村至唐補闕令之後義自亷村徙永嘉而光祿公始顯四子司封郎中嘉言敷文閣待制弼及舍人皆第進士昌言為婺州通判舍人從胡安定先生學以丞相趙公鼎薦仕於朝秦公檜相定和議舍人廷爭移晷中寒疾卒母胡氏安人後十三日亦卒公六嵗而孤撫於待制伯父長任以官公從待制宦逰四方尚及見故老聞建炎紹興初將相大臣趙張韓嶽諸公事有當世志而樂道其人年十七荆南安撫孫汝翼辟書寫機宜文字孫氏藏書多公一意講説紬繹絶不治科舉業有隱君子袁溉道潔少學於河南程先生聞蜀薛叟名求得之道潔翻六經諸史以觀叟叟笑曰子學博而寡要其相授受嚴約蓋如此湖湘間皆高仰道潔公師事焉繇是益自斂制充養蜀制置蕭振辟公務為蜀部將有狠訴統置者公當以犯階級法幕中或論縱之公以軍政爭不克謝去盡其祿直買蜀書以歸為鄂州武昌令故太尉劉公錡鎮鄂渚公論武昌形勢直淮蔡今見戶三千五百弓級財五十人士軍十有九人宜蚤為備因陳屯田分戍保伍以寬民力之策會有旨營田一卒二十畝縣官盡征之公告鄂守宋似孫曰是非漢屯田之會漢兵民也使之屯田豈曰不可今非惰遊不從軍彼不素知田家事驅之緣畝必不樂曩時王彥營田湖外遣二十將潰者十有八而况盡征之乎且齊民在野環營以軍殆必爭利成閔益戍夏口公曰宜戍武昌備申蔣故樞密使汪公徹宣諭江淮公上書言自權臣柄國士氣索然趙張之放莫敢尚德嶽飛之死莫敢趨功今卒有意外之虞誰其禦之因論邊事甚悉及營田宜亟罷歲餘敵犯襄陽而還兵圍光甚急汪公問策安出公白以蔡要害得蔡則光圍自解成閔克蔡光兵果遁于是敵東道傅合肥王權退次柘皋李顯忠亦不利却成閔束為援公乂白蔡不可失若乘勝拔潁昌道陳汝直趨大梁則廬兵不戰可屈捨蔡援廬是棄投機之會為連雞之栖淮沔虛矣又曰敵空國來冦苻秦故計也今我不可復戰惟當畫江固守而以奇兵遮擊首尾阻前顧後勢且自沮輿尸一決其禍必大初公試邑年甚少方天下無事豫陳邊備諸公唯唯未遑也居無何邊吏倉卒興發騷然柴桑遷孔子宫避戍將嘉魚壞學宫繕壁壘江湖間稍騖於武事矣公顧以扣糴傷農三白郡解印綬去為奏罷糴乃已比冦至蘄黃以南列邑無寧居守令竊議內徙宦江湖者歸孥相望於道公乃議死守不去與民期曰吾家即汝家一旦有急吾與汝偕死敵民亦自矜奮三分其衆更壁縣下二總首帥輕舟守安樂口白鹿磯且乞師於汪公得甲三百樓船十艘氣聲張甚渡江來歸者數千家江西恃以無恐諸公繇是翕然稱慕交章繼薦汪公虛幕府官以待比其入也欲以公朝行在所轉運判官王逖劾罷信陽守檄攝軍事既解縣爭欲辟留滿考改官公並辭不就其後營田二十卒田二頃歲得榖六百石廪錢乃七十二萬米一百八十石闊逺或數百里一壯馬負二石榖從以騎士詣諸大軍其費視民間買榖價相若士苦之往往道棄榖去又壅民之水利而掩其善田州縣莫敢如何營田終廢金兵既去明年蔡果不守尋復議和朝廷於此亦棄唐鄧封略止於沔南矣蓋一如公言公治縣事為之經理必曲折盡人心不苟作差役宿戒里胥披籍次第條二十餘家未差已差别為行且疏其強弱某堪一役某堪再役於其末自任某人某歲月序當役以付案案任之付録事録事任之乃差差已有訟不均舉其籍俾訟者自覆視五民五家為保二保為甲六甲為隊若干隊為總不以其鄉分畫惟地之形便諸總旗各為色槍杖皆中度舍姦有禁詰盜有賞其以巡徼遇非常死事者為棺賵之復其家田若牛租三歲總首得與令相問報専達不關縣胥巡尉非縣檄毋得擅征甲士在邑五日一閲官賦之糧而賞其最鄉惟所欲偶習於總首之射圃母贅聚其為士若大姓附編存之勿籍俾輸財與力佐治戎器其將輸信陽也凡一千八百人致米九百石行必為陳日暮各以部曲相地頓舍以槍為壁鳴刁斗設伏公食飲卧與自同役夫醫護病者不偕至不宿府檄治寨屋百數區泝流二千三百餘程日立辦公借材於縣人度長圍大而加償之賦鄉挽舟而五分之以居者之四供行者之一匠人亦各俾一鄉償其僦費舊財賦名色異為籍雜不可省察為都籍以提出入之要鈎托侵姦以除無名之斂諸案事以其劇易分日久近為旁行譜每以日加申稽知其決否故不決宿吏于次抄積不銷為走厯日揭其名數以便主簿者之鈎考而因察其惰民賴其便凡公意趨鄉鼓舞從之豪民衛仲堅王安道更數令不能役及是以次受代安道語人曰失今不為焉能俯首他令創鄂營八百架總隊請分事公約剪伐某所茅某所木竹應日而集縣有鍾吳二盜魁大府屢設方略求不能得公以諉總首王宗元竟諭吳降之為買田産改業為民鍾滋甚俄斬之而至信陽之役選徒鄉屬而邑二隊首固請從曰吾知縣出矣吾何敢處是役也露次不驚訖歸不惰道邊梨棗下無迹邊民謂閲過軍多矣未有若此肅者他所區處民吏皆化服類此調婺州司理參軍居五年用樞密使王公炎薦召公懇求之官不報於是上在位七年矣入對進三説一審政本躬細務親鞍馬以權為經本末倒植况動煩宸衷國論靡定權移近密衮職日輕降人侍從之虞毬獵固寵之術意有所偏患生不察臣願陛下以靜養恬略小圖大遴三公之選責以進人才張綱紀延端直之士與之講問學求治道歸有司之常務屏馳騁之細娛沉潛待時安往不濟其二冗官冗兵周官惟六漢别九卿自東都有尚書六部唐置內諸司使增員浸多有職蓋寡諸路帥臣在古州牧國朝以來置轉運使副判官提點刑獄提舉常平茶鹽總領市舶坑冶茶馬諸司屯駐之軍又别置都統制牧伯之任分為五六而州之知通縣之令佐不相統臨各行其意臣之所謂冗官此也太祖皇帝增置禁旅今禁衛與諸州禁軍是神宗皇帝立將兵之法今帥藩係將禁軍是太上皇帝收諸將麾下作三衙御前諸軍今大軍是四者之外復有弓手土軍役兵今惟大軍勝戰將兵而下廢為𨽻役臣之所謂冗兵此也苟得其道更張不驚顧陛下處之何如母憚難也其三虛稅武昌絶戶屋租屋亡而租在德安嶽飛牛租牛亡而租在永嘉海溢濱鹵之田田亡而租在凡此宜悉蠲除以惠貧下當是時上志在中原王公炎方數進見語合驟登用薦公甚力公未至則謝曰聖上天資英特羣臣亡將順緝熙之具幸得遭時不能格心正始以建中興之業徒僥幸功利夸言以炫聽今俗皆曰中庸大學陳編缺簡然物不兩大心無兼慮天地之道忽略根本而奔走軍旅之間舛先後之序而却施之雖復中夏猶無益也比至王公再見縱談邊閫事公曰既曰論兵竊嘗評以孫子始計之書未見其可方今人人異意不可謂道災異數起不可謂天以江左爭中原不可謂地以貪御驕不可為將將不恤士士不安法不可謂法集一圖九古人寒心求之時賢誰能辦之况今三衙御前舊卒略盡江南白丁何以持久常平錢米在所虛數以此饋師其能繼乎兵交民困或未免蕭牆之悔即幸勝之方上勞廟算伏惟以仁義紀綱為本至於用兵請俟十年之後如曰上獨斷耳去位可也又曰天長可以入維揚清流可以向六合淝水可以下合淝北陕之隘廬江之徑武昌之近新息歸之地商於子午南達梁洋岷洮東近威茂用兵所徑忽不之備然而獻計者但曰無患非偷則狂有旨改宣義郎差知平江府常熟縣明年大臣數言上復召審察公固辭其友人祕書省正字劉朔以君命相風厲公雅意亷恥道鮮自一介不宜菲薄遂白丞相陳宣公俊卿曰周公寧以戲封諸侯開成王不敢玩人之心鄼侯身追亡將移漢祖嫚士之習古人格君之業於是乎在有如假令以匹夫之節一感上意亦足以報陳丞相罷免虞公允文相益趣發不懈自召命下公請之任六七不報又請奉祠不報積十有八月而後就道至數日則欲引去侍從有留行者除大理寺簿方虞公鋭意於事一時言利言兵自衒鬻者甚衆守經不阿或被罷斥公見之晚猶冀幸一改聽始從容引番吾君説趙相國公仲連事諷以功業缺然咎在進賢未廣置助不善丞相亦矍然為敬頃之乃反覆切論徼功太速興事太輕速無逺橅輕則中廢經濟天下當與天下士圖之陸陸鄙夫嗜利自市試迹前事今皆反繆願公易慮勉終毋為但悔會江湖薦飢民流淮甸邊州又有言歸正人相屬者上命帥臣漕臣共安集之逾月奏不至丞相召公問所當施行俾條列將議遣使公皇恐謝不敏且淮事難隃度固以問因疏數端一責成帥漕母以遣使使者所過州宿留循行未周已及春夏二新民未見便輒勞苦州縣百役為是懷故鄉無長居之心宜略如孫吳屯田都尉故事自立營壁他繇使勿與三宜先定要束誠以闢地而已縣官一無科焉悉以故陜西弓箭手法復其租四歲榖既登漕司致布帛茶鹽凡民所須率令榖價視物價稍昂以博糴就藏屯所為後備因言若辟屬吏若移用錢米若括隱田兹事體大必遣使非選擇重臣持節漕帥州縣何以協使翼日有旨以公將命淮西公即言流民或前散寓山谷依大姓聞今使者必相擕持聚城邑仰食於縣官卒有纍萬之衆將安取給且請以淮西諸州縣係省不係省錢一得以便宜調度朝廷尚難之公重謝不敏尋得旨以見錢米一萬緡二萬石行不足用聽次第以聞是歲乾道七年也十有二月八日公至合肥明年正月抵齊安布宣天子勞來德意分遣才謹吏徇視大抵安豐以東來者略已𨽻主戶矣即撫勿徙沙窩以南稍稍未有適鄉公親履阡陌間審度山澤曠地以為合肥廢墟可因以設險斷柵江保巢湖而舊黃州古邾城也路直垂瓠置莊旁近異時冦不能潛師徑度乃與安撫趙善俊修復三十六墟且於舊黃東北置二十有二莊居之凡合肥戶三百四十有四口一千九百九十有六勝耕夫八百一十有五為田三百七頃八十有四畝齊安户三百四十有一口二千一百一十有一勝耕夫六百一十有四為田四百四十有四頃五十二畝率戶屋二間二夫牛一頭犂耙鉏鍬钁鎌刀如牛數三牛犂刀一每甲二轆軸一車其受田人種子錢五千其家以口老壯少為差賦米及秋止凡費錢緡二萬米石六千而夀春歸正及自占若為𨽻農於大姓者亡慮振業三千餘家要約明具器用便利廬舍有伍疆場端正場圃牢牧陂溝路橋率皆治修病醫死葬所謁輒得遷如歸居乃請還始大臣白遣數人各試其備邊計畫往往設飾為辭以上功天子雖不盡然之姑惟闊略庶幾或報效公之行也至固始求所謂北歸人者凡一百十有二家皆土著數年而新附者財五家光守宋端友更以舊户比新户詭為奏甚者賊殺歸人掠其善馬公即劾奏端友謾蔽時端友進置環列根柢連附不可撼動人皆危公奏上天子獨怒下其事於理將窮竟問治端友暴以夏死繇是頗疑邊臣亡狀而所白遣大臣顧無欲得事情之意於公齊安之請還也命核麥田留纍月核已又命視鐵錢事公歸對卒罄所見聞復上首論州縣田簿甚具而淮地實不加闢臣諏其故大抵主户占田一畝數頃輸租僅斗斛耳而履其産彌日不遍既不能自耕又害他人耕何以聚人保境宜令剗請以徠逺民來者務得居者患失主客力競將無曠土再論今邊郡田野荒蕪勸墾文具總首空設搜除苟簡循淮而南則有和糴則有鐵炭則有建康草料之征勞逺虛邊以資江左守將數易以苛繼苛一郡三邑二令罷憒險厄非一不過合肥歷陽居巢三戍夫以陛下規略而稽誤至此或者外治不可成歟臣愚妄意推本自夫不訃而謾為而後外以鹵莽報不思而出令而後外以難行寢號為責實未免徇名則趣辦皆循名之人志在大功却規小利則迎合皆規利之輩誕謾者敗而不誅諛恱者察而不去言既上壅人多自營宵旰十年竟亦何補臣謂內治不修無以整外惟望責宰輔以坐論其原收賢材以博圖其緒兼聽虛受以去壅閼朝廷正則疆埸理矣惟陛下留神三論左右之人為欺囊橐邇為援則逺堅大為間則小肆彼其刺候辭色占揣意鄉開闔將迎莫狀其巧託正以行邪偽直以售佞薦退人物曾非誦言遊揚中傷乃自不意一旦孚號揚庭雖出睿斷喜怒氣焰已歸私門齊威之強不在阿即墨大夫之誅賞而在毁譽者之刑毁譽無證則不行焉胡能禁欺陛下誠幸聽臣無自立我收骨鯁棄軟熟察此非難乃悉數骨鯁軟熟情狀上極開納讀奏至齊威事進曰臣觀近政非無阿即墨之斷奈何毁譽之人自若上曰正待理會公益口疏治邊非是曰買馬亡幾習至盜馬敵將寄聲問故卒索歸之國家何至乏此而自傷體若是詔即罷買又曰日城淮郡以臣觀之未知守所合肥板幹方立中使督視卒卒成之乃者臣行過郡一夕風雨􅑁樓五堵歷陽南壁缺而居巢庳陋如故乃聞有糜緡錢巨萬而成城四十餘丈者陛下安取此乎上問千秋澗何若對曰始臣行時方冬水落澗不勝舟比歸夏潦時至江澗合流渺然矣是將焉用上曰聞亦險要對曰若以兵法言之漸車之水足以制敵藉此為險無乃不可又曰外事無足道咎根不除抑臣深憂左右近侍隂擠正士而陽浮稱道陛下誠明聖儻因貌言萬一垂聽臣恐石顯王鳯鄭注之智中也又曰近以好名棄士臣伏思念好名特為臣子學問之纍人主為社稷計惟恐士不好名誠人人好名畏義何鄉不立上悅連言極是於所汲引士皆旌賞先是上即道遷移兩官又除寺正有自邊來覲者則曰薛某凡可為國知無不為而又注意傾洽以聽罷行如響故諱缺失者相目矣數日除知湖州朝辭劄子論科折不明示數輸送不即除籍及祖宗分鎮強邊之法曰陜西為五而統於永興河北為三而統於大名有塘濼方田稻田榆塞為之險城堡寨鋪為之防弓箭社弓箭手蕃族熟戶為之羅落他路迭戍悉受節度幕府州縣惟所辟自种折二氏外别帥則以三衙若三司都轉運使為之能績效驗入備政府夫地分則守固勢連則情不隔權一則足以有為賞明則知勸光堯中興沿邊置鎮茶鹽之外舉推舉之將以固圉計亡易此臣願按行成憲舉衆建鎮守統帥不限文武忠智是使且無拘文無要小利無以日月為斷卒章尤剴切曰方今諛媚成俗舉世尚同泛觀設施歡曰盡善偏辭先入異議不斷百辟盈庭幾成孤立是日奏罷上留語良久公將退特溫辭寵藉之大旨謂書生姑息而辦事者以苛為能煩卿輔郡冀以中道理之公對曰臣學於師以事陛下惟中道爾上曰如此朕復何憂公至郡踰月户部奏言諸州經總制錢皆出場務酒稅雜錢分𨽻以納今多隱餘分𨽻不盡得自便咨用請更為令監司納厯州縣以凡日收錢托實係厯分𨽻否則劾聞令下吏相顧莫敢建明者公獨首奮為當路言之其略曰舊額凡雜納錢以十分為率分𨽻四為糴本六為係省錢其後乃始增以二分分𨽻總制錢是時州縣未病之也然亦寖尋於奇羡矣久之乃衰羡錢校數歲之最為額以十分分隸之七為總制增稅三為在州錢愈非舊比已復積有上供月舂大兵打船修船六分贍軍移用降本竹木等錢科色不勝繁矣而𨽻額如故既不足以應計且歲費彌廣郡用彌匱繇此場務鑿空以取贏雖有奉法吏思以寬弛豫民而不得騁若復𨽻額外之征掇其強半官吏自救不給民病甚矣且以湖之都務糴本係省初為錢二十三萬五千六百有奇自總制之起為錢五萬八千九百有奇與故合猶日課二十九萬四千餘錢而已重以七分增稅為錢二十五萬三千七百有奇又重以上供若大兵之須凡四十萬八千錢有奇使今旦旦得八十萬錢充入經總制之額其餘為上供諸雜須錢且患苦不足况不盈此鄉所謂係省在州之數悉闕亡有約此推見他管庫盡然郡將安仰如不得已宜以日收錢先樁上供諸雜須之餘乃係厯分𨽻庶或可行不然不敢奉詔版曹恚逮庶胥俾持條法詣曹自解公辨益力臺諌官感發相繼疏爭之上乃寢前奏湖無苗米餉軍歲糴七萬一千五百餘石為緡錢二十一萬自添差武臣路鈐轄下至進勇效士一百七十有一員軍員五百三十有一人其廩稍為緡錢距二十萬以他經費合往歲凡用緡錢五十二萬餘舊例烏程歸安二縣折丁錢歲十三萬緡七年有旨減折丁錢大半其以全輸者聽以明年除之是歲所失亡十有餘萬而大農和糴六萬石以銀交子髙徒欲用錢二千省得米一石郡不忍裁市直則當補錢萬六千緡僦載之費不與焉益以就祿八十有三人不啻為緡錢二萬明年郊祀進獻賚豫之幣齎亦以二萬緡數凡增費十萬三千餘緡以亡加增大都闕緡錢十有五六萬公曰是雖劉晏將奈何亟請於朝乞以市直償民糴錢乞以折帛紬絹錢撥除折丁錢乞汰軍改徒寬郡乞節冗長差授在郡裁三四月自抗論分𨽻後執拒大事纍數論日與權貴征利為敵雖或依違郡民少蘇而不能平者滋衆獨賴天子簡記所以見覆護甚至始公嘗薦某人有材識他日某官闕員宰報擬數姓名以進竟擢某人為之郡丞趨時好干政引章避之為易他丞嘗遣中使有所亷察浙西諸郡獨不入境用是故不取輒動危之然公歸志決矣即稱病請奉祠不許會除代一月章五上已又旬四改除知常州公方鄉用人人期待行所學不數月久勞於外還七日乃出守守十一月罷罷歸之百日以疾卒年止四十邦君朋友暨後學哭之過乎哀四方賢大夫士千里交相吊也公之學蒞事唯謹宅心唯平其燕私坐必危然立必嶷然視聽毋側欹雖所狎笑言不以戲自著抄書及造次訊報字畫不以行草几篋筆研衾枕屏帳皆有銘豪釐靡密若苦節然要其中坦坦如也故其寡欲信於家行推於鄉正直聞世而居無以逾衆人公自六經之外歷代史天官地理兵刑農下至於隱書小説靡不搜研采獲不以百氏故廢尤邃於古封建井田鄉遂司馬之制務通於今或者疑公之博蓋其所自得精一矣名流問質或往復纍數百言旨要無二大抵以古人小學神而明之大學之道傳逺説離故漢儒守器數章句名家小知穿鑿異端之徒乃一切屏事忘言後已髙淪虛無而卑者滯物卒不合合歸於一是為得之讀其書知其博之約也公不求聞達於人有一長薦稱必備居官不出位遇大事義所當為斷為之嘗掇拾管樂事為傳語不及功利平生所推尊濓溪伊洛數先生而已告學者則曰母為徒誦語録有浪語集若干卷書古文訓若干卷詩情性説若干卷春秋經解若干卷旨要一卷中庸大學説各一卷論語小學若干卷資治通鑑約説止若干卷九州圖志止若干卷餘未就公患五代史闕略修之亦未就若陰符握奇山海經古文道德焦延夀易林及劉恕十國紀年莊綽楪蓍譜林勛本政書姚寬漢書正異之屬皆校讐為之敘其文精確趣實可以濟世其經説不並依先儒其校異書必解剝其不正者娶孫氏父汝翼也初汝翼與舍人友相得舍人死汝翼遣書待制自言吾有女才且淑異日宜善事夫子吾將以室起居之孤比歸公婦行皆應書公卒其友人張淳欲悉遺衣服以斂書銘如古法能俯聽蓋不失公意云一子曰澐補國學生公以卒後之百四十有四日十有二月壬申葬於吹臺鄉慈湖之原傅良丙戌丁亥歲授徒城南公間來過教督之明年謝徒束書山間屏居公又過之問治何業竭已所以得對公曰吾懼吾子之纍於得也即詔曰宜若是歲己丑冬遂往依公具區滆上卒學茅茨一間聚書千餘卷日考古次今中明年秋試大學公適赴召於是鄉諸生及他邦之友咸在又日相與從公居逰凡七八年間違公久者惟公使淮守霅川時為然然亦率不一二月書命輒至至則具道所言與行事故世多知公詳莫如傅良今取其出處事言之大關治道學術者為狀餘不著乾道九年十二月某某日門人迪功郎新泰州州學教授陳傅良謹狀墓志銘宋右奉議郎新改差常州借紫薛公墓志銘東萊吕祖謙河東之薛有降居閩之長溪者世久不能迹其始既又家於永嘉其長老之記曰唐補闕令之後遷焉裔孫以庠馴行聞於鄉庠生強立始修補闕之舊續其祿蓋終江寧府觀察推官贈左光祿大夫光祿四子嘉言尚書司封郎中昌言通判婺州弼敷文閣待制徽言起居舍人公諱季宣字士龍起居之子也起居學於胡文定公安國而雅為趙忠簡公鼎所厚其立朝皆有本末最後秦丞相檜建與敵和起居自殿坳直前引義固爭反覆數刻中寒疾以卒夫人胡氏亦繼卒於是公生六年矣伯父待制收鞠之任以官公幼逮事過江諸賢聞中興經理大略已能知喜書從老校退卒語得嶽韓二三大將兵間事甚悉志尚犖犖與常兒異年十七起從妻父荆南帥孫汝翼辟書寫機宜文字汝翼善袁溉道潔虛郡齋迎致之公遂委已師焉道潔及登河南程夫子之門聞蜀隱者薛叟名晚遊蜀以物色求之莫能得末至一郡並舍有叟旦荷笈之市午漏下輒扄其户道潔從壁間覘之方隱几默坐意象靜深冏諸鄰則曰是鬻香薛翁不知所從來道潔亟欵門以弟子禮見旦往陳所學叟漠然如不聞久之乃曰經所以載道聖人作經以明道子何博而寡要也始與深語未幾復捨去道潔漫浪沔鄂間諱其學絶不為人道獨於公傾倒無所靳公自是篤意於學道潔語公伊洛軼書多在蜀時同郡蕭振方制置四川乃往為其屬道潔期至蜀授以書會偏禆有誣其所部將者公請正階級法議不合謝去遇道潔於峽而公既出蜀矣調鄂州武昌令武昌號難治連敗數令公年尚少郡將部使者易之迎謂是邑久不可為子敢當之乎公曰獨患在上者以縣為可為今知其不可為則可為矣願寬其銜轡俾得自盡皆諾之科徭興發率以公故獨不及唯論和糴始不見答欲解印綬去卒體其誠得罷公既獲乎上民賴以寬有廢置皆爭趨和乃大治版籍期會簡稽出納悉就繩尺密而不煩嚴而不迫金亮未叛盟公白其長視其要害前備禦輒不省及真郊稍稍即公咨計畫光圍方急公策之曰搗蔡則光解既而成閔克蔡果解圍遁金亮悉衆瞰江詔成閔還師入援時汪樞使徹宣諭荆襄公告以閔得蔡有破竹之勢盍守便宜勿遣令閔乘虛下潁昌徑陳汝趨汴都敵內顧且驚釋此成業而聚屯相仗鮮克以濟不能用閔晝夜馳不頓舍後騎能屬者三之一而陳蔡新附諸城亦踵相接復為敵失江淮仕者大抵無固志紛紛遣其拏繫馬庭木以須公獨留家不遣誓與民俱死縣故多盜鐵冶營田碁布諸鄉亡命姦人出沒其間所治即孫吳故宫自古江左重地也公念除盜上策莫如聯保甲疆陲有事唯素整者可不亂乃訪求河北陕右弓箭手保甲法及淮西劉綱保五要束計論甚其會有五民之令乃出其法行之五家為保二保為甲六甲為隊因地形便合為總不以鄉為限總首副總首領焉官族士族富族皆附保蠲其身俾其財共總之小用諸總必有射圃民暇則習無蚤暮之節盡禁蒱博獨許以擊刺馳射角五日更至廷閲其尤者勞賞之里閭皆以武力相高氣俗一變旗志總别為色槍杖皆中度候望干掫不幸死者豫棺復家三歲諸鄉皆置樓盜發伐鼓舉烽以相號召瞬息遍百里盜為衰止總首白事吏母得預追胥興發一以縣檄為驗環邑溝瀆不泄夏潦沒道在事者病之役大莫敢睥睨及保甲成天大雨公出坐通衢傳呼總隊具畚鍾賦丈尺三日而畢武昌自是無水患市多火公戒諸隊鈎繩梯缶各專其一暮夜倉卒隨用而索甚速且整火不能災縣治白鹿磯安樂口皆置戍復請於宣諭司得戰艦十甲三百羅落之守計定訖敵退人心不搖大軍之屯州縣客主不相能多為鬨暴公曲得其歡心以事至者必微見曲直而明假借之皆大喜且大服誓死以報內郡發粟輸邊縣當餫信陽公部以往先是諸將出師部勒無法或侵苦之道殣相望文吏董役者則又甚焉民見調輒與親戚為死訣公語父老曰子弟相從者吾受其無咎皆憮然陽應既發隊伍次舍悉放行軍親與役夫同苦樂病者挾醫護視始輕所劇負則皆弛之增劇則以馬若輿載之病者未至隊長母得即安號令齊一道上擔肩相差如引繩無敢少蹉跌觀者相語曰此誰將軍部曲耶乃整肅如是既而知為武昌白丁相視歎息斯役也在行者千有八百役罷死者一人跌傷者一人其餘全歸還畀其父母妻子如初約當是時諸公爭知之舉辟交至公一無所就從吏部銓婺州司理參軍召對首言治體有本末願遴三公之選責以進人材張綱紀延端直之士與之講問學求治道乂論中都官員多職寡牧伯之任分為五六唯大軍勝戰將兵而下廢為𨽻役因道逺方民瘼甚悉王樞使炎前在鄂熟公治行及是新得政求助於公公語之曰上天資英特羣臣幸得遭時乃忽略根本而奔走軍旅之間盍以仁義綱紀為主至於用兵請俟十年之後改宣議郎知平江府常熟縣退待次具區滆上明年復召審察公固辭徘徊踰年乃就道至則除大理寺主簿是歲江湖大旱流民往往北渡江邊吏復奏淮北民多欵塞者虞丞相允文白遣公行淮西收以實邊公持節勞來耄稚滿車下為之表廢田相原隰復合肥三十六墟立二十有二莊於黃州故治東北以户頒屋以丁頒田二丁共一牛犂杷鋤鍬钁鎌具六丁加一錅刀每甲轆軸二水車一種子錢丁五千廩其家至食新罷凡為户六百八十有五分處合肥故黃適等而合肥贏故黃三户户授二室受田之丁合肥八百一十有五為田三萬七千八十有四畝故黃六百一十有四為田四萬四千四百五十有二畝會其錢若米之費財二萬緍六千石流民已為大姓有者仍𨽻其主户就撫之並邊歸正者振業之合三千八百餘户始公以乾道七年十二月至淮西反命以明年之夏計道里往來與察邊郡檢麥田核鐵錢之屬専於田事者僅數月墾築冶鑄斫削皆受成於公賦役省而功堅度可支數十年位置向背經緯條達民生所須不外索而足淮人謂耳目所未覩公曰吾非為今日利也蓋合肥之墟邊有警因以斷柵江保巢湖故黃實古邾城地直蔡衝諸莊益輯則西道有屏蔽其措意深逺矣光守宋端友自上招集北歸户一百十七公至固始驗新民止五户餘保塞數年端友混新舊戶為一籍以幸賞異時有以善馬涉淮者殺而要奪之公亟舉奏端友有挾人謂章且不下語聞上感悟屬廷尉治方窮竟端友以憂死習為媒者皆悚而虞丞相始不樂公矣故為多端縻公以緩其歸或迎説公見上盍少自絀母與當路者忤公曰上遣我視邊固欲得利害之實吾而自惜誰當為上言者卒極陳之且曰臣根本其敝不計而謾為而後外以鹵莽報不思而出令而後外以難行寢號為責實未免徇名則趣辦皆徇名之人志在大功反規小利則迎合皆規利之輩誕謾者敗而不誅諛悅者察而不去左右為欺囊槖邇為援則逺堅大為間則小肆其薦退人物曽非誦言遊揚中傷乃自不意齊威之霸不在阿即墨之斷而在毁譽者之刑臣觀近政非無阿即墨之斷奈何毁譽之人自若上欣然開納公復進曰外事無足道咎根不除抑臣深憂左右近侍隂擠正士而陽浮稱道陛下誠聖明倘因貌言萬一垂聽臣恐石顯王鳯鄭注之智中也又曰好名特為臣子學問之纍人主為社稷計惟恐士不為名誠人人好名畏義何鄉不立上是之隆興以來經理兩淮受遣者且數十輩發御府金贈聽施置自便閲十年鮮有當上意者及公使事有緒恨得公晚進官二等除大理正側席遲其至顧問紬繹奏請論薦皆報可聞者意公且用矣居七日出守湖州入辭語益懇到上慰勉遣焉公既數摩切左右而湖多權貴人田宅事與相加尤數公平心問理如何不為變益害公合力撼搖上記其忠獨保持之始至書獄多入死訊其由則棄市者民間或竊祠之名傷神惡少遂輕相讐殺不顧公亟屏絶之死獄大減條境內淫祠次第除撤會去郡而輟土俗小民悍強甚者數十人為朋私為約無得輸主户租前為政者或從臾之公嘆曰郡國幸無事而鼠輩頡頏已爾緩急之際將何若取其首惡黥竄逺方民始知有奴主良賤之分初陳亨伯割諸道留州錢輸大農號經制翁彥國復附以總制嗜進者競裒斂以應賞格已而遂定其多數為歲額州用日削而供億稍餼校軍興前五六倍吏骫法摘抉無遺算猶廩不能給至是户部令提點刑獄司以厯付埸務一錢已上皆分𨽻經總制如式諸郡被符摶手無策相顧莫敢先公獨言於朝曰自經總制立縣額州縣鑿空以取盈雖有奉法吏思寬弛而不得若復𨽻額外征掇其強半郡調度顧安所取殆復為他謬巧重取之民民何以勝户部鐫譙愈急公爭之愈強臺諫亦交疏助公遂收前令不布凡可以紓民力者知無不言如論和糴賈賤請更平直徙汰軍寬州添差𨽻郡者止今見貟後勿遣函封相繼多格於有司則以病謁祠朝廷惜之却其請至八九知不可奪改知常州未上以乾道九年七月戊申卒於家年四十官止奉議郎娶孫氏子澐補太學生公之沒其友張淳治喪程以古禮公配孫夫人能順聽不違里中觀法焉十二月壬申葬於永嘉縣吹臺鄉慈湖之原自周季絶學古先制作之原晦而不章若董仲舒名田諸葛亮治軍王通河汾之講論雖有牾有逢有支有别千有餘年端倪蓋時一見也國朝周敦頤氏程皓氏程頤氏張載氏相道與發揮之於是本原精粗統紀大備門人髙第既盡晚出者或騖於空無不足以涉事耦變識者憂之公之學既有所授博鑑精思幾二十年百氏羣籍山經地志斷章缺簡研索不遺過故墟廢隴步移日以驗其迹參繹融液左右逢原凡疆里卒乘封國行河久逺難分明者聽其講畫枝葉扶踈縷貫脈連於經無不合於事無不可行涖官隨廣狹默寓之於簿書期會之間其僚或聯曹經時而不知公為儒者也平生所際文武細粗不同未嘗為町畦崕岸而去就從違之際守義不可奪言兵變化若神而在朝每以不可輕試為主驟見疏快軒豁潛察之自律度嚴飭雖倥偬札翰正楷無一惰筆少年豪舉既知學銷落不留省其私泊如也公為人平實質確本於簡易行於敬恕而豎志強立又足以充踐之善類方倚屬公而公則死矣詩書春秋中庸大學論語皆有訓義他所論著若九州圖志通鑑約説之屬藁方立而未究也歲在壬午先君子守黃公夾江為令歸以公所為語祖謙固巳矍然自失後十載乃識公於朝一見莫逆如故交其葬也張淳既志其壙澐復請詩以揭之喪不能文今既免喪不死矣其可不為公一言乎詞曰隊緒茫茫獨求諸野有條有源晝夜不捨繄道之窮匪其尚口不耀其章而躬自厚出孚于長于長于君將一施之乃沒元身故吳之迹故邾之遺既堙既平其尚有稽浪語集卷三十五
