body:
  text: 浪語集卷二十八宋薛季宣撰策問擬策一道并問問寓兵於農古之大政也周家之制則周官司馬兵法具存田以九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以令貢賦軍以五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍鄉有州黨旅閭比伍遂有遂縣鄙酇里鄰王之六軍偏取而足司馬法以夫三為屋屋三為井井十為通通十為成成十為終終十為同同方百里提封萬井為三萬家革車百乘士千人徒二千人又謂一甸出一乘車甲士三人卒七十二人參諸禮經名數乖錯自求其説互有不同管仲以內政治齊制工商之鄉六士鄉十五三分齊國以主三軍五家之軌為五人之伍十軌之里為五十之小戎四里之連為四小戎之卒十連之鄉為旅帥五鄉之帥為萬人之軍五鄊帥公及髙子國子為之夷吾之書復有伍鄙之法三十家為邑十邑為卒十卒為鄉三鄉為縣十縣為屬五屬立五大夫一國三軍革車至八百乘長勺之戰桓公稱有帶甲十萬車五千乘得毋誇過其實乎禮法皆周家遺書管氏一家之説而其乖忤至是作法之意寧自有不同歟將由久逺之傳疑抑考求之未至云爾當周之末諸侯自為兵法備矣有如齊之募士晉之前行秦之陷陳越之君子逮戰國之騎射技擊武卒鋭士與夫楚之二廣鄭之魚麗吳之徹行一陳一軍自有制度曷為本始一皆無稽而妄作耶周家賦卒之差及其車乘什伍諸侯之為變亂其同異多少為如何雖唐李靖嘗略以告文皇其詳未有所究願為遍舉商榷於篇對善乎荀卿子之論兵曰仁者愛人故惡其害之義者循理故惡其亂之仁人之兵聚則成卒散則成列延若莫邪之長刃嬰之者斷兊若莫邪之利鋒當之者潰圜居方止有如磐石觸之者角靡而退以桀詐桀猶有巧拙之幸以桀詐堯誰肯賊其父母謂桓文之節制不足以敵湯武之仁義故論兵要舍湯武何法哉今之兵家一本之孫吳氏孫武力足以破荆入郢而不能禁夫槩王之亂吳起威加諸侯百越而不能消失職者之變詐力之尚仁義之略速亡貽禍迄用自焚是故兵足戒也孔子於子貢之問政告之以足食足兵衛靈公之問陳對之以爼豆之學聖言天逺厥有旨哉商之頌曰武王載斾有虔秉鉞如火烈烈則莫我敢遏苞有三蘖莫遂莫達九有有截周之武曰於皇武王無競維烈允文文王克開厥後嗣武受之勝殷遏劉耆定爾功二王皆以弭亂為功宜其兵之無敵於天下也商事逺矣愚於牧誓見武王用師之法不愆於六步七步不愆於四伐五伐六伐七伐弗迓克奔以役西土易之所謂師出以律古之聰明睿智神武而不殺者夫故舍周家之制為兵皆苟然之道也周家制兵之法其要略具於周官其詳司馬兵法言之法雖穰苴之書然皆當世常行之事耳目所際去宗周為不逺其言不悖於禮不可誣也去古既逺二書皆出亡逸之餘然舍禮法而討論周家則將焉所取制明問下及疑其乖忤之多意其作法自有不同考求之未至焉者撝謙挹損蓋將以啓發諸生乎愚以為禮法無有不同患不深考第加考索自無乖忤之疑周禮之所謂縣即司馬法之所謂成也縣都以令貢賦之法終同以施疆理之政特名號有不同耳司馬法甸出戎車一乘甲士三人卒七十二人即稍人所掌丘乘之法甸田八里加方十里是為一成之田三分去一為田六十四井以五百一十二家出車一乘士三人則一車七十五人之賦一成百井為三百家車一乘士十人徒二十人則一同萬井為三萬家車百乘士千人徒二千人之賦周家兵賦率七夫而賦一兵一通為三十家固二分而去一矣甸四分而去三則一車七十五人之數其曰如千家者謂非兵賦之常不得已而大發之多不加於是也一士二徒之設率三十家而置一吏禮有卿士大夫胥徒之制非甲卒比矣論禮者以謂賦卒有天子諸侯之異未之詳也孫武固謂興師十萬日費千金內外騷動怠於道路不得操事者七十萬家周之賦兵於此可見雖不得已猶不至于盡發者先王忠厚之至不欲窮民之力也齊之內政以八百乘之國而立三軍車八百乘軍萬人加工商之鄉六為軍萬二千人兵車十乘卒七百五十人則周二兩之制五屬四十五萬家以供三軍之賦率十五家而賦一兵則周賦兵之制雖損其數用之夥矣桓公自謂帶甲十萬車五千乘通國之衆未為誇也周之賦政始於丘井而成于一甸什伍之制萬世法也六軍之法即六鄉之法六鄉之法即六遂之法軍國異名而不異制簡易之道也管子固謂內政之作卒伍定乎里而軍政成乎郊軌里之法不大更於鄉遂伍鄙之法往往因於夫屋然其間不能無異而惟徑便是取軍國殊制至于變法遂更求速得志於諸侯此內政存心之可誅者李靖以為管仲實修太公治周之法為知賦政之贏虛矣愚嘗謂王制之在天下後世有不可得而變者紀綱是也有當時不能自無出入者法度是也言之兵陳則紀綱什伍也法度卒乘也知紀綱之不可得變而法度之可以出入者而後可與言兵乘車七十五人周之制也武王牧野之會蓋戎車三百乘虎賁三千人甲卒四萬五千人戎車少而甲士多至倍加於常數然則周法之在當世猶未免乎有時而出入也諸侯變周之制為可責矣隨時而具卒乘王法何誅乎仲尼於魯春秋於何以書作丘甲用田賦皆變周也周法甸出七十五人為三甲士則丘何一甲之有成公之作丘甲則是甸賦百人賦以丘乘為差哀公初以田賦則是井地之內民力無遺藴矣丘之賦五家而出一田之賦一家而出一地不加大民不加多恣其變更而何強大之能益故論春秋之法雖齊之內政猶無所逃其罪而況竭民之力哉周禮之在諸侯諸侯之事守也范昭不能犯齊之禮知齊之不可伐仲孫以為魯秉周禮言魯之未可動諸侯之守其國舍周禮何居乎當周之衰周禮蓋不行於天下矣諸侯略能循周之法雖甚無道猶足以為強率意妄為未有不底於亂亡者蒍敖擇楚之二廣廣有一卒卒偏之兩左轅右追蓐挾轅而戰以轅為法百官象物而動軍政不戒而備周制五伍為兩四兩為卒楚徒多而車少車之一偏有卒與兩一車之徒二百五十陳曰荆尸未見其變周者李靖以為挾轅之士一偏為五十人兩二十五人二廣凡一百五十人靖號知兵殆未之思也鄭子元繻葛之陳為左右拒前偏後伍伍承彌縫前偏輕也後伍重也五矩方也周制偏車二十五乘伍車百二十五乘前輕後重鱗次彌縫陳曰魚麗未見其變周者衆多而備魚麗豈謂是乎夫差陳於黃池百人以為徹行百行頭皆官帥十行一嬖大夫一將軍三十嬖大夫軍帶甲三萬吳有徒而無車所為方陳亦未見其變周者申公巫臣以兩之一卒適吳舍偏兩之一教之戰陳吳之軍陳其本諸此巫臣車徒二乘以兩之強半豫吳杜預以謂豫之兩士與九乘車何其乘車之衆也愚所謂諸侯略能循周之法雖甚無道猶足以為強者齊與三國是也趙以騎射變戎服齊以技擊受賜金魏之武卒以中試復家秦之鋭士以功賞相長荀卿固以為干賞冒利庸徒鬻賣之道未有安制矜節之理故謂齊之技擊不可以遇魏之武卒魏之武卒不可以值秦之鋭士秦之鋭士不可以當桓文之節制趙武靈王僥一切之利騎射變於古者又荀卿所不道何足論哉惟秦商鞅耕戰之法獲五甲首而𨽻五家什伍之意或存焉尚不害於兵農之一卒兼六國此其效歟以詐力相為雄長一變先王之法制愚謂未有不底於亂亡戰國之兵是也齊之募士五萬晉之前行四萬秦之陷陳三萬事不它見名獨見於吳起之書越之習流二千教士四萬諸御千與所謂君子六千法不詳見事獨見於外傳國語募士前行之號其內政之所寄被廬清原所作之異名乎疑以傳疑未可謂必然也管子固嘗以教士目內政之軍其名或在是乎陷陳之力著於韓原之戰君子之用效於笠澤之師是皆恩信有以結之其詳不可得聞矣循周之故效如彼更周之制害如此周之禮法為天下之紀綱者顧不大乎雖然紀綱之於周猶為法度而已如其仁義此周之所以得民存乎其人則禮樂詩書在也文中子之居家也不暫捨周禮曰先師以為王道極是也如有用我則執周禮曰先師以王問禮法其敢舍周禮而對策問二十道問語曰道不同不相為謀夫彼重則此輕天下必然之勢也孟子之拒楊墨苟氏之詘孫吳與韓氏之闢佛老凡以此也夷考其事乃若有大可疑者老子與孔子同時莊子與孟子同時老子之書推提仁義絶滅禮樂宜得罪於聖人者而夫子從之問禮至欲竊比老彭孟子當戰國之時尊聖人之道楊墨之外雖若神農之言桓文之事尚皆辨其非是莊周詆訾孔氏曽無一語及之至若荀卿論詘孫吳而躬未免於談兵韓愈深闢佛老而與大顚彌明之徒逰從多所假借西方之教蓋百家之晚出者其清靜類莊老其自了類楊朱其慈悲明鬼非樂不喪又甚似墨者之言三三柏子之機乃其極至語也然實本於宋鈃惠施公孫龍堅白異同之辨宜儒者之所不豫王通祖述六經之學斷然以聖人許之先正司馬公作偈破禪猶是説也學者疑之久矣必有能辨者焉問山河有定勢攻守有定規奕者置碁不定猶不勝其偶況兵乎是故因思歸之衆舉蜀漢之師收三秦從韓魏食敖倉之粟杜成臯之險塞飛狐之口守白馬之津東鄉以爭天下者漢之髙祖也自淮入泗捨舟下邳舉琅邪入大峴滅燕之後息兵三年或開巨野王德仲或通石門沈林子或出淮肥檀道濟或趨陽城胡藩或入武關沈田子通舟於河推鋒入渭者王鎮惡宋之武帝也乘夏水之浩汗泛河道之通流走碻磝覆滑臺虎牢洛陽自然不固者宋之文帝也然或以有功或以取敗又若桓溫枋頭之舉謝玄淝水之役心存恢復勝敗何殊田祿伯桓將軍之謀吳王不用而敗二子遺術或可舉而行乎乃若吳蜀之所以抗中原西有關頭陽平樂漢東有江陵夏口濡須京城之鎮魏人之備不過祁山襄陽合肥三城晉宋以還乃有彭城泗口鍾離夀陽安陸疆埸逺近固曰隨時之宜必若韓雍之襲南沙孫恩之走郁洲滄海之濱古未之方何也都邑之設所以控制方面為民之極六朝皆在建業而孫吳或都武昌南唐或遷豫章將有説也國家渡江雖錢塘為行所留鑰之守實在建康屯戍之兵不及江外出戰入守之計大率不同於古將時異事變已陳之迹而今不足為乎即使兵交淮南守在江面運道難礙諸處交急饋運之出備禦之計古所未暇猶當謀之而况方册所書者乎必欲進圖中原取還舊物退守重江饋輸亡乏雖曰廟堂自有成算學士大夫要當知之願聞規模以觀逺業問古者用民之力嵗毋過三日而庶人在官與夫鄰酇之長無非民也居則治溝井出則奉征戰亦無非民也嬴秦而降大革先王之典惟民役于公上未之有改而民不以為病近世以衙前押綱運主和買而民始困於為吏保正職催科承文引而民始困於差徭熙豐以來更法以救其弊者屢矣而弊日滋甚蓋嘗賦錢免役矣則有役不免而錢之出也如故且州縣有吏豪之病又嘗官雇耆户長矣則有雇直上供而民之徭也自若重之以里胥侮弄之姦法之擾民無甚於此是故小民憚於充役而田業歸於官户之兼并於是有限田之制混差之法且官亦役也而役錢不免仕足貴也而賤役仍在説者謂漢法雖丞相子不免顧更卒之戍果其遺意歟或者乃欲復科耆户長之雇錢則前已有免役之綸後未保將來之役亦恐役人亡賴官事殆將不舉第守官户子孫名田減半之法人情苦不易行使與民户通差則仕者不能兼治而官户之役反重罷免役之上供邦計亦不可闕一仍其舊又將無以寬民意者古今異宜而民不可復役不然何以屢更役法而民終未之便將祖宗之成憲自足遵守而徒為是紛紛不能達其意歟諸生學古通今無所不講兹民事也有司願究其宜問水利尚矣農田之灌溉漕運之轉輸公私之交急也至於設險守國其所繫者益重淮浙當承平之世非惟國用之所仰賴蘇湖熟天下足則又發于田家之諺今也行都所在內奉萬乘外供六師而水利之講不詳號稱十年九潦古者塘堰陂湖之地顧已變為桑田之野皇上究求民瘼知無不為蓋嘗決墟岸之遏流抑沙田之專利通五㵼之堰導申季之港德至溥也而旱潦之害未聞加損或者以謂吳江之岸實障震澤陂湖堙塞漲起橫流決而通之未覩其利漕舟凝滯軍食乃不可闕佃者已為成業立將見其流散興役動衆又不可以輕舉置而不問非安國利民之意也先正翰林蘇公之帥浙右嘗欲起千橋於吳江之岸文正范公守姑蘇則欲盡通吳東入海之浦一則言而未試一則試而不卒逮今百嵗弊云極矣監司帥守豈無愛民憂國若二公者歷年之久何寂寥之無聞也將古人治水之道二公有未之盡不然二公之業未究必有説也鄧艾大田淮甸而魏軍大振何洙復鄧故業而南唐之政遂衰馬臻興起鑑湖鑑湖成而臻敗謝公作堰丘頭淮人比之召伯利害反覆其故何哉中朝鎮守北門舊興塘濼之利水田之阻况此輦轂之下淮沔之塞事切平世將何道而為之諸生論古通今水學蓋所詳練必也農田不失灌溉運道不至艱阻邉險以設民力無困而公私享富實之效豈無術耶願詳聞之將復於上問文王既沒文不在兹乎孔子語也悅周公仲尼之道孟軻説也適堯舜文王為正道揚雄學也虙羲而降神聖之君以十數孔孟曾不之尚顧獨尊於文王周孔非其賢於先聖將以無位故邪揚雄論道而歸堯舜文王然則周公仲尼豈不足法也三千之徒皆學於孔子者而七十子尤章章焉史記所傳七十有七家語所録七十有二其人與數既已不同而其強半言行不聞果何以異於三千徒也叔孫武叔公伯寮毁仲尼訴子路者不聞回心鄉道言行之美而猶見録何歟大戴禮經其言子貢論弟子之行以答衛將軍文子之問其人裁十有二顔冉由求赤參師商滅明偃南宫縚柴孔子自言從我陳蔡及門者十無非門人之傑而其去取參錯不可考知姑為訂以聖人之言則子我短喪之問似非能言之流季路不正衛君冉求附益季氏其于政事何有似孔子如有若唯忠恕如曾參門人之所共尊乃不數于德行又如曾蒧之言志子賤之不欺傳易若馯臂商瞿曾不許以言語政事文學四科所列猶或未之盡邪聖人之門柴愚參魯師僻由唁而皆進於夫子之道耕稼之學至斥之以小人其謹向背之途所成就之速如此堂堂張也其傳乃有堯行而舜趨商之灑掃應對進退流為嗛然終日遊之貴本抑末至于偷懦憚事又言語之子貢推于縱橫之雄以參商之大賢比于孟施舍北宫黝之勇聖人之學何其愈逺而愈不似邪得其所傳子弓子夏子輿三人而已子弓之學於荀卿李斯而廢子夏之傳至田子方莊周而極惟子輿之道子思孟軻皆不失其所傳將毋師法不同本有次第抑其流傳之逺自有幸不幸歟荀卿非十二子而子思孟軻皆未免為有罪莊周論天下道術身與老𥅆關尹猶自列於一家卿言子思孟軻自謂子遊之説周稱田子方語又曰學于溪工古人尊道嚴師安有聞見之異疑信相亂其故何哉諸生學於聖人之門所盡心焉爾者道學之統源流之辨與夫門人髙弟所聞所得厚薄淺深之間宜固知之詳著于篇庶見所藴問三皇皇也五帝帝也孔子序書斷自唐虞論易稱虙羲神農黃帝太史氏紀五帝則首黃帝略少昊大戴氏記宰豫答問亦止於黃帝髙陽髙辛而已古者祖功宗德與夫郊禘祭報之祖皆不在昭穆之數祭之報乃不知為何禮虞之幕亦不知為何君商之三宗宗也遷亳商如盤庚其無逸如祖甲商民求復其政周公亟稱其賢而皆不列於宗周宗武王嚴矣若成王之守成康王之刑厝曾不曰宗其道宣王中興之治德非盛於成康於傳有世宗之名得非三代以前經傳疏略不可得而詳説不然皆彰灼特孤陋未知通乎漢唐以來祀豐于昵功德之論廢而不行求諸先儒史氏之言盛德豐功之君自有不可沒漢七制唐三宗其人也漢之二祖三宗唐之太宗固天下無異見以世宗之窮奢黷武庸詎賢於節儉愛民之景以中宗之聰察雜霸豈多過乎明於成王之昭明皇憲宗皆有始而無卒以武宗之幾振唐室宣宗之政比太宗且無二君晚節之瑕而七制三宗去彼取此何也在漢光武嚴恭祖宗之制遷吕后之有罪躋薄氏之有子所以崇髙廟之配登中宗之宣帝沒元帝之髙宗所以明先帝之賢至於景昭之號世宗之宗無損益焉豈非功德汚隆雖孝子慈孫自有百世不能改者宜乎後世非復異同之論況有先儒史氏之證而天下之議至今曾莫能一豈無説邪諸生其推所由來却我胸中膏肓之惑問孔子嘗聞者俎豆未學者軍旅其論政曰足食足兵以信自謂我戰則克豈徒然哉在書甘誓有之左不攻于左汝不共命右不攻于右汝不共命御非其馬之正汝不共命牧誓有之不愆于五步六步七步乃止齊焉不愆于四伐五伐六伐乃止齊焉蓋陳法也禮大司馬春教振旅夏教苃舍秋教治兵冬教大閲坐作進退如戰之陳曲禮行前朱鳥而後玄武左青龍而右白虎招搖在上急繕其怒進退有度左右有局各司其局蓋陳形也然則聖人果不學歟自軍禮司馬法亡兵家不知有陳諸葛武侯治軍蜀漢推演八陳而載之圖今廣都魚復皆有之其圖行列皆八象地之方一有九六相函如偃月狀晉桓司馬以為常山蛇藝後世曾莫之省唐李衛公始引軍志以明四頭八尾合於古之井制觸處為首之意於是稍可究之然聞先漢都肄已有孫吳六十四陳竇憲常勒八陳擊丐奴矣至晉馬隆又用八陳以復涼州陳協持白虎幡以亮遺法教五營士是則武侯之前既有八陳後亦未嘗亡也今有馬隆握竒圖贊其傳起於風后李筌繪而圖之見於太白隂經又有曰雜兵書頗有黃帝太公孫吳武侯遺術裴緒變而通之著於兵法新令其形皆八不與武侯陳圖相似筌乃定而無變緒又方圖非整俱曰八陳是邪非邪唐太宗尢習于兵其作破陳之樂用代古之武舞八旙四表自以生於八陳干戚振萬之意果如是乎古有鵝鸛魚麗范蠡又論隂陽牝牡隂陽家者亦有太一五陳遁甲八門之術衛公益以六花為十四陳至曹成王則有所謂團力李臨淮則有所謂校旗原本從來將毋皆八陳之變不然各一法歟荀卿有言仁人之兵聚則成卒散則成列延若莫邪之長刃嬰之者斷兊若莫邪之利鋒當之者潰員居方止若盤石然觸之者角靡而退以為綦制安節之理其古之軍陳歟今之為兵固有常教之陳無用於戰講肄而已説者遂謂戰而言陳非知兵者張真源名習戰陳然未嘗用古法乃使大將各以意教止使士知將意將悉士情然則古之陳圖果不足法矣先王為是紛紛無益之教無乃厲使其民乎武侯有言八陳既成自今用兵行師庶不覆敗陳固用之戰謂之無用何也真源武鄉皆古之知兵者何其言之反邪古人以陳肄兵由來何所法象後世用與不用其為成敗何如可以文可以武者聖人之徒毋以古所難言而遂略其説也問兵家之法萬變而其大校有三曰戰曰守曰和以祖宗行之不過各守一事皆能得志於契丹金人之強非徒契丹比也其戰克攻取自其先世則然惟我二宫躬行堯舜之道待鄰國者不一而足三者迭用如環無端校德則彼暴我仁用師則我直彼曲然自海陵渝盟於今將五嵗矣邉鄙之上既未聞朝甘泉焚龍廷之奏雖保固疆場議者猶以為未詳豈古今異宜祖宗之法不可盡用抑和戰異勢三者不可並時而出也諸生學道尊王必有以決天下之疑樽俎折衝為不可勝之略以戰則克以守則固以和則久者有司願與聞之將抉所長言之執政問古者量事設官官有常守而無溢員之患未聞待次而授者降自近世入仕之途日廣而官有常員吏部注官至逆用八九年闕內而職事外而監司亦或以數人而待一官置吏以還無此其弊進士古之鄉舉任子世祿之舊也於今既不可廢軍功以賞戰士鬻爵流外漢唐亦多得人今欲一切暫停則賢愚有同滯之嘆姑仍其故弊將日深諸生講論其宜必有便于今而不戻於古之法國家將采而用其詳著之於篇問三王兵出於農有征無戰故無宿師漕挽之費秦漢用兵疆外芻運力單議者始為屯田世收其利在今長征戰士非征役之士也平時惰遊廢業往往去而從軍使之營田非本情也非人情而強之事將不免於怨謗逃逸或為罷議屯田且不可成饋餉之勞何當休息今欲講明其説將使戰士力於農田而無怨棄之尢或為屯田而無煩於戰士計將安出諸生其詳説之問歷觀前古良將之兵未始非因糧於敵敵之積聚皆我之資也近人謀不及逺故皆計費而後出師費之不供不可進以尺寸設能克敵又多頓挫而不得前堅壘相持費不勝計輸運則民不堪命屯田則軍不樂從進退孔艱遂有中道而廢何術可使士安南畝飛挽不勞何策可以因敵取資而無不給之患此軍計也願條其數之詳問古者天子建國置命卿之相諸侯立邑設大夫之宰雖其職有內外官有崇卑所以司牧其民輔佐其君一也夫天生蒸民不能使之自治相籠以知相加以力而爭競獄訟由此作善為吏者治之有術臨之有政民不之犯至於無欺足矣傳稱子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺三子之為世無能優劣之至於烹魚之詐樂其得所猶未免乎不智之嗤惡在其為不能欺也河聚之沃仍而未革猶不免乎沈巫之虐惡在其為不敢欺也宓子學乎聖師美政行乎單父之域漁人逺在幽獨不忍欺其大夫故雖孔子大之惜其所治之小四科之設其不立於政事何也抑夫三子之政其猶未臻於道將有説乎皇上以舜紹堯以民為天下本置吏二千石必親問之於朝宰守初除亦必中書審察命吏之法何減治古然而不欺之俗未聞如三子者之風不識古今異時將人事之不同也將使今之君子其守宰郡縣致治之美無欺之俗皆不愧夫三子其道何由問六藝折衷於夫子夫子之學六藝不與存焉論語輯録夫子之言六藝之喉襟也難疑問答之辭蓋聖人之門講明道學之奧者詩書禮樂既稔聞而熟道之易者性命之原春秋聖人筆削夫子曽不之及而門人弟子又殊不問何哉仁義之途禮樂之事皆聖人所以教弟子求仁之問不一而止夫子之答不過曰如是而為仁曰可謂仁之方於仁卒未嘗言於義非獨不言然亦莫之問也且先進於禮樂聖人以野人名之後進於禮樂以君子稱之曰如用之則吾從先進然則禮樂之用棄君子而從野人矣空之一語六藝未嘗言回也庶乎其屢空者何謂惟禮文之博約固所以竭其才而曰非多學而識之曰君子多乎哉不多也鄙夫空空如者聖人焉問至竭兩端而告寧與顏子同乎然則六藝之歸仁義禮樂之教顏氏所學聖人之道果何適邪老子瞿曇其學與聖人異今其教與聖人並行者道不同古不相為謀觀於老氏之無佛氏之空則疑若聖人之所以教而顏氏庶幾焉者是邪非邪諸生學於聖人沈久矣明以告我毋祕知言問漢唐文體三變而班馬韓桞為之宗二班工情理之言愈倡六經之學其揆一也然漢之體製日趣卑弱唐文駸駸近古桞文章與時髙下將班韓諸公其才自有優劣邪帝堯孔子之文章於書論語備矣漢唐文士未嘗不以是為宗師屢有變更舉不相似意者古今異世堯孔之文不同後世之作歟諸生飽於學文幸為開辨其惑問漢唐基命中興之主肇造函夏紹復先王之大業雖曰人君之略而其名臣輔佐之績與為多焉時君康其臣佐之功厥有圖贊論述之事在漢髙帝時有若十八侯在宣帝時有若十一名臣在世祖時有若二十八將唐貞觀間有若二十四功臣位次所列麒麟雲臺凌煙閣之所畫至或藏之宗廟為之銘贊其事重矣是宜去取極當時之選史籍無傳疑之謬求之於策則大不然顧或元功佐命維時名人而不在諸公之列中才列將容有濫吹其間又或同功一時而去取不同均有親嫌而棄留特異或不終而尚録或遂絶而不書必有説焉何以不著十八侯名位封國史記楚漢春秋固已不同漢表泗水亭碑同出班固論次自有差别凌煙所圖二十四人尚矣唐書闕一不書曰荆州都督譙國公紹者兩京記稱柴紹功臣贊稱許紹二人官爵無異容或並存而二書有髙士廉焉未詳何者為是研窮其事傳必有之夫古之所以貽今今之所以觀古者惟慿史籍而陸賈司馬遷班固吳兢韋述呂溫皆著書於當代或一人而自相乖背果何以哉諸生探討古文究之熟矣當時去取之説書傳所以不同于此必能言之其明辨之毋略問周道東風化熄先王之迹蕩滅無餘仲尼繼文王而興修六經之教師法後進以為萬世準式當時之士有能潔已而進者殆無所拒絶是以三千之徒從聲而至杏壇洙泗絃歌不輟而七十子者遂速肖於聖人所以誘掖之作成之其亦至矣觀夫子之見互鄉見南子雖佛肸公山弗擾以畔人召之而欲往聖門廣納於此可見子張之非子夏亦有於人何所不容之語陽貨孺悲之見何聖人拒之之深邪一者拜而時亡一者辭而鼓瑟應對絃歌之際厥有旨哉彼夷俟之原壤將命之童子自人而論可以無譏叩脛之云或人之答所為言動其故何邪誅姦回於既死發潛德之幽光真學士大夫之事况在論語之書乎諸生必究其端其明著之無略問人之大倫友其一也取友之際古人難之道之不明友朋道喪曠千百嵗才可以一二數而藝利之交在焉夫莊周惠施皆以老氏為宗其論交固善也周經施墓有斤墁之歎其相與者不薄矣而鯈魚之辨鵷鼠之喻蚉虻之論獨何自而發歟當唐之時李杜韓桞皆以詩文名世單父之樂論文之思雪日之况託子之際亦可謂久要矣而欲殺之句飯顆之嘲實録志銘略不假借安坐甘食見之於書此又不可得而通者豈盛名之下人情不無相軋將相成之道於義固當然哉有司未達其所以然諸生其明告我問傳道之序自孔子曽子子思孟軻端若貫珠蓋無可疑者然論語記顏淵死孔子以況伯魚史記鯉年五十其亡先孔子三嵗回少孔子三十嵗三十二而死則是先伯魚九年也取信論語則伯魚之亡久矣世家家語曾子少孔子四十六嵗子思年六十二則曾子於仲尼之卒也未壯子思猶逮事其先祖孔叢子有子思及孔子曾子孟子車問答檀弓孟子漢藝文志皆稱子思與魯繆公同時孔叢又逮於繆公卒孟子題辭列女傳孟軻學於孔子之孫子思孟子傳學於子思之弟子資治通鑑外紀繆公訪子思之嵗距孔子卒七十有三年而周紀魯繆公薨子思見衛謹侯後此又三十有一嵗下距孟軻見梁惠王之嵗凡四十又一年上下一百四十五年之間而道學三傳未足多過子思之年無乃過於夀考乎由此言之史記殆為不妄而孔氏所記略同孟子檀弓孟子劉向班固趙岐司馬公劉道原皆非無稽而妄作者記事參錯雖道原亦不能無疑諸生論古人於數千百載之間皆有以祛其妄而辨其惑傳道之次所當尤謹焉者近在眉睫固將先之幸為開發其疑明引據依於下問古者賢士大夫逢時遇主以道光明於時有德有言世所希仰遭秦滅學其姓名固多湮沒後無傳焉惟舜之五臣商之三仁武王十亂周之八士作者七人與夫所謂逸民者始皆卓然章章有以自見得聖人一語而後其道愈明蓋其髙深視河華昭晰齊日月不其偉乎雖與天地並存可也奈何諸儒傳其姓名人有一説言其年代乃大不同惟三仁孔子既詳言之朱張之行蓋闕如也作者之數或以為十字之訛夫人固不逃乎六經史傳之間儒者宜當深考先儒之説會有一定孰得孰失生其辨晰詳之問兵法莫難于用間莫深於用間田單復齊秦滅六國漢髙亡楚句踐報吳皆藉間以成功微乎微乎間言一入敵情盡見彼君臣締合之交判然離而我計行矣故曰五間俱起莫知其道是謂神紀孫武之書曰商之興也伊摯在夏周之興也吕牙在商夫商周之王伊吕之佐決非行間以圖人之國者求之書傳則升陑出其不意乘黎而商始咎周誠有似於兵法豈二王之道神至於無形哉少康夏之盛王用衆一旅光復夏祀亦二王之舉也其使女艾諜澆季杼誘豷襲澆於逐犬易首於縫裳者見之傳記不可誣也伊吕之事未可遂以為無有為之其亦可道乎誘敵以間尢難入者計將何自而出邪方國家當敵人之強未雪大恥聖上懷冰握火思復東都之會前古之事不識可用於今歟何用行之有司敢請浪語集卷二十八
