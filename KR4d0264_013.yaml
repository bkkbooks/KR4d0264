body:
  text: 浪語集卷十三宋薛季宣撰琴曲附哀挽神人暢堯事天理人堯民賡歌其聖作莫莫昊天莫夥蒸民感兮格兮君之仁混茫萬宇自都于野余一人爰主於何道兮暢浹神人於何道兮人神我與蕩蕩兮帝德高高兮不極吾不知其名兮命焉弗得其人則天兮天乎其仁吾不知其際兮究焉無適伊神人之交暢兮其帝之力思歸操亦曰思親操舜耕歷山見鳩母子相哺思念父母作彼美鳩雛歸哺嗚嗚所哺伊何曰父母且匪生何父匪育何母歷山之居居庸可久念念思歸不歸何俟舜操舜立為天子思事親之樂謂巍巍之位不足保作黃屋兮巍巍人道兮委蛇念父母兮庭闈三牲日饋兮夫豈不時也􅉃不如在野兮親几履也惟昔樂而勞今兮吾將已也南風歌舜治天下作愾彼夏日熇熇其暑毒我下民辟焉無所愾彼夏夜鬱蒸其兩民之愠結莫安其處凱風自南發於茂林實彼百穀紓我愠心襄陵操禹治水作湯湯洚水兮懷山襄陵浩浩滔天兮昏墊生靈導之入于海兮王事有程啓呱弗子兮匪我忘情霹靂引禹僇防風氏作天地肅兮伏陽陽以時出兮萬物攸行聲碎訇兮蟄蟲咸作蟄蟲不作兮自底夭亡象震出兮惟君王發號令兮驚四方惛封禺之守臣兮自為聾瞶死霹靂之下兮式彼天常噫余非好殺兮刑憲有章適薄歌夏民去桀歸湯作瞻彼薄兮俗灝灝兮父母邦兮蔑強暴兮瞻彼薄兮俗洋洋兮父母邦兮蔑暴強兮茫茫禹迹紊其經紀適彼薄兮言歸父母箕子操箕子為奴作天道渾渾兮不享繄神器從神兮適彼西鄰惛社稷之阽危兮君無與守將正而斃兮誰善其後負罪囚奴兮九疇我保庶湯孫之復兮載興商道文王操商末鳯鳥集於周作鳯兮鳯兮鳥之王兮覽德輝兮為嘉祥兮匪下昌兮我王明兮克商操武王作天命文考翦滅大商發將天命戈矛有光非余武兮獨夫自亡非余武兮天啓先王采薇歌伯夷叔齊餓於首陽作陟彼首陽言采其薇可以充腸可以樂飢采薇采薇首陽之下可以全身可以安處采薇采薇首陽之巔可以適己可以窮年在彼亦食在此亦食雖傾天爾力父子有常職麥秀歌箕子過殷墟作麥秀漸漸殷商宮兮肅肅清廟儼惟墉兮城郭依然澮畎通兮惻我心摧悼人亡兮寤彼盛時阜雍熙兮車蓋幢幢來朝宗兮自我成湯德顒顒兮恍如夢驚留眼中兮今我不見內猶霿兮神鳯操成王以鳯鳥至歸美周公作大樂和諧兮神鳯來儀彼周公之聖兮余何德以當之丘陵歌孔子歸魯傷道不行作陟彼丘陵岡阜逶迤莫適所窮曷知所止泰山蒼昻四國之望人之弗登道舊云亡顧瞻周道坦平如砥捷徑斜欹小人所履亶不由乎此式遵乎彼彼大路棘矣何能久矣梁山歌曽子耕於泰山雨雪旬日思歸溫父母而不得作雨雪霏霏梁山之下朴遫其凝皓其郊野凜其寒矣曷藏曷御親庭孔邈孰為溫者台不能此處歸途無所台不能此處曷其疾去歸耕操曽子學於孔子十年眷然念二親之養不備作我欲仁違離二親自我不見於今十春心雖不去情不親聞師教有年子不曰夫孝終立身而始事親求仁斯得仁事斯語足以窮吾年歸耕乎休歷山之下有良田參來其誰藝歸耕乎休以一貫道者吾夫子之言也去不我留者年也不可得而再事者親也歸耕乎休耘秬足以待豐年也禾黍足以奉吾親也樂道足以富吾仁也歸耕乎休如是夫豈食吾貧也汾亭操文中子去隋作我思周道兮適彼鎬京遵逵孔直兮踖踖其行驅車潼華兮草莽罥余軸限河渭兮濟無津梁日銜山兮天欲夜愁雲結兮不成雨我心惻兮思故鄉汾亭寂兮汾之陽陶唐氏之遺風泯然其若亡眷吾徒兮狷或狂振還轅兮去京邑戾塗泥兮道猶澀汾亭上兮有六世之遺書野有田兮汾有魚宵續經兮晝狎佃漁闢闕里兮剃萊蕪倡弦誦兮開羣儒神交周孔兮獨樂有餘神交周孔兮獨樂有餘水仙操伯牙學琴於成連成連與東之海山操舟而去伯牙居嵗所因觀感而得琴道作海山中兮四無居人海之濤兮渺漠而無垠浮空輿地兮風雲濫其出沒朝而潮夕而汐兮浩烏之吐吞彼鳥兮飛鳴彼鹿兮跂跂聊淹留兮嵗聿其莫鼓絲桐兮從夫君而與歸沈舟操走夢濟江而船首折作九月九日悠悠之川兮泛彼淘河一江動蕩兮恬風靜而騰波瀾翻下瀨聲渢渢兮柁師不可以告語沈舟折首兮天其奈何愚夫婦兮中倉不濡行褚遷於高岸兮婦沾漬之長吁身之亡矣與存不殊渺江波之瀰漫走於行之不濟也嘻命矣夫傷劉復之三首交情不在久還有白頭新雨礎知同氣斤墁喪善人薰焚雖有恨玉折豈無因世事都如此蒼天何不仁聞憶鱸魚去嗟君獨見幾若何車軸折未逮草廬歸殄瘁吾心懼云亡世德稀南風方不競民援欲誰依世念吾衰久為之慟却哀知言非語到見事直心開吾道傷麟出韶音憶鳯來州鄉桃李地編户想悲摧劉復之哀詞走罷令鄂陵就舍永寧劉君復之始鄉貢自莆田校藝南宮第一試郡之户曹掾郡人亟稱其賢參之友生百口如一走不敢知也已而嵗大災飢癘比屋復之請粟於郡身挾醫拉鄉士夫家至户到以哺以藥作舍作粥養視亡歸道之棄兒畢見收乳州將不樂不為沮殭胔礙途不為止頃之從者染疾死醫者繼而死親識為懼復之志益堅用是疾者瘳餓者飽孩者長死者葬一郡四城惠濟如一民有知者字司户曰劉父其蚩蚩者但謂官之生我而不知司户之德走心乃大服介鄉先生鄭景望吏部一見於是始定交曽未及親復之有公事其謀必見及走難出入官府然不敢不應復之垂被代征兵有潰歸者聚城南仁王寺且將起為變復之因人見語期會於城南走謂復之信德在人可喻而解疾馳如會則復之固已前至潰卒聽命罷休矣走感復之又當為軍政地復曰主命者何若相視笑而罷郡人至今鮮有知其事者復之已受代走及朋從復之為數日遊言有至難發端如響噫誰曰復之世士不曉天下之務邪趣召而朝幸其語合分社司牧尚未為棄何意長沙之鵩又止賈生之座走勉復之不潔去就是不為無恨矣聞病良已弓招踵門啓沃簡衷藝閣校讎不繇召試用以為天之相道真可為善類喜旋即以參佐出尚高其勇退走之再召多復之推挽之力於走辭命復之開譬以書謄答亡何價以亟返復之道次三衢死矣嗚呼音容如接緘墨尚新人已隔生有慟而不自知者每恨民之無援賢於人者輒死孰有若復之之賢之志且有其地方起為天下用而發軔軸折是則當世之感於故人尚何道復之之逝走嘗哭之以詩懷不巳巳故志其德在吾鄉與未聞於人者與走之事契始末為文以哀之且以寬釋其親與其兄著作公復之名朔紹興三十年進士年若干辭曰天胡不仁兮瘼此下民良苦乏賢兮賢人名去而仙繄世途之好徑兮正路榛塞閶闔重重有栗階而進兮不崇朝而折翼鴟梟司政兮蝙蝠之晨猿仁何咎兮擯自王孫寧是不思兮天實為之皇浩浩之充天兮豈其已而鴻翺翔而遵逵兮退飛者再摶扶搖之直上兮竟翷翩而長逝夫豈人為兮呼天不聞人莫不死兮不亡者存小官之不卑兮賢聲載路視彭鏗其猶夭兮後昆有裕楙實雙而一瘁兮哀哀者毋紛孺弱之呱前兮蒼天太苦生者作德兮死者有仁嗚呼哀哉家國無人非余患兮余悲夫抱志之不伸外舅孫帥挽詩行誼推前輩繄公學大成博通行祕府威德隱長城筆力千鈞重詞源三峽傾懷珠飈躍浪杖䇿穩登瀛竒節為純直危言襲鳯鳴絃歌風四甸領袖服諸生任付即山鑄章分煮海程錢流邦貨重利半國租贏政抑豪民折人知公道行繡衣休直指彤矢賜專征劍戟森營壘邊陲卧鼓鉦正辭平楚獄折簡罷蠻兵治水防云固為魚患不萌藴含荆玉潤廉挹蜀江清流馬追前躅輕裘擁後旌鸞聲仍噦噦蠅矢自營營毋謂鏐金鑠其如衡石平功名書册在冠冕擲瓢輕棠棣輝方韡瓊瑰夢忽驚人間傅説謝天上嵗星明有美稱遺愛無窮企令聲泪碑兼陌祭西蜀又南荆故使制置閣學蕭公挽章萬夫卬止配高山德望巍峩履道安容貌誾誾服鄉黨風稜凜凜冠朝端鳯鳴往格君心正鸇擊曽聞姦膽寒八葉相家長已矣空教有識涕瀾汍陜服他時帥五侯盡心分主顧西憂為民發廪成歸節揖盜開關記釋謀澤施人生追灌口法垂當世説遨頭華陽舊志今誰續巷祭餘哀可見收履賜西州事可尋稅軺無在不棠隂憶參盛府開巴峽忍送靈輀入鳯林語上故藏應筆鑑家傳清尚只龜琴自傷下走青衫少慟哭無人知此心脫巾自責為兒非叱馭辭舟識洞微不辨盜金緣重義危言料虎自知幾惠霑神物能通夢節感鄉閭憶葬衣今見我公公又往後生學古欲疇依高邦貢挽詩世道久衰息惟君尚典刑好詩清臘雪醇德醉春醽考策窮三易傳家守一經高風不可見誰與勒真銘張端明挽詩闡凋落傷前輩風流屬老成和羮方爾用接淅已吾行卜筮占先志儀刑式後生贈同開府相哀誄易佳名帝功成贊育天道與為徒祖帳霸陵岸扁舟笠澤湖送鞋非李泌哭市有郇謨已矣龍輀稅依然曳尾塗張思豫挽詩蝗食虛來鳯牛刀第割雞解紛誰俠行懷惠或嬰啼寤歎傷凋落虞歌思慘悽鄴侯家傳在蘭佩可童觿許深父母挽詩載德稱賢母宜家起令郎背萱傷蚤謝蟾桂籍流芳負米思何報啼狶教叵忘一篇勝得第應喜賽錢塘羅隱當辟錢塘令令狐綯不喜其子得第喜得隱一篇陳蕃仲侍郎挽詩鄉黨名卿有幾人如公學術兩離倫貢金政告忠嘉舊春草詩傳語句新北使皇華申昨好西岑野色近來親忍觀封鬛眠牛地藴我東朝法從臣孫元式挽詩世盡宗韓栁君期振古今文場聲籍籍武庫入森森未契千年運終孤百戰心一官端溷子遐及贊鳴琴凛凛東門會巖巖烈士風語高文筆外歡溢酒杯中契濶從暌隔綢繆見始終之人而不壽吾欲問蒼穹周詹事操挽詩前輩傷凋落如君尚典刑政聲喧劇郡直節挺明庭江海理歸棹乾坤託旅亭相知不相見如洗淚吾零周待制淙挽詩昭代開昌運名臣取世資權謀乘保障彈壓治京師方接清風會俄驚汗漫期此情誰與論虞殯屬篇詩走作復之哀辭將寄諸賓之旋聞賓之下世道中哀痛之劇虛傳流水繞壺公興化衣冠轉盻空擬比三君扶漢室肯同二陸起吳中泗川始訝沈神鼎劍浦俄驚合化龍齠齓滿前垂白母此情何處問蒼穹浪語集卷十三
