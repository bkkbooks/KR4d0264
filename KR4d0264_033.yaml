body:
  text: 浪語集卷三十三宋薛季宣撰箋行狀先大夫行狀君諱徽言字德老世為永嘉人曾祖元禮祖庠皆不仕季宣謹按朝散郎鄒極撰我曾祖墓志曰其先世家河東漢平元始間有曰丕者渡江寓毗陵後有辟地福唐長溪者又徙永嘉君其裔也墓志叙述先世其闕略與譜牒同而伯父待制行狀云唐令之補闕後也至公五世矣譜稱補闕後居長溪之亷村於永嘉房為伯祖以相參驗似不祇五世父強立少登科禮部侍郎鄒浩嘗以學官薦之歷州縣所至有聲清正恬退終金陵幕官先祖字成翁歷吳縣主簿中都宜黃二縣令江寧光祿為人短小精悍襮和裏剛宰劇有聲奉法不阿其上號石蓮長官恬淡工詩有舊居一篇花木蕭疏一徑深門前緑栁更森森一作成隂旁人錯比陶潛宅淡泊仍無愛酒心娶陳氏鄂州使君詵之女封永嘉郡太夫人夫人四明大族初婚奩具華靡察光祿有不豫色而問之故光祿曰我孺子家觀卿調度非若吾家婦者夫人曰有是哉其歸遂能降志節約居貧若素閨門肅睦非親無識面者而鄉人傳以為法訓責其女婦必曰汝非薛七嫂乎七光祿公輩行也從祖兄居實嘗與季宣言光祿宰宜黃時有小人不獲于母去而逺遊者已而母經死比鄰聞之稱寃呼子聲不知傷子之不在共證其子實殺之光祿閲母枕中得縣人稱貸劵帖獨疑其寃陽按其子使人隂以縊母領巾夜擲債家户下微伺于㫄債家晨起然香見巾識之唾曰寃家何以至此執問即渠殺母逺近歎服稱神明君其季也少孤警頴先令人即世時方在襁褓比成童先中奉捐館舍中奉令及先君葬時祖妣官封獨與諸兄講學識慮已過人既長能自立力學刻苦窮晝夜弗懈遂博通經先君從文定胡公安國學有上胡侍讀咨目三通在遺編别録第一卷再舉登建炎二年進士第解褐授南劔州司法參車駕幸永康君以書謁中司趙公詆一時用事者趙公大稱賞以國士期也時吕相頤浩柄國趙相鼎為中丞君以書謁趙相立讀即卷而懷之曰公以諫臣望鼎何辭焉於是促席歡語如舊相識趙相語及太上光堯壽聖皇帝好學雖在戎馬嘗讀資治通鑑君曰書曰知之非艱行之惟艱誠能見古今成敗而力行之天下大幸趙相愕曰久矣鼎之不聞是言也既而趙相彈劾吕相之欲臣敵立御營使責諫臣事得太上褒語趙相謝曰三者非臣所及溫士薛某為臣言之明白繳上其書見遺編第二卷俄移蹕㑹稽趙遷樞相力薦君蒙召對以強志勤政君子小人為言頗合㫖改左承奉郎充樞密院計議官西府舊無計議有幹辦官朝廷將用先君以幹辦冗名非所以處天下士遂易名計議設官自君始渡江之初邊障不立君請建立方鎮以固籬落當時采納置鎮撫使于淮甸荆襄間疆場始有籓籬之限而江左之勢成矣後併兩淮分鎮置宣撫使復請併上游以一其制置鎮并上游置帥強志勤政及論君子小人無劄並見遺編第三卷踰年前用事者復當國君以一誠正待之雖銜恨次骨欲中傷之終弗能也紹興二年議遣使君以選權監察御史宣諭湖南吕相復入怨君之嘗議已也未有以發禁省須紙錢四千浮費君執奏獲可因上遣行君視明州湖田反命有詔選忠信不欺士循問風俗遂復以君充選實欲去之性明爽雖筮仕未久而疏通若素宦飽於更練者既臨遣敦奏詳明時宣諭五使皆給親札御寶之歷使按舉必書又以太宗銘石之戒遍賜郡邑將發君上薛宣撫縣故事視縣劇易易置令長郡縣政事有失於詿誤而未正於法者財用有出於聚斂而未見於用者刑獄有過於平允而陷於深重者御史未至並許自陳改正惡心不悛雖置死地可勿恤奏可御寶歷序在遺編第五卷跋尾語尤鯁切在第九卷撫縣劄子在第三卷入境布宣德意揭示教條檢核吏姦無不契事機當人心者約束榜牒在遺編第五卷奏本路不便於民者十事乞委憲司覺察違戾十事一曰户口逃亡不為開落二曰産去稅存貧民受弊三曰秋苗受納巧取多門四曰高估官産吏私其利五曰人户避役親在其居六曰鄉村聚徒教習律令七曰差役愆期科𣲖保正八曰公吏溢額作過多端九曰人户陳狀科補助錢十曰開剝死牛邀求百出印榜奏事在遺編第七卷且請嶽飛綏定湖南及鄰境給韓京營田免全州𨽻廣西節制乞選嶽守與潭鼎腹背制么賊江西湖南接壤盜賊出沒其間兩路追討之兵不相犄角以盜出界為盡已職故盜得視兩界緩急往來以騁君奏嶽飛御軍嚴肅請以兩路盜賊併委之江賊彭鐵大就君請降嶽掩其懈擊之大獲君恱表其功狀嶽軍得以展其智力諸將所鄉鼓行盜用此戢時金州屬湖南廣西二路潭州益陽縣割入鼎州君奏罷之選嶽守事見討楊么語中乞委嶽侯兩路盜賊給韓京營田奏在遺編第六卷嶽侯破彭鐵大事論全州奏在第八卷益陽奏在第九卷論郴道永桂陽丁米均敷見存一丁至石餘者并帶糴之弊丁米前例口賦四斗均敷以承平丁帳科於亂後君既蠲其敷數遂奏計口之賦貧富一等富者寬裕貧者重困均之田畝則又偏苦上户謂宜履畝分口算之半以就均一寬貧下帶糴之米湖南一路舊有之名糴而未嘗給錢多或兼倍正賦州縣受納必先糴而後租民不供命但能充糴而已常賦之入至一縣嵗不逮三分者良民偏受其弊實無補於縣官君初難遽除之周詢其詳始班其禁又有和糴夫米并受納米樣斗斛紐耗倉例把算抬斛斗面銷鈔之米水程裝綱縻費腳乘修籠夫米價錢户帖及牛倒死買醋錢均敷黃麴麴引錢綢輕夏稅貼納錢陳狀補助錢等其他名數尚不一君奏州縣受納收耗與當逺而近輸者得收腳錢如條例餘一切罷之憲司糾違禁者丁米奏在遺編第七卷帶糴奏約束㮄在八卷放丁米罷受納增收水腳錢榜在第九卷時田荒糴貴命州縣量城市逺鄉道里朝暮可及者自近及逺區處賑糶由是糴價頓平濟惠甚溥咸戴上賜不以遐遺也且請存留漕司上供錢賑濟郴道桂陽三州罷營繕等費諸州大飢在兵荒之後田萊不闢米價翔踴而二廣帥司閉糴且禁耕牛出境一牛值錢百千且漕臣李弼孺初起上供帥司下潭全永州計置材植繕成府民不勝困君留上供錢斛不遣截支米二萬石裨常平義倉支濟及以封椿經制司銀三千兩分畀州縣仍借諸司錢糴廣西米賑給通那省米借貸聽四等下户十人為甲州為給據自置撥米州軍支請牒止遏糴遏牛營繕約飭諸縣括荒間田畝勸課富家開墾曉民生放種本收息官為催理又命上户糶米接濟給歷稽其多寡高者免役次者免罪糴平田墾人不覺飢論遏糴遏牛請撥上供賑糶奏在遺編第六卷勸課奏在第七卷存留上供支米賑濟自刻三奏生放種本榜在第八卷罷帥司營繕奏諭民糶米榜在第九卷薦本路憲吕祉郴守趙不羣全倅劉延年前衡倅趙伯牛統制官吳錫等朝廷皆召用吕祉為憲其治在衡州曹成冦迫州城祉毅然獨立指揮諸將防守冦不能犯他盜胡元奭等數千人所在出沒祉遣韓京討平之為政激揚清濁豪吏不敢為姦趙不羣初宰章邱抗金人數萬之衆其守郴也曹成起攸縣安仁間執安撫使向子諲徑薄城下郡人驚走殆盡不羣率兵迎戰賊不敢前成後再至圍城不羣拒守六晝夜出竒應變竟却之嵗早以馬料賦民播種身率僚吏减奉以濟貧民又省冗費犒軍因繕城壘民不知役樓壁屹然君之支截上供繇不羣發之也劉延年元祐名臣放之從子居鄉以孝友聞遭世艱難携家族四十口轉徙江湖與共甘苦敏於政善應卒權興國軍賊帥李勝擁徒數千稱迎奉神御拏舟直抵其壘居於延年而去初靖康中有㫖召對未赴既更世故不復自言趙伯牛通判衡州當孔彥舟變伯牛使人開諭一郡免於焚爇從平胡元奭再拒曹成有功又道倅鄭安恭元祐大臣雍之子紹興初曹成據州百餘日殺掠慘酷十室九虛安恭攝郡能勞徠安輯之明年猺人大出安恭率衆討捕逼逐山谷賊窮請命至言乏食非其本心安恭戮當敵一人餘無所問諸峒稍知畏服祁陽令張登治最一路繼禇積弊政之後兵火之餘登安集流離首與民約如是而催科如是而差役善良者處以是道強猾者治以是法民始疑而易之三月而信之五月而安之曹成受降而來一邑震恐登從容措畫不擾而濟大兵之後四政渾殺登刻意窮究推割分明吏畏其強民懷其惠提刑司檢法官文浩先知寧逺縣有循良稱安撫司統制官韓京朴忠善戰破郴賊李冬至䖍賊鍾超胡元奭等兵皆數萬如孔彥舟餘黨及永興土冦王蓋天游冦賀潮等亦皆不减數千人君初議營田京率先請茶陵安仁二縣荒田耕種吳錫號吳夜義威名甚著猺人楊再興反攻圍武岡軍出沒八年為錫所破窮追數百里焚其廬落甚衆君録奏其事皆功見一時者薦吕祉章在遺編第六卷韓京趙不羣文浩鄭安恭章在第七卷劉延年趙伯牛章在第九卷惟吳錫奏家亡其藁按使事録奏狀以千文為號不應遺落必還朝所上章也其破楊再興事見第八卷請委嶽飛綏定盜賊奏中又有薦黎明事别見初扺荼陵縣慮囚有以平人為劫盜者片言折之審知官吏冒賞之寃立下吏痛治為直之人稱神明初縣人高大被劫戕死其夕李方陳一家亦被盜巡尉捕未獲高大家人疑賀大談世績等實殺高大縣尉何燮收辭所連逮上縣併以陳一李方事鞠之鍛煉成獄賀大知不免以陳九張七雅有猜恨枝辭入之世績等具以蹤迹自明獄司不為追㑹君閲成案洞見其寃移獄安仁遂直其事活無􅓧九人至安仁慮七三殺人獄以痕傷在左欵辭左右及前後異詞為斷二奏在遺編第六卷論漕臣措置州縣日納移用等錢苛斂且縱吏門下姦贓請繩治又按發知桂陽及永召三守常寧令等不法祁陽令等妄殺按贓吏之尤者械送獄湖南賦役繁重民有嫁老母不舉子以規析户免進丁者轉運判官王淮賦錢移用孫諸州日納緡錢二十縣以大小輸錢十五千至十千又潭衡二州日出旗望酒錢二十千實未嘗得酒州縣敷于民下自米麯銀紙下至鬻豆腐者皆不免科掠郡縣去國既逺又當積亂之後守宰貪縱遂成風俗郡守和璟其尤者羣下有五毒三諂之目衡陽令王括邵陽謝微祁陽褚稹皆專恣昏墨民不堪命號曰三陽括先以贓敗死微與稹有謝一褚二之稱微及茶陵令談知柔先有召命君留不遣按治其姦皆無所貰平陽尉靳成贓露亡去因荷項屬吏知寧逺縣張雍懦不勝任東安令李威逺前坐罷軟對移清湘令談觀光耒陽丞李煒咸剛徑有守曉習吏治君請以觀光易雍煒易威逺仍不理遺闕論王淮及權運判趙志之并按和璟武岡權尉李端慤巡檢劉清奏在遺編第九卷靳成談知柔及監稅沈銓常寧監稅王載平陽權令李發并桂陽簽判權監陳如塤對移奏在第七卷永守黃升推官俞梅等并謝微禇稹及其主簿嚴徹常寧令阮冠衡陽尉楊祖堯高攄奏在第八卷衡州録參詹勉奏在第六卷換縣章在第九卷以論潭帥非其人又其間發摘稍多行之且峻不無忤權貴意既還權發遣興國軍而他使皆進擢識者為不平前此李相綱為湖南大使軍民頗服其威信李以言罷折樞密彥質代之帥司正兵才七千人招降之軍乃二萬衆或傳將欲起赴行在人情惴恐君奏綱至數月稍著成效至於彥質事未可知夫以未可知之事而易已試之效臣切惜之是時帥司軍費不支漕司艱於出納漸致猜阻君請漕司濟其軍用楊么僭皇太子慿藉湖水為亂羣盜散處山谷土冦游冦更出侵掠如尹花八張成蕭尚十蕭小四田行者陳道王盈鄧裝彭鐵大賀聰賀佐李詢賀全劉仕才之屬強者數萬弱者三二千人君過江西知嶽侯忠略可任奏請借以討賊必可肅清湖外朝廷方督帥司以么賊事君奏賊中乏食必因漲水侵肆已與帥臣彥質定議屯兵要津使其進不得掠退無所給一兩月間其勢必窮然後鼎州攻其前本軍制其後計窮而來不戰而屈此上䇿也使賊不離平原官軍四合其平已久正以波濤浩渺水勢已漲賊軍輕利飄去焱來初無定止官舟不葺又無水軍較彼己之短長計時勢之利害私憂過計願毋欲速且請精擇嶽守量事應副以張潭鼎犄角水勢已落可以必取又奏比發本路荆南兵援鼎州師次城下不給之糧各引而歸實無所補止付嶽飛以賊可保成功朝廷已遣王􅊅之師君知􅊅不知舟楫間事歸對密請委􅊅荆襄備禦又奏賊軍舟楫便利善長鈎貫泅沒與之從事於波濤間恐非官軍之便􅊅軍竟以水戰困於搭鈎致敗卒用嶽侯陸道取之他盜亦平悉如君䇿君之行也上諭君訪山林不仕賢者長沙黎民字才翁以孝友信義著稱其學問有淵源自胡文定公諸公咸所推重嘗從御史張昕學遭亂託明以母及陷于賊間關入賊取之嘗過郢州李允文以京西提刑至郢明即還曰郢多招安之冦允文凶惡其來必與為亂變在目中矣後一月而難作君歸奏曰惟此可以充賦君去而明卒事不果行吕相既思有以中君君行未復即以空劄誚君移陳如塤為專擅君歸又以其論帥臣軍旅為誕且以小臣不當薦舉將相言之上前時和璟所親為户部侍郎訴君請給軍用支截上供為不體國愛費君用此出吕相意猶未愜召君與諫官唐揮婦兄同見明告君曰朝廷本欲相留上令與公州郡已而唐諫果以質請表狀彈擊上不直之不報旋命都司計最五使手歷即課君殿削焉後張相浚督軍湖南聞君將命有體興國朱上尋復召還論易帥章在遺編第六卷論帥漕支費及楊么事宜在第九卷請命嶽侯討賊奏在第八卷論王􅊅楊么二劄在第三卷薦黎明奏劄在遺編别録第一卷遺編自六卷至九卷皆湖南使事號使事録疏其大者于此又有使回奏劄在遺編并别録奏議中惟被命申請畫一蓋五使合奏已施行者詳於榜牒奏事御寶手厯但抄寫奏狀語故不録亡何以比部郎官召後敵騎次淮右車駕幸建康扈從以行方倉卒進發先駐蹕平江及春還臨安一時事宜人情敵勢知無不言譽望彌著平江建康奏議劄目並在遺編第三四卷别録第一卷改兵部又改吏部左選遷右司改左司檢正中書門下諸房文字遷起居舍人首以申嚴歐陽修王贄所請令賜對臣寮少留殿門候記注官出面録聖語及親奉德音事干教化禮樂刑政為世典法者並備録關報記注官士論美之君之為都司也刑寺奏讞父有夜盜子財子不知而殺之者當以夜入人家登時殺之勿論君謂人子弒父寧論曲直且父子法不别籍何謂人家子富父貧得非供養有闕抵以不孝之罪識者然之在後省也論舊都省無杖省吏有罪大付棘寺次不過罰直人情難傅重議是三尺法終不行於省吏也小人何所忌憚始置杖都省以詰小過奸吏少戢而省吏側目思報矣論記注奏劄在遺編第三卷議刑置杖奏亡金使至許還徽宗梓宫及母后河南地時無故請和且無邀索有識訩訩深以為慮朝士皆知不可而無以拒之君位螭坳朝夕憂慮直前面奏及侍從同對辨論尤切因感疾時方正旦猶欲力疾侍立家人苦諫始在告趙相凡三入君皆勸以事功難就唐姚崇要說明皇十事可以為法趙不能用秦相檜知平江過闕望趙留已而無留之意君間見曰公已許秦過闕秦自意留使之遂行將恐觖望而以媢嫉生怨矣趙顧不知君意所在大不恱曰秦居公里於公厚乎由是稍疏君而秦趙之隙成矣初趙相羣公議所以待敵謂莫急於自治用和戰為適時之宜未始持必戰之說也請和使至敵情既不可測秦相復入揣上皇有厭兵意始决計和羣公慮患將深遂皆抗議不屈辨說紛起君獨不深論已而至上前忠諫懇切上垂涕曰朕屈意和老母計爾君陳帝王之孝至援漢高祖杯羮之說又與秦相廷爭移晷遂中寒疾以歸舊事左右史奏事直前無所關白自同時潘中書良貴叱向子諲議和後人無相繼者雖直前名存奏事必先通奏與請對從官等矣議和奏議今多亡佚所存畫一亦亡其首在遺編第三卷議王倫使事白堂二劄在第四卷其論梓宫事曰萬里梓宫真僞孰辨以姚崇勸趙相禀目在别録第一卷疾寢革語猶不忘國事以紹興九年正月壬辰卒享年四十七嵗上聞之為悼惜有㫖贈帛百匹與遺表恩澤故事左右史卒官其家二人渡江後未有卒于位者省吏以君置杖舊憾且迎合時相以省記沮格之侍從有以中朝左右史姓名為言相復設辭拒解左右史不得致仕恩澤自兹始也娶胡氏纍封安人賢淑和鳴侍湯藥尤謹遂染疾後君十三日亦卒君仕雖晚而早達鋭意功名君相眷注方渥人皆指日待其遷也而竟止此莫不傷惜之為流涕云生子男二人長季隨次季宣女四人越明年九月十九日葬郡城西太平山之原君天性忠鯁獻替甚多君前後奏陳多繫體要他人所難言者在君為不足道書奏存者已在遺編并别録中今皇帝即阼初君以布衣上書言時政曰國勢曰邊防曰刑賞曰巡幸曰財用曰官吏凡六事京城之圍大元帥起河北中原道梗行者莫敢北鄉君仗䇿千元帥府行不告家㑹太上皇即位南京更以書奏在遺編第一卷既仕於朝首請擇賢宗室立為皇嗣太上皇春秋富羣臣未有啓擇後議者君首陳大計以為太子天下本本不立則幹易搖前代計不早定致禍亂者不勝數而立子以公為法後世者莫如仁宗皇帝今社稷綴旒萬萬曩日陛下仁聖逺追先烈宗社大計安知不已定於淵衷須請而行耳臣是以不顧死亡申此愚直願陛下斷自聖意無惑羣言以幸天下太上虛納上虞丞婁寅亮繼之其封事言太祖舍子立弟有天下者陛下一人而已自崇寧諛臣進說推濮王子孫以為近屬餘皆謂之同姓遂致昌陵之後寂寥無聞祀豐于眤仰違天監太祖墓上莫肯顧歆此二聖所以未有回鑾之日中原所以未有息肩之期也願法章聖仁祖於陛下子行中遴簡太祖諸孫視秩親王使牧九州他日皇子誕生退就籓服不過添一節度使耳太上感恱賜寅亮對敷奏剴切太略以謂本朝傳國十世大統三絶太祖有命而太宗享之天意人心未必不為是也語愜上意面賜褒答曰太祖舍其子而與其弟朕之所師法也擢監察御史立後之議始定無幾事又中寢君因星變上書論國本曰側聞小臣婁寅亮建言乞擇宗室之子育之後宫以待皇嗣之降陛下不謀不卜即日召對所以寵録之甚厚繼有㫖召子清子英子唐入侍此命一出萬口稱慶謂即施行矣而子清子英一見而止子唐未聞促召士衆失望不曉所以若謂姿非英物不足以備拊育則子唐者不應不與之進若以所閲之子已足充選則二子不應遣還切料小人無深謀逺慮獨不能堪目前之情熒惑陛下已成之志則春秋鼎盛子孫千億之語必陳於前願陛下上念祖宗基業之重鑒仁祖充意之法無徇宦官女子之情且仁祖末年天下寧謐人心安固設有非常孰敢異論今日之事其勢云何此有識所以寒心不知所出也已而上意遂决書别見奏劄在遺編第三卷勸大臣和協濟功乞宰相不親細務又托陸宣公奏議可酌取以救時者如减兵之冗食蠲法之撓人省官之不急去物之無用罷事之非要五事白堂二劄見遺編第四卷五事書在第二卷紹興元年詔以星變闕失乃上書言所當深憂者三曰國本未立曰佞幸未去國論未定且曰憂其所不足憂而忘其所當深憂此又大可憂者也其言皆切中時宜當時連上二書其第二書專諫營繕並見遺編第一卷營繕當時未見其害後果甚云初聞徽宗諱主上銜恤哀痛時議軍國事遽欲遵用以日易月除喪君建議終制成上之美識者韙之論國服劄子遺編第四卷開府嶽帥方以議論不合棄軍請終喪廬山君遺書為陳大義勸諭嶽幡然感動即日蒞軍其他建白彌縫有補於時多此類兄弼與君尤友善時帥荆南方召用力丐外得請安撫䖍南圖以過家為畢窀穸以盡其誼似非偶然者諱待制伯父也張端明闡為行狀其文多闕略伯父行事鄉人喜言之不無竒偉過實托其大而不誣者附左其事書行狀中而未詳者互見之裨其闕伯父磊落多權智尚氣節不修小謹曲亷人所甚難談笑處之沛如也自始為士鄉先生如忠簡許公景衡劉給事安上劉舍人安節等名一時忠敬士皆許以帥才將略年十六試補郡學即居其元同諸生貢京師附花石綱舟沂汴舟中楊梅盛熟綱吏擷餉諸生伯父獨收所棄腐梅并核以瓦缶儲之同舟莫知何謂扺京有司以失梅罪綱吏吏藉缶中所儲證壞獲免始皆服其逺見教授杭州沈侍郎晦先以微纍被斥伯父為之湔袚延譽遂立天下重名代還以余相元中薦對為徽廟言太祖使人召趙普見其讀書問知論語大驚普曰論語夫子之言皆足為天下法有一言而人終身不能行者况全書乎太祖曰其一言謂何普曰節用而愛人徽宗亦曰治國之道無他節用愛人而已斧座即起遂復去為滄州教官年飢發學糧賑糶州將以為非制止之伯父曰有如荐飢糴不能補某當坐之來嵗大稔償其舊而復贏管庫左藏方中人強橫既投劾致事竟流王道之僕後無敢譁者辟親征使參謀都人羣起擊殺內侍侵及士夫將校輒以姦細名之將相環視不知所為伯父前曰是不難辨下令殺內侍者賜帛首亂者出軌斬數人而定圍中裨畫甚衆京城迄賴以保全提舉輦運不克赴主管明道宫居鄉莆門巡檢發土豪陳大指之姦大指逃入於海州將懼為亂伯父曰處以巡檢之地則受制矣從之大指果出徙家郡下而患遂銷除湖南轉運判官楊么方熾詔張相都督嶽侯為制置使討之賊便水戰樓船如大德勝小德勝望三州等高過十丈其多不可計二公亦作大艦當之伯父知舟楫非我所長不敢明告因燕白曰適觀兒戲摸魚而得一理呼吏立取盆魚於前損益盆水示之水寬則縱鬐去而魚不可執也嶽侯睨旁微笑自此不復言水戰矣㑹天旱湖涸隂以厚募招取賊州冦至則強弩據水當之不與接刃大造巨筏斷賊江路又於上游亂投芻藁賊舟挾輪不可復運酋豪勢屈多降嶽以步騎直搗其營賊軍因以潰敗王彥久不應召伯父直徽猷閣主管荆南歸峽州荆門公安軍經略安撫代之督府問計將安出所從兵衛幾何伯父曰彥軍皆中原金房精兵劖其面曰盡忠報國誓殺金人固難與為亂朝廷必欲彥非某書生所及但欲代彥則湖南送吏足矣徊翔似不欲行者久之乃進迎吏不至殊不為止入境彥遣親兵七千人迎候伯父即日罷遣湖南親兵湖南將請間欲有所陳伯父大聲謝曰已知盛意不過欲相送至荆南耳久苦將士亦欲到任禮犒津遣然某既帥荆渚親兵皆吾腹心之衛又實腹心於內則非所以待之荆南親兵聞之無不大恱其將本為彥伺伯父者反以情告且曰王太尉未有去意公當襲而代之伯父曰吾以身任太尉亦忠安有是理竟馳入如其計彥晨起未出諸將列坐賔次瞥見新帥入府羅謁于庭彥乃大驚遽出交政起其衆赴督府軍人不樂謀因大閲乘旱以變伯父先期臨閲竭帑犒賜時雨亦降亂心遂息彥以伯父告無他志還朝得帥侍衛步軍於班列間望見先君以為伯父嘆曰薛直老又在此矣何歸之神知為先君謝曰彥非賢兄保全安有今日參謀京西湖北有王缺子者忘其名故楊么賊中殿帥嶽侯用為水軍統制乘嶽行邊為亂部勒已定其母使僮告之伯父密諭諸將為邂逅入王舟中索飲伯父馳至江步呼曰行府適有軍事盍相從議之諸將強王登舟即共縳之付吏一軍震警無敢動他日嶽還自邊列將賀舍人者白其婦與僧亂嶽即便座按其事辭連一寺僧無非諸將家也嶽引伯父視其牘曰飛出營中至此略不問則飛負諸將欲如栁公綽故事盡納諸江復不忍奈何伯父曰發婦私者但一賀將衆何與安知非讕辭分謗小人之情邪嶽意不解伯父曰此曹類因亂離偶合不以正者有之今暴其私人情念家者怨恥過者忿而公自謂無負不搖三軍之衆乎嶽曰請密之旋使夫人內集視所汚衊類老矣即已賀婦獄决賀即日恚死嶽謝伯父曰微君一言幾得罪於諸公嶽公丁母憂去張憲以提舉一行事務領軍憲病在告中張侍郎宗元除書至軍士藉藉曰朝廷使張侍郎代公公不復還矣張太尉以此辭疾諸將往往或效之伯父諭憲強出臨軍憲勒諸軍各安營部偶語者斬訴羣校曰我公心腹間事參謀獨知之欲知其詳問之可也伯父因某請問謂曰張侍郎來由公之請汝輩豈不聞乎公解軍幾何時汝輩敗壞軍法如此公聞之且不樂今朝廷已遣敕使強公起復張侍郎非久留者羣校還白憲曰吾為汝言參謀知公心腹間事果然軍中遂安嶽侯聞亦大服㑹先君移書誚嶽嶽不自安乃起嶽之詣闕已具衣冠入對伯父疏一機事教嶽敷奏嶽意末之伯父曰姑持以行不問則已及見不暇他語上先及之他日請與伯父偕入奏事嶽出手疏以儲二為言衝風吹紙動搖嶽聲戰悼讀不能句上視伯父色動嶽退伯父進曰臣來在道常怪嶽飛習寫細書窮詰端倪乃作此奏雖其子弟無知者臣常規以大將不當預國家事飛謂臣子一體不當形迹是顧欲臣同對明臣獨與聞之上色定曰朕固疑飛之欲卿對也微卿之言將不之察改龍圖閣經撫湖北王俊除撫州鈐轄不行被命同提刑万俟卨圖之万俟相不能致伯父許俊不遣旋委三州自擇所便授之俊得州來謝猶從卒士二百人伯父伏甲見之執諸座上叱其從卒皆坐伏兵毆之皆出收其積粟贍軍荆鼎二郡後十五嵗季宣辟荆州時用之始竭初俊已僇伯父奏同万俟卨受命圖俊事貴歸一故臣得自誅之由卨之始謀万俟謂伯父自有其功其初不能自望聞奏之上乃大感服後万俟治嶽侯獄不以一辭見纍伯父論中原形勢常以關中為諸夏首荆州為吳蜀之脊皆天下形勝之地其守荆南即繕樓堞治器械具儲峙奏論孫吳謹守上游形勢故曹操不能勝陳氏不以上游形勢為國故為楊堅所取陛下駐蹕東南尺土未復置形勢於度外謹守江淮以固東南之圉臣愚所未悟也荆南西援巴蜀東控吳㑹南通未廣北接襄漢進可以取退可以守上游之形勢也異時指麾號令中原以圖恢復莫此為便與夫出則建康入則吳粵其勢相萬也臣之在治披荆藋招集流散務農贏糧以望幸久矣惟陛下實重圖之不納金人歸河南地朝廷將謀安定關陜加祕閣修撰充都轉運使召為左司郎官初秦相罷居永嘉人鮮知其才者伯父曰吾觀秦論當世之務多未聞於人者此其不可掩殆為時用必矣與之出處相得歡甚將對秦以户部闕侍郎諭伯父以財利言曰此官可得也伯父不欲以風㫖言利進不用其語秦相稍不樂因見論許忠簡公行事伯父亟稱其賢言許位侍從時上嘗盛怒汪黃二相目許許如一語迎合彼可取而代也秦笑吃吃不能已伯父出又笑而歸始有疏斥伯父意矣湖北提刑向子忞伯父湖南所按吏也其在湖北與伯父交論於朝秦罷子忞伯父因亦丐外主管䖍州營內安撫初嶽侯以列將拔起時張俊韓世忠等已皆建立功效至大官內不能平伯父勸嶽屈已下之書凡三十七通俱不之答嶽破么賊遣大將俘獻樓船各一卒徒戰守之具畢備韓始大說定交而張忌之益甚嶽名日盛幕中之輕脫者教嶽勿苦降下於是始隙張謂伯父實主嶽府謀議百計傾嶽欲并中伯父樞府簡取䖍卒張以不應等格急責其使使即讕言䖍帥占留精卒不簡伯父因被劾罷嶽侯事起張求伯父在䖍通書尺簿有遺嶽侯書處指為反迹秦相徐擲其下文曰此復有遺秦相書伯父用免而張憲嶽雲之獄止以交關書問并憲謀進退為反具云踰年伯父繇主管玉隆觀再知䖍州蕃將程師回桀黠不受制伯父按教竒兵或坐或立心知有異傳令皆坐不坐者斬以統領官張涓所部遂按軍法斬之師回吐舌大驚始禀畏為用詔歸燕人於北師回有親從數百人憚不欲行伯父善諭師回公從卒衆多不可芘誠能遂遣此屬朝廷必多公芘不遣矣師回即日承命朝促師回就道亦俯首告行䖍界江嶺其守長兼提舉南雄州南安軍甲兵盜賊前提刑劉昉攝事治尚寬恕多盜多貰活之賊中號我爺佛與官軍格則曰我爺佛終不見殺汝何為者為暴益甚伯父再至討積年名賊俞三古五官朱關索吳錦等皆獲之無所寬貸賊徒加以剝皮之號遁入他境三州遂安伯父終更因罷䖍州安撫進集英殿修撰安撫福建閩部八郡山賊自建炎後盤踞巖險劇冦管天下伍黑龍卓和尚何白旗丘崇廖七嫂滿山紅之屬數十百部部數千至數十百人泉漳汀南劍邵武界咸被其毒鄉民多築山寨自保甚則殘敗縣邑州門晝閉賊知伯父在䖍威略甚恐或欲徂擊邵武建昌道上客勸伯父改途辟之不應迎卒已至號令送兵還娖隊伍揚金鼓旗幟分道並進為若數千人行者聲言新帥以䖍兵全將至矣羣盜屏蹟無敢近路鈐轄李貴討管天下失利貴為賊所生得伯父知將兵不可用而朝廷相次遣將張淵富選成閔劉寶措置福建盜賊不受帥司節度且半年一代州縣困於將迎伯父創立竒兵其初數百未幾數千人以為殿前司左翼軍拔石城大姓陳敏於指使中不數年為統制充措置盜賊敏弟犯令伯父斬之而敏不怨事既專一軍費大省羣盜或招或獲而境內晏清矣前此戍兵不聽號令秦相靳於軍賞伯父臨以恩信故事無不集伯父初計欲降賊取盜自贖拔功多者為將以厲其餘朝廷每聞賊降必取以去伯父於其降也先激使之比去皆有勞績盜賊稍定伯父下令山寨勿葺銷其固險之態民無冦患山寨亦空在鎮四年平豪賊百七十部汀賊李谷故郡豪右其兄子遐奴反主谷為重三日至三萬人伯父批諸將所上變書互送諸部不再旬而谷敗雖幕府不知也海冦陳小三列艦六十犯境伯父遣水軍統領鄭廣以三百人擊之期三日破賊廣請益兵不許居三日賊舟阻風江浦廣帆舟斷浦口不血刃取之盡虜其軍魚貫束之以獻廣歸問曰廣軍以一擊什不自謂勝公料功在三日何也伯父曰第從吾令母問何以知之提刑吳序賔媢伯父之能數以功狀不實訴于秦相有告土豪葉勝反者秦以付吳吳見伯父問計且請兵曰朝廷以勝屬公某何與發兵唯命但恐師興而勝不可得耳吳不知為計遂辭之改命帥司伯父處勝兵職擊於軍已乃召之辭以母疾不至伯父遣醫勞問且止其行他日勝來執斬纛下伯父每平強冦戮魁領罷遣枝黨一無所問懷服遷善誅李谷也吳憲疑賊首輩欲生之伯父曰吾豈樂戕人命者察此等非良善舍之將復亂耳竟不得已而貰後多獲之滿山紅中上功初不見録蜀士鍾鼎客於張淵統領邵宏淵家宏淵質直喜功淵惡不用宏淵常對諸將面折之淵以宿忿杖宏淵百斥入士伍鼎上書秦相為辨曲直秦怒創聽讀之名放之福州實赦原所不逮鼎白求其所親於永福縣伯父聽之鼎復走行在所上書有㫖劾福州官吏伯父自劾某實寬鼎官屬何罪秦相不說例降一官趙相女嫁福州女僕被笞即自經死或欲罪文中當路意伯父按驗明白之方事之初伯母劉氏諫曰奈何按問趙相女子家事伯父曰我不傳以丈法適教我者又將中我豈不反為趙氏纍乎或造安撫使印為人轉資吏薄其議伯父判牘尾曰師以印為權軍以資為賞盜竊權賞將何所不至乎斬之以徇經略廣東也秦相語執政曰薛直老治福建水陸以清廣東盜賊未平更付此者韓京戍循梅州彈壓盜賊秦相意京難制檄伯父取之京謁見南雄州伯父即席諭京丐罷送出嶺遣將馳入其戍代之京初討賊閩廣界中與麾下諸將爭功有隙至是賴伯父免死始大服其雅量僧宗果得罪秦相褫服加巾竄嶺表道出南海某從之者數百人或欲以危法加之用茹菜事魔告之伯父曰得非僧宗果者皆佛之徒爾告者慙沮不敢復言伯父在閩得目疾內障至廣加劇使人讀狀乃判覆誦如流獄吏與囚為姦縱抱成案宵逸未之覺伯父夜中傳鑰呼巡捕吏直扺某處墻下搏之下謂有神無敢欺者纍章請祠不許有醫夏侯裴為金針抉目明瞭如故盜賊告定始録前後功加待制云伯父居官鄉人有所欲見者皆有以答其意終始無倦色先君既以伯父而葬所以收恤其孤者尤盡恩致其詳别見之至今鄉中論謀略氣誼咸推伯父為稱首將葬季隨裒録遺藁請狀其生行實將求立言之君子為之表志以示不朽云兄左朝請郎知台州軍州事嘉言狀諱司封伯父也性忠厚行修整好古學再舉發貢後母黨蔣璿宰長溪以其貧召之為辦路賫伯父謝曰京師雖數千里逺然罄所有亦足以供往來費入李相幕李救太原次懷州不進伯父諫之不聽遂棄其師江隂圭田通奉錢月百萬伯父罷取不如令者捐减居半紹興八年有詔以亢旱許中外實封言事伯父以嘗召對不稱罷不敢強聒擬杜牧罪言作聽言論初知溫州蘇起重伯父節行就問政理亟延伯父宴席伯父因蘇來㑹辭曰某何為者而府晏必與無乃為盛德纍乎蘇瞿然曉曰以書還我然自今毋我外有可提誨願聞之當時相與乃如此餘在待制伯父所為行狀中初光祿大夫在貧約中收嫁族人孤女諸父行誼皆有祖父風烈司封常謂孝衰於妻子而人多厚妻族惇厚本宗每用其至兄弟四人相友愛如手足待制司封最先達遇之官必合兄弟之舍與從昆弟之遺孤以行從父兄故言卒司封收録其子伯震教撫終身待制長育從弟與言既為納室又擇名士林松伯高以其妹歸之伯高終於南陽丞復迎嫠嫁于葉氏先君下世將仕先兄又卒待制念季宣及諸姊孤露迎歸為嫁叔姊逮季宣長遂任以官為之築室求婚然後引郊賚恩得任子以通判伯父未仕舍其子而官之黃氏從母遭亂貧窶諸父迎居鄉里以便賙贍事之如祖母然通判伯父諱昌言字韙明潜曜不喜矜持溫然厚德君子也待婺倅不赴奉祠卒以司封父之清修通判之和厚待制之英偉先君之方正性德異操而雍睦無間為甚難足為兄弟法矣上為祖宗名義行業如此以季宣之勿克負荷家法淪替遺風泯絶㑹將流遁鬼蜮言之有靦顔面大懼年祀寖逺故老凋喪一旦溘先朝露而我先人之烈亡軼無傳以重忝祖責敬以見聞仰箋先君遺行祖父伯父行事之遺落者因并見之瑣碎不書為大者之存也既將上之史官而不肖者亦永有以自監子思上記夫子而不失其意雖不敏願學焉誣國史以增飾私門之令猷季宣豈敢孤季宣謹泣血箋先大夫右史公行狀如上書先右史遺編先君右史遺編手澤二䇿先兄將仕手抄一䇿使事録二䇿議和奏草一卷遺表一篇裒成一編通行狀為十卷不天幼失怙恃初先君下世當秦相檜柄國伯父司封為君行狀雖書法不隱於事不敢加詳先兄集録遺書懼為家族之禍故如議和劄子誚嶽相飛書之類皆别匱藏貯有待而出某不能知也不幸先兄早世罪大惡深徒知寶藏已録之書不意尚多遺落旋歸自蜀始能遍閲家書于棄紙中得前書手澤一䇿及議和奏草奏草亦先君手澤書首已不可見雖號天自痛訃無所及矣大懼先君之烈由我而墜于是㑹為一帙以便子孫之藏且待太史之求編諸墳典初君待南劔州司法光堯壽聖太上皇帝幸甌浦丞相趙公鼎以中師扈從君以書見丞相讀而懷之曰公以諫臣望鼎鼎何辭焉即席而言及于聖學丞相盛稱上在戎馬猶不廢讀資治通鑑君曰是固聖上美事然聞知之非艱行之惟難信能監古今之治亂而行天下大幸丞相愕曰久矣鼎之不聞是言也留坐而語不知屢前其席明年丞相簽書西府首薦君以國士登對論君子小人之事議建方鎮以安邊鄙皆略蒙施用時上春秋鼎盛儲嗣未立君首陳大計頗見開納同里婁公寅亮為監察御史聞而繼之其言尤徑大略謂本朝傳國十帝而大統三絶太祖有國而太宗享之天意人心未必不為是也上曰太祖舍其子而立其弟朕之所師也是故擇後之議不及於太宗諸孫皇上之後太宗實根諸此君自以為言之不若婁也帝寫其章而自誦之方計議樞庭常攝户部郎事禁省須錢四百萬泛用君執奏稱㫖用是有湖南之行衡永阻飢君留上供漕粟賑濟全活巨億計盜賊以清王太尉􅊅討楊么君知王不知舟楫間事上奏委􅊅邊塞時嶽相以偏將戊洪吉君一見知其人表飛可清湖湘後成敗如君䇿君之在都司也獄有父盜子財子不知而殺之者有司當以夜入人家登時殺之勿論君駁之以為子之弒父寧論曲直况入子家非人家盜出困窮子之孝養何在扺以大逆議者然之和議興屬秦相隂植黨與凡議論異已者皆斥去之君一再言不從因不復論秦不知其異故自趙丞相以下皆出而君獨留丞相之行送者惟君與郎官二輩丞相欲論秦一罔上事君以義止之丞相行而舉手而戲曰鼎行如公寧復留此君徐應之曰未可量也秦聞頗恱召君致謝君曰趙丞相與某厚為之謀安敢不忠故秦不復疑及侍從旅對榻前君列其非是因面疏秦曰偷安固位于相君私計則便然以仇讎臣辱君父忘宗廟之大恥于心安乎與之廷辨移晷因得疾以歸自作遺占猶詆秦計甚斥君常喜道清心省事約已便民二句及上斯奏首論及之舊事右史終有致事遺表恩澤秦因沮壞成法更為新制君之大節蓋如此其他細務在他人為可稱于君為不足道者皆不復著嗚呼先君逝矣敻敻孤子獨季宣在何修何事可以繼志承先惟有收拾遺書裨補志狀之闕昭晰始終之節差可以無愧抑嘗聞司馬文正之簡吕由庚曰子孫正當發揮前烈垂之不朽今日不録申史院則先公事業遂汨沒矣又嘗聞李蘩為泌家傳其間不無溢美後世既疑其妄先公實事因併疑之子孫之愛先人政不當如是則先人之志不可以不發事之詳略不可一毫加也故某書此續諸行狀遺編之末俾後之觀者得以互見焉二書已詳則不復敘隆興元年正月甲子孤某泣血書叙遺編别録孤某既次先君右史文筆集録遺編患其未能備詳求諸緗帙又得遇事勤書及癸丑續記一䇿續記多記奏雜稿行草相間往往斤削塗竄不可盡識字字尋繹始頗可通去其復重抄其要切之語編諸書末以為遺編别録俟有他求而得將以備後録云嗚呼先君之言亦少詳矣方其以道屈信於吕趙張秦數相之間其立朝誠節見諸事業者遺編行狀固已略舉至于先君出處交承師友之際所以切磨麗澤相期于三代之道者别録見為多焉某罪逆至深先君遺書求不能早不知續記之類其亡幾何悔不可追矣顧惟不敏奉先君之餘業兢兢栗栗惟恐失墜如臨絶壑而無慿依繼述之方知以遺書從事而已而今而後其能免夫後之子孫觀此先作無忘乃祖之烈以時次其家集毋若我之不孝焉負罪而書不悟漣洳之丹臆也某謹敘志銘故通判臨江軍事王公墓志銘初臨江郡通判王公以文林郎知鄂州武昌縣治有遺德縣人懷之已代而挽公留邑居葬其先人朝奉公于金牛鄉之虬山公待次臨江某承乏武昌令用通家子眂公丈人行凡公所為教告亡非為民之實居亡幾何公屬疾遽裁處家事隱几而逝家人號哭而呼之公舉首曰死生常理勿呼我遂卒邑民德公匹素往往多孺慕者子望之奉公遺命將以古昭穆法祔公于先朝奉之兆少南餘二十步葬有日使其子綱以公行實為求志且銘某辭弗獲命謹論次以書公諱揮字時發其先姬姓以王者後為太原望族文中子其胄也乾祐末漢劉氏亂有名助者辟墜睢陽之下邑公其六世孫也曽大父邦彥知開州大父昌符通判南安軍事父鑄以公贈右朝奉郎朝奉學通經術崇寧中退居養母以其學教子姓公年十八繇鄉貢入太學第政和八年進士主簿新鄉劉豫來知衛州公䇿其必反豫聞銜憤次骨屬諸公論薦移公絳丞豫吹毛求其後疵迄莫能中靖康亂南渡丁先朝奉艱終喪調蘄州司理參軍巴河戍兵拒李成冦積多或告殺人冒級賞公疑為緩獄用得其情全活數十計遷知武昌縣事兵荒甫定軍書調度無虛日邑人流散公補刓剔蠧政成不擾流亡稍復為營百室處之未幾成邑肆用薦者改宣教郎歷知瑞昌懷安縣閩人喜訟公治之必誠民利化之卒三祀亡留獄移簽書荆南節度判官事今太尉公劉錡以元勳為湖北率其鎮在荆南莫府文書嘗資公議者輒令亟下勿復視秩滿除通判臨江軍事㑹卒絫官左朝奉郎賜緋魚袋享年七十有一夫人趙氏封安人子男二人望之釋之望之中進士科主潼川府路轉運帳司女一人孫男綱女孫二人皆幼公學問有淵源恆訓誨其二子曰忠孝在人猶衣之布帛食之稻粱不可斯須去也君子學問以成身清儉以約已中正以從事謙以下人慈惠以及物慎密以逺禍信能安此數者匪直于人無斁明神將保之矣人非鬼責夫何慊焉公之所立蓋如此其交人有始卒始學聲振國庠名士如祖秀實輩皆親重之所為詩文一時傳誦當官屢平大獄人不敢欺寮宷有咈事情事聰察者為之調護委曲俾協于中乃已尤恬進取或教之干時相求達仕者公曰姑從所好而已卒以紹興三十年十月庚午以嵗十二月庚申葬銘曰不顯而章不熾而昌世奕其光惟此王公遹時祖德平康諒直識到幾先雪䆒沉寃學自于源德音孰嗣惟河之涘汾亭孔子遺德斯邦渚鄂之岡萬世攸藏龜不知其長筮不知其短孫子無疆滲澤浩其以逺余仲美墓志銘自國家以科舉取士士以程文覔舉一不中格見詘於有司雖負王佐之才懷治世之具悉擯棄不用而闒茸脂韋之士厠名科級有階以致清顯者實繫其人之幸與不幸蓋不足計其賢否德興余仲美其賢而不幸者與初仲美授經于從父石月先生蚤見知重嘗舉才武一旦不屑去之政和中由鄉貢入學久之不第仲美喟然曰吾親老矣旁無兼侍且遇合有命吾居易以俟之耳告歸養其父母宗族無間言執喪哀瘠躬負土以奉襄事作白雲亭于冢次致其孝思一時名人如吳園張先生根程尚瑀方待制孟鄉邵少卿昂從弟吏部應求與今江西漕使敷文魏公安行咸略去勢位從之游處自尚書而下皆為賦詩亭壁紀其純孝而吳園先生至自筆栁開家訓贈之家豪於資自仲美先人世以賙急賑窮為務未嘗以為德仲美重美彌篤自奉約甚語人善不絶諸口鄉閭有訟往往就之平决恥於官府紹興蒼龍甲戍仲美生六十有八年矣纍舉當受恩命㑹病以卒仲美嘗謂人能正心直已雖生不富貴死且不泯張侍郎杞與仲美同學少善侍郎以兄事之其守潼川夢仲美與之語泛論世故凛凛如平生歡時仲美亡有日矣里人有死而更生者云恍惚觀仲美坐府若大吏然夫人劉氏弋陽人婉孌有賢行後仲美六年卒亦臨終不亂子男持峙特待疇詩嗣其業女歸進士程耦紹興三十二年十二月甲申諸孤始克奉公夫人之喪葬于卓山之陽武昌尉王某其妹夫也以所為仲美行狀見令甌浦薛某求其銘與志某按仲美諱公彥自曾祖鼎祖修已父師民至仲美世立德弗耀法當銘銘曰里之仁孝之純武而文屈而伸行通神蹈真淳卓之山反邱樊子之孫千萬年世其賢視珉堅林南仲墓志銘走之友陳傅良君舉以經學教授州縣亟為走稱其生徒林大偹者為平陽善士走待縣常熟寓家具區滆上聞君舉不逺千里過之他日出大偹先人南仲行狀為請銘君舉不妄許人宜可信屬走以志其何辭南仲諱杞其先家閩中唐㑹昌大中間有名彥者從橫陽之金舟鄉遂為林灣里人由彥及頌四世無支子頌始三息君曾大父基其季也大父景深父汝翼世豪于資自君先公和柔不與物競由是稍淪落君有兄某不喜家人生産作業君方少奮曰吾子弟也可不任親之憂不能興起吾家若祖父時不室矣料理家政一不以纍父兄行年三十有七而娶時家道成矣君於治生理財曾不汲汲種桑課農井井有條理以故他人不足君獨有餘兄無室家君事之猶父也祖居華敞君始築室其西便溫凊先公即世君推故第與其季無靳色蚤雖靡學然其優游樂易如自足于內者閒居冠履必整而自奉簡素立坐不嘗跛倚對妻子無惰容精悍至老不衰非勉強然也享年七十有四以乾道四年九月哉生魄卒以明年十二月幾望葬娶陳氏子男三人大任大備大時女一人適楊氏孫男二人陳夫人習婦容治其庭內有可法者子皆儒學大備居喪以禮亦近時所難銘曰湖源之岡公乎歸處左以瞻吾祖右以依吾父故醴陵縣丞江公墓志銘代賈簿作皇上紹興二十有七年某月甲子荆湖南路都總管主管安撫司臣璹轉運副使臣姓名提㸃刑獄臣姓名提舉常平臣姓名言醴陵縣丞江符權茶陵軍使兼縣事治有能蹟宜蒙褒顯未報醴陵之民列請還公于府某月甲子其孤某克葬公于蒼山故壠門人攸縣主簿劉來狀公行事而請銘于某某雅服公誼不可以辭謹肅拜為之銘志公字信仲建州建陽北樂里人曾祖某祖父某世為士母黃氏通經文學躬自教子公生八嵗工詩長從鄉貢入太學紹興某年以進士擢第調永豐尉縣居江浙要㑹郵傳之用舊事取給里胥公裁始出于官遂為定例前此催科無法公不擾而辦民訟久不决者咸即公平處信州守將三易皆進公賢徙辰州録事參軍始至圄犴充溢公一以誠聽先釋左驗囚多不訊而臣洞蠻擾邊公持檄招諭率聽命馴服用薦者關升左從政郎改丞醴陵直某閣陳公鎮湖南延公府幕權茶陵軍使軍界郴吉大盜侯將軍者嘯侣千計据神農氏陵肆略為江湖患者十餘嵗公身履行陳執獻于府軍政積不理吏隱賦入而重為苛斂公按治情得貸其責俾畢償財計盈衍橫斂用絶于民還縣疾作已病猶草書遺親故告别卒年六十夫人張氏鄉先生長樂尉某之子工文尚義之人謂班姬亞匹後夫人熊氏提舉江西常平某之子男某舉進士次一人幼稚女二長歸賈某次歸詹某皆進士業文公好著述遺書凡二百卷門人前進士陳某為編録刋行于世公事親孝自處亷隅歷官皆有聲稱以惠安無告禁暴戢姦為急家貧篤于行義先業推之幼弟無所取詹氏女兄少寡公為字撫其孤居閒以經術教授里閭於門弟子無少隱誨誘孜孜不倦用是多舉選于朝永豐學廢不修亦自公而復凡此公行之大者皆可銘銘曰有安而靜有寬其令惟窮民是定惟兩辭是聽刑其于無爭古良吏之治邪曰子江子之政蠢爾蠻荆或嘯于陵不見其形卒保其纓民用康寧古良將之事邪曰子江子之兵於乎子之德匪文匪飾後生是式允躬是飭有堅斯石爰攻爰刻匪子之為益警于罔極王夫人墓志銘代人作婦人之賢能以義方教子為難人子受教母儀卒能有所成立而拜親于垂白者為尤難德興王氏之母曰吳夫人嫠居而能誨其子四兒皆與舍選而浩棟柟者竟能以絫舉賜命祿及其親夫人福壽康寧享年九十乃卒二者兼萃其王氏之門乎初夫人姊娣三人有老嫗相之曰是家三女皆中相法宜其夫子而壽過耆耋者唯季女當之伯姊為故中奉余公安行夫人所謂石月先生者也仲姊歸上高知縣王元夫宣教亦以儒顯夫人其季也歸于居士王公諱某同里張氏本王出也居士居曰吾祖姑蓬萊君相張氏以儒學起家為今江東甲族吾切慕之居士終夫人奉先君之思所以誨其孤者不替竟能以儒學自奮用光閥閲余氏夫人早卒子吏部應求持節閩嶺江西二道興渭陽之念為辟浩而奉夫人以從吏部事之如母夫人喜曰吾不教子能辱公賜乎後十餘年棟柟各當之官爭奉板輿迎候夫人憚於遠遊不許紹興二十五年九月朔甲子以疾終于里第在姊娣中最為壽考如相嫗言夫人少而端靜自歸夫家協和內外大小歡愜姪有幼而孤者夫人撫之猶子夫族或終于外夫人為收葬之夜夢其人謝焉其天性仁慈類此子浩初舉進士在學有聲考文屢魁多士先夫人卒官至右文林郎奉新丞朴中年以家纍不遂於學棟今光澤尉柟永興尉女歸進士張瑴孫男十人女四人曾孫男女十五人越明年十有二月丙辰諸孤將奉夫人之喪于居士之隴柟以左從政郎李扶之狀來求銘余與浩同學聯姻又與棟柟同預鄉貢知夫人為詳夫人縣人也曽祖某祖某父某故不仕銘曰惟夫人之靜特兮羌聖善而好修襲翠羽之華裾兮蹈𤣥雲而逺遊紉留夷而象佩兮燦夜光之陸離含芳蓀而宜厥配兮從運期而與歸芝蘭雜遝其庭砌兮馴鵷雛與霄鳯乘白雲於九衢兮光母儀之德頌崇喬松之高壽兮澎湃乎其滲澤嘻深深之葬玉兮餘潤滋於樂石浪語集卷三十三
