body:
  text: 浪語集别集類三宋提要臣等謹案浪語集三十五巻宋薛季宣撰季宣有書古文訓已著録季宣少師事袁溉傳河南程氏之學晚復與朱子呂祖謙等相徃來多所商𣙜然朱子喜談心性而季宣則兼重事功所見微異其後陳傅良葉適等逓相祖述永嘉之學遂别為一派葢周行己開其源而季宣導其流也其厯官所至調輯兵民興除利弊皆有成績在講學之家可稱有體有用者矣平生所著自書古文訓外有古文周易古詩說春秋經解春秋指要論語直解小學詩今多亡佚其中庸大學觧及考正握奇經則今尚載於集中葢季宣學問最為淹雅自六經諸史天官地理兵農樂律鄉遂司馬之法以至於隱書小說名物象數之細靡不搜採研貫故其持論明晰考古詳核不必依傍儒先餘緒而立說精確卓然自成一家於詩則頗工七言極踔厲縱橫之致惜其年止四十得夀不永又覃思考證不甚專心於詞翰故遺稿止此然即所存者觀之其精深閎肆已足凌跨餘子矣是集乃寶慶二年其姪孫知撫州事旦所編次刋行旦作後序尚存而自明以來刻本遂絶蔵書家輾轉傳抄譌脫頗甚謹重為校正而巻帙則悉仍其舊焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:dfd3d3d0c6fdf86266404cf35b742b20762da743cb1a0145c86f8ab6484cf55e
