body:
  text: 浪語集别集類三宋提要臣等謹案浪語集三十五卷宋薛季宣撰季宣有書古文訓已著録季宣少師事袁溉傳河南程氏之學晚復與朱子呂祖謙等相往來多所商𣙜然朱子喜談心性而季宣則兼重事功所見微異其後陳傅良葉適等遞相祖述永嘉之學遂别為一派蓋周行己開其源而季宣導其流也其厯官所至調輯兵民興除利弊皆有成績在講學之家可稱有體有用者矣平生所著自書古文訓外有古文周易古詩説春秋經解春秋指要論語直解小學詩今多亡佚其中庸大學解及考正握奇經則今尚載於集中蓋季宣學問最為淹雅自六經諸史天官地理兵農樂律鄉遂司馬之法以至於隱書小説名物象數之細靡不搜採研貫故其持論明晰考古詳核不必依傍儒先餘緒而立説精確卓然自成一家於詩則頗工七言極踔厲縱橫之致惜其年止四十得夀不永又覃思考證不甚專心於詞翰故遺稿止此然即所存者觀之其精深閎肆已足凌跨餘子矣是集乃寶慶二年其姪孫知撫州事旦所編次刋行旦作後序尚存而自明以來刻本遂絶藏書家輾轉傳抄訛脫頗甚謹重為校正而卷帙則悉仍其舊焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
