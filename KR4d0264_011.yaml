body:
  text: 浪語集卷十一宋薛季宣撰詩元日星回斗直寅夏臘變王春否泰反成卦乾坤老逼人元正長日月大化少逡巡世事初無始天時自一新秪愁梅片片不見草欣欣善頌聞椒酒蒼天拱北辰孔子蕩蕩東家某百世人叵識出類只誇辭太極無合德堯舜未可過逺賢真貨殖我欲究遺編言非是竒特從之如有立卓爾既吾力大哉贊乾元一語覔不得比年士風鋭進求薦章者殆如辨獄擠排詆訐無所不至客有勸豫干當路者二首見疾多朝士爭名卒未休急流須退勇焉可又隨流靜退方真樂趨時未遽非不如全道者進退兩忘機痁疾中元式示詩走筆次韻鄙人病在床政苦風寒侵之子步池上攀條哦栁陰擲我珠玉辭瘧鬼毛髮森豁爾脫沉痾翛然洗煩襟何當漾輕舠相與從茂林清興諒不淺此情殊未禁強歌下俚曲賡和白雪音請問覺軒詩何如梁父吟江夢孫二首聿修去天長却泛宫亭水百世友淵明放意匡廬址為愛千金軀不自知臧否非關走庭下腰折慙小子少學愴難行富貴丘所恥一為田園念歸思輕脫屣斗大印黃金各各從所美二士志俱得何其尚留此聿修去天長元亮歸彭澤把版豈難能趨庭且非借古之盡心者樂以所求獲云已任先知寧當究安宅大輿輻可説無當巵何益君子之所為百世空陳迹巴口相地作大軍倉南浦縱蘭棹打頭清旦風鳥飛圖障逺人皺縠紋中銜尾過千柁顔無萬叢敖倉能得地轉餉定巴東送韓國器登舟至石門視窪樽逮暮乃返縱步石門下江山主意勤窪樽酌玄酒未飲吾已醺泉明得聱叟萬古真同羣壞湖有明齊退谷今蕕薰我行到殊亭西日沉就曛陽氷著真迹秪恐生玄雲回眸望西塞慘淡波無垠洄泛樂之子行舟言采芹我客昔我客荆梁從事清蕖幕太倉蠧紅腐吹竽濫東郭去作徒勞吏青衫走樊鄂撫字亦何心催科猒笞掠借問差少愧而今不如昨天遊內于于紛至攘六鑿鑄此一錯字為費幾魏博間居幸從容琴書有真樂胡然令間忙逺謝乘軒鶴人生百年中藏舟固非壑顧已習迷途如蠶自纒縳作詩懴當來聊以慰蓼落欲晴又雨終夕震電日昃望雲氣西郊將欲開丹霞漾晴暉清風有時來歸坐北窗下驚霆殷轟豗流電掣飛雨疾徐鼓巖雷宛轉頽屋頭終宵響徘徊早起到城市橫流繞沿洄伊誰補漏天陳絮與蘆灰跋分定録人生紅樹花一謝乃其分春風儘搖蕩剛恨分庭糞先賢尚龍豢缺月何灰暈譬如陌上塵要是非關運仲尼示無眹子路窮斯愠此理未容言呼兒課天問鄂城篇袁山野火春風吹驚飈萬馬爭奔馳烏龜阪頭蕃草木化作灰燼張天飛武昌佐史皆好古煮茗聯鑣訪城府狂生此意復不淺好事大家何爾汝鄂王城闕煙蒼蒼鄂王宫殿波茫茫今古都盧一餉頃不見古人虛引領亳殷豐鎬已丘墟蠻荆興替將焉如死生建業信徒語石盆古渡猶多魚古人已去安足齒近事紛紜尚如此君不見淮淝去嵗是豐年如今千里無舍煙謝王尉見贈龍溪集稔聞韻鄉名不識韻鄉面班班隱豹文窺管時一見譬彼闥婆城尋逐滄流漩聞韶在齊國九奏何當變王侯韻鄉人少長居鄉縣韻鄉指迷塗貽我書一卷森如入武庫寶壁紛交薦炭玉屣登臨赫日吹風霰家雞將野鶩後素詩何絢長安行即到豈在臨淵羡千金端不如變色先生饌從可狎江鷗六籍居貫穿二同舍賦鄂城篇見和文高格古端不可及而仙尉王文措辭侈甚可以參諸臺符羽檄間復次元韻戲酬生春暖律誰能吹寸心萬里何當馳威加海內念方國也思猛士歌雲飛狂遊不識今與古闉闍便作潭潭府試憑野叟問吳婆俗名鄂城為吳婆城賜不如回吾與汝高高無是幕穹蒼湖天無雲湖水茫吳楚爭桑如有頃東鄂幾人全首領古時封國今為墟此心觀古應焚如歸歟衲被蓋頭卧何妨沸鼎遊如魚舌柔長在強於齒人間萬事渾如此君不見老聃彭祖俱長年無忌火化仙乘煙次韻李浩然喜晴我愧子康之治密其雨其雨而出日靡神不宗始􅗈霈將為有年吾事畢豈其霢霂澍霖霪霮䨴又為心首疾祝將圭璧走羣望祈社禜門勤屈膝誠知惡積怒神天流毒匪緣寒自慓甫田千畝垂有秋刈穫敗之方秀實橫流場圃澆洋洋茁茁禾頭多耳出仰天何怨俯何尤退省過愆知自失牢愁僕僕事吁嗟風雨敢辭頻沐櫛忱誠雖至蟣虱微舒慘蒼穹焉可必都緣民困不聊生重以凶荒神以恤羲和叱馭黑龍僇倏忽清明開萬室不知帝力固全真謂我貪天寧直筆河豚豈其食魚河之魴河豚自美江吳鄉瞋蛙豕腹被文豹則如無趾黥而王我生甌東到閩方規魚貫見梅花裝梅青不肯候風雪荻芽靜笑垂飛楊古來多魚吳武昌薄遊三月新初嘗西施乳嫩可奴酪馬肝得酒尤珍良無愁縷縷結中腸豐美肥腯如切肪外皮甘滑裏皮厚令人忘却美烏郎舉之東海來三江會聞清濁斯滄浪白龍未免豫且困膨脝唯唯浮魚梁氣衝毬鞠何彭彭地逺都無橄欖香不知深入恣遊泳極情性命徒為戕臘毒厚味能人亡何須西子齊文薑甚美由來必甚惡直它一死言為長鮰魚俗物休相妨良藥相傳海上方蘆根槐子豈足貴生龍之腦黃龍湯東坡在齊安賦海棠詩為天下絶唱年來絶無此種許仲蟠取之武昌作詩寄示武昌三月春草生攙紅鬭白皆羣英就中一種信奇絶芳菲壓盡吳王城侈非丹芍明非玉豔陽天日擎高燭從教深淺色相形不以冰清為不俗文王自昔基靈囿緑綬朱裳燕朋友醺醲心醉鄂裳裳痛飲醇醪不關酒流烏一下新王舟颭從火御乘丹丘傳得飛霞在海外千齡只自生炎洲靈砂不到姮娥竊幾時赤鳳來丹穴趙壘新張漢幟時闉闍滿望猩猩血少陵昔漫稱詩豪忘言跨鯉輸琴高剛被東山興妖女竹菰未可稱蟠桃靈根不分生赤壁逺在水南呈赫奕朱鳥憑將寄德鄰告言莫看同巾幗王彥材謂東坡以海棠比婦人非是故此詩皆不言婦人寒溪送客時李花盛開山谷彌望寒溪送客荒徑迂玉華璀璨晨光虛仙遊在處見李白逺山無地尋陶朱雪霜天色際江岸瓊瑤世界連廷除飄然幾許認故榭恍若一夢驚華胥寶圭環璧會王路鐵衣鋒刃交兵車三王純素未云已百姓渾茫方皥如神清洞古世緣在梁園秖是空遺書蟻啄䎘吳人謂雀為䎘啄䎘玄駒子當緣一食耳雪貓與䎘俱咽之玄駒乃與䎘俱靡古人防未然精意本如此相教各自慎豈有失身理䎘子輕此蟻終焉食於彼蟻亦甘啄䎘但知䎘之美寧知臘毒生厚味大小相吞不搖齒蟻微不足食反以食䎘死不如夏蟲獨飲露夀不知冬亦良是君不見慕容赫連攘臂起燕夏存亡竟何似釣臺阻風去得風便先生非釣名魚釣清泠水太虛長廓然浪迹秋光俟人憂我何憂忘怒亦忘喜建武非漢元詎有留侯起神明旋地軸姓字更七里雲臺已埋沒嚴瀨殊清泚峩峩二釣臺高插煙霞裏首陽逺相比萬祀恆不圮我來經舊廬敢卜瞻遺几東風回我舟江步時須艤仰觀嚴像設敬拜豁煩鄙曽臺暢登臨無復徒仰止縈紆古道屈望望扳蘿藟崇基介嵓石特立端不倚削成二山碧平止章如砥衆山鬱青蔥環合紛碨礧清塵森萬象觸睫同一視古人不可見可見安仁美旅情殆忘返回棹西風駛青蒲挂一席入望俄城市瞥如周變秦物物非古始乃知主人意待我非朱紫送迎因下風忙遽均倒屣烹茶出清泉盤饌羅雙鯉飫之以珍羞浣濯豫塵滓相忘語默間不假談名理去留唯我意今昔交汝爾此情固冥契何必親之子乙亥嵗東遊會稽謁禹陵過馬臻祠下詢所謂鑑湖者則已堙塞為民田因賦登會稽瞰長湖漪漣萬頃皆平蕪桑田變改唯聞説豈信古今人事殊往時夏后禹道川治水勞馳驅四支疲敝跛其足過門弗視兒呱呱衆流宗海出平陸滋人巨浸因卑汙百神效職來大計勤民逺狩崩于峹名山立郡此焉始明明功與日月俱馬侯有漢二千石施仁復古蘇燋枯浚深培薄拂古鏡還使墝埆成膏腴陰邪醜正富權戚居育如鬼捐其軀大君良吏不復見茫茫陳迹日就無玻璃湛湛長芳草蛟龍窟宅生菰蒲前功不録倚隳棄誰何聚斂浮穿窬情非聖禹決陂澤遷移膏潤為官租昔人舊事已無在猶有水識長途高田燥仰下沮洳雨暘無嵗均沾濡咄哉榮利歸乃室是邦黔首其何辜反令二主神淫祀煩此都王陵委積蠧明幣守祠澆酹傾清酤禳禱兩無已跳梁飽妖巫享祭緣報誠嘉猷委泥塗神靈血食已非分無為耗黷令人吁復績悵何從我心徒自慺張村皇羲寂已久澆俗無還淳如何張村氓杳杳全其真豈不有妻拏茅茨甘賤貧豈不憚疲勞務時勤耔耘脫俗未為貴而今焉辟秦青城足躋攀那染龜城塵枸杞薦盤蔬殊非關養身安常樂有餘熙然阜長春奚其夀而康無知斯體仁靜言逐臭夫迷途少知津猥云老人村郊荒絶酸辛筋骨由堅強誰謂存其神井蛙議滄溟夫豈窺崖垠作詩賦張村逝將同野人舟行樊港望竹間石上李花盛開天下清且奇無過竹與石安得皎然者素質照人白靜立笑東風篁岡蟠罅隙望之輕以明儼似雪初積青草鬭欣欣不比梅花拆矯首不可到獨自憑空碧翠帷篠青青巖崿正虛席我疑辟俗翁方外支三益又是秦帝宫傳視相如璧人情不易知幽致矧可射相從知未能灰心從此畫遊韓魏王書堂蘭生深谷中香不為人採明珠含蚌胎融曜鎮長在裛來馨滿衣磨琢未曽璀君子行之常出處安有改韓王開此居山立中􅐑嵬窈窕二遊女易嵗昏有待栁下學東門百世人不逮乃心毋自欺匪轉焉可怠用之建邦國所宜烹大鼐我來追後塵六逸先駑駘美人意桃李德誼見芳茝瞪若眩吾明五色騰日彩二女篇天聖中韓魏公居所生憂從其兄琚守齊安即安國寺西廡為書堂以居恆有二女子夜至衣冠高古容裝麗甚公恬不以為怪及去二女告曰妾非人也亦非仙人鬼魅遊處再嵗而言不及亂公德士也行矣即推此澤天下走讀齊安記屈原之死二女慈孝亦于此投江故武昌郡人以五月五日競渡投角黍迎神舟上二女非仙人鬼魅豈靈均二子之精爽耶不然何知人如此乎而後先居者莫之能見為作二女篇姈娉二美人幽間真種性色秀雪忩梅衣冠儷修正巖巖韓稚圭寂寞自清靜虛室掃齋居展禽當季孟神遊問寒暄不得窺信行怪力視茫茫久要交善敬語之非異類安民公有命蓋聞楚靈均汨羅陳死證二子終孝慈雙玉澄江映當初黃鄂人蕩槳追遊泳端午化成俗龍舸長奔競事神微有道角黍勞將迎非鬼且非仙世士憑誰偵被命行田未半而羽書至造寨者萬别駕其逼方甚繼復有聞冷火不再燃事成難重言我苦不憚煩興言念丘園丘園未得歸行田縣西原暑雨霑我衣萊蕪絆我轅熊羆百萬衆未易輕營也東征到洪道折栁臨津門峩峩鳳皇臺墟吳際荒村南湖湛淪漪㵿渺波瀾翻路回間谷溪子規嘂煩寃流血良自悲誰念望帝魂不羞五斗腰折支别駕尊松門故鄉類去路馳且奔羽書如流星萬室崇屏藩荒涼舊村氓億兆不一存哀聲聽杜宇側耳心昏昏山澤久已竭職死何足論某為令無狀不能化服姦盜至加之刑僇仲蟠鄉丈不以為過又哦詩以寵之是重某之不肖而播其惡於衆也感愧之劇次韻以酬漢法在彛鼎三章豈不嚴姦宄恣暴亂官刑廢舂鈐未若箕山翁頑夫偃風廉豫慙斯人徒為容善謙謙驅民陷之辟淫刑視齊殱處事禁太速宜犴非為淹丹書對婦泣職死夫何嫌専誅逮垂盡吾辜倍相兼曽聞鄒魯間禮義人自恬商君就有道綘水驚閭閻念此一歎息歸來賦陶潛南山信崇極能無刺巖瞻記遊詩延陵道士何希全為人坦率狂易居天慶觀儕輩以風子目之走初識諸妻家嘵嘵然一多言人也甲申嵗至西浙從婦之昆弟遊訪何之居則閴無人聲扣戶移時而後希全者出肅賔而坐不交一談同行怪之視其齋舍蓋凝塵滿屋胡床雖設而拖泥之板亡矣意其非苟然於世者客退而主人不送客強之不辭及門謝以無茶遂翻然而入詢其行事不語既有年矣晚遊崇勝佛寺過僧道一不值視几案間無非貴人竿牘中庭有枯條不翦謂之龍華考記按圖乃野菊之下品王公聞人為之歌謠者至積帙而加多走閲短卷圖書謂必法書名畫開編而視乃其繪夢成圖一日之間所遇如此若希全者可謂身如夢幻而道一者顧以夢幻為真物之不齊有如此者因思列子之言為發一笑而作此詩先生混物化浩若鶴與猿詰曲此世間翛然脫籠樊宴心遂無物得意亦忘言客至不點茶猶嗔破苔痕相逢蜀成都過我故縣村遐觀夢中夢南膜佛因緣鄭人決真妄子産不能賢寥哉天地間誰省物性偏夢覺各有殊從他見一邊浩歌歸來乎虛堂好晝眠跋蠟虎圖刻木牽絲代不乏巧而偃師擅剞劂之技吹簫擊石師有其能而后夔名制作之宗何哉蓋精義入神則神藏其用至誠假物則物狀其形寫物之工亦猶是也婦弟元可所藏虎摶豕圖其枯條衰栁於莬剛鬛疏毛設色皆極能品之上至狀虎之蹲伏批豕頰而呷持之豕唏失聲手跑足廢精神形度曲盡一時之理視之使人毛髮森聳若倣徨乎其右也人以宣城繪人包氏善虎因以包虎名之走謂包虎之形但像虎耳至狀真虎之態包氏何足以知之夫真虎之形非全於虎者不能到也故走定為麗歸真畫而名之曰蠟虎圖歸真梁人宋太祖時以道士召對自言售畫得錢沽酒竟醉此外無能者嘗為廬山道人寫鷂而燕雀不敢來集其畫喜圖牛虎常伏草莽以觀虎之出入或蒙虎皮而倣其摶躍之形故其畫虎之工居神品上走知非歸真不解作此蓋惟歸真為能知虎非走無以識歸真也因跋以詩為之序嵗云暮矣露為霜枯條脫葉衰栁黃郊原寂歷無人鄉獖牙之豕充稻粱舍臕以遊神氣揚有斑者虎蹲在傍低頭妥尾不大忙豕行過之不虎防虎往摶之扼豕吭豕忙故步聲喚長虎如抱兒未遽央豕形雖在身命亡不如安之充虎腸得之紙本君何從仙人道士形已忘解衣槃礴裸宋王虎冠虎鞹虎跳踉百獸望之怖以惶寫鸇鳥雀為罷翔匡廬有潔清祠望請君懸之政事堂坐令帖伏犬與羊君不見大索之祭通八方盛德百世祠是常又不見螳蜋捕蜩雀捕螳死生得喪不可償虎哉寧知蝟􅛔能爾戕是非逺在天一方君其寶之永世藏孫元可賦張公石室詩句語險怪辭鋒秀拔讀之如神遊洞府而陵果為之奔屬也非身行此洞不知此詩之工蓋其質似盧同而文麗多之如又加鞭當千里一瞬其視劉義馬異得名浪矣詩文與我過當誠無足以當之牽韻勉酬真添薪煮簀之舉君不見談天衍有言九州之大惟一州無論青冀并營幽我其放言學鄒子將子聽之無我尤我騎一紙白驢子趷梯趷􅨬走上南山頭萬里以意行一息不暫留谽谺到空洞且作秉燭遊呼來混沌老蝙蝠爾作精怪我則不從教激風怒竅拔木折石一去旬有五日而後返但是有户則可由積蘇纍塊雖云巧達觀只與蟻蠰侔我有五雲車駕以六蒼虬日月行已揭無人觸虛舟何曽見爾懸旌鳴佩朗􅋔欲飛動玉柱校立直以修大撓甲子有窮盡爾乃祿命難考求皇天大地僅若一雞子金烏玉兔銜得曉夜作箭浮我不知爾許事政覺兩耳風飂飂託死不復生一死可作道者流況乃漢時五斗米師星河耿雙眸石壇一坐一千嵗坐視生滅水上漚水上漚且罷休休無休於無作樂無樂於無憂仙人與世人夀夭如相酬清清爰靜爰自正此舉獨步不可儔信是神仙足官府蜂房户牖封君侯我偶作此言不比亦不周為何孫卿子謂我阮與劉為我謝孫子我才愧爾天一陬不如且飲酒耳熱徒歌謳可以銷遣綿綿不斷萬古之悲愁悲愁銷遣幾時盡萬古之後重有萬古來悠悠春愁詩效玉川子春陰苦亡賴巧解窮雕鎪入我方寸間釀成一百萬斛傷春愁我欲挹此愁寸田無地安愁芻沃以一石五斗杜康酒醉心還與愁為謀愁腸九轉疾車轂擾擾萬緒何綢繆愁思儻可織爭奈百結不可紬我與愁作惡走上千尺高高樓千尺遡雲漢只見四極愁雲浮都不見銅盤之日缺月之鉤此心莫與明愁來壓人頭逃形入冥室關閉一已牢周遮四壁間羅幕密以綢愁來無際畔還能為我添幽憂我有龍丈三尺之長劒真剛不作繞指柔匣以明月通天虹玉燭銀之寶室可以陸剸犀象水斷潛伏之蛟虬云昔黃帝軒轅氏用斬銅頭鐵額橫行天下之蚩尤擬將此劒斫愁斷昏迷不見愁之喉若士為我言子識愁意不愁至不亡以愁生有來由間愁不足計空言學莊周日中之景君莫避處陰息景景不留疾行嫌足音不如莫行休因知萬慮為縈愁之繂忘懷為遣纍之舟歸來衲被蓋頭坐從他鼻息鳴齁齁取友造物先汗漫相與遊朝躋叫閶闔夕駕棲丹丘天公向我笑金毋為我謳酌我以瓊漿玉液朝陽沆􅒭之濃齊俾我眉夀長千秋却欲強挽愁作伴愁忽去我無處蹤迹尋行輈惟有春華鬭春媚一一蒨絢開眀眸又有平蕪緑野十百千萬頭鈍悶耕田牛踏破南山特石頭浪語集卷十一
