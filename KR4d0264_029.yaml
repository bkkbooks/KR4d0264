body:
  text: 浪語集卷二十九宋薛季宣撰解中庸解天命之謂性率性之謂道修道之謂教道也者不可須臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微故君子慎其獨也天命上天之載也性人受天地之中以生者也道日用也教成物者也天命即性也率性即道也修道即教也性命道教皆非自外作者在乎不失其正而已於所不見不聞之地有毫釐之差則失性命之正失性命之正則去道逺矣隱見微顯本一道也未有動乎中而不形於外者戒慎恐懼所以貞夫一也人之於道也造次顛沛而不可違者也無入而不自得觀感之教也喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉人生而靜天之性也感物而動性之欲也喜怒哀樂皆性中之物也方其未發不可謂之有及其既發不可謂之無喜怒哀樂正於未發可不謂中乎發而不失其所謂中可不謂和乎中者道之所自出故謂之大本和者物之所同歸故謂之達道天地之大萬物之夥未有離乎道者也泯中和而不離開物成務之道也仲尼曰君子中庸小人反中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也君子之中庸中庸也小人之中庸反中庸也時中時措之宜也中節者也反中庸則安於不善此小人之中庸也子曰中庸其至矣乎民鮮能久矣中正性也庸常道也居正有常所謂至德安之為貴安之悠久之道也擇中庸而不能守非所謂安之者也子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也人莫不飲食也鮮能知味也子曰道其不行矣夫所貴於知者為其能有擇也所貴于賢者為其能有見也人之望也所賴以先民也愚者固不及矣知者又過中道道何從而行乎不肖固不及矣賢者又過中道道何從而明乎孔子興道不行之歎蓋歎賢而知者過猶不及君子小人之間不能以寸飲食而知其味之正斯無嗜好之僻也毋偏毋頗則近道矣過物之纍所惡其鑿者也子曰舜其大知也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以為舜乎所惡於知者為其鑿也舜好問而好察邇言蓋未始自用而亦不輕信之也邇言猶察况其逺者乎天下之理未有無二端者好問而察邇言遏惡而揚善此執兩端而用其中之道也欲求中而二端之棄吾見其執一而非中也子曰人皆曰豫知驅而納諸罟擭陷阱之中而莫之知辟也人皆曰豫知擇乎中庸而不能期月守也子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣子曰君子可以大受而不可小知也小人不可大受而可小知也二者適反君子小人之辨衆人之知所謂小知也惟知之小陷乎大患而不自覺雖知中庸之擇固無安之之理夫小知而大知自見惟不役於小爾久於中庸之德其惟大受者乎顏子擇中庸而得一善所謂識道也拳拳服膺則心服而身守之矣未嘗須臾離也何從而失之乎舜之為舜不過執兩端而用其中顔之為顔不過擇中庸而得一善君子之道焉可誣也在乎知本而已子曰天下國家可均也爵祿可辭也白刃可蹈也中庸不可能也天下之事可以強為者是皆可能者也中庸天道也不可以能之也能之非道也執中而無方者也故曰神而明之存乎德行子路問強子曰南方之強與北方之強與抑而強與寬柔以教不報無道南方之強也君子居之衽金革死而不厭北方之強也而強者居之故君子和而不流強哉矯中立而不倚強哉矯國有道不變塞焉強哉矯國無道至死不變強哉矯子路之問蓋強弱之強也孔子分君子小人之辨託南方北方之強應之南方之強君子居之所謂養其大者犯而不校之類此伯夷叔齊所以廉頑立懦求仁得仁也北方之強豈子路所謂強者此匹夫之勇爾和而不流中立不倚國有道不廢不為無道改節自強矯矯惟有道者能之而汝也矯矯特立貌子曰素隱行怪後世有述焉吾弗為之矣君子遵道而行半塗而廢吾弗能已矣君子依乎中庸遁世不見知而不悔唯聖者能之素隱行怪掩其素行行其左道以欺世盜名者半塗而廢自暴自棄者若之人也皆為人者也聖人有所不能為為之不能已也君子之道乾乾而不息者也遁世不見知而不悶非惟人之知也依乎中庸徒以成身而已非聖人而能與於此乎君子之道費而隱夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉詩云鳶飛戾天魚躍于淵言其上下察也君子之道造端乎夫婦及其至也察乎天地道不逺人故雖匹夫匹婦可以與知之至大至神雖聖人不可以意知不可以已能所謂費而隱者其中庸之至乎天地之大而人有所憾不能成其大爾夫子之言性與天道不可得而聞也言必有物安得舉而破之乎造端乎夫婦可以與知也察乎天地謂上下察也鳶飛魚躍各正性命者也致中和天地位焉萬物育焉豚魚鳥獸夫豈外此哉子曰道不逺人人之為道而逺人不可以為道詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺伐柯執柯以為逺此近於天地之大猶有所恨者日用飲食此民之不可須臾離者也道不可離又何逺焉知修道之在人可以語率性之道矣故君子以人治人改而止忠恕違道不逺施諸已而不願亦勿施於人以人治人非求諸逺者過而能改為善莫加焉夫子一以貫之蓋無所謂忠恕忠恕之道譬諸已而已矣立已與物則其去道愈逺無人我之辨所謂一以貫之也不欲人之加諸我者吾亦欲無加諸人善推所為能忠與恕則近之矣違道不逺猶非道也一以貫之無所俟於推矣君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸德之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾君子之道四君臣也父子也兄弟也朋友之交也是皆不可能也在修其在我者也庸德之行庸言之謹所謂修道也不足不敢不勉有餘不敢盡聿求厥中者也言行相應則所謂君子之道者丘未能一所以能一之也慥慥謹也言不可不慥慥然也君子素其位而行不願乎其外素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉在上位不陵下在下位不援上正已而不求於人則無怨上不怨天下不尤人故君子居易以俟命小人行險以徼幸素其位所謂居易也不願乎外不易乎世者也不易乎世而行其素無適而不中矣上之陵下下之援上皆徇物而外馳者故怨尤生焉內求於己又誰怨乎行險徼幸蓋不知命者也得之不得曰有命所以窮通而長樂也子曰射有似乎君子失諸正鵠反求諸其身君子之道辟如行逺必自邇辟如登髙必自卑詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻孥子曰父母其順矣乎道不逺人在我而已大學之道自正心誠意以至化家刑國未有本亂而末治者也身不行道不行於妻子故君子必自反也仁之實事親是也孝悌為仁之本豈有他哉子曰鬼神之為德其盛矣乎視之而弗見聽之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思夫微之顯誠之不可掩如此夫鬼神至幽者也而人莫敢不敬以其體物之著也誠之不息則著豈外是哉譬射以有反身之仁窮神以見至誠之德知微之顯知逺之近則可以言中矣子曰舜其大孝也與德為聖人尊為天子富有四海之內宗廟饗之子孫保之故大德必得其位必得其祿必得其名必得其夀故天之生物必因其材而篤焉故栽者培之傾者覆之詩曰嘉樂君子憲憲令德宜民宜人受祿于天保佑命之自天申之故大德者必受命舜之受命所謂天地合其德者原其宗本不過充事親之孝因天材而篤之耳栽培傾覆皆天道之當然者舜何與焉達天之德而不能得天者未之有也而況於邇者乎子曰無憂者其唯文王乎以王季為父以武王為子父作之子述之武王纘太王王季文王之緒一戎衣而有天下身不失天下之顯名尊為天子富有四海之內宗廟饗之子孫保之武王末受命周公成文武之德追王太王王季上祀先公以天子之禮斯禮也達乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫期之喪達乎大夫三年之喪達乎天子父母之喪無貴賤一也子曰武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也春秋修其祖廟陳其宗器設其裳衣薦其時食宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也序事謂酌獻及儐相執事者旅酬下為上所以逮賤也燕毛所以序齒也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如示諸掌乎無憂得天者也達孝仁親者也文王上有以得其親下有以施乎子全其天樂又何憂乎武王周公所以上繼文王善推其所為而已近而事親大而事天治人神和上下未始不本文王之道無或不當理者則文王之無憂武周之達孝其至矣乎郊社禘嘗所以交神有道指掌之示夫何逺之有哉哀公問政子曰文武之政布在方策其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也故為政在人取人以身修身以道修道以仁仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也在下位不獲乎上民不可得而治矣故君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天知天知命也知人知道也為政在人所謂人存政舉人亡政息者也地道之可察者莫敏於樹人道之可通者莫敏於政文武之政具在而人莫之行也得人行之則其化物何異于蒲盧之變然待其人而後行爾為政之道得人為本身不明道無以知人不先體仁無以入道君子之道無他仁義而已矣知事親為人事之本尊賢為適道之宜由是而之焉則禮可以義起矣是故為政莫善於知天知天莫尚於知人知人莫大於尊親尊親莫過於修身知修身則可以仁民矣凡為政而不及於修身知化皆非所謂正也天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也知仁勇三者天下之達德也所以行之者一也或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉強而行之及其成功一也達德所以行達道一所以行三也仁以本之知以通之勇以成之知仁勇三者相須為用而不可偏廢所以行之不過曰一而已一者何也所謂知天者也孔子曰不知命無以為君子也清明在躬氣志如神則知仁勇之三未始離乎一也天下達道亦大矣交親之際盡而足通乎達德則未見其五也斯道也在人而已人之資質有限能強而至於道則與生而知之安而行之者等爾明於蒲盧之喻則可以言政矣子曰好學近乎知力行近乎仁知耻近乎勇知斯三者則知所以修身知所以修身則知所以治人知所以治人則知所以治天下國家矣知仁勇三者天下之達德也而好學力行知耻者近之三者之心人皆有之充其所為則達德可致身修而可以為政矣修道之謂教而於天下國家何有凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔逺人也懷諸侯也修身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懷諸侯則天下畏之齊明盛服非禮不動所以修身也去讒逺色賤貨而貴德所以勸賢也尊其位重其祿同其好惡所以勸親親也官盛任使所以勸大臣也忠信重祿所以勸士也時使薄斂所以勸百姓也日省月試既廩稱事所以勸百工也送往迎來嘉善而矜不能所以柔逺人也繼絶世舉廢國治亂持危朝聘以時厚往而薄來所以懷諸侯也凡為天下國家有九經所以行之者一也九經之治自修身始所謂行之者一皆行其所無事也尊賢先於親親所以立道也大臣之敬不敢䙝也小臣之體恐踈之也子庶民來百工內之所以安治柔逺人懷諸侯外之所以信服皆行其所無事而以修身為本君子之於天下也將以安全之也非徒有之而已修身以教各因其材而篤使人得之觀感咸事其事不敢不勉以遵乎治者先王修道之教也皆自我出也所以行之者廣求諸已者豈不約乎凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疚道前定則不窮在下位不獲乎上民不可得而治矣獲乎上有道不信乎朋友不獲乎上矣信乎朋友有道不順乎親不信乎朋友矣順乎親有道反諸身不誠不順乎親矣誠身有道不明乎善不誠乎身矣治天下國家有九經所以行之者一曰豫而已事不可以意知不可以已能皆以修身為本誠明乎善所以立事也道也行也事也言也豫皆前定之矣見之事業寧有窮乎所貴乎坐進此道誠者所以立豫也至誠與天地同流不誠無物矣不誠無物則不明於善交人之際將何以有行乎道之不行不誠故爾易曰君子安其身而後動易其心而後語定其交而後求率此而行則無往而不濟矣誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之者也博學之審問之慎思之明辨之篤行之有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也人一能之已百之人十能之已千之果能此道矣雖愚必明雖柔必强天道本然者也人道當然者也至誠則無他事矣此舜所以從欲而治孔子從心所欲而不踰矩也學問辨行所以誠之者也學之貴博問之貴審思之貴慎辨之貴明行之貴篤知此五者可以無失矣審於問篤於行其功常十倍於人未有不至者致曲能有誠也學者所貴以成身也不成乎身則何貴於學誠者天之道也至明至强固有之也柔愚逐物害之也至誠則本然者見矣故學而未至於啓蒙發蔀如蒲盧之變皆不足以言學也自誠明謂之性自明誠謂之教誠則明矣明則誠矣惟天下至誠惟能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育可以贊天地之化育則可以與天地參矣其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化唯天下至誠為能化性本然者也教當然者也本然者未嘗不著由當然以即本然則本然之性見矣故雖聖人未有不由學而至者所謂致曲也知所謂教自愚而聖無難者誠明蓋一道爾誠天道也誠之人道也明者誠之著也至誠復性則上下咸察吾性中之本然者而焉有不盡哉贊天地之化育則可以言命矣立命之道自反身始也參乎天地非盡性者能之乎致曲無所不用其至者每用其至至則誠矣至誠不息則形而發見故變化自我出也至誠之道可以前知國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體禍福將至善必先知之不善必先知之故至誠如神天道之神所以能體物者誠一之至未始離於物也至誠與天道相似故神神而明之所謂格物也格物而至明則善不善之將然者無所潜於隱伏矣誠者自成也而道自道也誠者物之終始不誠無物是故君子誠之為貴誠者非自成已而已也所以成物也成已仁也成物知也性之德也合外內之道也故時措之宜也天生蒸民有物有則誠自成道自道夫豈外物耶物則之盡在誠而已不誠無物故以誠為物之終始也誠者物之終始豈徒成身而已哉盡已盡物則中和致而天地位萬物育無物不一無適非中皆吾性之成德安有內外之分乎仁也知也由成已成物辨也仁知之辨惟其時而已故至誠無息不息則久久則徵徵則悠逺悠逺則博厚博厚則髙明博厚所以載物也髙明所以覆物也悠久所以成物也博厚配地髙明配天悠久無疆如此者不見而章不動而變無為而成天地之道可一言而盡也其為物不二則其生物不測不二誠也不測神也天地之神亦誠而已矣至誠斯不二矣不二則自然不息以至於盡神天之髙地之厚道之悠久神之不測惟至誠可以與於此誠之為道顧不大耶不見而章不動而變無為而成兹天道之變化一言可盡曰誠而已天地之道博也厚也髙也明也悠也久也今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉今夫地一撮土之多及其廣厚載華嶽而不重振河海而不泄萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寶藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚鱉生焉貨財殖焉髙明博厚悠久者天地之道此其可知者也天昭昭之多地一撮土之多山一卷石之多水一勺之多皆近而小者及其至也蓋不可知之也其所以為天地山川而不可知者曰誠而已詩曰惟天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已大哉聖人之道洋洋乎發育萬物峻極於天優優大哉禮儀三百威儀三千待其人而後行故曰苟不至德至道不凝焉於穆不已天之命也不顯之德文王所以受命也洋洋乎發育萬物峻極於天禮儀威儀待其人而後行者此於乎不顯純亦不已之德也全乎天德至道之歸也故曰苟非其人道不虛行天之為天文王之為文王其道非他誠之不息而已故君子尊德性而道問學致廣大而盡精微極髙明而道中庸溫故而知新敦厚以崇禮是故居上不驕為下不倍國有道其言足以興國無道其默足以容詩曰既明且哲以保其身其此之謂與子曰愚而好自用賤而好自専生乎今之世反古之道如此者烖及其身者也君子之道行其所無事也德性天性之本然者問學盡性之本然者廣大措之四方上下而準者精微至約之在人者髙明所以覆物者中庸所以成物者溫故反本者知新知來者敦厚自廣者崇禮接物者皆以修身為本廓而充之則與天地準矣為上處下興邦免禍未有不自此途出者此明哲之所以保其身也學不由此所謂反古之道也自用之愚自專之賤烖其自取之也非天子不議禮不制度不考文今天下車同軌書同文行同倫雖有其位苟無其德不敢作禮樂焉雖有其德苟無其位亦不敢作禮樂焉子曰吾說夏禮杞不足徵也吾學殷禮有宋存焉吾學周禮今用之吾從周禮樂聖人事也制禮作樂天子之事也今天下有其時者也不以聖人居天子之位禮樂不可作也此天之道也作之者安也夏禮不足徵矣殷禮可學而不可從也禮從時孔子之所以從周也孔子之不能制禮作樂無其時且無其位也王天下有三重焉其寡過矣乎上焉者雖善無徵無徵不信不信民弗從下焉者雖善不尊不尊不信不信民弗從故君子之道本諸身徵諸庶民考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑質諸鬼神而無疑知天也百世以俟聖人而不惑知人也是故君子動而世為天下道行而世為天下法言而世為天下則逺之則有望近之則不厭詩曰在彼無惡在此無射庶幾夙夜以永終譽君子未有不如此而蚤有譽於天下者也三重三節也上焉不可使知之者也下焉日用而不知者也故君子用其中必本於修身本諸身徵諸庶民匹夫匹婦皆可與知之上無太髙下無太瀆百姓心恱誠服知所徵信則敬而從之所以適道也天地鬼神先聖後聖其道一而已矣莫不以人為本知天知人不過內外之合而已民有所徵而能信無思不服不可得而逺近吾修道之教也見譽有由矣外是而求譽非永終譽者也仲尼祖述堯舜憲章文武上律天時下襲水土辟如天地之無不持載無不覆幬辟如四時之錯行如日月之代明萬物並育而不相害道並行而不相悖小德川流大德敦化此天地之所以為大也天地之大誠而不已者也仲尼逺繼前聖合德二儀博厚髙明應物無迹大小咸德體合萬殊小者如水之流通異行而俱入於海大者如物之自化不可見而未始踰間天德之至所以為夫子哉唯天下至聖為能聰明睿知足以有臨也寬裕溫柔足以有容也發强剛毅足以有執也齊莊中正足以有敬也文理密察足以有别也溥博淵泉而時出之溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不恱是以聲名洋溢乎中國施及蠻貊舟車所至人力所通天之所覆地之所載日月所照霜露所隊凡有血氣者莫不尊親故曰配天書曰帝德廣運乃聖乃神乃武乃文所見不同一於廣運之德爾成配天之德則其處身接物皆順而不妄動而愈出惟有本者能之爾天地之大何所不容何所不逮苟能此道則有不言之信無為之教聲容言動其有不格者乎此為天道之當然所謂無思不服者也此道也可以建天地可以貫金石有血氣者而能外於是乎唯天下至誠為能經綸天下之大經立天下之大本知天地之化育夫焉有所倚肫肫其仁淵淵其淵浩浩其天苟不固聰明聖知達天德者其孰能知之天下之大經正也天下之大本中也經綸大經而立大本非全於天者不能也求全於天誠之而已誠者天地萬物所受以生也人之所以自成也夫焉有所倚然亦不可誣也仰之彌髙鑽之彌堅瞻之在前忽然在後卓然如有立參前如倚衡有所倚者其何能然此道之本可得而知者聰明聖知性中之本然者固有之也唯全於天者爾天全而後誠至而中正立矣詩曰衣錦尚絅惡其文之著也故君子之道暗然而日章小人之道的然而日亡君子之道淡而不厭簡而文溫而理知逺之近知風之自知微之顯可與入德矣君子之道其可知者非其至也至不可以意知而可與有行也小道的然則的然而已矣其將何以為逺知行逺之自邇登髙之自卑則可以適君子之道淡而不厭簡而文溫而理所謂不顯之德也知德之不顯則知的然之惡矣子夏以謂小道可觀而泥於致逺非可觀則何以為小道歟詩云潛雖伏矣亦孔之昭故君子內省不疚無惡於志君子之所不可及者其惟人之所不見乎詩云相在爾室尚不愧于屋漏故君子不動而敬不言而信莫見乎隱莫顯乎微君子所以戒愼恐懼也自反而縮吾何慊乎哉故君子敬其獨爾內自不欺曽何人所不見之有人所不見而謂之難也況已所不見乎此君子所以大過人也相在爾室室非身之外也況室以為喻也內且不愧於屋漏敬信其日用爾不動之敬不言之信何有哉詩曰奏假無言時靡有爭是故君子不賞而民勸不怒而民威於鈇鉞詩曰不顯惟德百辟其刑之是故君子篤恭而天下平君子之道本諸身加乎天下莫不以修身為本也修身本乎誠敬所謂篤恭也篤恭而天下平修道之教也奏假無言不顯惟德至于時靡有爭百辟刑之惟至誠之格物如此民心恱而誠服天下有不平乎慶賞刑威勸懲之道也不用而民不倍誠之至也詩云豫懷明德不大聲以色子曰聲色之于以化民末也詩曰德輶如毛毛猶有倫上天之載無聲無臭至矣聲色之感豈所以化服人心乎聖人不以感人知德而已故夫子言本末之辨毛輕微之至也道微乎微者也知道之妙則知非毛之所可倫擬也尚不可得而倫擬矧可射乎無聲無臭天道之始也中庸之學所以研求性命之正和同天人之理不知天道之始其何以為至哉大學解大學之道在明明德在親民在止於至善知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得物有本末事有終始知所先後則近道矣天生蒸民有物有則民之秉彜好是懿德能明是德則近人矣能明是德則知止矣有止故不妄不妄故能安能安故能動明德本也應物末也故學道貴知本知本則知緩急後先之序而無過舉之患矣不誠未有能動者也能安而靜物莫之撓動而應物者蓋無難矣古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平自天子以至於庶人一是皆以修身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也此謂知本此謂知之至也有良知有小知良知知德者也小知知小知見也域於小知良知無自發也能致其知則知之至者見矣物物則之在人者不明明德則物無以盡不能盡物則知之至者無因而發格至也物至則良知發也良知發見則所知必至意無有不誠心無有不正家國天下無不自正所施者寡所被者博矣洪範曰皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極所謂格物也而康而色曰豫攸好德汝則錫之福時人斯其惟皇之極爾不使有好于而家時人斯其辜汝雖錫之福其作汝用咎以知德修身為本也凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王天子庶人之一是也堯自克明峻德至于黎民於變仲尼由三十而立至於所欲不踰矩大學之道無它在乎格物而已不知盡已而欲盡人之道難已哉所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必慎其獨也小人閒居為不善無所不至見君子而后厭然掩其不善而著其善人之視已如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也曾子曰十目所視十手所指其嚴乎富潤屋德潤身心廣體胖故君子必誠其意大學之道自知德始意誠而下皆其序也不可躐而至也慎獨致一之道也致一之至不戒而嚴矣易曰無有師保如臨父母嚴之至也不欺其內好之如色惡於欺也如惡惡臭自牧如此非出勉强而後可以為謙自謙慎獨之始也不誠無物君子其可欺乎小人為欺徒以自欺而已十目十指其將誰欺德之潤身由其意之誠也心廣體胖至誠之道將與天地參矣詩云瞻彼淇澳菉竹猗猗有斐君子如切如磋如琢如磨瑟兮僴兮赫兮喧兮有斐君子終不可喧兮如切如磋者道學也如琢如磨者自修也瑟兮僴兮者恂栗也赫兮喧兮者威儀也有斐君子終不可喧兮者道盛德至善民之不能忘也詩云於戲前王不忘君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也淇澳之詩美武公之德者如切如磋如琢如磨所以形容之也為天造而人功之似也由其知學而自修者至也恂栗和敬也威儀度數也修道在已而民之不能忘者各以其所求得也君子樂得其志小人樂得其事凡以身修而應之有道也故必誠其意康誥曰克明德太甲曰顧諟天之明命帝典曰克明峻德皆自明也湯之盤銘曰苟日新日日新又日新康誥曰作新民詩曰周雖舊邦其命維新是故君子無所不用其極明德俊德也日新德新也惟天隂隲下民民之受中以生者明於是也聖人所以達天德也由其固有之也克明則克類矣文王純亦不已日新之盛德也盡斯爾也用其極之謂也詩云邦畿千里惟民所止詩云緡蠻黃鳥止于丘隅子曰於止知其所止可以人而不如鳥乎詩云穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本止極也仁之至義之盡也知止而後能定能定則不它矣此謂知本古人之所以大過人者無所不用其極也能知所止無所往而不建其極也黃鳥尚知安身之所人而不求所止可乎訟之起也中無所定也知止自不欺矣犯而不校夫何訟之有乎所謂修身在正其心者身有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正心不在焉視而不見聽而不聞食而不知其味此謂修身在正其心中庸之學以率性為道喜怒哀樂未發謂之中有所忿懥恐懼則非所謂中而本性昏矣心者神明之舍居中虛以治五官者也心為事奪五官皆失其正非所以安神明也一正心而本性正矣所謂齊其家在修其身者人之其所親愛而辟焉之其所賤惡而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者天下鮮矣故諺有之曰人莫知其子之惡莫知其苗之碩此謂身不修不可以齊其家有一言而可以終身行之者其恕乎已所不欲勿施於人君子之道無他善推其所為而已譬所親愛譬所畏敬譬所哀矜譬所敖惰取譬反覆視我心之輕重則失其正者見矣好而不知其惡惡而不知其美皆有所偏也心有所偏則吾之是非錯謬失倫輕重無準失其所以成已近而無以齊家猶愛而不知其子貪而不知其苗也無偏無黨王道蕩蕩則㑹歸于極矣是故修身以正心為本心正而天下平矣所謂治國必先齊其家者其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也康誥曰如保赤子心誠求之雖不中不逺矣未有學養子而后嫁者也孝經曰閨門之內具禮矣乎嚴父嚴兄妻子臣妾猶百姓徒役也為國以禮能踰上下之交乎君子之為天下國家皆以修身為本事親者可以事君臨下者可以臨民此皆不學而能者也若保赤子敬之至也知敬恭之道斯無失之者矣君親之辨則惟其時物焉故曰惟孝友于兄弟施於有政是亦為政奚其為為政克明俊德黎民於變文王以刑寡妻者御家邦善推所為者乎一家仁一國興仁一家讓一國興讓一人貪戾一國作亂其機如此此謂一言僨事一人定國堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之其所令反其所好而民不從是故君子有諸已而后求諸人無諸已而后非諸人所藏乎身不恕而能喻諸人者未之有也故治國在齊其家詩云桃之夭夭其葉蓁蓁之子于歸宜其家人宜其家人而后可以教國人詩云其儀不忒正是四國其為父子兄弟足法而后民法之也此謂治國在齊其家孔子曰聲色之於化民也末矣修道之謂教凡有血氣未有不緣觀感而得也此化俗之機也皆自身修始也堯舜之民灝灝如也桀紂之民比屋可誅是豈聲色化之也皆觀感然也非勉强而從之也故君子必自反也內外之合所謂恕也已所不欲勿施於人一言而可以終身行之者篤恭而天下平用此道也孔子曰其身正不令而行其身不正雖令不從故君子先正其身不願乎其外所謂平天下在治其國者上老老而民興孝上長長而民興弟上恤孤而民不倍是以君子有潔矩之道也所惡於上毋以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交於左所惡於左毋以交於右此之謂潔矩之道古之善為天下國家者以天下為一家中國為一人無它焉一以貫之而已己所不欲勿施於人所出者正則所從者順此之謂潔矩之道矩潔而民取制矣是故動而為天下道使民無不知愛其親知敬其長風俗淳厚蓋所以率之者順矣修道之教不言之令所謂潔矩之道皆以身修為本耳詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母詩云節彼南山維石巖巖赫赫師尹民具爾瞻有國者不可以不慎辟則為天下僇矣國以民為本民以心為本君子之得其民得其心也民之好惡其心未嘗不公君子以民為心公其好惡則民愛之戴之將父母若矣為人上者下人之所瞻望也唯中立而不倚則服而從之十手十目其嚴乎故君子在正其身詩云殷之未喪師克配上帝儀監于殷峻命不易道得衆則得國失衆則失國是故君子先慎乎德有德此有人有人此有土有土此有財有財此有用德者本也財者末也外本內末爭民施奪是故財聚則民散財散則民聚是故言悖而出者亦悖而入貨悖而入者亦悖而出康誥曰惟命不于常道善則得之不善則失之矣皇天無親惟德是豫人之所欲天必從之天聽自我民聽天視自我民視是故在得民也得民在得心也惟有德者有以得民之心故君子敬其獨也政有本末修身為本身修德建民可得而用矣何財非我之有不務建德而急於財用民不知德則惟財之靳是施奪之道也是故有德斯有民有民斯得天後利先義先王所以受命也楚書曰楚國無以為寶惟善以為寶舅犯曰亡人無以為寶仁親以為寶秦誓曰若有一個臣斷斷兮無他技其心休休焉其如有容焉人之有技若已有之人之彥聖其心好之不啻若自其口出實能容之以能保我子孫黎民尚亦有利哉人之有技媢疾以惡之人之彥聖而違之俾不通實不能容以不能保我子孫黎民亦曰殆哉唯仁人放流之迸諸四夷不與同中國此謂唯仁人為能愛人能惡人為國之道在知善擇惡善之道仁身為本仁身而後能擇能擇然後知人知人嘉善則可以保民矣善人之道無他賢賢而已媢疾之心勝則不能與人為善而何以保身乎惟仁者能好人能惡人修身而已見賢而不能舉舉而不能先命也見不善而不能退退而不能逺過也好人之所惡惡人之所好是謂拂人之性菑必逮夫身是故君子有大道必忠信以得之驕泰以失之進賢之法莫崇禮貌去惡之要莫先克己見賢而不能舉舉而不能先吾命之出者未至爾見不善而不能退退而不能逺是誰之過歟惟能公其心者可與論進賢退不肖之實以百姓之心為心忠信君子所以仁身者驕泰害之者也得失之要在我而已果能忠信則身修而能公其好惡賢不肖之進退在此而不在彼也生財有大道生之者衆食之者寡為之者疾用之者舒則財恆足矣仁者以財發身不仁者以身發財未有上好仁而下不好義者也未有好義其事不終者也未有府庫財非其財者也孟獻子曰畜馬乘不察於雞豚伐冰之家不畜牛羊百乘之家不畜聚斂之臣與其有聚斂之臣寧有盜臣此謂國不以利為利以義為利也長國家而務財用者必自小人矣彼為善之小人之使為國家菑害並至雖有善者亦無如之何矣此謂國不以利為利以義為利也易稱何以聚人曰財財者國用所出其可緩乎雖然為國務民之義而已財者利之所在人之所必爭也人必爭而我奪之則利心生而禮義消矣務民之義則天下一家而財不可勝用藏之於下猶在君也以財發身用之者也不知所以用之身為財之役矣故君子先正其本為上有節為下敦本財用之出庸有窮乎是故務民之義在乎修身以仁民民化於仁則愛之如父母畏之如雷霆上下情通財皆可得而用率斯道也其有不終於義者乎一家仁而一國興仁非他道也務民之義不以利為先爾貨悖而入亦悖而出此事勢之必然者也謀大者尚皆不暇謀小況君子而可爭利於民乎聚斂之臣不知義之所在害加於盜以爭利之民也民爭利而至於亂則不可救藥矣言利而析秋毫必非養其大者之人也所見之小惡知利義之和哉惟知利者為義之和而後可與共論生財之道浪語集卷二十九
