body:
  text: 浪語集卷十八宋薛季宣撰劄子淮西與王樞使公明書即日春序向闌和風叶律恭惟衮繡徂齊棠隂蔽芾神明贊相鈞候動止萬福某去嵗在都伏覩樞極之拜竊與斯民同慶加以久失奏記且欲候問興居叨冒京職之除亦當陳謝恩紀家貧不能遣力輒於置中冒貢函箋方以浮沈為念伏䝉鈞翰寵答非惟慰藉甚厚親札盈紙謙抑過宜非所得當感荷之劇以為王公顧遇末列古則有之世道澆訛此風之不作也久矣一聞正始心目為之開明乃知宏之在人甚幸甚幸前聞鈞履微失調衛每恨不得日親醫餌竊知喜遂勿藥固宜天之賚豫善人翹望懸懸慰懌大矣某區區之迹自去秋中却職都下一謝宰輔不敢復再見之十一月初上以江湖飢民流移淮甸而光州告多有北人歸正來者忽俾賑贍安集不敢辭難嵗除方抵浮光問歸正則無有但緣中間遣許安道者持金錢寶號入北事泄於咸平獄辭所連凡十七郡有十數家避禍將家渡淮而來郡中遂括舊歸正人二百餘家以方至告又其守將宋端友者被命買馬殺人而奪之者三不免具以實聞頗聞有力强甚不敢自為身謀天子英明已下之廷尉矣某元宵至齊安郡問流移則已挽轉而之四方者不可勝計某皆不及見獨收無所歸者僅四百户以舊州之東北權置官莊二十餘處居之春事已深流者漸已安定先於合肥興修三十六墟之利西來付之趙帥得報亦稍就緒但緣兼核墾田未遍又須一至㳂淮祗旬日間當東計還奏之期必夏中也湖外饑歉伏蒙移粟賑糶兹三代事也大臣以天下為度於今方一見之故吏門生有光榮矣夏口賑民雖甚無法然而米價賴之而平活此一方為德甚厚春雨時降自此當少蘇也某至淮上流聞北方困於蒙古塔坦凡女直之守州郡者皆充將帥之任率以同知涖事而㳂淮被邊去冬頗有逰騎出沒又於上下表裏置鋪相接每鋪十人九槍一牌若以我為虞者其被禍來者具言河決垣縣東貫濟宋之間合清泗於彭城流分九道卷掃千里騷動紛然某謂通泗瀆鑿吕梁開石門皆古用兵中原盡力而為之者天道如此非無機㑹然察淮堧虛弱之甚邊臣陸陸無可望以功名者河流南北通共惟今未必有加於彼兹在可慮觀其置鋪之役乃若齊之敲冰備周嘗告廟堂謂有謀人之心而使敵人疑之難以速得志矣不知關陜之地事勢何若仰惟規模先定必有不可易者不敢豫度敢祝敬之而已某所見如此不敢不具言之僭越輕狂必蒙恕察淮西與梁右相書一間者獲侍閒燕嘗進瞽說伏蒙鈞聼不以為非將命去之未畢前議兹承爰立之拜乃不克面布悃愊欲報之德不能自已願竟其說庶有補於萬分丞相今已正位三槐雖解事之名不容多取至於進退人物自當有以聳服天下人才蓋有定論惟無責備乃可人非大聖誰能無入而不自得惟在處之各得其當一世之士信足了一世用有如長短易置小大倒施無適而宜夫何才術之見若用人者皆如韓滉之於故人之子劉晏以處請求之士豈惟人人自盡故雖牛溲馬勃皆入醫師之劑矣若夫舉直錯枉自有所謂易簡之道拔茅以彚惟在乎廟堂之上斷而行之爾此事要非章牘可道某遽言之者以為相府急務願先百事而為之非蒙眷顧之隆不敢狂僭如此政須鈞照湖州與宰執書已具劄狀禀本州添差武臣路鈐以下至進勇效士一百七十一員軍員五百三十一人錢糧衣賜總計一嵗共支錢十九萬八千七百四十餘貫嵗前又添發下軍員八十三人增多二萬四百八貫有竒乞將前件軍員分下財用寬裕州軍養老或量撥錢糧物帛貼助本州支給仍乞豫戒諸軍今後免將揀汰軍員使臣發下本州收管亦乞照應免有添差某不敢縷縷瀆尊只以添差總管路鈐路分并將副計之雖員數不至甚多為費已大本州先管將副州鈐轄路分都監添差八員請受之數不等每月各不下七八十貫供給皆八十貫數月以來添差益衆如總管宣贊舍人劉炎路鈐轄武經郎黃彥節供給錢皆一百五十貫州鈐轄武顯大夫江昌朝等淮備將武節大夫馬全等皆八十貫而請受不在兹數大者略計月俸供給月節饋遺之類每月不下三百貫文小者一百七八十貫文一嵗計之總管路鈐一員至三四千緡本州用度不充朝廷素所知也如劉炎黃彥節等久居本州皆有田宅如此過分陳乞除授廟堂無自而察切恐本州去都密邇寄居極多人人效尤州郡益困某不敢便有申請欲望鈞慈矜念小州將此等官别賜區處以寬郡之急迫如日後更有添差免於本州駐劄所有續到軍員八十三人併乞特與改撥他郡或量賜支撥應付施行干冒鈞嚴下情無任皇懼之至與宰執書二試郡百忙不敢無因奏記惟是斗山之仰與日俱積樂與州人涵泳聖時之澤而已某不避僭越輒有迫切之懇本州軍糧並無苗米可辦以此嵗計極窘糴米七萬一千五百餘石約用錢二十一萬四千餘貫前例係將烏程歸安兩縣折丁錢十三萬貫收樁貼助糴買每丁舊催納錢一貫二百五十文省去嵗均減每丁納錢五百文足嵗計減落五萬八千餘貫今嵗當催七萬一千九百餘貫已是大段缺闕近方催理却據逐縣繳到去年户部減放印榜許將去年折丁未放以前人户先已全納之數並於今年錢內折除㑹計今年管催折丁錢止有二萬三千餘貫委是月糧支遣全然無以收糴某不敢過有陳請已具狀申朝廷乞於上供折帛細綿錢內取撥四萬八千貫文充理豁乾道八年折丁錢補填九年少闕之數貼助本州糴米應付月糧又某昨以鎮江軍中㨂下軍員八十三人日近添差總管路鈐將副等員嵗計支錢三萬餘貫申乞均撥上項官軍俾財計寬裕州軍屯泊未蒙行下適者又准朝省發下乞就本州養老三輩略計本州嵗失二項丁錢十一萬貫却有增起合支三萬并大祀賚錢二萬餘貫通計闕錢十六萬貫委是不容措置無以枝梧伏乞鈞慈俯從申請少寬一郡目下之急不勝大幸某復有悃愊干冒本州財計略可見矣誠得明健長吏未易料理如某才力素薄前此未識理財自被誤恩不敢不力每事撙節補苴罅漏其奈取諸民者已無一孔遺利不可措手略無見效五技已窮形瘁力殫下血不已雖勉强應接然實憊甚得蒙鈞慈矜念特賜陶鑄祠祿選擇有心力官救此一州急闕嵬瑣之跡得少遂所安儻脫罪誅免令委頓終始大惠何有窮極不然日又一日他時手足盡露雖欲帡幪寬貸嗟何及矣某素非避事辭難者自以力之不足知難而求退耳實非敢有他望正賴哀矜及此某不任卷卷懇禱之私湖州與宰執書某蒙恩賜郡罷於百役雖時時以職事申懇而禀目之貢寖以闕然節彼巖瞻未嘗一日不在黃扉之下荷眷知之有素必不以踈慢責也某節前疊以祠祿并經總制錢分𨽻溷瀆鈞聼二事皆非某敢為私請二車於某初無一言之忤其人才力亦髙但緣以趣辦為能不暇存厚下之說場務敗闕料理稍成端緒輒為掣肘傷事其他可容也至於庭叱官吏專閣請給追須紛㳫鞭撲囂然在長吏不能無慙當避之爾分𨽻之事禀劄固詳言之利害不秖一州所係實重想初言之甚易故未察而從之廟堂已知其詳不難改也比得吳郡丘崈劄子亦謂焚林之田夫豈不知特冒行之不顧爾丘不欲為事首必須亦請于朝丞相身佩安危幾微不可忽也某苟詭從之而不辨必斥不從劾中以他事亦斥等斥爾孰若一為丞相辨白雅蒙許之誠實或幸俯而聽之某荷知素深吳興幸未闕事比者和糴六萬貼錢已萬六千緡四萬續料尚未糴也近户部於民間所自糴米亦令本州發綱賠費亦數千緡未知繼此云何惴惴然爾郡計素乏冬來場務皆索本柄春衣二萬軍糧酒秫數皆六萬常年皆自夏中積聚政承闕乏之後凡百用度盡解目前之急坐是失於樁辦大懼入春之後手足將俱露矣今不得請且纍知人之明萬丐矜憐毋强之以所不能也湖州與梁右相書被遇特達希世之知超躐之用龎恩次骨不復多謝惟是霅川號為佳郡且有浙西道院之名南渡已來官守數易紀綱法度蕩然無統兼復衣冠叢萃應接不暇近年之在政者持書生之論末理財之說士夫奉稍拖積數月省府上供虧數十萬賴單守繼其後厲威嚴振條目雖能解目下之急然實未有贏餘其行有積錢數萬緡皆今費耳迎送支衣之後已復枵然某到官之初滯事山積戴星出入食息不暇押到詞訴不復循間日之制簡稽决事朝暮不息閲月後覺漸就繩墨但無如財計何所賴燮理天和嵗事尚或可望然必無逃曠敗不無望於覆幬之兼容也始以啓狀常禮冒瀆聽聰繼蒙尊光寵答感荷之至念欲自具禀目少布胸臆顧左相未克通記嫌於彼此之分不惟不敢亦不暇雅辱眷知之素必蒙俯察之而不罪也某屬者纍具劄狀有請廟堂如倚閣之住催積逋之分限丁絹之折錢於計司略無利害在民間郡縣得免倒垂之急受賜實多一皆未蒙周旋自此不免嗣有陳乞萬丐鈞念有如郡中可以黽勉就事亦何敢於干政府也只如和糴一事本州苗米止五萬斛常州三十四萬今嵗拋降皆六萬石既不均當復欲以三千省銀㑹髙估糴取足斗一石銀作三貫五百五十㑹子七百七十科折虧折之數不待辨而後知即令盡支實錢二千足糴一省石猶恐未當本價况如此耶去嵗和糴殃民中外紛紛如此不可不計誠使朝廷無惜小費使當官者皆得展盡以供公上之求何事不可為况損益能幾何須使下人愁嘆往往事又不集卒取君上之訝亦何為也惟丞相念之左相出帥西方諸侯丞相獨秉鈞軸中外責望非向時比矣某外官人微不當有所陳述顧蒙知愛甚寵懷不自已竊謂某去年審察所上公仲連相趙烈侯事誠致君之要術事無大於是者惟詳復而采之僭越妄言徒為愧畏湖州與樞使王觀文公明書即日初春薄寒伏惟浩養琳宫神天是豫鈞候動止萬福某伏審抗章逺引帝鑒其誠均逸祠官寵班書殿伏惟歡慶竊以國朝西府之任自非元老不居人臣之榮無加是者前輩處此能全歸潔之義未可以一二舉自匪浮雲富貴以道義為重輕主眷方隆何有脫屣之事亷頑立懦未足言也時事方日新甚有懷杞人之憂者晉公去矣其將如蒼生何某中冬喜聞元戎之還嘗遣急足馳詣荆鄂奏記尚未歸報不知已嘗徹鈞聼否日俟衮衣歸國與社稷蒼生共依洪庇旌車柅於中道可勝悵惘之誠伏覩丐去之章不審鈞體邇來果何所似天之輔德自應勿藥有喜少少末疾想今遂脫然也惟是不得親候興寢怏然於懷某兹繇啄菢之恩承乏輔郡踈拙不詳賦政大為催科困苦雖戴星出入曽無毫髮之效黽勉就事不敢告勞但緣去嵗朝廷均減丁錢嵗失常賦七萬今嵗折除已納之數又四萬緡而養老添差奉糧嵗增亦三萬貫如以郊賚二萬通闕錢十四萬緡雖使劉晏居之未易料理綿薄處此自應曠敗見于廟堂丐去未便得請朝夕惴惴以待罪斥而已此外無足上煩鈞念者以久不聞啓處撥忙特此啓聞湖州與四川宣撫虞少保書即日秋髙氣清伏惟戎輅啓途百神翊衛鈞候動止萬福某恭審明揚大冊比秩三事盡護諸將分正西郊仰惟慶慰某嘗患數十年來亷恥道喪士夫怵於祿利汨於寵榮出處可觀進退以義者寥寥乎其有年矣往往蹈故襲常恬不知怪雖有超詣之士未必不無自見奪於楚咻之衆猶或不能自解矧以公輔之重萬鍾之祿君臣契合間無纎介顧遇方盛褰裳去之古聞其人保相既身之矣亷頑立懦尚何待乎百世之下也某自去秋誤被收召侍坐函席便聞誨教及此迄踐斯言不易介於三公乃今親見之矣皇上親寵逾渥三加彌尊位之師保遂分關陜用寬西顧誠曰曠世之盛希闊之典也豈徒梁益之幸太平之業在此行矣如蒼生何能無下士之見徐方平定衮繡之歸如周公之任定非晚耳天下實望某在門下東西南北之人爾未嘗有一日之雅自蒙傾蓋之遇取之眉睫之間未嘗干簉門牆遽蒙拂拭之用自到都下誼當自斂既閲時不敢見在常人之情必將怒而絶之勞來擇人卒蒙假節亡補毫髮亟被超躐之除歸節旬中便剖符此來恩造如此倫輩靡儔雖保相為官無私某何以取此未知所以報塞徒懷愧畏到郡多事第嘗啓謝萬一又廑謙尊寵答豈所宜蒙郡中積弊如山逋負非一且欲事定自為禀目以求一說少布卷卷感刻尚未遑暇白麻宣告遽起萬里之行不得旅進拜辭恨無羽翼幾百已具雙牘不敢再四瀆尊以某之無庸獨行踽踽洞無城府屢憎於人未嘗與物泛交惟保相之知已朝路識面蓋寡冒居劇郡才不副意已為不可如何鈞斾適西自此動須掣肘自知無逃曠敗將為門下纍矣依仰牆仞不勝戀慕之誠東南有可使令無大小願備驅䇿湖州與曽參政書即日嵗晏凝寒伏惟鎮撫戎華神明協贊鈞候動止萬福某昨者不避僭越輒以二軍害政申禀丐祠祿以避之曲荷眷私為之易地旋拜真翰之賜誨教諄諄自省何人何以得此於廟堂之上顧惟虛辱慙恧無地若齊倅亦健吏但難為下敵已而下或不能堪之耳頗聞甘泉中多賢之者既嘗推轂無怪其為之助自非鈞慈悉力保庇某反為擠陷必矣雖感激之心銘切肺腑事關公道亦不敢多謝也經總制錢之議未審已蒙力行之否凡曽歷州縣者皆知如此分𨽻可求增羡然而前此版曹諸公無或然者知其不可為耳此事大參居地官日豈不明知如此分𨽻可求贏羡顧念郡邑窮匱生民休戚上關國家大計故不為耳非不能也設有可行之道又何待乎今日而後行也某既緣齊倅不無所忤又先諸郡有此申明户部見差獄子來追郡胥且以條法為問前此郡縣不盡分𨽻固為非法然而上供支遣無非取於額外是豈盡如條制然而上下恬安之者顧不得已耳其可復於非法之外又為非法之取求應經總制錢分𨽻之法其為廢法不已甚乎萬丐鈞慈熟復蚤賜收還實宗社蒼生之幸本州郡計素窘和糴本錢未蒙盡數支降既多那移之數又將無以接續纍求貼降丐賜奏陳若令用度稍可支撐何敢縷縷與朝廷較近鎮江澄汰老弱本州得軍員八十餘人又不知使臣幾何計當亦不減此嵗用仰給驟增數萬未知所以處此不免又須申乞應付不任一事每每僭於廟堂譴斥之誅俯而俟之耳某復有僭踰之懇本州窮乏異甚嵗糴軍糧本柄糯米皆六萬斛軍衣亦數萬襲前此丁錢尚多可以䟎那糴買况又糴買之直例於春夏收樁前政當闕乏時不免隨手支用某又當其後解倒垂之不給丁錢已從減免却有貼陪買發之數入春諸事交切手足遂當盡露已忤貴要知不得免矧冒昧試郡一切付之平心干請類不能從寧能無惡於物所望宫祠逺郡之請速賜俯從免纍知人之明實成終之惠也無厭干瀆徒深戰汗伏聞輔相之道感悟日新事有至難回天如響非以精誠之積何以格於上帝社稷寰㝢蒙休至矣然某竊有愚見敢冒陳之周官太宰職在正君故其所統之屬五官之外無非在王所者此事寂寥已久不可以力勝丞相致君有道已有成績盍乘明良之㑹漸拔茅茹以其彚征消長之於冥冥之間兹萬世之澤也若有司存五官正則莫不正矣更乞鈞念某蒙恩異甚故敢言之湖州答王樞密書比者伏蒙鈞翰之賜仰荷謙眷之隆嚴諭劉倅積俸本州屬緣窮乏限員以次給俸未嘗輒踰如劉未免破戒給之數多不容盡如其請已為支行一年衣賜料錢三月自後按月皆帶支矣鮮少多愧伏幸鈞察某比緣同官强橫僭以宫祠逺郡為請仰蒙矜憐俯為去之自顧何人何以取此於廟堂之上感荷之至銘在心腑某近復以經總制錢分𨽻申請必已仰蒙鈞念此事不秖一州利害實係國命民財版曹主之既堅以某獨先諸郡有請見遣獄級追逮都吏見問以法前此郡縣分𨽻固不如法然皆取以租額之外民無所措手足必使盡如經總制司分𨽻一法其為廢天下法不已甚乎方樞相之秉鈞不可不賜深念早收前㫖以幸社稷蒼生本州窘匱異常今嵗和糴本錢未蒙盡數貼降允那錢已萬計糴猶未足州之軍食場務本柄嵗糴皆六萬斛衣數萬端舊於春夏積錢前政頗失樁備某雖粗了目下來春每事交急手足殆將盡露將無所逃曠責此來忤物多矣其何以善後儻蒙矜念終始成其去計感戴恩豫其有窮乎僭瀆四三戰兢惴惴某不敢自取踈外至敬無文輒以尺紙通誠伏乞鈞照湖州與鎮江守黃侍郎書自拜道中所賜教戴星少暇念欲親具尺紙之記未遑也節中短啓修慶殊愧蕪纍筆端無口言不盡意洊蒙寵報函翰仰認尊光誠至文雄伏讀感嘆乾復之戒敬佩德音顧某何人懼弗克荷然有愚見竊敢復之元規之塵事常然爾形諸竿牘不已傷危孤臣之心更丐裁擇版曹征利深急若牙稅之補發經總制之抄撩蛆食浸淫漁取竭澤不知使府何以處此某性樂林野黽勉應酬不知世患為然已決歸計見入文字爭議分𨽻牙稅則未暇及罪去決矣差可以謝朋友不然戀祿低頭為民貽患所得有幾其忍默默為小人之歸哉不知同舟遇風已嘗入深慮否借重九鼎為蒼生陳之言信易從過於小人之譊譊萬矣侍郎忠誠體國以民存心當思其說若行州縣不可復理又須强倍征斂民無所措手足深可為天下憂者宜蒙慨然建白以幸社稷蒼生丹徒百度若何吳興不可料理近火先燋之諺非身逢不信也不能一朝處此為之奈何規模有可遵承願蒙强此庸懦辱知狂僭惟門下亮之又書伏蒙手筆之教下諭措置官之無益非荷眷愛之厚何以有此甚幸甚感單虞卿之在郡也四處設措置官其二郡中自撲坊場當仍其故其二長興新市某已盡欲去之矣長興之設誠曰無謂若夫新市虞卿之置誠有不得已者郡有烏墩新市雖曰鎮務然其井邑之盛賦人之多縣道所不及也胡監不職久矣日醉兀兀凡百憒憒郡中傳以為笑其人可想知也虞卿設是措置唯以課利不登故爾某在事之始聞其鎮益不治専欄放縱而無憚諸司訟牒之日聞到任月餘月解官錢略無來者不免追請入郡遣官代之須鎮務之有經徐為之計責以虧缺吏事故應爾耳初某與僚寀約各當盡心職事毋循故態臨以達官之尊按舉一視職業何如他無謂也方一舉手而胡遽以告不知痾癢甚矣顧雖賢如門下未免為有挾也借使某即以重言亟從其便小郡政不可復立斯人放肆益甚亦非所以厚胡監也仰蒙期豫之過必將為某惜之諄諄敢不在念萬賴臺察他有可以鞭其後者願不屑教誨之毋以一不受令而遂棄絶焉不勝惓惓至望浪語集卷十八
