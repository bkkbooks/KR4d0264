body:
  text: 浪語集卷七宋薛季宣撰詩樊口候參政暮歸搖兀孤舟東復西颷從赤鼻下樊溪驚鱗斜日銀刀亂飛鵠滄波羽扇低江漲清泠舞洄洑岸頽浩蕩汨塵泥黃昏蕩槳窊樽上笑指天閨認沐鷖聞中司還斾清旦踰樊嶺候之不遇自黃子磯乘舟而歸萬松晨過馬蹄疾五水春來湖草長官栁弄煙天已曙山花無人風自香濤痕石磧記江劑檜楫蘭舟搖夕陽送我不如歸去也啼規夾岸切愁腸夜憶吳江虹梁新霽倚東隅還憶松江枕太虛味比蓴羮下鹽豉賢為菰菜憶鱸魚清風帆幔輸歸客落日蒹葭稱晚漁㑹帶笭箵鎮浮浪扁舟斜掛一籧篨過樊山誰將春信過中江草木無情取次芳妝罷美人梅破額愁成行客栁牽腸江灘鑿鑿添新漲沙塞茫茫反夕陽欵段趷蹄樊嶺道幾多畦町雜蒼黃樊山春望飛出仙人壺外天壺中日月故依然虛明百雉龍鱗動空翠千巒翡羽鮮咫尺畫圖藏世界侵尋錦繡簇山川歸來身入寒溪路恍若瑤林一夢還濟江逆田開府過西陽俞氏家林輕舟時復到齊安一過漁家一黯顔江打頽牆開野徑篁生故壘上家山蕭騷城郭塵埃外縹眇煙霞雲水間便好繫船終日卧官曹不許片時閒聞吳王城中軍戍嚴鼓年時芳草碧䝉戎䀨耳新聞甲夜風軍吏誤應非進鼓天王錫忍廢彤弓剛言苻氏難傾晉不信文王可伐崇擊柝杜關無箇事釣臺江月靜朦朧宿大城寺與寺僧行鄀子故城於壁壘間得銅矢鏃土中螺殼往往不壞僧言初作此寺發殿基下有古甎渠宫城中得銅矛矢鏃百數南城中土窖積灰埋鵝首骨猶具自甕城北望有郡王墓僧云其傍墟冢甚多王墓常有巫者發之未開被蜂毒死巫家於懷袖間得蜂乃黃金所化二千逆數到春秋戰國興亡一轉眸壘壁詎銷埋蚌殼劫灰寧燼斬鵝頭墳緣開發金成范殿為焚修瓦出溝哨矢燋銅傷我意古來爭戰幾曽休祈晴車中望安樂宫故址罷休祈雨又祈晴天道難知得好生鐘鼓鏗鏘西佛寺草芽荒穢古王城溫輿即就凉輿便陰氣潜消暖氣盈棲鳳未堪雲尚密照人日腳尚微明寒食甚雨中泛東舍溪偶晴遊張公石室三首籧篨煙靄入浮槎罨畫溪干阿果家浩蕩天風飛羽蓋繽紛法雨落曇華阪懸飲澗猿連臂魄褫投牢虎落牙豈是仙翁未神聖笑談為我放靈鴉天遊無事月中槎物外仙靈别是家老蝠有方精不化白驢絶迹昡生華竈餘丹藥清毛骨澗吐清泉厲齒牙回首周郎斬蛟處晚雲當面舞神鴉天河重泛客星槎便好成都訪卜家渭水未成浮竹葉武陵猶記落桃華傳聞鐵騎充牛口暗想樓船破虎牙濁酒一杯山水緑棹歌三疊百啼鴉周將軍廟觀嶽侯石像侯祠初毁道士不忍壞侯像沈荆溪中因得不壞二首萬死何知獄吏尊威名蓋代古難存侯初下大理獄吏執筆請辭大書其紙尾而脅之曰汝觀今世烏有大臣繫獄而生者趣具成案吾為汝書二桃豈以功高賜一舸不容身退論幾見飲江思道濟繆為圖像削王敦沈碑千古蛟川恨留與無窮客斷魂軍聲良苦聽南風說禮敦詩也不容鬬蟻達聰良是病戰蝸流血可同宗親疏間入聯鑣話真假言從躡足封趣詔河陽長巳矣隆中悲切起人龍雨後攪人無賴是東風掃盡春菲一雨中窗外逺山裝暗緑眼前佳卉夢新紅梅生樂圃枝如綴草合誠臺路詎通芍藥牡丹知漸老折來瓶水玩芳叢連日自退谷路抵袁口晚煙暝雨不勝愁改日仍為退谷遊司事守田如有意催歸脫袴感行休連營谷里旌旗暮細草杯湖荷芰秋果下馬拖泥水去石頭路滑且夷猶雨後憶龍翔寺好溪東赴海門秋中有禪居湧碧流潮信往來雙别嶼世緣生滅幾浮漚菱歌面面來漁鼓燈火層層到客舟何事瓜期外留滯短窗斜雨不堪愁春遊懷古登臨一度一傷神功業蹉跎萬物新飛鳥逺歸雲外嶺賞花頻對眼前人茸茸雨腳南郊暮種種茅針太極春鼓掌只供漁父笑朅來生水拍江漘寒食遣興介子龍蛇亦大靈禁煙猶復雨霖零時風未辦作寒食春事無過醉醁酃取士語乾三禮冗延賔為屈五經瓶明年此日家山路滄漠從君看水萍縣舍酴醿始有開意㑹走遷居簿㕔芳叢纍纍結珠璣雨後芬香郁麝臍半醉半醒春晝永載行載笑洞仙迷青蛇眼見遊飛霧緑綬生愁解佩觹舉袂與君為此别幸傳薰德絳囊攜落梅過仲尹於東園隨所見而賦東風一夕報春來管領羣芳次第開出岫白雲如有意照人明月幾難回縞衣聊復歸三島緑醑無辭舉百杯真味不須談鼎實等閒誰識鎖梁材折枝水仙西子苧蘿溪浣紗李白捉月千丈波風流東迆去不盡玉釧猶傳金叵羅芰荷蒲荇爭清泚微香密與和風起可將齊潔祀王明為言酌獻持杯水錢湖有水仙王廟月下酴醿噴人清馥遍閒庭心醉銀釭對醁醽高髻月娥呈素面孤雲天蓋拂明星腰支夭裊愁縈緒玉佩招搖尚典型著意政須延永夜新條明月定飄零和許簿牡丹二首天與花王化日舒可堪買酒共提壺荒凉洛苑芳菲甚落寞揚州氣味殊傾國幾迷狂舞蝶還錢不得迅飛鳬清愁懷抱多春感一葦懸知此意無清江不解踏長蘆悶向花前問玉壺秀色可飱誰是伴濃裝獨立自應殊醉傾鏡外歸鍾酒飛盡人間幾血鳬多占春風稱第一檀心知有謝來無復和仲蟠二首開緘豁豁皺眉舒一首新詩酒一壺寒食禁煙春已半佳人傾國態懸殊園荒不減遊羣鹿才盡應悲短續鳬有墨牡丹君種否鄉邦能借一畦無一見春紅意已舒何須幻化入懸壺含芳鎮日香千和作態臨風色萬殊曲檻乍開金鏤鳳清池斜照玉為鳬洛陽擬問名園在王石如今解接無思鄉奉和杯室開門傍石泉平生活計枕書眠但知身世非人界不信方家說洞天陋巷分甘顔子樂一瓢所得許由賢年來把板塵埃去笑殺商山四皓仙和錢都官道學從初小況雄丈光萬丈吐長虹凌霜壯節生來徑噴玉清詩老更工折檻定須回日御嘂閽端復悟天聰願公赤舄安狼㚄豳國何曽有變風和元直疇昔相要學屢空蹉跎行即歎龍鍾三千牘缺東方奏十萬兵無小范胸大愧入關歌一箭終期出塞傳三烽太宗征遼故事蓬萊有願占雲氣又美江山筆墨供和元可贈别惟憐蹤跡負平生愧豫秋空萬里清體道信能忘聚散論交曽復俟將迎愁多人物輸前輩恨有天公也世情陽羡買田雖舊約虞歌喜起欲誰賡王朴海㝢煎熬沸鼎時先生靜付一支頥單辭隱几三闕在大略平邊百世知到了勳庸成底事由來用捨出先幾長槍不用毛錐子應使毛錐自用為酬朱張二秀才皆次其首章韻二首殃民政虐恐風傳鎮日窮愁蟬腹然化物未能參物格高談無當若談天雅歌清唱俱流徵善聽多慙可絶弦何事攔腰撞君價絶塵奔逸正吾前萬緣政爾未能佳繪句雕鎪直謾誇客裏懸知君有謂宦遊當念我何奢幾時西塞歌飛鷺指日東籬采菊花五斗折腰良自苦奈今無粟飯胡麻觀法帖字學從前小藝林誰論終古可傳心毛錐劃剨龍蛇動筆陳縱橫劒㦸森須省六書兼八法由來一字直千金世人不解張顛聖剛把碑文鎮日臨夜聞桂香秋香烈烈鎖房櫳龍麝腥羶不易同清素月中流夜魄芬芳林下有家風記惟密雪開梅蕚憶過疏籬採菊叢獨有平泉舊詩句浪誇金粟竟非工蓼花不矜秀色傲春風笑倚斜陽露氣濃秋草淒涼風索索江天寂靜水溶溶岸移晴漪飄仙袂葉起丹霞照玉容可奈少香香似可為傳滋味入醺醲社日年去年來春復秋田豐土穀浪言酬敗家謔善崔文紀宰社均無曲逆侯燈燭靈壇三告祀燕鴻邊塞兩淹留不須飲福傾樽酒聾過今生方始休浪語集卷七
